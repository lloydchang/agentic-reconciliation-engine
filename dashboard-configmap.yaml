apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-html-config
  namespace: ai-infrastructure
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Agents Dashboard - Agentic Reconciliation Engine</title>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://unpkg.com/feather-icons"></script>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            
            :root {
                --primary: #6366f1;
                --primary-dark: #4f46e5;
                --secondary: #8b5cf6;
                --success: #10b981;
                --warning: #f59e0b;
                --danger: #ef4444;
                --dark: #1f2937;
                --light: #f3f4f6;
                --border: #e5e7eb;
            }
            
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                color: var(--dark);
            }
            
            .dashboard {
                max-width: 1400px;
                margin: 0 auto;
                padding: 20px;
            }
            
            .header {
                background: white;
                border-radius: 12px;
                padding: 24px;
                margin-bottom: 24px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            .logo {
                display: flex;
                align-items: center;
                gap: 12px;
                font-size: 24px;
                font-weight: bold;
                color: var(--primary);
            }
            
            .status-indicator {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 16px;
                border-radius: 20px;
                font-size: 14px;
                font-weight: 500;
            }
            
            .status-online {
                background: var(--success);
                color: white;
            }
            
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 20px;
                margin-bottom: 24px;
            }
            
            .card {
                background: white;
                border-radius: 12px;
                padding: 24px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                transition: transform 0.2s, box-shadow 0.2s;
            }
            
            .card:hover {
                transform: translateY(-2px);
                box-shadow: 0 8px 12px rgba(0, 0, 0, 0.15);
            }
            
            .card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 16px;
            }
            
            .card-title {
                font-size: 18px;
                font-weight: 600;
                color: var(--dark);
            }
            
            .metric {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 12px;
            }
            
            .metric-value {
                font-size: 32px;
                font-weight: bold;
                color: var(--primary);
            }
            
            .metric-label {
                font-size: 14px;
                color: #6b7280;
            }
            
            .agent-list {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }
            
            .agent-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px;
                border: 1px solid var(--border);
                border-radius: 8px;
                transition: background-color 0.2s;
            }
            
            .agent-item:hover {
                background: var(--light);
            }
            
            .agent-info {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            
            .agent-avatar {
                width: 40px;
                height: 40px;
                border-radius: 50%;
                background: var(--primary);
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-weight: bold;
            }
            
            .skills-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
                gap: 12px;
            }
            
            .skill-item {
                padding: 12px;
                border: 1px solid var(--border);
                border-radius: 8px;
                text-align: center;
                font-size: 14px;
                transition: all 0.2s;
                cursor: pointer;
            }
            
            .skill-item:hover {
                background: var(--primary);
                color: white;
                transform: scale(1.05);
            }
            
            .chart-container {
                position: relative;
                height: 300px;
                margin-top: 16px;
            }
            
            .activity-feed {
                max-height: 400px;
                overflow-y: auto;
            }
            
            .activity-item {
                display: flex;
                gap: 12px;
                padding: 12px 0;
                border-bottom: 1px solid var(--border);
            }
            
            .activity-icon {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            
            .chat-container {
                background: white;
                border-radius: 12px;
                padding: 24px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                height: 500px;
                display: flex;
                flex-direction: column;
            }
            
            .chat-messages {
                flex: 1;
                overflow-y: auto;
                padding: 16px;
                background: var(--light);
                border-radius: 8px;
                margin-bottom: 16px;
            }
            
            .chat-message {
                margin-bottom: 16px;
                padding: 12px;
                border-radius: 8px;
                max-width: 80%;
            }
            
            .chat-user {
                background: var(--primary);
                color: white;
                margin-left: auto;
            }
            
            .chat-bot {
                background: white;
                border: 1px solid var(--border);
            }
            
            .chat-input-container {
                display: flex;
                gap: 12px;
            }
            
            .chat-input {
                flex: 1;
                padding: 12px;
                border: 1px solid var(--border);
                border-radius: 8px;
                font-size: 14px;
            }
            
            .btn {
                padding: 10px 20px;
                border: none;
                border-radius: 8px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            
            .btn-primary {
                background: var(--primary);
                color: white;
            }
            
            .btn-primary:hover {
                background: var(--primary-dark);
            }
            
            .loading {
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 40px;
                color: #6b7280;
            }
            
            @media (max-width: 768px) {
                .grid {
                    grid-template-columns: 1fr;
                }
                
                .header {
                    flex-direction: column;
                    gap: 16px;
                }
            }
        </style>
    </head>
    <body>
        <div class="dashboard">
            <header class="header">
                <div class="logo">
                    🤖 AI Agents Dashboard
                </div>
                <div class="status-indicator status-online" id="system-status">
                    <span class="status-dot"></span>
                    System Online
                </div>
            </header>
            
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">📊 System Overview</h3>
                        <button class="btn btn-primary" onclick="refreshData()">
                            <i data-feather="refresh-cw"></i>
                        </button>
                    </div>
                    <div class="metric">
                        <div>
                            <div class="metric-value" id="total-agents">0</div>
                            <div class="metric-label">Total Agents</div>
                        </div>
                    </div>
                    <div class="metric">
                        <div>
                            <div class="metric-value" id="pod-count">0</div>
                            <div class="metric-label">Active Pods</div>
                        </div>
                    </div>
                    <div class="metric">
                        <div>
                            <div class="metric-value" id="node-count">0</div>
                            <div class="metric-label">Cluster Nodes</div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">⚡ Resource Usage</h3>
                    </div>
                    <div class="chart-container">
                        <canvas id="resource-chart"></canvas>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">🎯 Skills Distribution</h3>
                    </div>
                    <div class="skills-grid" id="skills-grid">
                        <div class="loading">Loading skills...</div>
                    </div>
                </div>
            </div>
            
            <div class="grid">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">🤖 Active Agents</h3>
                    </div>
                    <div class="agent-list" id="agent-list">
                        <div class="loading">Loading agents...</div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">📋 Recent Activity</h3>
                    </div>
                    <div class="activity-feed" id="activity-feed">
                        <div class="loading">Loading activity...</div>
                    </div>
                </div>
                
                <div class="chat-container">
                    <div class="card-header">
                        <h3 class="card-title">🧠 RAG Chatbot Assistant</h3>
                    </div>
                    <div class="chat-messages" id="chat-messages">
                        <div class="chat-message chat-bot">
                            👋 Hello! I'm your AI assistant powered by RAG (Retrieval-Augmented Generation). I can help you with information about the AI agents, cluster status, skills, and system performance. What would you like to know?
                        </div>
                    </div>
                    <div class="chat-input-container">
                        <input type="text" class="chat-input" id="chat-input" placeholder="Ask about agents, cluster, skills, or performance..." onkeypress="handleChatKeyPress(event)">
                        <button class="btn btn-primary" onclick="sendChatMessage()">
                            <i data-feather="send"></i>
                            Send
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Initialize Feather icons
            feather.replace();
            
            // API base URL
            const API_BASE = '/api';
            
            // Refresh data function
            async function refreshData() {
                try {
                    await Promise.all([
                        loadMetrics(),
                        loadAgents(),
                        loadSkills(),
                        loadActivity()
                    ]);
                } catch (error) {
                    console.error('Error refreshing data:', error);
                }
            }
            
            // Load system metrics
            async function loadMetrics() {
                try {
                    const response = await fetch(`${API_BASE}/metrics`);
                    const data = await response.json();
                    
                    document.getElementById('total-agents').textContent = '2';
                    document.getElementById('pod-count').textContent = data.pod_count || 0;
                    document.getElementById('node-count').textContent = data.node_count || 0;
                    
                    // Update resource chart
                    updateResourceChart(data);
                } catch (error) {
                    console.error('Error loading metrics:', error);
                }
            }
            
            // Load agents
            async function loadAgents() {
                try {
                    const response = await fetch(`${API_BASE}/agents`);
                    const data = await response.json();
                    
                    const agentList = document.getElementById('agent-list');
                    agentList.innerHTML = '';
                    
                    data.agents.forEach(agent => {
                        const agentItem = document.createElement('div');
                        agentItem.className = 'agent-item';
                        agentItem.innerHTML = `
                            <div class="agent-info">
                                <div class="agent-avatar">${agent.name.charAt(0)}</div>
                                <div class="agent-details">
                                    <h4>${agent.name}</h4>
                                    <p>${agent.type} • ${agent.skills} skills</p>
                                </div>
                            </div>
                            <div class="agent-status">
                                <span style="color: var(--success)">${agent.status}</span>
                            </div>
                        `;
                        agentList.appendChild(agentItem);
                    });
                } catch (error) {
                    console.error('Error loading agents:', error);
                }
            }
            
            // Load skills
            async function loadSkills() {
                try {
                    const response = await fetch(`${API_BASE}/skills`);
                    const data = await response.json();
                    
                    const skillsGrid = document.getElementById('skills-grid');
                    skillsGrid.innerHTML = '';
                    
                    data.skills.slice(0, 12).forEach(skill => {
                        const skillItem = document.createElement('div');
                        skillItem.className = 'skill-item';
                        skillItem.textContent = skill;
                        skillItem.onclick = () => askAboutSkill(skill);
                        skillsGrid.appendChild(skillItem);
                    });
                } catch (error) {
                    console.error('Error loading skills:', error);
                }
            }
            
            // Load activity
            async function loadActivity() {
                try {
                    const response = await fetch(`${API_BASE}/activity`);
                    const data = await response.json();
                    
                    const activityFeed = document.getElementById('activity-feed');
                    activityFeed.innerHTML = '';
                    
                    data.activities.forEach(activity => {
                        const activityItem = document.createElement('div');
                        activityItem.className = 'activity-item';
                        activityItem.innerHTML = `
                            <div class="activity-icon">${activity.icon}</div>
                            <div class="activity-content">
                                <div class="activity-time">${activity.time}</div>
                                <div class="activity-message">${activity.message}</div>
                            </div>
                        `;
                        activityFeed.appendChild(activityItem);
                    });
                } catch (error) {
                    console.error('Error loading activity:', error);
                }
            }
            
            // Update resource chart
            function updateResourceChart(data) {
                const ctx = document.getElementById('resource-chart').getContext('2d');
                
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['CPU Usage', 'Memory Usage', 'Available'],
                        datasets: [{
                            data: [data.cpu_usage || 45, data.memory_usage || 63, 100 - ((data.cpu_usage || 45) + (data.memory_usage || 63)) / 2],
                            backgroundColor: ['#6366f1', '#8b5cf6', '#f3f4f6'],
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: {
                                position: 'bottom'
                            }
                        }
                    }
                });
            }
            
            // Chat functions
            function handleChatKeyPress(event) {
                if (event.key === 'Enter') {
                    sendChatMessage();
                }
            }
            
            async function sendChatMessage() {
                const input = document.getElementById('chat-input');
                const message = input.value.trim();
                
                if (!message) return;
                
                const chatMessages = document.getElementById('chat-messages');
                
                // Add user message
                const userMessage = document.createElement('div');
                userMessage.className = 'chat-message chat-user';
                userMessage.textContent = message;
                chatMessages.appendChild(userMessage);
                
                // Clear input
                input.value = '';
                
                // Send to RAG API
                try {
                    const response = await fetch(`${API_BASE}/rag/query`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ query: message })
                    });
                    
                    const data = await response.json();
                    
                    // Add bot response
                    const botMessage = document.createElement('div');
                    botMessage.className = 'chat-message chat-bot';
                    botMessage.textContent = data.response;
                    chatMessages.appendChild(botMessage);
                    
                    // Scroll to bottom
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    
                } catch (error) {
                    console.error('Error sending chat message:', error);
                    
                    // Add error message
                    const errorMessage = document.createElement('div');
                    errorMessage.className = 'chat-message chat-bot';
                    errorMessage.textContent = 'Sorry, I encountered an error processing your request. Please try again.';
                    chatMessages.appendChild(errorMessage);
                }
                
                // Scroll to bottom
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }
            
            function askAboutSkill(skill) {
                const input = document.getElementById('chat-input');
                input.value = `Tell me about the ${skill} skill`;
                sendChatMessage();
            }
            
            // Initialize dashboard
            document.addEventListener('DOMContentLoaded', function() {
                refreshData();
                
                // Auto-refresh every 30 seconds
                setInterval(refreshData, 30000);
            });
        </script>
    </body>
    </html>
