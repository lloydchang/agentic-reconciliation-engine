# Agentic AI Skills ServiceMonitors
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: certificate-rotation-skill
  namespace: staging
  labels:
    app.kubernetes.io/name: certificate-rotation-skill
    app.kubernetes.io/component: agentic-ai
    app.kubernetes.io/part-of: gitops-infra-control-plane
spec:
  selector:
    matchLabels:
      app: certificate-rotation-skill
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
---
