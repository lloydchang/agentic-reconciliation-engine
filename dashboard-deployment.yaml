apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-dashboard
  namespace: ai-infrastructure
  labels:
    app: agent-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-dashboard
  template:
    metadata:
      labels:
        app: agent-dashboard
    spec:
      containers:
      - name: dashboard
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: dashboard-html
          mountPath: /usr/share/nginx/html
      volumes:
      - name: dashboard-html
        configMap:
          name: dashboard-html
---
apiVersion: v1
kind: Service
metadata:
  name: agent-dashboard-service
  namespace: ai-infrastructure
spec:
  selector:
    app: agent-dashboard
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
