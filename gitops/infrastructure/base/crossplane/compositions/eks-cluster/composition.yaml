---
# Composition: How to create an EKS cluster from AWS resources
apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: eks-cluster-composition
  labels:
    provider: aws
    service: compute
spec:
  compositeTypeRef:
    apiVersion: example.crossplane.io/v1alpha1
    kind: XEKSCluster
  # Each resource is created from the composite resource's spec
  resources:
    # 1. VPC - networking foundation
    - name: vpc
      base:
        apiVersion: ec2.aws.crossplane.io/v1beta2
        kind: VPC
        spec:
          forProvider:
            cidrBlock: "10.0.0.0/16"
            enableDnsSupport: true
            enableDnsHostnames: true
            tags:
              - key: Name
                value: "{{ .Composite.Name }}-vpc"
              - key: ManagedBy
                value: "Crossplane"
      patches:
        # Patch VPC ID back to composite status
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.vpcId"
          toFieldPath: "status.vpcId"
        # Patch entire VPC spec's CIDR from composite
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.vpcCidr"
          toFieldPath: "spec.forProvider.cidrBlock"

    # 2. Internet Gateway
    - name: internet-gateway
      base:
        apiVersion: ec2.aws.crossplane.io/v1beta2
        kind: InternetGateway
        spec:
          forProvider:
            vpcId:
              fromFieldPath: "status.vpcId"
            tags:
              - key: Name
                value: "{{ .Composite.Name }}-igw"
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: "spec.parameters.clusterName"
          toFieldPath: "metadata.name"

    # 3. Public Subnets (one per AZ)
    - name: public-subnets
      base:
        apiVersion: ec2.aws.crossplane.io/v1beta2
        kind: Subnet
        # Note: We'll need multiple instances - use composition patches with arrays
        # Crossplane supports array expansion in patches (advanced)
        # For simplicity, we could create a single resource with multiple subnets
        # Or use a custom function to generate multiple subnet resources
      # Deferred: subnet creation needs iteration over CIDRs

    # 4. NAT Gateway (if enabled)
    - name: nat-gateway
      base:
        apiVersion: ec2.aws.crossplane.io/v1beta2
        kind: NATGateway
        spec:
          forProvider:
            subnetId:
              fromFieldPath: "status.publicSubnetIds[0]"  # First public subnet
            connectivityType: "public"
      # conditional patch: only create if enableNatGateway=true

    # 5. Private Subnets
    - name: private-subnets
      base:
        apiVersion: ec2.aws.crossplane.io/v1beta2
        kind: Subnet
        # Similar to public subnets
      # Same iteration needed

    # 6. Security Groups for EKS
    - name: cluster-sg
      base:
        apiVersion: ec2.aws.crossplane.io/v1beta2
        kind: SecurityGroup
        spec:
          forProvider:
            description: "Security group for EKS cluster control plane"
            vpcId:
              fromFieldPath: "status.vpcId"
            tags:
              - key: Name
                value: "{{ .Composite.Name }}-cluster-sg"
      patches:
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.securityGroups[0].id"
          toFieldPath: "status.clusterSecurityGroupId"

    # 7. IAM Role for EKS
    - name: eks-iam-role
      base:
        apiVersion: iam.aws.crossplane.io/v1beta2
        kind: Role
        spec:
          forProvider:
            assumeRolePolicyDocument: |
              {
                "Version": "2012-10-17",
                "Statement": [
                  {
                    "Effect": "Allow",
                    "Principal": {
                      "Service": "eks.amazonaws.com"
                    },
                    "Action": "sts:AssumeRole"
                  }
                ]
              }
            tags:
              - key: Name
                value: "{{ .Composite.Name }}-eks-role"
      patches:
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.arn"
          toFieldPath: "status.iamRoleArn"

    - name: eks-iam-role-policy-attachment
      base:
        apiVersion: iam.aws.crossplane.io/v1beta2
        kind: PolicyAttachment
        spec:
          forProvider:
            policyArn: "arn:aws:iam::aws:policy/AmazonEKSClusterPolicy"
            roles:
              - fromFieldPath: "status.eks-iam-role.atProvider.name"
      patches:
        - type: ToCompositeFieldPath
          fromFieldPath: "status.eks-iam-role.atProvider.arn"
          toFieldPath: "status.iamRoleArn"

    # 8. EKS Cluster
    - name: eks-cluster
      base:
        apiVersion: eks.aws.crossplane.io/v1beta2
        kind: Cluster
        spec:
          forProvider:
            name: "{{ .Composite.Name }}"
            version: "{{ .Composite.Name }}"
            roleArn:
              fromFieldPath: "status.iamRoleArn"
            resourcesVpcConfig:
              subnetIds:
                fromFieldPath: "status.privateSubnetIds"  # Must be set by subnet resources
            tags:
              - key: Name
                value: "{{ .Composite.Name }}"
      patches:
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.endpoint"
          toFieldPath: "status.endpoint"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.certificateAuthorityData"
          toFieldPath: "status.certificateAuthorityData"
        - type: ToCompositeFieldPath
          fromFieldPath: "status.atProvider.arn"
          toFieldPath: "status.clusterArn"

    # 9. Node Groups (multiple based on spec)
    - name: node-groups
      base:
        apiVersion: ec2.aws.crossplane.io/v1beta2
        kind: LaunchTemplate
        # Actually EKS node groups use nodegroup resource from provider-eks
        # Not ec2 autoscaling groups directly
        # Need to use: NodeGroup from eks.aws.crossplane.io
      # This requires array expansion - iterate over spec.parameters.nodeGroups
      # Complex patch: generate one NodeGroup resource per entry in array

    # 10. Fargate Profiles (optional)
    - name: fargate-profiles
      base:
        apiVersion: eks.aws.crossplane.io/v1beta2
        kind: FargateProfile
        # One per profile in spec.parameters.fargateProfiles

    # 11. StorageClass for dynamic provisioning
    - name: storage-class
      base:
        apiVersion: storage.k8s.io/v1
        kind: StorageClass
        metadata:
          name: "{{ .Composite.Name }}-storage"
        provisioner: "ebs.csi.aws.com"
        parameters:
          type: "gp3"
        allowVolumeExpansion: true
        reclaimPolicy: "Retain"

  # Patch connection details from resources to claim
  connectionDetails:
    - fromConnectionSecretKeyRef:
        name: "{{ .Composite.Name }}-connection"
        key: kubeconfig
      toConnectionSecretKeyRef:
        key: kubeconfig
        name: "{{ .Composite.Name }}-connection"
    - fromFieldPath: "status.endpoint"
      toFieldPath: "endpoint"
    - fromFieldPath: "status.certificateAuthorityData"
      toFieldPath: "certificateAuthorityData"
