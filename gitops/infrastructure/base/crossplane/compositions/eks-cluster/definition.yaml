---
# XRD:XEKSCluster - Composite Resource Definition for EKS Clusters
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xeksclusters.example.crossplane.io
spec:
  group: example.crossplane.io
  names:
    kind: XEKSCluster
    plural: xeksclusters
    singular: xekscluster
    shortNames:
      - eksc
  claimNames:
    kind: EKSClusterClaim
    plural: eksclusterclaims
    singular: eksclusterclaim
  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                parameters:
                  type: object
                  properties:
                    providerConfigRef:
                      type: object
                      properties:
                        name:
                          type: string
                          description: "Reference to ProviderConfig resource (e.g., aws-provider)"
                    region:
                      type: string
                      description: "AWS region for cluster deployment"
                    clusterName:
                      type: string
                      description: "Name of the EKS cluster"
                    clusterVersion:
                      type: string
                      default: "1.28"
                      description: "Kubernetes version"
                    vpcCidr:
                      type: string
                      default: "10.0.0.0/16"
                      description: "CIDR block for VPC"
                    privateSubnetCidrs:
                      type: array
                      items:
                        type: string
                      default: ["10.0.1.0/24", "10.0.2.0/24", "10.0.3.0/24"]
                      description: "CIDR blocks for private subnets (AZs)"
                    publicSubnetCidrs:
                      type: array
                      items:
                        type: string
                      default: ["10.0.101.0/24", "10.0.102.0/24", "10.0.103.0/24"]
                      description: "CIDR blocks for public subnets (AZs)"
                    enableNatGateway:
                      type: boolean
                      default: true
                      description: "Create NAT gateway for private subnets"
                    nodeGroups:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          instanceTypes:
                            type: array
                            items:
                              type: string
                          minSize:
                            type: integer
                          maxSize:
                            type: integer
                          desiredSize:
                            type: integer
                          diskSize:
                            type: integer
                            default: 100
                          capacityType:
                            type: string
                            enum: ["ON_DEMAND", "SPOT"]
                            default: "ON_DEMAND"
                      required: ["name", "instanceTypes", "minSize", "maxSize"]
                    fargateProfiles:
                      type: array
                      items:
                        type: object
                        properties:
                          name:
                            type: string
                          selectors:
                            type: array
                            items:
                              type: object
                              properties:
                                namespace:
                                  type: string
                                labels:
                                  type: object
                                  additionalProperties:
                                    type: string
                      required: ["name", "selectors"]
                  required:
                    - region
                    - clusterName
                    - nodeGroups
            status:
              type: object
              properties:
                endpoint:
                  type: string
                  description: "EKS cluster API endpoint"
                certificateAuthorityData:
                  type: string
                  description: "Base64-encoded certificate data"
                vpcId:
                  type: string
                  description: "VPC ID"
                subnetIds:
                  type: array
                  items:
                    type: string
                  description: "Subnet IDs"
                nodeGroupIds:
                  type: array
                  items:
                    type: string
                  description: "Node group IDs"
                ready:
                  type: boolean
                  description: "Whether cluster is ready"
              x-kubernetes-preserve-unknown-fields: true
      # Additional versions can be added later
