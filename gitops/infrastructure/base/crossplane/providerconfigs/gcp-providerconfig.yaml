---
# GCP Provider Configuration for Crossplane
# Uses Workload Identity Federation for production (no service account keys)
apiVersion: gcp.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: gcp-provider
  namespace: crossplane-system
spec:
  credentials:
    # Preferred: Workload Identity (no secrets)
    source: InjectedIdentity
    # If using service account key secret:
    # source: Secret
    # secretRef:
    #   namespace: crossplane-system
    #   name: gcp-creds
    #   key: key
  allowedNamespaces:
    - "ai-infrastructure"
    - "production-*"
    - "staging-*"
  # Optional: default project ID if not specified in resources
  # projectID: "my-project-id"
---
# Optional: Provider config for specific project/region
