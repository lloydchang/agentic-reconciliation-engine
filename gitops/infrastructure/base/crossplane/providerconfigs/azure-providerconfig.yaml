---
# Azure Provider Configuration for Crossplane
# Uses Workload Identity (Azure AD Pod Identity or Workload Identity) for production
apiVersion: azure.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: azure-provider
  namespace: crossplane-system
spec:
  credentials:
    # For production, use Workload Identity with Azure AD Workload Identity
    source: InjectedIdentity
    # If using client secret/ID:
    # source: Secret
    # secretRef:
    #   namespace: crossplane-system
    #   name: azure-creds
    #   clientIDKey: clientid
    #   tenantIDKey: tenantid
    #   subscriptionIDKey: subscriptionid
    #   clientSecretKey: clientsecret
  allowedNamespaces:
    - "ai-infrastructure"
    - "production-*"
    - "staging-*"
  # Optional: default location
  # defaultLocation: eastus
