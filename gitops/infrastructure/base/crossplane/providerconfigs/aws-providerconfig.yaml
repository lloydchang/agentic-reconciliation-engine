---
# AWS Provider Configuration for Crossplane
# Credentials will be managed via external secret store (HashiCorp Vault, AWS Secrets Manager, or Kubernetes secrets)
apiVersion: aws.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: aws-provider
  namespace: crossplane-system
spec:
  credentials:
    # Source can be: InjectedIdentity (IRSA), Secret, or Environment
    # For production, use InjectedIdentity with IAM Roles for Service Accounts (IRSA)
    source: InjectedIdentity
    # If using secrets, uncomment and configure:
    # source: Secret
    # secretRef:
    #   namespace: crossplane-system
    #   name: aws-creds
    #   key: key
  allowedNamespaces:
    - "ai-infrastructure"
    - "production-*"
    - "staging-*"
---
