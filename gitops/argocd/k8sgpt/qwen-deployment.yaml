# Qwen Configuration for K8sGPT - Using Centralized Service
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen-deployment-config
  namespace: k8sgpt-system
  labels:
    app.kubernetes.io/name: qwen-deployment-config
    app.kubernetes.io/part-of: k8sgpt
data:
  deployment.yaml: |
    # This deployment is deprecated - using centralized agent-memory service
    # All Qwen functionality now provided by agent-memory-rust
    # Location: ai-infrastructure namespace
    # Service: agent-memory-service:8080
    # Metrics: agent-memory-service:9090
    
    # Migration completed: Use centralized service instead
    status: "migrated_to_centralized"
    migration_date: "2025-03-17"
    new_service: "agent-memory-service.ai-infrastructure.svc.cluster.local:8080"
    old_service: "qwen-localai.k8sgpt-system.svc.cluster.local:8080"
    
    # Configuration for K8sGPT to use centralized Qwen
    k8sgpt_config:
      backend: "agent-memory"
      model: "qwen2.5-7b-instruct"
      api_base: "http://agent-memory-service.ai-infrastructure.svc.cluster.local:8080"
      api_key: "k8sgpt-api-key"
      timeout: 30
      max_tokens: 4096
      temperature: 0.7
