apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: open-swe-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: open-swe
    app.kubernetes.io/component: application
    environment: staging
spec:
  project: default
  source:
    repoURL: https://github.com/lloydchang/agentic-reconciliation-engine
    path: core/deploy/helm/open-swe
    targetRevision: HEAD
    helm:
      valueFiles:
        - values-staging.yaml
      parameters:
        - name: global.ingress.enabled
          value: "true"
        - name: global.ingress.className
          value: "nginx"
        - name: gateway.replicas
          value: "2"
        - name: sandboxOperator.replicas
          value: "1"
        - name: reasoningEngine.replicas
          value: "1"
        - name: orchestrator.replicas
          value: "1"
        - name: workflowEngine.replicas
          value: "1"
        - name: analyticsEngine.replicas
          value: "1"
  destination:
    server: https://kubernetes.default.svc
    namespace: open-swe-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
  revisionHistoryLimit: 10
