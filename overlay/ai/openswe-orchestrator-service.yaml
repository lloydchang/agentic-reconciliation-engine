apiVersion: v1
kind: Service
metadata:
  name: openswe-orchestrator-service
  namespace: ai-infrastructure
  labels:
    app: openswe-orchestrator
    component: openswe-integration
spec:
  selector:
    app: openswe-orchestrator
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP
