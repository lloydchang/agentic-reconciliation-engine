apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openswe-ingress
  namespace: ai-infrastructure
  labels:
    app: openswe-orchestrator
    component: openswe-integration
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - openswe.example.com
    secretName: openswe-tls
  rules:
  - host: openswe.example.com
    http:
      paths:
      - path: /slack/events
        pathType: Prefix
        backend:
          service:
            name: openswe-orchestrator-service
            port:
              number: 8080
      - path: /github/webhooks
        pathType: Prefix
        backend:
          service:
            name: openswe-orchestrator-service
            port:
              number: 8080
      - path: /linear/webhooks
        pathType: Prefix
        backend:
          service:
            name: openswe-orchestrator-service
            port:
              number: 8080
      - path: /health
        pathType: Exact
        backend:
          service:
            name: openswe-orchestrator-service
            port:
              number: 8080
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: openswe-orchestrator-service
            port:
              number: 9090
