# Kustomization for Consensus-Based Agent Orchestration
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: consensus-orchestration
  annotations:
    config.kubernetes.io/local-config: "true"
resources:
# Consensus Layer
- name: consensus-layer/
  dependsOn:
    - agentic-reconciliation-engine
# Agent Swarm
- name: agent-swarm/
  dependsOn:
    - consensus-layer
# Consensus-Enhanced TaskSpawners
- name: consensus-taskspawners/
  dependsOn:
    - consensus-layer
    - agent-swarm
# Flux Integration
- name: flux-integration/
  dependsOn:
    - consensus-layer
    - consensus-taskspawners
# Monitoring
- name: monitoring/
  dependsOn:
    - consensus-layer
    - agent-swarm
    - consensus-taskspawners
dependsOn:
  - agentic-reconciliation-engine
# Common configurations
configurations:
- name: consensus-config
  literals:
  - CONSENSUS_ENABLED= "true"
  - CONSENSUS_PROTOCOL= "raft"
  - CONSENSUS_TIMEOUT= "30s"
  - SWARM_COORDINATION= "true"
  - SWARM_SIZE= "7"
  - AGENT_QUORUM= "3"
  - FEEDBACK_MICRO= "30s"
  - FEEDBACK_MESO= "5m"
  - FEEDBACK_MACRO= "1h"
  - OPTIMIZATION_TARGET= "local-maxima"
  - COORDINATION_METHOD= "lightweight-consensus"
  - LOG_LEVEL= "info"
  - MONITORING_ENABLED= "true"
# Namespace configurations
namespace: control-plane
# Common labels
commonLabels:
  app.kubernetes.io/name: consensus-orchestration
  app.kubernetes.io/component: infrastructure
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/created-by: gitops-control-plane
# Common annotations
commonAnnotations:
  config.kubernetes.io/origin: agentic-reconciliation-engine
  config.kubernetes.io/version: v3.0
  config.kubernetes.io/documentation: https://github.com/lloydchang/$TOPDIR-core/operators/tree/main/overlay/examples/complete-hub-spoke-consensus
# Patches for strategic configurations
patches:
- target:
    kind: Namespace
    name: control-plane
  patch: |
    - op: add
      path: /metadata/labels/consensus-enabled
      value: "true"
    - op: add
      path: /metadata/labels/swarm-coordination
      value: "true"
    - op: add
      path: /metadata/annotations/consensus.kubernetes.io/protocol
      value: "raft"
# Strategic merge for enhanced capabilities
patchesStrategicMerge:
- # Enhanced RBAC for consensus operations
- path: rbac/consensus-rbac.yaml
- # Network policies for agent communication
- path: network-core/governance/consensus-netpol.yaml
- # Security contexts for agent isolation
- path: security/agent-security.yaml
# Images configuration
images:
- name: consensus/cost-optimizer
  newTag: v3.0
- name: consensus/security-scanner
  newTag: v3.0
- name: consensus/performance-tuner
  newTag: v3.0
- name: kagent/kagent-controller
  newTag: v3.0-consensus
# Replicas configuration
replicas:
- name: consensus-controller
  count: 1
- name: swarm-controller
  count: 1
- name: kagent-controller
  count: 2
