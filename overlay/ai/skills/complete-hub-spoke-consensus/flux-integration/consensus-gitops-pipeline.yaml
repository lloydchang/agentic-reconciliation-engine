# Flux Kustomization with Agent Consensus
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: consensus-agent-workloads
  namespace: flux-system
  labels:
    app.kubernetes.io/part-of: flux
    app.kubernetes.io/component: kustomization
spec:
  dependsOn:
  - name: infrastructure-network
  - name: agent-consensus-layer
  - name: swarm-intelligence-layer
  interval: 1m  # Tight feedback loop
  retryInterval: 30s
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: infrastructure-repo
  path: "./overlay/examples/complete-hub-spoke-consensus"
  prune: true
  wait: true
  postBuild:
    substitute:
      CONSENSUS_ENABLED: "true"
      SWARM_COORDINATION: "true"
      FEEDBACK_MICRO: "30s"
      FEEDBACK_MESO: "5m"
      FEEDBACK_MACRO: "1h"
      CONSENSUS_PROTOCOL: "raft"
      SWARM_SIZE: "7"
      AGENT_QUORUM: "3"
      OPTIMIZATION_TARGET: "local-maxima"
      COORDINATION_METHOD: "lightweight-consensus"
  healthChecks:
  - apiVersion: v1
    kind: Service
    name: consensus-controller
    namespace: control-plane
    timeout: 3m
  - apiVersion: v1
    kind: Service
    name: swarm-controller
    namespace: control-plane
    timeout: 3m
  - apiVersion: v1
    kind: Service
    name: kagent-controller
    namespace: control-plane
    timeout: 3m
  patches:
  - target:
      kind: Deployment
      name: kagent-controller
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CONSENSUS_ENABLED
          value: "true"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: SWARM_COORDINATION
          value: "true"
  - target:
      kind: Deployment
      name: consensus-controller
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: FEEDBACK_INTERVAL
          value: "30s"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CONSENSUS_TIMEOUT
          value: "30s"
  - target:
      kind: Deployment
      name: swarm-controller
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: SWARM_SIZE
          value: "7"
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OPTIMIZATION_STRATEGY
          value: "local-hill-climbing"
  validation:
    client: kubeval
    message: "Validate consensus manifests before applying"
