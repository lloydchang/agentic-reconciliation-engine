apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: complete-hub-spoke-with-kagent
  namespace: flux-system
resources:
  # Core Flux and controllers (same as base)
  - name: ../../core/operators/
    dependsOn:
      - flux-system
  # Kagent orchestration components
  - name: kagent-core/
    dependsOn:
      - ../../core/operators/
  - name: taskspawners/
    dependsOn:
      - kagent-core
  - name: agent-workflows/
    dependsOn:
      - taskspawners
  - name: mcp-registry/
    dependsOn:
      - kagent-core
  - name: monitoring/
    dependsOn:
      - ../../core/operators/
      - kagent-core
dependsOn:
  - agentic-reconciliation-engine
labels:
  - pairs:
      managed-by: flux
      component: complete-hub-spoke-with-kagent
      platform: multi-cloud-gitops
      ai-enhanced: "true"
      orchestration: "kagent"
# Kagent configuration
configMapGenerator:
- name: kagent-config
  literals:
  - log-level=info
  - metrics-enabled=true
  - audit-enabled=true
  - mcp-timeout=30s
  - task-timeout=10m
  - max-concurrent-tasks=10
- name: agent-workflow-config
  literals:
  - default-retry-count=3
  - default-backoff=30s
  - failure-notification=slack
  - success-notification=none
