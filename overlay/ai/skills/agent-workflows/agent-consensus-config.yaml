---
# Agent Consensus Configuration for Distributed Orchestration
# Based on gitops-infra-control-plane and distributed consensus research
apiVersion: consensus.gitops.io/v1alpha1
kind: AgentConsensusConfig
metadata:
  name: infrastructure-consensus
  namespace: control-plane
  labels:
    app.kubernetes.io/name: agent-consensus
    app.kubernetes.io/component: consensus-layer
    app.kubernetes.io/part-of: gitops-control-plane
spec:
  protocol: "raft"  # Raft consensus for simplicity and reliability
  agents:
  - name: "cost-optimizer"
    voteWeight: 1
    expertise: ["cost", "efficiency", "optimization"]
    image: "cost-optimizer-agent:latest"
    replicas: 3
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  - name: "security-validator"
    voteWeight: 2  # Higher weight for security decisions
    expertise: ["security", "compliance", "policy"]
    image: "security-validator-agent:latest"
    replicas: 2
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
  - name: "performance-tuner"
    voteWeight: 1
    expertise: ["performance", "reliability", "scaling"]
    image: "performance-tuner-agent:latest"
    replicas: 2
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  decisionThresholds:
    operational: 0.5    # 50% for operational changes
    security: 0.8        # 80% for security changes
    critical: 1.0        # 100% for critical changes
  communication:
    protocol: "raft-based"
    heartbeat: "10s"
    consensusTimeout: "30s"
    electionTimeout: "5s"
  feedbackLoops:
    micro: "30s"    # Local optimization loops
    meso: "5m"      # Agent consensus coordination
    macro: "1h"      # Global strategy optimization
  monitoring:
    enabled: true
    metricsPort: 8080
    healthCheckInterval: "30s"
---
# Self-Organizing Agent Swarm Configuration
apiVersion: swarm.gitops.io/v1alpha1
kind: AgentSwarm
metadata:
  name: infrastructure-optimizers
  namespace: control-plane
  labels:
    app.kubernetes.io/name: agent-swarm
    app.kubernetes.io/component: swarm-layer
    app.kubernetes.io/part-of: gitops-control-plane
spec:
  consensusProtocol: "raft"
  agents:
  - type: cost-optimizer
    count: 3
    strategy: "local-hill-climbing"
    feedbackLoop: "30s"
    expertise: ["cost", "efficiency"]
  - type: security-scanner
    count: 2
    strategy: "consensus-validation"
    feedbackLoop: "60s"
    expertise: ["security", "compliance"]
  - type: performance-tuner
    count: 2
    strategy: "feedback-driven"
    feedbackLoop: "45s"
    expertise: ["performance", "reliability"]
  communication:
    protocol: "raft-based"
    heartbeat: "10s"
    consensusTimeout: "30s"
    messageQueue: "consensus-queue"
  emergence:
    type: "collective-intelligence"
    optimization: "local-maxima"
    coordination: "lightweight-consensus"
  scaling:
    autoScaling: true
    minAgents: 2
    maxAgents: 10
    scalingMetric: "consensus-load"
---
# Agent Proposal System for Infrastructure Changes
apiVersion: consensus.gitops.io/v1alpha1
kind: AgentProposal
metadata:
  name: infrastructure-change-proposal
  namespace: control-plane
spec:
  proposal: "Scale EKS node group from 3 to 5 nodes based on CPU utilization"
  proposer: "cost-optimizer-agent"
  requiredVotes: 3
  timeout: "5m"
  voters:
  - "security-agent"
  - "compliance-agent" 
  - "performance-agent"
  changeType: "operational"
  justification: "CPU utilization sustained at 85% for 15 minutes"
  rollbackPlan: "Scale back to 3 nodes if CPU < 50% for 10 minutes"
  approvalRequired: false  # Auto-approved for operational changes
---
# Flux Integration with Agent Consensus
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: consensus-agent-workloads
  namespace: flux-system
spec:
  interval: 1m  # Tight feedback loop
  dependsOn:
  - name: infrastructure-network
  - name: agent-consensus-layer
  path: ./overlay/examples/complete-hub-spoke/agent-workflows
  prune: true
  wait: true
  timeout: 5m
  postBuild:
    substitute:
      CONSENSUS_ENABLED: "true"
      AGENT_QUORUM: "3"
      FEEDBACK_INTERVAL: "30s"
      SWARM_MODE: "distributed"
  sourceRef:
    kind: GitRepository
    name: flux-system
  healthChecks:
  - apiVersion: consensus.gitops.io/v1alpha1
    kind: AgentConsensusConfig
    name: infrastructure-consensus
    namespace: control-plane
