apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: agent-workflows
  namespace: flux-system
resources:
  - agent-consensus-config.yaml
labels:
  - pairs:
      app.kubernetes.io/name: agent-workflows
      app.kubernetes.io/component: consensus-orchestration
      app.kubernetes.io/part-of: gitops-control-plane
      consensus-enabled: "true"
      swarm-intelligence: "true"
configMapGenerator:
- name: agent-workflow-config
  literals:
  - CONSENSUS_PROTOCOL=raft
  - MICRO_FEEDBACK_INTERVAL=30s
  - MESO_CONSENSUS_INTERVAL=5m
  - MACRO_OPTIMIZATION_INTERVAL=1h
  - AGENT_HEARTBEAT=10s
  - CONSENSUS_TIMEOUT=30s
  - SWARM_MODE=distributed
  - LOCAL_OPTIMIZATION=true
  - EMERGENT_BEHAVIOR=enabled
- name: agent-skills-config
  literals:
  - SKILLS_PATH=/opt/skills
  - ENABLE_COST_OPTIMIZER=true
  - ENABLE_SECURITY_VALIDATOR=true
  - ENABLE_PERFORMANCE_TUNER=true
  - ENABLE_COMPLIANCE_CHECKER=true
  - SKILL_EXECUTION_TIMEOUT=10m
patchesStrategicMerge:
- |-
  apiVersion: consensus.gitops.io/v1alpha1
  kind: AgentConsensusConfig
  metadata:
    name: infrastructure-consensus
  spec:
    feedbackLoops:
      micro: $(MICRO_FEEDBACK_INTERVAL)
      meso: $(MESO_CONSENSUS_INTERVAL)
      macro: $(MACRO_OPTIMIZATION_INTERVAL)
    communication:
      heartbeat: $(AGENT_HEARTBEAT)
      consensusTimeout: $(CONSENSUS_TIMEOUT)
