# Patch applied by Flux to the ESO HelmRelease for AKS spokes.
# Replace CLIENT_ID with the Managed Identity client ID.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  values:
    serviceAccount:
      annotations:
        azure.workload.identity/client-id: CLIENT_ID
    podLabels:
      azure.workload.identity/use: "true"
