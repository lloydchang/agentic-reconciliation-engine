# Enhanced TaskSpawner with Consensus
apiVersion: kagent.io/v1alpha1
kind: TaskSpawner
metadata:
  name: consensus-infrastructure-manager
  namespace: control-plane
  labels:
    app: kagent
    component: consensus-taskspawner
spec:
  consensusLayer:
    enabled: true
    protocol: "raft"
    agents: ["cost-optimizer", "security-validator", "performance-monitor"]
  feedbackLoops:
    micro: "30s"
    meso: "5m"
    macro: "1h"
  agentChain:
  - name: local-optimization
    skill: "infrastructure-manager"
    context: "fork"
    decisionScope: "local"
    config:
      optimizationTarget: "local-maxima"
      feedbackInterval: "30s"
      maxConcurrentProposals: 5
      proposalTimeout: "30s"
      retryPolicy:
        maxRetries: 3
        backoffDuration: "10s"
    resources:
      requests:
        memory: "1Gi"
        cpu: "1000m"
      limits:
        memory: "2Gi"
        cpu: "2000m"
  - name: consensus-validation
    skill: "security-compliance"
    decisionScope: "distributed"
    dependsOn: ["local-optimization"]
    config:
      consensusAlgorithm: "raft"
      quorum: "majority"
      timeout: "30s"
      voteWeighting: "expertise-based"
      validationLevel: "strict"
      securityThreshold: 0.8
      operationalThreshold: 0.5
      criticalThreshold: 1.0
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
  - name: global-coordination
    skill: "cost-optimization"
    decisionScope: "emergent"
    dependsOn: ["consensus-validation"]
    config:
      aggregationMethod: "weighted-average"
      optimizationTarget: "global-coherence"
      learningRate: "0.01"
      adaptationThreshold: "0.1"
      swarmSize: 7
      consensusHistory: 100
      predictionModel: "linear-regression"
    resources:
      requests:
        memory: "2Gi"
        cpu: "2000m"
      limits:
        memory: "4Gi"
        cpu: "4000m"
  schedule: "0 */4 * * *"  # Every 4 hours
  concurrencyPolicy:
    allowConcurrent: true
    maxConcurrent: 3
  resources:
    requests:
      memory: "4Gi"
      cpu: "4000m"
    limits:
      memory: "8Gi"
      cpu: "8000m"
  security:
    serviceAccountName: "consensus-taskspawner"
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
  monitoring:
    enabled: true
    prometheus:
      enabled: true
      port: 8080
      path: "/metrics"
    jaeger:
      enabled: true
      endpoint: "http://jaeger-collector:14268/api/traces"
    logLevel: "info"
  persistence:
    enabled: true
    storageClass: "fast-ssd"
    size: "20Gi"
    accessModes:
    - ReadWriteOnce
  networkPolicy:
    enabled: true
    egress:
    - to:
      - namespaceSelector:
          matchLabels:
            name: control-plane
      - namespaceSelector:
          matchLabels:
            name: monitoring
      ports:
      - protocol: TCP
        port: 443
      - protocol: TCP
        port: 53
      - protocol: UDP
        port: 53
    ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: flux-system
      ports:
      - protocol: TCP
        port: 8080
