apiVersion: apps/v1
kind: Deployment
metadata:
  name: kcc-controller
  namespace: configconnector-system
  labels:
    app: kcc-controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kcc-controller
  template:
    metadata:
      labels:
        app: kcc-controller
    spec:
      containers:
      - name: controller
        # TODO: Replace with actual KCC controller image
        image: TODO_KCC_IMAGE:latest
        env:
        # TODO: Add GCP credentials and project
        - name: GOOGLE_CLOUD_PROJECT
          value: TODO_GCP_PROJECT
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/var/secrets/google/key.json"
        volumeMounts:
        - name: gcp-credentials
          mountPath: /var/secrets/google
          readOnly: true
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      serviceAccountName: kcc-controller
      volumes:
      - name: gcp-credentials
        secret:
          secretName: TODO_GCP_SECRETS
---
