# Kagent Monitoring and Observability
# Comprehensive monitoring for agent orchestration

---
# Prometheus ServiceMonitor for Kagent
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kagent-metrics
  namespace: control-plane
  labels:
    app: kagent
    component: monitoring
    release: prometheus
spec:
  selector:
    matchLabels:
      app: kagent
      component: controller
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    honorLabels: true
  namespaceSelector:
    matchNames:
    - kagent-system
    - control-plane

---
# Kagent Metrics Dashboard
apiVersion: v1
kind: ConfigMap
metadata:
  name: kagent-dashboard
  namespace: control-plane
  labels:
    app: kagent
    component: monitoring
    grafana_dashboard: "1"
data:
  kagent-dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Kagent Agent Orchestration",
        "tags": ["kagent", "ai", "orchestration"],
        "timezone": "browser",
        "panels": [
          {
            "title": "TaskSpawner Status",
            "type": "stat",
            "targets": [
              {
                "expr": "sum(kagent_taskspawner_active)",
                "legendFormat": "Active TaskSpawners"
              },
              {
                "expr": "sum(kagent_taskspawner_completed_total)",
                "legendFormat": "Completed Tasks"
              },
              {
                "expr": "sum(kagent_taskspawner_failed_total)",
                "legendFormat": "Failed Tasks"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {"mode": "palette-classic"},
                "custom": {"displayMode": "list", "orientation": "horizontal"},
                "mappings": [],
                "thresholds": {
                  "steps": [
                    {"color": "green", "value": null},
                    {"color": "yellow", "value": 1},
                    {"color": "red", "value": 5}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
          },
          {
            "title": "Agent Chain Execution Time",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.50, rate(kagent_agentchain_duration_seconds_bucket[5m]))",
                "legendFormat": "50th percentile"
              },
              {
                "expr": "histogram_quantile(0.95, rate(kagent_agentchain_duration_seconds_bucket[5m]))",
                "legendFormat": "95th percentile"
              },
              {
                "expr": "histogram_quantile(0.99, rate(kagent_agentchain_duration_seconds_bucket[5m]))",
                "legendFormat": "99th percentile"
              }
            ],
            "yAxes": [{"format": "s"}],
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
          },
          {
            "title": "MCP Server Response Time",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(kagent_mcp_server_request_duration_seconds_sum[5m]) / rate(kagent_mcp_server_request_duration_seconds_count[5m])",
                "legendFormat": "{{server}} - {{tool}}"
              }
            ],
            "yAxes": [{"format": "s"}],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8}
          },
          {
            "title": "Resource Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes{pod=~\"kagent-.*\"}) / 1024 / 1024",
                "legendFormat": "Memory (MB)"
              },
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\"kagent-.*\"}[5m])) * 1000",
                "legendFormat": "CPU (m)"
              }
            ],
            "yAxes": [
              {"format": "short", "label": "Memory (MB)"},
              {"format": "short", "label": "CPU (m)"}
            ],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16}
          }
        ],
        "time": {"from": "now-1h", "to": "now"},
        "refresh": "30s"
      }
    }

---
# Kagent Alert Rules
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kagent-alerts
  namespace: control-plane
  labels:
    app: kagent
    component: monitoring
spec:
  groups:
  - name: kagent.rules
    rules:
    - alert: KagentTaskSpawnerDown
      expr: up{job="kagent-controller"} == 0
      for: 1m
      labels:
        severity: critical
        service: kagent
      annotations:
        summary: "Kagent TaskSpawner is down"
        description: "Kagent TaskSpawner has been down for more than 1 minute."

    - alert: KagentHighFailureRate
      expr: rate(kagent_taskspawner_failed_total[5m]) > 0.1
      for: 2m
      labels:
        severity: warning
        service: kagent
      annotations:
        summary: "High task failure rate"
        description: "TaskSpawner failure rate is {{ $value | humanizePercentage }}."

    - alert: KagentSlowExecution
      expr: histogram_quantile(0.95, rate(kagent_agentchain_duration_seconds_bucket[5m])) > 300
      for: 5m
      labels:
        severity: warning
        service: kagent
      annotations:
        summary: "Slow agent chain execution"
        description: "95th percentile execution time is {{ $value }}s."

    - alert: KagentMCPServerDown
      expr: up{job="kagent-mcp-server"} == 0
      for: 1m
      labels:
        severity: critical
        service: kagent
      annotations:
        summary: "MCP Server is down"
        description: "MCP Server {{ $labels.server }} is down."

    - alert: KagentHighMemoryUsage
      expr: sum(container_memory_usage_bytes{pod=~\"kagent-.*\"}) / sum(container_spec_memory_limit_bytes{pod=~\"kagent-.*\"}) > 0.9
      for: 5m
      labels:
        severity: warning
        service: kagent
      annotations:
        summary: "High memory usage"
        description: "Kagent memory usage is {{ $value | humanizePercentage }}."

    - alert: KagentHighCPUUsage
      expr: sum(rate(container_cpu_usage_seconds_total{pod=~\"kagent-.*\"}[5m])) / sum(container_spec_cpu_quota{pod=~\"kagent-.*\"}) > 0.9
      for: 5m
      labels:
        severity: warning
        service: kagent
      annotations:
        summary: "High CPU usage"
        description: "Kagent CPU usage is {{ $value | humanizePercentage }}."

---
# Kagent Log Collector
apiVersion: v1
kind: ConfigMap
metadata:
  name: kagent-log-config
  namespace: control-plane
  labels:
    app: kagent
    component: monitoring
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Daemon        off
        Parsers_File  parsers.conf
        HTTP_Server   On
        HTTP_Listen   0.0.0.0
        HTTP_Port     2020

    [INPUT]
        Name              tail
        Path              /var/log/containers/*kagent*.log
        Parser            docker
        Tag               kagent.*
        Refresh_Interval  5
        Mem_Buf_Limit     50MB
        Skip_Long_Lines   On

    [FILTER]
        Name                kubernetes
        Match               kagent.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Keep_Log            Off
        K8S-Logging.Parser On
        K8S-Logging.Exclude On

    [OUTPUT]
        Name  forward
        Match kagent.*
        Host  fluentd.monitoring.svc.cluster.local
        Port  24224

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

---
# Kagent Tracing Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: kagent-tracing-config
  namespace: control-plane
  labels:
    app: kagent
    component: monitoring
data:
  tracing.yaml: |
    sampling:
      type: probabilistic
      param: 0.1
    exporter:
      jaeger:
        endpoint: jaeger-collector.monitoring.svc.cluster.local:14250
    service:
      name: kagent
    resource:
      attributes:
        service.name: kagent
        service.version: v0.8.0
        deployment.environment: production

---
# Kagent Health Check
apiVersion: v1
kind: ConfigMap
metadata:
  name: kagent-health-check
  namespace: control-plane
  labels:
    app: kagent
    component: monitoring
data:
  health-check.sh: |
    #!/bin/bash
    set -e
    
    # Check controller health
    echo "Checking Kagent controller health..."
    kubectl get deployment kagent-controller -n kagent-system
    
    # Check TaskSpawners
    echo "Checking TaskSpawners..."
    kubectl get taskspawners -n control-plane
    
    # Check AgentWorkflows
    echo "Checking AgentWorkflows..."
    kubectl get agentworkflows -n control-plane
    
    # Check MCP Registries
    echo "Checking MCP Registries..."
    kubectl get mcpregistries -n control-plane
    
    # Check MCP Servers
    echo "Checking MCP Servers..."
    kubectl get mcpservers -n control-plane
    
    # Check metrics endpoint
    echo "Checking metrics endpoint..."
    kubectl port-forward -n kagent-system svc/kagent-controller 8080:8080 &
    PORT_FORWARD_PID=$!
    sleep 5
    curl -s http://localhost:8080/metrics | head -20
    kill $PORT_FORWARD_PID
    
    echo "Health check completed successfully!"

---
# Kagent Performance Dashboard
apiVersion: v1
kind: ConfigMap
metadata:
  name: kagent-performance-dashboard
  namespace: control-plane
  labels:
    app: kagent
    component: monitoring
    grafana_dashboard: "1"
data:
  kagent-performance.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Kagent Performance Analysis",
        "tags": ["kagent", "performance", "ai"],
        "timezone": "browser",
        "panels": [
          {
            "title": "Task Execution Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(kagent_taskspawner_completed_total[5m])",
                "legendFormat": "Completed/sec"
              },
              {
                "expr": "rate(kagent_taskspawner_failed_total[5m])",
                "legendFormat": "Failed/sec"
              }
            ],
            "yAxes": [{"format": "ops"}],
            "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0}
          },
          {
            "title": "Agent Chain Success Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(kagent_agentchain_completed_total[5m]) / (rate(kagent_agentchain_completed_total[5m]) + rate(kagent_agentchain_failed_total[5m]))",
                "legendFormat": "Success Rate"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "thresholds": {
                  "steps": [
                    {"color": "red", "value": 0},
                    {"color": "yellow", "value": 0.9},
                    {"color": "green", "value": 0.95}
                  ]
                }
              }
            },
            "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0}
          },
          {
            "title": "MCP Tool Usage",
            "type": "piechart",
            "targets": [
              {
                "expr": "sum by (tool) (rate(kagent_mcp_tool_calls_total[5m]))",
                "legendFormat": "{{tool}}"
              }
            ],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 8}
          },
          {
            "title": "Resource Efficiency",
            "type": "graph",
            "targets": [
              {
                "expr": "sum(container_memory_usage_bytes{pod=~\"kagent-.*\"}) / sum(kagent_taskspawner_completed_total)",
                "legendFormat": "Memory per Task"
              },
              {
                "expr": "sum(rate(container_cpu_usage_seconds_total{pod=~\"kagent-.*\"}[5m])) / sum(rate(kagent_taskspawner_completed_total[5m]))",
                "legendFormat": "CPU per Task"
              }
            ],
            "gridPos": {"h": 8, "w": 24, "x": 0, "y": 16}
          }
        ],
        "time": {"from": "now-1h", "to": "now"},
        "refresh": "30s"
      }
    }
