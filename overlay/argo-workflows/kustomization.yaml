apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: argo-workflows-overlay
  namespace: argo-workflows

resources:
# Core Argo Workflows resources
- base/argo-workflows-install.yaml
- base/workflow-controller-configmap.yaml

# Qwen LLM Integration - Using Centralized Service
# Removed separate Qwen deployment - now using agent-memory-rust
# Service: agent-memory-service.ai-infrastructure.svc.cluster.local:8080
# Metrics: agent-memory-service.ai-infrastructure.svc.cluster.local:9090

# Workflow Examples and Templates
- examples/basic-workflows.yaml
- examples/ci-cd-workflows.yaml

# Monitoring and Observability
- base/monitoring/prometheus-config.yaml
- base/monitoring/grafana-dashboard.yaml

# Security and RBAC
- security/rbac.yaml
- security/network-policies.yaml

# Configurations
- configurations/workflow-controller-config.yaml

patchesStrategicMerge:
# Development environment patches
- patches/dev/controller-resources.yaml

# Production environment patches  
- patches/prod/controller-resources.yaml

configurations:
- configurations/configmap-transformer.yaml

commonLabels:
  app.kubernetes.io/name: argo-workflows
  app.kubernetes.io/component: workflows
  app.kubernetes.io/part-of: agentic-reconciliation-engine

commonAnnotations:
  argo-workflows/version: "v3.5.0"
  agentic-reconciliation-engine/managed: "true"
  qwen-llm/integrated: "true"
  qwen-centralized: "true"

vars:
- name: ARGOWF_NAMESPACE
  objref:
    kind: ConfigMap
    name: workflow-controller-configmap
    fieldref:
      fieldpath: data.namespace
- name: QWEN_SERVICE_URL
  objref:
    kind: Service
    name: agent-memory-service
    namespace: ai-infrastructure
    fieldref:
      fieldpath: metadata.name

replicas:
- name: argo-workflows-controller
  count: 1

images:
- name: argo-workflows-controller
  newTag: v3.5.0
- name: python
  newTag: 3.9-alpine

namespace: argo-workflows
