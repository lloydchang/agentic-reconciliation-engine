apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: argo-workflows-overlay
  namespace: argo-workflows

resources:
# Core Argo Workflows resources
- base/argo-workflows-install.yaml

# Workflow Examples and Templates (if they exist)
# - examples/basic-workflows.yaml
# - examples/ci-cd-workflows.yaml

# Monitoring and Observability (if they exist)
# - base/monitoring/prometheus-config.yaml
# - base/monitoring/grafana-dashboard.yaml

# Security and RBAC (if they exist)
# - security/rbac.yaml
# - security/network-policies.yaml

# Configurations
# - configurations/workflow-controller-config.yaml

# Patches (commented out as files don't exist yet)
# - path: patches/dev/controller-resources.yaml
# - path: patches/prod/controller-resources.yaml

# Configurations (commented out as files don't exist yet)
# - configurations/configmap-transformer.yaml

labels:
- pairs:
    app.kubernetes.io/name: argo-workflows
    app.kubernetes.io/component: workflows
    app.kubernetes.io/part-of: agentic-reconciliation-engine

commonAnnotations:
  argo-workflows/version: "v3.5.0"
  agentic-reconciliation-engine/managed: "true"
  qwen-llm/integrated: "true"
  qwen-centralized: "true"

# Variables simplified to avoid field reference errors
# ARGOWF_NAMESPACE and QWEN_SERVICE_URL will be set directly in ConfigMaps

replicas:
- name: argo-workflows-controller
  count: 1

images:
- name: argo-workflows-controller
  newTag: v3.5.0
- name: python
  newTag: 3.9-alpine

namespace: argo-workflows
