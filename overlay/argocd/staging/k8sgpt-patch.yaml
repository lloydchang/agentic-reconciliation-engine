apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgpt
  namespace: k8sgpt-system
spec:
  template:
    spec:
      containers:
      - name: k8sgpt
        resources:
          limits:
            cpu: 1500m
            memory: 1.5Gi
          requests:
            cpu: 750m
            memory: 768Mi
        env:
        - name: K8SGPT_LOG_LEVEL
          value: "info"
        - name: K8SGPT_BACKEND
          value: "localai"
        - name: K8SGPT_CACHE_TTL
          value: "12h"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-localai
  namespace: k8sgpt-system
spec:
  template:
    spec:
      containers:
      - name: localai
        resources:
          limits:
            cpu: 3000m
            memory: 12Gi
          requests:
            cpu: 1500m
            memory: 6Gi
        env:
        - name: LOCALAI_DEBUG
          value: "false"
        - name: THREADS
          value: "4"
        - name: GPU_LAYERS
          value: "20"
