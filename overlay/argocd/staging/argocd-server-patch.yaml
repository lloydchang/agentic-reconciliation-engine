apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd-staging
spec:
  template:
    spec:
      containers:
      - name: argocd-server
        resources:
          limits:
            cpu: 1000m
            memory: 1Gi
          requests:
            cpu: 500m
            memory: 512Mi
        env:
        - name: ARGOCD_SERVER_INSECURE
          value: "true"
        - name: ARGOCD_SERVER_LOGLEVEL
          value: "info"
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd-staging
spec:
  type: NodePort
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
    nodePort: 30080
  - name: https
    port: 443
    targetPort: 8080
    protocol: TCP
    nodePort: 30443
