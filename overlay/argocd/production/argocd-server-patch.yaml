apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
  namespace: argocd-prod
spec:
  template:
    spec:
      containers:
      - name: argocd-server
        resources:
          limits:
            cpu: 2000m
            memory: 2Gi
          requests:
            cpu: 1000m
            memory: 1Gi
        env:
        - name: ARGOCD_SERVER_INSECURE
          value: "false"
        - name: ARGOCD_SERVER_LOGLEVEL
          value: "info"
        - name: ARGOCD_SERVER_GRPC_WEB
          value: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-server
  namespace: argocd-prod
spec:
  type: LoadBalancer
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8080
    protocol: TCP
