apiVersion: v1
kind: NetworkPolicy
metadata:
  name: argocd-deny-all-ingress
  namespace: argocd-prod
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: v1
kind: NetworkPolicy
metadata:
  name: argocd-allow-ingress
  namespace: argocd-prod
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: argocd
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8080
    - protocol: TCP
      port: 8083
    - protocol: TCP
      port: 8084
---
apiVersion: v1
kind: NetworkPolicy
metadata:
  name: k8sgpt-deny-all-ingress
  namespace: k8sgpt-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: v1
kind: NetworkPolicy
metadata:
  name: k8sgpt-allow-ingress
  namespace: k8sgpt-system
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: k8sgpt
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: argocd-prod
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8080
---
apiVersion: v1
kind: PodSecurityPolicy
metadata:
  name: argocd-psp
  namespace: argocd-prod
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argocd-server-hpa
  namespace: argocd-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argocd-server
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: k8sgpt-hpa
  namespace: k8sgpt-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: k8sgpt
  minReplicas: 2
  maxReplicas: 4
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
