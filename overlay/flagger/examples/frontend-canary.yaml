---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: example-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        version: v1
    spec:
      containers:
      - name: frontend
        image: ghcr.io/fluxcd/flagger-loadtester:0.26.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: frontend

---
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: example-app
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  service:
    port: 80
    targetPort: http
    portName: http
    meshName: istio
  analysis:
    interval: 10s
    threshold: 99
    iterations: 10
    metrics:
    - name: request-success-rate
      threshold: 99
      interval: 1m
      query: |
        sum(rate(http_server_requests_total{namespace!="{{ namespace }}",status!~"5.."}[2m])) / 
        sum(rate(http_server_requests_total{namespace="{{ namespace }}"}[2m]))
    - name: request-duration
      threshold: 500
      interval: 1m
      query: |
        histogram_quantile(0.99, 
          sum(rate(http_request_duration_seconds_bucket{namespace="{{ namespace }}"}[2m])) by (le))
    webhooks:
    - name: load-test
      url: http://flagger-loadtester.flagger-system/
      timeout: 30s
      metadata:
        cmd: "hey -z 1m -q 10 -c 2 http://frontend.default/"
        expected_status: "200"
  canarySteps:
  - setWeight: 10
  - pause:
      duration: 1m
  - setWeight: 20
  - pause:
      duration: 1m
  - setWeight: 30
  - pause:
      duration: 1m
  - setWeight: 50
  - pause:
      duration: 1m
  - setWeight: 100

---
# Istio VirtualService for traffic routing
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
spec:
  hosts:
  - frontend
  gateways:
  - istio-system/public-gateway
  http:
  - route:
    - destination:
        host: frontend
        subset: primary
      weight: 100
    - destination:
        host: frontend
        subset: canary
      weight: 0

---
# Istio DestinationRule for subset routing
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: frontend
  namespace: default
  labels:
    app: frontend
    app.kubernetes.io/name: frontend
spec:
  host: frontend
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 50
        maxRequestsPerConnection: 10
    loadBalancer:
      simple: LEAST_CONN
  subsets:
  - name: primary
    labels:
      app: frontend
      version: v1
  - name: canary
    labels:
      app: frontend
      version: v2
