---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-service
  namespace: default
  labels:
    app: backend-service
    app.kubernetes.io/name: backend-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: example-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-service
  template:
    metadata:
      labels:
        app: backend-service
        version: v1
    spec:
      containers:
      - name: backend
        image: ghcr.io/fluxcd/flagger-loadtester:0.26.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 9000
          name: http
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:5432/backend"
        - name: REDIS_URL
          value: "redis://redis:6379"

---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: default
  labels:
    app: backend-service
    app.kubernetes.io/name: backend-service
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: backend-service

---
apiVersion: flagger.app/v1beta1
kind: Canary
metadata:
  name: backend-service
  namespace: default
  labels:
    app: backend-service
    app.kubernetes.io/name: backend-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: example-app
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend-service
  service:
    port: 80
    targetPort: http
    portName: http
    meshName: istio
  progressDeadlineSeconds: 600
  analysis:
    interval: 15s
    threshold: 99
    metrics:
    - name: request-success-rate
      threshold: 99
      interval: 1m
      query: |
        sum(rate(http_server_requests_total{namespace!="{{ namespace }}",status!~"5.."}[2m])) / 
        sum(rate(http_server_requests_total{namespace="{{ namespace }}"}[2m]))
    - name: request-duration
      threshold: 300
      interval: 1m
      query: |
        histogram_quantile(0.99, 
          sum(rate(http_request_duration_seconds_bucket{namespace="{{ namespace }}"}[2m])) by (le))
    - name: database-connections
      threshold: 50
      interval: 30s
      query: |
        sum(database_connections_active{namespace="{{ namespace }}"})
    webhooks:
    - name: database-migration-test
      url: http://migration-service.default/
      timeout: 120s
      metadata:
        endpoint: "/test/migration"
        expected_result: "success"
    - name: load-test
      url: http://flagger-loadtester.flagger-system/
      timeout: 60s
      metadata:
        cmd: "hey -z 5m -q 20 -c 5 http://backend-service.default/health"
        expected_status: "200"

---
# Istio VirtualService for Blue/Green deployment
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: backend-service
  namespace: default
  labels:
    app: backend-service
    app.kubernetes.io/name: backend-service
spec:
  hosts:
  - backend-service
  gateways:
  - istio-system/public-gateway
  http:
  - route:
    - destination:
        host: backend-service
        subset: primary
      weight: 100

---
# Istio DestinationRule for Blue/Green subsets
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: backend-service
  namespace: default
  labels:
    app: backend-service
    app.kubernetes.io/name: backend-service
spec:
  host: backend-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 300
      http:
        http1MaxPendingRequests: 150
        maxRequestsPerConnection: 30
    loadBalancer:
      simple: ROUND_ROBIN
    circuitBreaker:
      consecutiveErrors: 3
      interval: 30s
      baseEjectionTime: 30s
  subsets:
  - name: primary
    labels:
      app: backend-service
      version: v1
  - name: canary
    labels:
      app: backend-service
      version: v2
