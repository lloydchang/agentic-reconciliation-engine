apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: flagger-overlay
  namespace: flagger-system

resources:
- flagger-install.yaml
- flagger-config.yaml
- monitoring/
- examples/

commonLabels:
  app.kubernetes.io/name: flagger
  app.kubernetes.io/component: progressive-delivery
  app.kubernetes.io/part-of: gitops-infra-control-plane

commonAnnotations:
  docs.flagger.app/overview: "Progressive delivery automation with Flagger"
  docs.flagger.ai/integration: "AI-powered progressive delivery automation"
  docs.kubernetes.io/category: "delivery"
  docs.gitops.io/automated: "true"

patchesStrategicMerge:
- patches/flagger-config-patch.yaml
- patches/monitoring-patch.yaml

configurations:
- transforms/flagger-transform.yaml

vars:
- name: FLAGGER_NAMESPACE
  objref:
    kind: Namespace
    name: flagger-system
  fieldref:
    fieldpath: metadata.name

- name: FLAGGER_VERSION
  objref:
    kind: Deployment
    name: flagger
    apiVersion: apps/v1
  fieldref:
    fieldpath: spec.template.spec.containers[0].image

images:
- name: flagger
  newTag: "v1.34.0"

replicas:
- name: flagger
  count: 1

resources:
- path: flagger
  kind: Deployment
  patch: |
    - op: replace
      path: /spec/template/spec/containers/0/resources
      value:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
