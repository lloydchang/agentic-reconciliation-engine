---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: flagger
  namespace: flagger-system
spec:
  interval: 1h
  url: https://flagger.app

---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: flagger
  namespace: flagger-system
spec:
  interval: 5m
  chart:
    spec:
      chart: flagger
      version: "1.34.0"
      sourceRef:
        kind: HelmRepository
        name: flagger
        namespace: flagger-system
  values:
    meshProvider: istio
    crds:
      install: true
    logLevel: info
    namespace: flagger-system
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
    metrics:
      enabled: true
      port: 8080
      serviceMonitor:
        enabled: true
        namespace: monitoring
        interval: 30s
    webhook:
      enabled: true
      timeout: 30s
  install:
    crds: true
    remediation:
      retries: 3
  upgrade:
    crds: true
    remediation:
      retries: 3
  test:
    enable: true
