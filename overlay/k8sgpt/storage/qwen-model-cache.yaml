apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen-model-cache
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: qwen-server
    app.kubernetes.io/version: v1.0.0
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: fast-ssd  # Use appropriate storage class
  resources:
    requests:
      storage: 50Gi  # Adjust based on model size
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: k8sgpt-analysis-storage
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: analyzer
    app.kubernetes.io/version: v1.0.0
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi  # For analysis results and cache
