apiVersion: v1
kind: Service
metadata:
  name: k8sgpt-analyzer
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: analyzer
    app.kubernetes.io/version: v1.0.0
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: analysis
    port: 8081
    targetPort: 8081
    protocol: TCP
  selector:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: analyzer
---
apiVersion: v1
kind: Service
metadata:
  name: qwen-server
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: qwen-server
    app.kubernetes.io/version: v1.0.0
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 8000
    targetPort: 8000
    protocol: TCP
  selector:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: qwen-server
---
apiVersion: v1
kind: Service
metadata:
  name: k8sgpt-analyzer-headless
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: analyzer
    app.kubernetes.io/version: v1.0.0
spec:
  type: ClusterIP
  clusterIP: None
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  selector:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: analyzer
