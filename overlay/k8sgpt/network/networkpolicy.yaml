apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: k8sgpt-analyzer
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: analyzer
    app.kubernetes.io/version: v1.0.0
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: k8sgpt
      app.kubernetes.io/component: analyzer
  policyTypes:
  - Egress
  egress:
  # Allow DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  
  # Allow communication with Qwen server
  - to:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: k8sgpt
          app.kubernetes.io/component: qwen-server
    ports:
    - protocol: TCP
      port: 8000
  
  # Allow communication with Kubernetes API
  - to: []
    ports:
    - protocol: TCP
      port: 443
  
  # Allow communication with monitoring systems
  - to: []
    ports:
    - protocol: TCP
      port: 9090  # Prometheus
    - protocol: TCP
      port: 3000  # Grafana
  
  # Allow outbound HTTPS for model downloads (if needed)
  - to: []
    ports:
    - protocol: TCP
      port: 443
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: qwen-server
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: qwen-server
    app.kubernetes.io/version: v1.0.0
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: k8sgpt
      app.kubernetes.io/component: qwen-server
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow K8sGPT analyzer to connect
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: k8sgpt
          app.kubernetes.io/component: analyzer
    ports:
    - protocol: TCP
      port: 8000
  
  # Allow monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 8000
    - protocol: TCP
      port: 8080  # Metrics
  
  egress:
  # Allow DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  
  # Allow outbound HTTPS for model downloads
  - to: []
    ports:
    - protocol: TCP
      port: 443
  
  # Allow outbound HTTP for model downloads
  - to: []
    ports:
    - protocol: TCP
      port: 80
