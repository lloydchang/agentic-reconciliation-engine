apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: pipecd-control-plane
  namespace: pipecd

resources:
  - control-plane.yaml

commonLabels:
  app.kubernetes.io/name: pipecd
  app.kubernetes.io/component: control-plane
  app.kubernetes.io/part-of: gitops-infra-control-plane

commonAnnotations:
  pipecd.dev/version: "v0.47.0"
  gitops-infra-control-plane/managed: "true"

configurations:
  - kustomizeconfig.yaml

patchesStrategicMerge:
  - patches/server-config.yaml
  - patches/gateway-config.yaml

vars:
  - name: PIPECD_NAMESPACE
    objref:
      kind: Namespace
      name: pipecd
      apiVersion: v1
    fieldref:
      fieldpath: metadata.name
