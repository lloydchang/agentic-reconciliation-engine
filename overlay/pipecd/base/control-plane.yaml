apiVersion: v1
kind: Namespace
metadata:
  name: pipecd
  labels:
    name: pipecd
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: control-plane
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipecd-server
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pipecd
      app.kubernetes.io/component: server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pipecd
        app.kubernetes.io/component: server
    spec:
      containers:
      - name: server
        image: ghcr.io/pipe-cd/pipecd:v0.47.0
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9080
          name: grpc
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: DATASTORE_DATABASE_TYPE
          value: "mysql"
        - name: DATASTORE_DATABASE_URL
          value: "mysql:tcp(mysql:3306)/pipecd?parseTime=true"
        - name: DATASTORE_DATABASE_USERNAME
          value: "pipecd"
        - name: DATASTORE_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pipecd-db-secret
              key: password
        - name: CACHE_ADDRESS
          value: "cache:6379"
        - name: MINIO_ENDPOINT
          value: "minio:9000"
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: pipecd-minio-secret
              key: access-key
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: pipecd-minio-secret
              key: secret-key
        - name: MINIO_BUCKET
          value: "pipecd"
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipecd-cache
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pipecd
      app.kubernetes.io/component: cache
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pipecd
        app.kubernetes.io/component: cache
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipecd-minio
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: minio
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pipecd
      app.kubernetes.io/component: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pipecd
        app.kubernetes.io/component: minio
    spec:
      containers:
      - name: minio
        image: minio/minio:latest
        args:
        - server
        - /data
        - --console-address
        - :9001
        ports:
        - containerPort: 9000
          name: api
        - containerPort: 9001
          name: console
        env:
        - name: MINIO_ROOT_USER
          value: "pipecd"
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pipecd-minio-secret
              key: root-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: pipecd-minio-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipecd-mysql
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pipecd
      app.kubernetes.io/component: mysql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pipecd
        app.kubernetes.io/component: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
        env:
        - name: MYSQL_DATABASE
          value: "pipecd"
        - name: MYSQL_USER
          value: "pipecd"
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pipecd-db-secret
              key: password
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pipecd-db-secret
              key: root-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "400m"
        volumeMounts:
        - name: data
          mountPath: /var/lib/mysql
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: pipecd-mysql-pvc
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipecd-gateway
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pipecd
      app.kubernetes.io/component: gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pipecd
        app.kubernetes.io/component: gateway
    spec:
      containers:
      - name: gateway
        image: ghcr.io/pipe-cd/pipecd:v0.47.0
        command: ["/pipecd"]
        args: ["gateway"]
        ports:
        - containerPort: 8080
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: SERVER_ADDRESS
          value: "pipecd-server:9080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipecd-ops
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: ops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pipecd
      app.kubernetes.io/component: ops
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pipecd
        app.kubernetes.io/component: ops
    spec:
      containers:
      - name: ops
        image: ghcr.io/pipe-cd/pipecd:v0.47.0
        command: ["/pipecd"]
        args: ["ops"]
        ports:
        - containerPort: 9081
        env:
        - name: LOG_LEVEL
          value: "info"
        - name: SERVER_ADDRESS
          value: "pipecd-server:9080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: pipecd
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: gateway
spec:
  selector:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: gateway
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: pipecd-server
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: server
spec:
  selector:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: server
  ports:
  - port: 9080
    targetPort: 9080
    name: grpc
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: pipecd-ops
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: ops
spec:
  selector:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: ops
  ports:
  - port: 9081
    targetPort: 9081
    name: grpc
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: cache
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: cache
spec:
  selector:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: cache
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: mysql
spec:
  selector:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: mysql
  ports:
  - port: 3306
    targetPort: 3306
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: pipecd
  labels:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: minio
spec:
  selector:
    app.kubernetes.io/name: pipecd
    app.kubernetes.io/component: minio
  ports:
  - port: 9000
    targetPort: 9000
    name: api
  - port: 9001
    targetPort: 9001
    name: console
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pipecd-mysql-pvc
  namespace: pipecd
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: pipecd-minio-pvc
  namespace: pipecd
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 8Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: pipecd-db-secret
  namespace: pipecd
type: Opaque
data:
  password: cGlwZWNkLXBhc3N3b3Jk  # pipecd-password
  root-password: cGlwZWNkLXJvb3QtcGFzc3dvcmQ=  # pipecd-root-password
---
apiVersion: v1
kind: Secret
metadata:
  name: pipecd-minio-secret
  namespace: pipecd
type: Opaque
data:
  access-key: cGlwZWNkLWFjY2Vzcy1rZXk=  # pipecd-access-key
  secret-key: cGlwZWNkLXNlY3JldC1rZXk=  # pipecd-secret-key
  root-password: cGlwZWNkLXJvb3QtcGFzc3dvcmQ=  # pipecd-root-password
