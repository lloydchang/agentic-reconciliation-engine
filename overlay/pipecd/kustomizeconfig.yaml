apiVersion: kustomize.config.k8s.io/v1beta1
kind: KustomizationConfig

nameReference:
  - kind: Namespace
    fieldSpecs:
      - path: metadata/name
        kind: Deployment
      - path: metadata/name
        kind: Service
      - path: metadata/name
        kind: Secret
      - path: metadata/name
        kind: PersistentVolumeClaim
      - path: metadata/name
        kind: ConfigMap

namespace:
  - kind: Deployment
    fieldSpecs:
      - path: metadata/namespace
      - path: spec/template/metadata/namespace
  - kind: Service
    fieldSpecs:
      - path: metadata/namespace
  - kind: Secret
    fieldSpecs:
      - path: metadata/namespace
  - kind: PersistentVolumeClaim
    fieldSpecs:
      - path: metadata/namespace
  - kind: ConfigMap
    fieldSpecs:
      - path: metadata/namespace

commonAnnotations:
  - path: metadata/annotations
    create: true

commonLabels:
  - path: metadata/labels
    create: true

images:
  - path: spec/template/spec/containers/image
    kind: Deployment
    name: qwen-llm-service
    newTag: qwen2.5-72b-instruct
  - path: spec/template/spec/containers/image
    kind: Deployment
    name: pipecd-server
    newTag: v0.47.0
  - path: spec/template/spec/containers/image
    kind: Deployment
    name: k8sgpt-analyzer
    newTag: latest
