apiVersion: v1
kind: Namespace
metadata:
  name: qwen-ai
  labels:
    name: qwen-ai
    app.kubernetes.io/name: qwen-ai
    app.kubernetes.io/component: llm-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwen-llm-service
  namespace: qwen-ai
  labels:
    app.kubernetes.io/name: qwen-llm-service
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: agentic-reconciliation-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen-llm-service
      app.kubernetes.io/component: inference
  template:
    metadata:
      labels:
        app.kubernetes.io/name: qwen-llm-service
        app.kubernetes.io/component: inference
        app.kubernetes.io/part-of: agentic-reconciliation-engine
    spec:
      containers:
      - name: qwen-llm
        image: qwen/qwen2.5-72b-instruct:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: MODEL_NAME
          value: "qwen2.5-72b-instruct"
        - name: MODEL_PATH
          value: "/models/qwen2.5-72b-instruct"
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        - name: MAX_TOKENS
          value: "4096"
        - name: TEMPERATURE
          value: "0.7"
        - name: TOP_P
          value: "0.8"
        - name: ENABLE_LOGGING
          value: "true"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "16Gi"
            cpu: "4"
            ephemeral-storage: "10Gi"
          limits:
            memory: "32Gi"
            cpu: "8"
            ephemeral-storage: "50Gi"
            nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 300
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: model-cache
          mountPath: /models
          readOnly: false
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: qwen-model-cache-pvc
      - name: tmp
        emptyDir:
          sizeLimit: "5Gi"
      nodeSelector:
        kubernetes.io/arch: amd64
        accelerator: nvidia-tesla-v100
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: qwen-llm-service
  namespace: qwen-ai
  labels:
    app.kubernetes.io/name: qwen-llm-service
    app.kubernetes.io/component: inference
    app.kubernetes.io/part-of: agentic-reconciliation-engine
spec:
  selector:
    app.kubernetes.io/name: qwen-llm-service
    app.kubernetes.io/component: inference
  ports:
  - port: 8080
    targetPort: 8080
    name: http
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qwen-model-cache-pvc
  namespace: qwen-ai
  labels:
    app.kubernetes.io/name: qwen-llm-service
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen-config
  namespace: qwen-ai
  labels:
    app.kubernetes.io/name: qwen-llm-service
    app.kubernetes.io/component: config
data:
  config.yaml: |
    model:
      name: "qwen2.5-72b-instruct"
      path: "/models/qwen2.5-72b-instruct"
      max_tokens: 4096
      temperature: 0.7
      top_p: 0.8
      repetition_penalty: 1.1
    server:
      host: "0.0.0.0"
      port: 8080
      workers: 4
      timeout: 300
    logging:
      level: "info"
      format: "json"
      enable_request_logging: true
      enable_response_logging: true
    monitoring:
      enable_metrics: true
      metrics_port: 9090
      enable_tracing: true
      jaeger_endpoint: "http://jaeger.monitoring.svc.cluster.local:14268/api/traces"
---
apiVersion: v1
kind: Secret
metadata:
  name: qwen-api-key
  namespace: qwen-ai
  labels:
    app.kubernetes.io/name: qwen-llm-service
    app.kubernetes.io/component: secret
type: Opaque
data:
  api-key: cXdlbi1hcGkta2V5LXRlbXBvcmFyeQ==  # qwen-api-key-temporary
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: qwen-llm-service-pdb
  namespace: qwen-ai
  labels:
    app.kubernetes.io/name: qwen-llm-service
    app.kubernetes.io/component: pdb
spec:
  minAvailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: qwen-llm-service
      app.kubernetes.io/component: inference
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: qwen-llm-service-hpa
  namespace: qwen-ai
  labels:
    app.kubernetes.io/name: qwen-llm-service
    app.kubernetes.io/component: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: qwen-llm-service
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
