apiVersion: v1
kind: ConfigMap
metadata:
  name: k8sgpt-config
  namespace: pipecd
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: agentic-reconciliation-engine
data:
  config.yaml: |
    ai:
      provider: qwen
      model: qwen2.5-72b-instruct
      endpoint: http://qwen-llm-service.qwen-ai.svc.cluster.local:8080
      apikey: "${QWEN_API_KEY}"
      max_tokens: 4096
      temperature: 0.7
      top_p: 0.8
      timeout: 300
    analysis:
      enable_deployment_analysis: true
      enable_performance_monitoring: true
      enable_security_analysis: true
      enable_cost_optimization: true
      enable_resource_optimization: true
      enable_compliance_analysis: true
      deployment_analysis_interval: "5m"
      performance_analysis_interval: "10m"
      security_analysis_interval: "15m"
    filters:
      exclude_namespaces:
        - kube-system
        - kube-public
        - kube-node-lease
        - istio-system
        - monitoring
      include_namespaces:
        - default
        - production
        - staging
        - development
      exclude_labels:
        - app.kubernetes.io/managed-by: Helm
      include_resources:
        - deployments
        - services
        - configmaps
        - secrets
        - statefulsets
        - daemonsets
        - ingress
        - persistentvolumes
        - persistentvolumeclaims
      exclude_resources:
        - events
        - endpoints
    sinks:
      prometheus:
        enabled: true
        address: http://prometheus.monitoring.svc.cluster.local:9090
        metrics_path: /api/v1/query
        scrape_interval: "30s"
      grafana:
        enabled: true
        address: http://grafana.monitoring.svc.cluster.local:3000
        api_key: "${GRAFANA_API_KEY}"
        dashboard_prefix: "k8sgpt"
      elasticsearch:
        enabled: false
        address: http://elasticsearch.monitoring.svc.cluster.local:9200
        index_pattern: "k8sgpt-*"
      slack:
        enabled: false
        webhook_url: "${SLACK_WEBHOOK_URL}"
        channel: "#k8sgpt-alerts"
    alerts:
      enabled: true
      severity_levels:
        - critical
        - warning
        - info
      alert_rules:
        - name: high_error_rate
          condition: "error_rate > 0.05"
          severity: "critical"
          message: "High error rate detected in deployment"
        - name: resource_exhaustion
          condition: "cpu_usage > 0.9 or memory_usage > 0.9"
          severity: "warning"
          message: "Resource exhaustion detected"
        - name: security_vulnerability
          condition: "security_score < 0.7"
          severity: "critical"
          message: "Security vulnerabilities detected"
    insights:
      enabled: true
      retention_days: 30
      max_insights_per_analysis: 100
      insight_categories:
        - deployment
        - performance
        - security
        - cost
        - compliance
        - reliability
    notifications:
      enabled: true
      channels:
        - type: webhook
          url: "${WEBHOOK_URL}"
          events:
            - deployment_failure
            - performance_degradation
            - security_issue
            - cost_spike
---
apiVersion: v1
kind: Secret
metadata:
  name: k8sgpt-secrets
  namespace: pipecd
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: secret
type: Opaque
data:
  qwen-api-key: cXdlbi1hcGkta2V5LXRlbXBvcmFyeQ==  # qwen-api-key-temporary
  grafana-api-key: Z3JhZmFuYS1hcGkta2V5LXRlbXBvcmFyeQ==  # grafana-api-key-temporary
  slack-webhook-url: aHR0cHM6Ly9ob29rcy5zbGFjay5jb20vc2VydmljZXMv  # slack-webhook-temporary
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgpt-analyzer
  namespace: pipecd
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: analyzer
    app.kubernetes.io/part-of: agentic-reconciliation-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: k8sgpt
      app.kubernetes.io/component: analyzer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8sgpt
        app.kubernetes.io/component: analyzer
        app.kubernetes.io/part-of: agentic-reconciliation-engine
    spec:
      containers:
      - name: k8sgpt
        image: ghcr.io/k8sgpt-ai/k8sgpt:latest
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: ["-c", "while true; do k8sgpt analyze --output json --provider=qwen --model=qwen2.5-72b-instruct --endpoint=http://qwen-llm-service.qwen-ai.svc.cluster.local:8080 --filter=deployment --filter=service --exclude=kube-system --exclude=monitoring --explain --output-dir=/tmp/k8sgpt-output; sleep 300; done"]
        env:
        - name: QWEN_API_KEY
          valueFrom:
            secretKeyRef:
              name: k8sgpt-secrets
              key: qwen-api-key
        - name: GRAFANA_API_KEY
          valueFrom:
            secretKeyRef:
              name: k8sgpt-secrets
              key: grafana-api-key
        - name: K8SGPT_CONFIG_PATH
          value: "/etc/k8sgpt/config.yaml"
        volumeMounts:
        - name: config
          mountPath: /etc/k8sgpt
          readOnly: true
        - name: output
          mountPath: /tmp/k8sgpt-output
        - name: cache
          mountPath: /tmp/k8sgpt-cache
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "ps aux | grep k8sgpt | grep -v grep || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 60
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "test -f /tmp/k8sgpt-output/last_analysis.json || exit 1"
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: k8sgpt-config
      - name: output
        emptyDir:
          sizeLimit: "1Gi"
      - name: cache
        emptyDir:
          sizeLimit: "512Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8sgpt-webhook
  namespace: pipecd
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: webhook
    app.kubernetes.io/part-of: agentic-reconciliation-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: k8sgpt
      app.kubernetes.io/component: webhook
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k8sgpt
        app.kubernetes.io/component: webhook
        app.kubernetes.io/part-of: agentic-reconciliation-engine
    spec:
      containers:
      - name: webhook
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh"]
        args: ["-c", "pip install fastapi uvicorn && python /app/webhook.py"]
        env:
        - name: QWEN_API_KEY
          valueFrom:
            secretKeyRef:
              name: k8sgpt-secrets
              key: qwen-api-key
        - name: QWEN_ENDPOINT
          value: "http://qwen-llm-service.qwen-ai.svc.cluster.local:8080"
        volumeMounts:
        - name: webhook-script
          mountPath: /app
          readOnly: true
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: webhook-script
        configMap:
          name: k8sgpt-webhook-script
---
apiVersion: v1
kind: Service
metadata:
  name: k8sgpt-webhook
  namespace: pipecd
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: webhook
spec:
  selector:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: webhook
  ports:
  - port: 8000
    targetPort: 8000
    name: http
    protocol: TCP
  type: ClusterIP
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k8sgpt-webhook-script
  namespace: pipecd
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: webhook-script
data:
  webhook.py: |
    from fastapi import FastAPI, HTTPException
    from pydantic import BaseModel
    import httpx
    import os
    import json
    import logging
    
    app = FastAPI(title="K8sGPT Webhook", version="1.0.0")
    
    # Configure logging
    logging.basicConfig(level=logging.INFO)
    logger = logging.getLogger(__name__)
    
    # Configuration
    QWEN_API_KEY = os.getenv("QWEN_API_KEY")
    QWEN_ENDPOINT = os.getenv("QWEN_ENDPOINT", "http://qwen-llm-service.qwen-ai.svc.cluster.local:8080")
    
    class AnalysisRequest(BaseModel):
        deployment_data: dict
        analysis_type: str = "deployment"
    
    class AnalysisResponse(BaseModel):
        insights: list
        recommendations: list
        risk_score: float
    
    async def call_qwen(prompt: str) -> str:
        """Call Qwen LLM for analysis"""
        headers = {
            "Authorization": f"Bearer {QWEN_API_KEY}",
            "Content-Type": "application/json"
        }
        
        payload = {
            "model": "qwen2.5-72b-instruct",
            "messages": [
                {"role": "system", "content": "You are an expert Kubernetes and DevOps assistant. Analyze the provided deployment data and provide actionable insights."},
                {"role": "user", "content": prompt}
            ],
            "max_tokens": 1000,
            "temperature": 0.7
        }
        
        async with httpx.AsyncClient() as client:
            try:
                response = await client.post(f"{QWEN_ENDPOINT}/v1/chat/completions", 
                                          headers=headers, json=payload, timeout=30.0)
                response.raise_for_status()
                result = response.json()
                return result["choices"][0]["message"]["content"]
            except Exception as e:
                logger.error(f"Error calling Qwen: {e}")
                raise HTTPException(status_code=500, detail="Failed to analyze with Qwen")
    
    @app.get("/health")
    async def health():
        return {"status": "healthy"}
    
    @app.get("/ready")
    async def ready():
        return {"status": "ready"}
    
    @app.post("/analyze", response_model=AnalysisResponse)
    async def analyze_deployment(request: AnalysisRequest):
        """Analyze deployment data using Qwen LLM"""
        
        # Prepare analysis prompt
        prompt = f"""
        Analyze the following Kubernetes deployment data:
        
        {json.dumps(request.deployment_data, indent=2)}
        
        Analysis type: {request.analysis_type}
        
        Please provide:
        1. Key insights about the deployment
        2. Actionable recommendations
        3. Risk assessment (score from 0.0 to 1.0)
        
        Format your response as JSON with keys: insights, recommendations, risk_score
        """
        
        try:
            analysis_result = await call_qwen(prompt)
            
            # Parse the JSON response
            result = json.loads(analysis_result)
            
            return AnalysisResponse(
                insights=result.get("insights", []),
                recommendations=result.get("recommendations", []),
                risk_score=float(result.get("risk_score", 0.5))
            )
            
        except json.JSONDecodeError:
            logger.error("Failed to parse Qwen response as JSON")
            raise HTTPException(status_code=500, detail="Invalid analysis response")
        except Exception as e:
            logger.error(f"Analysis failed: {e}")
            raise HTTPException(status_code=500, detail="Analysis failed")
    
    if __name__ == "__main__":
        import uvicorn
        uvicorn.run(app, host="0.0.0.0", port=8000)
