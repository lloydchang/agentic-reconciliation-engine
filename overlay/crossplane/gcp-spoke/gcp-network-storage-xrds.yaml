# GCP Network XRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gcpnetworks.gcp.crossplane.io
  namespace: crossplane-gcp-spoke
spec:
  group: gcp.crossplane.io
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              region:
                type: string
              networkName:
                type: string
              autoCreateSubnetworks:
                type: boolean
              routingMode:
                type: string
                enum: ["REGIONAL", "GLOBAL"]
              subnetworks:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    region:
                      type: string
                    ipCidrRange:
                      type: string
                    privateIpGoogleAccess:
                      type: boolean
              firewallRules:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    direction:
                      type: string
                      enum: ["INGRESS", "EGRESS"]
                    priority:
                      type: integer
                    allowed:
                      type: array
                      items:
                        type: object
                        properties:
                          ipProtocol:
                            type: string
                          ports:
                            type: array
                            items:
                              type: string
                    sourceRanges:
                      type: array
                      items:
                        type: string
                    targetTags:
                      type: array
                      items:
                        type: string
              labels:
                type: object
          status:
            type: object
            properties:
              phase:
                type: string
              networkId:
                type: string
              subnetworkIds:
                type: array
                items:
                  type: string
              firewallIds:
                type: array
                items:
                  type: string
  scope: Namespaced
  names:
    plural: gcpnetworks
    singular: gcpnetwork
    kind: GCPNetwork

---
# GCP Storage XRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: gcpstorages.gcp.crossplane.io
  namespace: crossplane-gcp-spoke
spec:
  group: gcp.crossplane.io
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              location:
                type: string
              bucketName:
                type: string
              storageClass:
                type: string
                enum: ["STANDARD", "NEARLINE", "COLDLINE", "ARCHIVE"]
              versioning:
                type: object
                properties:
                  enabled:
                    type: boolean
              encryption:
                type: object
                properties:
                  defaultKmsKeyName:
                    type: string
              lifecycle:
                type: object
                properties:
                  rules:
                    type: array
                    items:
                      type: object
                      properties:
                        action:
                          type: object
                          properties:
                            type:
                              type: string
                            storageClass:
                              type: string
                        condition:
                          type: object
                          properties:
                            age:
                              type: integer
                            createdBefore:
                              type: string
                            isLive:
                              type: boolean
              labels:
                type: object
          status:
            type: object
            properties:
              phase:
                type: string
              bucketUrl:
                type: string
              bucketId:
                type: string
  scope: Namespaced
  names:
    plural: gcpstorages
    singular: gcpstorage
    kind: GCPStorage
