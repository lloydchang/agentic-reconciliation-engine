# Unified Composite Resource Definitions with cross-cloud capabilities
---
# Multi-Cloud Network XRD
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xnetworks.multicloud.example.com
  annotations:
    crossplane.io/description: "Multi-cloud network with smart provider selection"
    crossplane.io/provider-agnostic: "true"
spec:
  group: multicloud.example.com
  names:
    kind: XNetwork
    plural: xnetworks
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              # Smart provider selection
              providerSelector:
                type: object
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
                  costOptimal:
                    type: boolean
                    default: false
                  performanceOptimal:
                    type: boolean
                    default: false
              # Direct provider selection (fallback)
              provider:
                type: string
                enum: ["aws", "azure", "gcp", "auto"]
                default: "auto"
              region:
                type: string
                default: "us-west-2"
              cidrBlock:
                type: string
                default: "10.0.0.0/16"
              subnetCount:
                type: integer
                default: 3
              # Cross-cloud features
              failoverProvider:
                type: string
                enum: ["aws", "azure", "gcp"]
              haEnabled:
                type: boolean
                default: false
            required:
              - cidrBlock
          status:
            type: object
            properties:
              networkId:
                type: string
              subnetIds:
                type: array
                items:
                  type: string
              provider:
                type: string
              failoverStatus:
                type: object
                properties:
                  enabled:
                    type: boolean
                  provider:
                    type: string
                  status:
                    type: string
                    enum: ["active", "standby", "failed"]
---
# Multi-Cloud Compute XRD
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xcomputes.multicloud.example.com
  annotations:
    crossplane.io/description: "Multi-cloud compute with intelligent placement"
    crossplane.io/provider-agnostic: "true"
spec:
  group: multicloud.example.com
  names:
    kind: XCompute
    plural: xcomputes
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              # Smart provider selection
              providerSelector:
                type: object
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
                  costOptimal:
                    type: boolean
                    default: true
                  performanceOptimal:
                    type: boolean
                    default: false
                  complianceRequired:
                    type: string
                    enum: ["hipaa", "sox", "pci", "none"]
                    default: "none"
              # Direct provider selection
              provider:
                type: string
                enum: ["aws", "azure", "gcp", "auto"]
                default: "auto"
              region:
                type: string
                default: "us-west-2"
              instanceType:
                type: string
                default: "medium"
              image:
                type: string
                default: "ubuntu-20.04"
              subnetId:
                type: string
              # Cross-cloud features
              autoScaling:
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: false
                  minInstances:
                    type: integer
                    default: 1
                  maxInstances:
                    type: integer
                    default: 5
                  targetCPU:
                    type: integer
                    default: 70
              failoverConfig:
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: false
                  backupProvider:
                    type: string
                    enum: ["aws", "azure", "gcp"]
                  healthCheckInterval:
                    type: integer
                    default: 30
            required:
              - instanceType
          status:
            type: object
            properties:
              instanceId:
                type: string
              publicIP:
                type: string
              privateIP:
                type: string
              provider:
                type: string
              actualProvider:
                type: string
              failoverStatus:
                type: object
                properties:
                  enabled:
                    type: boolean
                  backupInstance:
                    type: string
                  status:
                    type: string
                    enum: ["active", "standby", "failing-over"]
---
# Multi-Cloud Storage XRD
apiVersion: apiextensions.crossplane.io/v1
kind: CompositeResourceDefinition
metadata:
  name: xstorages.multicloud.example.com
  annotations:
    crossplane.io/description: "Multi-cloud storage with intelligent placement"
    crossplane.io/provider-agnostic: "true"
spec:
  group: multicloud.example.com
  names:
    kind: XStorage
    plural: xstorages
  versions:
  - name: v1alpha1
    served: true
    referenceable: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              # Smart provider selection
              providerSelector:
                type: object
                properties:
                  matchLabels:
                    type: object
                    additionalProperties:
                      type: string
                  costOptimal:
                    type: boolean
                    default: true
                  performanceOptimal:
                    type: boolean
                    default: false
                  complianceRequired:
                    type: string
                    enum: ["hipaa", "sox", "pci", "none"]
                    default: "none"
              # Direct provider selection
              provider:
                type: string
                enum: ["aws", "azure", "gcp", "auto"]
                default: "auto"
              region:
                type: string
                default: "us-west-2"
              storageClass:
                type: string
                default: "standard"
              size:
                type: string
                default: "100Gi"
              versioning:
                type: boolean
                default: true
              # Cross-cloud features
              crossCloudReplication:
                type: object
                properties:
                  enabled:
                    type: boolean
                    default: false
                  targetProviders:
                    type: array
                    items:
                      type: string
                  replicationInterval:
                    type: string
                    default: "24h"
              lifecyclePolicy:
                type: object
                properties:
                  automated:
                    type: boolean
                    default: false
                  retentionDays:
                    type: integer
                    default: 30
            required:
              - size
          status:
            type: object
            properties:
              bucketName:
                type: string
              endpoint:
                type: string
              provider:
                type: string
              actualProvider:
                type: string
              replicationStatus:
                type: object
                properties:
                  enabled:
                    type: boolean
                  targets:
                    type: array
                    items:
                      type: object
                      properties:
                        provider:
                          type: string
                        status:
                          type: string
                        lastSync:
                          type: string
