# Team-specific ProviderConfigs for proper isolation (minimal, development-ready)
---
# Team A - AWS Configuration
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: aws-team-a
  namespace: team-a
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: team-a
      name: aws-team-a-credentials
      key: credentials
---
# Team A - Azure Configuration
apiVersion: azure.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: azure-team-a
  namespace: team-a
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: team-a
      name: azure-team-a-credentials
      key: credentials
---
# Team A - GCP Configuration
apiVersion: gcp.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: gcp-team-a
  namespace: team-a
spec:
  projectID: "dummy-project-a"
  credentials:
    source: Secret
    secretRef:
      namespace: team-a
      name: gcp-team-a-credentials
      key: credentials
---
# Team B - AWS Configuration
apiVersion: aws.upbound.io/v1beta1
