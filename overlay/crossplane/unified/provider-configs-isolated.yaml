# Team-specific ProviderConfigs for proper isolation
---
# Team A - AWS Configuration
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: aws-team-a
  namespace: team-a
  labels:
    team: team-a
    provider: aws
    isolation: providerconfig
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: team-a
      name: aws-team-a-credentials
      key: credentials
  region: us-west-2
  tags:
    managed-by: crossplane
    team: team-a
---
# Team A - Azure Configuration
apiVersion: azure.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: azure-team-a
  namespace: team-a
  labels:
    team: team-a
    provider: azure
    isolation: providerconfig
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: team-a
      name: azure-team-a-credentials
      key: credentials
  subscriptionId: "team-a-subscription-id"
  location: West US
  tags:
    managed-by: crossplane
    team: team-a
---
# Team A - GCP Configuration
apiVersion: gcp.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: gcp-team-a
  namespace: team-a
  labels:
    team: team-a
    provider: gcp
    isolation: providerconfig
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: team-a
      name: gcp-team-a-credentials
      key: credentials
  projectID: "team-a-project-id"
  tags:
    managed-by: crossplane
    team: team-a
---
