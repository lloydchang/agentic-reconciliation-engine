# Crossplane Provider Configuration
# AWS Provider Configuration
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: aws-default
  namespace: crossplane-system
  annotations:
    crossplane.io/managed-by: "agentic-reconciliation-engine"
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: aws-credentials
      key: credentials
  defaultTags:
    crossplane-managed: "true"
    project: "agentic-reconciliation-engine"
    managed-by: "crossplane"
---
# AWS Staging Configuration
apiVersion: aws.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: aws-staging
  namespace: crossplane-system
  annotations:
    crossplane.io/managed-by: "agentic-reconciliation-engine"
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: aws-staging-credentials
      key: credentials
  defaultTags:
    crossplane-managed: "true"
    project: "agentic-reconciliation-engine"
    environment: "staging"
    managed-by: "crossplane"
---
# GCP Provider Configuration
apiVersion: gcp.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: gcp-default
  namespace: crossplane-system
  annotations:
    crossplane.io/managed-by: "agentic-reconciliation-engine"
spec:
  projectID: "your-gcp-project-id"
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: gcp-credentials
      key: credentials
---
# Azure Provider Configuration
apiVersion: azure.upbound.io/v1beta1
kind: ProviderConfig
metadata:
  name: azure-default
  namespace: crossplane-system
  annotations:
    crossplane.io/managed-by: "agentic-reconciliation-engine"
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: azure-credentials
      key: credentials
  subscriptionId: "your-azure-subscription-id"
  tenantId: "your-azure-tenant-id"
---
# Secret Templates for Provider Credentials
apiVersion: v1
kind: Secret
metadata:
  name: aws-credentials-template
  namespace: crossplane-system
  annotations:
    crossplane.io/managed-by: "agentic-reconciliation-engine"
type: Opaque
stringData:
  credentials: |
    [default]
    aws_access_key_id = YOUR_AWS_ACCESS_KEY_ID
    aws_secret_access_key = YOUR_AWS_SECRET_ACCESS_KEY
    region = us-west-2
---
apiVersion: v1
kind: Secret
metadata:
  name: gcp-credentials-template
  namespace: crossplane-system
  annotations:
    crossplane.io/managed-by: "agentic-reconciliation-engine"
type: Opaque
stringData:
  credentials: |
    {
      "type": "service_account",
      "project_id": "your-gcp-project-id",
      "private_key_id": "YOUR_PRIVATE_KEY_ID",
      "private_key": "YOUR_PRIVATE_KEY",
      "client_email": "your-service-account@your-gcp-project-id.iam.gserviceaccount.com",
      "client_id": "YOUR_CLIENT_ID",
      "auth_uri": "https://accounts.google.com/o/oauth2/auth",
      "token_uri": "https://oauth2.googleapis.com/token"
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: azure-credentials-template
  namespace: crossplane-system
  annotations:
    crossplane.io/managed-by: "agentic-reconciliation-engine"
type: Opaque
stringData:
  credentials: |
    {
      "tenantId": "YOUR_AZURE_TENANT_ID",
      "subscriptionId": "YOUR_AZURE_SUBSCRIPTION_ID",
      "clientId": "YOUR_AZURE_CLIENT_ID",
      "clientSecret": "YOUR_AZURE_CLIENT_SECRET"
    }
