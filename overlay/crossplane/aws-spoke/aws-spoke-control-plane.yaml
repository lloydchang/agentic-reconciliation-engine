# AWS Spoke Control Plane Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: crossplane-aws-spoke
  labels:
    crossplane.io/architecture: spoke
    crossplane.io/provider: aws
    crossplane.io/purpose: multi-cloud-orchestration

---
# AWS Provider
apiVersion: pkg.crossplane.io/v1
kind: Provider
metadata:
  name: provider-aws
  namespace: crossplane-aws-spoke
spec:
  package: xpkg.upbound.io/crossplane/provider-aws:v0.46.0
  runtimeConfigRef:
    name: aws-provider-config

---
# AWS Provider Runtime Config
apiVersion: pkg.crossplane.io/v1beta1
kind: DeploymentRuntimeConfig
metadata:
  name: aws-provider-config
  namespace: crossplane-aws-spoke
spec:
  deploymentTemplate:
    spec:
      replicas: 1
      selector:
        matchLabels:
          pkg.crossplane.io/provider: provider-aws
      template:
        spec:
          serviceAccountName: aws-provider-sa
          containers:
          - name: package-runtime
            image: xpkg.upbound.io/crossplane/provider-aws:v0.46.0
            args: ["-d", "*"]
            securityContext:
              allowPrivilegeEscalation: false
              runAsUser: 65532
              runAsGroup: 65532
            env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-creds
                  key: secret-access-key

---
# AWS Provider Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-provider-sa
  namespace: crossplane-aws-spoke

---
# AWS Provider RBAC - Cluster Role
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aws-provider-role
  namespace: crossplane-aws-spoke
rules:
- apiGroups: [""]
  resources: ["secrets", "configmaps", "services", "serviceaccounts"]
  verbs: ["*"]
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["*"]
- apiGroups: ["aws.crossplane.io"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["crossplane.io"]
  resources: ["*"]
  verbs: ["*"]

---
# AWS Provider RBAC - Cluster Role Binding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aws-provider-binding
  namespace: crossplane-aws-spoke
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aws-provider-role
subjects:
- kind: ServiceAccount
  name: aws-provider-sa
  namespace: crossplane-aws-spoke

---
# AWS Provider Config
apiVersion: aws.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: aws-provider-config
  namespace: crossplane-aws-spoke
spec:
  credentials:
    source: Secret
    secretRef:
      name: aws-creds
      namespace: crossplane-aws-spoke
      key: creds
  region: us-east-1

---
# AWS VM XRD
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: awsvirtualmachines.aws.crossplane.io
  namespace: crossplane-aws-spoke
spec:
  group: aws.crossplane.io
  versions:
  - name: v1alpha1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            properties:
              region:
                type: string
              instanceType:
                type: string
              ami:
                type: string
              keyName:
                type: string
              securityGroupIds:
                type: array
                items:
                  type: string
              subnetId:
                type: string
              tags:
                type: object
          status:
            type: object
            properties:
              phase:
                type: string
              instanceId:
                type: string
              publicIp:
                type: string
  scope: Namespaced
  names:
    plural: awsvirtualmachines
    singular: awsvirtualmachine
    kind: AWSVirtualMachine
