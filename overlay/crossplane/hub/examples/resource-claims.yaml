  namespace: default
  labels:
    provider: aws
    environment: production
    team: aws-team
spec:
  compositionSelector:
    matchLabels:
      provider: aws
  provider: aws
  region: us-west-2
  networkId: aws-production-network
  nodeCount: 3
  nodeInstanceType: t3.medium
  version: "1.28"
  enableAutoscaling: true
  minNodes: 1
  maxNodes: 10
