# AWS Database Claim
apiVersion: platform.example.com/v1alpha1
kind: Database
metadata:
  name: aws-production-db
  namespace: default
  labels:
    provider: aws
    environment: production
    team: aws-team
spec:
  compositionSelector:
    matchLabels:
      provider: aws
  provider: aws
  region: us-west-2
  networkId: aws-production-network
  engine: postgresql
  version: "15"
  instanceClass: db.t3.micro
  allocatedStorage: 20
  username: admin
  passwordSecretRef:
    name: aws-db-password
    namespace: default
    key: password
  enableBackup: true
  enableMultiAZ: true
  writeConnectionSecretToRef:
    namespace: default
    name: aws-db-connection
---
