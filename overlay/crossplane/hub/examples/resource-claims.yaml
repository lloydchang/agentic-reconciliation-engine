# AWS Storage Claim
apiVersion: platform.example.com/v1alpha1
kind: Storage
metadata:
  name: aws-production-storage
  namespace: default
  labels:
    provider: aws
    environment: production
    team: aws-team
spec:
  compositionSelector:
    matchLabels:
      provider: aws
  provider: aws
  region: us-west-2
  bucketName: ai-portal-backups-prod
  storageClass: STANDARD
  enableVersioning: true
  enableEncryption: true
  lifecycleRules:
    - id: "DeleteOldBackups"
      status: "Enabled"
      expiration:
        days: 90
      transitions:
        - days: 30
          storageClass: GLACIER
  writeConnectionSecretToRef:
    namespace: default
    name: aws-storage-connection
---
