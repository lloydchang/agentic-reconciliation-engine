# Example Resource Claims demonstrating unified multi-cloud interface
---
# AWS Network Claim
apiVersion: platform.example.com/v1alpha1
kind: Network
metadata:
  name: aws-production-network
  namespace: default
  labels:
    provider: aws
    environment: production
    team: aws-team
spec:
  compositionSelector:
    matchLabels:
      provider: aws
  provider: aws
  region: us-west-2
  cidrBlock: "10.0.0.0/16"
  subnetCount: 3
  enableDnsSupport: true
  enableDnsHostnames: true
  writeConnectionSecretToRef:
    namespace: default
    name: aws-network-connection
---
