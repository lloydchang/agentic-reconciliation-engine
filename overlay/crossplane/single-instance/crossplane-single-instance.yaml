            args: ["-d", "*"]
            securityContext:
              allowPrivilegeEscalation: false
              runAsUser: 65532
              runAsGroup: 65532

---
# AWS Provider Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-provider-sa
  namespace: crossplane-system

