apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argo-events-controller-hpa
  namespace: argo-events-prod
  labels:
    environment: production
    app.kubernetes.io/name: argo-events
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argo-events-controller
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: argo_events_events_processed_rate
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argo-events-eventsource-hpa
  namespace: argo-events-prod
  labels:
    environment: production
    app.kubernetes.io/name: argo-events
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argo-events-eventsource
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 60
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
