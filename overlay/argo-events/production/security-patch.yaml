# Production Security Enhancements

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-events-sa
  namespace: argo-events-prod
  annotations:
    iam.amazonaws.com/role: "arn:aws:iam::123456789012:role/argo-events-prod-role"
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/argo-events-prod-role"
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: argo-events-controller-pdb
  namespace: argo-events-prod
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: argo-events-controller
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: argo-events-controller-hpa
  namespace: argo-events-prod
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: argo-events-controller
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
