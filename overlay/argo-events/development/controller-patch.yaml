apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-events-controller
  namespace: argo-events-dev
spec:
  replicas: 1
  template:
    spec:
      containers:
      - name: argo-events-controller
        image: quay.io/argoproj/argo-events:v1.9.0
        args:
        - controller
        - --namespaced
        env:
        - name: LOG_LEVEL
          value: "debug"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: ENVIRONMENT
          value: "development"
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
