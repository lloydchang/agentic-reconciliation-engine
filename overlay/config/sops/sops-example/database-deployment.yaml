apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-database
  namespace: default
  labels:
    app: mysql
    tier: database
    gitops-infra-control-plane.io/managed-by: "sops-example"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
      tier: database
  template:
    metadata:
      labels:
        app: mysql
        tier: database
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        ports:
        - containerPort: 3306
          name: mysql
        env:
        # Database credentials from encrypted secret
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: password
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: database-name
        - name: MYSQL_USER
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: username
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: password
        # MySQL configuration
        - name: MYSQL_ROOT_HOST
          value: "%"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: mysql-data
          mountPath: /var/lib/mysql
        - name: mysql-config
          mountPath: /etc/mysql/conf.d
        livenessProbe:
          exec:
            command:
            - mysqladmin
            - ping
            - -h
            - localhost
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - mysql
            - -h
            - localhost
            - -e
            - "SELECT 1"
          initialDelaySeconds: 5
          periodSeconds: 5

      volumes:
      - name: mysql-data
        persistentVolumeClaim:
          claimName: mysql-pvc
      - name: mysql-config
        configMap:
          name: mysql-config

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: default
  labels:
    app: mysql
    tier: database
    gitops-infra-control-plane.io/managed-by: "sops-example"
spec:
  selector:
    app: mysql
    tier: database
  ports:
  - port: 3306
    targetPort: 3306
    protocol: TCP
    name: mysql
  type: ClusterIP

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: default
  labels:
    app: mysql
    tier: database
    gitops-infra-control-plane.io/managed-by: "sops-example"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-config
  namespace: default
  labels:
    app: mysql
    tier: database
    gitops-infra-control-plane.io/managed-by: "sops-example"
data:
  # MySQL configuration
  my.cnf: |
    [mysqld]
    # General settings
    bind-address = 0.0.0.0
    port = 3306
    
    # Character set
    character-set-server = utf8mb4
    collation-server = utf8mb4_unicode_ci
    
    # Performance settings
    innodb_buffer_pool_size = 256M
    innodb_log_file_size = 64M
    innodb_flush_log_at_trx_commit = 2
    innodb_flush_method = O_DIRECT
    
    # Logging
    log-error = /var/log/mysql/error.log
    slow-query-log = 1
    slow-query-log-file = /var/log/mysql/slow.log
    long_query_time = 2
    
    # Security
    local-infile = 0
    
    [mysql]
    default-character-set = utf8mb4
    
    [client]
    default-character-set = utf8mb4

---
# Database initialization job
apiVersion: batch/v1
kind: Job
metadata:
  name: wordpress-db-init
  namespace: default
  labels:
    app: wordpress
    tier: database
    gitops-infra-control-plane.io/managed-by: "sops-example"
spec:
  template:
    metadata:
      labels:
        app: wordpress-db-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: db-init
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: password
        - name: MYSQL_HOST
          value: mysql-service
        - name: MYSQL_DATABASE
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: database-name
        command:
        - /bin/bash
        - -c
        - |
          # Wait for MySQL to be ready
          echo "Waiting for MySQL to be ready..."
          while ! mysqladmin ping -h"$MYSQL_HOST" --silent; do
            echo "MySQL not ready, waiting..."
            sleep 2
          done
          
          echo "MySQL is ready. Initializing WordPress database..."
          
          # Create WordPress database if it doesn't exist
          mysql -h"$MYSQL_HOST" -uroot -p"$MYSQL_ROOT_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS \`${MYSQL_DATABASE}\` CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
          
          # Create WordPress user if it doesn't exist
          mysql -h"$MYSQL_HOST" -uroot -p"$MYSQL_ROOT_PASSWORD" -e "CREATE USER IF NOT EXISTS 'wordpress'@'%' IDENTIFIED BY '$MYSQL_ROOT_PASSWORD';"
          mysql -h"$MYSQL_HOST" -uroot -p"$MYSQL_ROOT_PASSWORD" -e "GRANT ALL PRIVILEGES ON \`${MYSQL_DATABASE}\`.* TO 'wordpress'@'%';"
          mysql -h"$MYSQL_HOST" -uroot -p"$MYSQL_ROOT_PASSWORD" -e "FLUSH PRIVILEGES;"
          
          echo "WordPress database initialized successfully!"
