apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: sops-example
  namespace: default
  labels:
    app.kubernetes.io/name: sops-example
    app.kubernetes.io/component: example
    gitops-infra-control-plane.io/managed-by: "flux"
resources:
  # Database components (must be deployed first)
  - name: database-deployment.yaml
    dependsOn:
      - database-credentials.secret.yaml
  
  # Application components (depend on database)
  - name: wordpress-deployment.yaml
    dependsOn:
      - database-deployment.yaml
  
  # Encrypted secrets (must be available before deployments)
  - database-credentials.secret.yaml

# Flux SOPS decryption configuration
decryption:
  provider: sops
  secretRef:
    name: sops-age

# Post-build substitutions for configuration
postBuild:
  substitute:
    # Environment-specific values
    ENVIRONMENT: "example"
    CLUSTER_NAME: "gitops-infra-control-plane"
    NAMESPACE: "default"
  
  substituteFrom:
    # Additional configuration from ConfigMaps (optional)
    - kind: ConfigMap
      name: cluster-config
      optional: true
    - kind: Secret
      name: cluster-secrets
      optional: true

# Common labels for all resources
commonLabels:
  app.kubernetes.io/part-of: sops-example
  app.kubernetes.io/managed-by: flux
  gitops-infra-control-plane.io/example: "true"

# Common annotations for all resources
commonAnnotations:
  gitops-infra-control-plane.io/description: "SOPS encrypted secrets example deployment"
  gitops-infra-control-plane.io/created-by: "gitops-infra-control-plane"
  gitops-infra-control-plane.io/encryption: "age-sops"

# Patches for configuration
patches:
  # Patch WordPress deployment to use proper image pull policy
  - patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
    target:
      kind: Deployment
      name: wordpress
  
  # Patch MySQL deployment to use proper image pull policy
  - patch: |
      - op: replace
        path: /spec/template/spec/containers/0/imagePullPolicy
        value: IfNotPresent
    target:
      kind: Deployment
      name: mysql-database

# Namespace configuration
namespace: default

# Resource limits and requests
patchesStrategicMerge:
  |-
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: wordpress
  spec:
    template:
      spec:
        containers:
        - name: wordpress
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  
  |-
  apiVersion: apps/v1
  kind: Deployment
  metadata:
    name: mysql-database
  spec:
    template:
      spec:
        containers:
        - name: mysql
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
