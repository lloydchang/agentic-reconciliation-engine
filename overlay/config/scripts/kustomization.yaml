apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: scripts-config-overlay
  namespace: default

resources:
  # Script configuration templates
  - bootstrap-scripts
  - deployment-scripts
  - maintenance-scripts
  - debug-scripts

configMapGenerator:
  - name: bootstrap-scripts
    files:
      - quickstart.sh
      - create-bootstrap-cluster.sh
      - setup-development.sh

  - name: deployment-scripts
    files:
      - deploy-infrastructure.sh
      - deploy-ai-agents.sh
      - rollback-deployment.sh

  - name: maintenance-scripts
    files:
      - backup-cluster.sh
      - restore-cluster.sh
      - update-cluster.sh

  - name: debug-scripts
    files:
      - quick_debug.sh
      - analyze-logs.sh
      - health-check.sh

secretGenerator:
  - name: script-secrets
    envs:
      - .env.scripts

vars:
  - name: SCRIPTS_NAMESPACE
    objref:
      kind: ConfigMap
      name: bootstrap-scripts
      apiVersion: v1
    fieldref:
      fieldpath: metadata.namespace

patchesStrategicMerge:
  - patches/script-permissions.yaml
  - patches/script-env.yaml

commonLabels:
  app.kubernetes.io/name: scripts
  app.kubernetes.io/component: config
  app.kubernetes.io/managed-by: kustomize

commonAnnotations:
  config.kubernetes.io/origin: overlay/config/scripts
