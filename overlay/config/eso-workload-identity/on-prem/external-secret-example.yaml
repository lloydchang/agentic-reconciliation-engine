# Spoke team writes this. References vault ClusterSecretStore.
# Secret path in Vault KV v2: secret/data/spoke-onprem/my-service
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: my-service-credentials
  namespace: my-namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault
    kind: ClusterSecretStore
  target:
    name: my-service-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: secret/data/spoke-onprem/my-service
        property: username
    - secretKey: password
      remoteRef:
        key: secret/data/spoke-onprem/my-service
        property: password
