apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: agentic-reconciliation-engine-typescript
  namespace: flux-system
  annotations:
    config.kubernetes.io/local-config: "true"
    variant.language: "typescript"
    variant.ecosystem: "nodejs-npm"
resources:
  # Core control plane
  - name: ../../core/operators/
    dependsOn:
      - flux-system
  # TypeScript/Node.js microservices
  - name: typescript-microservices/
    dependsOn:
      - ../../core/operators/
  # TypeScript frontend apps
  - name: typescript-frontend/
    dependsOn:
      - ../../core/operators/
  # TypeScript API gateways
  - name: typescript-gateway/
    dependsOn:
      - typescript-microservices
  # TypeScript monitoring
  - name: typescript-monitoring/
    dependsOn:
      - typescript-microservices
      - typescript-gateway
# TypeScript ecosystem configuration
configurations:
- name: typescript-config
  literals:
  - NODE_VERSION= "20"
  - TYPESCRIPT_VERSION= "5.3"
  - PACKAGE_MANAGER= "npm"
  - FRAMEWORK= "express-nestjs"
  - FRONTEND_FRAMEWORK= "react-nextjs"
  - BUILD_TOOL= "webpack-vite"
  - TESTING= "jest-cypress"
  - LINTING= "eslint-prettier"
  - MONITORING= "newrelic-datadog"
  - CONTAINER_BASE= "node:20-alpine"
  - BUNDLER= "esbuild"
  - SERVERLESS= "true"
# TypeScript-specific labels
commonLabels:
  variant: typescript-ecosystem
  language: typescript
  runtime: nodejs-20
  package-manager: npm
  framework: express-nestjs
  frontend: react-nextjs
# TypeScript resource patches
patchesStrategicMerge:
- typescript-resources/nodejs-runtime.yaml
- typescript-resources/express-config.yaml
- typescript-resources/nextjs-config.yaml
- typescript-resources/serverless-config.yaml
# TypeScript images
images:
- name: nodejs/runtime
  newTag: "20-alpine"
- name: nginx/frontend
  newTag: "1.25-alpine"
- name: express/backend
  newTag: "4.18-alpine"
- name: nextjs/app
  newTag: "14-alpine"
# Namespace for TypeScript workloads
namespace: typescript-workloads
# TypeScript-specific configurations
configMapGenerator:
- name: typescript-backend-config
  literals:
  - NODE_VERSION= "20"
  - EXPRESS_VERSION= "4.18.2"
  - NESTJS_VERSION= "10.2.10"
  - TYPEORM_VERSION= "0.3.17"
  - JWT_VERSION= "9.0.2"
  - SOCKET_IO_VERSION= "4.7.4"
- name: typescript-frontend-config
  literals:
  - REACT_VERSION= "18.2.0"
  - NEXTJS_VERSION= "14.0.3"
  - TYPESCRIPT_VERSION= "5.3.2"
  - TAILWIND_VERSION= "3.3.6"
  - VITE_VERSION= "5.0.0"
- name: typescript-build-config
  literals:
  - BUILD_TOOL= "webpack"
  - BUNDLER= "esbuild"
  - MINIFICATION= "true"
  - TREE_SHAKING= "true"
  - CODE_SPLITTING= "true"
