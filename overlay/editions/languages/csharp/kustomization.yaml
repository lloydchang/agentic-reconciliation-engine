apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: agentic-reconciliation-engine-csharp
  namespace: flux-system
  annotations:
    config.kubernetes.io/local-config: "true"
    variant.language: "csharp"
    variant.ecosystem: "dotnet"
resources:
  # Core control plane
  - name: ../../core/operators/
    dependsOn:
      - flux-system
  # .NET microservices
  - name: csharp-microservices/
    dependsOn:
      - ../../core/operators/
  # .NET web APIs
  - name: csharp-webapi/
    dependsOn:
      - ../../core/operators/
  # .NET background services
  - name: csharp-background-services/
    dependsOn:
      - ../../core/operators/
  # .NET monitoring
  - name: csharp-monitoring/
    dependsOn:
      - csharp-microservices
      - csharp-webapi
# C#/.NET ecosystem configuration
configurations:
- name: csharp-config
  literals:
  - DOTNET_VERSION= "8.0"
  - FRAMEWORK= "aspnetcore"
  - ARCHITECTURE= "microservices"
  - DATABASE= "entity-framework-sqlserver"
  - CACHING= "redis"
  - MESSAGING= "rabbitmq"
  - AUTHENTICATION= "azure-ad-jwt"
  - MONITORING= "application-insights"
  - LOGGING= "serilog-seq"
  - CONTAINER_BASE= "mcr.microsoft.com/dotnet/aspnet:8.0"
  - BUILD_TOOL= "dotnet"
  - TESTING= "xunit-moq"
# C#-specific labels
commonLabels:
  variant: csharp-ecosystem
  language: csharp
  runtime: dotnet-8.0
  framework: aspnetcore
  architecture: microservices
# C# resource patches
patchesStrategicMerge:
- csharp-resources/dotnet-runtime.yaml
- csharp-resources/aspnetcore-config.yaml
- csharp-resources/entity-framework.yaml
- csharp-resources/azure-integration.yaml
# C# images
images:
- name: dotnet/runtime
  newTag: "8.0-alpine"
- name: dotnet/aspnet
  newTag: "8.0-alpine"
- name: dotnet/sdk
  newTag: "8.0-alpine"
- name: microsoft/sql-server
  newTag: "2022-latest"
# Namespace for C# workloads
namespace: csharp-workloads
# C#-specific configurations
configMapGenerator:
- name: csharp-aspnetcore-config
  literals:
  - ASPNETCORE_VERSION= "8.0.0"
  - SWAGGER_VERSION= "6.5.0"
  - HEALTH_CHECKS= "true"
  - RATE_LIMITING= "true"
  - CORS_POLICY= "true"
- name: csharp-database-config
  literals:
  - ENTITY_FRAMEWORK_VERSION= "8.0.0"
  - SQL_SERVER_VERSION= "2022"
  - MIGRATIONS= "true"
  - SEEDING= "true"
- name: csharp-azure-config
  literals:
  - AZURE_SDK_VERSION= "1.0.0"
  - APPLICATION_INSIGHTS= "true"
  - KEY_VAULT= "true"
  - SERVICE_BUS= "true"
