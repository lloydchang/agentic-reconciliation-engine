apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: agentic-reconciliation-engine-python
  namespace: flux-system
  annotations:
    config.kubernetes.io/local-config: "true"
    variant.language: "python"
    variant.ecosystem: "pip-uv"
resources:
  # Core control plane
  - name: ../../core/operators/
    dependsOn:
      - flux-system
  # Python-specific AI/ML components
  - name: ../../overlay/examples/complete-hub-spoke/ai-cronjobs/
    dependsOn:
      - ../../core/operators/
  - name: ../../overlay/examples/complete-hub-spoke/ai-validation/
    dependsOn:
      - ../../core/operators/
  # Python agent workflows
  - name: ../../overlay/examples/complete-hub-spoke/agent-workflows/
    dependsOn:
      - ../../overlay/examples/complete-hub-spoke/ai-cronjobs/
  # Python ML infrastructure
  - name: ml-core/resources/
    dependsOn:
      - ../../core/operators/
  # Python monitoring
  - name: python-monitoring/
    dependsOn:
      - ml-infrastructure
# Python ecosystem configuration
configurations:
- name: python-config
  literals:
  - RUNTIME_VERSION= "3.11"
  - PACKAGE_MANAGER= "uv"
  - ML_FRAMEWORK= "torch"
  - DATA_PROCESSING= "pandas-numpy"
  - API_FRAMEWORK= "fastapi"
  - ASGI_SERVER= "uvicorn"
  - TESTING_FRAMEWORK= "pytest"
  - LINTING= "ruff-black"
  - CONTAINER_BASE= "python:3.11-slim"
  - GPU_SUPPORT= "true"
  - JUPYTER_ENABLED= "true"
  - NOTEBOOK_SUPPORT= "true"
# Python-specific labels
commonLabels:
  variant: python-ecosystem
  language: python
  runtime: cpython-3.11
  package-manager: uv
  ml-framework: pytorch
# Python resource patches
patchesStrategicMerge:
- python-resources/python-runtime.yaml
- python-resources/ml-gpu-support.yaml
- python-resources/jupyter-config.yaml
# Python images
images:
- name: python/runtime
  newTag: "3.11-slim"
- name: pytorch/pytorch
  newTag: "2.1.0-cuda11.8"
- name: jupyter/scipy-notebook
  newTag: "latest"
- name: fastapi/fastapi
  newTag: "0.104.1"
# Namespace for Python workloads
namespace: python-workloads
# Python-specific configurations
configMapGenerator:
- name: python-ml-config
  literals:
  - TORCH_VERSION= "2.1.0"
  - TRANSFORMERS_VERSION= "4.35.0"
  - DATASETS_VERSION= "2.14.0"
  - ACCELERATE_VERSION= "0.24.1"
  - HF_TOKEN_ENDPOINT= "true"
- name: python-api-config
  literals:
  - FASTAPI_VERSION= "0.104.1"
  - UVICORN_VERSION= "0.24.0"
  - PYDANTIC_VERSION= "2.5.0"
  - MIDDLEWARE_CORS= "true"
  - RATE_LIMITING= "true"
