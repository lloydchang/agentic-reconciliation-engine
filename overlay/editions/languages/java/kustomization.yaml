apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: agentic-reconciliation-engine-java
  namespace: flux-system
  annotations:
    config.kubernetes.io/local-config: "true"
    variant.language: "java"
    variant.ecosystem: "maven-gradle"
resources:
  # Core control plane
  - name: ../../core/operators/
    dependsOn:
      - flux-system
  # Java Spring Boot microservices
  - name: java-springboot/
    dependsOn:
      - ../../core/operators/
  # Java Quarkus services
  - name: java-quarkus/
    dependsOn:
      - ../../core/operators/
  # Java messaging
  - name: java-messaging/
    dependsOn:
      - java-springboot
      - java-quarkus
  # Java monitoring
  - name: java-monitoring/
    dependsOn:
      - java-springboot
      - java-quarkus
# Java ecosystem configuration
configurations:
- name: java-config
  literals:
  - JAVA_VERSION= "21"
  - BUILD_TOOL= "maven"
  - FRAMEWORK= "spring-boot-quarkus"
  - DATABASE= "postgresql-mysql"
  - CACHING= "redis-hazelcast"
  - MESSAGING= "kafka-rabbitmq"
  - AUTHENTICATION= "spring-security-keycloak"
  - MONITORING= "micrometer-prometheus"
  - LOGGING= "logback-loki"
  - CONTAINER_BASE= "openjdk:21-jre-slim"
  - JVM_OPTS= "-Xmx1g -XX:+UseG1GC"
  - TESTING= "junit-mockito"
# Java-specific labels
commonLabels:
  variant: java-ecosystem
  language: java
  runtime: openjdk-21
  build-tool: maven
  framework: spring-boot-quarkus
# Java resource patches
patchesStrategicMerge:
- java-resources/jvm-runtime.yaml
- java-resources/springboot-config.yaml
- java-resources/quarkus-config.yaml
- java-resources/kafka-integration.yaml
# Java images
images:
- name: openjdk/runtime
  newTag: "21-jre-slim"
- name: springboot/app
  newTag: "3.2.0"
- name: quarkus/app
  newTag: "3.6.0"
- name: kafka/kafka
  newTag: "3.6.0"
# Namespace for Java workloads
namespace: java-workloads
# Java-specific configurations
configMapGenerator:
- name: java-springboot-config
  literals:
  - SPRING_BOOT_VERSION= "3.2.0"
  - SPRING_SECURITY_VERSION= "6.2.0"
  - SPRING_DATA_VERSION= "3.2.0"
  - ACTUATOR_ENABLED= "true"
  - HEALTH_CHECKS= "true"
- name: java-quarkus-config
  literals:
  - QUARKUS_VERSION= "3.6.0"
  - NATIVE_IMAGE= "true"
  - GRAALVM= "true"
  - FAST_JAR= "true"
- name: java-jvm-config
  literals:
  - JAVA_VERSION= "21"
  - HEAP_SIZE= "1g"
  - GC_ALGORITHM= "G1GC"
  - JIT_OPTIMIZATION= "true"
  - CONTAINER_SUPPORT= "true"
