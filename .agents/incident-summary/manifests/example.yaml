apiVersion: v1
kind: ConfigMap
metadata:
  name: incident-summary-example
  namespace: default
  labels:
    app: incident-summary
    component: skill-example
data:
  example-alert.json: |
    {
      "timestamp": "2026-03-14T19:13:00Z",
      "severity": "critical",
      "service": "payments-api",
      "message": "Pod payments-api-7d4f8b9c-k2m5n is in CrashLoopBackOff",
      "labels": {
        "namespace": "production",
        "pod": "payments-api-7d4f8b9c-k2m5n"
      },
      "annotations": {
        "kubectl_description": "Pod has been restarting 15 times in the last 5 minutes"
      }
    }
  usage-example.txt: |
    # Example usage of the incident-summary skill
    
    # 1. Process alerts from file
    python3 scripts/summarize_alerts.py example-alert.json
    
    # 2. Process alerts from stdin
    cat example-alert.json | python3 scripts/summarize_alerts.py -
    
    # 3. Expected output format
    {
      "incident_id": "inc-20260314-191300",
      "summary": {
        "title": "Critical: payments-api",
        "severity": 4,
        "affected_services": ["payments-api"],
        "alert_count": 1
      },
      "timeline": [...],
      "potential_causes": [...],
      "recommendations": [...]
    }
  skill-integration.md: |
    # Integration with Agent Runtime
    
    The incident-summary skill is typically invoked by the agent runtime when:
    
    1. Alert is received from monitoring systems
    2. Operator requests incident analysis
    3. Automated incident response is triggered
    
    ## Trigger Conditions
    - Prometheus alert firing
    - Grafana dashboard anomaly detected
    - Kubernetes event threshold exceeded
    - Manual incident analysis request
    
    ## Output Integration
    The generated summary can be:
    - Sent to incident management systems
    - Used for automated runbook selection
    - Included in postmortem documentation
    - Shared with operations teams via chat

