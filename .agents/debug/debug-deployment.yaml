---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debug
  namespace: flux-system
  labels:
    overlay: debug
    overlay-type: skill
    app: debug
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debug
  template:
    metadata:
      labels:
        app: debug
        overlay: debug
    spec:
      containers:
      - name: debug
        image: python:3.11-slim
        command:
          - python
          - -c
          - |
            import os
            import time
            import logging
            
            logging.basicConfig(level=logging.INFO)
            logger = logging.getLogger(__name__)
            
            logger.info("Debug skill started")
            logger.info(f"Debug enabled: {os.getenv('DEBUG_ENABLED', 'false')}")
            logger.info(f"Debug level: {os.getenv('DEBUG_LEVEL', 'info')}")
            
            while True:
                logger.info("Debug skill running...")
                time.sleep(30)
        env:
        - name: DEBUG_ENABLED
          valueFrom:
            configMapKeyRef:
              name: debug-config
              key: DEBUG_ENABLED
        - name: DEBUG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: debug-config
              key: DEBUG_LEVEL
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: debug
  namespace: flux-system
  labels:
    overlay: debug
    app: debug
spec:
  selector:
    app: debug
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
