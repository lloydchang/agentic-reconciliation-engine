---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: aws-certificate-authority
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/tenants/aws/workloads/certificate-authority
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
  - name: aws-clusters  # AWS infrastructure must be ready first
