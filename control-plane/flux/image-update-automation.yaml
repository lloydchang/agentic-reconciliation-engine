apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: gitops-infra-updates
  namespace: flux-system
spec:
  interval: 5m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: fluxcd@users.noreply.github.com
        name: fluxcd-bot
      messageTemplate: |
        🚀 Automated image updates

        {{range .Updated.Images}}
        - Image: {{.Repository}}:{{.Tag}}
        - Digest: {{.Digest}}
        {{end}}

        This commit was automatically generated by Flux ImageUpdateAutomation.
        A pull request will be created for review.
    push:
      branch: staging
  update:
    path: ./infrastructure/tenants/3-workloads
    strategy: Setters
