---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: gitops-infra-control-plane
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: ssh://git@github.com/lloydchang/gitops-infra-control-plane
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./control-plane/flux
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./control-plane/controllers
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
  dependsOn:
    - name: flux-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tenants-infra
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./infrastructure/tenants
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
  dependsOn:
    - name: infrastructure-controllers
