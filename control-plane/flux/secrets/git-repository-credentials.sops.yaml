---
# Git Repository Credentials - SOPS Encrypted
# This file contains encrypted Git credentials for Flux
# Template for encrypted secrets using SOPS + age

apiVersion: v1
kind: Secret
metadata:
  name: github-credentials
  namespace: flux-system
type: Opaque
stringData:
  username: "your-github-username"
  password: "your-github-personal-access-token"
  # Or use deployKey for SSH access
  # deployKey: |
  #   -----BEGIN OPENSSH PRIVATE KEY-----
  #   your-ssh-private-key
  #   -----END OPENSSH PRIVATE KEY-----
---
apiVersion: v1
kind: Secret
metadata:
  name: gitlab-credentials
  namespace: flux-system
type: Opaque
stringData:
  username: "your-gitlab-username"
  password: "your-gitlab-personal-access-token"
---
apiVersion: v1
kind: Secret
metadata:
  name: gitea-credentials
  namespace: flux-system
type: Opaque
stringData:
  username: "your-gitea-username"
  password: "your-gitea-personal-access-token"
