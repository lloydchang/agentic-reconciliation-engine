apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: gitops-infra-control-plane
  namespace: flux-system
spec:
  image: ghcr.io/${{ github.repository_owner }}/gitops-infra-control-plane
  interval: 5m
  timeout: 1m
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: gitops-infra-control-plane-production
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: gitops-infra-control-plane
  policy:
    semver:
      range: '>=1.0.0'
  filterTags:
    pattern: '^v?[0-9]+\.[0-9]+\.[0-9]+$'
    extract: '$ts'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: gitops-infra-control-plane-development
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: gitops-infra-control-plane
  policy:
    alphabetical:
      order: asc
  filterTags:
    pattern: '^[a-zA-Z0-9_-]+-[a-fA-F0-9]{8}-[0-9]+$'
    extract: '$ts'
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageUpdateAutomation
metadata:
  name: gitops-infra-jenkins-updates
  namespace: flux-system
spec:
  interval: 10m
  sourceRef:
    kind: GitRepository
    name: flux-system
  git:
    checkout:
      ref:
        branch: main
    commit:
      author:
        email: jenkins-ci@users.noreply.github.com
        name: jenkins-ci-bot
      messageTemplate: |
        🚀 Automated image update from Jenkins CI

        This commit was automatically generated by Flux ImageUpdateAutomation
        after Jenkins CI successfully built and pushed a new image.

        {{range .Updated.Images}}
        - Image: {{.Repository}}:{{.Tag}}
        - Digest: {{.Digest}}
        {{end}}

        Build Information:
        - Timestamp: {{now.Format "2006-01-02T15:04:05Z"}}
        - Trigger: Jenkins CI Pipeline
        - Repository: {{.GitRepository}}
        - Commit: {{.GitCommit}}
    push:
      branch: staging
  update:
    path: ./infrastructure/tenants/3-workloads
    strategy: Setters
