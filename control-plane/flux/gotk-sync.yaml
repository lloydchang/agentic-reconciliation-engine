---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: network-infra
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./infrastructure/tenants/1-network
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-infra
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./infrastructure/tenants/2-clusters
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
  dependsOn:
    - name: network-infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: workload-infra
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./infrastructure/tenants/3-workloads
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
  dependsOn:
    - name: cluster-infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: karmada-infra
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./control-plane/karmada
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
  dependsOn:
    - name: workload-infra
