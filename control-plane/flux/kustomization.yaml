apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
resources:
  - gotk-components.yaml
  - gotk-sync.yaml
  - image-update-automation.yaml
  - image-policy.yaml
  - jenkins-image-automation.yaml
  - secrets/
  - ./cloud-aws
  # - ./cloud-azure
  # - ./cloud-gcp
# SOPS configuration for secret decryption
decryption:
  provider: sops
  secretRef:
    name: sops-age-key
