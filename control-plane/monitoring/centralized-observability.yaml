# Centralized Observability Stack with Correlation IDs
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: gitops-observability
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "45.0.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
  values:
    # Prometheus Configuration
    prometheus:
      enabled: true
      prometheusSpec:
        serviceMonitorSelectorNilUsesHelmValues: false
        serviceMonitorSelector:
          matchLabels:
            app.kubernetes.io/part-of: gitops-infra-control-plane
        podMonitorSelectorNilUsesHelmValues: false
        podMonitorSelector:
          matchLabels:
            app.kubernetes.io/part-of: gitops-infra-control-plane
        ruleSelectorNilUsesHelmValues: false
        ruleSelector:
          matchLabels:
            app.kubernetes.io/part-of: gitops-infra-control-plane
        retention: 30d
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: standard
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi
    
    # Grafana Configuration
    grafana:
      enabled: true
      # Use secret management for admin password
      # adminPassword: "admin123"  # REMOVED - Use external secret management
      adminPasswordSecret: grafana-admin
      adminPasswordKey: password
      service:
        type: LoadBalancer
      persistence:
        enabled: true
        size: 10Gi
      dashboardProviders:
        dashboardproviders.yaml:
          apiVersion: 1
          providers:
            - name: 'gitops-infra'
              orgId: 1
              folder: 'GitOps Infrastructure'
              type: file
              disableDeletion: false
              editable: true
              options:
                path: /var/lib/grafana/dashboards/gitops-infra
      dashboards:
        gitops-infra:
          gitops-dependency-graph:
            url: https://raw.githubusercontent.com/gitops-infra/dashboards/main/dependency-graph.json
          gitops-reconciliation-status:
            url: https://raw.githubusercontent.com/gitops-infra/dashboards/main/reconciliation-status.json
          gitops-controller-metrics:
            url: https://raw.githubusercontent.com/gitops-infra/dashboards/main/controller-metrics.json
    
    # AlertManager Configuration
    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 3
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: standard
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 10Gi
---
# Jaeger for Distributed Tracing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: flux-system
  labels:
    app.kubernetes.io/name: jaeger
    app.kubernetes.io/component: gitops-infra-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: jaeger
  template:
    metadata:
      labels:
        app.kubernetes.io/name: jaeger
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "16686"
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:1.35
        ports:
        - containerPort: 16686
          name: ui
        - containerPort: 14268
          name: collector
        - containerPort: 6831
          name: agent-compact
        - containerPort: 6832
          name: agent-binary
        env:
        - name: COLLECTOR_ZIPKIN_HTTP_PORT
          value: "9411"
        - name: SPAN_STORAGE_TYPE
          value: "memory"
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
# Service for Jaeger
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: flux-system
  labels:
    app.kubernetes.io/name: jaeger
spec:
  selector:
    app.kubernetes.io/name: jaeger
  ports:
  - name: ui
    port: 16686
    targetPort: 16686
  - name: collector
    port: 14268
    targetPort: 14268
  type: ClusterIP
---
# Loki for Log Aggregation
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: flux-system
  labels:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: gitops-infra-control-plane
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loki
    spec:
      containers:
      - name: loki
        image: grafana/loki:2.7.0
        ports:
        - containerPort: 3100
          name: http
        args:
        - -config.file=/etc/loki/local-config.yaml
        - -print-config-stderr=true
        volumeMounts:
        - name: config
          mountPath: /etc/loki
        - name: storage
          mountPath: /loki
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
      volumes:
      - name: config
        configMap:
          name: loki-config
      - name: storage
        emptyDir: {}
---
# Loki Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: flux-system
data:
  local-config.yaml: |
    auth_enabled: false
    
    server:
      http_listen_port: 3100
      
    ingester:
      lifecycler:
        address: 127.0.0.1
        ring:
          kvstore:
            store: inmemory
          replication_factor: 1
        final_sleep: 0s
      chunk_idle_period: 1h
      max_chunk_age: 1h
      chunk_target_size: 1048576
      chunk_retain_period: 30s
      
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
          
    storage_config:
      boltdb_shipper:
        active_index_directory: /loki/boltdb-shipper-active
        cache_location: /loki/boltdb-shipper-cache
        shared_store: filesystem
      filesystem:
        directory: /loki/chunks
        
    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      
    chunk_store_config:
      max_look_back_period: 0s
      
    table_manager:
      retention_deletes_enabled: false
      retention_period: 0s
---
# Service for Loki
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: flux-system
  labels:
    app.kubernetes.io/name: loki
spec:
  selector:
    app.kubernetes.io/name: loki
  ports:
  - name: http
    port: 3100
    targetPort: 3100
  type: ClusterIP
---
# Promtail for Log Collection
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: flux-system
  labels:
    app.kubernetes.io/name: promtail
    app.kubernetes.io/component: gitops-infra-control-plane
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: promtail
  template:
    metadata:
      labels:
        app.kubernetes.io/name: promtail
    spec:
      serviceAccountName: promtail
      containers:
      - name: promtail
        image: grafana/promtail:2.7.0
        args:
        - -config.file=/etc/promtail/config.yml
        - -client.url=http://loki:3100/loki/api/v1/push
        env:
        - name: HOSTNAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        volumeMounts:
        - name: config
          mountPath: /etc/promtail
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: varlog
          mountPath: /var/log
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      volumes:
      - name: config
        configMap:
          name: promtail-config
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: varlog
        hostPath:
          path: /var/log
---
# Promtail Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: flux-system
data:
  config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
      
    positions:
      filename: /tmp/positions.yaml
      
    clients:
      - url: http://loki:3100/loki/api/v1/push
        
    scrape_configs:
    - job_name: containers
      static_configs:
      - targets:
          - localhost
        labels:
          job: containerlogs
          __path__: /var/log/containers/*gitops-infra-control-plane*.log
          
      pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          expressions:
            correlation_id: correlation_id
            controller: controller
            resource: resource
            namespace: namespace
          source: attrs
      - labels:
          stream:
          correlation_id:
          controller:
          resource:
          namespace:
      - output:
          source: output
          
    - job_name: systemd
      systemd:
        units:
        - kubelet.service
        - docker.service
      labels:
        job: systemd
      pipeline_stages:
      - regex:
          expression: '(?P<correlation_id>[a-f0-9-]{36})'
      - labels:
          correlation_id:
---
# Service Account for Promtail
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: flux-system
---
# ClusterRole for Promtail
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
- apiGroups: [""]
  resources:
  - nodes
  - services
  - pods
  - endpoints
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/metrics"]
  verbs: ["get"]
---
# ClusterRoleBinding for Promtail
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
- kind: ServiceAccount
  name: promtail
  namespace: flux-system
---
# Correlation ID Injector
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: correlation-id-injector
webhooks:
- name: correlation-id-injector.gitops-infra-control-plane.svc
  clientConfig:
    service:
      name: correlation-id-injector
      namespace: flux-system
      path: "/mutate"
  rules:
  - operations: ["CREATE"]
    apiGroups: [""]
    apiVersions: ["v1"]
    resources: ["pods"]
  failurePolicy: Fail
  sideEffects: None
  admissionReviewVersions: ["v1", "v1beta1"]
---
# Correlation ID Injector Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: correlation-id-injector
  namespace: flux-system
  labels:
    app.kubernetes.io/name: correlation-id-injector
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: correlation-id-injector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: correlation-id-injector
    spec:
      containers:
      - name: injector
        image: openpolicyagent/opa:0.46.0
        command:
        - opa
        - run
        - --server
        - --addr=localhost:8080
        - --log-level=debug
        - --log-format=json
        - /policy/correlation-id.rego
        ports:
        - containerPort: 8080
          name: webhook
        volumeMounts:
        - name: policy
          mountPath: /policy
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
      - name: webhook
        image: openpolicyagent/kube-mgmt:0.46.0
        args:
        - run
        - --server=https://$(POD_NAME).$(POD_NAMESPACE).svc
        - --auth-type=serviceAccount
        - --opa-url=http://localhost:8080
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
      volumes:
      - name: policy
        configMap:
          name: correlation-id-policy
---
# Correlation ID Policy
apiVersion: v1
kind: ConfigMap
metadata:
  name: correlation-id-policy
  namespace: flux-system
data:
  correlation-id.rego: |
    package gitops.infra.controlplane
    
    default mutate = false
    
    mutate = {
        "patches": patches
    } {
        input.request.kind.kind == "Pod"
        input.request.operation == "CREATE"
        has_gitops_labels(input.request.object.metadata.labels)
        patches := [generate_correlation_id_patch(input.request.object)]
    }
    
    has_gitops_labels(labels) {
        object.get(labels, "app.kubernetes.io/part-of", "") == "gitops-infra-control-plane"
    }
    
    generate_correlation_id_patch(obj) = patch {
        patch := {
            "op": "add",
            "path": "/metadata/annotations/gitops-infra-control-plane.io~1correlation-id",
            "value": generate_uuid()
        }
    }
    
    generate_uuid = sprintf("%s-%s-%s-%s-%s", [
        rand.string(8, "0123456789abcdef"),
        rand.string(4, "0123456789abcdef"),
        rand.string(4, "0123456789abcdef"),
        rand.string(4, "0123456789abcdef"),
        rand.string(12, "0123456789abcdef")
    ])
---
# Service for Correlation ID Injector
apiVersion: v1
kind: Service
metadata:
  name: correlation-id-injector
  namespace: flux-system
  labels:
    app.kubernetes.io/name: correlation-id-injector
spec:
  selector:
    app.kubernetes.io/name: correlation-id-injector
  ports:
  - name: webhook
    port: 443
    targetPort: 8080
---
# Service Account for Correlation ID Injector
apiVersion: v1
kind: ServiceAccount
metadata:
  name: correlation-id-injector
  namespace: flux-system
---
# ClusterRole for Correlation ID Injector
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: correlation-id-injector
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["mutatingwebhookconfigurations"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
# ClusterRoleBinding for Correlation ID Injector
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: correlation-id-injector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: correlation-id-injector
subjects:
- kind: ServiceAccount
  name: correlation-id-injector
  namespace: flux-system
