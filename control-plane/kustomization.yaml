apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: gitops-infra-control-plane
  namespace: flux-system
resources:
  - flux/
  - controllers/
  - karmada/
  - monitoring/
  - consensus/
dependsOn:
  - flux
labels:
  - pairs:
      managed-by: flux
      component: gitops-infra-control-plane
      platform: multi-cluster-gitops
