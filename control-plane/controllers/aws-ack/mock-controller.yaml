apiVersion: v1
kind: ServiceAccount
metadata:
  name: ack-ec2-controller
  namespace: ack-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ack-ec2-controller-mock
  namespace: ack-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ack-ec2-controller-mock
  template:
    metadata:
      labels:
        app: ack-ec2-controller-mock
    spec:
      serviceAccountName: ack-ec2-controller
      containers:
      - name: mock-controller
        image: nginx:alpine
        command: ["sleep", "3600"]
        env:
        - name: AWS_REGION
          value: us-east-1
        - name: AWS_ENDPOINT_URL
          value: "http://localstack.localstack.svc.cluster.local:4566"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
