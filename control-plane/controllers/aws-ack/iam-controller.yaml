apiVersion: v1
kind: ServiceAccount
metadata:
  name: ack-iam-controller
  namespace: ack-system
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/AckIAMControllerRole
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ack-iam-controller
  namespace: ack-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ack-iam-controller
  template:
    metadata:
      labels:
        app: ack-iam-controller
    spec:
      serviceAccountName: ack-iam-controller
      containers:
      - name: ack-iam-controller
        image: public.ecr.aws/aws-controllers-k8s/iam-controller:v0.1.2
        args:
        - --aws-region=us-west-2
        env:
        - name: AWS_REGION
          value: us-west-2
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
