apiVersion: v1
kind: ServiceAccount
metadata:
  name: azureserviceoperator-controller-manager
  namespace: azureserviceoperator-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: azureserviceoperator-controller-manager
  namespace: azureserviceoperator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azureserviceoperator-controller-manager
  template:
    metadata:
      labels:
        app: azureserviceoperator-controller-manager
    spec:
      serviceAccountName: azureserviceoperator-controller-manager
      containers:
      - name: manager
        image: mcr.microsoft.com/azure-service-operator/aso-controller:v2.5.0
        args:
        - --leader-elect
        env:
        - name: AZURE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: aso-credentials
              key: client-id
        - name: AZURE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: aso-credentials
              key: client-secret
        - name: AZURE_TENANT_ID
          valueFrom:
            secretKeyRef:
              name: aso-credentials
              key: tenant-id
        - name: AZURE_SUBSCRIPTION_ID
          valueFrom:
            secretKeyRef:
              name: aso-credentials
              key: subscription-id
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
