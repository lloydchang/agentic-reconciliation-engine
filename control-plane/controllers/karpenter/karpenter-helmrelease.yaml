apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: karpenter
  namespace: karpenter
spec:
  interval: 30m
  chart:
    spec:
      chart: karpenter
      version: "v0.37.0"
      sourceRef:
        kind: HelmRepository
        name: karpenter
        namespace: flux-system
  install:
    createNamespace: true
  dependsOn:
    - name: cert-manager
  values:
    settings:
      clusterName: "${CLUSTER_NAME}"
      clusterEndpoint: "${CLUSTER_ENDPOINT}"
      defaultInstanceProfile: "${INSTANCE_PROFILE}"
      interruptionQueueName: "${QUEUE_NAME}"
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: "${KARPENTER_ROLE_ARN}"
    controller:
      resources:
        requests:
          cpu: 1
          memory: 1Gi
        limits:
          cpu: 1
          memory: 1Gi
