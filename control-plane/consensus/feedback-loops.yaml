# Temporal Workflow for Consensus-Based Agent Feedback Loops
# Replaced bash-based CronJob with durable Temporal workflows for better concurrency and fault tolerance

apiVersion: temporal.io/v1alpha1
kind: WorkflowSpec
metadata:
  name: consensus-feedback-loops
  namespace: control-plane
spec:
  name: ConsensusFeedbackWorkflow
  description: "Durable workflow for consensus-based agent feedback loops with Raft coordination"
  execution:
    maxAttempts: 3
    timeout: 3600s  # 1 hour
    retryPolicy:
      initialInterval: 1s
      backoffCoefficient: 2.0
      maximumInterval: 100s
      maximumAttempts: 5
  signal:
    name: ConsensusSignal
    description: "Signal for consensus proposals"
  query:
    name: GetConsensusState
    description: "Query current consensus state"
  activities:
  - name: LocalOptimizationActivity
    description: "Local agent optimization with 30s feedback loop"
    timeout: 30s
  - name: ConsensusProposalActivity
    description: "Propose changes to consensus"
    timeout: 60s
  - name: VoteCollectionActivity
    description: "Collect votes from agent quorum"
    timeout: 300s
  - name: ChangeExecutionActivity
    description: "Execute consensus-approved changes"
    timeout: 180s
  schedule:
    interval: 30s  # Tight feedback loop
    enabled: true
    timezone: UTC
---
# Alternative: Python-based CronJob for Consensus Feedback Loops
# For users who prefer Python runtime over Go (Temporal) or bash
# Object-oriented approach with better error handling than bash

apiVersion: batch/v1
kind: CronJob
metadata:
  name: consensus-feedback-loops-python
  namespace: control-plane
  annotations:
    description: "Python-based alternative to Temporal workflow for consensus feedback loops"
spec:
  schedule: "*/1 * * * *"  # Every minute for tight feedback
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: consensus-agent-sa
          containers:
          - name: feedback-loop
            image: python:3.11-slim  # Or custom image with consensus libraries
            command:
            - python3
            - /app/consensus_feedback_loop.py
            env:
            - name: CONSENSUS_ENABLED
              value: "true"
            - name: FEEDBACK_INTERVAL
              value: "30s"
            - name: AGENT_QUORUM
              value: "3"
            - name: CONSENSUS_PROTOCOL
              value: "raft"
            volumeMounts:
            - name: consensus-scripts
              mountPath: /app
          volumes:
          - name: consensus-scripts
            configMap:
              name: consensus-python-scripts
          restartPolicy: OnFailure
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
# Alternative: Bash-based CronJob for Consensus Feedback Loops
# For users who prefer not to deploy Temporal infrastructure
# Less efficient than Temporal but simpler to deploy

apiVersion: batch/v1
kind: CronJob
metadata:
  name: consensus-feedback-loops-bash
  namespace: control-plane
  annotations:
    description: "Bash-based alternative to Temporal workflow for consensus feedback loops"
spec:
  schedule: "*/1 * * * *"  # Every minute for tight feedback
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: consensus-agent-sa
          containers:
          - name: feedback-loop
            image: lloydchang/ai-agents-sandbox:latest
            command:
            - bash
            - -c
            - |
              # Simple bash-based consensus feedback loop
              # Note: Less robust than Temporal but doesn't require additional infrastructure

              # Local optimization loop (runs for ~30 seconds)
              timeout 30 /app/local_optimizer.sh || echo "Local optimization timed out"

              # Check if consensus proposal needed
              if [ -f /tmp/consensus_proposal ]; then
                /app/consensus_proposer.sh
                rm -f /tmp/consensus_proposal
              fi

              # Collect votes if proposal active
              if [ -f /tmp/active_proposal ]; then
                /app/vote_collector.sh
              fi

              # Execute approved changes
              if [ -f /tmp/approved_changes ]; then
                /app/change_executor.sh
                rm -f /tmp/approved_changes
              fi
            env:
            - name: CONSENSUS_ENABLED
              value: "true"
            - name: FEEDBACK_INTERVAL
              value: "30s"
            - name: AGENT_QUORUM
              value: "3"
            - name: CONSENSUS_PROTOCOL
              value: "raft"
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 1Gi
          restartPolicy: OnFailure
