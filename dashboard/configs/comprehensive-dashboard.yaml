apiVersion: v1
kind: Service
metadata:
  name: comprehensive-dashboard
  namespace: ai-infrastructure
  labels:
    app: comprehensive-dashboard
    component: analytics
spec:
  selector:
    app: comprehensive-dashboard
  ports:
  - name: http
    port: 8082
    targetPort: 8082
    protocol: TCP
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comprehensive-dashboard
  namespace: ai-infrastructure
  labels:
    app: comprehensive-dashboard
    component: analytics
    version: v1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comprehensive-dashboard
  template:
    metadata:
      labels:
        app: comprehensive-dashboard
        component: analytics
    spec:
      containers:
      - name: dashboard
        image: nginx:alpine
        ports:
        - containerPort: 8082
          name: http
          protocol: TCP
        env:
        - name: PORT
          value: "8082"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
