apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: ai-portal-api-vpa
  namespace: ai-infrastructure
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: ai-infrastructure-portal
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: ai-infrastructure-portal
      minAllowed:
        cpu: 100m
        memory: 128Mi
      maxAllowed:
        cpu: 2000m
        memory: 4Gi
      controlledResources: ["cpu", "memory"]
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: ai-portal-dashboard-vpa
  namespace: ai-infrastructure
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: ai-infrastructure-portal-dashboard
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: ai-infrastructure-portal-dashboard
      minAllowed:
        cpu: 100m
        memory: 256Mi
      maxAllowed:
        cpu: 1500m
        memory: 3Gi
      controlledResources: ["cpu", "memory"]
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: nginx-load-balancer-vpa
  namespace: ai-infrastructure
spec:
  targetRef:
    apiVersion: "apps/v1"
    kind: Deployment
    name: nginx-load-balancer
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: nginx
      minAllowed:
        cpu: 50m
        memory: 64Mi
      maxAllowed:
        cpu: 1000m
        memory: 1Gi
      controlledResources: ["cpu", "memory"]
