apiVersion: v1
kind: ConfigMap
metadata:
  name: kubectl-binary
  namespace: ai-infrastructure
data:
  kubectl: |
    #!/bin/sh
    # Simple wrapper to call kubectl from the host
    curl -s "http://kubernetes.default.svc.cluster.local:8080/api/v1/namespaces/$1/pods" | jq '.items | length'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend-real
  namespace: ai-infrastructure
  labels:
    app: dashboard-backend-real
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend-real
  template:
    metadata:
      labels:
        app: dashboard-backend-real
    spec:
      serviceAccountName: dashboard-backend
      containers:
      - name: backend
        image: python:3.9-slim
        ports:
        - containerPort: 5000
        command: ["sh", "-c"]
        args:
        - |
          pip install flask flask-cors requests &&
          python /app/app.py
        volumeMounts:
        - name: script-volume
          mountPath: /app
        - name: kubectl-wrapper
          mountPath: /usr/local/bin/kubectl
          subPath: kubectl
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      volumes:
      - name: script-volume
        configMap:
          name: backend-script
      - name: kubectl-wrapper
        configMap:
          name: kubectl-binary
          defaultMode: 0755
