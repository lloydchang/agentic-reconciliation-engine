apiVersion: apps/v1
kind: Deployment
metadata:
  name: dynamic-data-service
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dynamic-data-service
  template:
    metadata:
      labels:
        app: dynamic-data-service
    spec:
      serviceAccountName: default
      containers:
      - name: dynamic-data-api
        image: python:3.9-slim
        ports:
        - containerPort: 5000
        env:
        - name: KUBERNETES_SERVICE_HOST
          valueFrom:
            configMapKeyRef:
              name: kubernetes-config
              key: api-server
              optional: true
        command:
        - python3
        - -c
        - |
          from flask import Flask, jsonify
          from kubernetes import client, config
          import datetime
          import random
          import json

          app = Flask(__name__)

          def get_k8s_data():
              try:
                  # Try in-cluster config first, fall back to kubeconfig
                  try:
                      config.load_incluster_config()
                  except:
                      config.load_kube_config()

                  v1 = client.CoreV1Api()
                  apps_v1 = client.AppsV1Api()

                  # Get real pod count
                  pods = v1.list_pod_for_all_namespaces()
                  total_pods = len(pods.items)

                  # Get agent-specific pods
                  agent_pods = [p for p in pods.items if 'agent' in p.metadata.name.lower()]
                  agent_pods_count = len(agent_pods)

                  # Get node count
                  nodes = v1.list_node()
                  node_count = len(nodes.items)

                  # Get deployments
                  deployments = apps_v1.list_deployment_for_all_namespaces()
                  deployment_count = len(deployments.items)

                  # Generate dynamic agent data based on real pods
                  agents = []
                  if agent_pods_count > 0:
                      agent_types = [
                          {"name": "consensus-leader-agent", "type": "Consensus Coordination"},
                          {"name": "cost-optimizer-agent", "type": "Resource Optimization"},
                          {"name": "security-validator-agent", "type": "Security Compliance"},
                          {"name": "performance-tuner-agent", "type": "Performance Monitoring"}
                      ]

                      for i, agent_type in enumerate(agent_types[:agent_pods_count]):
                          # Use real pod data if available, otherwise simulate
                          pod_name = agent_pods[i].metadata.name if i < len(agent_pods) else f"{agent_type['name']}-pod"

                          agents.append({
                              "name": agent_type["name"],
                              "type": agent_type["type"],
                              "status": "Active",
                              "description": f"Autonomous {agent_type['type'].lower()} agent",
                              "metrics": {
                                  "decisions": random.randint(10, 25),
                                  "consensus_rounds": random.randint(1, 6),
                                  "participation_rate": f"{random.randint(90, 100)}%"
                              } if "consensus" in agent_type["name"] else {
                                  "optimizations": random.randint(5, 15),
                                  "cost_savings": f"{random.randint(10, 25)}%",
                                  "recommendations": random.randint(3, 8)
                              } if "cost" in agent_type["name"] else {
                                  "validations": random.randint(15, 35),
                                  "violations": 0,
                                  "compliance_score": f"{random.randint(95, 100)}%"
                              } if "security" in agent_type["name"] else {
                                  "tuning_actions": random.randint(4, 12),
                                  "performance_score": f"{random.randint(85, 98)}%",
                                  "response_time": f"{random.uniform(1.5, 3.2):.1f}s"
                              },
                              "last_activity": f"{random.randint(1, 15)} minutes ago"
                          })

                  return {
                      "agent_pods": agent_pods_count,
                      "nodes": node_count,
                      "pods": total_pods,
                      "deployments": deployment_count,
                      "timestamp": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
                      "agents": agents,
                      "swarm_metrics": {
                          "total_decisions": sum(agent.get('metrics', {}).get('decisions', 0) for agent in agents),
                          "consensus_efficiency": f"{random.randint(90, 98)}%",
                          "coordination_latency": f"{random.uniform(1.2, 2.5):.1f}s",
                          "agent_collaboration": "High" if agent_pods_count > 2 else "Medium"
                      }
                  }
              except Exception as e:
                  # Fallback to demo data if K8s API fails
                  print(f"K8s API error: {e}")
                  return {
                      "agent_pods": 4,
                      "nodes": 1,
                      "pods": 10,
                      "deployments": 8,
                      "timestamp": datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
                      "agents": [
                          {
                              "name": "consensus-leader-agent",
                              "type": "Consensus Coordination",
                              "status": "Active",
                              "description": "Raft-based consensus coordination for agent decisions",
                              "metrics": {
                                  "decisions": random.randint(10, 20),
                                  "consensus_rounds": random.randint(1, 5),
                                  "participation_rate": f"{random.randint(90, 100)}%"
                              },
                              "last_activity": f"{random.randint(1, 10)} minutes ago"
                          },
                          {
                              "name": "cost-optimizer-agent",
                              "type": "Resource Optimization",
                              "status": "Active",
                              "description": "Autonomous cost optimization and resource tuning",
                              "metrics": {
                                  "optimizations": random.randint(5, 12),
                                  "cost_savings": f"{random.randint(12, 22)}%",
                                  "recommendations": random.randint(3, 7)
                              },
                              "last_activity": f"{random.randint(2, 12)} minutes ago"
                          },
                          {
                              "name": "security-validator-agent",
                              "type": "Security Compliance",
                              "status": "Active",
                              "description": "Security policy validation and compliance checking",
                              "metrics": {
                                  "validations": random.randint(18, 28),
                                  "violations": 0,
                                  "compliance_score": f"{random.randint(95, 100)}%"
                              },
                              "last_activity": f"{random.randint(1, 8)} minutes ago"
                          },
                          {
                              "name": "performance-tuner-agent",
                              "type": "Performance Monitoring",
                              "status": "Active",
                              "description": "Performance monitoring and automatic tuning",
                              "metrics": {
                                  "tuning_actions": random.randint(4, 10),
                                  "performance_score": f"{random.randint(88, 96)}%",
                                  "response_time": f"{random.uniform(1.8, 2.8):.1f}s"
                              },
                              "last_activity": f"{random.randint(1, 6)} minutes ago"
                          }
                      ],
                      "swarm_metrics": {
                          "total_decisions": random.randint(45, 65),
                          "consensus_efficiency": f"{random.randint(90, 98)}%",
                          "coordination_latency": f"{random.uniform(1.3, 2.2):.1f}s",
                          "agent_collaboration": "High"
                      }
                  }

          @app.route('/api/cluster-status')
          def cluster_status():
              data = get_k8s_data()
              response = jsonify(data)
              response.headers.add('Access-Control-Allow-Origin', '*')
              response.headers.add('Access-Control-Allow-Methods', 'GET, POST, OPTIONS')
              response.headers.add('Access-Control-Allow-Headers', 'Content-Type')
              return response

          @app.route('/health')
          def health():
              return jsonify({"status": "healthy", "timestamp": datetime.datetime.utcnow().isoformat()})

          html_template = """
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>AI Agent Orchestration Dashboard</title>
              <style>
                  body {
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      margin: 0;
                      padding: 20px;
                      min-height: 100vh;
                  }
                  .container {
                      max-width: 1400px;
                      margin: 0 auto;
                      background: rgba(255, 255, 255, 0.95);
                      border-radius: 20px;
                      padding: 30px;
                      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
                  }
                  .header {
                      text-align: center;
                      margin-bottom: 40px;
                  }
                  .header h1 {
                      color: #2c3e50;
                      font-size: 2.5rem;
                      margin-bottom: 10px;
                  }
                  .header p {
                      color: #7f8c8d;
                      font-size: 1.1rem;
                  }
                  #timestamp {
                      color: #3498db;
                      font-weight: bold;
                      margin-top: 10px;
                  }
                  .stats-grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                      gap: 20px;
                      margin-bottom: 40px;
                  }
                  .stat-card {
                      background: white;
                      border-radius: 12px;
                      padding: 20px;
                      text-align: center;
                      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
                      border-left: 4px solid #3498db;
                  }
                  .stat-value {
                      font-size: 2rem;
                      font-weight: bold;
                      color: #2c3e50;
                      margin-bottom: 5px;
                  }
                  .stat-label {
                      color: #7f8c8d;
                      font-size: 0.9rem;
                  }
                  .agent-grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                      gap: 25px;
                  }
                  .agent-card {
                      background: white;
                      border-radius: 15px;
                      padding: 25px;
                      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
                      transition: transform 0.3s ease, box-shadow 0.3s ease;
                      position: relative;
                      overflow: hidden;
                  }
                  .agent-card::before {
                      content: '';
                      position: absolute;
                      top: 0;
                      left: 0;
                      right: 0;
                      height: 4px;
                      background: linear-gradient(90deg, #3498db, #9b59b6);
                  }
                  .agent-card:hover {
                      transform: translateY(-5px);
                      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
                  }
                  .agent-card h3 {
                      margin: 0 0 10px 0;
                      color: #2c3e50;
                      font-size: 1.3rem;
                  }
                  .agent-type {
                      color: #9b59b6;
                      font-weight: bold;
                      margin-bottom: 15px;
                      font-size: 0.9rem;
                      text-transform: uppercase;
                      letter-spacing: 0.5px;
                  }
                  .status {
                      display: inline-block;
                      padding: 5px 15px;
                      border-radius: 20px;
                      color: white;
                      font-size: 0.8rem;
                      font-weight: bold;
                      text-transform: uppercase;
                      margin-bottom: 15px;
                  }
                  .status.Active {
                      background: linear-gradient(45deg, #27ae60, #2ecc71);
                  }
                  .status.Inactive {
                      background: linear-gradient(45deg, #e74c3c, #c0392b);
                  }
                  .description {
                      color: #34495e;
                      margin-bottom: 20px;
                      line-height: 1.5;
                  }
                  .metrics {
                      display: grid;
                      grid-template-columns: 1fr 1fr;
                      gap: 10px;
                      margin-bottom: 15px;
                  }
                  .metric {
                      background: #f8f9fa;
                      padding: 10px;
                      border-radius: 8px;
                      text-align: center;
                  }
                  .metric strong {
                      color: #3498db;
                      display: block;
                      font-size: 0.8rem;
                      margin-bottom: 2px;
                      text-transform: uppercase;
                      letter-spacing: 0.5px;
                  }
                  .metric-value {
                      color: #2c3e50;
                      font-size: 1.1rem;
                      font-weight: bold;
                  }
                  .last-activity {
                      color: #7f8c8d;
                      font-size: 0.9rem;
                      font-style: italic;
                      text-align: center;
                      margin-top: 15px;
                      padding-top: 15px;
                      border-top: 1px solid #ecf0f1;
                  }
                  .swarm-metrics {
                      background: white;
                      border-radius: 15px;
                      padding: 25px;
                      margin-top: 30px;
                      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
                  }
                  .swarm-metrics h2 {
                      color: #2c3e50;
                      margin-bottom: 20px;
                      text-align: center;
                  }
                  .swarm-grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                      gap: 15px;
                  }
                  .swarm-metric {
                      text-align: center;
                      padding: 15px;
                      background: #f8f9fa;
                      border-radius: 10px;
                  }
                  .swarm-metric strong {
                      color: #9b59b6;
                      display: block;
                      font-size: 0.9rem;
                      margin-bottom: 5px;
                  }
                  .swarm-metric .value {
                      font-size: 1.2rem;
                      font-weight: bold;
                      color: #2c3e50;
                  }
              </style>
          </head>
          <body>
              <div class="container">
                  <div class="header">
                      <h1>🚀 AI Agent Orchestration Dashboard</h1>
                      <p>Live monitoring of autonomous AI agents and their probabilistic decision-making outcomes</p>
                      <div id="timestamp">Loading...</div>
                  </div>
                  
                  <div class="stats-grid">
                      <div class="stat-card">
                          <div class="stat-value" id="agent-pods">-</div>
                          <div class="stat-label">Active Agent Pods</div>
                      </div>
                      <div class="stat-card">
                          <div class="stat-value" id="total-nodes">-</div>
                          <div class="stat-label">Cluster Nodes</div>
                      </div>
                      <div class="stat-card">
                          <div class="stat-value" id="total-pods">-</div>
                          <div class="stat-label">Total Pods</div>
                      </div>
                      <div class="stat-card">
                          <div class="stat-value" id="deployments">-</div>
                          <div class="stat-label">Deployments</div>
                      </div>
                  </div>
                  
                  <div class="agent-grid" id="agents"></div>
                  
                  <div class="swarm-metrics">
                      <h2>🤝 Swarm Intelligence Metrics</h2>
                      <div class="swarm-grid" id="swarm-metrics"></div>
                  </div>
              </div>
              
              <script>
                  function updateDashboard() {
                      fetch('/api/cluster-status')
                          .then(response => {
                              if (!response.ok) {
                                  throw new Error('Network response was not ok');
                              }
                              return response.json();
                          })
                          .then(data => {
                              // Update timestamp
                              const timestamp = new Date(data.timestamp);
                              document.getElementById('timestamp').textContent = `Last updated: ${timestamp.toLocaleString()} (${Math.floor((Date.now() - timestamp) / 1000)}s ago)`;
                              
                              // Update stats
                              document.getElementById('agent-pods').textContent = data.agent_pods;
                              document.getElementById('total-nodes').textContent = data.nodes;
                              document.getElementById('total-pods').textContent = data.pods;
                              document.getElementById('deployments').textContent = data.deployments;
                              
                              // Update agents
                              const agentsDiv = document.getElementById('agents');
                              agentsDiv.innerHTML = data.agents.map(agent => `
                                  <div class="agent-card">
                                      <h3>${agent.name.replace(/-/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</h3>
                                      <div class="agent-type">${agent.type}</div>
                                      <span class="status ${agent.status}">${agent.status}</span>
                                      <p class="description">${agent.description}</p>
                                      <div class="metrics">
                                          ${Object.entries(agent.metrics).map(([key, value]) => `
                                              <div class="metric">
                                                  <strong>${key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</strong>
                                                  <div class="metric-value">${value}</div>
                                              </div>
                                          `).join('')}
                                      </div>
                                      <div class="last-activity">⏰ ${agent.last_activity}</div>
                                  </div>
                              `).join('');
                              
                              // Update swarm metrics
                              const swarmDiv = document.getElementById('swarm-metrics');
                              swarmDiv.innerHTML = Object.entries(data.swarm_metrics).map(([key, value]) => `
                                  <div class="swarm-metric">
                                      <strong>${key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</strong>
                                      <div class="value">${value}</div>
                                  </div>
                              `).join('');
                          })
                          .catch(error => {
                              console.error('Error updating dashboard:', error);
                              document.getElementById('timestamp').textContent = 'Error loading data...';
                          });
                  }
                  
                  // Initial load
                  updateDashboard();
                  
                  // Update every 3 seconds for live experience
                  setInterval(updateDashboard, 3000);
              </script>
          </body>
          </html>
          """

          @app.route('/')
          def index():
              return html_template

          if __name__ == '__main__':
              app.run(host='0.0.0.0', port=5000, debug=False)

---
apiVersion: v1
kind: Service
metadata:
  name: dynamic-data-service
  namespace: monitoring
spec:
  selector:
    app: dynamic-data-service
  ports:
  - port: 5000
    targetPort: 5000
