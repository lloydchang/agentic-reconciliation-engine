apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: ai-memory-storage
  annotations:
    storageclass.kubernetes.io/is-default-class: "false"
provisioner: kubernetes.io/aws-ebs  # Adjust for your cloud provider
parameters:
  type: gp3
  encrypted: "true"
allowVolumeExpansion: true
reclaimPolicy: Retain
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: memory-agent-pvc
  namespace: ai-infrastructure
  annotations:
    # Enable volume expansion monitoring
    volume.beta.kubernetes.io/storage-class: "ai-memory-storage"
    # Prometheus monitoring annotations
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: ai-memory-storage
  resources:
    requests:
      storage: 10Gi
