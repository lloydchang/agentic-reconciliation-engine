---
name: opensource-variant
version: "1.0.0"
description: "Open source variant migrated from variants/opensource/ with core Flux, controllers, and community monitoring stack"
category: composed
base_path: "composed"
base_version: "main"
license: "AGPLv3"
risk_level: low
autonomy: fully_auto

maintainer:
  name: "GitOps Infrastructure Control Plane Community"
  email: "community@gitops-infra-control-plane.org"
  organization: "GitOps Infrastructure Control Plane"
  url: "https://github.com/gitops-infra-control-plane"

tags:
  - opensource
  - composed
  - variant
  - flux
  - community
  - monitoring
  - agplv3

compatibility:
  min_base: "main"
  kubernetes: ">=1.20"
  flux: ">=2.2.3"

dependencies:
  - name: "control-plane"
    version: ">=main"
    optional: false
  - name: "flux-components"
    version: ">=v2.2.3"
    optional: false
  - name: "community-monitoring"
    version: ">=1.0.0"
    optional: false

environment_variables:
  - name: FLUX_VERSION
    required: true
    description: "Flux version for open source"
    default: "v2.2.3"
  - name: MONITORING_STACK
    required: true
    description: "Monitoring stack configuration"
    default: "prometheus-grafana-oss"
  - name: SECURITY_LEVEL
    required: true
    description: "Security level configuration"
    default: "basic"
  - name: BACKUP_STRATEGY
    required: true
    description: "Backup strategy for open source"
    default: "gitops-native"

inputs:
  type: object
  properties:
    enable_monitoring:
      type: boolean
      default: true
      description: "Enable open source monitoring stack"
    enable_basic_security:
      type: boolean
      default: true
      description: "Enable basic security components"
    enable_audit_logging:
      type: boolean
      default: false
      description: "Enable audit logging"
    resource_limits:
      type: object
      properties:
        cpu:
          type: string
          default: "1000m"
        memory:
          type: string
          default: "2Gi"
      description: "Resource limits for open source deployment"
  required:
    - enable_monitoring

outputs:
  type: object
  properties:
    deployment_status:
      type: string
      enum: ["deployed", "failed", "partial"]
      description: "Open source variant deployment status"
    components_deployed:
      type: array
      items:
        type: string
      description: "List of deployed components"
    monitoring_status:
      type: object
      properties:
        prometheus:
          type: string
          enum: ["active", "inactive", "error"]
        grafana:
          type: string
          enum: ["active", "inactive", "error"]
      description: "Monitoring component status"
    flux_status:
      type: object
      properties:
        kustomize_controller:
          type: string
          enum: ["active", "inactive", "error"]
        helm_controller:
          type: string
          enum: ["active", "inactive", "error"]
        source_controller:
          type: string
          enum: ["active", "inactive", "error"]
      description: "Flux component status"
    resource_usage:
      type: object
      properties:
        cpu_usage:
          type: string
        memory_usage:
          type: string
        storage_usage:
          type: string
      description: "Resource usage statistics"
  required:
    - deployment_status
    - components_deployed

examples:
  - name: "Deploy open source variant"
    description: "Deploy complete open source variant with community components"
    command: "kustomize build overlays/composed/opensource-variant"
    expected_output: "Open source variant with core Flux, monitoring, and community components deployed"
  - name: "Deploy with custom resources"
    description: "Deploy open source variant with custom resource limits"
    command: "kustomize build overlays/composed/opensource-variant --resource-limits cpu=2000m,memory=4Gi"
    expected_output: "Open source variant deployed with custom resource limits"

resources:
  cpu: "1000m"
  memory: "2Gi"
  storage: "10Gi"

human_gate:
  required: false
  description: "No human approval required for open source variant deployment"
