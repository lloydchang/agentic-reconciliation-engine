---
name: enterprise-variant
version: "1.0.0"
description: "Enterprise variant migrated from variants/enterprise/ with enhanced Flux, controllers, monitoring, security, and backup components"
category: composed
base_path: "composed"
base_version: "main"
license: "Commercial"
risk_level: medium
autonomy: conditional

maintainer:
  name: "GitOps Infrastructure Control Plane"
  email: "enterprise@gitops-infra-control-plane.org"
  organization: "GitOps Infrastructure Control Plane"
  url: "https://github.com/gitops-infra-control-plane"

tags:
  - enterprise
  - composed
  - variant
  - flux
  - monitoring
  - security
  - backup
  - compliance

compatibility:
  min_base: "main"
  kubernetes: ">=1.20"
  flux: ">=2.2.3"

dependencies:
  - name: "control-plane"
    version: ">=main"
    optional: false
  - name: "enhanced-flux-controllers"
    version: ">=v2.2.3"
    optional: false
  - name: "enterprise-monitoring"
    version: ">=1.0.0"
    optional: false
  - name: "enterprise-security"
    version: ">=1.0.0"
    optional: false

environment_variables:
  - name: FLUX_VERSION
    required: true
    description: "Flux version for enterprise"
    default: "v2.2.3-enterprise"
  - name: MONITORING_STACK
    required: true
    description: "Monitoring stack configuration"
    default: "grafana-enterprise-honeycomb"
  - name: SECURITY_LEVEL
    required: true
    description: "Security level configuration"
    default: "enhanced"
  - name: COMPLIANCE_FRAMEWORK
    required: true
    description: "Compliance framework to follow"
    default: "SOC2-HIPAA-GDPR"

inputs:
  type: object
  properties:
    enable_backup:
      type: boolean
      default: true
      description: "Enable enterprise backup and DR"
    enable_security:
      type: boolean
      default: true
      description: "Enable enhanced security components"
    enable_monitoring:
      type: boolean
      default: true
      description: "Enable enterprise monitoring stack"
    compliance_framework:
      type: string
      enum: ["SOC2", "HIPAA", "GDPR", "SOC2-HIPAA-GDPR"]
      default: "SOC2-HIPAA-GDPR"
      description: "Compliance framework to implement"
    multi_tenancy:
      type: boolean
      default: true
      description: "Enable multi-tenancy support"
  required:
    - compliance_framework

outputs:
  type: object
  properties:
    deployment_status:
      type: string
      enum: ["deployed", "failed", "partial"]
      description: "Enterprise variant deployment status"
    components_deployed:
      type: array
      items:
        type: string
      description: "List of deployed components"
    compliance_status:
      type: object
      properties:
        soc2:
          type: string
          enum: ["compliant", "non-compliant", "pending"]
        hipaa:
          type: string
          enum: ["compliant", "non-compliant", "pending"]
        gdpr:
          type: string
          enum: ["compliant", "non-compliant", "pending"]
      description: "Compliance status for each framework"
    monitoring_status:
      type: object
      properties:
        grafana:
          type: string
          enum: ["active", "inactive", "error"]
        honeycomb:
          type: string
          enum: ["active", "inactive", "error"]
        prometheus:
          type: string
          enum: ["active", "inactive", "error"]
      description: "Monitoring component status"
    backup_status:
      type: object
      properties:
        enabled:
          type: boolean
        schedule:
          type: string
        retention:
          type: string
        last_backup:
          type: string
      description: "Backup configuration and status"
  required:
    - deployment_status
    - components_deployed

examples:
  - name: "Deploy enterprise variant"
    description: "Deploy complete enterprise variant with all components"
    command: "kustomize build overlays/composed/enterprise-variant"
    expected_output: "Enterprise variant with enhanced Flux, monitoring, security, and backup deployed"
  - name: "Deploy with custom compliance"
    description: "Deploy enterprise variant with specific compliance framework"
    command: "kustomize build overlays/composed/enterprise-variant --enable-compliance SOC2"
    expected_output: "Enterprise variant deployed with SOC2 compliance"

resources:
  cpu: "2000m"
  memory: "4Gi"
  storage: "50Gi"

human_gate:
  required: true
  description: "Enterprise deployment requires approval for production environments"
  approvers: ["infrastructure-team@company.com", "security-team@company.com", "compliance-officer@company.com"]
  timeout_minutes: 120
