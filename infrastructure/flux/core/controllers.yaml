apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  # Flux CD Core Components (Critical Path)
  - https://github.com/fluxcd/community//manifests/crd?ref=main
  - https://github.com/fluxcd/flux2//manifests/base?ref=main

patches:
  # Resource limits for core controllers
  - patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
    target:
      kind: Deployment
      name: source-controller
      
  - patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
    target:
      kind: Deployment
      name: kustomize-controller
      
  - patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources
        value:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
    target:
      kind: Deployment
      name: helm-controller
