# Tailscale Mesh VPN Emulator
# Simulates Tailscale's mesh networking for Kubernetes

apiVersion: v1
kind: Namespace
metadata:
  name: tailscale
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: tailscale
  namespace: tailscale
spec:
  interval: 10m0s
  url: https://pkgs.tailscale.com/helmcharts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: tailscale-operator
  namespace: tailscale
spec:
  interval: 10m0s
  chart:
    spec:
      chart: tailscale-operator
      version: "1.58.0"
      sourceRef:
        kind: HelmRepository
        name: tailscale
      interval: 10m0s
  values:
    operatorConfig:
      hostname: tailscale-emulator
    authKey: "tskey-fake-key-for-emulation"
---
# Example Tailscale-enabled service
apiVersion: v1
kind: Service
metadata:
  name: tailscale-nginx
  namespace: default
  annotations:
    tailscale.com/expose: "true"
    tailscale.com/hostname: "nginx-emulator"
spec:
  selector:
    app: nginx-sample
  ports:
  - port: 80
    targetPort: 80
