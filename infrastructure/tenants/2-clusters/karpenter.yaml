---
apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["c", "m", "r"]
      expireAfter: 720h # 30 days
  limits:
    cpu: "1000"
    memory: 1000Gi
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h # 30 days
    budgets:
    - nodes: "10"
---
apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2 # Amazon Linux 2
  instanceTypes:
  - "c5.large"
  - "c5.xlarge"
  - "c5.2xlarge"
  - "m5.large"
  - "m5.xlarge"
  - "m5.2xlarge"
  - "r5.large"
  - "r5.xlarge"
  - "r5.2xlarge"
  subnetSelectorTerms:
  - tags:
      karpenter.sh/instancepool: "true"
      kubernetes.io/cluster: "hub-cluster" # This should be overridden per cluster
  securityGroupSelectorTerms:
  - tags:
      karpenter.sh/instancepool: "true"
      kubernetes.io/cluster: "hub-cluster" # This should be overridden per cluster
  requirements:
  - key: karpenter.k8s.aws/instance-category
    operator: In
    values: ["c", "m", "r"]
  - key: karpenter.k8s.aws/instance-generation
    operator: Gt
    values: ["2"]
