apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: cluster-infra
  namespace: flux-system
resources:
  - aws-eks-cluster.yaml
  - azure-aks-cluster.yaml
  - gcp-gke-cluster.yaml
dependsOn:
  - network-infra
labels:
  - pairs:
      managed-by: flux
      component: cluster-infra
      tier: compute
      platform: multi-cluster-gitops
