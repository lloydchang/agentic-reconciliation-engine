apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: cluster-infra
  namespace: flux-system
resources:
 - aws-eks-cluster.yaml
 - azure-aks-cluster.yaml
 - gcp-gke-cluster.yaml
# Karpenter node scaling
 - karpenter-namespace.yaml
 - karpenter-rbac.yaml
 - karpenter-helmrepo.yaml
 - karpenter-helmrelease.yaml
# Karpenter configurations (conditional based on cloud provider)
 - karpenter.yaml # AWS
 - karpenter-azure.yaml # Azure
 - karpenter-gcp.yaml # GCP
dependsOn:
  - network-infra
labels:
  - pairs:
      managed-by: flux
      component: cluster-infra
      tier: compute
      platform: multi-cluster-gitops
