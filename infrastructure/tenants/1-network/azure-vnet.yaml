---
apiVersion: network.azure.com/v1api20201101
kind: VirtualNetwork
metadata:
  name: gitops-vnet
  namespace: flux-system
  annotations:
    dependsOn.fluxcd.io/order: "2"
    dependsOn.fluxcd.io/resource-group: "gitops-resource-group"
    dependsOn.fluxcd.io/description: "Virtual network depends on resource group"
spec:
  location: eastus
  owner:
    name: gitops-resource-group
  addressSpace:
    addressPrefixes:
      - "10.1.0.0/16"
  subnets:
    - name: default
      properties:
        addressPrefix: "10.1.0.0/24"
    - name: aks-subnet
      properties:
        addressPrefix: "10.1.1.0/24"
---
apiVersion: resources.azure.com/v1api20200601
kind: ResourceGroup
metadata:
  name: gitops-resource-group
  namespace: flux-system
  annotations:
    dependsOn.fluxcd.io/order: "1"
    dependsOn.fluxcd.io/description: "Foundation resource group for all Azure resources"
spec:
  location: eastus
  tags:
    Environment: production
    ManagedBy: gitops-flux
