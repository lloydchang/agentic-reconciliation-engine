apiVersion: v1
kind: Namespace
metadata:
  name: nginx-plus
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: nginx-plus
  namespace: nginx-plus
spec:
  interval: 10m0s
  url: https://helm.nginx.com/stable
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nginx-plus-ingress
  namespace: nginx-plus
spec:
  interval: 10m0s
  chart:
    spec:
      chart: nginx-ingress
      version: "0.18.0"
      sourceRef:
        kind: HelmRepository
        name: nginx-plus
      interval: 10m0s
  values:
    controller:
      kind: deployment
      nginxplus: true
      nginxStatus:
        allowCidrs: "0.0.0.0/0"
      service:
        type: LoadBalancer
        externalTrafficPolicy: Local
      readinessProbe:
        initialDelaySeconds: 0
        periodSeconds: 1
      livenessProbe:
        initialDelaySeconds: 0
        periodSeconds: 1
    nginxServiceMesh:
      enable: false
    prometheus:
      create: true
      port: 9113
---
# Secret for NGINX Plus license
apiVersion: v1
kind: Secret
metadata:
  name: nginx-plus-license
  namespace: nginx-plus
type: Opaque
data:
  license.jwt: <base64-encoded-license-jwt>
  license.pem: <base64-encoded-license-pem>
