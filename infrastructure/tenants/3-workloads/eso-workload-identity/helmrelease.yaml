apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: external-secrets
      version: ">=0.9.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    serviceAccount:
      annotations:
        # EKS: eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/spoke-eks-eso-role
        # AKS: azure.workload.identity/client-id: "<IDENTITY_CLIENT_ID>"
        # GKE: iam.gke.io/gcp-service-account: "spoke-gke-eso@PROJECT_ID.iam.gserviceaccount.com"
        {}
    podLabels:
      # AKS workload identity
      # azure.workload.identity/use: "true"
      {}
    webhook:
      create: true
    certController:
      create: true
