apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: workload-infra
  namespace: flux-system
resources:
  # Core workloads that can be swapped based on ecosystem needs
  - orders-team-namespace.yaml
  - sealed-secrets.yaml
  - monitoring.yaml
  - eso-workload-identity/
  - database-orders.yaml
  - queue-orders.yaml
  - karpenter/
  - networking/
  - security/
  # Ecosystem-specific workloads (comment/uncomment based on needs)
  # Python/uv ecosystem
  # - apache-airflow/
  # Go ecosystem
  # - argo-workflows/
  # TypeScript/Node.js ecosystem
  # - backstage/
  # Java/JVM ecosystem
  # - camunda/
  # - temporal/
  # C#/.NET ecosystem
  # - app-dynamics/
  # Rust ecosystem
  # Add rust-specific workloads here
  # Shell/Bash ecosystem
  # Add shell-specific workloads here
dependsOn:
  - cluster-infra
labels:
  - pairs:
      managed-by: flux
      component: workload-infra
      tier: application
      platform: multi-cluster-gitops
