apiVersion: v1
kind: Namespace
metadata:
  name: pixie
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: pixie
  namespace: pixie
spec:
  interval: 10m0s
  url: https://pixie-operator-charts.storage.googleapis.com
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: pixie-operator
  namespace: pixie
spec:
  interval: 10m0s
  chart:
    spec:
      chart: pixie-operator
      version: "0.0.11"
      sourceRef:
        kind: HelmRepository
        name: pixie
      interval: 10m0s
  values:
    clusterName: gitops-workload-cluster
