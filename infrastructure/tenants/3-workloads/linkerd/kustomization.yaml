apiVersion: v1
kind: Namespace
metadata:
  name: linkerd
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: linkerd2
  namespace: linkerd
spec:
  interval: 10m0s
  url: https://helm.linkerd.io/stable
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: linkerd2
  namespace: linkerd
spec:
  interval: 10m0s
  chart:
    spec:
      chart: linkerd2
      version: "30.12.0"
      sourceRef:
        kind: HelmRepository
        name: linkerd2
      interval: 10m0s
  values:
    controllerImage: cr.l5d.io/linkerd/controller
    webImage: cr.l5d.io/linkerd/web
    proxyInjector:
      externalSecret: true
    profileValidator:
      caBundle: ""
    tap:
      caBundle: ""
    identityTrustAnchorsPEM: |
      -----BEGIN CERTIFICATE-----
      MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAwIJHtRWGpIcL
      [truncated - use cert-manager or real cert]
      -----END CERTIFICATE-----
