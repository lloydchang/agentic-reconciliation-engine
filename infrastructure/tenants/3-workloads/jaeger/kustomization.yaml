apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: jaeger
  namespace: observability
spec:
  interval: 10m0s
  url: https://jaegertracing.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: jaeger
  namespace: observability
spec:
  interval: 10m0s
  chart:
    spec:
      chart: jaeger
      version: "0.71.0"
      sourceRef:
        kind: HelmRepository
        name: jaeger
      interval: 10m0s
  values:
    allInOne:
      enabled: true
      resources:
        requests:
          memory: "256Mi"
          cpu: "100m"
        limits:
          memory: "512Mi"
          cpu: "200m"
