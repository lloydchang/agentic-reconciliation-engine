apiVersion: v1
kind: Namespace
metadata:
  name: observability
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: newrelic
  namespace: observability
spec:
  interval: 10m0s
  url: https://helm-charts.newrelic.com
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: newrelic-bundle
  namespace: observability
spec:
  interval: 10m0s
  chart:
    spec:
      chart: nri-bundle
      version: "5.0.0"
      sourceRef:
        kind: HelmRepository
        name: newrelic
      interval: 10m0s
  values:
    global:
      licenseKey: "your-newrelic-license-key"
      cluster: "your-cluster-name"
    newrelic-infrastructure:
      enabled: true
    kube-state-metrics:
      enabled: true
    prometheus:
      enabled: true
