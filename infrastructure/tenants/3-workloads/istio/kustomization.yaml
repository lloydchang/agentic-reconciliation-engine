apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: istio
  namespace: istio-system
spec:
  interval: 10m0s
  url: https://istio-release.storage.googleapis.com/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: istiod
      version: "1.19.0"
      sourceRef:
        kind: HelmRepository
        name: istio
      interval: 10m0s
  values:
    pilot:
      resources:
        requests:
          memory: "512Mi"
          cpu: "250m"
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: istio-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: gateway
      version: "1.19.0"
      sourceRef:
        kind: HelmRepository
        name: istio
      interval: 10m0s
  dependsOn:
  - name: istiod
