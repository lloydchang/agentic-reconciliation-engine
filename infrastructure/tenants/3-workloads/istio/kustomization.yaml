apiVersion: v1
kind: Namespace
metadata:
  name: istio-system
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: istio
  namespace: istio-system
spec:
  interval: 10m0s
  url: https://istio-release.storage.googleapis.com/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: istiod
  namespace: istio-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: istiod
      version: "1.19.0"
      sourceRef:
        kind: HelmRepository
        name: istio
      interval: 10m0s
  values:
    pilot:
      resources:
        requests:
          memory: "512Mi"
          cpu: "250m"
    meshConfig:
      accessLogFile: /dev/stdout
      accessLogEncoding: JSON
      defaultConfig:
        proxyMetadata:
          ISTIO_META_DNS_CAPTURE: "true"
          ISTIO_META_DNS_AUTO_ALLOCATE: "true"
      extensionProviders:
      - name: "envoy-json"
        envoyExtAuthzHttp:
          service: "ext-authz.example.com"
          port: "8080"
          includeRequestHeadersInCheck: ["x-user"]
      trustDomain: "cluster.local"
      peerAuthentication:
        mtls:
          mode: STRICT  # Enforce mTLS
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: istio-ingress
  namespace: istio-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: gateway
      version: "1.19.0"
      sourceRef:
        kind: HelmRepository
        name: istio
      interval: 10m0s
  dependsOn:
  - name: istiod
---
# Global mTLS PeerAuthentication Policy
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: default
  namespace: istio-system
spec:
  mtls:
    mode: STRICT
---
# RequestAuthentication for JWT validation
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: jwt-auth
  namespace: default
spec:
  selector:
    matchLabels:
      app: nginx-sample
  jwtRules:
  - issuer: "your-issuer"
    jwksUri: "https://your-jwks-endpoint"
    audiences:
    - "your-audience"
---
# AuthorizationPolicy for mTLS + JWT
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: require-mtls-jwt
  namespace: default
spec:
  selector:
    matchLabels:
      app: nginx-sample
  action: ALLOW
  rules:
  - from:
    - source:
        principals: ["cluster.local/ns/default/sa/default"]
    to:
    - operation:
        methods: ["GET", "POST"]
  # Deny all other requests
  - {}
