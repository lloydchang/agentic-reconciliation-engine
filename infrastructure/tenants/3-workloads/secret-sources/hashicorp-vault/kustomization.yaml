apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: hashicorp-vault
  namespace: default
spec:
  provider:
    vault:
      server: "https://vault.example.com:8200"
      path: "secret"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "external-secrets"
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: vault-database-credentials
  namespace: default
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: hashicorp-vault
    kind: SecretStore
  target:
    name: vault-database-secret
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: database/prod
      property: password
  - secretKey: username
    remoteRef:
      key: database/prod
      property: username
