apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secretsmanager
  namespace: default
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-west-2
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: database-credentials
  namespace: default
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: aws-secretsmanager
    kind: SecretStore
  target:
    name: database-secret
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: prod/database
      property: password
  - secretKey: username
    remoteRef:
      key: prod/database
      property: username
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: azure-keyvault
  namespace: default
spec:
  provider:
    azurekv:
      server: "https://my-keyvault.vault.azure.net/"
      authType: WorkloadIdentity
      serviceAccountRef:
        name: external-secrets-sa
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: azure-database-credentials
  namespace: default
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: azure-keyvault
    kind: SecretStore
  target:
    name: azure-database-secret
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: database-password
  - secretKey: username
    remoteRef:
      key: database-username
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: gcp-secretmanager
  namespace: default
spec:
  provider:
    gcpsm:
      projectID: my-gcp-project
      auth:
        workloadIdentity:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets-system
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gcp-database-credentials
  namespace: default
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: gcp-secretmanager
    kind: SecretStore
  target:
    name: gcp-database-secret
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: database-password
  - secretKey: username
    remoteRef:
      key: database-username
