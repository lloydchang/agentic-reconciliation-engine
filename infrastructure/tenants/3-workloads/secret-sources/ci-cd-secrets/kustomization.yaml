# CI/CD Secret Variable Examples
# These show how to use CI/CD platform secrets for SealedSecrets creation

## GitHub Actions Example
# .github/workflows/seal-secrets.yml
---
name: Seal Secrets
on:
  workflow_dispatch:
    inputs:
      secret_name:
        description: 'Name of the secret to create'
        required: true
      secret_keys:
        description: 'Comma-separated list of secret keys'
        required: true

jobs:
  seal:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'v1.27.0'
    - name: Setup kubeseal
      run: |
        wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.20.5/kubeseal-0.20.5-linux-amd64.tar.gz
        tar -xzf kubeseal-0.20.5-linux-amd64.tar.gz
        sudo mv kubeseal /usr/local/bin/
    - name: Get SealedSecrets cert
      run: |
        kubeseal --fetch-cert > pub-cert.pem
    - name: Create and seal secret
      run: |
        # Parse secret keys from input
        IFS=',' read -ra KEYS <<< "${{ github.event.inputs.secret_keys }}"
        SECRET_ARGS=""
        for key in "${KEYS[@]}"; do
          # Get value from GitHub secret
          value="${{ secrets[key] }}"
          SECRET_ARGS="$SECRET_ARGS --from-literal=$key=$value"
        done

        # Create and seal
        kubectl create secret generic temp-secret $SECRET_ARGS --dry-run=client -o yaml | \
        kubeseal --cert=pub-cert.pem --format=yaml > sealed-secret.yaml

        # Commit sealed secret
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add sealed-secret.yaml
        git commit -m "Add sealed secret ${{ github.event.inputs.secret_name }}"
        git push

## GitLab CI Example
# .gitlab-ci.yml
---
stages:
  - seal

seal_secrets:
  stage: seal
  image: bitnami/kubectl:latest
  script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - chmod +x kubectl && mv kubectl /usr/local/bin/
    - wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.20.5/kubeseal-0.20.5-linux-amd64.tar.gz
    - tar -xzf kubeseal-0.20.5-linux-amd64.tar.gz && chmod +x kubeseal && mv kubeseal /usr/local/bin/
    - kubeseal --fetch-cert > pub-cert.pem
    - |
      kubectl create secret generic temp-secret \
        --from-literal=username="$DATABASE_USER" \
        --from-literal=password="$DATABASE_PASSWORD" \
        --dry-run=client -o yaml | \
      kubeseal --cert=pub-cert.pem --format=yaml > sealed-secret.yaml
    - git config --global user.name "gitlab-ci"
    - git config --global user.email "gitlab-ci@gitlab.com"
    - git add sealed-secret.yaml
    - git commit -m "Add sealed database credentials"
    - git push https://oauth2:${GITLAB_TOKEN}@gitlab.com/${CI_PROJECT_PATH}.git HEAD:main
  only:
    - main

## Jenkins Pipeline Example
# Jenkinsfile
---
pipeline {
    agent any
    stages {
        stage('Seal Secrets') {
            steps {
                script {
                    // Install tools
                    sh '''
                        curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
                        chmod +x kubectl
                        wget https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.20.5/kubeseal-0.20.5-linux-amd64.tar.gz
                        tar -xzf kubeseal-0.20.5-linux-amd64.tar.gz
                        chmod +x kubeseal
                    '''

                    // Get cert and seal
                    sh '''
                        ./kubeseal --fetch-cert > pub-cert.pem
                        ./kubectl create secret generic temp-secret \
                          --from-literal=username="$DATABASE_USER" \
                          --from-literal=password="$DATABASE_PASSWORD" \
                          --dry-run=client -o yaml | \
                        ./kubeseal --cert=pub-cert.pem --format=yaml > sealed-secret.yaml
                    '''

                    // Commit
                    sh '''
                        git config --global user.name "jenkins-ci"
                        git config --global user.email "jenkins-ci@company.com"
                        git add sealed-secret.yaml
                        git commit -m "Add sealed database credentials"
                        git push origin main
                    '''
                }
            }
        }
    }
}
