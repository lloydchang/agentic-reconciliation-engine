# vanta - Enterprise tool implementation
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: vanta
  namespace: default
spec:
  interval: 10m0s
  url: https://charts.example.com  # Replace with actual Helm repo URL
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: vanta
  namespace: default
spec:
  interval: 10m0s
  chart:
    spec:
      chart: vanta
      version: "1.0.0"
      sourceRef:
        kind: HelmRepository
        name: vanta
      interval: 10m0s
