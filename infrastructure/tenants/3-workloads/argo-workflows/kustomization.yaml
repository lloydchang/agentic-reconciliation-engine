apiVersion: v1
kind: Namespace
metadata:
  name: argo-workflows
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: argo
  namespace: argo-workflows
spec:
  interval: 10m0s
  url: https://argoproj.github.io/argo-helm
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: argo-workflows
  namespace: argo-workflows
spec:
  interval: 10m0s
  chart:
    spec:
      chart: argo-workflows
      version: "0.32.0"
      sourceRef:
        kind: HelmRepository
        name: argo
      interval: 10m0s
  values:
    workflow:
      serviceAccount:
        create: true
    server:
      serviceType: LoadBalancer
