apiVersion: v1
kind: Namespace
metadata:
  name: security
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: sonarqube
  namespace: security
spec:
  interval: 10m0s
  url: https://SonarSource.github.io/helm-chart-sonarqube
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: sonarqube
  namespace: security
spec:
  interval: 10m0s
  chart:
    spec:
      chart: sonarqube
      version: "10.3.0"
      sourceRef:
        kind: HelmRepository
        name: sonarqube
      interval: 10m0s
  values:
    account:
      adminPassword: "admin123"
    postgresql:
      enabled: true
      postgresqlPassword: "sonarPass123"
    service:
      type: LoadBalancer
    ingress:
      enabled: true
      className: nginx
