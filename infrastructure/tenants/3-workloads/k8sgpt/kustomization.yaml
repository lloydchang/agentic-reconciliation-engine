apiVersion: v1
kind: Namespace
metadata:
  name: ai-ops
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: k8sgpt
  namespace: ai-ops
spec:
  interval: 10m0s
  url: https://charts.k8sgpt.ai
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: k8sgpt-operator
  namespace: ai-ops
spec:
  interval: 10m0s
  chart:
    spec:
      chart: k8sgpt-operator
      version: "0.0.18"
      sourceRef:
        kind: HelmRepository
        name: k8sgpt
      interval: 10m0s
  values:
    k8sgpt:
      backend: "openai"  # or anthropic, local-ai
      openai:
        baseUrl: "https://api.openai.com/v1"
        model: "gpt-3.5-turbo"
        # credentials via secret
      anthropic:
        model: "claude-3-sonnet-20240229"
      filters:
        - "Pod"
        - "Service"
        - "Deployment"
        - "StatefulSet"
---
# K8sGPT AI Analysis Secret
apiVersion: v1
kind: Secret
metadata:
  name: k8sgpt-ai-credentials
  namespace: ai-ops
type: Opaque
data:
  openai-api-key: <base64-encoded-key>
  anthropic-api-key: <base64-encoded-key>
