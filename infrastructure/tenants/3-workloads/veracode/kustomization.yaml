apiVersion: v1
kind: Namespace
metadata:
  name: security
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: veracode
  namespace: security
spec:
  interval: 10m0s
  url: https://veracode.github.io/veracode-kubernetes
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: veracode-scanner
  namespace: security
spec:
  interval: 10m0s
  chart:
    spec:
      chart: veracode-scanner
      version: "1.0.0"
      sourceRef:
        kind: HelmRepository
        name: veracode
      interval: 10m0s
  values:
    veracode:
      credentials:
        apiId: "your-veracode-api-id"
        apiKey: "your-veracode-api-key"
