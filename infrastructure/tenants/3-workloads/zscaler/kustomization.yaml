apiVersion: v1
kind: Namespace
metadata:
  name: security
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zscaler-connector
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zscaler-connector
  template:
    metadata:
      labels:
        app: zscaler-connector
    spec:
      containers:
      - name: zscaler
        image: zscaler/zscaler-connector:latest
        env:
        - name: ZSCALER_USERNAME
          valueFrom:
            secretKeyRef:
              name: zscaler-credentials
              key: username
        - name: ZSCALER_PASSWORD
          valueFrom:
            secretKeyRef:
              name: zscaler-credentials
              key: password
        ports:
        - containerPort: 80
        - containerPort: 443
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: zscaler-connector
  namespace: security
spec:
  selector:
    app: zscaler-connector
  ports:
  - port: 80
    targetPort: 80
    name: http
  - port: 443
    targetPort: 443
    name: https
  type: ClusterIP
