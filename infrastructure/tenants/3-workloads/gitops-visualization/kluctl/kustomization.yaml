# Kluctl - Alternative GitOps Engine with WebUI
apiVersion: v1
kind: Namespace
metadata:
  name: gitops-visualization
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kluctl-webui
  namespace: gitops-visualization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kluctl-webui
  template:
    metadata:
      labels:
        app: kluctl-webui
    spec:
      containers:
      - name: kluctl
        image: kluctl/kluctl:latest
        command: ["kluctl", "webui", "--port", "8080"]
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: kluctl-webui
  namespace: gitops-visualization
spec:
  selector:
    app: kluctl-webui
  ports:
  - port: 8080
    targetPort: 8080
  type: LoadBalancer
