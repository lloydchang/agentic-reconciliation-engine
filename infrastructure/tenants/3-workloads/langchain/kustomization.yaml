apiVersion: v1
kind: Namespace
metadata:
  name: ai-automation
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langchain-server
  namespace: ai-automation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: langchain-server
  template:
    metadata:
      labels:
        app: langchain-server
    spec:
      containers:
      - name: langchain
        image: langchain/langchain:latest
        ports:
        - containerPort: 8000
        env:
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-credentials
              key: api-key
        - name: LANGCHAIN_TRACING_V2
          value: "true"
        - name: LANGCHAIN_ENDPOINT
          value: "https://api.smith.langchain.com"
        command: ["uvicorn", "langchain_server:app", "--host", "0.0.0.0", "--port", "8000"]
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: langchain-server
  namespace: ai-automation
spec:
  selector:
    app: langchain-server
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
