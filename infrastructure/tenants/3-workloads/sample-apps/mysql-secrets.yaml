apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: mysql-credentials
  namespace: default
spec:
  encryptedData:
    MYSQL_ROOT_PASSWORD: <encrypted-root-password>
    MYSQL_DATABASE: <encrypted-database-name>
    MYSQL_USER: <encrypted-username>
    MYSQL_PASSWORD: <encrypted-user-password>
  template:
    metadata:
      name: mysql-credentials
      namespace: default
    type: Opaque
