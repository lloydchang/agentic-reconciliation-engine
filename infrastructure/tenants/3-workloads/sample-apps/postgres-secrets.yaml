apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: postgres-credentials
  namespace: default
spec:
  encryptedData:
    POSTGRES_DB: <encrypted-database-name>
    POSTGRES_USER: <encrypted-username>
    POSTGRES_PASSWORD: <encrypted-user-password>
  template:
    metadata:
      name: postgres-credentials
      namespace: default
    type: Opaque
