apiVersion: apps/v1
kind: Deployment
metadata:
  name: valkey-sample
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valkey-sample
  template:
    metadata:
      labels:
        app: valkey-sample
    spec:
      containers:
      - name: valkey
        image: valkey/valkey:7.0
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: valkey-sample
  namespace: default
spec:
  selector:
    app: valkey-sample
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
