apiVersion: v1
kind: Namespace
metadata:
  name: opentelemetry
---
# opentelemetry - Enterprise tool implementation
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: opentelemetry
  namespace: default
spec:
  interval: 5m0s
  url: https://open-telemetry.github.io/opentelemetry-helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: opentelemetry
  namespace: opentelemetry
spec:
  interval: 5m0s
  chart:
    spec:
      chart: opentelemetry-collector
      version: "0.26.0"
      sourceRef:
        kind: HelmRepository
        name: opentelemetry
        namespace: opentelemetry
      interval: 5m0s
  values:
    mode: deployment
    replicaCount: 1
    serviceAccount:
      create: true
    resources:
      limits:
        cpu: 250m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 128Mi
