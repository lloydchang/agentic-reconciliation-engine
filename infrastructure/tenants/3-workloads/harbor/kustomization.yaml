apiVersion: v1
kind: Namespace
metadata:
  name: harbor
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 10m0s
  url: https://helm.goharbor.io
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 10m0s
  chart:
    spec:
      chart: harbor
      version: "1.13.0"
      sourceRef:
        kind: HelmRepository
        name: harbor
      interval: 10m0s
  values:
    expose:
      type: loadBalancer
      tls:
        enabled: true
        certSource: auto
        auto:
          commonName: harbor.local
    externalURL: https://harbor.local
    harborAdminPassword: "Harbor12345"
    database:
      type: internal
      internal:
        image:
          repository: goharbor/harbor-db
          tag: "2.8.0"
    redis:
      type: internal
    persistence:
      enabled: true
      resourcePolicy: "keep"
    trivy:
      enabled: true
---
# Harbor project for GitOps images
apiVersion: goharbor.io/v1beta1
kind: Project
metadata:
  name: gitops-infra
  namespace: harbor
spec:
  type: public
  storageQuota: "100Gi"
