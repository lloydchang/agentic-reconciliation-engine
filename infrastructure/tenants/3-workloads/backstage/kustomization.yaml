apiVersion: v1
kind: Namespace
metadata:
  name: backstage
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: backstage
  namespace: backstage
spec:
  interval: 10m0s
  url: https://backstage.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: backstage
  namespace: backstage
spec:
  interval: 10m0s
  chart:
    spec:
      chart: backstage
      version: "0.18.0"
      sourceRef:
        kind: HelmRepository
        name: backstage
      interval: 10m0s
  values:
    backstage:
      image:
        registry: docker.io
        repository: backstage/backstage
        tag: "latest"
      command:
        - node
        - packages/backend
        - --config
        - app-config.yaml
      extraEnvVars:
        - name: POSTGRES_HOST
          value: postgres-sample.default.svc.cluster.local
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
    service:
      type: LoadBalancer
