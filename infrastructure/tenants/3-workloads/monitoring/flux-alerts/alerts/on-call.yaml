# On-Call Alert Configuration
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Alert
metadata:
  name: on-call-alerts
  namespace: flux-system
spec:
  summary: "GitOps Infra Control Plane"
  eventMetadata:
    env: "production"
    cluster: "gitops-control-plane"
    region: "us-east-1"
  providerRef:
    name: slack-bot
  eventSeverity: error
  eventSources:
    - kind: GitRepository
      name: '*'
    - kind: Kustomization
      name: '*'
    - kind: HelmRelease
      name: '*'
