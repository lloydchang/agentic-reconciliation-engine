# Grafana Annotations Provider
apiVersion: v1
kind: Secret
metadata:
  name: grafana-auth
  namespace: monitoring
data:
  token: Z3JhZmFuYS10b2tlbg==  # Replace with actual Grafana token
---
apiVersion: notification.toolkit.fluxcd.io/v1beta3
kind: Provider
metadata:
  name: grafana
  namespace: monitoring
spec:
  type: grafana
  address: "http://grafana.monitoring/api/annotations"
  secretRef:
    name: grafana-auth
