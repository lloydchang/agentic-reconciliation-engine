apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: workload-secrets
  namespace: flux-system
  labels:
    app.kubernetes.io/name: workload-secrets
    app.kubernetes.io/component: secrets
    gitops-infra-control-plane.io/managed-by: "flux"
spec:
  interval: 5m0s
  retryInterval: 30s
  timeout: 2m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./infrastructure/tenants/3-workloads
  prune: true
  wait: true
  # SOPS decryption configuration
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  # Depends on clusters being ready
  dependsOn:
    - name: tenant-clusters
      namespace: flux-system
  # Post-build for workload-specific secret references
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: workload-config
        optional: true
      - kind: Secret
        name: workload-secrets-config
        optional: true
