apiVersion: v1
kind: Namespace
metadata:
  name: nexus
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: sonatype
  namespace: nexus
spec:
  interval: 10m0s
  url: https://sonatype.github.io/helm3-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: nexus-repository-manager
  namespace: nexus
spec:
  interval: 10m0s
  chart:
    spec:
      chart: nexus-repository-manager
      version: "63.0.0"
      sourceRef:
        kind: HelmRepository
        name: nexus
      interval: 10m0s
  values:
    statefulset:
      enabled: true
    persistence:
      enabled: true
      storageSize: 100Gi
    service:
      type: LoadBalancer
    ingress:
      enabled: true
      className: nginx
      hostRepo: nexus.local
    nexus:
      imageTag: "3.63.0"
      properties:
        override:
          nexus.scripts.allowCreation: true
      securityContext:
        runAsUser: 200
---
# Nexus configuration for common repositories
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexus-repositories
  namespace: nexus
data:
  docker-proxy.json: |
    {
      "name": "docker-hub",
      "type": "proxy",
      "url": "https://registry-1.docker.io",
      "online": true,
      "storage": {
        "blobStoreName": "default",
        "strictContentTypeValidation": true
      },
      "proxy": {
        "remoteUrl": "https://registry-1.docker.io",
        "contentMaxAge": 1440,
        "metadataMaxAge": 1440
      },
      "docker": {
        "v1Enabled": false,
        "forceBasicAuth": true,
        "httpPort": null,
        "httpsPort": null
      }
    }
