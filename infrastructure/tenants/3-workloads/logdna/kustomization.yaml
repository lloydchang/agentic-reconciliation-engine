apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logdna-agent
  namespace: logging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logdna-agent
  template:
    metadata:
      labels:
        app: logdna-agent
    spec:
      containers:
      - name: logdna
        image: logdna/logdna-agent:latest
        env:
        - name: LOGDNA_KEY
          valueFrom:
            secretKeyRef:
              name: logdna-credentials
              key: ingestion-key
        - name: LOGDNA_HOST
          value: "logs.us-south.logging.cloud.ibm.com"
        volumeMounts:
        - name: varlogcontainers
          mountPath: /var/log/containers
        - name: varlogpods
          mountPath: /var/log/pods
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
      volumes:
      - name: varlogcontainers
        hostPath:
          path: /var/log/containers
      - name: varlogpods
        hostPath:
          path: /var/log/pods
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      serviceAccountName: logdna-agent
