apiVersion: v1
kind: Namespace
metadata:
  name: data-streaming
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: bitnami
  namespace: data-streaming
spec:
  interval: 10m0s
  url: https://charts.bitnami.com/bitnami
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kafka
  namespace: data-streaming
spec:
  interval: 10m0s
  chart:
    spec:
      chart: kafka
      version: "26.0.0"
      sourceRef:
        kind: HelmRepository
        name: bitnami
      interval: 10m0s
  values:
    zookeeper:
      enabled: true
      replicaCount: 1
    kafka:
      cfg:
        autoCreateTopicsEnable: true
        deleteTopicEnable: true
      replicaCount: 1
      persistence:
        enabled: true
        size: 50Gi
    externalAccess:
      enabled: true
      service:
        type: LoadBalancer
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: kafka-ui
  namespace: data-streaming
spec:
  interval: 10m0s
  chart:
    spec:
      chart: kafka-ui
      version: "0.7.1"
      sourceRef:
        kind: HelmRepository
          name: kafka-ui
      interval: 10m0s
  values:
    kafka:
      clusters:
        - name: local
          bootstrapServers: kafka.data-streaming.svc.cluster.local:9092
    service:
      type: LoadBalancer
