# Vault - Advanced Secrets Management (Alternative to SealedSecrets)
apiVersion: v1
kind: Namespace
metadata:
  name: secrets-management
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: hashicorp
  namespace: secrets-management
spec:
  interval: 10m0s
  url: https://helm.releases.hashicorp.com
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: vault
  namespace: secrets-management
spec:
  interval: 10m0s
  chart:
    spec:
      chart: vault
      version: "0.25.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
      interval: 10m0s
  values:
    server:
      dev:
        enabled: true
      service:
        type: LoadBalancer
    injector:
      enabled: true
    ui:
      enabled: true
---
# External Secrets Operator with Vault backend
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: secrets-management
spec:
  provider:
    vault:
      server: "http://vault:8200"
      path: "secret"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: example-secret
  namespace: secrets-management
spec:
  refreshInterval: 15s
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: example-secret
    creationPolicy: Owner
  data:
  - secretKey: password
    remoteRef:
      key: database
      property: password
