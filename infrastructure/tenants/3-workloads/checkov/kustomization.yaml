apiVersion: batch/v1
kind: Job
metadata:
  name: checkov-compliance-scan
  namespace: compliance
spec:
  template:
    spec:
      containers:
      - name: checkov
        image: bridgecrew/checkov:latest
        command: ["checkov", "-f", "/config", "--framework", "kubernetes", "--output", "json"]
        volumeMounts:
        - name: config
          mountPath: /config
      volumes:
      - name: config
        configMap:
          name: kubernetes-manifests
      restartPolicy: Never
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubernetes-manifests
  namespace: compliance
data:
  nginx-deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: nginx
      template:
        metadata:
          labels:
            app: nginx
        spec:
          containers:
          - name: nginx
            image: nginx:latest
            ports:
            - containerPort: 80
