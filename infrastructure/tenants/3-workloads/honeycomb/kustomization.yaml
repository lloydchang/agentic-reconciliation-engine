# Honeycomb - Distributed Tracing and Observability
# High-cardinality tracing for debugging complex systems

apiVersion: v1
kind: Namespace
metadata:
  name: honeycomb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: honeycomb-agent
  namespace: honeycomb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: honeycomb-agent
  template:
    metadata:
      labels:
        app: honeycomb-agent
    spec:
      containers:
      - name: honeycomb
        image: honeycombio/honeycomb-kubernetes-agent:latest
        env:
        - name: HONEYCOMB_API_KEY
          valueFrom:
            secretKeyRef:
              name: honeycomb-credentials
              key: api-key
        - name: HONEYCOMB_DATASET
          value: "kubernetes-traces"
        ports:
        - containerPort: 4317  # OTLP gRPC
        - containerPort: 4318  # OTLP HTTP
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: honeycomb-agent
  namespace: honeycomb
spec:
  selector:
    app: honeycomb-agent
  ports:
  - port: 4317
    targetPort: 4317
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    name: otlp-http
  type: ClusterIP
