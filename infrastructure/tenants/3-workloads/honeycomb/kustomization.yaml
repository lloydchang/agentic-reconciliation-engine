# honeycomb - Enterprise tool implementation
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: honeycomb
  namespace: default
spec:
  interval: 10m0s
  url: https://honeycombio.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: honeycomb
  namespace: default
spec:
  interval: 10m0s
  chart:
    spec:
      chart: honeycomb
      version: "1.9.3"
      sourceRef:
        kind: HelmRepository
        name: honeycomb
      interval: 10m0s
