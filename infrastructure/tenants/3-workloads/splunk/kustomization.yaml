apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: splunk
  namespace: logging
spec:
  interval: 10m0s
  url: https://splunk.github.io/splunk-connect-for-kubernetes
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: splunk-connect
  namespace: logging
spec:
  interval: 10m0s
  chart:
    spec:
      chart: splunk-connect-for-kubernetes
      version: "1.4.18"
      sourceRef:
        kind: HelmRepository
        name: splunk
      interval: 10m0s
  values:
    splunk-kubernetes-logging:
      enabled: true
      splunk:
        hec:
          host: "your-splunk-hec-host"
          port: "8088"
          token: "your-splunk-hec-token"
    splunk-kubernetes-metrics:
      enabled: true
