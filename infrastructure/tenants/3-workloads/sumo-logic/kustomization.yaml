apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: sumologic
  namespace: logging
spec:
  interval: 10m0s
  url: https://sumologic.github.io/sumologic-kubernetes-collection
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: sumologic-collection
  namespace: logging
spec:
  interval: 10m0s
  chart:
    spec:
      chart: sumologic-kubernetes-collection
      version: "3.3.0"
      sourceRef:
        kind: HelmRepository
        name: sumologic
      interval: 10m0s
  values:
    sumologic:
      accessId: "your-sumologic-access-id"
      accessKey: "your-sumologic-access-key"
      clusterName: "your-cluster-name"
