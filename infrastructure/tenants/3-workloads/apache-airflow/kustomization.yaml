apiVersion: v1
kind: Namespace
metadata:
  name: workflow-orchestration
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: apache-airflow
  namespace: workflow-orchestration
spec:
  interval: 10m0s
  url: https://airflow.apache.org
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: airflow
  namespace: workflow-orchestration
spec:
  interval: 10m0s
  chart:
    spec:
      chart: airflow
      version: "1.10.0"
      sourceRef:
        kind: HelmRepository
        name: apache-airflow
      interval: 10m0s
  values:
    executor: KubernetesExecutor
    webserver:
      service:
        type: LoadBalancer
    scheduler:
      replicas: 1
    workers:
      replicas: 1
    postgresql:
      enabled: true
      persistence:
        enabled: true
        size: 50Gi
    redis:
      enabled: true
    dags:
      persistence:
        enabled: true
        size: 50Gi
---
# Example DAG for infrastructure validation
apiVersion: v1
kind: ConfigMap
metadata:
  name: validation-dag
  namespace: workflow-orchestration
data:
  validation_dag.py: |
    from datetime import datetime, timedelta
    from airflow import DAG
    from airflow.operators.bash import BashOperator

    default_args = {
        'owner': 'infrastructure',
        'depends_on_past': False,
        'start_date': datetime(2024, 1, 1),
        'email_on_failure': False,
        'email_on_retry': False,
        'retries': 1,
        'retry_delay': timedelta(minutes=5)
    }

    dag = DAG(
        'infrastructure_validation',
        default_args=default_args,
        description='Validate infrastructure health',
        schedule_interval=timedelta(days=1),
        catchup=False,
    )

    validate_kubernetes = BashOperator(
        task_id='validate_kubernetes',
        bash_command='kubectl get nodes --no-headers | wc -l',
        dag=dag,
    )

    validate_flux = BashOperator(
        task_id='validate_flux',
        bash_command='flux get sources git --no-headers | wc -l',
        dag=dag,
    )

    validate_kubernetes >> validate_flux
