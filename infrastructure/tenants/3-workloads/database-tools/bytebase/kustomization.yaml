# Bytebase - Database DevOps Platform (Alternative to Liquibase/Flyway)
apiVersion: v1
kind: Namespace
metadata:
  name: database-tools
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: bytebase
  namespace: database-tools
spec:
  interval: 10m0s
  url: https://bytebase.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: bytebase
  namespace: database-tools
spec:
  interval: 10m0s
  chart:
    spec:
      chart: bytebase
      version: "1.0.0"
      sourceRef:
        kind: HelmRepository
        name: bytebase
      interval: 10m0s
  values:
    postgresql:
      enabled: true
      postgresqlPassword: "bytebase123"
    ingress:
      enabled: true
      className: nginx
      hosts:
      - host: bytebase.local
        paths:
        - path: /
          pathType: Prefix
