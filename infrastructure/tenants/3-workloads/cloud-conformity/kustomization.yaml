apiVersion: v1
kind: Namespace
metadata:
  name: compliance
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-conformity
  namespace: compliance
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-conformity
  template:
    metadata:
      labels:
        app: cloud-conformity
    spec:
      containers:
      - name: conformity
        image: cloudconformity/conformity-scanner:latest
        env:
        - name: CONFORMITY_API_KEY
          valueFrom:
            secretKeyRef:
              name: conformity-credentials
              key: api-key
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
        command: ["conformity", "scan", "--format", "json"]
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-conformity
  namespace: compliance
spec:
  selector:
    app: cloud-conformity
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
