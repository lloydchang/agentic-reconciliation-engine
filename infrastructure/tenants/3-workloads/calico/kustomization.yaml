apiVersion: v1
kind: Namespace
metadata:
  name: calico-system
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: projectcalico
  namespace: calico-system
spec:
  interval: 10m0s
  url: https://projectcalico.docs.tigera.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: calico
  namespace: calico-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: calico
      version: "3.26.0"
      sourceRef:
        kind: HelmRepository
        name: projectcalico
      interval: 10m0s
  values:
    installation:
      kubernetesProvider: ""  # Let Calico detect the provider
