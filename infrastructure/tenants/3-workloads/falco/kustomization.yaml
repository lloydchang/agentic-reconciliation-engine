apiVersion: v1
kind: Namespace
metadata:
  name: falco
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: falco
  namespace: falco
spec:
  interval: 10m0s
  url: https://falco.org/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: falco
  namespace: falco
spec:
  interval: 10m0s
  chart:
    spec:
      chart: falco
      version: "3.8.0"
      sourceRef:
        kind: HelmRepository
        name: falco
      interval: 10m0s
  values:
    driver:
      kind: modern_ebpf
    falco:
      grpc:
        enabled: true
      grpc_output:
        enabled: true
