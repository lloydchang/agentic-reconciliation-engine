apiVersion: v1
kind: Namespace
metadata:
  name: gatekeeper-system
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: gatekeeper
  namespace: gatekeeper-system
spec:
  interval: 10m0s
  url: https://open-policy-agent.github.io/gatekeeper/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: gatekeeper
  namespace: gatekeeper-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: gatekeeper
      version: "3.13.0"
      sourceRef:
        kind: HelmRepository
        name: gatekeeper
      interval: 10m0s
  values:
    replicas: 1
    auditInterval: 60
    constraintViolationsLimit: 20
    auditFromCache: false
