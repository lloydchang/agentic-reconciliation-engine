# Okta Integration - Identity Management for Workload Clusters
# Note: This is a conceptual integration. Okta doesn't have a direct Helm chart,
# but you can use the Okta Kubernetes Authenticator or custom integration

apiVersion: apps/v1
kind: Deployment
metadata:
  name: okta-authenticator
  namespace: identity
spec:
  replicas: 1
  selector:
    matchLabels:
      app: okta-authenticator
  template:
    metadata:
      labels:
        app: okta-authenticator
    spec:
      containers:
      - name: authenticator
        image: oktadeveloper/okta-kubernetes-authenticator:latest
        ports:
        - containerPort: 8080
        env:
        - name: OKTA_ORG_URL
          value: "https://your-org.okta.com"
        - name: OKTA_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: okta-credentials
              key: client-id
        - name: OKTA_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: okta-credentials
              key: client-secret
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: okta-authenticator
  namespace: identity
spec:
  selector:
    app: okta-authenticator
  ports:
  - port: 8080
    targetPort: 8080
  type: ClusterIP
