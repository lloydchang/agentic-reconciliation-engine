apiVersion: v1
kind: Namespace
metadata:
  name: security
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: perimeter81-connector
  namespace: security
spec:
  replicas: 1
  selector:
    matchLabels:
      app: perimeter81-connector
  template:
    metadata:
      labels:
        app: perimeter81-connector
    spec:
      containers:
      - name: perimeter81
        image: perimeter81/perimeter81-connector:latest
        env:
        - name: P81_API_TOKEN
          valueFrom:
            secretKeyRef:
              name: perimeter81-credentials
              key: api-token
        ports:
        - containerPort: 80
        - containerPort: 443
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: perimeter81-connector
  namespace: security
spec:
  selector:
    app: perimeter81-connector
  ports:
  - port: 80
    targetPort: 80
    name: http
  - port: 443
    targetPort: 443
    name: https
  type: ClusterIP
