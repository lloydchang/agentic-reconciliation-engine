# Job Configuration ConfigMap
# Provides configuration for all job orchestration components

apiVersion: v1
kind: ConfigMap
metadata:
  name: job-config
  namespace: flux-system
  labels:
    component: job-orchestration
    managed-by: flux
data:
  # Application configuration
  APP_VERSION: "latest"
  ENVIRONMENT: "production"
  NAMESPACE: "default"
  
  # Database configuration
  DATABASE_TYPE: "postgresql"
  DATABASE_HOST: "database-service"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "gitops_app"
  
  # Backup configuration
  BACKUP_RETENTION_DAYS: "30"
  BACKUP_STORAGE_TYPE: "s3"
  BACKUP_ENCRYPTION: "true"
  
  # Cache configuration
  CACHE_TYPE: "redis"
  CACHE_HOST: "redis-service"
  CACHE_PORT: "6379"
  CACHE_TTL: "3600"
  
  # Health check configuration
  HEALTH_CHECK_INTERVAL: "30"
  HEALTH_CHECK_TIMEOUT: "300"
  HEALTH_CHECK_RETRIES: "3"
  
  # Job configuration
  JOB_TIMEOUT: "1800"
  JOB_RETRY_LIMIT: "3"
  JOB_BACKOFF_LIMIT: "6"
  
  # Monitoring configuration
  ENABLE_METRICS: "true"
  METRICS_PORT: "9090"
  LOG_LEVEL: "info"
  
  # Security configuration
  ENABLE_RBAC: "true"
  ENABLE_NETWORK_POLICIES: "true"
  POD_SECURITY_POLICY: "restricted"
  
  # Resource configuration
  DEFAULT_CPU_REQUEST: "100m"
  DEFAULT_MEMORY_REQUEST: "128Mi"
  DEFAULT_CPU_LIMIT: "500m"
  DEFAULT_MEMORY_LIMIT: "512Mi"
  
  # Notification configuration
  ENABLE_NOTIFICATIONS: "true"
  NOTIFICATION_WEBHOOK: "https://hooks.slack.com/services/..."
  NOTIFICATION_EMAIL: "ops@company.com"
  
  # Rollback configuration
  ENABLE_ROLLBACK: "true"
  ROLLBACK_TIMEOUT: "600"
  ROLLBACK_RETRIES: "2"
