# Azure SQL Database Emulator
# Local testing of Azure SQL Database functionality

apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-sql-emulator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azure-sql-emulator
  template:
    metadata:
      labels:
        app: azure-sql-emulator
    spec:
      containers:
      - name: sql
        image: mcr.microsoft.com/azure-sql-edge:latest
        ports:
        - containerPort: 1433
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: MSSQL_SA_PASSWORD
          value: "Strong!Passw0rd"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
      volumes:
      - name: sql-data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: azure-sql-emulator
  namespace: default
spec:
  selector:
    app: azure-sql-emulator
  ports:
  - port: 1433
    targetPort: 1433
  type: ClusterIP
