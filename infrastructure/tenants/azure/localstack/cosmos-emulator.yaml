# Azure Cosmos DB Emulator
# Note: Official Cosmos DB emulator requires Windows/Linux with specific setup
# This is a basic containerized version for testing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cosmos-emulator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cosmos-emulator
  template:
    metadata:
      labels:
        app: cosmos-emulator
    spec:
      containers:
      - name: cosmos
        image: mcr.microsoft.com/cosmosdb/linux/azure-cosmos-emulator:latest
        ports:
        - containerPort: 8081  # Gateway
        - containerPort: 10250 # Direct
        - containerPort: 10251 # Direct
        - containerPort: 10252 # Direct
        - containerPort: 10253 # Direct
        - containerPort: 10254 # Direct
        env:
        - name: AZURE_COSMOS_EMULATOR_PARTITION_COUNT
          value: "1"
        - name: AZURE_COSMOS_EMULATOR_ENABLE_DATA_PERSISTENCE
          value: "false"
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: v1
kind: Service
metadata:
  name: cosmos-emulator
  namespace: default
spec:
  selector:
    app: cosmos-emulator
  ports:
  - port: 8081
    targetPort: 8081
    name: gateway
  - port: 10250
    targetPort: 10250
    name: direct-1
  - port: 10251
    targetPort: 10251
    name: direct-2
  - port: 10252
    targetPort: 10252
    name: direct-3
  - port: 10253
    targetPort: 10253
    name: direct-4
  - port: 10254
    targetPort: 10254
    name: direct-5
  type: ClusterIP
