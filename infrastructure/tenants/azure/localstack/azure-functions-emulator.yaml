# Azure Functions Emulator
# Local development and testing of Azure Functions

apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-functions-emulator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azure-functions-emulator
  template:
    metadata:
      labels:
        app: azure-functions-emulator
    spec:
      containers:
      - name: functions
        image: mcr.microsoft.com/azure-functions/dotnet:4
        ports:
        - containerPort: 80
        - containerPort: 7071  # Functions runtime
        env:
        - name: AzureWebJobsStorage
          value: "UseDevelopmentStorage=true"
        - name: FUNCTIONS_WORKER_RUNTIME
          value: "dotnet"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: azure-functions-emulator
  namespace: default
spec:
  selector:
    app: azure-functions-emulator
  ports:
  - port: 80
    targetPort: 80
    name: http
  - port: 7071
    targetPort: 7071
    name: functions
  type: ClusterIP
