# Azure Service Bus Emulator
# Lightweight container for Azure Service Bus testing
apiVersion: apps/v1
kind: Deployment
metadata:
  name: servicebus-emulator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: servicebus-emulator
  template:
    metadata:
      labels:
        app: servicebus-emulator
    spec:
      containers:
      - name: servicebus
        image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
        ports:
        - containerPort: 5672  # AMQP
        - containerPort: 8080  # Management
        env:
        - name: ACCEPT_EULA
          value: "Y"
        - name: SERVICEBUS_CONNECTION_STRING
          value: "Endpoint=sb://localhost:5672/;SharedAccessKeyName=RootManageSharedAccessKey;SharedAccessKey=SAS_KEY_VALUE"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: servicebus-emulator
  namespace: default
spec:
  selector:
    app: servicebus-emulator
  ports:
  - port: 5672
    targetPort: 5672
    name: amqp
  - port: 8080
    targetPort: 8080
    name: management
  type: ClusterIP
