apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: tenant-infrastructure
  namespace: flux-system
resources:
  - 1-network/
  - 2-clusters/
  - 3-workloads/
  - example-database-credentials.secret.yaml
  - example-api-keys.secret.yaml
dependsOn:
  - 1-network
# SOPS configuration for secret decryption
decryption:
  provider: sops
  secretRef:
    name: sops-age-key
