# EKS Emulator using LocalStack Pro
# Simulates Amazon EKS control plane APIs locally

apiVersion: v1
kind: Namespace
metadata:
  name: eks-emulator
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: localstack
  namespace: eks-emulator
spec:
  interval: 10m0s
  url: https://helm.localstack.cloud
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: localstack-eks
  namespace: eks-emulator
spec:
  interval: 10m0s
  chart:
    spec:
      chart: localstack
      version: "0.7.0"
      sourceRef:
        kind: HelmRepository
        name: localstack
      interval: 10m0s
  values:
    service:
      type: LoadBalancer
      ports:
        eks: 4566
    persistence:
      enabled: true
      size: 10Gi
    localstack:
      # Enable EKS service
      SERVICES: eks,ec2,iam,cloudformation
      DEBUG: "1"
      # Simulate EKS cluster creation
      EKS_SKIP_TAG_API: "true"
      # Enable Kubernetes API server simulation
      KUBERNETES_API_PORT: "6443"
---
# Simulated EKS Cluster CRD
apiVersion: eks.services.k8s.aws/v1alpha1
kind: Cluster
metadata:
  name: local-eks-cluster
  namespace: eks-emulator
spec:
  # Simulate EKS cluster configuration
  version: "1.28"
  roleARN: "arn:aws:iam::123456789012:role/eks-service-role"
  resourcesVPCConfig:
    subnetIds:
    - subnet-12345
    - subnet-67890
    securityGroupIds:
    - sg-12345
  kubernetesNetworkConfig:
    serviceIpv4Cidr: "10.100.0.0/16"
  logging:
    clusterLogging:
    - types:
      - api
      - audit
      - authenticator
      - controllerManager
      - scheduler
      enabled: true
