apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: infrastructure
  namespace: flux-system
resources:
  - flux/
  - monitoring/
  - tenants/
dependsOn:
  - flux
labels:
  - pairs:
      managed-by: flux
      component: infrastructure
      platform: multi-cluster-gitops
