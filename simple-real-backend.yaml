apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend-k8s-real
  namespace: ai-infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend-k8s-real
  template:
    metadata:
      labels:
        app: dashboard-backend-k8s-real
    spec:
      containers:
      - name: backend
        image: python:3.9-slim
        ports:
        - containerPort: 5000
        command: ["python", "-c", """
import subprocess, json, os
from flask import Flask, jsonify, request
from flask_cors import CORS
app = Flask(__name__)
CORS(app)

def kubectl(cmd):
    try:
        r = subprocess.run(['kubectl'] + cmd.split(), capture_output=True, text=True, timeout=10)
        return r.stdout.strip() if r.returncode == 0 else ''
    except:
        return ''

@app.route('/api/metrics')
def metrics():
    nodes = len(kubectl('get nodes --no-headers').split('\\n')) if kubectl('get nodes --no-headers') else 0
    pods = len(kubectl('get pods --all-namespaces --no-headers').split('\\n')) if kubectl('get pods --all-namespaces --no-headers') else 0
    ai_pods = len(kubectl('get pods -n ai-infrastructure --no-headers').split('\\n')) if kubectl('get pods -n ai-infrastructure --no-headers') else 0
    return jsonify({'agents': {'total': ai_pods, 'active': ai_pods}, 'cluster': {'nodes': nodes, 'total_pods': pods}})

@app.route('/api/rag/query', methods=['POST'])
def rag():
    data = request.get_json()
    query = data.get('query', '').lower()
    nodes = len(kubectl('get nodes --no-headers').split('\\n')) if kubectl('get nodes --no-headers') else 0
    pods = len(kubectl('get pods -n ai-infrastructure --no-headers').split('\\n')) if kubectl('get pods -n ai-infrastructure --no-headers') else 0
    response = f'Cluster has {nodes} nodes and {pods} pods in ai-infrastructure namespace.'
    return jsonify({'response': response, 'sources': [{'type': 'kubernetes-api', 'confidence': 0.99}]})

if __name__ == '__main__':
    app.run(host='0.0.0.0', port=5000)
"""]
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend-k8s-real-service
  namespace: ai-infrastructure
spec:
  selector:
    app: dashboard-backend-k8s-real
  ports:
  - port: 5000
    targetPort: 5000
