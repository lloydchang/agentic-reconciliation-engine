  <rect x="62" y="250" width="148" height="150" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="1"/>
  <text x="136" y="276" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3C3489">Flux</text>
  <text x="136" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">GitOps reconcile</text>
  <text x="136" y="313" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">Git &#8594; hub cluster</text>
  <text x="136" y="331" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">Bootstraps spoke</text>
  <text x="136" y="349" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">Flux + ESO agents</text>
  <!-- self-loop -->
  <path d="M62 400 C30 400 30 250 62 250" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

