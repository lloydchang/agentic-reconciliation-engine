  <rect x="50" y="452" width="580" height="196" rx="14" fill="none" stroke="#1D9E75" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="340" y="472" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#085041">Spoke clusters</text>
  <text x="340" y="490" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">own Flux agent · ESO + workload identity · independent of hub</text>

  <!-- EKS -->
  <rect x="62" y="500" width="124" height="134" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="124" y="520" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#085041">EKS</text>
  <text x="124" y="538" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">AWS managed</text>
  <text x="124" y="555" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">Managed HA</text>
  <text x="124" y="572" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">Crossplane</text>
  <text x="124" y="589" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">ESO + IRSA</text>
  <text x="124" y="606" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">&#8594; AWS SM</text>

  <!-- AKS -->
  <rect x="200" y="500" width="124" height="134" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="262" y="520" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#085041">AKS</text>
  <text x="262" y="538" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">Azure managed</text>
  <text x="262" y="555" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">Managed HA</text>
  <text x="262" y="572" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">Crossplane</text>
  <text x="262" y="589" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">ESO + MI</text>
  <text x="262" y="606" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">&#8594; AKV</text>

  <!-- GKE -->
  <rect x="338" y="500" width="124" height="134" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="1"/>
  <text x="400" y="520" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#085041">GKE</text>
  <text x="400" y="538" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">GCP managed</text>
  <text x="400" y="555" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">Managed HA</text>
  <text x="400" y="572" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">Crossplane</text>
  <text x="400" y="589" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">ESO + WI</text>
  <text x="400" y="606" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#0F6E56">&#8594; GCP SM</text>

  <!-- Kubeadm (on-prem, coral) -->
  <rect x="476" y="500" width="142" height="134" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="1"/>
  <text x="547" y="520" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#712B13">Kubeadm</text>
  <text x="547" y="538" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">On-prem</text>
  <text x="547" y="555" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">Self-managed</text>
  <text x="547" y="572" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">via CAPI</text>
  <text x="547" y="589" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">ESO + Vault</text>
  <text x="547" y="606" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#993C1D">Flux agent</text>

  <!-- Legend -->
  <rect x="148" y="658" width="10" height="10" rx="2" fill="#1D9E75"/>
  <text x="163" y="667" font-family="sans-serif" font-size="11" fill="#555555">Cloud managed</text>
  <rect x="270" y="658" width="10" height="10" rx="2" fill="#D85A30"/>
  <text x="285" y="667" font-family="sans-serif" font-size="11" fill="#555555">On-prem</text>
  <rect x="360" y="658" width="10" height="10" rx="2" fill="#7F77DD"/>
  <text x="375" y="667" font-family="sans-serif" font-size="11" fill="#555555">Hub operators (Crossplane · CAPI)</text>

  <!-- Bottom notes -->
  <text x="340" y="690" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999999">Crossplane unified XRDs replace ACK · ASO · KCC · ESO + workload identity replaces hub SOPS push</text>
  <text x="340" y="708" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#999999">Bootstrap cluster (1&#8211;3 nodes, external) provides hub cold-start recovery · not shown</text>
</svg>
