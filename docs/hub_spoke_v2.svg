  <text x="311" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">Unified XRDs</text>
  <text x="311" y="313" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">cloud-agnostic</text>
  <text x="311" y="331" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">provider-aws</text>
  <text x="311" y="349" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">provider-azure</text>
  <text x="311" y="367" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">provider-gcp</text>

