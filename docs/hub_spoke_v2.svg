  <text x="515" y="295" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">Kubeadm provider</text>
  <text x="515" y="313" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">own reconciliation loop</text>
  <text x="515" y="331" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">Infra provider</text>
  <text x="515" y="349" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">(Metal3 / CAPV / CAPO)</text>

  <!-- Hub to Spoke arrows -->
  <line x1="124" y1="412" x2="124" y2="452" stroke="#888888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="124" y="434" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888888">provider-aws</text>
  <line x1="262" y1="412" x2="262" y2="452" stroke="#888888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="262" y="434" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888888">provider-azure</text>
  <line x1="400" y1="412" x2="400" y2="452" stroke="#888888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="400" y="434" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888888">provider-gcp</text>
  <line x1="547" y1="412" x2="547" y2="452" stroke="#888888" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="547" y="434" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#888888">CAPI</text>

