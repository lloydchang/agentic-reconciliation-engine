  <text x="348" y="184" font-family="sans-serif" font-size="12" fill="#888888">Flux pulls manifests</text>

  <!-- Hub cluster border (dashed) -->
  <rect x="50" y="198" width="580" height="214" rx="14" fill="none" stroke="#7F77DD" stroke-width="1.5" stroke-dasharray="7 4"/>
  <text x="340" y="220" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#3C3489">Hub cluster</text>
  <text x="340" y="238" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#534AB7">any Kubernetes distribution · Flux self-manages hub after bootstrap · 3+ control plane nodes (HA)</text>

