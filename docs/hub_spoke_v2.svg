<svg xmlns="http://www.w3.org/2000/svg" width="680" height="724" viewBox="0 0 680 724">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- white background -->
  <rect x="0" y="0" width="680" height="724" fill="#ffffff"/>

  <!-- Tier labels -->
  <text x="26" y="60"  text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999999">[Tier 0]</text>
  <text x="26" y="140" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999999">[CI]</text>
  <text x="26" y="307" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999999">[Tier 1]</text>
  <text x="26" y="542" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#999999">[Tier 2]</text>

  <!-- Git repository -->
  <rect x="215" y="32" width="250" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="1"/>
  <text x="340" y="55" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#633806">Git repository</text>
  <text x="340" y="73" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#854F0B">declarative source of truth</text>

  <!-- Git to CI arrow -->
  <line x1="340" y1="88" x2="340" y2="110" stroke="#888888" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- CI policy gate -->
  <rect x="80" y="110" width="520" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1"/>
  <text x="340" y="133" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="bold" fill="#444441">CI policy gate</text>
  <text x="340" y="152" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">deletion guard · schema validation · OPA policy checks</text>

  <!-- CI to Hub arrow -->
