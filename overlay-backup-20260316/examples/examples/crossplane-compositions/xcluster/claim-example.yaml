# XCluster claim — spoke team writes this.
# CAPI provisions the cluster; Crossplane manages its lifecycle.
apiVersion: platform.example.com/v1alpha1
kind: Cluster
metadata:
  name: workloads-east
  namespace: platform
  labels:
    team: platform
    env: production
    cost-center: platform
  annotations:
    platform.example.com/allow-deletion: "false"
spec:
  compositionSelector:
    matchLabels:
      provider: aws
  nodeCount: 3
  nodeSize: medium
  kubernetesVersion: "1.30"
  region: us-east-1
  networkRef:
    name: prod-network
  deletionPolicy: Orphan
  writeConnectionSecretToRef:
    name: workloads-east-kubeconfig
    namespace: platform
