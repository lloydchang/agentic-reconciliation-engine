apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: xdatabase-gcp
  labels:
    provider: gcp
    platform.example.com/xrd: xdatabase
spec:
  compositeTypeRef:
    apiVersion: platform.example.com/v1alpha1
    kind: XDatabase
  writeConnectionSecretsToNamespace: crossplane-system
  resources:
    - name: cloud-sql-instance
      base:
        apiVersion: sql.gcp.upbound.io/v1beta1
        kind: DatabaseInstance
        spec:
          forProvider:
            region: us-central1
            databaseVersion: POSTGRES_15   # patched
            settings:
              - tier: db-custom-2-7680     # patched by size
                diskType: PD_SSD
                diskSize: 20
                ipConfiguration:
                  - ipv4Enabled: false
                    privateNetworkRef:
                      name: ""             # inject via EnvironmentConfig
          deletionPolicy: Orphan
          providerConfigRef:
            name: gcp-provider
          writeConnectionSecretToRef:
            namespace: crossplane-system
            name: ""
      patches:
        - type: FromCompositeFieldPath
          fromFieldPath: spec.version
          toFieldPath: spec.forProvider.databaseVersion
          transforms:
            - type: string
              string:
                fmt: "POSTGRES_%s"
        - type: FromCompositeFieldPath
          fromFieldPath: spec.size
          toFieldPath: spec.forProvider.settings[0].tier
          transforms:
            - type: map
              map:
                small:  db-custom-2-3840
                medium: db-custom-4-15360
                large:  db-custom-8-30720
        - type: FromCompositeFieldPath
          fromFieldPath: metadata.name
          toFieldPath: spec.writeConnectionSecretToRef.name
          transforms:
            - type: string
              string:
                fmt: "%s-conn"
        - type: ToCompositeFieldPath
          fromFieldPath: status.atProvider.connectionName
          toFieldPath: status.endpoint
