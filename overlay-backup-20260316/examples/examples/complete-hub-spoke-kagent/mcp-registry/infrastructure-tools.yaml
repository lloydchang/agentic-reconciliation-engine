# MCP Registry for Infrastructure Tools
# Centralized tool management for agent orchestration

---
# Infrastructure Tools Registry
apiVersion: kagent.io/v1alpha1
kind: MCPRegistry
metadata:
  name: infrastructure-tools
  namespace: control-plane
  labels:
    app: kagent
    registry: infrastructure-tools
    component: mcp-registry
spec:
  tools:
  # Kubernetes Tools
  - name: kubectl
    version: "v1.28.0"
    capabilities: ["apply", "get", "describe", "logs", "exec", "delete", "create", "patch"]
    security: "rbac-restricted"
    endpoint: "mcp://kubectl-server"
    description: "Kubernetes command-line tool for cluster management"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"
  - name: helm
    version: "v3.14.0"
    capabilities: ["install", "upgrade", "rollback", "test", "template", "list", "uninstall"]
    security: "namespace-scoped"
    endpoint: "mcp://helm-server"
    description: "Kubernetes package manager for application deployment"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"
  - name: kustomize
    version: "v5.3.0"
    capabilities: ["build", "apply", "diff", "edit", "validate"]
    security: "read-only-by-default"
    endpoint: "mcp://kustomize-server"
    description: "Kubernetes configuration management tool"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"
  
  # Cloud Provider Tools
  - name: aws-cli
    version: "v2.13.0"
    capabilities: ["eks", "ec2", "rds", "s3", "cloudformation", "cloudwatch"]
    security: "iam-restricted"
    endpoint: "mcp://aws-server"
    description: "AWS command-line interface for cloud resource management"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
  - name: az-cli
    version: "v2.53.0"
    capabilities: ["aks", "vm", "sql", "storage", "monitor", "network"]
    security: "rbac-restricted"
    endpoint: "mcp://azure-server"
    description: "Azure command-line interface for cloud resource management"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
  - name: gcloud
    version: "v457.0.0"
    capabilities: ["gke", "compute", "sql", "storage", "monitoring", "iam"]
    security: "iam-restricted"
    endpoint: "mcp://gcp-server"
    description: "Google Cloud command-line interface for cloud resource management"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
  
  # Infrastructure as Code Tools
  - name: terraform
    version: "v1.6.0"
    capabilities: ["plan", "apply", "destroy", "validate", "fmt", "import"]
    security: "read-only-by-default"
    endpoint: "mcp://terraform-server"
    description: "Infrastructure as code tool for multi-cloud provisioning"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
  - name: pulumi
    version: "v3.95.0"
    capabilities: ["up", "down", "preview", "refresh", "destroy"]
    security: "rbac-restricted"
    endpoint: "mcp://pulumi-server"
    description: "Infrastructure as code tool with general-purpose programming languages"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
  
  # Monitoring and Observability Tools
  - name: prometheus
    version: "v2.47.0"
    capabilities: ["query", "range-query", "series", "labels"]
    security: "read-only"
    endpoint: "mcp://prometheus-server"
    description: "Monitoring and alerting toolkit for time-series data"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
  - name: grafana
    version: "v10.2.0"
    capabilities: ["dashboard-query", "alert-query", "datasource-query"]
    security: "read-only"
    endpoint: "mcp://grafana-server"
    description: "Visualization platform for monitoring data"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"
  - name: jaeger
    version: "v1.47.0"
    capabilities: ["trace-query", "trace-search", "service-dependencies"]
    security: "read-only"
    endpoint: "mcp://jaeger-server"
    description: "Distributed tracing system for microservices"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
  
  # Security Tools
  - name: kubeconform
    version: "v0.6.0"
    capabilities: ["validate", "strict-validate", "summary"]
    security: "read-only"
    endpoint: "mcp://kubeconform-server"
    description: "Kubernetes manifest validation tool"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"
  - name: kube-score
    version: "v1.16.0"
    capabilities: ["score", "recommend", "analyze"]
    security: "read-only"
    endpoint: "mcp://kube-score-server"
    description: "Kubernetes best practice checker"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"
  - name: falco
    version: "v0.36.0"
    capabilities: ["monitor", "alert", "rule-evaluate"]
    security: "read-only"
    endpoint: "mcp://falco-server"
    description: "Runtime security monitoring for Kubernetes"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
  
  # GitOps Tools
  - name: flux-cli
    version: "v2.2.0"
    capabilities: ["reconcile", "suspend", "resume", "status", "sync"]
    security: "cluster-admin"
    endpoint: "mcp://flux-server"
    description: "GitOps operator command-line interface"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"
  - name: argocd-cli
    version: "v2.8.0"
    capabilities: ["sync", "app-get", "app-create", "app-delete"]
    security: "cluster-admin"
    endpoint: "mcp://argocd-server"
    description: "GitOps continuous delivery tool"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "500m"

---
# Custom GitOps Tools Registry
apiVersion: kagent.io/v1alpha1
kind: MCPRegistry
metadata:
  name: gitops-tools
  namespace: control-plane
  labels:
    app: kagent
    registry: gitops-tools
    component: mcp-registry
spec:
  tools:
  - name: manifest-validator
    version: "v1.0.0"
    capabilities: ["validate", "schema-check", "dependency-check", "security-scan"]
    security: "read-only"
    endpoint: "mcp://manifest-validator-server"
    description: "Custom Kubernetes manifest validation with GitOps-specific checks"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"
  - name: drift-analyzer
    version: "v1.0.0"
    capabilities: ["detect-drift", "analyze-impact", "suggest-remediation"]
    security: "read-only"
    endpoint: "mcp://drift-analyzer-server"
    description: "Infrastructure drift detection and analysis tool"
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "2000m"
  - name: compliance-checker
    version: "v1.0.0"
    capabilities: ["check-cis", "check-nist", "check-company-policies"]
    security: "read-only"
    endpoint: "mcp://compliance-checker-server"
    description: "Compliance validation against industry standards"
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "2000m"
  - name: cost-analyzer
    version: "v1.0.0"
    capabilities: ["analyze-cost", "optimize-resources", "forecast-spending"]
    security: "read-only"
    endpoint: "mcp://cost-analyzer-server"
    description: "Multi-cloud cost analysis and optimization"
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "2000m"
  - name: backup-validator
    version: "v1.0.0"
    capabilities: ["verify-backup", "test-recovery", "check-retention"]
    security: "read-only"
    endpoint: "mcp://backup-validator-server"
    description: "Backup and recovery validation tool"
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "1000m"

---
# AI/ML Tools Registry
apiVersion: kagent.io/v1alpha1
kind: MCPRegistry
metadata:
  name: ai-tools
  namespace: control-plane
  labels:
    app: kagent
    registry: ai-tools
    component: mcp-registry
spec:
  tools:
  - name: claude-code
    version: "v1.0.0"
    capabilities: ["analyze", "generate", "validate", "troubleshoot", "optimize"]
    security: "api-key-authenticated"
    endpoint: "mcp://claude-code-server"
    description: "AI assistant for infrastructure analysis and automation"
    resources:
      requests:
        memory: "1Gi"
        cpu: "1000m"
      limits:
        memory: "2Gi"
        cpu: "2000m"
  - name: log-analyzer
    version: "v1.0.0"
    capabilities: ["parse-logs", "detect-anomalies", "correlate-events", "summarize"]
    security: "read-only"
    endpoint: "mcp://log-analyzer-server"
    description: "AI-powered log analysis and anomaly detection"
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
  - name: metric-analyzer
    version: "v1.0.0"
    capabilities: ["analyze-trends", "detect-anomalies", "forecast-metrics", "correlate"]
    security: "read-only"
    endpoint: "mcp://metric-analyzer-server"
    description: "AI-powered metrics analysis and forecasting"
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
  - name: incident-predictor
    version: "v1.0.0"
    capabilities: ["predict-incidents", "risk-assessment", "early-warning"]
    security: "read-only"
    endpoint: "mcp://incident-predictor-server"
    description: "AI-powered incident prediction and risk assessment"
    resources:
      requests:
        memory: "1Gi"
        cpu: "1000m"
      limits:
        memory: "2Gi"
        cpu: "2000m"
