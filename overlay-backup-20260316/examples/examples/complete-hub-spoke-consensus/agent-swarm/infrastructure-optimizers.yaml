# Self-Organizing Swarm Configuration
apiVersion: swarm.gitops.io/v1alpha1
kind: AgentSwarm
metadata:
  name: infrastructure-optimizers
  namespace: control-plane
  labels:
    app: swarm-controller
    component: agent-swarm
spec:
  agents:
  - type: cost-optimizer
    count: 3
    strategy: "local-hill-climbing"
    feedbackLoop: "30s"
    image: "consensus/cost-optimizer:v3.0"
    resources:
      requests:
        memory: "512Mi"
        cpu: "500m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    env:
    - name: FEEDBACK_INTERVAL
      value: "30s"
    - name: OPTIMIZATION_STRATEGY
      value: "local-hill-climbing"
    - name: CONSENSUS_PROTOCOL
      value: "raft"
    - name: VOTE_WEIGHT
      value: "1"
  - type: security-scanner
    count: 2
    strategy: "consensus-validation"
    feedbackLoop: "5m"
    image: "consensus/security-scanner:v3.0"
    resources:
      requests:
        memory: "1Gi"
        cpu: "1000m"
      limits:
        memory: "2Gi"
        cpu: "2000m"
    env:
    - name: FEEDBACK_INTERVAL
      value: "5m"
    - name: VALIDATION_STRATEGY
      value: "consensus-validation"
    - name: CONSENSUS_PROTOCOL
      value: "raft"
    - name: VOTE_WEIGHT
      value: "2"
  - type: performance-tuner
    count: 2
    strategy: "feedback-driven"
    feedbackLoop: "1h"
    image: "consensus/performance-tuner:v3.0"
    resources:
      requests:
        memory: "256Mi"
        cpu: "250m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
    - name: FEEDBACK_INTERVAL
      value: "1h"
    - name: TUNING_STRATEGY
      value: "feedback-driven"
    - name: CONSENSUS_PROTOCOL
      value: "raft"
    - name: VOTE_WEIGHT
      value: "1"
  communication:
    protocol: "raft-based"
    heartbeat: "10s"
    consensusTimeout: "30s"
    networkPolicy:
      enabled: true
      ports:
      - name: raft
        port: 8080
        protocol: TCP
      - name: metrics
        port: 9090
        protocol: TCP
  emergence:
    type: "collective-intelligence"
    optimization: "local-maxima"
    coordination: "lightweight-consensus"
    learningRate: "0.01"
    adaptationThreshold: "0.1"
  scaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 10
    targetCPUUtilization: 70
    targetMemoryUtilization: 80
  security:
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      fsGroup: 2000
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
        - ALL
  monitoring:
    enabled: true
    prometheus:
      enabled: true
      port: 9090
      path: "/metrics"
    grafana:
      enabled: true
      dashboardName: "agent-swarm-metrics"
