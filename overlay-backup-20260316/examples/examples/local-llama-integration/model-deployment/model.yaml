# Local Llama Model Deployment
# Deploys Llama-3.2-3B-Instruct-q4f16_1-MLC model with Web-LLM server

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: llama-model-storage
  namespace: control-plane
  labels:
    app: llama-model
    component: ai-integration
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: fast-ssd  # Use SSD for better model loading performance
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llama-model-config
  namespace: control-plane
  labels:
    app: llama-model
    component: ai-integration
data:
  config.json: |
    {
      "model": "Llama-3.2-3B-Instruct-q4f16_1-MLC",
      "model_id": "meta-llama/Llama-3.2-3B-Instruct-q4f16_1-MLC",
      "model_lib": "web-llm",
      "context_window_size": 4096,
      "temperature": 0.7,
      "max_tokens": 2048,
      "stream": true
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-model-server
  namespace: control-plane
  labels:
    app: llama-model
    component: ai-integration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-model
  template:
    metadata:
      labels:
        app: llama-model
    spec:
      containers:
      - name: llama-model
        # NOTE: Replace with actual image containing Web-LLM and Llama model
        # Build custom image with: https://web-llm.mlc.ai/
        image: custom/llama-3.2-web-llm:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: MODEL_PATH
          value: "/models"
        - name: CONFIG_FILE
          value: "/config/config.json"
        volumeMounts:
        - name: model-storage
          mountPath: /models
        - name: config-volume
          mountPath: /config
          readOnly: true
        resources:
          requests:
            memory: "4Gi"
            cpu: "2"
            # Uncomment for GPU support
            # nvidia.com/gpu: "1"
          limits:
            memory: "8Gi"
            cpu: "4"
            # Uncomment for GPU support
            # nvidia.com/gpu: "1"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL
      volumes:
      - name: model-storage
        persistentVolumeClaim:
          claimName: llama-model-storage
      - name: config-volume
        configMap:
          name: llama-model-config
      serviceAccountName: llama-model-sa
      securityContext:
        fsGroup: 1000
      # Uncomment for GPU node scheduling
      # nodeSelector:
      #   accelerator: nvidia-tesla-k80
      # tolerations:
      # - key: nvidia.com/gpu
      #   operator: Exists
      #   effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: llama-model-service
  namespace: control-plane
  labels:
    app: llama-model
    component: ai-integration
spec:
  selector:
    app: llama-model
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: llama-model-netpol
  namespace: control-plane
  labels:
    app: llama-model
    component: ai-integration
spec:
  podSelector:
    matchLabels:
      app: llama-model
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: flux-system
    - podSelector:
        matchLabels:
          app: ai-cronjob
    - podSelector:
        matchLabels:
          app: ai-validation
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llama-model-sa
  namespace: control-plane
  labels:
    app: llama-model
    component: ai-integration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: llama-model-role
  labels:
    app: llama-model
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
  resourceNames: ["llama-model-config"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: llama-model-binding
  labels:
    app: llama-model
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: llama-model-role
subjects:
- kind: ServiceAccount
  name: llama-model-sa
  namespace: control-plane
