# ClusterSecretStore for HashiCorp Vault using Kubernetes auth.
# Vault must have Kubernetes auth enabled and a role bound to the
# external-secrets service account in the external-secrets namespace.
# See ESO-WORKLOAD-IDENTITY.md for vault configuration steps.
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: vault
spec:
  provider:
    vault:
      server: "https://vault.example.com"
      path: "secret"
      version: "v2"
      auth:
        kubernetes:
          mountPath: "spoke-onprem"     # Vault auth mount path for this spoke
          role: "eso"                   # Vault role bound to ESO service account
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
