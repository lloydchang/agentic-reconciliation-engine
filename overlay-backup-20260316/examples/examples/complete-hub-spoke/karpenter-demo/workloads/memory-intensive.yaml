---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-intensive
  namespace: default
  labels:
    app: memory-intensive
    demo: karpenter
spec:
  replicas: 3
  selector:
    matchLabels:
      app: memory-intensive
  template:
    metadata:
      labels:
        app: memory-intensive
        demo: karpenter
    spec:
      containers:
      - name: memory-stress
        image: polinux/stress
        resources:
          requests:
            cpu: "200m"
            memory: "1Gi"
          limits:
            cpu: "500m"
            memory: "2Gi"
        command: ["/bin/sh"]
        args:
        - -c
        - |
          while true; do
            # Allocate and use memory for 45 seconds, then rest for 15 seconds
            stress-ng --vm 1 --vm-bytes 1500M --vm-hang 0 --timeout 45s
            sleep 15
          done
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
      - key: "karpenter"
        operator: "Exists"
        effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: memory-intensive-service
  namespace: default
  labels:
    app: memory-intensive
    demo: karpenter
spec:
  selector:
    app: memory-intensive
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
