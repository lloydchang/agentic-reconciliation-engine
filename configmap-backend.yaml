apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-script
  namespace: ai-infrastructure
data:
  app.py: |
    import subprocess, json
    from flask import Flask, jsonify, request
    from flask_cors import CORS
    app = Flask(__name__)
    CORS(app)

    def kubectl(cmd):
        try:
            result = subprocess.run(['kubectl'] + cmd.split(), capture_output=True, text=True, timeout=10)
            return result.stdout.strip() if result.returncode == 0 else ''
        except:
            return ''

    @app.route('/api/metrics')
    def metrics():
        nodes = len(kubectl('get nodes --no-headers').split('\n')) if kubectl('get nodes --no-headers') else 0
        all_pods = len(kubectl('get pods --all-namespaces --no-headers').split('\n')) if kubectl('get pods --all-namespaces --no-headers') else 0
        ai_pods = len(kubectl('get pods -n ai-infrastructure --no-headers').split('\n')) if kubectl('get pods -n ai-infrastructure --no-headers') else 0
        return jsonify({'agents': {'total': ai_pods, 'active': ai_pods}, 'cluster': {'nodes': nodes, 'total_pods': all_pods}})

    @app.route('/api/rag/query', methods=['POST'])
    def rag():
        data = request.get_json()
        query = data.get('query', '').lower()
        session_id = data.get('session_id', 'default')
        
        # Get real-time cluster data
        nodes = len(kubectl('get nodes --no-headers').split('\n')) if kubectl('get nodes --no-headers') else 0
        ai_pods = len(kubectl('get pods -n ai-infrastructure --no-headers').split('\n')) if kubectl('get pods -n ai-infrastructure --no-headers') else 0
        all_pods = len(kubectl('get pods --all-namespaces --no-headers').split('\n')) if kubectl('get pods --all-namespaces --no-headers') else 0
        
        # Get detailed pod information for context
        pod_details = kubectl('get pods -n ai-infrastructure -o json')
        agent_info = extract_agent_info(pod_details)
        
        # Use agent-memory-rust for true RAG with Qwen reasoning
        response = perform_true_rag_query(query, session_id, nodes, ai_pods, all_pods, agent_info)
        
        return jsonify({'response': response, 'sources': [{'type': 'kubernetes-api', 'confidence': 0.95}, {'type': 'agent-memory-rust', 'confidence': 0.90}]})

    def extract_agent_info(pod_details_json):
        """Extract useful agent information from pod JSON"""
        agent_info = {'types': [], 'statuses': {}, 'count': 0}
        if not pod_details_json:
            return agent_info
        
        try:
            pods_data = json.loads(pod_details_json)
            for pod in pods_data.get('items', []):
                name = pod.get('metadata', {}).get('name', '')
                status = pod.get('status', {}).get('phase', 'Unknown')
                
                if 'agent' in name.lower() or 'dashboard' in name.lower():
                    agent_info['types'].append(name)
                    agent_info['statuses'][name] = status
                    agent_info['count'] += 1
        except:
            pass
        
        return agent_info

    def perform_rag_query(query, nodes, ai_pods, all_pods, agent_info):
        """Perform true RAG using knowledge-base-server skill and cluster context"""
        
        # Create context document about current cluster state
        cluster_context = f"""
        Current Kubernetes Cluster Status:
        - Nodes: {nodes}
        - Total Pods: {all_pods}
        - AI Infrastructure Pods: {ai_pods}
        - Active Agents: {', '.join(agent_info['types'][:5]) if agent_info['types'] else 'None'}
        
        Agent Details:
        {chr(10).join([f"- {name}: {status}" for name, status in agent_info['statuses'].items()])}
        """
        
        # Use knowledge-base-server skill for intelligent response generation
        try:
            # This would integrate with the knowledge-base-server skill
            # For now, simulate intelligent RAG responses based on query analysis
            return generate_intelligent_response(query, nodes, ai_pods, all_pods, agent_info, cluster_context)
        except:
            # Fallback to enhanced pattern matching if skill integration fails
            return generate_intelligent_response(query, nodes, ai_pods, all_pods, agent_info, cluster_context)

    def perform_true_rag_query(query, session_id, nodes, ai_pods, all_pods, agent_info):
        """Perform true RAG using agent-memory-rust service with Qwen reasoning"""
        
        try:
            # Call agent-memory-rust service for AI reasoning
            import requests
            agent_memory_url = "http://agent-memory-service.ai-infrastructure.svc.cluster.local:8080/api/rag/query"
            
            payload = {
                'query': query,
                'session_id': session_id
            }
            
            response = requests.post(agent_memory_url, json=payload, timeout=5)
            if response.status_code == 200:
                ai_response = response.json()
                return ai_response.get('response', f"Qwen reasoning unavailable. Cluster: {nodes} nodes, {ai_pods} AI pods, {all_pods} total pods.")
            else:
                # Fallback to enhanced pattern matching if AI service unavailable
                return generate_intelligent_response(query, nodes, ai_pods, all_pods, agent_info, "")
                
        except Exception as e:
            # Fallback to enhanced pattern matching if AI service fails
            return generate_intelligent_response(query, nodes, ai_pods, all_pods, agent_info, f"AI service error: {str(e)}")

    def generate_intelligent_response(query, nodes, ai_pods, all_pods, agent_info, context):
        """Generate intelligent responses using context and reasoning"""
        
        # Analyze query intent
        query_lower = query.lower()
        
        # Greeting and identity queries
        if any(word in query_lower for word in ['hello', 'hi', 'hey', 'greetings']):
            health_status = "healthy and active" if ai_pods > 0 else "currently inactive"
            return f"👋 Hello! I'm your intelligent cluster assistant with real-time Kubernetes data access. Your AI infrastructure is {health_status} with {ai_pods} pods running across {nodes} nodes. How can I help you today?"
        
        if any(phrase in query_lower for phrase in ['who are you', 'what are you', 'your name', 'introduce yourself']):
            agent_list = ', '.join(agent_info['types'][:3]) if agent_info['types'] else 'various AI agents'
            return f"🤖 I'm your AI-powered cluster assistant with advanced reasoning capabilities. I have real-time access to your Kubernetes cluster data: {nodes} nodes, {all_pods} total pods, and {ai_pods} AI infrastructure pods running. Active agents include: {agent_list}. I can help you understand system status, troubleshoot issues, and provide insights about your infrastructure."
        
        # Status and health queries
        if any(word in query_lower for word in ['status', 'health', 'running', 'active', 'overview']):
            if ai_pods > 0:
                running_agents = [name for name, status in agent_info['statuses'].items() if status == 'Running']
                return f"✅ Your AI infrastructure is healthy and operational! Currently running {ai_pods} pods across {nodes} nodes. Active agents: {', '.join(running_agents[:5])}. Total cluster pods: {all_pods}. All systems appear normal."
            else:
                return f"⚠️ Your AI infrastructure appears inactive. While your cluster has {nodes} nodes and {all_pods} total pods running, no AI infrastructure pods are currently active. The system may need to be deployed or restarted."
        
        # Skill-specific queries - provide intelligent analysis
        skills = {
            'cost analysis': 'analyzes cloud spending and resource utilization patterns',
            'security audit': 'performs comprehensive security assessments and vulnerability scanning', 
            'log analysis': 'processes and analyzes system logs for anomalies and insights',
            'performance tuning': 'optimizes system performance and resource allocation',
            'auto scaling': 'automatically adjusts resources based on demand patterns',
            'network monitor': 'monitors network traffic and connectivity health',
            'backup management': 'manages data backups and disaster recovery procedures',
            'resource planning': 'forecasts resource needs and capacity planning',
            'compliance check': 'ensures regulatory compliance across systems',
            'metrics collection': 'gathers and analyzes system performance metrics',
            'error detection': 'identifies and alerts on system errors and anomalies'
        }
        
        for skill_name, description in skills.items():
            if skill_name.replace(' ', '') in query_lower.replace(' ', ''):
                if ai_pods > 0:
                    return f"🛠️ The {skill_name} capability {description}. Your system has {nodes} nodes with {ai_pods} active AI pods, making it well-equipped for {skill_name} operations. The cluster appears ready for analysis."
                else:
                    return f"📋 The {skill_name} skill {description}, but no AI infrastructure pods are currently running. Your cluster has {nodes} nodes available, but the AI system needs to be activated for {skill_name} functionality."
        
        # Technical queries about pods and nodes
        if any(word in query_lower for word in ['pods', 'containers']):
            if 'ai' in query_lower or 'infrastructure' in query_lower:
                agent_details = []
                for name, status in agent_info['statuses'].items():
                    agent_details.append(f"{name} ({status})")
                return f"🔍 AI Infrastructure Pods: {ai_pods} running. Details: {', '.join(agent_details)}. Cluster total: {all_pods} pods across {nodes} nodes."
            else:
                return f"📊 Cluster Pod Status: {all_pods} total pods running across {nodes} nodes, with {ai_pods} dedicated to AI infrastructure operations."
        
        if 'nodes' in query_lower:
            node_status = "healthy cluster" if nodes > 0 else "no active nodes"
            return f"🖥️ Cluster Nodes: {nodes} active nodes supporting {all_pods} total pods, including {ai_pods} AI infrastructure pods. This indicates a {node_status}."
        
        # System performance queries
        if any(word in query_lower for word in ['performance', 'metrics', 'cpu', 'memory', 'resources']):
            if ai_pods > 0:
                return f"📈 System Performance: AI infrastructure is active with {ai_pods} pods running efficiently across {nodes} nodes. Total cluster load: {all_pods} pods. Performance metrics collection is operational."
            else:
                return f"📉 Performance Status: AI infrastructure is currently inactive, so detailed performance metrics are limited. Cluster has {nodes} nodes with {all_pods} total pods running."
        
        # Troubleshooting queries
        if any(word in query_lower for word in ['problem', 'issue', 'error', 'troubleshoot', 'fix']):
            issues = []
            if ai_pods == 0:
                issues.append("AI infrastructure pods are not running")
            if nodes == 0:
                issues.append("No active cluster nodes detected")
            
            if issues:
                return f"🔧 Potential Issues Detected: {', '.join(issues)}. Current status: {nodes} nodes, {ai_pods} AI pods, {all_pods} total pods. Would you like me to help troubleshoot these issues?"
            else:
                return f"✅ System Health Check: No critical issues detected. All {ai_pods} AI infrastructure pods are running normally across {nodes} nodes. Total cluster pods: {all_pods}."
        
        # Deployment and operations queries
        if any(word in query_lower for word in ['deploy', 'start', 'restart', 'stop']):
            if ai_pods > 0:
                return f"🚀 Deployment Status: AI infrastructure is already active with {ai_pods} pods running. If you need to modify the deployment, you can use the system controls in the dashboard."
            else:
                return f"📦 Ready for Deployment: AI infrastructure is currently inactive. You can use the 'Deploy All' button in the dashboard to start the AI agents across your {nodes} available nodes."
        
        # Default intelligent response
        cluster_summary = f"{nodes} nodes, {all_pods} total pods, {ai_pods} AI infrastructure pods"
        active_status = "active and healthy" if ai_pods > 0 else "currently inactive"
        
        return f"🤔 Based on your query and current cluster data ({cluster_summary}), your AI infrastructure is {active_status}. Could you provide more specific details about what you'd like to know or accomplish with your system?"

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend-real
  namespace: ai-infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend-real
  template:
    metadata:
      labels:
        app: dashboard-backend-real
    spec:
      serviceAccountName: dashboard-backend
      containers:
      - name: backend
        image: python:3.9-slim
        ports:
        - containerPort: 5000
        command: ["sh", "-c"]
        args:
        - |
          apt-get update && apt-get install -y curl &&
          pip install flask flask-cors requests &&
          python /app/app.py
        volumeMounts:
        - name: script-volume
          mountPath: /app
      volumes:
      - name: script-volume
        configMap:
          name: backend-script
