apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-api-enhanced
  namespace: ai-infrastructure
  labels:
    component: dashboard-api-enhanced
spec:
  replicas: 1
  selector:
    matchLabels:
      component: dashboard-api-enhanced
  template:
    metadata:
      labels:
        component: dashboard-api-enhanced
    spec:
      containers:
      - name: api
        image: python:3.9-alpine
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
        env:
        - name: USE_REAL_METRICS
          value: "true"
        - name: METRICS_SERVER_URL
          value: "http://ai-metrics-service.ai-infrastructure.svc.cluster.local:8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-api-enhanced-service
  namespace: ai-infrastructure
  labels:
    component: dashboard-api-enhanced
spec:
  type: ClusterIP
  ports:
  - name: api
    port: 5000
    targetPort: 5000
    protocol: TCP
  selector:
    component: dashboard-api-enhanced
