apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: dashboard-dark-theme
  namespace: flux-system
  annotations:
    overlay.name: "dashboard-dark-theme"
    overlay.version: "1.2.0"
    overlay.category: "dashboard"
    overlay.type: "theme"
    overlay.compatibility: ">=0.1.0"
resources:
  # Reference to base dashboard
  - ../../../../../agents/dashboard
# Patches to apply dark theme
patchesStrategicMerge:
  - dashboard-patches.yaml
# Dark theme configuration
configMapGenerator:
  - name: dashboard-dark-theme-config
    files:
      - dark-theme.json
      - dark-theme.css
    literals:
      - OVERLAY_NAME="dashboard-dark-theme"
      - OVERLAY_VERSION="1.2.0"
      - OVERLAY_TYPE="theme"
      - THEME_MODE="dark"
      - OVERLAY_ENABLED=true
# Common labels for overlay resources
commonLabels:
  overlay: "dashboard-dark-theme"
  overlay-type: "theme"
  component: "dashboard"
  managed-by: "kustomize"
# Namespace configuration
namespace: flux-system
# Images for dashboard
images:
  - name: nginx
    newTag: "1.21-alpine"
  - name: node
    newTag: "18-alpine"
# Custom resource configurations
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dashboard
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: THEME_MODE
          value: "dark"
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dashboard
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: dark-theme-assets
          mountPath: /app/themes/dark
          readOnly: true
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: dashboard
    patch: |-
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: dark-theme-assets
          configMap:
            name: dashboard-dark-theme-config
