apiVersion: v1
kind: Schema
metadata:
  name: overlay-metadata-schema
  description: "Schema for overlay metadata validation"
schema:
  type: object
  properties:
    name:
      type: string
      pattern: "^[a-z0-9-]+$"
      description: "Overlay identifier (lowercase, numbers, hyphens only)"
    version:
      type: string
      pattern: "^\\d+\\.\\d+\\.\\d+$"
      description: "Semantic version (e.g., 1.0.0)"
    description:
      type: string
      maxLength: 1024
      description: "What the overlay does and when to use it"
    category:
      enum: [skills, dashboard, infrastructure, composed]
      description: "Overlay category"
    base_path:
      type: string
      description: "Path to base component being overlaid"
    base_version:
      type: string
      description: "Base component version this overlay targets"
    dependencies:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            description: "Dependency overlay name"
          version:
            type: string
            description: "Required version (semantic versioning)"
          optional:
            type: boolean
            default: false
            description: "Whether dependency is optional"
      description: "Overlay dependencies"
    compatibility:
      type: object
      properties:
        min_base:
          type: string
          description: "Minimum base version supported"
        max_base:
          type: string
          description: "Maximum base version supported"
        agentskills.io:
          type: string
          description: "agentskills.io specification version"
        python:
          type: string
          description: "Python version requirement"
        kubernetes:
          type: string
          description: "Kubernetes version requirement"
      description: "Compatibility requirements"
    maintainer:
      type: object
      properties:
        name:
          type: string
          description: "Maintainer name"
        email:
          type: string
          format: email
          description: "Maintainer email"
        organization:
          type: string
          description: "Maintainer organization"
        url:
          type: string
          format: uri
          description: "Maintainer website"
      description: "Overlay maintainer information"
    tags:
      type: array
      items:
        type: string
        description: "Tag for categorization and search"
      description: "Tags for overlay discovery"
    license:
      type: string
      description: "Overlay license (e.g., AGPLv3, MIT, Apache-2.0)"
    risk_level:
      enum: [low, medium, high]
      description: "Risk level for overlay operations"
    autonomy:
      enum: [fully_auto, conditional, requires_pr]
      description: "Autonomy level for overlay operations"
    human_gate:
      type: object
      properties:
        required:
          type: boolean
          description: "Whether human approval is required"
        description:
          type: string
          description: "Description of human gate requirements"
        approvers:
          type: array
          items:
            type: string
          description: "List of required approvers"
        timeout_minutes:
          type: number
          description: "Approval timeout in minutes"
      description: "Human gate configuration"
    resources:
      type: object
      properties:
        cpu:
          type: string
          description: "CPU resource requirements"
        memory:
          type: string
          description: "Memory resource requirements"
        storage:
          type: string
          description: "Storage resource requirements"
      description: "Resource requirements"
    environment_variables:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            description: "Environment variable name"
          required:
            type: boolean
            default: false
            description: "Whether variable is required"
          description:
            type: string
            description: "Variable description"
          default:
            type: string
            description: "Default value"
      description: "Required environment variables"
    inputs:
      type: object
      description: "Input schema for overlay configuration"
    outputs:
      type: object
      description: "Output schema for overlay results"
    examples:
      type: array
      items:
        type: object
        properties:
          name:
            type: string
            description: "Example name"
          description:
            type: string
            description: "Example description"
          command:
            type: string
            description: "Command to run example"
          expected_output:
            type: string
            description: "Expected output"
      description: "Usage examples"
  required:
    - name
    - version
    - description
    - category
    - base_path
    - base_version
    - maintainer
    - license
    - risk_level
    - autonomy
