apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: debug-enhanced
  namespace: flux-system
  annotations:
    overlay.name: "debug-enhanced"
    overlay.version: "2.0.0"
    overlay.category: "skills"
    overlay.base-skill: "debug"
    overlay.compatibility: "1.0.0+"
resources:
  # Reference to base skill
  - ../../../../.agents/debug
# Patches to add ML correlation and predictive capabilities
# patchesStrategicMerge:
#   - patches/deployment-patch.yaml
# Additional configurations
configMapGenerator:
  - name: debug-enhanced-config
    literals:
      - OVERLAY_ENABLED=true
      - OVERLAY_VERSION="2.0.0"
      - OVERLAY_TYPE="skill-extension"
      - BASE_SKILL="debug"
      - ML_CORRELATION=true
      - PREDICTIVE_ANALYSIS=true
      - ADVANCED_METRICS=true
# Secret generation for ML models
secretGenerator:
  - name: debug-enhanced-secrets
    envs:
      - .env.secret
# Common labels for overlay resources
commonLabels:
  overlay: "debug-enhanced"
  overlay-type: "skill"
  base-skill: "debug"
  managed-by: "kustomize"
# Namespace configuration
namespace: flux-system
# Images for ML enhanced debugging
images:
  - name: python
    newTag: "3.11-slim"
# Custom resource configurations
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: debug
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: ML_CORRELATION_ENABLED
          value: "true"
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: debug
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: PREDICTIVE_ANALYSIS_ENABLED
          value: "true"
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: debug
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: debug
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"
