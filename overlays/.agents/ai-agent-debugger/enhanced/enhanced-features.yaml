---
# Enhanced ConfigMap for ML-based debugging capabilities
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-agent-debugger-enhanced-config
  labels:
    overlay: ai-agent-debugger-enhanced
data:
  # ML correlation configuration
  ml_correlation.yaml: |
    # ML correlation analysis configuration
    enabled: true
    algorithms:
      - pearson_correlation
      - spearman_correlation
      - mutual_information
      - anomaly_detection
    
    correlation_threshold: 0.7
    time_window: "1h"
    min_samples: 100
    
    features:
      - cpu_usage
      - memory_usage
      - error_rate
      - response_time
      - throughput
      - queue_depth
    
    anomaly_detection:
      algorithm: "isolation_forest"
      contamination: 0.1
      n_estimators: 100
    
    pattern_recognition:
      enabled: true
      min_pattern_length: 5
      similarity_threshold: 0.8
  
  # Predictive analysis configuration
  predictive_analysis.yaml: |
    # Predictive failure analysis configuration
    enabled: true
    models:
      - name: "failure_prediction"
        type: "random_forest"
        features: ["cpu_trend", "memory_trend", "error_rate_trend"]
        prediction_horizon: "2h"
        confidence_threshold: 0.8
      
      - name: "performance_degradation"
        type: "linear_regression"
        features: ["response_time_history", "queue_length_history"]
        prediction_horizon: "1h"
        confidence_threshold: 0.7
    
    alerting:
      enabled: true
      thresholds:
        failure_probability: 0.8
        performance_degradation: 0.7
      channels:
        - dashboard
        - logging
        - webhook
    
    retraining:
      enabled: true
      schedule: "daily"
      min_samples: 1000
      performance_threshold: 0.8
  
  # Enhanced metrics configuration
  enhanced_metrics.yaml: |
    # Enhanced metrics collection configuration
    enabled: true
    
    custom_metrics:
      - name: "debug_session_duration"
        type: "histogram"
        buckets: [1, 5, 10, 30, 60, 300, 600]
        labels: ["component", "issue_type"]
      
      - name: "correlation_score"
        type: "gauge"
        labels: ["component1", "component2", "correlation_type"]
      
      - name: "prediction_confidence"
        type: "gauge"
        labels: ["model", "prediction_type"]
      
      - name: "anomaly_score"
        type: "gauge"
        labels: ["component", "anomaly_type"]
    
    collection_interval: "30s"
    retention_period: "30d"
    
    aggregation:
      enabled: true
      functions: ["avg", "max", "min", "sum", "count"]
      window: "5m"

---
# Enhanced Deployment patch for ML debugging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-debugger
  labels:
    overlay: ai-agent-debugger-enhanced
spec:
  template:
    spec:
      # Add ML-specific environment variables
      containers:
      - name: ai-agent-debugger
        env:
        - name: ML_CORRELATION_ENABLED
          value: "true"
        - name: PREDICTIVE_ANALYSIS_ENABLED
          value: "true"
        - name: ENHANCED_METRICS_ENABLED
          value: "true"
        - name: CORRELATION_THRESHOLD
          value: "0.7"
        - name: PREDICTION_HORIZON
          value: "2h"
        - name: ANOMALY_DETECTION_ENABLED
          value: "true"
        - name: PATTERN_RECOGNITION_ENABLED
          value: "true"
        # Mount enhanced configuration
        volumeMounts:
        - name: enhanced-config
          mountPath: /etc/enhanced-config
          readOnly: true
        # Add ML model storage
        - name: ml-models
          mountPath: /models
          readOnly: true
        # Enhanced resource requirements for ML processing
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      # Add enhanced configuration volume
      volumes:
      - name: enhanced-config
        configMap:
          name: ai-agent-debugger-enhanced-config
      # Add ML models volume (persistent)
      - name: ml-models
        persistentVolumeClaim:
          claimName: ai-agent-debugger-ml-models

---
# PersistentVolumeClaim for ML models
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-agent-debugger-ml-models
  labels:
    overlay: ai-agent-debugger-enhanced
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard

---
# Enhanced Service for ML debugging endpoints
apiVersion: v1
kind: Service
metadata:
  name: ai-agent-debugger-enhanced
  labels:
    overlay: ai-agent-debugger-enhanced
spec:
  selector:
    overlay: ai-agent-debugger-enhanced
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: metrics
    port: 9090
    targetPort: 9090
  - name: ml-api
    port: 8081
    targetPort: 8081
  type: ClusterIP

---
# Enhanced ServiceMonitor for ML debugging metrics
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: ai-agent-debugger-enhanced
  labels:
    overlay: ai-agent-debugger-enhanced
spec:
  selector:
    matchLabels:
      overlay: ai-agent-debugger-enhanced
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
    honorLabels: true
  - port: ml-api
    interval: 30s
    path: /ml-metrics
    honorLabels: true

---
# Custom PrometheusRule for enhanced debugging alerts
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: ai-agent-debugger-enhanced-rules
  labels:
    overlay: ai-agent-debugger-enhanced
spec:
  groups:
  - name: ai-agent-debugger-enhanced
    rules:
    - alert: HighCorrelationDetected
      expr: correlation_score > 0.9
      for: 5m
      labels:
        severity: warning
        overlay: ai-agent-debugger-enhanced
      annotations:
        summary: "High correlation detected between components"
        description: "Correlation score {{ $value }} indicates strong relationship between components"
    
    - alert: PredictiveFailureAlert
      expr: prediction_confidence > 0.8
      for: 2m
      labels:
        severity: critical
        overlay: ai-agent-debugger-enhanced
      annotations:
        summary: "Predictive failure alert triggered"
        description: "Model predicts failure with {{ $value }} confidence"
    
    - alert: AnomalyDetected
      expr: anomaly_score > 0.8
      for: 3m
      labels:
        severity: warning
        overlay: ai-agent-debugger-enhanced
      annotations:
        summary: "Anomaly detected in system behavior"
        description: "Anomaly score {{ $value }} indicates unusual behavior"
    
    - alert: MLModelPerformanceDegraded
      expr: model_performance < 0.7
      for: 10m
      labels:
        severity: warning
        overlay: ai-agent-debugger-enhanced
      annotations:
        summary: "ML model performance degraded"
        description: "Model performance {{ $value }} is below threshold"
