---
name: {{overlay-name}}
version: "{{overlay-version}}"
description: "Template for creating infrastructure overlays that extend Kubernetes and GitOps components with enhanced monitoring, security, and integration capabilities"
category: infrastructure
base_path: "control-plane/{{base-component}}"
base_version: "2.2.3"
license: "AGPLv3"
risk_level: medium
autonomy: conditional

maintainer:
  name: "Your Name"
  email: "your.email@example.com"
  organization: "Your Organization"
  url: "https://github.com/your-org"

tags:
  - infrastructure
  - kubernetes
  - gitops
  - "{{base-component}}"
  - overlay

compatibility:
  min_base: "2.0.0"
  max_base: "3.0.0"
  kubernetes: ">=1.20"
  flux: ">=2.0.0"

dependencies:
  - name: "{{base-component}}"
    version: ">=2.0.0"
    optional: false
  # Add additional dependencies as needed
  # - name: "prometheus-operator"
  #   version: ">=0.60.0"
  #   optional: false
  # - name: "cert-manager"
  #   version: ">=1.10.0"
  #   optional: true

environment_variables:
  - name: OVERLAY_ENABLED
    required: true
    description: "Enable overlay functionality"
    default: "true"
  - name: OVERLAY_COMPONENT
    required: true
    description: "Target infrastructure component"
    default: "{{base-component}}"
  - name: DEBUG_MODE
    required: false
    description: "Enable debug logging"
    default: "false"
  - name: LOG_LEVEL
    required: false
    description: "Logging level"
    default: "INFO"
  - name: SECURITY_LEVEL
    required: false
    description: "Security configuration level"
    default: "standard"

inputs:
  type: object
  properties:
    overlay_config:
      type: object
      description: "Infrastructure overlay configuration"
      properties:
        monitoring:
          type: object
          description: "Enhanced monitoring configuration"
        security:
          type: object
          description: "Security hardening configuration"
        networking:
          type: object
          description: "Network policy configuration"
        resources:
          type: object
          description: "Resource limits and requests"
    custom_resources:
      type: array
      items:
        type: object
      description: "Custom Kubernetes resources to deploy"
    policies:
      type: object
      description: "Policy and compliance configuration"
  required:
    - overlay_config

outputs:
  type: object
  properties:
    overlay_status:
      type: string
      enum: ["active", "inactive", "error"]
      description: "Overlay status"
    deployed_resources:
      type: array
      items:
        type: object
      description: "List of deployed resources"
    monitoring_status:
      type: object
      description: "Monitoring system status"
    security_status:
      type: object
      description: "Security configuration status"
    compliance_status:
      type: object
      description: "Compliance check results"
  required:
    - overlay_status
    - deployed_resources

examples:
  - name: "Apply infrastructure overlay"
    description: "Apply enhanced monitoring and security to infrastructure"
    command: "kustomize build overlays/control-plane/flux/enhanced-monitoring"
    expected_output: "Infrastructure with enhanced monitoring and security applied"
  - name: "Deploy custom resources"
    description: "Deploy custom Kubernetes resources with overlay"
    command: "kustomize build overlays/control-plane/flux/custom-resources"
    expected_output: "Custom resources deployed with overlay configuration"

resources:
  cpu: "200m"
  memory: "512Mi"
  storage: "5Gi"

human_gate:
  required: true
  description: "Infrastructure changes require approval for production environments"
  approvers: ["infrastructure-team@company.com", "security-team@company.com"]
  timeout_minutes: 60
