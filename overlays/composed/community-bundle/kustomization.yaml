# Community Bundle Composed Overlay
# Community-curated bundle of popular overlays and enhancements

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: community-bundle
  namespace: flux-system
  annotations:
    overlay.name: "community-bundle"
    overlay.category: "composed"
    overlay.version: "1.0.0"
    overlay.description: "Community-curated bundle of popular overlays and enhancements"
resources:
  # Base components
  - ../../../../control-plane
  - ../../../../.agents
  - ../../../../agents
  # Community overlays
  - ../.agents/debug/enhanced
  - ../agents/dashboard/themes/dark-mode
  - ../agents/dashboard/widgets/cost-calculator
  - ../.agents/infrastructure-provisioning/multi-cloud-enhanced
# Community bundle configurations
configMapGenerator:
  - name: community-bundle-config
    literals:
      - COMMUNITY_BUNDLE_ENABLED=true
      - COMMUNITY_FEATURES=true
      - ENHANCED_DEBUGGING=true
      - DARK_THEME=true
      - COST_CALCULATOR=true
      - MULTI_CLOUD=true
      - COMMUNITY_SUPPORT=true
      - OPEN_SOURCE=true
# Common labels for community bundle
commonLabels:
  bundle: community
  tier: community
  support: community
  license: AGPLv3
  overlay: "community-bundle"
# Resource constraints for community bundle
patchesStrategicMerge:
- resource-limits/community-limits.yaml
# Namespace configuration
namespace: flux-system
# Images for community bundle
images:
- name: python
  newTag: "3.11-slim"
- name: node
  newTag: "18-alpine"
- name: grafana/grafana
  newTag: "10.2.0"
