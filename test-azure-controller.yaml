apiVersion: apps/v1
kind: Deployment
metadata:
  name: azure-service-operator-controller
  namespace: azureserviceoperator-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: azure-service-operator
  template:
    metadata:
      labels:
        app: azure-service-operator
    spec:
      serviceAccountName: azure-service-operator
      containers:
      - name: controller
        image: mcr.microsoft.com/k8s/azure-service-operator:v0.5.0
        env:
        - name: AZURE_CLIENT_ID
          value: "test"
        - name: AZURE_CLIENT_SECRET
          value: "test"
        - name: AZURE_TENANT_ID
          value: "test"
        - name: AZURE_SUBSCRIPTION_ID
          value: "test"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: azure-service-operator
  namespace: azureserviceoperator-system
