apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: gitops-infra-control-plane-opensource
  namespace: flux-system
  annotations:
    config.kubernetes.io/local-config: "true"
    variant.opensource: "true"
resources:
  # Core Flux components (Open Source)
  - name: ../../control-plane/flux/gotk-components.yaml
    dependsOn:
      - flux-system
  - name: ../../control-plane/flux/gotk-sync.yaml
    dependsOn:
      - flux-system
  # Basic controllers (Open Source)
  - name: ../../control-plane/controllers/
    dependsOn:
      - ../../control-plane/flux/gotk-components.yaml
  # Open Source Monitoring
  - name: ../../control-plane/monitoring/
    dependsOn:
      - ../../control-plane/controllers/
  # Infrastructure Tenants
  - name: ../../infrastructure/tenants/
    dependsOn:
      - ../../control-plane/controllers/
# Open Source specific configurations
configurations:
- name: opensource-config
  literals:
  - FLUX_VERSION= "v2.2.3"
  - MONITORING_STACK= "prometheus-grafana-oss"
  - CONTROLLER_TYPE= "community"
  - SECURITY_LEVEL= "basic"
  - BACKUP_STRATEGY= "gitops-native"
  - AUDIT_LOGGING= "false"
  - ENTERPRISE_FEATURES= "false"
# Common labels for open source variant
commonLabels:
  variant: open-source
  tier: community
  support: community
  license: AGPLv3
# Resource constraints for open source
patchesStrategicMerge:
- resource-limits/opensource-limits.yaml
# Namespace configuration
namespace: flux-system
# Images for open source variants
images:
- name: fluxcd/kustomize-controller
  newTag: "v0.38.1"
- name: fluxcd/helm-controller
  newTag: "v0.37.3"
- name: fluxcd/source-controller
  newTag: "v1.2.4"
- name: prometheus/prometheus
  newTag: "v2.47.0"
- name: grafana/grafana
  newTag: "10.2.0"
