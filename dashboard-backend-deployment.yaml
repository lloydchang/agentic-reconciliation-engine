apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
  namespace: ai-infrastructure
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
    spec:
      containers:
      - name: backend
        image: python:3.9-slim
        ports:
        - containerPort: 5000
        command: ["sh", "-c"]
        args:
        - |
          apt-get update && apt-get install -y curl jq kubectl &&
          pip install flask flask-cors requests &&
          python /app/app.py
        env:
        volumeMounts:
        - name: app-code
          mountPath: /app
      volumes:
      - name: app-code
        configMap:
          name: dashboard-backend-code
          defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend-service
  namespace: ai-infrastructure
spec:
  selector:
    app: dashboard-backend
  ports:
  - port: 5000
    targetPort: 5000
  type: ClusterIP
