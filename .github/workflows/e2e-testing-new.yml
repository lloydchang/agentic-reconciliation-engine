name: End-to-End Testing

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      test-suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - flux
        - manifests
        - integration
      cluster-version:
        description: 'Kubernetes version'
        required: false
        default: 'v1.28.0'
        type: string

permissions:
  contents: read
  packages: read
  id-token: write

env:
  KIND_CLUSTER_NAME: "gitops-e2e"
  KUBECONFIG: "/tmp/kubeconfig"

jobs:
  setup-kind:
    runs-on: ubuntu-latest
    outputs:
      kubeconfig: ${{ steps.kind.outputs.kubeconfig }}
      cluster-ready: ${{ steps.wait.outputs.ready }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Kubernetes Kind
        id: kind
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: ${{ env.KIND_CLUSTER_NAME }}
          version: ${{ github.event.inputs.cluster-version || 'v1.28.0' }}
          config: .github/kind-cluster.yaml
          wait: 30s
          kubectl_version: "v1.28.0"

      - name: Verify cluster
        id: wait
        run: |
          echo "🔍 Verifying Kind cluster..."
          
          # Wait for cluster to be ready
          kubectl wait --for=condition=ready nodes --all --timeout=300s
          kubectl wait --for=condition=ready pod -n kube-system --all --timeout=300s
          
          echo "ready=true" >> $GITHUB_OUTPUT
          
          # Display cluster info
          kubectl cluster-info
          kubectl get nodes -o wide
          kubectl get pods -n kube-system

      - name: Export kubeconfig
        run: |
          mkdir -p /tmp
          kubectl config view --raw > /tmp/kubeconfig
          echo "🔧 Kubeconfig exported"

  install-flux:
    runs-on: ubuntu-latest
    needs: setup-kind
    if: needs.setup-kind.outputs.cluster-ready == 'true'
    outputs:
      flux-version: ${{ steps.install.outputs.version }}
      flux-ready: ${{ steps.verify.outputs.ready }}
    steps:
      - name: Setup kubeconfig
        run: |
          echo "${{ needs.setup-kind.outputs.kubeconfig }}" | base64 -d > ${{ env.KUBECONFIG }}
          chmod 600 ${{ env.KUBECONFIG }}

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: 'latest'

      - name: Install Flux
        id: install
        run: |
          echo "🚀 Installing Flux in Kind cluster..."
          
          # Install Flux with custom configuration
          flux install \
            --components=source-controller,kustomize-controller,helm-controller,notification-controller,image-reflector-controller,image-update-controller \
            --namespace=flux-system \
            --registry=ghcr.io/fluxcd \
            --version=latest \
            --arch=amd64 \
            --watch-all-namespaces=false \
            --log-level=info \
            --timeout=10m
          
          # Get Flux version
          FLUX_VERSION=$(flux -v | grep 'flux' | awk '{print $2}' | tr -d ',')
          echo "version=$FLUX_VERSION" >> $GITHUB_OUTPUT
          
          echo "✅ Flux installed successfully"
          echo "📦 Version: $FLUX_VERSION"

      - name: Verify Flux installation
        id: verify
        run: |
          echo "🔍 Verifying Flux installation..."
          
          # Wait for Flux controllers to be ready
          kubectl wait --for=condition=ready pod -n flux-system --all --timeout=300s
          
          echo "ready=true" >> $GITHUB_OUTPUT
          
          # Check Flux components
          flux check
          kubectl get pods -n flux-system
          kubectl get crds | grep flux

  test-manifests:
    runs-on: ubuntu-latest
    needs: [setup-kind, install-flux]
    if: needs.install-flux.outputs.flux-ready == 'true' && (github.event.inputs.test-suite == 'all' || github.event.inputs.test-suite == 'manifests')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup kubeconfig
        run: |
          echo "${{ needs.setup-kind.outputs.kubeconfig }}" | base64 -d > ${{ env.KUBECONFIG }}
          chmod 600 ${{ env.KUBECONFIG }}

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Setup Kustomize
        uses: fluxcd/pkg/actions/kustomize@main

      - name: Validate manifests
        run: |
          echo "🔍 Validating Kubernetes manifests..."
          
          # Validate YAML syntax
          find . -name "*.yaml" -o -name "*.yml" | while read -r file; do
            if ! kubectl apply --dry-run=client -f "$file" >/dev/null 2>&1; then
              echo "❌ Invalid YAML: $file"
              exit 1
            fi
          done
          
          echo "✅ All manifests are valid"

      - name: Build and test manifests
        run: |
          echo "🔨 Building and testing manifests..."
          
          # Create temporary directory
          MANIFEST_DIR="./test-manifests"
          mkdir -p $MANIFEST_DIR
          
          # Build manifests
          kustomize build ./infrastructure/tenants/1-network > $MANIFEST_DIR/network.yaml
          kustomize build ./infrastructure/tenants/2-clusters > $MANIFEST_DIR/clusters.yaml
          kustomize build ./infrastructure/tenants/3-workloads > $MANIFEST_DIR/workloads.yaml
          kustomize build ./control-plane/flux > $MANIFEST_DIR/flux-system.yaml
          
          # Test manifest application
          for manifest in $MANIFEST_DIR/*.yaml; do
            echo "🧪 Testing $(basename "$manifest")..."
            kubectl apply --dry-run=server -f "$manifest" || exit 1
          done
          
          echo "✅ All manifests built successfully"

      - name: Deploy test resources
        run: |
          echo "🚀 Deploying test resources..."
          
          # Create test namespace
          kubectl create namespace gitops-test --dry-run=client -o yaml | kubectl apply -f -
          
          # Deploy network components (subset)
          echo "📡 Deploying network components..."
          kustomize build ./infrastructure/tenants/1-network | \
            kubectl apply -n gitops-test --dry-run=server -f -
          
          # Deploy control plane components
          echo "🎛️ Deploying control plane components..."
          kustomize build ./control-plane/flux | \
            kubectl apply -n gitops-test --dry-run=server -f -
          
          echo "✅ Test resources deployed"

      - name: Verify deployments
        run: |
          echo "🔍 Verifying deployments..."
          
          # Check namespaces
          kubectl get namespaces
          
          # Check Flux system
          kubectl get all -n flux-system
          
          # Check test namespace
          kubectl get all -n gitops-test || echo "No resources in gitops-test namespace"
          
          echo "✅ Deployment verification completed"

  integration-tests:
    runs-on: ubuntu-latest
    needs: [setup-kind, install-flux]
    if: needs.install-flux.outputs.flux-ready == 'true' && (github.event.inputs.test-suite == 'all' || github.event.inputs.test-suite == 'integration')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubeconfig
        run: |
          echo "${{ needs.setup-kind.outputs.kubeconfig }}" | base64 -d > ${{ env.KUBECONFIG }}
          chmod 600 ${{ env.KUBECONFIG }}

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main

      - name: Run integration tests
        run: |
          echo "🧪 Running integration tests..."
          
          # Test 1: Flux health check
          echo "📋 Test 1: Flux health check"
          flux check || exit 1
          
          # Test 2: GitRepository creation and sync
          echo "📋 Test 2: GitRepository sync"
          cat > test-git-repo.yaml << EOF
          apiVersion: source.toolkit.fluxcd.io/v1beta2
          kind: GitRepository
          metadata:
            name: test-repo
            namespace: flux-system
          spec:
            interval: 30s
            url: https://github.com/${{ github.repository }}
            ref:
              branch: ${{ github.ref_name }}
          EOF
          
          kubectl apply -f test-git-repo.yaml
          kubectl wait --for=condition=ready gitrepository/test-repo -n flux-system --timeout=120s
          
          # Test 3: Kustomization with real manifests
          echo "📋 Test 3: Kustomization deployment"
          cat > test-kustomization.yaml << EOF
          apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
          kind: Kustomization
          metadata:
            name: test-kustomization
            namespace: flux-system
          spec:
            interval: 1m
            sourceRef:
              kind: GitRepository
              name: test-repo
            path: ./infrastructure/tenants/1-network
            prune: true
            wait: true
          EOF
          
          kubectl apply -f test-kustomization.yaml
          kubectl wait --for=condition=ready kustomization/test-kustomization -n flux-system --timeout=120s
          
          # Test 4: Verify deployed resources
          echo "📋 Test 4: Verify deployed resources"
          kubectl get all -A
          
          # Test 5: Flux reconciliation loop
          echo "📋 Test 5: Flux reconciliation loop"
          flux reconcile kustomization test-kustomization --with-source
          kubectl wait --for=condition=ready kustomization/test-kustomization -n flux-system --timeout=120s
          
          echo "✅ All integration tests passed"

      - name: Cleanup test resources
        if: always()
        run: |
          echo "🧹 Cleaning up test resources..."
          
          kubectl delete kustomization test-kustomization -n flux-system --ignore-not-found=true
          kubectl delete gitrepository test-repo -n flux-system --ignore-not-found=true
          
          echo "✅ Cleanup completed"

  cleanup:
    runs-on: ubuntu-latest
    needs: [setup-kind, install-flux]
    if: always()
    steps:
      - name: Cleanup Kind cluster
        if: always()
        run: |
          echo "🧹 Cleaning up Kind cluster..."
          kind delete cluster --name ${{ env.KIND_CLUSTER_NAME }} || echo "Cluster already deleted"
          echo "✅ Cleanup completed"

  test-summary:
    runs-on: ubuntu-latest
    needs: [setup-kind, install-flux, test-manifests, integration-tests]
    if: always()
    steps:
      - name: Test Summary
        run: |
          echo "## 🧪 End-to-End Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📊 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Test Suite | Status | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------------|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Setup | ${{ needs.setup-kind.result }} | ${{ needs.setup-kind.outputs.cluster-ready || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flux Install | ${{ needs.install-flux.result }} | ${{ needs.install-flux.outputs.flux-ready || 'N/A' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Manifests | ${{ needs.test-manifests.result }} | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration | ${{ needs.integration-tests.result }} | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📋 Environment Information" >> $GITHUB_STEP_SUMMARY
          echo "- **Flux Version:** ${{ needs.install-flux.outputs.flux-version || 'N/A' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Kubernetes Version:** ${{ github.event.inputs.cluster-version || 'v1.28.0' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Test Suite:** ${{ github.event.inputs.test-suite || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository:** ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🎯 Overall Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.setup-kind.result }}" = "success" ] && [ "${{ needs.install-flux.result }}" = "success" ]; then
            echo "✅ **All critical tests passed successfully**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Some tests failed - check logs for details**" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🕐 **Completed:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
