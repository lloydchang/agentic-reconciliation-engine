name: Push Kubernetes Manifests to Container Registry

on:
  push:
    branches:
      - 'main'
    paths:
      - 'infrastructure/**'

permissions:
  packages: write
  id-token: write

env:
  OCI_REGISTRY: oci://ghcr.io/lloydchang/gitops-manifests

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: 'latest'
      
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Build and push infrastructure manifests
        run: |
          echo "Building infrastructure manifests..."
          kustomize build ./infrastructure/tenants > /tmp/infrastructure.yaml
          
          echo "Pushing infrastructure manifests to OCI registry..."
          flux push artifact ${{ env.OCI_REGISTRY }}:infrastructure-$(git rev-parse --short HEAD) \
            --path=/tmp/infrastructure.yaml \
            --source="$(git config --get remote.origin.url)" \
            --revision="$(git branch --show-current)@sha1:$(git rev-parse HEAD)"
      
      - name: Tag manifests for staging
        run: |
          echo "Tagging manifests for staging deployment..."
          flux tag artifact ${{ env.OCI_REGISTRY }}:infrastructure-$(git rev-parse --short HEAD) --tag staging
      
      - name: Build and push workload manifests
        run: |
          echo "Building workload manifests..."
          kustomize build ./infrastructure/tenants/3-workloads > /tmp/workloads.yaml
          
          echo "Pushing workload manifests to OCI registry..."
          flux push artifact ${{ env.OCI_REGISTRY }}:workloads-$(git rev-parse --short HEAD) \
            --path=/tmp/workloads.yaml \
            --source="$(git config --get remote.origin.url)" \
            --revision="$(git branch --show-current)@sha1:$(git rev-parse HEAD)"
      
      - name: Tag workloads for production
        run: |
          echo "Tagging workloads for production deployment..."
          flux tag artifact ${{ env.OCI_REGISTRY }}:workloads-$(git rev-parse --short HEAD) --tag production
