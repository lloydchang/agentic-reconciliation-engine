name: Advanced Manifest Generation

on:
  push:
    branches:
      - 'main'
      - 'release'
    tags:
      - 'release/*'

jobs:
  generate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare build metadata
        id: prep
        run: |
          VERSION=${GITHUB_SHA::8}
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF/refs\/tags\//}
          fi
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          echo "BRANCH=${GITHUB_REF##*/}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: 'latest'

      - name: Generate infrastructure manifests
        run: |
          echo "🔄 Generating infrastructure manifests..."
          
          # Create generated manifests directory
          mkdir -p ./generated/infrastructure
          
          # Generate multi-cloud infrastructure with proper tagging
          cat > ./generated/infrastructure/multi-cloud.yaml << EOF
          # Multi-Cloud Infrastructure Manifests
          # Generated: ${{ steps.prep.outputs.BUILD_DATE }}
          # Version: ${{ steps.prep.outputs.VERSION }}
          # Branch: ${{ steps.prep.outputs.BRANCH }}
          
          apiVersion: v1
          kind: List
          items:
          - apiVersion: v1
            kind: Namespace
            metadata:
              name: gitops-multi-cloud
              labels:
                environment: ${{ steps.prep.outputs.BRANCH }}
                version: ${{ steps.prep.outputs.VERSION }}
          - apiVersion: controlplane.cluster.x-k8s.io/v1beta1
            kind: ControlPlane
            metadata:
              name: gitops-control-plane
              namespace: gitops-multi-cloud
              labels:
                app: gitops-control-plane
                version: ${{ steps.prep.outputs.VERSION }}
            spec:
              type: flux
              version: ${{ steps.prep.outputs.VERSION }}
              buildDate: ${{ steps.prep.outputs.BUILD_DATE }}
          EOF
          
          echo "✅ Infrastructure manifests generated"

      - name: Update workload manifests with version
        run: |
          echo "🔄 Updating workload manifests with version info..."
          
          # Update sample app deployment with build metadata
          cat > ./generated/workloads/sample-app.yaml << EOF
          # Sample Application Deployment
          # Generated: ${{ steps.prep.outputs.BUILD_DATE }}
          # Version: ${{ steps.prep.outputs.VERSION }}
          
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: sample-app
            namespace: default
            labels:
              app: sample-app
              version: ${{ steps.prep.outputs.VERSION }}
              build-date: ${{ steps.prep.outputs.BUILD_DATE }}
          spec:
            replicas: 3
            selector:
              matchLabels:
                app: sample-app
                version: ${{ steps.prep.outputs.VERSION }}
            template:
              metadata:
                labels:
                  app: sample-app
                  version: ${{ steps.prep.outputs.VERSION }}
                  build-date: ${{ steps.prep.outputs.BUILD_DATE }}
              spec:
                containers:
                - name: sample-app
                  image: ghcr.io/${{ github.repository_owner }}/gitops-infra-control-plane:${{ steps.prep.outputs.VERSION }}
                  ports:
                  - containerPort: 80
                    name: http
                  env:
                  - name: APP_VERSION
                    value: "${{ steps.prep.outputs.VERSION }}"
                  - name: BUILD_DATE
                    value: "${{ steps.prep.outputs.BUILD_DATE }}"
                  - name: GIT_SHA
                    value: "${{ github.sha }}"
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: sample-app-service
            namespace: default
            labels:
              app: sample-app
              version: ${{ steps.prep.outputs.VERSION }}
          spec:
            selector:
              app: sample-app
              version: ${{ steps.prep.outputs.VERSION }}
            ports:
            - port: 80
              targetPort: 80
              name: http
          EOF
          
          echo "✅ Workload manifests updated"

      - name: Generate ConfigMap with build info
        run: |
          echo "🔄 Generating ConfigMap with build metadata..."
          
          cat > ./generated/config/build-info.yaml << EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: gitops-build-info
            namespace: flux-system
            labels:
              app: gitops-control-plane
              version: ${{ steps.prep.outputs.VERSION }}
          data:
            version: "${{ steps.prep.outputs.VERSION }}"
            build_date: "${{ steps.prep.outputs.BUILD_DATE }}"
            git_sha: "${{ github.sha }}"
            git_ref: "${{ github.ref }}"
            branch: "${{ steps.prep.outputs.BRANCH }}"
            repository: "${{ github.repository }}"
            actor: "${{ github.actor }}"
            workflow: "${{ github.workflow }}"
          EOF
          
          echo "✅ Build info ConfigMap generated"

      - name: Commit and push manifests
        run: |
          # Configure git
          git config --local user.name "Flux Manifest Generator"
          git config --local user.email "manifests@automation.local"
          
          # Add generated manifests
          git add ./generated/
          
          # Commit with detailed message
          git commit -m "
          🔄 Auto-Generated Manifests
          
          Generated from: ${{ github.sha }}
          Branch: ${{ steps.prep.outputs.BRANCH }}
          Version: ${{ steps.prep.outputs.VERSION }}
          Date: ${{ steps.prep.outputs.BUILD_DATE }}
          
          Changes:
          - Generated infrastructure manifests for multi-cloud deployment
          - Updated workload manifests with build metadata
          - Created ConfigMap with build information
          - Integrated version tracking and deployment history
          
          This commit enables Flux to deploy the latest generated manifests
          with proper version tracking and build metadata.
          " || echo "No changes to commit"
          
          # Push changes
          git push origin main || echo "No changes to push"
          
          echo "✅ Manifests committed and pushed"

      - name: Trigger Flux reconciliation
        run: |
          echo "🔄 Triggering Flux reconciliation for generated manifests..."
          
          # Wait for Git sync
          sleep 10
          
          # Trigger reconciliation for all relevant kustomizations
          flux reconcile kustomization infrastructure-controllers --namespace flux-system
          flux reconcile kustomization tenants-infra --namespace flux-system
          flux reconcile kustomization workload-infra --namespace flux-system
          
          echo "✅ Flux reconciliation triggered"
