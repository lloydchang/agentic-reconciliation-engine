name: Secret Validation and Security Scan

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  secret-scan:
    name: Secret Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          pip install detect-secrets
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
          curl -LO "https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.21.1/kubeseal-linux-amd64.tar.gz"
          tar -xvzf kubeseal-linux-amd64.tar.gz
          sudo install -m 755 kubeseal /usr/local/bin/kubeseal

      - name: Run detect-secrets scan
        run: |
          echo "🔍 Running detect-secrets scan..."
          detect-secrets scan --baseline .secrets.baseline || true
          detect-secrets scan --all-files --baseline .secrets.baseline

      - name: Check for hardcoded secrets
        run: |
          echo "🔍 Checking for hardcoded secrets..."
          # Patterns that indicate hardcoded secrets
          PATTERNS=(
            "password:\s*[\"']?[^\"'\s<][^\"'\s]*[\"']?"
            "secret:\s*[\"']?[^\"'\s<][^\"'\s]*[\"']?"
            "key:\s*[\"']?[^\"'\s<][^\"'\s]*[\"']?"
            "token:\s*[\"']?[^\"'\s<][^\"'\s]*[\"']?"
            "adminPassword:\s*[\"']?[^\"'\s<][^\"'\s]*[\"']?"
            "admin_password:\s*[\"']?[^\"'\s<][^\"'\s]*[\"']?"
          )

          FOUND_SECRETS=false
          
          for pattern in "${PATTERNS[@]}"; do
            # Skip sealed secrets and templates
            if git grep -E "$pattern" -- "*.yaml" -- "*.yml" | grep -v "sealed-secret\|template\|CHANGE_ME\|<encrypted\|placeholder\|example"; then
              echo "❌ Potential hardcoded secret found:"
              git grep -E "$pattern" -- "*.yaml" -- "*.yml" | grep -v "sealed-secret\|template\|CHANGE_ME\|<encrypted\|placeholder\|example"
              FOUND_SECRETS=true
            fi
          done

          if [ "$FOUND_SECRETS" = true ]; then
            echo "🚨 Hardcoded secrets detected! Please use SealedSecrets."
            exit 1
          else
            echo "✅ No hardcoded secrets detected"
          fi

      - name: Validate SealedSecrets format
        run: |
          echo "🔍 Validating SealedSecrets format..."
          
          # Find all sealed secrets
          SEALED_SECRETS=$(find . -name "*sealed-secret*.yaml" -o -name "*secrets.yaml" | grep -v template)
          
          for secret_file in $SEALED_SECRETS; do
            echo "Validating $secret_file..."
            
            # Check if it's a valid SealedSecret
            if ! grep -q "kind: SealedSecret" "$secret_file"; then
              echo "❌ $secret_file is not a valid SealedSecret"
              exit 1
            fi
            
            # Check for required fields
            if ! grep -q "metadata:" "$secret_file"; then
              echo "❌ $secret_file missing metadata"
              exit 1
            fi
            
            if ! grep -q "spec:" "$secret_file"; then
              echo "❌ $secret_file missing spec"
              exit 1
            fi
            
            if ! grep -q "encryptedData:" "$secret_file"; then
              echo "❌ $secret_file missing encryptedData"
              exit 1
            fi
            
            echo "✅ $secret_file is valid"
          done

      - name: Check secret references in HelmReleases
        run: |
          echo "🔍 Validating secret references in HelmReleases..."
          
          # Find all HelmReleases
          HELMRELEASES=$(find . -name "*helmrelease*.yaml" -o -name "*helm-release*.yaml")
          
          for helmrelease in $HELMRELEASES; do
            echo "Checking $helmrelease..."
            
            # Check for hardcoded values that should be secrets
            if grep -E "(password|secret|key|token):" "$helmrelease" | grep -v "FromSecret\|from_secret\|valueFrom\|<encrypted\|placeholder\|CHANGE_ME"; then
              echo "❌ Hardcoded secret found in $helmrelease:"
              grep -E "(password|secret|key|token):" "$helmrelease" | grep -v "FromSecret\|from_secret\|valueFrom\|<encrypted\|placeholder\|CHANGE_ME"
              exit 1
            fi
            
            # Validate secret references
            if grep -q "FromSecret\|from_secret\|valueFrom" "$helmrelease"; then
              echo "✅ Secret references found in $helmrelease"
              
              # Check if referenced secrets exist
              SECRET_NAMES=$(grep -o "name: [^\s]*" "$helmrelease" | grep -v "name: " || true)
              for secret_name in $SECRET_NAMES; do
                if [[ "$secret_name" != *"credentials"* ]] && [[ "$secret_name" != *"secrets"* ]]; then
                  echo "⚠️  Potential secret reference: $secret_name"
                fi
              done
            fi
          done

      - name: Validate kustomization structure
        run: |
          echo "🔍 Validating kustomization structure..."
          
          # Find all kustomization.yaml files
          KUSTOMIZATION_FILES=$(find . -name "kustomization.yaml")
          
          for kustomization in $KUSTOMIZATION_FILES; do
            echo "Validating $kustomization..."
            
            # Check if it references sealed secrets
            if grep -q "sealed-secret\|secrets.yaml" "$kustomization"; then
              echo "✅ $kustomization includes sealed secrets"
            fi
            
            # Validate YAML syntax
            if ! python -c "import yaml; yaml.safe_load(open('$kustomization'))"; then
              echo "❌ Invalid YAML in $kustomization"
              exit 1
            fi
          done

      - name: Generate security report
        run: |
          echo "📊 Generating security report..."
          
          cat > security-report.md << EOF
          # Security Scan Report
          
          **Date:** $(date)
          **Commit:** ${{ github.sha }}
          **Branch:** ${{ github.ref }}
          
          ## Scan Results
          
          - ✅ Secret scanning completed
          - ✅ SealedSecrets validation passed
          - ✅ HelmRelease validation passed
          - ✅ Kustomization validation passed
          
          ## Summary
          
          No security issues detected. All secrets are properly managed using SealedSecrets.
          
          EOF
          
          echo "✅ Security report generated"

      - name: Upload security report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-report
          path: security-report.md

  secret-rotation-check:
    name: Check Secret Rotation Schedule
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check secret age
        run: |
          echo "🔍 Checking secret age for rotation..."
          
          # Find sealed secrets and check their modification time
          SEALED_SECRETS=$(find . -name "*sealed-secret*.yaml" -o -name "*secrets.yaml" | grep -v template)
          
          for secret_file in $SEALED_SECRETS; do
            if [ -f "$secret_file" ]; then
              # Get file modification time in days
              AGE_DAYS=$(( ($(date +%s) - $(date -r "$secret_file" +%s)) / 86400 ))
              
              echo "Secret $secret_file is $AGE_DAYS days old"
              
              if [ $AGE_DAYS -gt 90 ]; then
                echo "⚠️  Secret $secret_file is older than 90 days, consider rotation"
                echo "::warning::Secret $secret_file is older than 90 days, consider rotation"
              fi
            fi
          done
