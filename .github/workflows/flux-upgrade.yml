name: Upgrade Flux Components

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"  # Weekly on Sunday at midnight

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade-flux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: 'latest'
      
      - name: Check for Flux updates
        id: check-update
        run: |
          echo "Checking for Flux component updates..."
          flux install \
            --export > ./control-plane/flux/gotk-components.yaml
          
          VERSION=$(flux -v)
          echo "flux_version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create Pull Request for updates
        if: steps.check-update.outputs.flux_version != ''
        uses: peter-evans/create-pull-request@v5
        with:
          branch: upgrade-flux-${{ github.run_number }}
          commit-message: |
            🔄 Flux Auto-Upgrade
            
            Flux components updated to ${{ steps.check-update.outputs.flux_version }}
            
            This PR was automatically generated to upgrade Flux controllers
            to the latest stable version.
          title: "🔄 Flux Auto-Upgrade to ${{ steps.check-update.outputs.flux_version }}"
          body: |
            ## 🔄 Flux Component Upgrade
            
            **New Version**: ${{ steps.check-update.outputs.flux_version }}
            
            ### Changes
            - Updated Flux components to latest stable release
            - Applied security patches and bug fixes
            - Maintained compatibility with existing GitOps setup
            
            ### Validation
            - [ ] Review component changes
            - [ ] Test in staging environment  
            - [ ] Approve for production deployment
            
            ---
            *This PR was automatically generated by Flux upgrade workflow*
