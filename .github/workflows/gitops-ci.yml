name: GitOps Infrastructure Deployment

on:
  push:
    branches: [ main ]
    paths:
      - 'infrastructure/**'
      - 'control-plane/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'infrastructure/**'
      - 'control-plane/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup kubectl
      uses: azure/setup-kubectl@v3
    - name: Validate YAML
      run: |
        find . -name "*.yaml" -o -name "*.yml" | xargs -I {} sh -c 'kubectl --dry-run=client apply -f {} --validate=true || exit 255'
    - name: Check Kustomize builds
      run: |
        find infrastructure/tenants -name "kustomization.yaml" -exec kubectl kustomize {} \; >/dev/null

  test-local:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup Kind
      uses: helm/kind-action@v1.8.0
    - name: Test Flux installation
      run: |
        kubectl apply -f control-plane/flux/gotk-components.yaml
        kubectl wait --for=condition=available --timeout=300s deployment/flux-controller-manager -n flux-system
    - name: Test workload deployment
      run: |
        kubectl apply -k infrastructure/tenants/3-workloads/sample-apps/
        kubectl wait --for=condition=available --timeout=300s deployment/nginx-sample -n default

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Trufflehog secret scan
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD

  drift-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Run drift test simulation
      run: |
        echo "Simulating drift detection..."
        # In real implementation, this would test against emulators
