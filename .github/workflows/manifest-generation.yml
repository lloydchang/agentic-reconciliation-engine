name: Generate and Commit Manifests

on:
  push:
    branches:
      - 'main'
    paths:
      - 'infrastructure/**'

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-manifests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: 'latest'

      - name: Generate workload manifests
        run: |
          echo "Generating workload manifests from latest images..."
          
          # Create temporary directory for generated manifests
          mkdir -p ./generated/workloads
          
          # Generate sample application manifests with latest images
          cat > ./generated/workloads/sample-apps.yaml << EOF
          apiVersion: v1
          kind: List
          items:
          - apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: sample-app
              namespace: default
              labels:
                app: sample-app
                version: auto-generated
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: sample-app
              template:
                metadata:
                  labels:
                    app: sample-app
                    version: auto-generated
                spec:
                  containers:
                  - name: sample-app
                    image: ${{ env.IMAGE_REGISTRY }}/${{ github.repository_owner }}/gitops-infra-control-plane:canary
                    ports:
                    - containerPort: 80
                      name: http
                    env:
                    - name: VERSION
                      value: "auto-generated-$(date +%s)"
          ---
          apiVersion: v1
            kind: Service
            metadata:
              name: sample-app-service
              namespace: default
            spec:
              selector:
                app: sample-app
              ports:
              - port: 80
                targetPort: 80
                name: http
          EOF
          
          echo "Workload manifests generated"

      - name: Commit and push manifests
        run: |
          # Configure git user
          git config --local user.name "Flux Manifest Automation"
          git config --local user.email "manifests@automation.local"
          
          # Check if there are changes
          if git diff --quiet --exit-code; then
            echo "No changes to commit"
            exit 0
          fi
          
          # Add generated manifests
          git add ./generated/workloads/
          
          # Commit with detailed message
          git commit -m "
          🔄 Auto-Generated Workload Manifests
          
          Generated from: ${{ github.sha }}
          Branch: ${{ github.ref_name }}
          Date: $(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          Changes:
          - Updated workload manifests to use latest container images
          - Auto-generated sample application deployment
          - Integrated with ImageUpdateAutomation for continuous updates
          
          This commit enables Flux to deploy workloads using the latest
          built images from the Docker build pipeline.
          "
          
          # Push changes
          git push origin main
          
          echo "✅ Manifests committed and pushed successfully"

      - name: Trigger Flux reconciliation
        run: |
          echo "🔄 Triggering Flux reconciliation..."
          
          # Wait a moment for Git sync
          sleep 10
          
          # Trigger reconciliation
          flux reconcile kustomization workload-infra --namespace flux-system
          
          echo "✅ Flux reconciliation triggered"
