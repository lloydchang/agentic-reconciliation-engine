name: Staging Auto-PR

on:
  create:

jobs:
  pull-request:
    runs-on: ubuntu-latest
    if: |
      github.event.ref_type == 'branch' &&
      github.event.ref == 'staging'      
    permissions:
      pull-requests: write
      contents: read
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Create Pull Request
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_REPO: ${{ github.repository }}
        GITHUB_REF: ${{ github.ref }}
      run: |
        echo "Creating pull request for staging branch..."
        
        # Check if PR already exists
        if gh pr list --head staging --base main --json number | jq length | grep -q 0; then
          gh pr create \
            --repo=${GITHUB_REPO} \
            --head=staging \
            --base=main \
            --title="🚀 Automated Updates from ${GITHUB_REF}" \
            --body="## 🤖 Automated Pull Request

        This PR contains automated updates from the **${GITHUB_REF}** branch.

        ### 📋 Changes
        - Automated image updates and configuration changes
        - Generated by Flux ImageUpdateAutomation
        - Ready for review and approval

        ### ⚠️ Review Guidelines
        - Verify image versions and tags
        - Check configuration changes
        - Ensure compliance with deployment policies

        ### 🔄 Merge Process
        1. Review changes for accuracy
        2. Run tests if applicable  
        3. Approve and merge to main branch
        4. Branch will be auto-deleted after merge

        ---
        *This PR was created automatically by GitHub Actions*
        📅 Created: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" \
            --label=automated,image-update,staging \
            --assignee=${{ github.actor }} \
            --draft=false
          
          echo "✅ Pull request created successfully"
        else
          echo "ℹ️ Pull request already exists for staging branch"
        fi
