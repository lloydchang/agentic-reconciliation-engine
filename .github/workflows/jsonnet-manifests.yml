name: Jsonnet Manifest Generation

on:
  push:
    branches:
      - 'release'
    tags:
      - 'release/*'

jobs:
  generate-jsonnet:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare build metadata
        id: prep
        run: |
          VERSION=${GITHUB_SHA::8}
          if [[ $GITHUB_REF == refs/tags/release/* ]]; then
            VERSION=${GITHUB_REF/refs\/tags\/release\//}
          fi
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_OUTPUT
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Jsonnet/kubecfg
        run: |
          # Install kubecfg for Jsonnet rendering
          curl -L https://github.com/kubecfg/kubecfg/releases/download/v0.31.0/kubecfg-v0.31.0-linux-amd64.tar.gz | tar xz
          sudo mv kubecfg /usr/local/bin/
          kubecfg version

      - name: Create Jsonnet library files
        run: |
          echo "📚 Creating Jsonnet library files..."
          
          # Create kube-libsonnet import
          mkdir -p ./lib
          cat > ./lib/kube.libsonnet << 'EOF'
          {
            Namespace(name): {
              apiVersion: 'v1',
              kind: 'Namespace',
              metadata: {
                name: name,
              },
            },
            ConfigMap(name): {
              apiVersion: 'v1',
              kind: 'ConfigMap',
              metadata: {
                name: name,
              },
            },
            Deployment(name): {
              apiVersion: 'apps/v1',
              kind: 'Deployment',
              metadata: {
                name: name,
              },
              spec: {
                replicas: 1,
                selector: {
                  matchLabels: {
                    app: name,
                  },
                },
                template: {
                  metadata: {
                    labels: {
                      app: name,
                    },
                  },
                  spec: {
                    containers: [
                      {
                        name: name,
                        image: 'nginx:latest',
                        ports: [
                          {
                            containerPort: 80,
                          },
                        ],
                      },
                    ],
                  },
                },
              },
            },
          }
          EOF
          
          # Create example.libsonnet
          cat > ./lib/example.libsonnet << 'EOF'
          {
            kustomization(name): self.kustomization(name) {
              apiVersion: 'kustomize.toolkit.fluxcd.io/v1',
              kind: 'Kustomization',
              metadata: {
                name: name,
                namespace: 'flux-system',
              },
              spec: {
                interval: '15m0s',
                path: './generated/',
                prune: true,
                sourceRef: {
                  kind: 'GitRepository',
                  name: 'gitops-infra-control-plane',
                },
                targetNamespace: 'default',
              },
            },
            gitrepository(name): self.gitrepository(name) {
              apiVersion: 'source.toolkit.fluxcd.io/v1',
              kind: 'GitRepository',
              metadata: {
                name: name,
                namespace: 'flux-system',
              },
              spec: {
                interval: '20m0s',
                ref: {
                  branch: 'main',
                },
                url: 'https://github.com/lloydchang/gitops-infra-control-plane',
              },
            },
          }
          EOF
          
          echo "✅ Jsonnet library files created"

      - name: Create Jsonnet manifests
        run: |
          echo "📝 Creating Jsonnet manifests..."
          
          # Create main Jsonnet file
          cat > ./manifests/deployment.jsonnet << 'EOF'
          local kube = import '../lib/kube.libsonnet';
          local example = import '../lib/example.libsonnet';

          {
            namespace: kube.Namespace('gitops-multi-cloud'),
            configMap: kube.ConfigMap('build-info') {
              data+: {
                VERSION: std.extVar('VERSION'),
                BUILD_DATE: std.extVar('BUILD_DATE'),
              },
            },
            deployment: kube.Deployment('sample-app') {
              spec+: {
                replicas: 3,
                template+: {
                  spec+: {
                    containers: [
                      {
                        name: 'sample-app',
                        image: 'ghcr.io/lloydchang/gitops-infra-control-plane:' + std.extVar('VERSION'),
                        ports: [
                          {
                            containerPort: 80,
                            name: 'http',
                          },
                        ],
                        env: [
                          {
                            name: 'VERSION',
                            value: std.extVar('VERSION'),
                          },
                          {
                            name: 'BUILD_DATE',
                            value: std.extVar('BUILD_DATE'),
                          },
                        ],
                      },
                    ],
                  },
                },
              },
            },
            service: {
              apiVersion: 'v1',
              kind: 'Service',
              metadata: {
                name: 'sample-app-service',
                namespace: 'gitops-multi-cloud',
              },
              spec: {
                selector: {
                  app: 'sample-app',
                },
                ports: [
                  {
                    port: 80,
                    targetPort: 80,
                    name: 'http',
                  },
                ],
              },
            },
            fluxKustomization: example.kustomization('multi-cloud-deployment'),
            fluxGitRepository: example.gitrepository('gitops-infra-control-plane'),
          }
          EOF
          
          echo "✅ Jsonnet manifests created"

      - name: Render Jsonnet to YAML
        run: |
          echo "🔄 Rendering Jsonnet manifests to YAML..."
          
          # Create output directory
          mkdir -p ./output
          
          # Render Jsonnet to YAML
          kubecfg show -V VERSION=${{ steps.prep.outputs.VERSION }} -V BUILD_DATE=${{ steps.prep.outputs.BUILD_DATE }} ./manifests/deployment.jsonnet > ./output/production.yaml
          
          echo "✅ Jsonnet rendered to YAML"
          echo "📋 Generated manifests:"
          cat ./output/production.yaml

      - name: Create Kustomization for generated manifests
        run: |
          echo "📦 Creating Kustomization for generated manifests..."
          
          # Create kustomization.yaml in output directory
          cat > ./output/kustomization.yaml << EOF
          apiVersion: kustomize.config.k8s.io/v1beta1
          kind: Kustomization
          namespace: gitops-multi-cloud
          resources:
          - production.yaml
          commonLabels:
            generated-by: jsonnet
            version: ${{ steps.prep.outputs.VERSION }}
            build-date: ${{ steps.prep.outputs.BUILD_DATE }}
          EOF
          
          echo "✅ Kustomization created"

      - name: Prepare deploy branch
        run: |
          echo "🌿 Preparing deploy branch..."
          
          # Check if deploy branch exists
          if git ls-remote --heads origin deploy | grep -q deploy; then
            echo "Deploy branch exists, checking out..."
            git fetch origin deploy
            git checkout deploy
          else
            echo "Creating new deploy branch..."
            git checkout --orphan deploy
            git rm -rf .
            git commit --allow-empty -m "Initialize deploy branch"
            git push -u origin deploy
          fi
          
          # Copy generated manifests
          cp -r ./output/* ./
          
          echo "✅ Deploy branch prepared"

      - name: Commit to deploy branch
        uses: EndBug/add-and-commit@v7
        with:
          add: '.'
          branch: deploy
          message: "[ci skip] Deploy from ${{ steps.prep.outputs.VERSION }}"
          signoff: true

      - name: Trigger Flux reconciliation
        run: |
          echo "🔄 Triggering Flux reconciliation for Jsonnet manifests..."
          
          # Wait for Git sync
          sleep 10
          
          # Trigger reconciliation for deploy branch manifests
          if flux get kustomizations --namespace flux-system | grep -q deploy; then
            flux reconcile kustomization deploy --namespace flux-system
          else
            echo "No deploy kustomization found, manifests will be reconciled automatically"
          fi
          
          echo "✅ Jsonnet manifest generation complete"
