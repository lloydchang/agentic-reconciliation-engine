name: AI Infrastructure Portal CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'real-data-api.js'
      - 'real-dashboard-server.js'
      - 'service-integrator.js'
      - 'auth-middleware.js'
      - 'security-middleware.js'
      - 'test-suite.js'
      - 'package.json'
      - 'docker-compose*.yaml'
      - 'dashboard/overlay/dashboard-backend-*.yaml'
      - '.github/workflows/portal-ci-cd.yaml'
      - 'docs/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'real-data-api.js'
      - 'real-dashboard-server.js'
      - 'service-integrator.js'
      - 'auth-middleware.js'
      - 'security-middleware.js'
      - 'test-suite.js'
      - 'package.json'
      - 'docker-compose*.yaml'
      - 'dashboard/overlay/dashboard-backend-*.yaml'
      - '.github/workflows/portal-ci-cd.yaml'
      - 'docs/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/ai-infrastructure-portal
  NODE_VERSION: '18'
  DOCKER_BUILDKIT: 1

jobs:
  test:
    name: Test Portal Components
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run linting
      run: |
        npm run lint || echo "Linting failed but continuing"

    - name: Run security audit
      run: |
        npm audit --audit-level=moderate || echo "Security audit found issues"

    - name: Run unit tests
      run: |
        npm test -- --only api || echo "API tests failed"

    - name: Run integration tests
      run: |
        npm test -- --only integration || echo "Integration tests failed"

    - name: Run security tests
      run: |
        npm test -- --only security || echo "Security tests failed"

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.run_id }}
        path: test-results.json

  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'portal-security-results.sarif'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'portal-security-results.sarif'

    - name: Run secret detection
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-push:
    name: Build and Push Portal Images
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.api
        push: true
        tags: ${{ steps.meta.outputs.tags }}-api
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Build and push Dashboard image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./dashboard/Dockerfile.dashboard
        push: true
        tags: ${{ steps.meta.outputs.tags }}-dashboard
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

    - name: Generate SBOM
      uses: anchore/sbom-action@v0
      with:
        image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest-api
        format: cyclonedx-json
        output-file: ./sbom-api.json

    - name: Upload SBOM
      uses: actions/upload-artifact@v4
      with:
        name: sbom-${{ github.run_id }}
        path: ./sbom-api.json

  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    environment: development
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl for dev
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.DEV_KUBECONFIG }}

    - name: Update dev deployment
      run: |
        # Update image tags in dev overlay
        sed -i "s|image:.*ai-infrastructure-portal.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-api|g" dashboard/overlay/dashboard-backend-code.yaml
        sed -i "s|image:.*ai-infrastructure-portal.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-dashboard|g" dashboard/overlay/dashboard-backend-code.yaml

        kubectl apply -f dashboard/overlay/dashboard-backend-code.yaml

    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/ai-infrastructure-portal -n ai-portal-dev --timeout=300s

    - name: Run dev smoke tests
      run: |
        # Basic health checks
        kubectl run smoke-test --image=curlimages/curl --rm -i --restart=Never -- curl -f http://ai-infrastructure-portal.ai-portal-dev.svc.cluster.local:5001/api/health
        kubectl run smoke-test --image=curlimages/curl --rm -i --restart=Never -- curl -f http://ai-infrastructure-portal.ai-portal-dev.svc.cluster.local:8081/health

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure kubectl for staging
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.STAGING_KUBECONFIG }}

    - name: Deploy to staging
      run: |
        # Update staging overlay with new image tags
        sed -i "s|image:.*ai-infrastructure-portal.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-api|g" dashboard/overlay/dashboard-backend-k8s-real.yaml
        sed -i "s|image:.*ai-infrastructure-portal.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-dashboard|g" dashboard/overlay/dashboard-backend-k8s-real.yaml

        kubectl apply -f dashboard/overlay/dashboard-backend-k8s-real.yaml

    - name: Wait for staging rollout
      run: |
        kubectl rollout status deployment/ai-infrastructure-portal -n ai-portal-staging --timeout=600s

    - name: Run staging integration tests
      run: |
        # Wait for services
        sleep 30

        # Health checks
        kubectl run integration-test --image=curlimages/curl --rm -i --restart=Never -- curl -f http://ai-infrastructure-portal.ai-portal-staging.svc.cluster.local:5001/api/health
        kubectl run integration-test --image=curlimages/curl --rm -i --restart=Never -- curl -f http://ai-infrastructure-portal.ai-portal-staging.svc.cluster.local:8081/health

        # API functionality tests
        kubectl run integration-test --image=curlimages/curl --rm -i --restart=Never -- curl -f http://ai-infrastructure-portal.ai-portal-staging.svc.cluster.local:5001/api/services
        kubectl run integration-test --image=curlimages/curl --rm -i --restart=Never -- curl -f http://ai-infrastructure-portal.ai-portal-staging.svc.cluster.local:5001/api/agents

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Require manual approval
      uses: trstringer/manual-approval@v1
      with:
        secret: ${{ secrets.PRODUCTION_DEPLOYMENT_SECRET }}
        approvers: lloydchang,security-team-lead
        minimum-approvals: 1
        issue-title: "Deploy AI Infrastructure Portal to Production"
        issue-body: "Please review and approve the production deployment of AI Infrastructure Portal."
        exclude-workflow-initiator-as-approver: false
        additional-approved-words: ''
        additional-denied-words: ''

    - name: Configure kubectl for production
      uses: azure/k8s-set-context@v3
      with:
        method: kubeconfig
        kubeconfig: ${{ secrets.PRODUCTION_KUBECONFIG }}

    - name: Blue-Green deployment
      run: |
        # Create blue deployment (current)
        kubectl apply -f dashboard/overlay/dashboard-backend-k8s-real.yaml

        # Create green deployment (new)
        sed 's/ai-infrastructure-portal/ai-infrastructure-portal-green/g' dashboard/overlay/dashboard-backend-k8s-real.yaml | kubectl apply -f -

        # Update green deployment with new images
        kubectl set image deployment/ai-infrastructure-portal-green ai-infrastructure-portal=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-api
        kubectl set image deployment/ai-infrastructure-portal-green ai-infrastructure-portal-dashboard=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}-dashboard

    - name: Wait for green deployment
      run: |
        kubectl rollout status deployment/ai-infrastructure-portal-green -n ai-portal-production --timeout=600s

    - name: Run production smoke tests
      run: |
        # Test green deployment
        kubectl run smoke-test --image=curlimages/curl --rm -i --restart=Never -- curl -f http://ai-infrastructure-portal-green.ai-portal-production.svc.cluster.local:5001/api/health
        kubectl run smoke-test --image=curlimages/curl --rm -i --restart=Never -- curl -f http://ai-infrastructure-portal-green.ai-portal-production.svc.cluster.local:8081/health

    - name: Switch traffic to green
      run: |
        # Update service to point to green deployment
        kubectl patch service ai-infrastructure-portal -n ai-portal-production -p '{"spec":{"selector":{"app":"ai-infrastructure-portal-green"}}}'

    - name: Monitor green deployment
      run: |
        # Monitor for 5 minutes
        sleep 300

        # Check if green deployment is healthy
        kubectl run health-check --image=curlimages/curl --rm -i --restart=Never -- curl -f http://ai-infrastructure-portal.ai-portal-production.svc.cluster.local:5001/api/health || exit 1

    - name: Full production switch
      run: |
        # If monitoring passed, remove blue deployment
        kubectl delete deployment ai-infrastructure-portal -n ai-portal-production

        # Rename green to blue for next deployment
        kubectl label deployment ai-infrastructure-portal-green app=ai-infrastructure-portal -n ai-portal-production
        kubectl rollout status deployment/ai-infrastructure-portal -n ai-portal-production --timeout=300s

    - name: Rollback on failure
      if: failure()
      run: |
        # Switch back to blue deployment
        kubectl patch service ai-infrastructure-portal -n ai-portal-production -p '{"spec":{"selector":{"app":"ai-infrastructure-portal"}}}'

        # Remove failed green deployment
        kubectl delete deployment ai-infrastructure-portal-green -n ai-portal-production

        # Notify team
        echo "Production deployment failed, rolled back to previous version"

  performance-test:
    name: Performance Testing
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run performance tests
      run: |
        # Run load tests against staging
        npm run test:performance -- --target=https://staging.ai-portal.yourdomain.com

    - name: Upload performance results
      uses: actions/upload-artifact@v4
      with:
        name: performance-results-${{ github.run_id }}
        path: performance-results.json

  notify:
    name: Notify Teams
    runs-on: ubuntu-latest
    needs: [deploy-production, performance-test]
    if: always()
    steps:
    - name: Notify on success
      if: needs.deploy-production.result == 'success'
      run: |
        echo "🚀 AI Infrastructure Portal deployed to production successfully!"
        # Add Slack/Discord notification here

    - name: Notify on failure
      if: needs.deploy-production.result == 'failure'
      run: |
        echo "❌ Production deployment failed!"
        # Add alert notification here
