name: Flux CD Automation Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'gitops/**'
      - 'overlays/**'
      - 'core/**'
      - 'core/tests/**'
  pull_request:
    branches: [main]
    paths:
      - 'gitops/**'
      - 'overlays/**'
      - 'core/**'
      - 'core/tests/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'development'
        type: choice
        options:
        - development
        - staging
        - production
      dry_run:
        description: 'Dry run only'
        required: false
        default: false
        type: boolean
      test_qwen:
        description: 'Run Qwen integration tests'
        required: false
        default: true
        type: boolean

env:
  FLUX_VERSION: "v2.2.0"
  KUBECTL_VERSION: "v1.28.0"

jobs:
  # Validate and lint
  validate:
    name: Validate Flux Configuration
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: ${{ env.FLUX_VERSION }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Validate Flux manifests
        run: |
          flux validate --path ./gitops/flux-system
          kubectl kustomize ./gitops/flux-system --dry-run=client

      - name: Validate overlays
        run: |
          for env in development staging production; do
            echo "Validating $env overlay..."
            kubectl kustomize ./overlays/flux-system/$env --dry-run=client
          done

      - name: Lint YAML files
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: ./.yamllint.yml
          file_or_dir: gitops/
          strict: true

      - name: Set environment matrix
        id: set-matrix
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo 'matrix=["staging","production"]' >> $GITHUB_OUTPUT
          else
            echo 'matrix=["development"]' >> $GITHUB_OUTPUT
          fi

  # Security scanning
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Run kube-score
        run: |
          docker run --rm -v $(pwd)/gitops:/workdir \
            zegl/kube-score score \
            --output-format ci \
            /workdir/flux-system

  # Test Flux configuration
  test-flux:
    name: Test Flux Configuration
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        environment: ${{ fromJson(needs.validate.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kind cluster
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: "flux-test-${{ matrix.environment }}"
          config: "./tests/kind-config-${{ matrix.environment }}.yaml"
          wait: 30s

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: ${{ env.FLUX_VERSION }}

      - name: Apply Flux manifests
        run: |
          kubectl apply -f ./gitops/flux-system/namespaces.yaml
          kubectl apply -k ./overlays/flux-system/${{ matrix.environment }}

      - name: Wait for Flux controllers
        run: |
          kubectl wait --for=condition=available deployment/source-controller -n flux-system --timeout=120s
          kubectl wait --for=condition=available deployment/kustomize-controller -n flux-system --timeout=120s
          kubectl wait --for=condition=available deployment/helm-controller -n flux-system --timeout=120s

      - name: Run Flux tests
        run: |
          ./tests/flux-comprehensive-test.sh

      - name: Collect logs
        if: failure()
        run: |
          kubectl logs -n flux-system deployment/source-controller --tail=100
          kubectl logs -n flux-system deployment/kustomize-controller --tail=100
          kubectl logs -n flux-system deployment/helm-controller --tail=100

  # Test Qwen integration
  test-qwen:
    name: Test Qwen Integration
    runs-on: ubuntu-latest
    needs: [validate, test-flux]
    if: github.event.inputs.test_qwen != 'false' || github.event_name != 'workflow_dispatch'
    strategy:
      matrix:
        environment: ${{ fromJson(needs.validate.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Kind cluster with GPU support
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: "qwen-test-${{ matrix.environment }}"
          config: "./tests/kind-config-qwen.yaml"
          wait: 30s

      - name: Setup Flux CLI
        uses: fluxcd/flux2/action@main
        with:
          version: ${{ env.FLUX_VERSION }}

      - name: Deploy Qwen integration
        run: |
          ./scripts/qwen-setup.sh --environment ${{ matrix.environment }} --dry-run false --auto-approve true

      - name: Wait for Qwen deployment
        run: |
          kubectl wait --for=condition=available deployment/qwen-llm -n qwen-system --timeout=300s

      - name: Run Qwen tests
        run: |
          ./tests/qwen-integration-test.sh

      - name: Test Qwen API
        run: |
          kubectl port-forward -n qwen-system svc/qwen-llm 8000:8000 &
          PF_PID=$!
          sleep 10
          
          # Test health endpoint
          curl -f http://localhost:8000/health
          
          # Test chat endpoint
          curl -X POST -H "Content-Type: application/json" \
            -d '{"prompt": "Test"}' \
            http://localhost:8000/chat
          
          kill $PF_PID || true

      - name: Collect Qwen logs
        if: failure()
        run: |
          kubectl logs -n qwen-system deployment/qwen-llm --tail=100

  # Build and push images
  build-images:
    name: Build Container Images
    runs-on: ubuntu-latest
    needs: [validate]
    if: github.event_name == 'push'
    strategy:
      matrix:
        component: [flux-webhook, qwen-llm]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.component }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./containers/${{ matrix.component }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [validate, test-flux, test-qwen, build-images]
    if: github.ref == 'refs/heads/main'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to staging
        run: |
          kubectl apply -k ./overlays/flux-system/staging
          kubectl wait --for=condition=available deployment/qwen-llm -n qwen-system --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods -n flux-system
          kubectl get pods -n qwen-system
          flux check --namespace flux-system

      - name: Run smoke tests
        run: |
          ./tests/smoke-tests.sh --environment staging

  # Deploy to production (manual approval)
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://production.example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to production
        run: |
          kubectl apply -k ./overlays/flux-system/production
          kubectl wait --for=condition=available deployment/qwen-llm -n qwen-system --timeout=600s

      - name: Verify deployment
        run: |
          kubectl get pods -n flux-system
          kubectl get pods -n qwen-system
          flux check --namespace flux-system

      - name: Run production tests
        run: |
          ./tests/production-tests.sh

      - name: Notify deployment
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          text: "Flux deployment to production ${{ job.status }}"

  # Performance tests
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Run performance tests
        run: |
          ./tests/performance-tests.sh --environment staging

      - name: Upload performance results
        uses: actions/upload-artifact@v3
        with:
          name: performance-results
          path: ./test-results/

  # Security scan deployment
  security-scan:
    name: Security Scan Deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: ${{ env.KUBECTL_VERSION }}

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Run Falco security scan
        run: |
          kubectl run falco-scanner --image=falcosecurity/falco --rm -i -- \
            falco --list-rules > falco-rules.txt

      - name: Run Trivy cluster scan
        run: |
          docker run --rm -v $HOME/.kube:/root/.kube \
            aquasec/trivy:latest image \
            --format json \
            --output trivy-cluster-report.json \
            k8s://all

      - name: Upload security reports
        uses: actions/upload-artifact@v3
        with:
          name: security-reports
          path: |
            falco-rules.txt
            trivy-cluster-report.json

  # Notify results
  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    needs: [validate, test-flux, test-qwen, deploy-staging]
    if: always()
    steps:
      - name: Notify success
        if: needs.validate.result == 'success' && needs.test-flux.result == 'success'
        uses: 8398a7/action-slack@v3
        with:
          status: success
          channel: '#ci-cd'
          text: "Flux CI/CD pipeline completed successfully! 🎉"

      - name: Notify failure
        if: needs.validate.result == 'failure' || needs.test-flux.result == 'failure'
        uses: 8398a7/action-slack@v3
        with:
          status: failure
          channel: '#ci-cd'
          text: "Flux CI/CD pipeline failed! ❌"

      - name: Update status badge
        if: github.ref == 'refs/heads/main'
        run: |
          # Update README badge based on pipeline status
          echo "Pipeline status: ${{ job.status }}"
