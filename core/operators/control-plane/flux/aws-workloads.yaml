apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: aws-workloads
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./core/resources/tenants/aws/workloads
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
  - name: aws-clusters
