---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: gcp-auth-workload
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./core/resources/tenants/gcp/workloads/auth-service
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
  - name: gcp-clusters
  - name: azure-entra-workload  # GCP service authenticates via Azure AD
