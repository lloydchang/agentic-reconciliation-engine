---
# State Backup Controller
# Automatically backs up infrastructure state to Kubernetes etcd

apiVersion: batch/v1
kind: CronJob
metadata:
  name: state-backup-controller
  namespace: flux-system
spec:
  schedule: "*/5 * * * *"  # Every 5 minutes
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: state-backup
            image: bitnami/kubectl:latest
            command:
            - /bin/bash
            - /core/core/automation/ci-cd/scripts/backup-script.sh
            env:
            - name: NAMESPACE
              value: "flux-system"
            - name: BACKUP_RETENTION
              value: "10"
            volumeMounts:
            - name: backup-scripts
              mountPath: /scripts
              readOnly: true
            - name: backup-storage
              mountPath: /tmp/backups
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
          volumes:
          - name: backup-scripts
            configMap:
              name: state-persistence-config
              defaultMode: 0755
          - name: backup-storage
            emptyDir: {}
          restartPolicy: OnFailure
          serviceAccountName: flux-reconciler
---
# State Recovery Controller
# Manages state recovery during Git outages

apiVersion: batch/v1
kind: Job
metadata:
  name: state-recovery-controller
  namespace: flux-system
spec:
  template:
    spec:
      containers:
      - name: state-recovery
        image: bitnami/kubectl:latest
        command:
        - /bin/bash
        - -c
        - |
          #!/bin/bash
          
          echo "🔄 State Recovery Controller Started"
          
          # Check if we're in offline mode
          OFFLINE_MODE=$(kubectl get kustomization infrastructure -n flux-system -o jsonpath='{.metadata.annotations.fluxcd\.io/offline-mode}' 2>/dev/null || echo "false")
          
          if [[ "$OFFLINE_MODE" == "true" ]]; then
            echo "📱 Offline mode detected - checking for state recovery needs"
            
            # Get latest backup
            LATEST_BACKUP=$(kubectl get configmaps -n flux-system -l backup.fluxcd.io/type=infrastructure-state \
              --sort-by=.metadata.creationTimestamp -o jsonpath='{.items[-1].metadata.labels.backup\.fluxcd\.io/timestamp}' 2>/dev/null || echo "")
            
            if [[ -n "$LATEST_BACKUP" ]]; then
              echo "📦 Latest backup found: $LATEST_BACKUP"
              
              # Check if critical resources exist
              CRITICAL_RESOURCES=("vpcs.ec2.aws.crossplane.io" "eksclusters.eks.aws.crossplane.io")
              RECOVERY_NEEDED=false
              
              for resource in "${CRITICAL_RESOURCES[@]}"; do
                COUNT=$(kubectl get "$resource" --all-namespaces --no-headers 2>/dev/null | wc -l)
                if [[ "$COUNT" -eq 0 ]]; then
                  echo "⚠️ No $resource found - recovery needed"
                  RECOVERY_NEEDED=true
                  break
                fi
              done
              
              if [[ "$RECOVERY_NEEDED" == "true" ]]; then
                echo "🔄 Starting state recovery from backup $LATEST_BACKUP"
                /core/core/automation/ci-cd/scripts/recovery-script.sh "$LATEST_BACKUP"
              else
                echo "✅ All critical resources present - no recovery needed"
              fi
            else
              echo "❌ No backups found for recovery"
            fi
          else
            echo "✅ Online mode - no recovery needed"
          fi
        volumeMounts:
        - name: backup-scripts
          mountPath: /scripts
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: backup-scripts
        configMap:
          name: state-persistence-config
          defaultMode: 0755
      restartPolicy: OnFailure
      serviceAccountName: flux-reconciler
