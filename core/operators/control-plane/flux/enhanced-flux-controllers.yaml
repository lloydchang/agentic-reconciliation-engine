---
# Enhanced Flux Controllers with Failover Support
# Custom controller configurations for improved Git SPOF resilience

apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-enhanced
  namespace: flux-system
spec:
  interval: 10m
  chart:
    spec:
      chart: flux2
      version: "2.3.0"
      sourceRef:
        kind: HelmRepository
        name: fluxcd
        namespace: flux-system
  values:
    # Enhanced source controller configuration
    sourceController:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # Enhanced timeout and retry settings
      timeout: 60s
      retryInterval: 30s
      # Multi-repository support
      maxConcurrentReconciles: 10
      
    # Enhanced kustomize controller configuration
    kustomizeController:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      # Enhanced timeout and retry settings
      timeout: 10m
      retryInterval: 2m
      # Failover-aware settings
      maxConcurrentReconciles: 5
      # Enable service account for failover operations
      serviceAccount:
        create: true
        name: flux-reconciler
        
    # Enhanced notification controller for failover alerts
    notificationController:
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 128Mi
      # Enable alerts for failover events
      enabled: true
      
    # Enhanced helm controller configuration
    helmController:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
      timeout: 10m
      retryInterval: 2m
---
# Enhanced Service Account for Failover Operations
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flux-reconciler
  namespace: flux-system
  annotations:
    iam.amazonaws.com/role: "arn:aws:iam::ACCOUNT:role/flux-reconciler-role"
---
# Enhanced ClusterRole for Failover Operations
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flux-failover-role
rules:
- apiGroups: ["source.toolkit.fluxcd.io"]
  resources: ["gitrepositories"]
  verbs: ["get", "list", "watch", "patch", "update"]
- apiGroups: ["kustomize.toolkit.fluxcd.io"]
  resources: ["kustomizations"]
  verbs: ["get", "list", "watch", "patch", "update", "annotate"]
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["cronjobs", "jobs"]
  verbs: ["get", "list", "watch", "create", "patch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-failover-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flux-failover-role
subjects:
- kind: ServiceAccount
  name: flux-reconciler
  namespace: flux-system
