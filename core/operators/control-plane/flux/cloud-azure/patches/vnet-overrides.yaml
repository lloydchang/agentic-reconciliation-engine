apiVersion: network.azure.com/v1beta20201101
kind: VirtualNetwork
metadata:
  name: main-vnet
spec:
  location: eastus
  owner:
    name: platform-rg
  addressSpace:
    addressPrefixes:
      - 10.10.0.0/16
  subnets:
    - name: default
      properties:
        addressPrefix: 10.10.0.0/24
  tags:
    - key: env
      value: dev
