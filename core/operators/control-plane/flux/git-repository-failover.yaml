---
# Git Repository Failover Controller
# Automatically switches to backup repositories when primary fails

apiVersion: batch/v1
kind: CronJob
metadata:
  name: git-repository-failover
  namespace: flux-system
spec:
  schedule: "*/2 * * * *"  # Every 2 minutes
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: failover-controller
            image: bitnami/kubectl:latest
            command:
            - /bin/bash
            - -c
            - |
              #!/bin/bash
              
              # Check primary repository health
              PRIMARY_REPO="gitops-infra-primary"
              SECONDARY_REPO="gitops-infra-secondary"
              TERTIARY_REPO="gitops-infra-tertiary"
              
              # Get repository status
              PRIMARY_STATUS=$(kubectl get gitrepository $PRIMARY_REPO -n flux-system -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
              SECONDARY_STATUS=$(kubectl get gitrepository $SECONDARY_REPO -n flux-system -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
              TERTIARY_STATUS=$(kubectl get gitrepository $TERTIARY_REPO -n flux-system -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
              
              echo "Primary status: $PRIMARY_STATUS"
              echo "Secondary status: $SECONDARY_STATUS"
              echo "Tertiary status: $TERTIARY_STATUS"
              
              # Failover logic
              if [[ "$PRIMARY_STATUS" != "True" ]]; then
                echo "Primary repository failed, checking secondary..."
                if [[ "$SECONDARY_STATUS" == "True" ]]; then
                  echo "Switching to secondary repository..."
                  kubectl patch kustomization infrastructure -n flux-system -p '{"spec":{"sourceRef":{"kind":"GitRepository","name":"gitops-infra-secondary"}}}' --type=merge
                elif [[ "$TERTIARY_STATUS" == "True" ]]; then
                  echo "Switching to tertiary repository..."
                  kubectl patch kustomization infrastructure -n flux-system -p '{"spec":{"sourceRef":{"kind":"GitRepository","name":"gitops-infra-tertiary"}}}' --type=merge
                else
                  echo "❌ All repositories failed - entering offline mode"
                  kubectl annotate kustomization infrastructure fluxcd.io/offline-mode=true --overwrite
                fi
              else
                echo "✅ Primary repository healthy"
                # Ensure we're using primary if it's healthy
                CURRENT_SOURCE=$(kubectl get kustomization infrastructure -n flux-system -o jsonpath='{.spec.sourceRef.name}')
                if [[ "$CURRENT_SOURCE" != "$PRIMARY_REPO" ]]; then
                  echo "Switching back to primary repository..."
                  kubectl patch kustomization infrastructure -n flux-system -p '{"spec":{"sourceRef":{"kind":"GitRepository","name":"gitops-infra-primary"}}}' --type=merge
                fi
                # Remove offline mode annotation if present
                kubectl annotate kustomization infrastructure fluxcd.io/offline-mode- --overwrite
              fi
          restartPolicy: OnFailure
          serviceAccountName: flux-reconciler
