apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImageRepository
metadata:
  name: agentic-reconciliation-engine
  namespace: flux-system
spec:
  image: ghcr.io/${{ github.repository_owner }}/agentic-reconciliation-engine
  interval: 5m
---
apiVersion: image.toolkit.fluxcd.io/v1beta2
kind: ImagePolicy
metadata:
  name: agentic-reconciliation-engine-latest
  namespace: flux-system
spec:
  imageRepositoryRef:
    name: agentic-reconciliation-engine
  policy:
    alphabetical:
      order: asc
  filterTags:
    pattern: '^main-[a-fA-F0-9]+-(?P<timestamp>[0-9]+)'
    extract: '$timestamp'
  updateStrategy:
    semver:
      range: '>=0.0.0'
