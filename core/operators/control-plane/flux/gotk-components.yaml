---
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: agentic-reconciliation-engine
  namespace: flux-system
spec:
  interval: 1m0s
  ref:
    branch: main
  secretRef:
    name: flux-system
  url: ssh://git@github.com/lloydchang/agentic-reconciliation-engine
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./core/operators/flux
  prune: true
  sourceRef:
    kind: GitRepository
    name: agentic-reconciliation-engine
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-system
  interval: 10m0s
  path: ./core/operators/controllers
  prune: true
  sourceRef:
    kind: GitRepository
    name: agentic-reconciliation-engine
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tenants-infra
  namespace: flux-system
spec:
  dependsOn:
    - name: infrastructure-controllers
  interval: 10m0s
  path: ./core/resources/tenants
  prune: true
  sourceRef:
    kind: GitRepository
    name: agentic-reconciliation-engine
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: monitoring-alerts
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-system
    - name: infrastructure-controllers
  interval: 10m0s
  path: ./core/operators/monitoring
  prune: true
  sourceRef:
    kind: GitRepository
    name: agentic-reconciliation-engine
