---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: gcp-vertex-ai-gemini
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./core/resources/tenants/gcp/workloads/vertex-ai-gemini
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
  - name: gcp-clusters  # GCP infrastructure must be ready first
