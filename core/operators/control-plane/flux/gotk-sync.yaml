---
# ⚠️  PROBLEM-SOLUTION FIT ASSESSMENT REQUIRED
# Before deploying this configuration, ensure you have:
# 1. Clearly defined infrastructure problems (see docs/PROBLEM-SOLUTION-FIT.md)
# 2. Confirmed this complexity level is necessary for your scale
# 3. Team skills to implement and maintain GitOps workflows
# 4. Measurable success criteria and ROI expectations

# CONTEXT: This is foundational GitOps infrastructure - appropriate for most teams
# BUT: Consider your scale and complexity before adding advanced features
# - Small teams (1-5): Start here, add complexity gradually
# - Medium teams (6-20): This is likely appropriate
# - Large teams (20+): This is foundational, consider advanced features

# SCENARIO FIT:
# - Greenfield: Perfect starting point for clean GitOps implementation
# - Brownfield: Excellent for gradual migration with proper dependsOn chains
# - Hybrid: Manages both local and cloud environments consistently
# - Multi-cloud: Foundation for cross-cloud coordination

apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: network-infra
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./core/resources/tenants/1-network
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cluster-infra
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./core/resources/tenants/2-clusters
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
  dependsOn:
    - name: network-infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: workload-infra
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./core/resources/tenants/3-workloads
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
  dependsOn:
    - name: cluster-infra
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: karmada-infra
  namespace: flux-system
spec:
  interval: 5m0s
  path: ./core/operators/karmada
  prune: true
  sourceRef:
    kind: GitRepository
    name: gitops-infra-control-plane
  dependsOn:
    - name: workload-infra
