apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: azure-clusters
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./core/resources/tenants/azure/clusters
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  dependsOn:
  - name: azure-network
