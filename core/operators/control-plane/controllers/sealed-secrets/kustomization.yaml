apiVersion: v1
kind: Namespace
metadata:
  name: sealed-secrets-system
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: sealed-secrets
  namespace: sealed-secrets-system
spec:
  interval: 10m0s
  url: https://charts.bitnami.com/bitnami
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: sealed-secrets
  namespace: sealed-secrets-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: sealed-secrets
      version: "2.13.0"
      sourceRef:
        kind: HelmRepository
        name: sealed-secrets
      interval: 10m0s
  values:
    controller:
      replicas: 1
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"
