apiVersion: v1
kind: ServiceAccount
metadata:
  name: ack-eks-controller
  namespace: ack-system
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/AckEKSControllerRole
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ack-eks-controller
  namespace: ack-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ack-eks-controller
  template:
    metadata:
      labels:
        app: ack-eks-controller
    spec:
      serviceAccountName: ack-eks-controller
      containers:
      - name: ack-eks-controller
        image: public.ecr.aws/aws-controllers-k8s/eks-controller:v0.0.1
        args:
        - --aws-region=us-east-1
        env:
        - name: AWS_REGION
          value: us-east-1
        - name: AWS_ENDPOINT_URL
          value: "http://localstack.localstack.svc.cluster.local:4566"
        - name: ACK_ENABLE_DEVELOPMENT_LOGGING
          value: "true"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
