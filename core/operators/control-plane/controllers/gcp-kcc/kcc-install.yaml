apiVersion: v1
kind: ServiceAccount
metadata:
  name: cnrm-controller-manager
  namespace: cnrm-system
  annotations:
    iam.gke.io/gcp-service-account: cnrm-manager@PROJECT_ID.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cnrm-controller-manager
  namespace: cnrm-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cnrm-controller-manager
  template:
    metadata:
      labels:
        app: cnrm-controller-manager
    spec:
      serviceAccountName: cnrm-controller-manager
      containers:
      - name: manager
        image: gcr.io/k8s-staging-config-connector/cnrm-controller-manager:v1.114.0
        args:
        - --health-probe-address=:8081
        - --metrics-address=:8080
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/run/secrets/workload-identity/token
        - name: CLOUDSDK_AUTH_CREDENTIAL_FILE_OVERRIDE
          value: /var/run/secrets/workload-identity/token
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: workload-identity-token
          mountPath: /var/run/secrets/workload-identity
          readOnly: true
      volumes:
      - name: workload-identity-token
        projected:
          sources:
          - serviceAccountToken:
              audience: sts.googleapis.com
              expirationSeconds: 3600
              path: token
