apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: spoke-eks
  namespace: capi-system
spec:
  variables:
    - name: NETWORK_REF
      required: false
  patches:
    - name: network-ref-tag
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: AWSClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/additionalTags
              value: {}
            - op: add
              path: /spec/template/spec/additionalTags/NetworkRef
              valueFrom:
                variable: NETWORK_REF
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: KubeadmControlPlaneTemplate
      name: spoke-eks-control-plane
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: AWSClusterTemplate
      name: spoke-eks-infra
  workers:
    machineDeployments:
      - class: default-worker
    template:
      bootstrap:
        ref:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: KubeadmConfigTemplate
          name: spoke-eks-worker-bootstrap
      infrastructure:
        ref:
          apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
          kind: AWSMachineTemplate
          name: spoke-eks-worker
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlaneTemplate
metadata:
  name: spoke-eks-control-plane
  namespace: capi-system
spec:
  template:
    spec:
      kubeadmConfigSpec:
        clusterConfiguration:
          apiServer:
            extraArgs:
              cloud-provider: aws
          controllerManager:
            extraArgs:
              cloud-provider: aws
        initConfiguration:
          nodeRegistration:
            name: '{{ ds.meta_data.local_hostname }}'
      machineTemplate:
        infrastructureRef:
          apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
          kind: AWSMachineTemplate
          name: spoke-eks-control-plane
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AWSClusterTemplate
metadata:
  name: spoke-eks-infra
  namespace: capi-system
spec:
  template:
    spec:
      region: us-east-1
      sshKeyName: spoke-eks-key
      additionalTags:
        NetworkRef: "${NETWORK_REF}"
      network:
        vpc:
          tags:
            NetworkRef: "${NETWORK_REF}"
        subnets:
          - tags:
              NetworkRef: "${NETWORK_REF}"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AWSMachineTemplate
metadata:
  name: spoke-eks-control-plane
  namespace: capi-system
spec:
  template:
    spec:
      instanceType: t3.large
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: spoke-eks-worker-bootstrap
  namespace: capi-system
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          name: '{{ ds.meta_data.local_hostname }}'
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AWSMachineTemplate
metadata:
  name: spoke-eks-worker
  namespace: capi-system
spec:
  template:
    spec:
      instanceType: t3.large
