apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: spoke-gke
  namespace: capi-system
spec:
  variables:
    - name: NETWORK_REF
      required: false
  patches:
    - name: network-ref-tag
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: GCPClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/tags
              value: {}
            - op: add
              path: /spec/template/spec/tags/NetworkRef
              valueFrom:
                variable: NETWORK_REF
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: KubeadmControlPlaneTemplate
      name: spoke-gke-control-plane
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: GCPClusterTemplate
      name: spoke-gke-infra
  workers:
    machineDeployments:
      - class: default-worker
        template:
          bootstrap:
            ref:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
              kind: KubeadmConfigTemplate
              name: spoke-gke-worker-bootstrap
          infrastructure:
            ref:
              apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
              kind: GCPMachineTemplate
              name: spoke-gke-worker
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlaneTemplate
metadata:
  name: spoke-gke-control-plane
  namespace: capi-system
spec:
  template:
    spec:
      kubeadmConfigSpec:
        clusterConfiguration:
          apiServer:
            extraArgs:
              cloud-provider: gce
          controllerManager:
            extraArgs:
              cloud-provider: gce
        initConfiguration:
          nodeRegistration:
            name: '{{ ds.meta_data.local_hostname }}'
      machineTemplate:
        infrastructureRef:
          apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
          kind: GCPMachineTemplate
          name: spoke-gke-control-plane
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPClusterTemplate
metadata:
  name: spoke-gke-infra
  namespace: capi-system
spec:
  template:
    spec:
      project: my-gcp-project
      region: us-central1
      network:
        name: "${NETWORK_REF}"
      subnetwork:
        name: "${NETWORK_REF}-subnet"
      tags:
        NetworkRef: "${NETWORK_REF}"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPMachineTemplate
metadata:
  name: spoke-gke-control-plane
  namespace: capi-system
spec:
  template:
    spec:
      instanceType: e2-standard-4
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: spoke-gke-worker-bootstrap
  namespace: capi-system
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          name: '{{ ds.meta_data.local_hostname }}'
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: GCPMachineTemplate
metadata:
  name: spoke-gke-worker
  namespace: capi-system
spec:
  template:
    spec:
      instanceType: e2-standard-4
