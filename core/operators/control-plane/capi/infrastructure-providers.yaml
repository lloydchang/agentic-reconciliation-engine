apiVersion: v1
kind: Namespace
metadata:
  name: capi-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-providers
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: capi-repo
  namespace: capi-system
spec:
  interval: 1h
  url: https://kubernetes-sigs.github.io/cluster-api
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capi-core
  namespace: capi-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cluster-api
      version: ">=1.7.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: capi-repo
        namespace: capi-system
  values:
    namespace: capi-system
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capa
  namespace: capi-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cluster-api-provider-aws
      version: ">=2.5.0 <3.0.0"
      sourceRef:
        kind: HelmRepository
        name: capi-repo
        namespace: capi-system
  values:
    namespace: capi-system
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/capa-controller-role
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capz
  namespace: capi-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cluster-api-provider-azure
      version: ">=1.14.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: capi-repo
        namespace: capi-system
  values:
    namespace: capi-system
    serviceAccount:
      annotations:
        azure.workload.identity/client-id: "<CAPZ_CLIENT_ID>"
    podLabels:
      azure.workload.identity/use: "true"
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: capg
  namespace: capi-system
spec:
  interval: 1h
  chart:
    spec:
      chart: cluster-api-provider-gcp
      version: ">=1.7.0 <2.0.0"
      sourceRef:
        kind: HelmRepository
        name: capi-repo
        namespace: capi-system
  values:
    namespace: capi-system
    serviceAccount:
      annotations:
        iam.gke.io/gcp-service-account: capg-controller@PROJECT_ID.iam.gserviceaccount.com
