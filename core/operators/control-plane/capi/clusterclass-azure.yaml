apiVersion: cluster.x-k8s.io/v1beta1
kind: ClusterClass
metadata:
  name: spoke-aks
  namespace: capi-system
spec:
  variables:
    - name: NETWORK_REF
      required: false
  patches:
    - name: network-ref-tag
      definitions:
        - selector:
            apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
            kind: AzureClusterTemplate
            matchResources:
              infrastructureCluster: true
          jsonPatches:
            - op: add
              path: /spec/template/spec/tags
              value: {}
            - op: add
              path: /spec/template/spec/tags/NetworkRef
              valueFrom:
                variable: NETWORK_REF
  controlPlane:
    ref:
      apiVersion: controlplane.cluster.x-k8s.io/v1beta1
      kind: KubeadmControlPlaneTemplate
      name: spoke-aks-control-plane
  infrastructure:
    ref:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: AzureClusterTemplate
      name: spoke-aks-infra
  workers:
    machineDeployments:
      - class: default-worker
        template:
          bootstrap:
            ref:
              apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
              kind: KubeadmConfigTemplate
              name: spoke-aks-worker-bootstrap
          infrastructure:
            ref:
              apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
              kind: AzureMachineTemplate
              name: spoke-aks-worker
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlaneTemplate
metadata:
  name: spoke-aks-control-plane
  namespace: capi-system
spec:
  template:
    spec:
      kubeadmConfigSpec:
        clusterConfiguration:
          apiServer:
            extraArgs:
              cloud-provider: azure
          controllerManager:
            extraArgs:
              cloud-provider: azure
        initConfiguration:
          nodeRegistration:
            name: '{{ ds.meta_data.local_hostname }}'
      machineTemplate:
        infrastructureRef:
          apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
          kind: AzureMachineTemplate
          name: spoke-aks-control-plane
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureClusterTemplate
metadata:
  name: spoke-aks-infra
  namespace: capi-system
spec:
  template:
    spec:
      location: eastus
      resourceGroup: capi-aks-rg
      subscriptionID: "00000000-0000-0000-0000-000000000000"
      networkSpec:
        vnet:
          name: "${NETWORK_REF}"
        subnets:
          - name: "${NETWORK_REF}-subnet"
      tags:
        NetworkRef: "${NETWORK_REF}"
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureMachineTemplate
metadata:
  name: spoke-aks-control-plane
  namespace: capi-system
spec:
  template:
    spec:
      vmSize: Standard_D4s_v3
---
apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
kind: KubeadmConfigTemplate
metadata:
  name: spoke-aks-worker-bootstrap
  namespace: capi-system
spec:
  template:
    spec:
      joinConfiguration:
        nodeRegistration:
          name: '{{ ds.meta_data.local_hostname }}'
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: AzureMachineTemplate
metadata:
  name: spoke-aks-worker
  namespace: capi-system
spec:
  template:
    spec:
      vmSize: Standard_D4s_v3
