apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: agentic-reconciliation-engine
  namespace: flux-system
resources:
  - flux/
  - crossplane/
  - capi/
  - controllers/
  - karmada/
  - monitoring/
  - consensus/
dependsOn:
  - flux
labels:
  - pairs:
      managed-by: flux
      component: agentic-reconciliation-engine
      platform: multi-cluster-gitops
