# Langfuse Authentication Secret
# 
# This secret contains credentials for Langfuse LLM observability platform.
# 
# === DEPLOYMENT FIX HISTORY ===
# Date: 2026-03-18
# Issue: Failed to deploy to control-plane namespace (non-existent)
# Solution: Updated namespace from control-plane to ai-infrastructure
# Impact: Enables Langfuse observability integration
#
# === SECURITY NOTES ===
# - This file contains PLACEHOLDER values that are safe to commit
# - Never commit actual credentials to version control
# - Use sealed secrets or environment variables for production
# - Rotate credentials regularly
# - Store actual secrets in secure vault (AWS Secrets Manager, etc.)
#
# === DEPLOYMENT OPTIONS ===
# 1. Update this file with encoded values (development only)
# 2. Use kubectl create secret (recommended for prod):
#    kubectl create secret generic langfuse-secrets \
#      --from-literal=public-key=lf-your-public-key \
#      --from-literal=secret-key=sk-your-secret-key \
#      --from-literal=otlp-headers="Authorization=Bearer sk-your-secret-key" \
#      -n ai-infrastructure
# 3. Use sealed secrets (production with GitOps)
#
# === ENCODING EXAMPLES ===
# echo -n 'lf-your-public-key' | base64
# echo -n 'sk-your-secret-key' | base64  
# echo -n 'Authorization=Bearer sk-your-secret-key' | base64
#
# === VERIFICATION COMMANDS ===
# Apply secret:
#   kubectl apply -f core/config/langfuse-secret.yaml
#
# Verify deployment:
#   kubectl get secret langfuse-secrets -n ai-infrastructure
#
# Check secret details:
#   kubectl describe secret langfuse-secrets -n ai-infrastructure
#
# Test decoding (optional):
#   kubectl get secret langfuse-secrets -n ai-infrastructure -o jsonpath='{.data.public-key}' | base64 --decode
#
# === TROUBLESHOOTING ===
# 
# Common Issues:
# 1. "namespace not found" -> Ensure ai-infrastructure namespace exists
# 2. "illegal base64 data" -> Values not properly base64 encoded
# 3. "secret already exists" -> Delete existing: kubectl delete secret langfuse-secrets -n ai-infrastructure
# 4. "connection refused" -> Check cluster connectivity: kubectl cluster-info
#
# Namespace Check:
#   kubectl get namespace ai-infrastructure || echo "ERROR: ai-infrastructure namespace missing"
#
# Base64 Validation:
#   echo -n 'test-value' | base64  # Should output: dGVzdC12YWx1ZQ==
#
# === INTEGRATION NOTES ===
# This secret is used by:
# - AI agents for observability tracking
# - Temporal workflows for LLM call monitoring  
# - Dashboard for performance analytics
#
# Target Services:
# - agent-memory-service.ai-infrastructure.svc.cluster.local:8080
# - temporal-worker.ai-infrastructure.svc.cluster.local:7233
#
# === MAINTENANCE ===
# Rotation Schedule: Every 90 days
# Monitoring: Check secret availability weekly
# Backup: Export secret config before changes
#
# === RELATED FILES ===
# - docs/LANGFUSE-SECRETS-DEPLOYMENT-FIX.md (full documentation)
# - core/config/langfuse-secret-$TOPDIR.yaml (alternative config)
# - core/automation/scripts/setup-langfuse-keys-automated.sh
#
apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: ai-infrastructure  # Must match AI agents deployment namespace
  labels:
    app: langfuse
    component: observability
    managed-by: gitops
  annotations:
    description: "Langfuse authentication credentials for LLM observability"
    contact: "infrastructure-team@company.com"
type: Opaque
data:
  # === LANGCUSE PUBLIC KEY ===
  # Description: Public key for Langfuse project identification
  # Format: lf-xxxxxxxxxxxx (starts with "lf-")
  # Source: Langfuse Dashboard -> Settings -> Project -> Public Key
  # Security: Public key, safe to share but should still be managed
  # Example: lf-1234567890abcdef
  # Encoding: echo -n 'lf-1234567890abcdef' | base64
  # Placeholder: "placeholder-public-key" -> cGxhY2Vob2xkZXItcHVibGljLWtleQ==
  # ACTION REQUIRED: Replace with your actual base64-encoded public key
  public-key: cGxhY2Vob2xkZXItcHVibGljLWtleQ==  # placeholder-public-key

  # === LANGCUSE SECRET KEY ===
  # Description: Secret key for Langfuse API authentication
  # Format: sk-xxxxxxxxxxxx (starts with "sk-")
  # Source: Langfuse Dashboard -> Settings -> Project -> Secret Key
  # Security: SECRET - Never commit actual values to version control
  # Example: sk-1234567890abcdef1234567890abcdef
  # Encoding: echo -n 'sk-1234567890abcdef1234567890abcdef' | base64
  # Placeholder: "placeholder-secret-key" -> cGxhY2Vob2xkZXItc2VjcmV0LWtleQ==
  # ACTION REQUIRED: Replace with your actual base64-encoded secret key
  secret-key: cGxhY2Vob2xkZXItc2VjcmV0LWtleQ==  # placeholder-secret-key

  # === OTLP AUTHORIZATION HEADERS ===
  # Description: OpenTelemetry Protocol headers for LLM observability
  # Format: "Authorization=Bearer sk-xxxxxxxxxxxx"
  # Source: Combine "Authorization=Bearer " with your secret key
  # Security: SECRET - Contains secret key, never commit actual values
  # Example: "Authorization=Bearer sk-1234567890abcdef1234567890abcdef"
  # Encoding: echo -n 'Authorization=Bearer sk-1234567890abcdef1234567890abcdef' | base64
  # Placeholder: "Authorization=Bearer placeholder-secret-key" -> QXV0aG9yaXphdGlvbj1CZWFyZXIgcGxhY2Vob2xkZXItc2VjcmV0LWtleQ==
  # ACTION REQUIRED: Replace with your actual base64-encoded authorization header
  otlp-headers: QXV0aG9yaXphdGlvbj1CZWFyZXIgcGxhY2Vob2xkZXItc2VjcmV0LWtleQ==  # placeholder: "Authorization=Bearer placeholder-secret-key"
