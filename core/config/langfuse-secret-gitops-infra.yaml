apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: ai-infrastructure  # For pi-mono-agent deployment
type: Opaque
data:
  # Replace with base64 encoded actual values from your Langfuse account
  # To encode: echo -n 'your-value' | base64
  public-key: <your-base64-encoded-public-key>
  secret-key: <your-base64-encoded-secret-key>
  otlp-headers: <your-base64-encoded-"Authorization=Bearer your-secret-key">
