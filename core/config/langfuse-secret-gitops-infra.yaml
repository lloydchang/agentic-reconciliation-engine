apiVersion: v1
kind: Secret
metadata:
  name: langfuse-secrets
  namespace: ai-infrastructure  # For pi-mono-agent deployment
type: Opaque
data:
  # Replace with base64 encoded actual values from your Langfuse account
  # To encode: echo -n 'your-value' | base64
  public-key: cGxhY2Vob2xkZXItcHVibGljLWtleQ== # placeholder: echo -n 'placeholder-public-key' | base64
  secret-key: cGxhY2Vob2xkZXItc2VjcmV0LWtleQ== # placeholder: echo -n 'placeholder-secret-key' | base64
  otlp-headers: QXV0aG9yaXphdGlvbj1CZWFyZXIgcGxhY2Vob2xkZXItc2VjcmV0LWtleQ== # placeholder: echo -n 'Authorization=Bearer placeholder-secret-key' | base64
