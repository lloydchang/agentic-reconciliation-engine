apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-backend-realtime
  namespace: ai-infrastructure
data:
  backend.py: |
    #!/usr/bin/env python3
    """
    Real-time Dashboard Backend for Agentic Reconciliation Engine
    Provides live data from Kubernetes cluster, Temporal workflows, and agent activities
    """
    
    import os
    import json
    import time
    import re
    from datetime import datetime, timedelta
    from flask import Flask, jsonify, request
    from flask_cors import CORS
    import threading
    import sqlite3
    
    # Kubernetes client
    from kubernetes import client, config
    
    app = Flask(__name__)
    CORS(app)
    
    # Configuration
    NAMESPACE = os.getenv('NAMESPACE', 'ai-infrastructure')
    TEMPORAL_HOST = os.getenv('TEMPORAL_HOST', 'temporal-frontend:7233')
    MEMORY_DB_PATH = os.getenv('MEMORY_DB_PATH', '/data/memory.db')
    
    # Load Kubernetes config (in-cluster)
    try:
        config.load_incluster_config()
        k8s_core = client.CoreV1Api()
        k8s_apps = client.AppsV1Api()
        print("Kubernetes client initialized successfully")
    except Exception as e:
        print(f"Warning: Could not initialize Kubernetes client: {e}")
        k8s_core = None
        k8s_apps = None
    
    # Cache for performance
    cache = {
        'agents': {'data': None, 'timestamp': 0},
        'skills': {'data': None, 'timestamp': 0},
        'activities': {'data': None, 'timestamp': 0},
        'metrics': {'data': None, 'timestamp': 0}
    }
    CACHE_TTL = 5  # seconds
    
    def get_real_agents():
        """Get real agent data from Kubernetes using Python client"""
        agents = []
        
        if not k8s_core:
            return agents
        
        try:
            # Get all pods in namespace
            pods = k8s_core.list_namespaced_pod(namespace=NAMESPACE)
            
            for pod in pods.items:
                pod_name = pod.metadata.name
                phase = pod.status.phase
                labels = pod.metadata.labels or {}
                
                # Determine agent type from labels
                component = labels.get('component', '')
                language = labels.get('language', 'Unknown')
                
                # Calculate ready status
                ready_containers = 0
                total_containers = len(pod.spec.containers) if pod.spec.containers else 0
                if pod.status.container_statuses:
                    for cs in pod.status.container_statuses:
                        if cs.ready:
                            ready_containers += 1
                
                ready = f"{ready_containers}/{total_containers}"
                
                # Determine agent name and skills based on component
                if 'agent-memory' in component:
                    agent_name = f'Memory Agent ({language.capitalize()})'
                    skills = 4
                elif 'temporal-workers' in component or 'workers' in component:
                    agent_name = 'Temporal Worker'
                    skills = 91
                    language = 'Go'
                elif 'dashboard' in component:
                    agent_name = 'Dashboard API'
                    skills = 1
                    language = 'Python'
                elif 'k8sgpt' in pod_name.lower():
                    agent_name = 'K8sGPT Analyzer'
                    skills = 3
                    language = 'AI'
                else:
                    continue  # Skip non-agent pods
                
                agents.append({
                    'id': pod_name,
                    'name': agent_name,
                    'type': language,
                    'status': phase,
                    'ready': ready,
                    'cpu': 'N/A',
                    'memory': 'N/A',
                    'skills': skills,
                    'lastActivity': 'Active' if phase == 'Running' else phase,
                    'successRate': 99.9 if phase == 'Running' else 0,
                    'autonomous': True
                })
        except Exception as e:
            print(f"Error getting agents: {e}")
        
        return agents
    
    def get_real_skills():
        """Get real skills from ConfigMap"""
        skills = []
        
        if not k8s_core:
            return skills
        
        try:
            # Try to get skills from ConfigMap
            cm = k8s_core.read_namespaced_config_map(name='skills-definitions', namespace=NAMESPACE)
            if cm.data and 'skills.json' in cm.data:
                skills_data = json.loads(cm.data['skills.json'])
                skills = skills_data.get('skills', [])
        except Exception as e:
            print(f"Error getting skills from ConfigMap: {e}")
            # Return default skills if ConfigMap not found
            skills = [
                {'name': 'debug', 'description': 'Debug agents and infrastructure', 'risk_level': 'low', 'autonomy': 'fully_auto', 'escalation': True},
                {'name': 'check-cluster-health', 'description': 'Check cluster health status', 'risk_level': 'medium', 'autonomy': 'conditional', 'escalation': True},
                {'name': 'analyze-security', 'description': 'Analyze security posture', 'risk_level': 'medium', 'autonomy': 'conditional', 'escalation': True},
                {'name': 'optimize-costs', 'description': 'Optimize cloud costs', 'risk_level': 'medium', 'autonomy': 'conditional', 'escalation': False},
                {'name': 'generate-docs', 'description': 'Generate documentation', 'risk_level': 'low', 'autonomy': 'fully_auto', 'escalation': False}
            ]
        
        return skills
    
    def get_cluster_metrics():
        """Get real cluster metrics using Python client"""
        metrics = {
            'nodes': 0,
            'pods': 0,
            'services': 0,
            'deployments': 0,
            'cpu_total': 'N/A',
            'memory_total': 'N/A',
            'health_score': 100
        }
        
        if not k8s_core or not k8s_apps:
            return metrics
        
        try:
            # Node count
            nodes = k8s_core.list_node()
            metrics['nodes'] = len(nodes.items)
            
            # Pod count in namespace
            pods = k8s_core.list_namespaced_pod(namespace=NAMESPACE)
            metrics['pods'] = len(pods.items)
            
            # Service count
            services = k8s_core.list_namespaced_service(namespace=NAMESPACE)
            metrics['services'] = len(services.items)
            
            # Deployment count
            deployments = k8s_apps.list_namespaced_deployment(namespace=NAMESPACE)
            metrics['deployments'] = len(deployments.items)
            
            # Health score based on pod phases
            running = sum(1 for p in pods.items if p.status.phase == 'Running')
            total = len(pods.items)
            if total > 0:
                metrics['health_score'] = int((running / total) * 100)
        except Exception as e:
            print(f"Error getting metrics: {e}")
        
        return metrics
    
    def get_recent_activities():
        """Get recent activities from Kubernetes events"""
        activities = []
        
        if not k8s_core:
            return activities
        
        try:
            # Get recent events
            events = k8s_core.list_namespaced_event(namespace=NAMESPACE, limit=20)
            
            for event in events.items:
                event_type = event.type or 'Normal'
                message = event.message or event.reason or 'Unknown event'
                
                # Map event type to activity type
                activity_type = 'info'
                if event_type == 'Warning':
                    activity_type = 'warning'
                elif 'Error' in (event.reason or ''):
                    activity_type = 'error'
                elif event_type == 'Normal':
                    activity_type = 'success'
                
                # Format time
                time_str = 'Unknown'
                if event.last_timestamp:
                    delta = datetime.now(event.last_timestamp.tzinfo) - event.last_timestamp
                    if delta.seconds < 60:
                        time_str = f"{delta.seconds}s ago"
                    elif delta.seconds < 3600:
                        time_str = f"{delta.seconds // 60}m ago"
                    else:
                        time_str = f"{delta.seconds // 3600}h ago"
                
                activities.append({
                    'time': time_str,
                    'type': activity_type,
                    'message': message[:100],
                    'source': event.source.component if event.source else 'unknown'
                })
        except Exception as e:
            print(f"Error getting activities: {e}")
        
        return activities
    
    # API Routes
    @app.route('/api/agents')
    def agents():
        """Get all agents"""
        now = time.time()
        if cache['agents']['data'] and (now - cache['agents']['timestamp']) < CACHE_TTL:
            return jsonify(cache['agents']['data'])
        
        data = {'agents': get_real_agents(), 'timestamp': datetime.now().isoformat()}
        cache['agents'] = {'data': data, 'timestamp': now}
        return jsonify(data)
    
    @app.route('/api/skills')
    def skills():
        """Get all skills"""
        now = time.time()
        if cache['skills']['data'] and (now - cache['skills']['timestamp']) < CACHE_TTL:
            return jsonify(cache['skills']['data'])
        
        data = {'skills': get_real_skills(), 'timestamp': datetime.now().isoformat()}
        cache['skills'] = {'data': data, 'timestamp': now}
        return jsonify(data)
    
    @app.route('/api/activities')
    def activities():
        """Get recent activities"""
        now = time.time()
        if cache['activities']['data'] and (now - cache['activities']['timestamp']) < CACHE_TTL:
            return jsonify(cache['activities']['data'])
        
        data = {'activities': get_recent_activities(), 'timestamp': datetime.now().isoformat()}
        cache['activities'] = {'data': data, 'timestamp': now}
        return jsonify(data)
    
    @app.route('/api/metrics')
    def metrics():
        """Get cluster metrics"""
        now = time.time()
        if cache['metrics']['data'] and (now - cache['metrics']['timestamp']) < CACHE_TTL:
            return jsonify(cache['metrics']['data'])
        
        data = {'metrics': get_cluster_metrics(), 'timestamp': datetime.now().isoformat()}
        cache['metrics'] = {'data': data, 'timestamp': now}
        return jsonify(data)
    
    @app.route('/api/health')
    def health():
        """Health check endpoint"""
        return jsonify({
            'status': 'healthy',
            'timestamp': datetime.now().isoformat(),
            'version': '1.0.0'
        })
    
    @app.route('/api/summary')
    def summary():
        """Get summary dashboard data"""
        return jsonify({
            'agents': get_real_agents(),
            'skills': get_real_skills(),
            'metrics': get_cluster_metrics(),
            'activities': get_recent_activities()[:5],
            'timestamp': datetime.now().isoformat()
        })
    
    if __name__ == '__main__':
        print(f"Starting Dashboard Backend...")
        print(f"Namespace: {NAMESPACE}")
        print(f"Temporal Host: {TEMPORAL_HOST}")
        print(f"Memory DB: {MEMORY_DB_PATH}")
        app.run(host='0.0.0.0', port=5000, debug=False)
        output, success = run_kubectl(f"get pods -n {NAMESPACE} --no-headers")
        if success and output:
            metrics['pods'] = len([l for l in output.strip().split('\n') if l.strip()])
        
        # Service count
        output, success = run_kubectl(f"get services -n {NAMESPACE} --no-headers")
        if success and output:
            metrics['services'] = len([l for l in output.strip().split('\n') if l.strip()])
        
        # Deployment count
        output, success = run_kubectl(f"get deployments -n {NAMESPACE} --no-headers")
        if success and output:
            metrics['deployments'] = len([l for l in output.strip().split('\n') if l.strip()])
        
        # Resource usage
        output, success = run_kubectl("top nodes --no-headers 2>/dev/null")
        if success and output:
            total_cpu = 0
            total_mem = 0
            for line in output.strip().split('\n'):
                if line.strip():
                    parts = re.split(r'\s+', line.strip())
                    if len(parts) >= 4:
                        # Parse percentage
                        cpu_pct = int(parts[2].replace('%', ''))
                        mem_pct = int(parts[4].replace('%', ''))
                        total_cpu += cpu_pct
                        total_mem += mem_pct
            if metrics['nodes'] > 0:
                metrics['cpu_total'] = f"{total_cpu // metrics['nodes']}%"
                metrics['memory_total'] = f"{total_mem // metrics['nodes']}%"
        
        # Health score based on pod status
        output, success = run_kubectl(f"get pods -n {NAMESPACE} -o jsonpath='{{.items[*].status.phase}}'")
        if success and output:
            phases = output.split()
            if phases:
                running = phases.count('Running')
                total = len(phases)
                metrics['health_score'] = int((running / total) * 100) if total > 0 else 100
        
        return metrics
    
    def get_recent_activities():
        """Get recent activities from events and logs"""
        activities = []
        
        # Get recent events
        output, success = run_kubectl(f"get events -n {NAMESPACE} --sort-by='.lastTimestamp' --limit=10 -o json")
        if success and output:
            try:
                events_data = json.loads(output)
                for event in events_data.get('items', [])[:10]:
                    msg = event.get('message', event.get('reason', 'Unknown event'))
                    event_type = event.get('type', 'Normal')
                    timestamp = event.get('lastTimestamp', '')
                    
                    # Map event type to activity type
                    activity_type = 'info'
                    if event_type == 'Warning':
                        activity_type = 'warning'
                    elif 'Error' in event.get('reason', ''):
                        activity_type = 'error'
                    elif 'Normal' in event_type:
                        activity_type = 'success'
                    
                    # Format time
                    time_str = 'Unknown'
                    if timestamp:
                        try:
                            dt = datetime.fromisoformat(timestamp.replace('Z', '+00:00'))
                            delta = datetime.now(dt.tzinfo) - dt
                            if delta.seconds < 60:
                                time_str = f"{delta.seconds}s ago"
                            elif delta.seconds < 3600:
                                time_str = f"{delta.seconds // 60}m ago"
                            else:
                                time_str = f"{delta.seconds // 3600}h ago"
                        except:
                            time_str = timestamp
                    
                    activities.append({
                        'time': time_str,
                        'type': activity_type,
                        'message': msg[:100],  # Truncate long messages
                        'source': event.get('source', {}).get('component', 'unknown')
                    })
            except json.JSONDecodeError:
                pass
        
        # If no events, generate from pod status
        if not activities:
            output, success = run_kubectl(f"get pods -n {NAMESPACE} --no-headers")
            if success and output:
                for line in output.strip().split('\n')[:5]:
                    if line.strip():
                        parts = re.split(r'\s+', line.strip())
                        if len(parts) >= 3:
                            activities.append({
                                'time': 'Live',
                                'type': 'success' if parts[2] == 'Running' else 'warning',
                                'message': f"Pod {parts[0]} is {parts[2]}",
                                'source': 'kubernetes'
                            })
        
        return activities
    
    def get_escalation_loop_status():
        """Get current escalation loop status from memory database"""
        escalation_status = {
            'observe': {'status': 'idle', 'last_check': None},
            'recall': {'status': 'idle', 'queries': 0},
            'select': {'status': 'idle', 'skill_selected': None},
            'execute': {'status': 'idle', 'workflow_id': None},
            'commit': {'status': 'idle', 'result': None}
        }
        
        # Try to read from memory database
        if os.path.exists(MEMORY_DB_PATH):
            try:
                conn = sqlite3.connect(MEMORY_DB_PATH)
                cursor = conn.cursor()
                
                # Check for recent escalations
                cursor.execute("""
                    SELECT * FROM procedural_memory 
                    WHERE skill_name LIKE '%escalation%' 
                    ORDER BY timestamp DESC LIMIT 1
                """)
                row = cursor.fetchone()
                if row:
                    escalation_status['observe']['status'] = 'active'
                    escalation_status['observe']['last_check'] = row[2]  # timestamp
                
                # Check recall queries
                cursor.execute("SELECT COUNT(*) FROM semantic_memory")
                count = cursor.fetchone()
                if count:
                    escalation_status['recall']['queries'] = count[0]
                
                conn.close()
            except Exception as e:
                print(f"Error reading memory database: {e}")
        
        return escalation_status
    
    def cached_response(cache_key, fetch_func):
        """Return cached response or fetch new data"""
        now = time.time()
        cached = cache.get(cache_key)
        
        if cached and (now - cached['timestamp']) < CACHE_TTL:
            return cached['data']
        
        data = fetch_func()
        cache[cache_key] = {'data': data, 'timestamp': now}
        return data
    
    # API Endpoints
    
    @app.route('/api/agents')
    def api_agents():
        """Get all agents with real-time status"""
        return jsonify({
            'agents': cached_response('agents', get_real_agents),
            'timestamp': datetime.now().isoformat()
        })
    
    @app.route('/api/skills')
    def api_skills():
        """Get all available skills"""
        return jsonify({
            'skills': cached_response('skills', get_real_skills),
            'total': len(cache['skills']['data']) if cache['skills']['data'] else 0
        })
    
    @app.route('/api/activities')
    def api_activities():
        """Get recent activities"""
        return jsonify({
            'activities': cached_response('activities', get_recent_activities),
            'timestamp': datetime.now().isoformat()
        })
    
    @app.route('/api/metrics')
    def api_metrics():
        """Get cluster metrics"""
        return jsonify({
            'metrics': cached_response('metrics', get_cluster_metrics),
            'timestamp': datetime.now().isoformat()
        })
    
    @app.route('/api/escalation-status')
    def api_escalation_status():
        """Get escalation loop status"""
        return jsonify({
            'escalation_loop': get_escalation_loop_status(),
            'timestamp': datetime.now().isoformat()
        })
    
    @app.route('/api/health')
    def api_health():
        """Health check endpoint"""
        return jsonify({
            'status': 'healthy',
            'timestamp': datetime.now().isoformat(),
            'version': '1.0.0'
        })
    
    @app.route('/api/summary')
    def api_summary():
        """Get summary dashboard data"""
        agents = cached_response('agents', get_real_agents)
        skills = cached_response('skills', get_real_skills)
        metrics = cached_response('metrics', get_cluster_metrics)
        activities = cached_response('activities', get_recent_activities)
        
        # Calculate summary stats
        running_agents = len([a for a in agents if a.get('status') == 'Running'])
        total_skills = len(skills)
        escalation_skills = len([s for s in skills if s.get('escalation', False)])
        
        return jsonify({
            'summary': {
                'agents': {
                    'total': len(agents),
                    'running': running_agents,
                    'autonomous': len([a for a in agents if a.get('autonomous', False)])
                },
                'skills': {
                    'total': total_skills,
                    'escalation': escalation_skills,
                    'non_escalation': total_skills - escalation_skills
                },
                'cluster': metrics,
                'recent_activities': len(activities)
            },
            'timestamp': datetime.now().isoformat()
        })
    
    @app.route('/api/skill/<skill_name>/execute', methods=['POST'])
    def api_execute_skill(skill_name):
        """Execute a skill (placeholder for Temporal workflow trigger)"""
        # This would trigger a Temporal workflow
        # For now, return a placeholder response
        return jsonify({
            'status': 'initiated',
            'skill': skill_name,
            'workflow_id': f'wf-{int(time.time())}',
            'message': f'Skill {skill_name} execution initiated via Temporal'
        })
    
    if __name__ == '__main__':
        print("Starting Agentic Dashboard Backend...")
        print(f"Namespace: {NAMESPACE}")
        print(f"Temporal Host: {TEMPORAL_HOST}")
        print(f"Memory DB: {MEMORY_DB_PATH}")
        app.run(host='0.0.0.0', port=5000, debug=False, threaded=True)
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard-backend
  namespace: ai-infrastructure
  labels:
    app: dashboard-backend
    component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dashboard-backend
  template:
    metadata:
      labels:
        app: dashboard-backend
        component: api
    spec:
      serviceAccountName: temporal-workers
      containers:
      - name: backend
        image: python:3.11-slim
        command: ["/bin/bash", "-c"]
        args:
        - |
          pip3 install --no-cache-dir flask flask-cors pyyaml kubernetes;
          python3 /app/backend.py
        env:
        - name: NAMESPACE
          value: "ai-infrastructure"
        - name: TEMPORAL_HOST
          value: "temporal-frontend:7233"
        - name: MEMORY_DB_PATH
          value: "/data/memory.db"
        volumeMounts:
        - name: backend-code
          mountPath: /app/backend.py
          subPath: backend.py
        - name: memory-storage
          mountPath: /data
          readOnly: true
        ports:
        - containerPort: 5000
          name: http
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: backend-code
        configMap:
          name: dashboard-backend-realtime
      - name: memory-storage
        persistentVolumeClaim:
          claimName: agent-memory-pvc
          readOnly: true
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-backend
  namespace: ai-infrastructure
spec:
  selector:
    app: dashboard-backend
  ports:
  - port: 5000
    targetPort: 5000
    name: http
  type: ClusterIP
