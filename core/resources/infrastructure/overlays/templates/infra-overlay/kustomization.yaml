# Infrastructure Overlay Template
# Copy this template to create new infrastructure overlays
# Instructions:
# 1. Copy this directory: cp -r core/deployment/overlays/templates/infra-overlay core/deployment/overlays/core/operators/flux/my-overlay
# 2. Replace placeholder values ({{overlay-name}}, {{base-component}}, etc.)
# 3. Customize the overlay functionality
# 4. Update overlay-metadata.yaml with your overlay details

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: {{overlay-name}}
  namespace: flux-system
  annotations:
    overlay.name: "{{overlay-name}}"
    overlay.version: "{{overlay-version}}"
    overlay.category: "infrastructure"
    overlay.component: "{{base-component}}"
    overlay.compatibility: ">=2.0.0"
resources:
  # Reference to base infrastructure component
  - ../../../../core/operators/{{base-component}}
# Patches to modify or extend base functionality
patchesStrategicMerge:
  - infrastructure-patches.yaml
# Additional configurations
configMapGenerator:
  - name: {{overlay-name}}-config
    files:
      - config.yaml
      - policies.yaml
    literals:
      - OVERLAY_NAME="{{overlay-name}}"
      - OVERLAY_VERSION="{{overlay-version}}"
      - OVERLAY_COMPONENT="{{base-component}}"
      - OVERLAY_ENABLED=true
# Secret generation for sensitive data
secretGenerator:
  - name: {{overlay-name}}-secrets
    envs:
      - .env.secret
# Common labels for overlay resources
commonLabels:
  overlay: "{{overlay-name}}"
  overlay-component: "{{base-component}}"
  component: "infrastructure"
  managed-by: "kustomize"
# Namespace configuration
namespace: flux-system
# Images for overlay (if custom containers needed)
images:
  - name: fluxcd/kustomize-controller
    newTag: "v0.38.1"
  - name: fluxcd/helm-controller
    newTag: "v0.37.3"
  - name: fluxcd/source-controller
    newTag: "v1.2.4"
# Custom resource configurations (if needed)
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: kustomize-controller
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OVERLAY_CONFIG
          valueFrom:
            configMapKeyRef:
              name: {{overlay-name}}-config
              key: OVERLAY_ENABLED
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: kustomize-controller
    patch: |-
      - op: add
        path: /spec/template/spec/volumes/-
        value:
          name: overlay-config
          configMap:
            name: {{overlay-name}}-config
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: kustomize-controller
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/volumeMounts/-
        value:
          name: overlay-config
          mountPath: /etc/overlay-config
          readOnly: true
