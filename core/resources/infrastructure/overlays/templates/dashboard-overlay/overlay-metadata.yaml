---
name: {{overlay-name}}
version: "{{overlay-version}}"
description: "Template for creating dashboard overlays that extend the React frontend with themes, widgets, and integrations"
category: dashboard
base_path: "core/ai/runtime/dashboard"
base_version: "0.1.0"
license: "MIT"
risk_level: low
autonomy: fully_auto

maintainer:
  name: "Your Name"
  email: "your.email@example.com"
  organization: "Your Organization"
  url: "https://github.com/your-org"

tags:
  - dashboard
  - frontend
  - react
  - "{{overlay-type}}"
  - overlay

compatibility:
  min_base: "0.1.0"
  max_base: "1.0.0"
  python: ">=3.8"
  kubernetes: ">=1.20"
  node: ">=16.0.0"

dependencies:
  - name: "dashboard"
    version: ">=0.1.0"
    optional: false
  # Add additional dependencies as needed
  # - name: "@mui/material"
  #   version: ">=5.0.0"
  #   optional: false
  # - name: "recharts"
  #   version: ">=2.0.0"
  #   optional: true

environment_variables:
  - name: OVERLAY_ENABLED
    required: true
    description: "Enable overlay functionality"
    default: "true"
  - name: OVERLAY_TYPE
    required: true
    description: "Type of dashboard overlay"
    default: "{{overlay-type}}"
  - name: THEME_MODE
    required: false
    description: "Theme mode (light/dark/auto)"
    default: "auto"
  - name: DEBUG_MODE
    required: false
    description: "Enable debug mode"
    default: "false"

inputs:
  type: object
  properties:
    overlay_config:
      type: object
      description: "Overlay-specific configuration"
      properties:
        theme:
          type: object
          description: "Theme configuration"
        widgets:
          type: array
          items:
            type: object
          description: "Widget configuration"
        integrations:
          type: object
          description: "External integration configuration"
    custom_assets:
      type: object
      description: "Custom assets (CSS, JS, images)"
      properties:
        css_files:
          type: array
          items:
            type: string
        js_files:
          type: array
          items:
            type: string
        images:
          type: array
          items:
            type: string
  required:
    - overlay_config

outputs:
  type: object
  properties:
    overlay_status:
      type: string
      enum: ["active", "inactive", "error"]
      description: "Overlay status"
    applied_features:
      type: array
      items:
        type: string
      description: "List of applied overlay features"
    theme_info:
      type: object
      description: "Applied theme information"
    widget_status:
      type: array
      items:
        type: object
      description: "Status of deployed widgets"
    integration_status:
      type: object
      description: "Status of external integrations"
  required:
    - overlay_status
    - applied_features

examples:
  - name: "Apply theme overlay"
    description: "Apply a custom theme to the dashboard"
    command: "kustomize build core/deployment/overlays/core/ai/runtime/dashboard/themes/my-theme"
    expected_output: "Dashboard with custom theme applied"
  - name: "Deploy widget overlay"
    description: "Deploy custom widgets to the dashboard"
    command: "kustomize build core/deployment/overlays/core/ai/runtime/dashboard/widgets/my-widgets"
    expected_output: "Dashboard with custom widgets deployed"

resources:
  cpu: "200m"
  memory: "512Mi"
  storage: "2Gi"

human_gate:
  required: false
  description: "No human approval required for dashboard overlay operations"
