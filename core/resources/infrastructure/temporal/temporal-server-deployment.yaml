apiVersion: v1
kind: Namespace
metadata:
  name: ai-infrastructure
---
apiVersion: v1
kind: Secret
metadata:
  name: temporal-secrets
  namespace: ai-infrastructure
type: Opaque
stringData:
  DB_USERNAME: "temporal"
  DB_PASSWORD: "temporal"
  DB_NAME: "temporal"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: temporal-postgres-pvc
  namespace: ai-infrastructure
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-postgres
  namespace: ai-infrastructure
  labels:
    app: temporal-postgres
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-postgres
  template:
    metadata:
      labels:
        app: temporal-postgres
        component: database
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
        env:
        - name: POSTGRES_DB
          value: "temporal"
        - name: POSTGRES_USER
          value: "temporal"
        - name: POSTGRES_PASSWORD
          value: "temporal"
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - temporal
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - temporal
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: postgres-storage
        persistentVolumeClaim:
          claimName: temporal-postgres-pvc
      - name: temporal-config
        configMap:
          name: temporal-config
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-postgres
  namespace: ai-infrastructure
spec:
  selector:
    app: temporal-postgres
  ports:
  - port: 5432
    targetPort: 5432
    name: postgres
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-server
  namespace: ai-infrastructure
  labels:
    app: temporal-server
    component: orchestration
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-server
  template:
    metadata:
      labels:
        app: temporal-server
        component: orchestration
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z temporal-postgres 5432; do echo waiting for postgres; sleep 2; done']
      - name: setup-schema
        image: temporalio/server:1.28.3
        command:
          - /bin/bash
          - -c
          - |
            echo "Checking for temporal-sql-tool..."
            which temporal-sql-tool || echo "temporal-sql-tool not found in PATH"
            ls /usr/local/bin | grep temporal || echo "No temporal tools in /usr/local/bin"
            ls /usr/bin | grep temporal || echo "No temporal tools in /usr/bin"
            echo "Attempting schema setup..."
            temporal-sql-tool --endpoint="postgresql://temporal:temporal@temporal-postgres:5432/temporal?sslmode=disable" create-database || echo "Create database failed"
            temporal-sql-tool --endpoint="postgresql://temporal:temporal@temporal-postgres:5432/temporal?sslmode=disable" setup-schema -v 0.0 || echo "Setup schema failed"
            temporal-sql-tool --endpoint="postgresql://temporal:temporal@temporal-postgres:5432/temporal?sslmode=disable" update-schema -d /etc/temporal/schema/postgresql/v96/temporal/versioned || echo "Update schema failed"
        env:
        - name: DB
          value: "postgresql"
        - name: DB_PORT
          value: "5432"
        - name: DBNAME
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: DB_PASSWORD
        - name: POSTGRES_SEEDS
          value: "temporal-postgres"
      containers:
      - name: temporal
        image: temporalio/server:1.28.3
        ports:
        - containerPort: 7233
          name: rpc
        - containerPort: 9090
          name: metrics
        env:
        - name: DB
          value: "postgresql"
        - name: DB_PORT
          value: "5432"
        - name: DBNAME
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: DB_NAME
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: DB_USERNAME
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: DB_PASSWORD
        - name: POSTGRES_SEEDS
          value: "temporal-postgres"
        - name: LOG_LEVEL
          value: "info"
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 7233
          initialDelaySeconds: 60
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 7233
          initialDelaySeconds: 30
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend
  namespace: ai-infrastructure
spec:
  selector:
    app: temporal-server
  ports:
  - port: 7233
    targetPort: 7233
    name: rpc
  - port: 9090
    targetPort: 9090
    name: metrics
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: ai-infrastructure
  labels:
    app: temporal-ui
    component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
        component: dashboard
    spec:
      containers:
      - name: temporal-ui
        image: temporalio/ui:2.28.3
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: TEMPORAL_ADDRESS
          value: "temporal-frontend:7233"
        - name: TEMPORAL_UI_PORT
          value: "8080"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: ai-infrastructure
spec:
  selector:
    app: temporal-ui
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
