---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-workers
  namespace: ai-infrastructure
  labels:
    app: temporal-workers
    component: ai-agents
spec:
  replicas: 2
  selector:
    matchLabels:
      app: temporal-workers
  template:
    metadata:
      labels:
        app: temporal-workers
        component: ai-agents
    spec:
      containers:
      - name: temporal-worker
        image: lloydchang/temporal-workers:latest
        imagePullPolicy: IfNotPresent
        env:
        - name: TEMPORAL_HOST_PORT
          value: "temporal-server:7233"
        - name: TEMPORAL_NAMESPACE
          value: "default"
        - name: LOG_LEVEL
          value: "info"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://otel-collector:4317"
        - name: OTEL_SERVICE_NAME
          value: "temporal-workers"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: "service.name=temporal-workers,service.version=1.0.0"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "ps aux | grep '[w]orker' || exit 1"
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "ps aux | grep '[w]orker' || exit 1"
          initialDelaySeconds: 10
          periodSeconds: 10
      restartPolicy: Always
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: temporal-workers
  namespace: ai-infrastructure
  labels:
    app: temporal-workers
    component: ai-agents
spec:
  selector:
    app: temporal-workers
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: temporal-workers
  namespace: ai-infrastructure

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: temporal-workers
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: temporal-workers
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: temporal-workers
subjects:
- kind: ServiceAccount
  name: temporal-workers
  namespace: ai-infrastructure
