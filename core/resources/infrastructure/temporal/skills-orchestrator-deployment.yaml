apiVersion: apps/v1
kind: Deployment
metadata:
  name: skills-orchestrator
  namespace: ai-infrastructure
  labels:
    app: skills-orchestrator
    component: temporal-workers
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skills-orchestrator
  template:
    metadata:
      labels:
        app: skills-orchestrator
        component: temporal-workers
    spec:
      initContainers:
      - name: wait-for-temporal
        image: busybox:1.35
        command: ['sh', '-c', 'until nc -z temporal-frontend 7233; do echo waiting for temporal; sleep 2; done']
      containers:
      - name: orchestrator
        image: temporalio/admin-tools:1.22.0
        command:
        - /bin/sh
        - -c
        - |
          echo "Skills orchestrator ready - connected to Temporal at temporal-frontend:7233"
          # Keep container running
          tail -f /dev/null
        env:
        - name: TEMPORAL_ADDRESS
          value: "temporal-frontend:7233"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
