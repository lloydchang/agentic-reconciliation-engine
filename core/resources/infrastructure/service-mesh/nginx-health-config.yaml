apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-health-config
  namespace: ai-infrastructure
  labels:
    component: service-mesh
data:
  default.conf: |
    server {
        listen 8080;
        server_name localhost;
        
        # Health check endpoint
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
        
        # Readiness check endpoint  
        location /ready {
            access_log off;
            return 200 "ready\n";
            add_header Content-Type text/plain;
        }
        
        # Metrics endpoint
        location /metrics {
            access_log off;
            return 200 "# HELP service_mesh_discovery_up Service mesh discovery is up\n# TYPE service_mesh_discovery_up gauge\nservice_mesh_discovery_up 1\n";
            add_header Content-Type text/plain;
        }
        
        # Default location
        location / {
            return 200 "Service Mesh Discovery Service\n";
            add_header Content-Type text/plain;
        }
    }
