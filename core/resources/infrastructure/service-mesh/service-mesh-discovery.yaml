apiVersion: v1
kind: Service
metadata:
  name: service-mesh-discovery
  namespace: ai-infrastructure
  labels:
    app.kubernetes.io/name: service-mesh-discovery
    app.kubernetes.io/part-of: service-mesh
    component: service-mesh
spec:
  selector:
    app.kubernetes.io/part-of: agent
  ports:
  - name: http
    port: 8080
    protocol: TCP
    targetPort: 8080
  - name: discovery
    port: 8081
    protocol: TCP
    targetPort: 8081
  - name: metrics
    port: 9090
    protocol: TCP
    targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-mesh-discovery
  namespace: ai-infrastructure
  labels:
    app.kubernetes.io/name: service-mesh-discovery
    app.kubernetes.io/part-of: service-mesh
    component: service-mesh
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: service-mesh-discovery
      app.kubernetes.io/part-of: service-mesh
  template:
    metadata:
      labels:
        app.kubernetes.io/name: service-mesh-discovery
        app.kubernetes.io/part-of: service-mesh
        component: service-mesh
    spec:
      containers:
      - name: service-mesh-discovery
        image: nginx:alpine
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 8081
          name: discovery
        - containerPort: 9090
          name: metrics
        env:
        - name: SERVICE_MESH_CONFIG
          valueFrom:
            configMapKeyRef:
              name: service-mesh-config
              key: config.yaml
        - name: NAMESPACE
          value: "ai-infrastructure"
        - name: DISCOVERY_INTERVAL
          value: "30s"
        - name: HEALTH_CHECK_INTERVAL
          value: "10s"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
          readOnly: true
        - name: config
          mountPath: /etc/service-mesh
          readOnly: true
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-health-config
      - name: config
        configMap:
          name: service-mesh-config
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: service-mesh-discovery
  namespace: ai-infrastructure
  labels:
    app.kubernetes.io/name: service-mesh-discovery
    app.kubernetes.io/part-of: service-mesh
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: service-mesh-discovery
  labels:
    app.kubernetes.io/part-of: service-mesh
rules:
- apiGroups: [""]
  resources: ["services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: service-mesh-discovery
  labels:
    app.kubernetes.io/part-of: service-mesh
subjects:
- kind: ServiceAccount
  name: service-mesh-discovery
  namespace: ai-infrastructure
roleRef:
  kind: ClusterRole
  name: service-mesh-discovery
  apiGroup: rbac.authorization.k8s.io
