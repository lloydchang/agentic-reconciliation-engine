apiVersion: v1
kind: Service
metadata:
  name: ai-inference-service
  namespace: ai-infrastructure
spec:
  selector:
    component: agent-memory
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-inference-gateway
  namespace: ai-infrastructure
  labels:
    component: ai-inference-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      component: ai-inference-gateway
  template:
    metadata:
      labels:
        component: ai-inference-gateway
    spec:
      containers:
      - name: gateway
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
      volumes:
      - name: nginx-config
        configMap:
          name: ai-inference-gateway-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-inference-gateway-config
  namespace: ai-infrastructure
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }
    http {
        upstream ai_agents {
            server memory-agent-rust:8080;
            server memory-agent-go:8080;
            server memory-agent-python:8080;
        }

        server {
            listen 80;

            location /api/infer {
                proxy_pass http://ai_agents;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
            }

            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
        }
    }
