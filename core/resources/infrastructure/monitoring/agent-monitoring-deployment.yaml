apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-monitoring
  namespace: ai-infrastructure
  labels:
    app.kubernetes.io/name: agent-monitoring
    app.kubernetes.io/part-of: monitoring
    component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-monitoring
      app.kubernetes.io/part-of: monitoring
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-monitoring
        app.kubernetes.io/part-of: monitoring
        component: monitoring
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: agent-monitoring
      containers:
      - name: prometheus
        image: prom/prometheus:v2.40.0
        ports:
        - containerPort: 9090
          name: http
        env:
        - name: PROMETHEUS_CONFIG_FILE
          value: "/etc/prometheus/prometheus.yml"
        - name: PROMETHEUS_STORAGE_PATH
          value: "/prometheus"
        command:
        - /bin/prometheus
        - --config.file=/etc/prometheus/prometheus.yml
        - --storage.tsdb.path=/prometheus
        - --web.console.libraries=/etc/prometheus/console_libraries
        - --web.console.templates=/etc/prometheus/consoles
        - --storage.tsdb.retention.time=24h
        - --web.enable-lifecycle
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        volumeMounts:
        - name: config
          mountPath: /etc/prometheus
          readOnly: true
        - name: storage
          mountPath: /prometheus
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9090
          initialDelaySeconds: 30
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /-/ready
            port: 9090
          initialDelaySeconds: 10
          periodSeconds: 5
      
      - name: alertmanager
        image: prom/alertmanager:v0.25.0
        ports:
        - containerPort: 9093
          name: http
        env:
        - name: ALERTMANAGER_CONFIG_FILE
          value: "/etc/alertmanager/alertmanager.yml"
        command:
        - /bin/alertmanager
        - --config.file=/etc/alertmanager/alertmanager.yml
        - --storage.path=/alertmanager
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: alert-config
          mountPath: /etc/alertmanager
          readOnly: true
        - name: alert-storage
          mountPath: /alertmanager
        livenessProbe:
          httpGet:
            path: /-/healthy
            port: 9093
          initialDelaySeconds: 30
          periodSeconds: 15
      
      volumes:
      - name: config
        configMap:
          name: agent-monitoring-config
      - name: alert-config
        configMap:
          name: alertmanager-config
      - name: storage
        emptyDir: {}
      - name: alert-storage
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-monitoring
  namespace: ai-infrastructure
  labels:
    app.kubernetes.io/name: agent-monitoring
    app.kubernetes.io/part-of: monitoring
spec:
  selector:
    app.kubernetes.io/name: agent-monitoring
    app.kubernetes.io/part-of: monitoring
  ports:
  - name: http
    port: 9090
    protocol: TCP
    targetPort: 9090
  - name: alerts
    port: 9093
    protocol: TCP
    targetPort: 9093
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-monitoring
  namespace: ai-infrastructure
  labels:
    app.kubernetes.io/name: agent-monitoring
    app.kubernetes.io/part-of: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-monitoring
  labels:
    app.kubernetes.io/part-of: monitoring
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints", "nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["metrics.k8s.io"]
  resources: ["pods"]
  verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-monitoring
  labels:
    app.kubernetes.io/part-of: monitoring
subjects:
- kind: ServiceAccount
  name: agent-monitoring
  namespace: ai-infrastructure
roleRef:
  kind: ClusterRole
  name: agent-monitoring
  apiGroup: rbac.authorization.k8s.io
