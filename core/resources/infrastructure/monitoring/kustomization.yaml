# Monitoring Infrastructure Kustomization
# Includes all observability components for GitOps control plane

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: monitoring-infrastructure
  namespace: monitoring

resources:
  # Core monitoring components
  - flux-health.yaml
  - honeycomb.yaml
  - loki.yaml
  - promtail.yaml
  
  # eBPF observability
  - pixie.yaml

# Common labels for all monitoring resources
commonLabels:
  app.kubernetes.io/part-of: gitops-monitoring
  app.kubernetes.io/managed-by: flux

# Namespace configuration
# namespace: monitoring

# Patches for configuration
patches:
  # Configure Pixie for hub cluster deployment
  - patch: |-
      - op: replace
        path: /data/cluster-config.yaml
        value: |
          cluster_name: "gitops-hub-cluster"
          cluster_type: "K8S"
          data_collection:
            enable_http_tracing: true
            enable_mysql_profiling: true
            enable_postgres_profiling: true
            enable_redis_profiling: true
            enable_node_stats: true
            enable_process_stats: true
            http_trace_sampling_rate: 0.1
            stats_collection_interval: 30
            trace_collection_interval: 60
          resource_limits:
            vizier:
              memory_limit: "2Gi"
              cpu_limit: "1000m"
              memory_request: "1Gi"
              cpu_request: "500m"
            pem:
              memory_limit: "1Gi"
              cpu_limit: "500m"
              memory_request: "512Mi"
              cpu_request: "200m"
    target:
      kind: ConfigMap
      name: pixie-config
      namespace: pl

# Configurations for different environments
configurations:
  # Environment-specific overlays can be added here
  # - core/deployment/overlays/dev/monitoring.yaml
  # - core/deployment/overlays/prod/monitoring.yaml

# Secrets management (use SealedSecrets in production)
secretGenerator:
  - name: monitoring-secrets
    literals:
      # These should be replaced with actual secrets in production
      - HONEYCOMB_API_KEY=your-honeycomb-api-key-here

# Resource constraints for monitoring components
patchesJson6902:
  - target:
      kind: Deployment
      name: otel-collector-cluster
      namespace: honeycomb
    patch: |
      - op: add
        path: /spec/template/spec/containers/0/resources
        value:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "200m"

