---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: gitops-network
  namespace: flux-system
  annotations:
    dependsOn.fluxcd.io/order: "1"
    dependsOn.fluxcd.io/description: "Foundation VPC network for all GCP resources"
spec:
  description: "Agentic Reconciliation Engine network"
  routingMode: REGIONAL
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: gitops-subnet-1
  namespace: flux-system
  annotations:
    dependsOn.fluxcd.io/order: "2"
    dependsOn.fluxcd.io/network: "gitops-network"
    dependsOn.fluxcd.io/description: "Subnet 1 depends on network"
spec:
  region: us-central1
  ipCidrRange: "10.2.1.0/24"
  networkRef:
    name: gitops-network
  secondaryIpRange:
  - rangeName: pods
    ipCidrRange: "10.2.64.0/20"
  - rangeName: services
    ipCidrRange: "10.2.128.0/20"
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: gitops-subnet-2
  namespace: flux-system
  annotations:
    dependsOn.fluxcd.io/order: "2"
    dependsOn.fluxcd.io/network: "gitops-network"
    dependsOn.fluxcd.io/description: "Subnet 2 depends on network"
spec:
  region: us-central1
  ipCidrRange: "10.2.2.0/24"
  networkRef:
    name: gitops-network
  secondaryIpRange:
  - rangeName: pods
    ipCidrRange: "10.2.80.0/20"
  - rangeName: services
    ipCidrRange: "10.2.144.0/20"
---
apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: gke-cluster-placeholder
  namespace: flux-system
  annotations:
    dependsOn.fluxcd.io/order: "3"
    dependsOn.fluxcd.io/network: "gitops-network"
    dependsOn.fluxcd.io/subnet: "gitops-subnet-1"
    dependsOn.fluxcd.io/description: "GKE cluster depends on network and subnet"
spec:
  location: us-central1
  initialNodeCount: 1
  removeDefaultNodePool: true
  ipAllocationPolicy:
    useIpAliases: true
    clusterSecondaryRangeName: pods
    servicesSecondaryRangeName: services
  networkRef:
    name: gitops-network
  subnetworkRef:
    name: gitops-subnet-1
