apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tenant-secrets
  namespace: flux-system
  labels:
    app.kubernetes.io/name: tenant-secrets
    app.kubernetes.io/component: secrets
    gitops-infra-control-plane.io/managed-by: "flux"
spec:
  interval: 10m0s
  retryInterval: 1m0s
  timeout: 3m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./core/resources/tenants
  prune: true
  wait: true
  # SOPS decryption configuration
  decryption:
    provider: sops
    secretRef:
      name: sops-age-key
  # Post-build substitution for secret references
  postBuild:
    substitute:
      # Environment-specific substitutions (optional)
      CLUSTER_NAME: "gitops-infra-control-plane"
      NAMESPACE: "default"
    substituteFrom:
      - kind: ConfigMap
        name: cluster-config
        optional: true
