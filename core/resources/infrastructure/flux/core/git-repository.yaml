apiVersion: v1
kind: Namespace
metadata:
  name: flux-system
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/lloydchang/gitops-infra-control-plane
  ref:
    branch: main
  ignore: |
    # exclude all
    /*
    # include infrastructure directories
    !/core/resources/
    !/core/operators/
  timeout: 30s
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: GitRepository
metadata:
  name: flux-system-backup
  namespace: flux-system
spec:
  interval: 5m
  url: https://gitlab.example.com/lloydchang/gitops-infra-control-plane
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: flux-system
  namespace: flux-system
spec:
  interval: 10m
  path: ./core/resources/flux/core
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  wait: true
  timeout: 5m
