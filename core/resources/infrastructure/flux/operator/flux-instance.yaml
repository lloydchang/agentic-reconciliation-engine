apiVersion: fluxcd.controlplane.io/v1
kind: FluxInstance
metadata:
  name: flux
  namespace: flux-system
  labels:
    app.kubernetes.io/name: flux
    app.kubernetes.io/component: gitops
    app.kubernetes.io/part-of: gitops-infra-control-plane
spec:
  distribution:
    version: "2.x"
    registry: "ghcr.io/fluxcd"
    artifact: "oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests"
  components:
    - source-controller
    - source-watcher
    - kustomize-controller
    - helm-controller
    - notification-controller
    - image-reflector-controller
    - image-automation-controller
  cluster:
    type: kubernetes
    size: medium
    multitenant: true
    networkPolicy: true
    domain: "cluster.local"
  sync:
    kind: GitRepository
    url: "https://github.com/$(git config --get remote.origin.url | sed 's/.*github.com[:\/]\(.*\)\.git/\1/' | cut -d'/' -f1)/$(basename $(git rev-parse --show-toplevel))"
    ref: "refs/heads/$(git branch --show-current)"
    path: "core/resources/tenants"
    interval: "5m"
    timeout: "3m"
  security:
    rbac:
      enabled: true
      crossNamespace: true
    encryption:
      enabled: true
      provider: sops
      secretRef:
        name: sops-keys
  monitoring:
    enabled: true
    prometheus:
      enabled: true
      serviceMonitor: true
      port: 8080
    alerts:
      enabled: true
      rules:
        - name: FluxReconciliationFailure
          condition: "flux_reconciliation_failed_total > 0"
          message: "Flux reconciliation has failed"
          severity: warning
  kustomize:
    patch: |
      # Resource limits and requests
      - patch: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: source-controller
            namespace: flux-system
          spec:
            template:
              spec:
                containers:
                - name: manager
                  resources:
                    requests:
                      cpu: 100m
                      memory: 256Mi
                    limits:
                      cpu: 500m
                      memory: 512Mi
        target:
          kind: Kustomization
          name: flux-components
          namespace: flux-system
      # Add monitoring annotations
      - patch: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: kustomize-controller
            namespace: flux-system
            annotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "8080"
              prometheus.io/path: "/metrics"
        target:
          kind: Kustomization
          name: flux-components
          namespace: flux-system
      # Add custom labels for ResourceSet management
      - patch: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: helm-controller
            namespace: flux-system
            labels:
              gitops-infra-control-plane.io/managed-by: "flux-operator"
              gitops-infra-control-plane.io/tier: "control-plane"
        target:
          kind: Kustomization
          name: flux-components
          namespace: flux-system
