apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: flux-secrets
  namespace: flux-system
  labels:
    app.kubernetes.io/name: flux-secrets
    app.kubernetes.io/component: secrets
    gitops-infra-control-plane.io/managed-by: "flux"
spec:
  interval: 5m0s
  retryInterval: 30s
  timeout: 2m0s
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./core/resources/flux/secrets
  prune: true
  wait: true
  # SOPS decryption configuration
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  # Depends on core Flux components
  dependsOn:
    - name: flux-components
      namespace: flux-system
