apiVersion: apps/v1
kind: Deployment
metadata:
  name: independent-agent-demo
  namespace: ai-infrastructure
  labels:
    component: independent-agent
    phase: phase2
spec:
  replicas: 2
  selector:
    matchLabels:
      component: independent-agent
  template:
    metadata:
      labels:
        component: independent-agent
        phase: phase2
    spec:
      containers:
      - name: independent-agent
        image: nginx:alpine
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: AGENT_TYPE
          value: "independent-agent"
        - name: PHASE
          value: "2"
        - name: AUTONOMY_LEVEL
          value: "independent"
        - name: TEMPORAL_HOST
          value: "temporal-server:7233"
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: independent-agent-service
  namespace: ai-infrastructure
  labels:
    component: independent-agent
    phase: phase2
spec:
  selector:
    component: independent-agent
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
