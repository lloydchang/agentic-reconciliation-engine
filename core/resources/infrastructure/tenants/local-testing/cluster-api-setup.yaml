# Cluster API Provider Docker (CAPD) - Simulate Spoke Cluster Provisioning
# Enables recursive GitOps deployment: Hub → Spoke Clusters → Applications

## Cluster API Core Components
apiVersion: v1
kind: Namespace
metadata:
  name: capi-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: capi-webhook-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: cert-manager
---

## Cert Manager (Required by CAPI)
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m0s
  url: https://charts.jetstack.io
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 10m0s
  chart:
    spec:
      chart: cert-manager
      version: "v1.13.0"
      sourceRef:
        kind: HelmRepository
        name: cert-manager
      interval: 10m0s
  values:
    installCRDs: true

## Cluster API Core
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: cluster-api
  namespace: capi-system
spec:
  interval: 10m0s
  url: https://kubernetes-sigs.github.io/cluster-api
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cluster-api-core
  namespace: capi-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: cluster-api
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: cluster-api
      interval: 10m0s
  values:
    cluster-api:
      config: |
        ---
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: cluster-api-config
          namespace: capi-system
        data:
          config: |
            providers:
            - name: docker
              url: /v3/providers/docker/v1.5.0/core-components.yaml
              type: CoreProvider
    kubeadm-bootstrap:
      config: |
        ---
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: kubeadm-bootstrap-config
          namespace: capi-system
        data:
          config: |
            providers:
            - name: kubeadm
              url: /v3/providers/kubeadm/v1.5.0/bootstrap-components.yaml
              type: BootstrapProvider
    kubeadm-control-plane:
      config: |
        ---
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: kubeadm-control-plane-config
          namespace: capi-system
        data:
          config: |
            providers:
            - name: kubeadm
              url: /v3/providers/kubeadm/v1.5.0/control-plane-components.yaml
              type: ControlPlaneProvider

## Cluster API Provider Docker (CAPD)
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: cluster-api-provider-docker
  namespace: capi-system
spec:
  interval: 10m0s
  chart:
    spec:
      chart: cluster-api-provider-docker
      version: "1.5.0"
      sourceRef:
        kind: HelmRepository
        name: cluster-api
      interval: 10m0s
  dependsOn:
  - name: cluster-api-core

## Example Spoke Cluster (Docker-based)
apiVersion: cluster.x-k8s.io/v1beta1
kind: Cluster
metadata:
  name: workload-cluster-docker
  namespace: default
spec:
  clusterNetwork:
    pods:
      cidrBlocks: ["192.168.0.0/16"]
    serviceDomain: "cluster.local"
    services:
      cidrBlocks: ["10.128.0.0/12"]
  controlPlaneRef:
    apiVersion: controlplane.cluster.x-k8s.io/v1beta1
    kind: KubeadmControlPlane
    name: workload-cluster-control-plane
  infrastructureRef:
    apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
    kind: DockerCluster
    name: workload-cluster-docker
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: DockerCluster
metadata:
  name: workload-cluster-docker
  namespace: default
---
apiVersion: controlplane.cluster.x-k8s.io/v1beta1
kind: KubeadmControlPlane
metadata:
  name: workload-cluster-control-plane
  namespace: default
spec:
  replicas: 1
  version: "1.27.0"
  machineTemplate:
    infrastructureRef:
      apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
      kind: DockerMachineTemplate
      name: workload-cluster-control-plane
  kubeadmConfigSpec:
    clusterConfiguration:
      apiServer:
        certSANs:
        - localhost
        - 127.0.0.1
        - 0.0.0.0
      controllerManager:
        extraArgs:
          enable-hostpath-provisioner: 'true'
    initConfiguration:
      nodeRegistration:
        criSocket: unix:///var/run/containerd/containerd.sock
        kubeletExtraArgs:
          eviction-hard: nodefs.available<0%,nodefs.inodesFree<0%,imagefs.available<0%
---
apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
kind: DockerMachineTemplate
metadata:
  name: workload-cluster-control-plane
  namespace: default
spec:
  template:
    spec:
      customImage: kindest/node:v1.27.0
