# Recursive GitOps Deployment Simulation
# Demonstrates Hub Cluster → Spoke Cluster → Application deployment

## Hub Cluster Setup (Flux targeting spoke clusters)
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: workload-cluster-apps
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./core/resources/tenants/3-workloads
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  # This would target spoke cluster created by CAPI
  # In real cloud, this would be EKS/AKS/GKE endpoint
  kubeConfig:
    secretRef:
      name: workload-cluster-kubeconfig
      key: value
  dependsOn:
  - name: workload-cluster-provisioning

## Spoke Cluster Provisioning (CAPI)
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: workload-cluster-provisioning
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./core/resources/tenants/local-testing/cluster-api-setup.yaml
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

## Cloud Provider API Emulator (LocalStack extension)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-provider-api-emulator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-provider-api-emulator
  template:
    metadata:
      labels:
        app: cloud-provider-api-emulator
    spec:
      containers:
      - name: emulator
        image: python:3.11-slim
        command: ["python", "-m", "http.server", "8080"]
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: api-responses
          mountPath: /api
        # Mock responses for cluster operations
        - name: mock-responses
          mountPath: /usr/local/lib/python3.11/site-packages/http/server.py
          subPath: server.py
      volumes:
      - name: api-responses
        configMap:
          name: cloud-api-mock-responses
      - name: mock-responses
        configMap:
          name: mock-http-server
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloud-api-mock-responses
  namespace: default
data:
  # Mock EKS API responses
  eks-clusters.json: |
    {
      "clusters": [
        {
          "name": "workload-cluster",
          "status": "ACTIVE",
          "endpoint": "https://kube-apiserver-emulator:6443",
          "certificateAuthority": {
            "data": "LS0tLS1CRUdJTi..."
          }
        }
      ]
    }
  # Mock AKS API responses
  aks-managed-clusters.json: |
    {
      "value": [
        {
          "name": "workload-cluster",
          "location": "eastus",
          "provisioningState": "Succeeded",
          "kubernetesVersion": "1.27.0"
        }
      ]
    }
  # Mock GKE API responses
  gke-clusters.json: |
    {
      "clusters": [
        {
          "name": "workload-cluster",
          "status": "RUNNING",
          "endpoint": "https://kube-apiserver-emulator:6443",
          "masterAuth": {
            "clusterCaCertificate": "LS0tLS1CRUdJTi..."
          }
        }
      ]
    }
