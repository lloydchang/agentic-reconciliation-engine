# AWS ACK Local Testing Configuration
# Modify core/operators/controllers/ack/kustomization.yaml to include this

apiVersion: v1
kind: ConfigMap
metadata:
  name: ack-controller-config
  namespace: ack-system
data:
  # Point ACK controllers to LocalStack instead of real AWS
  AWS_ENDPOINT_URL: "http://localstack.localstack.svc.cluster.local:4566"
  AWS_REGION: "us-east-1"
  ACK_ENABLE_DEVELOPMENT_LOGGING: "true"
  ACK_WATCH_NAMESPACE: ""
  ACK_RESOURCE_TAGS: "agentic-reconciliation-engine/operators/test=true"
