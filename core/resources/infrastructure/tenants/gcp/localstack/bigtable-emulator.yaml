# GCP Local Testing Setup
# GCP has limited local emulation. Use Bigtable emulator as example

apiVersion: apps/v1
kind: Deployment
metadata:
  name: bigtable-emulator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bigtable-emulator
  template:
    metadata:
      labels:
        app: bigtable-emulator
    spec:
      containers:
      - name: bigtable
        image: google/cloud-sdk:latest
        command: ["gcloud", "beta", "emulators", "bigtable", "start", "--host-port=0.0.0.0:8086"]
        ports:
        - containerPort: 8086
        env:
        - name: BIGTABLE_EMULATOR_HOST
          value: "localhost:8086"
---
apiVersion: v1
kind: Service
metadata:
  name: bigtable-emulator
  namespace: default
spec:
  selector:
    app: bigtable-emulator
  ports:
  - port: 8086
    targetPort: 8086
  type: ClusterIP
