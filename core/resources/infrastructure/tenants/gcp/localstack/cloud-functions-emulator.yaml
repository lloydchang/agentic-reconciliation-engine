# GCP Cloud Functions Emulator
# Local development and testing of Google Cloud Functions

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-functions-emulator
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloud-functions-emulator
  template:
    metadata:
      labels:
        app: cloud-functions-emulator
    spec:
      containers:
      - name: functions
        image: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
        ports:
        - containerPort: 8000
        env:
        - name: FUNCTIONS_EMULATOR_HOST
          value: "localhost:8000"
        command: ["functions-emulator", "start", "--host", "0.0.0.0", "--port", "8000"]
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-functions-emulator
  namespace: default
spec:
  selector:
    app: cloud-functions-emulator
  ports:
  - port: 8000
    targetPort: 8000
  type: ClusterIP
