# GKE Emulator using Minikube with GCP Auth
# Simulates Google Kubernetes Engine locally

apiVersion: v1
kind: Namespace
metadata:
  name: gke-emulator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gke-emulator
  namespace: gke-emulator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gke-emulator
  template:
    metadata:
      labels:
        app: gke-emulator
    spec:
      containers:
      - name: gke-api-server
        image: gcr.io/google-containers/kube-apiserver:v1.28.0
        command:
        - kube-apiserver
        - --advertise-address=0.0.0.0
        - --allow-privileged=true
        - --authorization-mode=Node,RBAC
        - --client-ca-file=/etc/kubernetes/pki/ca.crt
        - --enable-admission-plugins=NamespaceLifecycle,LimitRanger,ServiceAccount,DefaultStorageClass,DefaultTolerationSeconds,NodeRestriction,MutatingAdmissionWebhook,ValidatingAdmissionWebhook,ResourceQuota
        - --enable-bootstrap-token-auth=true
        - --etcd-cafile=/etc/kubernetes/pki/etcd/ca.crt
        - --etcd-certfile=/etc/kubernetes/pki/etcd/server.crt
        - --etcd-keyfile=/etc/kubernetes/pki/etcd/server.key
        - --etcd-servers=https://127.0.0.1:2379
        - --kubelet-client-certificate=/etc/kubernetes/pki/apiserver-kubelet-client.crt
        - --kubelet-client-key=/etc/kubernetes/pki/apiserver-kubelet-client.key
        - --kubelet-preferred-address-types=InternalIP,ExternalIP,Hostname
        - --proxy-client-cert-file=/etc/kubernetes/pki/front-proxy-client.crt
        - --proxy-client-key-file=/etc/kubernetes/pki/front-proxy-client.key
        - --requestheader-allowed-names=front-proxy-client
        - --requestheader-client-ca-file=/etc/kubernetes/pki/front-proxy-ca.crt
        - --requestheader-extra-headers-prefix=X-Remote-Extra-
        - --requestheader-group-headers=X-Remote-Group
        - --requestheader-username-headers=X-Remote-User
        - --secure-port=6443
        - --service-account-issuer=https://kubernetes.default.svc.cluster.local
        - --service-account-key-file=/etc/kubernetes/pki/sa.key
        - --service-account-signing-key-file=/etc/kubernetes/pki/sa.key
        - --service-cluster-ip-range=10.96.0.0/12
        - --tls-cert-file=/etc/kubernetes/pki/apiserver.crt
        - --tls-private-key-file=/etc/kubernetes/pki/apiserver.key
        ports:
        - containerPort: 6443
        volumeMounts:
        - mountPath: /etc/kubernetes/pki
          name: k8s-certs
          readOnly: true
      volumes:
      - name: k8s-certs
        secret:
          secretName: gke-certs
---
apiVersion: v1
kind: Service
metadata:
  name: gke-api-server
  namespace: gke-emulator
spec:
  selector:
    app: gke-emulator
  ports:
  - port: 6443
    targetPort: 6443
  type: LoadBalancer
---
# Simulated GKE Cluster CRD
apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: local-gke-cluster
  namespace: gke-emulator
spec:
  location: us-central1
  initialNodeCount: 3
  nodeConfig:
    machineType: n1-standard-1
    diskSizeGb: 100
    oauthScopes:
    - https://www.googleapis.com/auth/devstorage.read_only
    - https://www.googleapis.com/auth/logging.write
    - https://www.googleapis.com/auth/monitoring
  network: default
  subnetwork: default
