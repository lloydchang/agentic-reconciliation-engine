# WireGuard VPN Emulator
# Simulates WireGuard VPN tunnels in Kubernetes

apiVersion: v1
kind: Namespace
metadata:
  name: wireguard
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wireguard-server
  namespace: wireguard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wireguard-server
  template:
    metadata:
      labels:
        app: wireguard-server
    spec:
      containers:
      - name: wireguard
        image: linuxserver/wireguard:latest
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Etc/UTC"
        - name: SERVERURL
          value: "wireguard-emulator.local"
        - name: SERVERPORT
          value: "51820"
        - name: PEERS
          value: "1"
        - name: PEERDNS
          value: "auto"
        - name: INTERNAL_SUBNET
          value: "10.13.13.0"
        ports:
        - containerPort: 51820
          protocol: UDP
        volumeMounts:
        - name: config
          mountPath: /config
        - name: lib-modules
          mountPath: /lib/modules
        securityContext:
          capabilities:
            add: ["NET_ADMIN", "SYS_MODULE"]
          privileged: true
      volumes:
      - name: config
        emptyDir: {}
      - name: lib-modules
        hostPath:
          path: /lib/modules
---
apiVersion: v1
kind: Service
metadata:
  name: wireguard-server
  namespace: wireguard
spec:
  selector:
    app: wireguard-server
  ports:
  - port: 51820
    targetPort: 51820
    protocol: UDP
  type: LoadBalancer
