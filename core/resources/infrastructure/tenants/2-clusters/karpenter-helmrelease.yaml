---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: karpenter
  namespace: karpenter
  labels:
    app.kubernetes.io/name: karpenter
    app.kubernetes.io/component: core
    app.kubernetes.io/part-of: agentic-reconciliation-engine
spec:
  interval: 10m
  chart:
    spec:
      chart: karpenter
      version: "v1.0.0"
      sourceRef:
        kind: HelmRepository
        name: karpenter
        namespace: flux-system
  values:
    serviceAccount:
      name: karpenter
      annotations:
        iam.amazonaws.com/role: "KarpenterControllerRole-${CLUSTER_NAME}"
    settings:
      aws:
        clusterName: "${CLUSTER_NAME}"
        clusterEndpoint: "${CLUSTER_ENDPOINT}"
        defaultInstanceProfile: "KarpenterNodeInstanceProfile-${CLUSTER_NAME}"
      interruptionQueue: "Karpenter-${CLUSTER_NAME}"
    controller:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
    replicas: 1
  dependsOn:
  - name: flux-system
    namespace: flux-system
