# Template for creating Grafana credentials secret
# Use this template to create the actual secret, then seal it with kubeseal

apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: monitoring
type: Opaque
stringData:
  # Generate secure passwords for production use
  GF_SECURITY_ADMIN_USER: "admin"
  GF_SECURITY_ADMIN_PASSWORD: "CHANGE_ME_GENERATE_SECURE_PASSWORD"
  GF_SECURITY_SECRET_KEY: "CHANGE_ME_GENERATE_32_CHAR_KEY"
  GF_DATABASE_PASSWORD: "CHANGE_ME_GENERATE_DB_PASSWORD"
  GF_SMTP_PASSWORD: "CHANGE_ME_GENERATE_SMTP_PASSWORD"

---
# Instructions for creating the sealed secret:
# 1. Update the values above with secure passwords
# 2. Run: kubectl apply -f grafana-secret-template.yaml
# 3. Run: kubectl get secret grafana-credentials -n monitoring -o yaml | kubeseal --format yaml > grafana-secrets.yaml
# 4. Remove the template file and commit the sealed secret
