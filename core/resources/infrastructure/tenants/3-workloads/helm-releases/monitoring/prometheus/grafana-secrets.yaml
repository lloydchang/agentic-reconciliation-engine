apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: grafana-credentials
  namespace: monitoring
spec:
  encryptedData:
    GF_SECURITY_ADMIN_USER: <encrypted-admin-user>
    GF_SECURITY_ADMIN_PASSWORD: <encrypted-admin-password>
    GF_SECURITY_SECRET_KEY: <encrypted-secret-key>
    GF_DATABASE_PASSWORD: <encrypted-database-password>
    GF_SMTP_PASSWORD: <encrypted-smtp-password>
  template:
    metadata:
      name: grafana-credentials
      namespace: monitoring
    type: Opaque
