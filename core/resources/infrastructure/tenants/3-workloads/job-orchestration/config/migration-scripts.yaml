# Migration Scripts ConfigMap
# Contains database migration scripts and utilities

apiVersion: v1
kind: ConfigMap
metadata:
  name: migration-scripts
  namespace: default
  labels:
    component: job-orchestration
    managed-by: flux
data:
  # Main migration script
  migrate.sh: |
    #!/bin/bash
    set -e
    
    echo "🔄 Starting database migration..."
    
    # Check database connection
    echo "📊 Checking database connection..."
    psql "$DATABASE_URL" -c "SELECT 1;" || exit 1
    
    # Run migrations
    echo "🔄 Running schema migrations..."
    for migration in /core/core/automation/ci-cd/scripts/migrations/*.sql; do
      echo "📝 Applying migration: $(basename $migration)"
      psql "$DATABASE_URL" -f "$migration"
    done
    
    # Update migration version
    echo "📊 Updating migration version..."
    psql "$DATABASE_URL" -c "INSERT INTO schema_migrations (version, applied_at) VALUES ('$MIGRATION_VERSION', NOW());"
    
    echo "✅ Migration completed successfully!"
  
  # Migration templates
  create_users_table.sql: |
    -- Create users table
    CREATE TABLE IF NOT EXISTS users (
      id SERIAL PRIMARY KEY,
      username VARCHAR(50) UNIQUE NOT NULL,
      email VARCHAR(100) UNIQUE NOT NULL,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Create indexes
    CREATE INDEX IF NOT EXISTS idx_users_username ON users(username);
    CREATE INDEX IF NOT EXISTS idx_users_email ON users(email);
    CREATE INDEX IF NOT EXISTS idx_users_created_at ON users(created_at);
  
  create_applications_table.sql: |
    -- Create applications table
    CREATE TABLE IF NOT EXISTS applications (
      id SERIAL PRIMARY KEY,
      name VARCHAR(100) NOT NULL,
      version VARCHAR(20) NOT NULL,
      status VARCHAR(20) DEFAULT 'active',
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      updated_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );
    
    -- Create indexes
    CREATE INDEX IF NOT EXISTS idx_applications_name ON applications(name);
    CREATE INDEX IF NOT EXISTS idx_applications_status ON applications(status);
    CREATE INDEX IF NOT EXISTS idx_applications_created_at ON applications(created_at);
  
  create_jobs_table.sql: |
    -- Create jobs tracking table
    CREATE TABLE IF NOT EXISTS job_executions (
      id SERIAL PRIMARY KEY,
      job_name VARCHAR(100) NOT NULL,
      phase VARCHAR(20) NOT NULL,
      status VARCHAR(20) NOT NULL,
      started_at TIMESTAMP,
      completed_at TIMESTAMP,
      error_message TEXT,
      metadata JSONB
    );
    
    -- Create indexes
    CREATE INDEX IF NOT EXISTS idx_job_executions_name ON job_executions(job_name);
    CREATE INDEX IF NOT EXISTS idx_job_executions_phase ON job_executions(phase);
    CREATE INDEX IF NOT EXISTS idx_job_executions_status ON job_executions(status);
    CREATE INDEX IF NOT EXISTS idx_job_executions_started_at ON job_executions(started_at);
  
  # Utility scripts
  check_database.sh: |
    #!/bin/bash
    echo "🔍 Checking database health..."
    
    # Check connection
    if ! psql "$DATABASE_URL" -c "SELECT 1;" > /dev/null 2>&1; then
      echo "❌ Database connection failed"
      exit 1
    fi
    
    # Check tables
    TABLES=$(psql "$DATABASE_URL" -t -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public';")
    echo "📊 Found tables: $TABLES"
    
    # Check migrations
    if psql "$DATABASE_URL" -c "SELECT table_name FROM information_schema.tables WHERE table_name = 'schema_migrations';" > /dev/null 2>&1; then
      echo "✅ Migration tracking table exists"
      MIGRATIONS=$(psql "$DATABASE_URL" -t -c "SELECT version FROM schema_migrations ORDER BY applied_at DESC LIMIT 5;")
      echo "📊 Recent migrations: $MIGRATIONS"
    else
      echo "⚠️ Migration tracking table not found"
    fi
    
    echo "✅ Database health check completed"
  
  rollback.sh: |
    #!/bin/bash
    set -e
    
    echo "🔄 Starting rollback..."
    
    # Get current migration version
    CURRENT_VERSION=$(psql "$DATABASE_URL" -t -c "SELECT version FROM schema_migrations ORDER BY applied_at DESC LIMIT 1;")
    echo "📊 Current version: $CURRENT_VERSION"
    
    # Rollback logic here
    echo "🔄 Rolling back to previous version..."
    
    echo "✅ Rollback completed"
  
  # Health check script
  health_check.sh: |
    #!/bin/bash
    echo "🏥 Running comprehensive health check..."
    
    # Database health
    echo "📊 Database health:"
    /core/core/automation/ci-cd/scripts/check_database.sh
    
    # Application health
    echo "🔄 Application health:"
    if curl -f http://sample-app-service:8080/health > /dev/null 2>&1; then
      echo "✅ Application endpoint healthy"
    else
      echo "❌ Application endpoint unhealthy"
      exit 1
    fi
    
    # Cache health
    echo "🗄️ Cache health:"
    if redis-cli -h redis-service -p 6379 ping > /dev/null 2>&1; then
      echo "✅ Redis cache healthy"
    else
      echo "❌ Redis cache unhealthy"
      exit 1
    fi
    
    if redis-cli -h valkey-service -p 6379 ping > /dev/null 2>&1; then
      echo "✅ Valkey cache healthy"
    else
      echo "❌ Valkey cache unhealthy"
      exit 1
    fi
    
    echo "✅ Comprehensive health check completed"
