apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: karpenter-workloads
resources:
  - aws-nodepool.yaml
  - azure-nodepool.yaml
  - gcp-nodepool.yaml
dependsOn:
  - name: aws-clusters
    namespace: flux-system
  - name: azure-clusters
    namespace: flux-system
  - name: gcp-clusters
    namespace: flux-system
