apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: azure-default
spec:
  template:
    spec:
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.azure.com/instance-category
          operator: In
          values: ["Standard_D", "Standard_E"]
      nodeClassRef:
        name: azure-default
      expireAfter: 720h
  limits:
    cpu: 1000
  disruption:
    consolidationPolicy: WhenUnderutilized
    expireAfter: 720h
---
apiVersion: karpenter.azure.com/v1beta1
kind: AKSNodeClass
metadata:
  name: azure-default
spec:
  imageFamily: Ubuntu2204
