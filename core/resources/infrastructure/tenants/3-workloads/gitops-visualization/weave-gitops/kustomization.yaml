# Weave GitOps - GitOps Dashboard for Flux
apiVersion: v1
kind: Namespace
metadata:
  name: gitops-visualization
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: weave-gitops
  namespace: gitops-visualization
spec:
  interval: 10m0s
  url: https://helm.gitops.weave.works
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: gitops-visualization
spec:
  interval: 10m0s
  chart:
    spec:
      chart: weave-gitops
      version: "4.0.1"
      sourceRef:
        kind: HelmRepository
        name: weave-gitops
      interval: 10m0s
  values:
    adminUser:
      create: true
      username: admin
      passwordHash: "$2a$10$abcdefghijklmnopqrstuvwx"  # Change this
    ingress:
      enabled: true
      className: nginx
      hosts:
      - host: gitops.local
        paths:
        - path: /
          pathType: Prefix
