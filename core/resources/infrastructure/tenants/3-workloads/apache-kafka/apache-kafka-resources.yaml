apiVersion: v1
kind: Namespace
metadata:
  name: data-streaming
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-broker
  namespace: data-streaming
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka-broker
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - sleep 3600
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "20m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: data-streaming
spec:
  selector:
    app: kafka
  ports:
    - port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: data-streaming
  labels:
    app: kafka-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - sleep 3600
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "20m"
              memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: data-streaming
spec:
  selector:
    app: kafka-ui
  ports:
    - port: 8080
      targetPort: 8080
