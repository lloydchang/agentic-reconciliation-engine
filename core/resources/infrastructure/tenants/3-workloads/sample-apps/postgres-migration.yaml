apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-changelog
  namespace: default
data:
  changelog.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <databaseChangeLog
        xmlns="http://www.liquibase.org/xml/ns/dbchangelog"
        xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
        xsi:schemaLocation="http://www.liquibase.org/xml/ns/dbchangelog
            http://www.liquibase.org/xml/ns/dbchangelog/dbchangelog-3.8.xsd">

        <changeSet id="1" author="gitops">
            <createTable tableName="products">
                <column name="id" type="serial" autoIncrement="true">
                    <constraints primaryKey="true" nullable="false"/>
                </column>
                <column name="name" type="varchar(100)">
                    <constraints nullable="false"/>
                </column>
                <column name="price" type="decimal(10,2)">
                    <constraints nullable="false"/>
                </column>
                <column name="created_at" type="timestamp" defaultValueComputed="CURRENT_TIMESTAMP">
                    <constraints nullable="false"/>
                </column>
            </createTable>
        </changeSet>

    </databaseChangeLog>
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-liquibase-migration
  namespace: default
spec:
  template:
    spec:
      containers:
      - name: liquibase
        image: liquibase/liquibase:4.20
        command: ["liquibase", "update", "--changelog-file=/changelog/changelog.xml", "--url=jdbc:postgresql://postgres-sample:5432/sampledb", "--username=user", "--password=password"]
        env:
        - name: LIQUIBASE_COMMAND_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_USER
        - name: LIQUIBASE_COMMAND_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
        volumeMounts:
        - name: changelog
          mountPath: /changelog
      volumes:
      - name: changelog
        configMap:
          name: postgres-changelog
      restartPolicy: OnFailure
