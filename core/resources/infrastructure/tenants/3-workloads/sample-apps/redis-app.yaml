apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-sample
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis-sample
  template:
    metadata:
      labels:
        app: redis-sample
    spec:
      containers:
      - name: redis
        image: redis:7.0
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "16Mi"
            cpu: "25m"
          limits:
            memory: "32Mi"
            cpu: "50m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis-sample
  namespace: default
spec:
  selector:
    app: redis-sample
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP
