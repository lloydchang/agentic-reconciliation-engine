apiVersion: v1
kind: Namespace
metadata:
  name: velero
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: vmware-tanzu
  namespace: velero
spec:
  interval: 10m0s
  url: https://vmware-tanzu.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: velero
  namespace: velero
spec:
  interval: 10m0s
  chart:
    spec:
      chart: velero
      version: "5.4.1"
      sourceRef:
        kind: HelmRepository
        name: vmware-tanzu
      interval: 10m0s
  values:
    configuration:
      provider: aws  # or azure, gcp
      backupStorageLocation:
        name: default
        bucket: your-velero-backup-bucket
        config:
          region: us-west-2
      volumeSnapshotLocation:
        name: default
        config:
          region: us-west-2
    credentials:
      useSecret: true
      secretContents:
        cloud: |
          [default]
          aws_access_key_id=your-access-key
          aws_secret_access_key=your-secret-key
    deployRestic: true
    restic:
      privileged: true
    schedules:
      daily-backup:
        schedule: "0 1 * * *"
        template:
          includedNamespaces:
          - "*"
          ttl: 720h0m0s
