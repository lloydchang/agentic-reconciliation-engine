# Ollama Deployment with Qwen Model
# This deploys Ollama with Qwen2.5:7b model for local LLM inference

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: argo-events
  labels:
    app: ollama
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: llm-server
    app.kubernetes.io/model: qwen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
        app.kubernetes.io/name: ollama
        app.kubernetes.io/component: llm-server
        app.kubernetes.io/model: qwen
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
          name: http
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0"
        - name: OLLAMA_ORIGINS
          value: "*"
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "8Gi"
        volumeMounts:
        - name: ollama-storage
          mountPath: /root/.ollama
        livenessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/tags
            port: 11434
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                echo "Starting Ollama server..."
                echo "Waiting for server to be ready..."
                sleep 30
                
                echo "Pulling Qwen2.5:7b model..."
                ollama pull qwen2.5:7b
                
                echo "Verifying model is available..."
                ollama list
                
                echo "Testing model with simple prompt..."
                echo "Hello, how are you?" | ollama run qwen2.5:7b || echo "Model test completed"
                
                echo "Ollama setup completed successfully!"
      volumes:
      - name: ollama-storage
        persistentVolumeClaim:
          claimName: ollama-pvc
      nodeSelector:
        kubernetes.io/arch: amd64
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: argo-events
  labels:
    app: ollama
    app.kubernetes.io/name: ollama
    app.kubernetes.io/component: llm-server
spec:
  selector:
    app: ollama
  ports:
  - name: http
    port: 11434
    targetPort: 11434
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-pvc
  namespace: argo-events
  labels:
    app: ollama
    app.kubernetes.io/name: ollama
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: fast-ssd
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ollama-scripts
  namespace: argo-events
  labels:
    app: ollama
    app.kubernetes.io/name: ollama
data:
  setup-model.sh: |
    #!/bin/bash
    set -e
    
    echo "Setting up Qwen model in Ollama..."
    
    # Wait for Ollama to be ready
    while ! curl -f http://localhost:11434/api/tags > /dev/null 2>&1; do
      echo "Waiting for Ollama to start..."
      sleep 5
    done
    
    echo "Ollama is ready. Checking available models..."
    curl -f http://localhost:11434/api/tags
    
    echo "Pulling Qwen2.5:7b model..."
    ollama pull qwen2.5:7b
    
    echo "Verifying model installation..."
    ollama list
    
    echo "Testing model with Argo Events analysis prompt..."
    echo "Analyze this Argo Events configuration for potential issues: EventSource: webhook, Sensor: webhook-sensor" | ollama run qwen2.5:7b
    
    echo "Qwen model setup completed!"
  
  model-info.json: |
    {
      "name": "qwen2.5:7b",
      "description": "Qwen 2.5 7B parameter model for Kubernetes analysis",
      "size": "~4.7GB",
      "context_length": 32768,
      "capabilities": [
        "text-generation",
        "analysis",
        "troubleshooting",
        "code-generation"
      ],
      "use_cases": [
        "Kubernetes resource analysis",
        "Argo Events troubleshooting",
        "Configuration review",
        "Performance optimization",
        "Security assessment"
      ],
      "parameters": {
        "temperature": 0.7,
        "top_p": 0.9,
        "max_tokens": 1000
      }
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-setup
  namespace: argo-events
  labels:
    app: ollama
    app.kubernetes.io/name: ollama
    job-type: setup
spec:
  template:
    metadata:
      labels:
        app: ollama
        job-type: setup
    spec:
      restartPolicy: OnFailure
      containers:
      - name: setup
        image: ollama/ollama:latest
        command:
        - /bin/sh
        - -c
        - |
          echo "Starting Ollama setup job..."
          
          # Wait for main Ollama service
          while ! nc -z ollama.argo-events.svc.cluster.local 11434; do
            echo "Waiting for Ollama service..."
            sleep 10
          done
          
          echo "Setting up Qwen model..."
          ollama pull qwen2.5:7b
          
          echo "Verifying model..."
          ollama list
          
          # Test with Argo Events specific prompt
          echo "Testing model with Argo Events analysis..."
          echo "What are common issues with Argo Events webhook configurations?" | ollama run qwen2.5:7b
          
          echo "Setup completed successfully!"
        env:
        - name: OLLAMA_HOST
          value: "http://ollama.argo-events.svc.cluster.local:11434"
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
