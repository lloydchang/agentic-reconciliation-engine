# RBAC Configuration for Secret Management
# These roles and bindings provide least-privilege access to secrets

---
# ServiceAccount for secret management operations
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-manager
  namespace: monitoring
---
# Role for secret management in monitoring namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-manager-role
  namespace: monitoring
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["bitnami.com"]
  resources: ["sealedsecrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch"]
---
# RoleBinding for secret manager
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-manager-binding
  namespace: monitoring
subjects:
- kind: ServiceAccount
  name: secret-manager
  namespace: monitoring
roleRef:
  kind: Role
  name: secret-manager-role
  apiGroup: rbac.authorization.k8s.io
---
# ServiceAccount for monitoring components
apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-operator
  namespace: monitoring
---
# Role for monitoring components (read-only access to secrets they need)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: monitoring-operator-role
  namespace: monitoring
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
  resourceNames: ["grafana-credentials", "prometheus-secrets", "alertmanager-secrets"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["monitoring.coreos.com"]
  resources: ["*"]
  verbs: ["*"]
---
# RoleBinding for monitoring operator
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-operator-binding
  namespace: monitoring
subjects:
- kind: ServiceAccount
  name: monitoring-operator
  namespace: monitoring
roleRef:
  kind: Role
  name: monitoring-operator-role
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for secret audit operations (read-only across namespaces)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: secret-auditor
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["bitnami.com"]
  resources: ["sealedsecrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["get", "list", "watch"]
---
# ServiceAccount for secret auditor
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-auditor
  namespace: monitoring
---
# ClusterRoleBinding for secret auditor
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: secret-auditor-binding
subjects:
- kind: ServiceAccount
  name: secret-auditor
  namespace: monitoring
roleRef:
  kind: ClusterRole
  name: secret-auditor
  apiGroup: rbac.authorization.k8s.io
---
# Role for Grafana (minimal secret access)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-secret-role
  namespace: monitoring
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["grafana-credentials"]
---
# RoleBinding for Grafana
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-secret-binding
  namespace: monitoring
subjects:
- kind: ServiceAccount
  name: grafana
  namespace: monitoring
roleRef:
  kind: Role
  name: grafana-secret-role
  apiGroup: rbac.authorization.k8s.io
---
# Role for Prometheus (minimal secret access)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-secret-role
  namespace: monitoring
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["prometheus-secrets", "alertmanager-secrets"]
---
# RoleBinding for Prometheus
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-secret-binding
  namespace: monitoring
subjects:
- kind: ServiceAccount
  name: prometheus
  namespace: monitoring
roleRef:
  kind: Role
  name: prometheus-secret-role
  apiGroup: rbac.authorization.k8s.io
---
# Role for AlertManager (minimal secret access)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: alertmanager-secret-role
  namespace: monitoring
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get"]
  resourceNames: ["alertmanager-secrets"]
---
# RoleBinding for AlertManager
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alertmanager-secret-binding
  namespace: monitoring
subjects:
- kind: ServiceAccount
  name: alertmanager
  namespace: monitoring
roleRef:
  kind: Role
  name: alertmanager-secret-role
  apiGroup: rbac.authorization.k8s.io
---
# ClusterRole for Flux CD (GitOps operator)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flux-secret-manager
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["bitnami.com"]
  resources: ["sealedsecrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["helm.toolkit.fluxcd.io"]
  resources: ["helmreleases"]
  verbs: ["*"]
- apiGroups: ["kustomize.toolkit.fluxcd.io"]
  resources: ["kustomizations"]
  verbs: ["*"]
---
# ServiceAccount for Flux
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kustomize-controller
  namespace: flux-system
---
# ServiceAccount for Helm controller
apiVersion: v1
kind: ServiceAccount
metadata:
  name: helm-controller
  namespace: flux-system
---
# ClusterRoleBinding for Flux controllers
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flux-secret-manager-binding
subjects:
- kind: ServiceAccount
  name: kustomize-controller
  namespace: flux-system
- kind: ServiceAccount
  name: helm-controller
  namespace: flux-system
roleRef:
  kind: ClusterRole
  name: flux-secret-manager
  apiGroup: rbac.authorization.k8s.io
---
# Role for human operators (restricted secret access)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: human-operator-role
  namespace: monitoring
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["bitnami.com"]
  resources: ["sealedsecrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
---
# RoleBindings for human operators (example - update with actual users)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: devops-operator-binding
  namespace: monitoring
subjects:
- kind: User
  name: "devops@company.com"
  apiGroup: rbac.authorization.k8s.io
- kind: User
  name: "security@company.com"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: human-operator-role
  apiGroup: rbac.authorization.k8s.io
---
# Secret access monitoring Role
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: secret-access-monitor
  namespace: monitoring
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["authorization.k8s.io"]
  resources: ["selfsubjectaccessreviews"]
  verbs: ["create"]
---
# ServiceAccount for secret access monitoring
apiVersion: v1
kind: ServiceAccount
metadata:
  name: secret-monitor
  namespace: monitoring
---
# RoleBinding for secret access monitor
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: secret-monitor-binding
  namespace: monitoring
subjects:
- kind: ServiceAccount
  name: secret-monitor
  namespace: monitoring
roleRef:
  kind: Role
  name: secret-access-monitor
  apiGroup: rbac.authorization.k8s.io
