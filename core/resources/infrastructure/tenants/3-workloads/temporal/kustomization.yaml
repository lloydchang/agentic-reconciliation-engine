apiVersion: v1
kind: Namespace
metadata:
  name: temporal
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: temporal
  namespace: temporal
spec:
  interval: 10m0s
  url: https://temporalio.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: temporal
  namespace: temporal
spec:
  interval: 10m0s
  chart:
    spec:
      chart: temporal
      version: "0.29.0"
      sourceRef:
        kind: HelmRepository
        name: temporal
      interval: 10m0s
  values:
    server:
      enabled: true
      frontend:
        service:
          type: LoadBalancer
      matching:
        service:
          type: ClusterIP
      history:
        service:
          type: ClusterIP
      worker:
        service:
          type: ClusterIP
