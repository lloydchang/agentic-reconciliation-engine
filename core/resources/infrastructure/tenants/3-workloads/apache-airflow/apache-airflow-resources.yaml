apiVersion: v1
kind: Namespace
metadata:
  name: workflow-orchestration
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: workflow-orchestration
  labels:
    app: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      containers:
        - name: airflow-webserver
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - sleep 3600
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "20m"
              memory: "64Mi"
