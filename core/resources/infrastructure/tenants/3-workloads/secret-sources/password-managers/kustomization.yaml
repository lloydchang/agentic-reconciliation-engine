          mountPath: /certs
        - name: output
          mountPath: /output
        env:
        - name: LPASS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lastpass-credentials
              key: password
      volumes:
      - name: certs
        secret:
          secretName: sealed-secrets-cert
