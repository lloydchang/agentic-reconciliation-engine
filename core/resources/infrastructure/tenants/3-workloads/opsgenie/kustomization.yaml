apiVersion: v1
kind: Namespace
metadata:
  name: incident-response
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: HelmRepository
metadata:
  name: opsgenie
  namespace: incident-response
spec:
  interval: 10m0s
  url: https://opsgenie.github.io/helm-charts
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: opsgenie-integration
  namespace: incident-response
spec:
  interval: 10m0s
  chart:
    spec:
      chart: opsgenie-kubernetes
      version: "1.0.0"
      sourceRef:
        kind: HelmRepository
        name: opsgenie
      interval: 10m0s
  values:
    opsgenie:
      apiKey: "your-opsgenie-api-key"
    alertmanager:
      enabled: true
    service:
      type: ClusterIP
---
# Opsgenie Heartbeat for monitoring
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opsgenie-heartbeat
  namespace: incident-response
spec:
  replicas: 1
  selector:
    matchLabels:
      app: opsgenie-heartbeat
  template:
    metadata:
      labels:
        app: opsgenie-heartbeat
    spec:
      containers:
      - name: heartbeat
        image: curlimages/curl:latest
        command: ["sh", "-c", "while true; do curl -X POST https://api.opsgenie.com/v2/heartbeats/kubernetes-heartbeat/ping -H 'Authorization: GenieKey YOUR_API_KEY'; sleep 300; done"]
        env:
        - name: OPSGENIE_API_KEY
          valueFrom:
            secretKeyRef:
              name: opsgenie-credentials
              key: api-key
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
