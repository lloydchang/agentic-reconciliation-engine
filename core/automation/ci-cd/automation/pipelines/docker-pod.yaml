apiVersion: v1
kind: Pod
metadata:
  name: jenkins-docker-build-pod
  labels:
    app: jenkins-docker
spec:
  securityContext:
    runAsUser: 0
    fsGroup: 0
  containers:
  - name: docker
    image: docker:24.0.6-dind
    securityContext:
      privileged: true
    env:
    - name: DOCKER_HOST
      value: unix:///var/run/docker.sock
    - name: DOCKER_TLS_CERTDIR
      value: ""
    volumeMounts:
    - name: docker-socket
      mountPath: /var/run/docker.sock
    - name: docker-lib
      mountPath: /var/lib/docker
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "4Gi"
        cpu: "2000m"
    command:
    - dockerd-entrypoint.sh
    - --storage-driver=overlay2
    - --log-driver=json-file
    - --log-opt=max-size=10m
    - --log-opt=max-file=3
  - name: jnlp
    image: jenkins/inbound-agent:3206.vb_15dcf73f6a_9-1
    workingDir: /home/jenkins/agent
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
    env:
    - name: JENKINS_URL
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: jenkins-url
          optional: true
    - name: JENKINS_AGENT_NAME
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: agent-name
          optional: true
    - name: JENKINS_SECRET
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: agent-secret
          optional: true
    volumeMounts:
    - name: workspace-volume
      mountPath: /home/jenkins/agent
    - name: docker-socket
      mountPath: /var/run/docker.sock
      readOnly: true
    resources:
      requests:
        memory: "512Mi"
        cpu: "200m"
      limits:
        memory: "1Gi"
        cpu: "500m"
  volumes:
  - name: docker-socket
    hostPath:
      path: /var/run/docker.sock
      type: Socket
  - name: docker-lib
    emptyDir: {}
  - name: workspace-volume
    emptyDir: {}
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
