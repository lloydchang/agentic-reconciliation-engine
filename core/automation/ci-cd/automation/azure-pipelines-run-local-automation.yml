name: Zero-Touch Local Automation

trigger: none
pr: none

parameters:
  - name: connector
    type: string
    default: github-enterprise-cloud
  - name: overlayOrder
    type: string
    default: ./bootstrap,./hub,./emulator-azure,./spoke-local
  - name: emulatorAction
    type: string
    default: enable
  - name: summaryEndpoint
    type: string
    default: ''
  - name: summaryToken
    type: string
    default: ''
  - name: notifyWebhook
    type: string
    default: ''

jobs:
  - job: RunZeroTouchAutomation
    pool:
      vmImage: ubuntu-latest
    steps:
      - checkout: self

      - bash: |
          sudo apt-get update
          sudo apt-get install -y curl tar
          curl -sL https://github.com/open-policy-agent/conftest/releases/latest/download/conftest-linux-amd64 -o conftest
          chmod +x conftest
          sudo mv conftest /usr/local/bin/
          curl -sL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz -C /tmp
          chmod +x /tmp/kubeconform
          sudo mv /tmp/kubeconform /usr/local/bin/
        displayName: Install validation tools

      - bash: |
          bash core/core/automation/ci-cd/scripts/run-local-automation.sh \
            --connector $(connector) \
            --overlay-order $(overlayOrder) \
            --emulator-action $(emulatorAction)
        displayName: Execute zero-touch automation

      - task: PublishPipelineArtifact@1
        inputs:
          targetPath: 'logs/local-automation'
          artifactName: zero-touch-automation-logs
        displayName: Publish automation logs

      - bash: |
          core/core/automation/ci-cd/scripts/publish-summary.sh logs/local-core/automation/ci-cd/latest-summary.json
        displayName: Publish summary and notify downstream systems
        env:
          SUMMARY_ENDPOINT: $(summaryEndpoint)
          SUMMARY_TOKEN: $(summaryToken)
          NOTIFY_WEBHOOK: $(notifyWebhook)
