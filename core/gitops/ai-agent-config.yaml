---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-agent-config
  namespace: ai-infrastructure
  labels:
    app.kubernetes.io/name: ai-agent-config
    app.kubernetes.io/component: config
data:
  # MCP Gateway Configuration
  MCP_GATEWAY_PORT: "8080"
  MCP_REGISTRY_STORAGE: "redis://redis-service:6379"
  MCP_SANDBOX_ENABLED: "true"
  MCP_MAX_REQUEST_SIZE: "1048576"  # 1MB

  # Cost Tracker Configuration
  COST_TRACKER_PORT: "9090"
  COST_LOCAL_MODEL_COST: "0.0001"
  COST_EXTERNAL_MODEL_COST: "0.003"
  COST_BUDGET_WARNING: "0.8"  # 80% of budget
  COST_BUDGET_CRITICAL: "0.95"  # 95% of budget

  # Task Queue Configuration
  TASK_QUEUE_REDIS_ADDR: "redis://redis-service:6379"
  TASK_QUEUE_MAX_CONCURRENT: "10"
  TASK_QUEUE_TIMEOUT: "3600"  # 1 hour

  # Temporal Configuration
  TEMPORAL_ADDR: "temporal-frontend.temporal.svc.cluster.local:7233"
  TEMPORAL_NAMESPACE: "ai-infrastructure"

  # Model Configuration
  MODEL_PREFERENCE: "local,external"
  MODEL_LOCAL_LLAMA_PATH: "/models/llama.cpp"
  MODEL_LOCAL_OLLAMA_ADDR: "http://ollama-service:11434"

  # Security Configuration
  SECURITY_SCAN_ENABLED: "true"
  SECURITY_MAX_PARALLEL_SCANS: "3"
  SECURITY_TIMEOUT: "900"  # 15 minutes

  # Notification Configuration
  NOTIFICATION_SLACK_WEBHOOK: ""
  NOTIFICATION_EMAIL_SMTP: ""
  NOTIFICATION_GITHUB_TOKEN: ""

  # Logging Configuration
  LOG_LEVEL: "INFO"
  LOG_FORMAT: "json"
  LOG_MAX_SIZE: "100"  # MB
  LOG_MAX_AGE: "30"    # days
  LOG_MAX_BACKUPS: "5"
