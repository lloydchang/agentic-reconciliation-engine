---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-queue
  namespace: ai-infrastructure
  labels:
    app.kubernetes.io/name: task-queue
    app.kubernetes.io/component: background-execution
    app.kubernetes.io/version: "1.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: task-queue
  template:
    metadata:
      labels:
        app.kubernetes.io/name: task-queue
        app.kubernetes.io/component: background-execution
    spec:
      serviceAccountName: ai-agent-service-account
      containers:
      - name: task-queue
        image: ai-infrastructure/task-queue:latest
        ports:
        - containerPort: 8081
          name: http
        envFrom:
        - configMapRef:
            name: ai-agent-config
        - secretRef:
            name: ai-agent-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: task-queue
  namespace: ai-infrastructure
  labels:
    app.kubernetes.io/name: task-queue
    app.kubernetes.io/component: service
spec:
  selector:
    app.kubernetes.io/name: task-queue
  ports:
  - name: http
    port: 80
    targetPort: 8081
    protocol: TCP
  type: ClusterIP
