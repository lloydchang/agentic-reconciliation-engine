---
apiVersion: v1
kind: Namespace
metadata:
  name: ai-infrastructure
  labels:
    name: ai-infrastructure
    app.kubernetes.io/name: ai-infrastructure
    app.kubernetes.io/component: ai-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ai-agent-service-account
  namespace: ai-infrastructure
  labels:
    app.kubernetes.io/name: ai-agent
    app.kubernetes.io/component: service-account
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ai-agent-cluster-role
  labels:
    app.kubernetes.io/name: ai-agent
    app.kubernetes.io/component: rbac
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "services", "configmaps", "secrets", "events"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "daemonsets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ai-agent-cluster-role-binding
  labels:
    app.kubernetes.io/name: ai-agent
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ai-agent-cluster-role
subjects:
- kind: ServiceAccount
  name: ai-agent-service-account
  namespace: ai-infrastructure
