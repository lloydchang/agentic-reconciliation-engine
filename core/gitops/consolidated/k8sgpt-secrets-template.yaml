# K8sGPT Unified Secrets Template
# Template for all secrets required by the consolidated K8sGPT deployment
apiVersion: v1
kind: Secret
metadata:
  name: k8sgpt-secrets
  namespace: k8sgpt-system
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: secrets
    app.kubernetes.io/part-of: agentic-reconciliation-engine
  annotations:
    app.kubernetes.io/managed-by: gitops
type: Opaque
stringData:
  # Agent Memory Backend (Primary)
  agent-memory-jwt-secret: "your-jwt-secret-here"
  
  # LocalAI Backend (Fallback)
  localai-api-key: "not-required"
  
  # External OpenAI-compatible API (Optional Fallback)
  # Uncomment and set if using external API
  # openai-api-key: "your-openai-api-key-here"
  # openai-base-url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  
  # Webhook authentication
  webhook-secret: "your-webhook-secret-here"
  
  # Monitoring integration
  prometheus-token: "your-prometheus-token-here"
  
  # Jaeger tracing (optional)
  jaeger-auth-token: "your-jaeger-token-here"
  
  # Component-specific secrets
  argo-workflows-token: "your-argo-workflows-token-here"
  argo-rollouts-token: "your-argo-rollouts-token-here"
  flux-webhook-token: "your-flux-webhook-token-here"
  
  # External integrations (optional)
  slack-webhook-url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
  teams-webhook-url: "https://outlook.office.com/webhook/YOUR-TEAMS-WEBHOOK"
  
  # Git repository access (for analysis)
  git-ssh-key: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    your-ssh-private-key-here
    -----END OPENSSH PRIVATE KEY-----
  
  git-token: "your-git-personal-access-token-here"
  
  # Cloud provider credentials (for cloud resource analysis)
  # AWS
  # aws-access-key-id: "your-aws-access-key"
  # aws-secret-access-key: "your-aws-secret-key"
  
  # Azure
  # azure-client-id: "your-azure-client-id"
  # azure-client-secret: "your-azure-client-secret"
  # azure-tenant-id: "your-azure-tenant-id"
  
  # GCP
  # gcp-service-account-key: |
  #   {
  #     "type": "service_account",
  #     "project_id": "your-project-id",
  #     "private_key_id": "your-private-key-id",
  #     "private_key": "-----BEGIN PRIVATE KEY-----\nyour-private-key\n-----END PRIVATE KEY-----\n",
  #     "client_email": "your-service-account@your-project.iam.gserviceaccount.com",
  #     "client_id": "your-client-id",
  #     "auth_uri": "https://accounts.google.com/o/oauth2/auth",
  #     "token_uri": "https://oauth2.googleapis.com/token"
  #   }
  
  # Database connections (for analysis storage)
  # postgres-connection-string: "postgresql://user:password@postgres:5432/k8sgpt"
  # redis-connection-string: "redis://redis:6379/0"
  
  # Custom CA certificates (if needed)
  # custom-ca-cert: |
  #   -----BEGIN CERTIFICATE-----
  #   your-ca-certificate-here
  #   -----END CERTIFICATE-----

---
# Namespace for K8sGPT
apiVersion: v1
kind: Namespace
metadata:
  name: k8sgpt-system
  labels:
    app.kubernetes.io/name: k8sgpt
    app.kubernetes.io/component: namespace
    app.kubernetes.io/part-of: agentic-reconciliation-engine
    name: k8sgpt-system
  annotations:
    app.kubernetes.io/managed-by: gitops
    description: "Namespace for consolidated K8sGPT deployment serving all GitOps components"
