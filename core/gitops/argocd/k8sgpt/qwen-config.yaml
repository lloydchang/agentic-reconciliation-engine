apiVersion: v1
kind: ConfigMap
metadata:
  name: qwen-centralized-config
  namespace: k8sgpt-system
  labels:
    app.kubernetes.io/name: qwen-centralized-config
    app.kubernetes.io/part-of: k8sgpt
data:
  config.yaml: |
    # Configuration for centralized Qwen service via agent-memory-rust
    version: "1.0.0"
    
    # Centralized Qwen service configuration
    service:
      name: "agent-memory-service"
      namespace: "ai-infrastructure"
      port: 8080
      metrics_port: 9090
      health_endpoint: "/api/health"
      api_endpoint: "/api/v1/chat"
    
    # Model configuration
    model:
      name: "qwen2.5-7b-instruct"
      backend: "agent-memory"
      max_tokens: 4096
      temperature: 0.7
      timeout: 30
    
    # Authentication configuration
    authentication:
      enabled: true
      api_key: "k8sgpt-api-key"
      header_name: "X-API-Key"
    
    # Connection configuration
    connection:
      timeout: 30
      retry_attempts: 3
      retry_delay: 5
      pool_size: 10
    
    # Caching configuration
    cache:
      enabled: true
      ttl: 3600
      max_size: 1000
    
    # Monitoring configuration
    monitoring:
      metrics_enabled: true
      tracing_enabled: false
      health_check_interval: 30
    
    # Fallback configuration
    fallback:
      enabled: true
      backend: "ollama"
      ollama_url: "http://ollama-service.ai-infrastructure.svc.cluster.local:11434"
