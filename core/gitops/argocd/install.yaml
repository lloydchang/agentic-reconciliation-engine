      - name: argocd-application-controller
        image: quay.io/argoproj/argocd:v2.10.0
        command:
        - argocd-application-controller
        - --repo-server
        - argocd-repo-server.argocd.svc.cluster.local:8081
        - --redis
        - argocd-redis.argocd.svc.cluster.local:6379
        - --loglevel
        - info
        ports:
        - containerPort: 8082
        readinessProbe:
          tcpSocket:
            port: 8082
