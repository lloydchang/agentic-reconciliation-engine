---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-dex-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-dex-server
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/version: v2.10.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-dex-server
      app.kubernetes.io/part-of: argocd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-dex-server
        app.kubernetes.io/part-of: argocd
        app.kubernetes.io/version: v2.10.0
    spec:
      serviceAccountName: argocd-dex-server
      containers:
      - name: dex
        image: ghcr.io/dexidp/dex:v2.37.0
        command:
        - /dex
        - serve
        - /etc/dex/config.yaml
        ports:
        - containerPort: 5556
        - containerPort: 5580
        readinessProbe:
          httpGet:
            path: /healthz
            port: 5580
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 5580
          initialDelaySeconds: 10
          periodSeconds: 30
        env:
        - name: GODEBUG
          value: x509sha1=1
        resources:
          limits:
            cpu: 100m
            memory: 128Mi
          requests:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - name: config
          mountPath: /etc/dex
      volumes:
      - name: config
        configMap:
          name: argocd-dex-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-dex-config
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-dex-config
    app.kubernetes.io/part-of: argocd
data:
  config.yaml: |
    connectors:
    - type: oidc
      id: oidc
      name: OpenID Connect
      config:
        issuer: https://accounts.google.com
        clientID: $argo-oidc-client-id
        clientSecret: $argo-oidc-client-secret
        requestedScopes: ["openid", "profile", "email"]
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-dex-server
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-dex-server
    app.kubernetes.io/part-of: argocd
spec:
  ports:
  - name: http
    port: 5556
    protocol: TCP
    targetPort: 5556
  - name: metrics
    port: 5580
    protocol: TCP
    targetPort: 5580
  selector:
    app.kubernetes.io/name: argocd-dex-server
---
apiVersion: v1
kind: Service
metadata:
  name: argocd-redis
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-redis
    app.kubernetes.io/part-of: argocd
spec:
  ports:
  - name: tcp
    port: 6379
    protocol: TCP
    targetPort: 6379
  selector:
    app.kubernetes.io/name: argocd-redis
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-redis
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-redis
    app.kubernetes.io/part-of: argocd
    app.kubernetes.io/version: v2.10.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: argocd-redis
      app.kubernetes.io/part-of: argocd
  template:
    metadata:
      labels:
        app.kubernetes.io/name: argocd-redis
        app.kubernetes.io/part-of: argocd
        app.kubernetes.io/version: v2.10.0
    spec:
      serviceAccountName: argocd-redis
      containers:
      - name: redis
        image: redis:7.0.14-alpine
        command:
        - redis-server
        - --requirepass
        - $(REDIS_PASSWORD)
        ports:
        - containerPort: 6379
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 30
          periodSeconds: 30
        env:
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: argocd-redis-secret
              key: password
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-redis-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-redis-secret
    app.kubernetes.io/part-of: argocd
type: Opaque
data:
  # Default redis password (change this in production)
  password: cGFzc3dvcmQ=
