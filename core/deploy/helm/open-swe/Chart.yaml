apiVersion: v2
name: open-swe
description: Open SWE Integration - Advanced AI Operations Platform
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - ai
  - kubernetes
  - temporal
  - gitops
  - openswe
home: https://github.com/lloydchang/agentic-reconciliation-engine
sources:
  - https://github.com/lloydchang/agentic-reconciliation-engine
maintainers:
  - name: Lloyd Chang
    email: lloyd.chang@example.com
dependencies:
  - name: temporal
    version: "~0.40.0"
    repository: "https://temporalio.github.io/helm-charts"
    condition: temporal.enabled
  - name: prometheus
    version: "~15.0.0"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: prometheus.enabled
  - name: grafana
    version: "~6.50.0"
    repository: "https://grafana.github.io/helm-charts"
    condition: grafana.enabled
