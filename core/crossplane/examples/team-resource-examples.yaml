# Simplified Crossplane Team Resource Examples
# These examples demonstrate multi-cloud resource creation with team isolation

---
# Team A - AWS Network Example
apiVersion: platform.example.com/v1alpha1
kind: Network
metadata:
  name: team-a-production-network
  namespace: team-a
  labels:
    app.kubernetes.io/team: team-a
    app.kubernetes.io/provider: aws
    app.kubernetes.io/managed-by: crossplane
    environment: production
    cost-center: engineering
    owner: team-a-lead
spec:
  provider: aws
  region: us-west-2
  cidrBlock: 10.100.0.0/16
  subnetCount: 3
  enableDnsHostnames: true
  enableDnsSupport: true
  tags:
    Environment: production
    Team: team-a
    CostCenter: engineering
    Purpose: production-workload
    ManagedBy: crossplane

---
# Team A - Azure Compute Example
apiVersion: platform.example.com/v1alpha1
kind: Compute
metadata:
  name: team-a-web-servers
  namespace: team-a
  labels:
    app.kubernetes.io/team: team-a
    app.kubernetes.io/provider: azure
    app.kubernetes.io/managed-by: crossplane
    environment: production
    cost-center: engineering
    owner: team-a-lead
spec:
  provider: azure
  region: East US
  instanceType: Standard_B2s
  minCount: 2
  maxCount: 4
  monitoring: true
  imageId: UbuntuServer-18.04-LTS
  tags:
    Environment: production
    Team: team-a
    CostCenter: engineering
    Purpose: web-servers
    ManagedBy: crossplane

---
# Team A - GCP Storage Example
apiVersion: platform.example.com/v1alpha1
kind: Storage
metadata:
  name: team-a-application-backups
  namespace: team-a
  labels:
    app.kubernetes.io/team: team-a
    app.kubernetes.io/provider: gcp
    app.kubernetes.io/managed-by: crossplane
    environment: production
    cost-center: engineering
    owner: team-a-lead
spec:
  provider: gcp
  region: us-central1
  bucketName: team-a-app-backups
  storageClass: standard
  versioning: true
  encryption: true
  accessControl: private
  tags:
    Environment: production
    Team: team-a
    CostCenter: engineering
    Purpose: application-backups
    ManagedBy: crossplane

---
# Team B - AWS Network Example
apiVersion: platform.example.com/v1alpha1
kind: Network
metadata:
  name: team-b-development-network
  namespace: team-b
  labels:
    app.kubernetes.io/team: team-b
    app.kubernetes.io/provider: aws
    app.kubernetes.io/managed-by: crossplane
    environment: development
    cost-center: research
    owner: team-b-lead
spec:
  provider: aws
  region: us-east-1
  cidrBlock: 10.200.0.0/16
  subnetCount: 2
  enableDnsHostnames: true
  enableDnsSupport: true
  tags:
    Environment: development
    Team: team-b
    CostCenter: research
    Purpose: development-workload
    ManagedBy: crossplane

---
# Team B - Azure Compute Example
apiVersion: platform.example.com/v1alpha1
kind: Compute
metadata:
  name: team-b-data-processing
  namespace: team-b
  labels:
    app.kubernetes.io/team: team-b
    app.kubernetes.io/provider: azure
    app.kubernetes.io/managed-by: crossplane
    environment: development
    cost-center: research
    owner: team-b-lead
spec:
  provider: azure
  region: West Europe
  instanceType: Standard_D4s_v3
  minCount: 1
  maxCount: 3
  monitoring: true
