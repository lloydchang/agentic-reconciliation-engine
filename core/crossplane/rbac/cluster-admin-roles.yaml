---
# Cluster-wide admin roles for platform team

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-provider-admin
spec:
  # Provider configuration management
  - apiGroups: ["aws.crossplane.io", "azure.crossplane.io", "gcp.crossplane.io"]
    resources: ["providerconfigs", "providerconfigs/status", "providerconfiguses"]
    verbs: ["*"]
  # Provider package management
  - apiGroups: ["pkg.crossplane.io"]
    resources: ["providers", "providerrevisions", "configurations", "configurationrevisions"]
    verbs: ["*"]
  # XRD and Composition management (cluster-scoped)
  - apiGroups: ["apiextensions.crossplane.io"]
    resources: ["compositedefinitions", "compositions", "definitions"]
    verbs: ["*"]
  # Crossplane system resources
  - apiGroups: [""]
    resources: ["secrets", "configmaps", "services", "pods"]
    verbs: ["*"]
    resourceNames: ["crossplane", "crossplane-system*"]
  # Read all resources cluster-wide
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-provider-admin-binding
subjects:
- kind: Group
  name: "platform-admins"
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: crossplane-provider-admin
  apiGroup: rbac.authorization.k8s.io

---
# Optional: Grant crossplane-system service account additional permissions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-system-admin
subjects:
- kind: ServiceAccount
  name: crossplane
  namespace: crossplane-system
roleRef:
  kind: ClusterRole
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
