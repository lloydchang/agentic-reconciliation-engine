# RBAC-based team isolation for Crossplane multi-cloud environment
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crossplane-admin
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: rbac
    app.kubernetes.io/managed-by: platform
rules:
# Platform resource management
- apiGroups: ["platform.example.com"]
  resources: ["networks", "computes", "storages", "xnetworks", "xcomputes", "xstorages"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
# Crossplane resources
- apiGroups: ["apiextensions.crossplane.io"]
  resources: ["compositeresourcedefinitions", "compositions"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
# Provider configurations
- apiGroups: ["aws.upbound.io", "azure.upbound.io", "gcp.upbound.io"]
  resources: ["*"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
# Namespaces for team isolation
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["create", "get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: crossplane-admin-binding
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: rbac
    app.kubernetes.io/managed-by: platform
subjects:
- kind: ServiceAccount
  name: crossplane
  namespace: crossplane-system
roleRef:
  kind: ClusterRole
  name: crossplane-admin
---
# Team-specific roles for isolation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: team-a-platform-admin
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: rbac
    app.kubernetes.io/team: team-a
rules:
- apiGroups: ["platform.example.com"]
  resources: ["networks", "computes", "storages"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  resourceNames: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: team-b-platform-admin
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: rbac
    app.kubernetes.io/team: team-b
rules:
- apiGroups: ["platform.example.com"]
  resources: ["networks", "computes", "storages"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
  resourceNames: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: team-a-platform-user
  namespace: team-a
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: rbac
    app.kubernetes.io/team: team-a
rules:
- apiGroups: ["platform.example.com"]
  resources: ["networks", "computes", "storages"]
  verbs: ["get", "list", "watch"]
  resourceNames: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-a-platform-binding
  namespace: team-a
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: rbac
    app.kubernetes.io/team: team-a
subjects:
- kind: Group
  name: team-a-engineers
- kind: ServiceAccount
  name: team-a-sa
roleRef:
  kind: ClusterRole
  name: team-a-platform-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: team-b-platform-user
  namespace: team-b
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: rbac
    app.kubernetes.io/team: team-b
rules:
- apiGroups: ["platform.example.com"]
  resources: ["networks", "computes", "storages"]
  verbs: ["get", "list", "watch"]
  resourceNames: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: team-b-platform-binding
  namespace: team-b
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: rbac
    app.kubernetes.io/team: team-b
subjects:
- kind: Group
  name: team-b-engineers
- kind: ServiceAccount
  name: team-b-sa
roleRef:
  kind: ClusterRole
  name: team-b-platform-admin
---
# Team namespaces for isolation
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-a
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: namespace
    app.kubernetes.io/team: team-a
    app.kubernetes.io/managed-by: platform
---
apiVersion: v1
kind: Namespace
metadata:
  name: team-b
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: namespace
    app.kubernetes.io/team: team-b
    app.kubernetes.io/managed-by: platform
