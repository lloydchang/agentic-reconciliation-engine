apiVersion: azure.crossplane.io/v1beta1
kind: ProviderConfig
metadata:
  name: azure-provider
  labels:
    provider: azure
    environment: production
spec:
  credentials:
    source: Secret
    secretRef:
      namespace: crossplane-system
      name: azure-creds
      key: key
  # Optional: Subscription ID can be specified here or in resources
  # subscriptionID: "YOUR_SUBSCRIPTION_ID"
---
apiVersion: v1
kind: Secret
metadata:
  name: azure-creds
  namespace: crossplane-system
  labels:
    provider: azure
type: Opaque
stringData:
  # Azure service principal credentials
  # key: |
  #   {
  #     "clientId": "YOUR_CLIENT_ID",
  #     "clientSecret": "YOUR_CLIENT_SECRET",
  #     "subscriptionId": "YOUR_SUBSCRIPTION_ID",
  #     "tenantId": "YOUR_TENANT_ID"
  #   }
  key: ""
---
apiVersion: azure.crossplane.io/v1beta1
kind: ProviderConfigUsage
metadata:
  name: azure-provider-usage
spec:
  providerConfigRef:
    name: azure-provider
