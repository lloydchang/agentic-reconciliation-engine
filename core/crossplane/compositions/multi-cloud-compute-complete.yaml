apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: multi-cloud-compute
  labels:
    crossplane.io/managed: "true"
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: composition
    app.kubernetes.io/resource: compute
  annotations:
    crossplane.io/documentation: "Multi-cloud compute composition that handles AWS, Azure, and GCP"
spec:
  compositeTypeRef:
    apiVersion: platform.example.com/v1alpha1
    kind: XCompute
  resources:
  # AWS EC2 Instance
  - name: aws-instance
    base:
      apiVersion: ec2.aws.upbound.io/v1beta1
      kind: Instance
      metadata:
        labels:
          app.kubernetes.io/managed-by: crossplane
          app.kubernetes.io/provider: aws
      spec:
        forProvider:
          imageId: ami-0abcdef1234567890
          instanceType: t3.medium
          minCount: 1
          maxCount: 1
          subnetIdSelector:
            matchControllerRef: true
          securityGroupIdsSelector:
            matchControllerRef: true
          iamInstanceProfile: compute-profile
          monitoring: true
          ebsOptimized: false
          tags:
            ManagedBy: crossplane
            Environment: production
            Type: compute
    patches:
    - type: FromCompositeFieldPath
      fromFieldPath: spec.provider
      toFieldPath: # Only apply if provider is aws
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "enabled"
              azure: "disabled"
              gcp: "disabled"
    - type: FromCompositeFieldPath
      fromFieldPath: spec.instanceType
      toFieldPath: spec.forProvider.instanceType
    - type: FromCompositeFieldPath
      fromFieldPath: spec.imageId
      toFieldPath: spec.forProvider.imageId
    - type: FromCompositeFieldPath
      fromFieldPath: spec.region
      toFieldPath: spec.forProvider.region
    - type: FromCompositeFieldPath
      fromFieldPath: spec.minCount
      toFieldPath: spec.forProvider.minCount
    - type: FromCompositeFieldPath
      fromFieldPath: spec.maxCount
      toFieldPath: spec.forProvider.maxCount
    - type: FromCompositeFieldPath
      fromFieldPath: spec.tags
      toFieldPath: spec.forProvider.tags
      policy:
        mergeKeys:
          - ManagedBy
          - Environment
          - Type
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.instanceState
      toFieldPath: status.instanceState
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "enabled"
              azure: "disabled"
              gcp: "disabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.instanceId
      toFieldPath: status.instanceIds
      policy:
        fromFieldPath: "status.atProvider.instanceId"
        combine:
          strategy: string
          string:
            fmt: "[\"%s\"]"
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "enabled"
              azure: "disabled"
              gcp: "disabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.publicIp
      toFieldPath: status.publicIps
      policy:
        fromFieldPath: "status.atProvider.publicIp"
        combine:
          strategy: string
          string:
            fmt: "[\"%s\"]"
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "enabled"
              azure: "disabled"
              gcp: "disabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.privateIp
      toFieldPath: status.privateIps
      policy:
        fromFieldPath: "status.atProvider.privateIp"
        combine:
          strategy: string
          string:
            fmt: "[\"%s\"]"
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "enabled"
              azure: "disabled"
              gcp: "disabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.launchTime
      toFieldPath: status.launchTime
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "enabled"
              azure: "disabled"
              gcp: "disabled"

  # Azure Virtual Machine
  - name: azure-vm
    base:
      apiVersion: compute.azure.upbound.io/v1beta1
      kind: VirtualMachine
      metadata:
        labels:
          app.kubernetes.io/managed-by: crossplane
          app.kubernetes.io/provider: azure
      spec:
        forProvider:
          location: East US
          vmSize: Standard_B2s
          networkInterfaceIdsSelector:
            matchControllerRef: true
          osDisk:
            osType: Linux
            caching: ReadWrite
            storageAccountType: Premium_LRS
            managedDisk: true
            createOption: FromImage
          imageReference:
            publisher: Canonical
            offer: UbuntuServer
            sku: 18.04-LTS
            version: latest
          adminUsername: azureuser
          disablePasswordAuthentication: true
          bootDiagnostics:
            enabled: true
            storageUri: ""
          priority: Regular
          evictionPolicy: Deallocate
          tags:
            ManagedBy: crossplane
            Environment: production
            Type: compute
    patches:
    - type: FromCompositeFieldPath
      fromFieldPath: spec.provider
      toFieldPath: # Only apply if provider is azure
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "enabled"
              gcp: "disabled"
    - type: FromCompositeFieldPath
      fromFieldPath: spec.instanceType
      toFieldPath: spec.forProvider.vmSize
    - type: FromCompositeFieldPath
      fromFieldPath: spec.imageId
      toFieldPath: spec.forProvider.imageReference.sku
    - type: FromCompositeFieldPath
      fromFieldPath: spec.region
      toFieldPath: spec.forProvider.location
    - type: FromCompositeFieldPath
      fromFieldPath: spec.minCount
      toFieldPath: spec.forProvider.priority
      transform:
        convert: "1:Regular,2:High"
    - type: FromCompositeFieldPath
      fromFieldPath: spec.maxCount
      toFieldPath: spec.forProvider.priority
      transform:
        convert: "1:Regular,2:High"
    - type: FromCompositeFieldPath
      fromFieldPath: spec.tags
      toFieldPath: spec.forProvider.tags
      policy:
        mergeKeys:
          - ManagedBy
          - Environment
          - Type
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.vmId
      toFieldPath: status.instanceIds
      policy:
        fromFieldPath: "status.atProvider.vmId"
        combine:
          strategy: string
          string:
            fmt: "[\"%s\"]"
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "enabled"
              gcp: "disabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.publicIPAddresses
      toFieldPath: status.publicIps
      policy:
        fromFieldPath: "status.atProvider.publicIPAddresses"
        combine:
          strategy: string
          string:
            fmt: "[\"%s\"]"
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "enabled"
              gcp: "disabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.privateIPAddresses
      toFieldPath: status.privateIps
      policy:
        fromFieldPath: "status.atProvider.privateIPAddresses"
        combine:
          strategy: string
          string:
            fmt: "[\"%s\"]"
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "enabled"
              gcp: "disabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.provisioningState
      toFieldPath: status.instanceState
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "enabled"
              gcp: "disabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.timeCreated
      toFieldPath: status.launchTime
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "enabled"
              gcp: "disabled"

  # GCP Compute Engine Instance
  - name: gcp-instance
    base:
      apiVersion: compute.gcp.upbound.io/v1beta1
      kind: Instance
      metadata:
        labels:
          app.kubernetes.io/managed-by: crossplane
          app.kubernetes.io/provider: gcp
      spec:
        forProvider:
          zone: us-central1-a
          machineType: e2-medium
          disks:
          - autoDelete: true
            boot: true
            interface: SCSI
            mode: READ_WRITE_ONE
            type: PERSISTENT
            initializeParams:
              diskSizeGb: 20
              diskType: pd-balanced
              sourceImage: projects/debian-cloud/global/images/family/debian-11
          networkInterfaces:
          - networkSelector:
              matchControllerRef: true
            subnetworkSelector:
              matchControllerRef: true
            accessConfigs:
            - type: ONE_TO_ONE_NAT
              name: External NAT
            networkIP: ""
          scheduling:
            automaticRestart: true
            onHostMaintenance: MIGRATE
            preemptible: false
            provisioningModel: STANDARD
          deletionProtection: false
          shieldedInstanceConfig:
            enableSecureBoot: false
            enableVtpm: false
            enableIntegrityMonitoring: false
          confidentialInstanceConfig:
            enableConfidentialCompute: false
          tags:
            ManagedBy: crossplane
            Environment: production
            Type: compute
    patches:
    - type: FromCompositeFieldPath
      fromFieldPath: spec.provider
      toFieldPath: # Only apply if provider is gcp
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "disabled"
              gcp: "enabled"
    - type: FromCompositeFieldPath
      fromFieldPath: spec.instanceType
      toFieldPath: spec.forProvider.machineType
    - type: FromCompositeFieldPath
      fromFieldPath: spec.imageId
      toFieldPath: spec.forProvider.disks[0].initializeParams.sourceImage
    - type: FromCompositeFieldPath
      fromFieldPath: spec.region
      toFieldPath: spec.forProvider.zone
      transform:
        string:
          template: "%s-a"
    - type: FromCompositeFieldPath
      fromFieldPath: spec.minCount
      toFieldPath: spec.forProvider.scheduling.provisioningModel
      transform:
        convert: "1:STANDARD,2:STANDARD"
    - type: FromCompositeFieldPath
      fromFieldPath: spec.maxCount
      toFieldPath: spec.forProvider.scheduling.provisioningModel
      transform:
        convert: "1:STANDARD,2:STANDARD"
    - type: FromCompositeFieldPath
      fromFieldPath: spec.tags
      toFieldPath: spec.forProvider.tags
      policy:
        mergeKeys:
          - ManagedBy
          - Environment
          - Type
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.id
      toFieldPath: status.instanceIds
      policy:
        fromFieldPath: "status.atProvider.id"
        combine:
          strategy: string
          string:
            fmt: "[\"%s\"]"
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "disabled"
              gcp: "enabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.networkInterfaces[0].networkIP
      toFieldPath: status.privateIps
      policy:
        fromFieldPath: "status.atProvider.networkInterfaces[0].networkIP"
        combine:
          strategy: string
          string:
            fmt: "[\"%s\"]"
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "disabled"
              gcp: "enabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.networkInterfaces[0].accessConfigs[0].natIP
      toFieldPath: status.publicIps
      policy:
        fromFieldPath: "status.atProvider.networkInterfaces[0].accessConfigs[0].natIP"
        combine:
          strategy: string
          string:
            fmt: "[\"%s\"]"
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "disabled"
              gcp: "enabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.status
      toFieldPath: status.instanceState
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "disabled"
              gcp: "enabled"
    - type: ToCompositeFieldPath
      fromFieldPath: status.atProvider.creationTimestamp
      toFieldPath: status.launchTime
      policy:
        fromFieldPath: spec.provider
        transforms:
          - type: map
            map:
              aws: "disabled"
              azure: "disabled"
              gcp: "enabled"
