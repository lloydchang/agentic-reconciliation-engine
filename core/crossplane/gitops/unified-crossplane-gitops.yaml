# Unified Crossplane GitOps configuration for single control plane
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: crossplane
  namespace: crossplane-system
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: helmrelease
    app.kubernetes.io/part-of: flux-system
    crossplane.io/managed: "true"
spec:
  interval: 5m
  releaseName: crossplane
  chart:
    spec:
      chart: crossplane
      version: "1.14.0"
      sourceRef:
        kind: HelmRepository
        name: crossplane-stable
        namespace: flux-system
  values:
    rbac:
      create: true
    securityContext:
      runAsUser: 2000
      runAsGroup: 2000
    resourcesCrossplane:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 128Mi
    resourcesRBACManager:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
    packaging:
      namespace: crossplane-system
      policy: always
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        namespace: monitoring
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: crossplane-providers
  namespace: crossplane-system
  labels:
    app.kubernetes.io/name: crossplane-providers
    app.kubernetes.io/component: helmrelease
    app.kubernetes.io/part-of: flux-system
    crossplane.io/managed: "true"
spec:
  interval: 5m
  releaseName: crossplane-providers
  chart:
    spec:
      chart: crossplane-providers
      version: "0.1.0"
      sourceRef:
        kind: HelmRepository
        name: crossplane-providers
        namespace: flux-system
  values:
    aws:
      enabled: true
      package: xpkg.upbound.io/upbound/provider-family-aws:v1.2.0
    azure:
      enabled: true
      package: xpkg.upbound.io/upbound/provider-family-azure:v1.2.0
    gcp:
      enabled: true
      package: xpkg.upbound.io/upbound/provider-family-gcp:v1.2.0
    rbac:
      create: true
    securityContext:
      runAsUser: 2000
      runAsGroup: 2000
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-resources
  namespace: flux-system
  labels:
    app.kubernetes.io/name: crossplane-resources
    app.kubernetes.io/component: kustomization
    app.kubernetes.io/part-of: flux-system
    crossplane.io/managed: "true"
spec:
  interval: 10m
  path: ./core/crossplane
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: crossplane-system
  postBuild:
    substitute:
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
      AZURE_CLIENT_ID: "${AZURE_CLIENT_ID}"
      AZURE_CLIENT_SECRET: "${AZURE_CLIENT_SECRET}"
      AZURE_SUBSCRIPTION_ID: "${AZURE_SUBSCRIPTION_ID}"
      AZURE_TENANT_ID: "${AZURE_TENANT_ID}"
      GCP_PROJECT_ID: "${GCP_PROJECT_ID}"
      GCP_PRIVATE_KEY_ID: "${GCP_PRIVATE_KEY_ID}"
      GCP_PRIVATE_KEY: "${GCP_PRIVATE_KEY}"
      GCP_CLIENT_EMAIL: "${GCP_CLIENT_EMAIL}"
      GCP_CLIENT_ID: "${GCP_CLIENT_ID}"
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-rbac
  namespace: flux-system
  labels:
    app.kubernetes.io/name: crossplane-rbac
    app.kubernetes.io/component: kustomization
    app.kubernetes.io/part-of: flux-system
    crossplane.io/managed: "true"
spec:
  interval: 10m
  path: ./core/crossplane/rbac
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: crossplane-system
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: crossplane-compositions
  namespace: flux-system
  labels:
    app.kubernetes.io/name: crossplane-compositions
    app.kubernetes.io/component: kustomization
    app.kubernetes.io/part-of: flux-system
    crossplane.io/managed: "true"
spec:
  interval: 10m
  path: ./core/crossplane/compositions
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: crossplane-system
---
# Monitoring and Observability
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: crossplane-metrics
  namespace: crossplane-system
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: monitoring
    crossplane.io/managed: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: crossplane
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: crossplane-rbac-manager-metrics
  namespace: crossplane-system
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: monitoring
    crossplane.io/managed: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: rbac-manager
  endpoints:
  - port: metrics
    interval: 30s
    path: /metrics
---
# Policy and Governance
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: crossplane-policies
  namespace: crossplane-system
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: policy
    crossplane.io/managed: "true"
data:
  resource-limits.yaml: |
    apiVersion: constraints.gatekeeper.sh/v1beta1
    kind: K8sResourceLimits
    metadata:
      name: crossplane-resource-limits
    spec:
      enforcementAction: deny
      match:
        kinds:
        - apiGroups: ["platform.example.com"]
          kinds: ["Network", "Compute", "Storage"]
      parameters:
        cpu: "2"
        memory: "4Gi"
  
  cost-optimization.yaml: |
    apiVersion: constraints.gatekeeper.sh/v1beta1
    kind: RequiredLabels
    metadata:
      name: crossplane-cost-labels
    spec:
      enforcementAction: deny
      match:
        kinds:
        - apiGroups: ["platform.example.com"]
          kinds: ["Network", "Compute", "Storage"]
      parameters:
        labels: ["cost-center", "environment", "owner"]
---
# Backup and Recovery
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: crossplane-backup
  namespace: crossplane-system
  labels:
    app.kubernetes.io/name: crossplane
    app.kubernetes.io/component: backup
    crossplane.io/managed: "true"
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
          - name: backup
            image: ghcr.io/crossplane-contrib/crossplane-backup:latest
            env:
            - name: KUBECONFIG
              value: "/etc/kubeconfig/config"
            - name: BACKUP_BUCKET
              value: "crossplane-backups"
            - name: BACKUP_REGION
              value: "us-west-2"
            volumeMounts:
            - name: kubeconfig
              mountPath: /etc/kubeconfig
              readOnly: true
          volumes:
          - name: kubeconfig
            secret:
              secretName: crossplane-backup-credentials
          restartPolicy: OnFailure
