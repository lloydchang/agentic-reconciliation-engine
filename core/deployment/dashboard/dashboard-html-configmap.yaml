apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-html-config
  namespace: ai-infrastructure
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/x-icon" href="/favicon.ico">
        <title>Agents Control Center</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: #333;
                min-height: 100vh;
            }
            
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
            }
            
            header {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                border-radius: 15px;
                padding: 20px;
                margin-bottom: 30px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            }
            
            .header-content {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            h1 {
                color: #2c3e50;
                font-size: 2.5em;
                font-weight: 700;
            }
            
            .status {
                display: flex;
                align-items: center;
                gap: 10px;
                background: #27ae60;
                color: white;
                padding: 8px 16px;
                border-radius: 20px;
                font-weight: 600;
            }
            
            .status-dot {
                width: 8px;
                height: 8px;
                background: white;
                border-radius: 50%;
                animation: pulse 2s infinite;
            }
            
            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.5; }
            }
            
            .grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
            }
            
            .card {
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
                border-radius: 15px;
                padding: 25px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
                transition: transform 0.3s ease, box-shadow 0.3s ease;
            }
            
            .card:hover {
                transform: translateY(-5px);
                box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
            }
            
            .card h3 {
                color: #2c3e50;
                margin-bottom: 20px;
                font-size: 1.4em;
            }
            
            .metrics {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }
            
            .metric {
                text-align: center;
                padding: 15px;
                background: rgba(52, 152, 219, 0.1);
                border-radius: 10px;
                border: 1px solid rgba(52, 152, 219, 0.2);
            }
            
            .metric-value {
                font-size: 2em;
                font-weight: 700;
                color: #3498db;
                margin-bottom: 5px;
            }
            
            .metric-label {
                color: #7f8c8d;
                font-size: 0.9em;
            }
            
            .metric-change {
                color: #27ae60;
                font-size: 0.8em;
                margin-top: 5px;
            }
            
            .btn {
                background: linear-gradient(135deg, #3498db, #2980b9);
                color: white;
                border: none;
                padding: 12px 20px;
                border-radius: 8px;
                cursor: pointer;
                font-weight: 600;
                transition: all 0.3s ease;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                margin: 5px;
            }
            
            .btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 4px 20px rgba(52, 152, 219, 0.3);
            }
            
            .refresh-btn {
                background: linear-gradient(135deg, #27ae60, #229954);
            }
            
            .refresh-btn:hover {
                box-shadow: 0 4px 20px rgba(39, 174, 96, 0.3);
            }
            
            .loading {
                text-align: center;
                padding: 40px;
                color: #7f8c8d;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <div class="header-content">
                    <h1>🤖 Agents Control Center</h1>
                    <div class="status">
                        <div class="status-dot"></div>
                        <span>System Online</span>
                    </div>
                </div>
            </header>

            <div class="card">
                <h3>📊 System Overview</h3>
                <button class="btn refresh-btn" onclick="location.reload()">
                    🔄 Refresh Data
                </button>
                <div class="metrics">
                    <div class="metric">
                        <div class="metric-value">2</div>
                        <div class="metric-label">Total Agents</div>
                        <div class="metric-change">Real-time data</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">64</div>
                        <div class="metric-label">Active Skills</div>
                        <div class="metric-change">From FastAPI</div>
                    </div>
                    <div class="metric">
                        <div class="metric-value">99.2%</div>
                        <div class="metric-label">Success Rate</div>
                        <div class="metric-change">Live metrics</div>
                    </div>
                </div>
            </div>

            <div class="grid">
                <div class="card">
                    <h3>⚡ Performance Metrics</h3>
                    <div class="loading">Dashboard loaded successfully with favicon!</div>
                </div>
                
                <div class="card">
                    <h3>🎯 Skills Distribution</h3>
                    <div class="loading">All systems operational</div>
                </div>
            </div>
        </div>
    </body>
    </html>
  favicon.ico: |
    # This would be the base64 encoded favicon.ico file
    # For now, we'll use a simple placeholder
    # In production, you would include the actual favicon data here
