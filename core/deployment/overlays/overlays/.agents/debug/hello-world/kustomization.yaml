# Skill Overlay Template
# Copy this template to create new skill overlays
# Instructions:
# 1. Copy this entire directory: cp -r core/deployment/overlays/templates/skill-overlay core/deployment/overlays/core/ai/skills/my-skill
# 2. Replace placeholder values (hello-world, debug, etc.)
# 3. Customize the overlay functionality
# 4. Update overlay-metadata.yaml with your overlay details

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: hello-world
  namespace: flux-system
  annotations:
    overlay.name: "hello-world"
    overlay.version: "{{overlay-version}}"
    overlay.category: "skills"
    overlay.base-skill: "debug"
    overlay.compatibility: "{{base-version}}+"
resources:
  # Reference to base skill (adjust path as needed)
  - ../../../../core/ai/skills/debug
# Patches to modify or extend base functionality
patchesStrategicMerge:
  - enhanced-features.yaml
# Additional configurations
configMapGenerator:
  - name: hello-world-config
    literals:
      - OVERLAY_ENABLED=true
      - OVERLAY_VERSION="{{overlay-version}}"
      - OVERLAY_TYPE="skill-extension"
      - BASE_SKILL="debug"
      - ENHANCED_FEATURES=true
# Secret generation for sensitive data
secretGenerator:
  - name: hello-world-secrets
    envs:
      - .env.secret
# Common labels for overlay resources
commonLabels:
  overlay: "hello-world"
  overlay-type: "skill"
  base-skill: "debug"
  managed-by: "kustomize"
# Namespace configuration
namespace: flux-system
# Images for overlay (if custom containers needed)
images:
  - name: python
    newTag: "3.11-slim"
# Custom resource configurations (if needed)
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: debug
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: OVERLAY_CONFIG
          valueFrom:
            configMapKeyRef:
              name: hello-world-config
              key: OVERLAY_ENABLED
