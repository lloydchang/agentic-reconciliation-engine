apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agent-evaluator-api
  namespace: ai-agents
  labels:
    app: ai-agent-evaluation
    component: evaluator-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-agent-evaluation
      component: evaluator-api
  template:
    metadata:
      labels:
        app: ai-agent-evaluation
        component: evaluator-api
    spec:
      containers:
      - name: evaluator-api
        image: ai-agent-evaluator:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        command: ["flask", "run"]
        args:
        - "--host"
        - "0.0.0.0"
        - "--port"
        - "5000"
        env:
        - name: FLASK_ENV
          value: "production"
        - name: EVALUATORS
          value: "skill_invocation,performance,cost,monitoring,health_check,security,compliance"
        - name: QUALITY_GATE_SCORE
          value: "0.8"
        - name: QUALITY_GATE_PASS_RATE
          value: "0.85"
        - name: REDIS_URL
          value: "redis://redis-service:6379/0"
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: traces-data
          mountPath: /data
          readOnly: true
        - name: results-volume
          mountPath: /results
      volumes:
      - name: traces-data
        persistentVolumeClaim:
          claimName: langfuse-traces-pvc
      - name: results-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: ai-agent-evaluator-service
  namespace: ai-agents
  labels:
    app: ai-agent-evaluation
    component: evaluator-api
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: ai-agent-evaluation
    component: evaluator-api
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: evaluator-config
  namespace: ai-agents
data:
  evaluators.json: |
    {
      "skill_invocation": {
        "enabled": true,
        "weight": 0.2,
        "threshold": 0.7
      },
      "performance": {
        "enabled": true,
        "weight": 0.2,
        "threshold": 0.8
      },
      "cost": {
        "enabled": true,
        "weight": 0.15,
        "threshold": 0.85
      },
      "monitoring": {
        "enabled": true,
        "weight": 0.15,
        "threshold": 0.75
      },
      "health_check": {
        "enabled": true,
        "weight": 0.1,
        "threshold": 0.8
      },
      "security": {
        "enabled": true,
        "weight": 0.1,
        "threshold": 0.9
      },
      "compliance": {
        "enabled": true,
        "weight": 0.1,
        "threshold": 0.85
      }
    }
