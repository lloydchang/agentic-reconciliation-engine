<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Infrastructure Portal - Live Status</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .header h1 {
            margin: 0 0 10px 0;
            font-size: 2.5em;
            color: #333;
        }
        .header .subtitle {
            margin: 0 0 20px 0;
            color: #666;
            font-size: 1.1em;
        }
        .refresh-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s;
        }
        .refresh-btn:hover {
            background: #0056b3;
        }
        .status-summary {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .summary-item {
            text-align: center;
        }
        .summary-number {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .summary-label {
            color: #666;
            font-size: 0.9em;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .service-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            text-decoration: none;
            color: #333;
            display: block;
        }
        .service-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }
        .service-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .service-icon {
            width: 50px;
            height: 50px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            background: #f8f9fa;
            border-radius: 8px;
        }
        .service-title h3 {
            margin: 0 0 5px 0;
            font-size: 1.3em;
            color: #333;
        }
        .service-title p {
            margin: 0;
            color: #666;
            font-size: 0.9em;
        }
        .service-status {
            margin-left: auto;
            display: flex;
            align-items: center;
        }
        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .status-online { background: #28a745; }
        .status-offline { background: #dc3545; }
        .status-error { background: #ffc107; }
        .status-timeout { background: #fd7e14; }
        
        .service-details {
            border-top: 1px solid #e9ecef;
            padding-top: 15px;
            margin-top: 15px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9em;
        }
        .detail-label {
            color: #666;
        }
        .detail-value {
            font-weight: 500;
        }
        .last-updated {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 30px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 AI Infrastructure Portal</h1>
            <p class="subtitle">Real-time monitoring of all AI services and infrastructure components</p>
            <button class="refresh-btn" onclick="refreshStatus()">🔄 Refresh Status</button>
        </div>

        <div class="status-summary">
            <div class="summary-item">
                <div class="summary-number" id="online-count">-</div>
                <div class="summary-label">Online Services</div>
            </div>
            <div class="summary-item">
                <div class="summary-number" id="offline-count">-</div>
                <div class="summary-label">Offline Services</div>
            </div>
            <div class="summary-item">
                <div class="summary-number" id="total-count">-</div>
                <div class="summary-label">Total Services</div>
            </div>
            <div class="summary-item">
                <div class="summary-number" id="health-percentage">-%</div>
                <div class="summary-label">System Health</div>
            </div>
        </div>

        <div class="services-grid" id="services-container">
            <!-- Service cards will be dynamically inserted here -->
        </div>

        <div class="last-updated" id="last-updated">
            Loading service status...
        </div>
    </div>

    <script>
        const services = [
            { name: "AI Dashboard", url: "http://localhost:8080", icon: "🤖", description: "Main AI agents monitoring dashboard", type: "web" },
            { name: "Dashboard API", url: "http://localhost:5003", icon: "📊", description: "RESTful API for dashboard data", type: "api" },
            { name: "Langfuse Observability", url: "http://localhost:3000", icon: "🔍", description: "LLM observability and analytics", type: "web" },
            { name: "Comprehensive API", url: "http://localhost:5001", icon: "📈", description: "Advanced analytics API", type: "api" },
            { name: "Comprehensive Dashboard", url: "http://localhost:8082", icon: "🖥️", description: "Advanced analytics dashboard", type: "web" },
            { name: "Memory Service", url: "http://localhost:8081/health", icon: "🧠", description: "AI memory management service", type: "api" },
            { name: "Temporal UI", url: "http://localhost:7233", icon: "⏰", description: "Workflow orchestration interface", type: "web" }
        ];

        async function checkService(service) {
            const startTime = Date.now();
            try {
                const response = await fetch(service.url, { 
                    method: 'GET',
                    mode: 'no-cors',
                    signal: AbortSignal.timeout(3000)
                });
                const responseTime = Date.now() - startTime;
                return { status: 'online', responseTime, code: response.status };
            } catch (error) {
                if (error.name === 'AbortError') {
                    return { status: 'timeout', responseTime: 3000 };
                } else if (error.message.includes('Failed to fetch')) {
                    return { status: 'offline', responseTime: Date.now() - startTime };
                } else {
                    return { status: 'error', responseTime: Date.now() - startTime, message: error.message };
                }
            }
        }

        async function refreshStatus() {
            const container = document.getElementById('services-container');
            const button = document.querySelector('.refresh-btn');
            button.textContent = '🔄 Checking...';
            button.disabled = true;

            const statusPromises = services.map(async service => ({
                ...service,
                status: await checkService(service)
            }));

            const results = await Promise.all(statusPromises);
            
            // Update summary
            const summary = results.reduce((acc, result) => {
                acc[result.status.status] = (acc[result.status.status] || 0) + 1;
                acc.total++;
                return acc;
            }, { online: 0, offline: 0, error: 0, timeout: 0, total: 0 });

            document.getElementById('online-count').textContent = summary.online;
            document.getElementById('offline-count').textContent = summary.offline;
            document.getElementById('total-count').textContent = summary.total;
            const healthPercentage = summary.total > 0 ? Math.round((summary.online / summary.total) * 100) : 0;
            document.getElementById('health-percentage').textContent = healthPercentage + '%';

            // Clear and rebuild service cards
            container.innerHTML = '';
            
            results.forEach(result => {
                const card = createServiceCard(result);
                container.appendChild(card);
            });

            // Update last updated time
            document.getElementById('last-updated').textContent = 
                `Last updated: ${new Date().toLocaleString()} • Managed by Agentic Reconciliation Engine`;

            button.textContent = '🔄 Refresh Status';
            button.disabled = false;
        }

        function createServiceCard(service) {
            const card = document.createElement('a');
            card.href = service.url;
            card.className = 'service-card';
            card.target = '_blank';
            
            const statusClass = `status-${service.status.status}`;
            const statusText = service.status.status.charAt(0).toUpperCase() + service.status.status.slice(1);
            const responseTime = service.status.responseTime ? `${service.status.responseTime}ms` : 'N/A';
            
            card.innerHTML = `
                <div class="service-header">
                    <div class="service-icon">${service.icon}</div>
                    <div class="service-title">
                        <h3>${service.name}</h3>
                        <p>${service.description}</p>
                    </div>
                    <div class="service-status">
                        <div class="status-dot ${statusClass}"></div>
                        <span>${statusText}</span>
                    </div>
                </div>
                <div class="service-details">
                    <div class="detail-row">
                        <span class="detail-label">URL:</span>
                        <span class="detail-value">${service.url}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Response Time:</span>
                        <span class="detail-value">${responseTime}</span>
                    </div>
                    <div class="detail-row">
                        <span class="detail-label">Type:</span>
                        <span class="detail-value">${service.type}</span>
                    </div>
                </div>
            `;
            
            return card;
        }

        // Auto-refresh every 30 seconds
        setInterval(refreshStatus, 30000);
        
        // Initial load
        refreshStatus();
    </script>
</body>
</html>
