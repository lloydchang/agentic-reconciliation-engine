<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Portal - REAL DATA</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 30px;
            margin-bottom: 20px;
            text-align: center;
        }
        .header h1 {
            color: #333;
            margin: 0;
            font-size: 2.5em;
        }
        .header p {
            color: #666;
            margin: 10px 0;
            font-size: 1.2em;
        }
        .real-data-badge {
            background: #28a745;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            display: inline-block;
            margin: 10px 0;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .service-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
        }
        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        .service-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }
        .service-icon {
            font-size: 2em;
            margin-right: 15px;
        }
        .service-title {
            flex: 1;
        }
        .service-title h3 {
            margin: 0;
            font-size: 1.3em;
            color: #333;
        }
        .service-title p {
            margin: 5px 0 0 0;
            color: #666;
            font-size: 0.9em;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 10px;
        }
        .status-indicator.running { background: #28a745; }
        .status-indicator.offline { background: #dc3545; }
        .status-indicator.unknown { background: #6c757d; }
        .service-status {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.8em;
            font-weight: bold;
        }
        .service-status.running { background: #d4edda; color: #155724; }
        .service-status.offline { background: #f8d7da; color: #721c24; }
        .service-status.unknown { background: #e2e3e5; color: #383d41; }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .metric-card {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #333;
        }
        .metric-label {
            color: #666;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .refresh-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            transition: background 0.3s ease;
        }
        .refresh-btn:hover {
            background: #0056b3;
        }
        .last-updated {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 0.9em;
            margin-top: 20px;
        }
        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Portal</h1>
            <p>Real-time monitoring with ACTUAL system data</p>
            <div class="real-data-badge">🔥 REAL DATA - NO SIMULATION</div>
            <button class="refresh-btn" onclick="loadRealData()">🔄 Refresh Data</button>
        </div>

        <div id="error-container"></div>

        <div class="metrics-grid" id="metrics-grid">
            <!-- Real metrics will be loaded here -->
        </div>

        <div class="services-grid" id="services-grid">
            <!-- Service cards will be loaded here -->
        </div>

        <div class="last-updated" id="last-updated">
            Loading real data...
        </div>
    </div>

    <script>
        const services = [
            {
                name: "AI Dashboard",
                port: 8080,
                url: "http://localhost:8080",
                icon: "🤖",
                description: "Main AI agents monitoring dashboard",
                healthEndpoint: "/health"
            },
            {
                name: "Dashboard API", 
                port: 5004,
                url: "http://localhost:5004",
                icon: "📊",
                description: "Real metrics API for dashboard data",
                healthEndpoint: "/health"
            },
            {
                name: "Portal Frontend",
                port: 9000,
                url: "http://localhost:9000",
                icon: "🌐",
                description: "This portal interface",
                healthEndpoint: null
            }
        ];

        async function checkServiceHealth(service) {
            if (!service.healthEndpoint) {
                return { status: 'running', message: 'Frontend service' };
            }

            try {
                const response = await fetch(service.url + service.healthEndpoint, {
                    method: 'GET',
                    timeout: 5000
                });
                
                if (response.ok) {
                    const data = await response.json();
                    return { 
                        status: 'running', 
                        message: data.status || 'Healthy',
                        version: data.version
                    };
                } else {
                    return { status: 'offline', message: `HTTP ${response.status}` };
                }
            } catch (error) {
                return { status: 'offline', message: error.message };
            }
        }

        async function loadSystemMetrics() {
            try {
                const response = await fetch('http://localhost:5000/api/system/overview');
                if (response.ok) {
                    const data = await response.json();
                    return data;
                }
            } catch (error) {
                console.error('Failed to load system metrics:', error);
            }
            return null;
        }

        async function loadRealData() {
            const errorContainer = document.getElementById('error-container');
            const metricsGrid = document.getElementById('metrics-grid');
            const servicesGrid = document.getElementById('services-grid');
            const lastUpdated = document.getElementById('last-updated');

            errorContainer.innerHTML = '';
            
            // Load system metrics
            const systemData = await loadSystemMetrics();
            
            if (systemData) {
                metricsGrid.innerHTML = `
                    <div class="metric-card">
                        <div class="metric-value">${systemData.agents?.active_agents || 0}</div>
                        <div class="metric-label">Active Agents</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${systemData.kubernetes?.pods || 0}</div>
                        <div class="metric-label">Kubernetes Pods</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${systemData.kubernetes?.services || 0}</div>
                        <div class="metric-label">Services</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-value">${systemData.kubernetes?.nodes || 0}</div>
                        <div class="metric-label">Nodes</div>
                    </div>
                `;
            } else {
                metricsGrid.innerHTML = `
                    <div class="error-message">
                        ⚠️ Unable to connect to real metrics API at http://localhost:5004
                        <br>Make sure the Python API server is running: python3 simple-real-api.py
                    </div>
                `;
            }

            // Check service health
            let servicesHTML = '';
            for (const service of services) {
                const health = await checkServiceHealth(service);
                servicesHTML += `
                    <div class="service-card">
                        <div class="service-header">
                            <div class="service-icon">${service.icon}</div>
                            <div class="service-title">
                                <h3>${service.name}</h3>
                                <p>${service.description}</p>
                            </div>
                            <div class="status-indicator ${health.status}"></div>
                        </div>
                        <div class="service-status ${health.status}">
                            ${health.status.toUpperCase()}: ${health.message}
                        </div>
                        <div style="margin-top: 10px; font-size: 0.85em; color: #666;">
                            <strong>Port:</strong> ${service.port}<br>
                            <strong>URL:</strong> <a href="${service.url}" target="_blank">${service.url}</a>
                        </div>
                    </div>
                `;
            }
            servicesGrid.innerHTML = servicesHTML;

            lastUpdated.innerHTML = `Last updated: ${new Date().toLocaleString()} | 🔧 Managed by Agentic Reconciliation Engine`;
        }

        // Load data on page load
        loadRealData();
        
        // Auto-refresh every 30 seconds
        setInterval(loadRealData, 30000);
    </script>
</body>
</html>
