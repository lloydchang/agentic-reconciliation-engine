<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Infrastructure Portal - Real Status</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .metric-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .metric-label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        .services-section {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .section-title {
            font-size: 1.8em;
            margin-bottom: 20px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .service-card {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 20px;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            position: relative;
        }
        .service-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: #fff;
        }
        .service-card.offline {
            opacity: 0.6;
            background: #f8d7da;
            border-color: #f5c6cb;
        }
        .service-icon {
            width: 40px;
            height: 40px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5em;
        }
        .service-info {
            flex: 1;
        }
        .service-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.2em;
            color: #007bff;
        }
        .service-info p {
            margin: 0 0 5px 0;
            color: #666;
            font-size: 0.9em;
        }
        .service-status {
            font-size: 0.8em;
            color: #666;
        }
        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-left: 10px;
        }
        .status-online { background: #28a745; }
        .status-offline { background: #dc3545; }
        .status-error { background: #ffc107; }
        .refresh-btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            margin-bottom: 20px;
        }
        .refresh-btn:hover {
            background: #0056b3;
        }
        .last-updated {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }
        .activity-feed {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .activity-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        .activity-item:last-child {
            border-bottom: none;
        }
        .activity-icon {
            margin-right: 15px;
            font-size: 1.2em;
        }
        .activity-text {
            flex: 1;
            color: #333;
        }
        .activity-time {
            color: #666;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 AI Infrastructure Portal</h1>
            <p>Real-time monitoring and access to all your AI services</p>
            <button class="refresh-btn" onclick="refreshStatus()">🔄 Refresh Status</button>
        </div>

        <div class="metrics-grid" id="metricsGrid">
            <!-- Metrics will be populated here -->
        </div>

        <div class="services-section">
            <h2 class="section-title">🔧 Service Status</h2>
            <div class="services-grid" id="servicesGrid">
                <!-- Services will be populated here -->
            </div>
        </div>

        <div class="activity-feed">
            <h2 class="section-title">📊 Recent Activity</h2>
            <div id="activityFeed">
                <!-- Activity will be populated here -->
            </div>
        </div>

        <div class="last-updated" id="lastUpdated">
            Last updated: Loading...
        </div>
    </div>

    <script>
        async function fetchServiceStatus() {
            try {
                // For now, simulate API calls to local services
                const services = [
                    { url: 'http://localhost:8080', name: 'AI Dashboard', icon: '🤖', description: 'Main AI agents monitoring dashboard' },
                    { url: 'http://localhost:5000/docs', name: 'Dashboard API', icon: '📊', description: 'RESTful API for dashboard data' },
                    { url: 'http://localhost:3000', name: 'Langfuse', icon: '🔍', description: 'LLM observability platform' },
                    { url: 'http://localhost:5001/docs', name: 'Comprehensive API', icon: '📈', description: 'Advanced analytics API' },
                    { url: 'http://localhost:8082', name: 'Comprehensive Dashboard', icon: '🖥️', description: 'Advanced analytics dashboard' },
                    { url: 'http://localhost:8081/health', name: 'Memory Service', icon: '🧠', description: 'AI memory management service' },
                    { url: 'http://localhost:7233', name: 'Temporal UI', icon: '⏰', description: 'Workflow orchestration interface' }
                ];

                const serviceStatuses = await Promise.allSettled(
                    services.map(async service => {
                        try {
                            const response = await fetch(service.url, { mode: 'no-cors' });
                            return { ...service, status: 'online', error: null };
                        } catch (error) {
                            return { ...service, status: 'offline', error: error.message };
                        }
                    })
                );

                return serviceStatuses.map(result => result.value || result.reason);
            } catch (error) {
                console.error('Error fetching service status:', error);
                return [];
            }
        }

        async function fetchMetrics() {
            // Simulate metrics - in real implementation, this would call your API
            return {
                active_agents: 2,
                running_processes: 2,
                success_rate: 98.5,
                skills_executed: 1247,
                response_time: 1.2,
                last_updated: new Date().toISOString()
            };
        }

        function renderMetrics(metrics) {
            const metricsGrid = document.getElementById('metricsGrid');
            const metricsData = [
                { label: 'Active Agents', value: metrics.active_agents, icon: '🤖' },
                { label: 'Running', value: metrics.running_processes, icon: '⚡' },
                { label: 'Success Rate', value: `${metrics.success_rate}%`, icon: '✅' },
                { label: 'Skills Today', value: metrics.skills_executed.toLocaleString(), icon: '🎯' },
                { label: 'Avg Response', value: `${metrics.response_time}s`, icon: '⏱️' }
            ];

            metricsGrid.innerHTML = metricsData.map(metric => `
                <div class="metric-card">
                    <div class="metric-value">${metric.icon} ${metric.value}</div>
                    <div class="metric-label">${metric.label}</div>
                </div>
            `).join('');
        }

        function renderServices(services) {
            const servicesGrid = document.getElementById('servicesGrid');
            
            servicesGrid.innerHTML = services.map(service => {
                const statusClass = service.status === 'online' ? 'status-online' : 
                                  service.status === 'offline' ? 'status-offline' : 'status-error';
                const cardClass = service.status === 'online' ? '' : 'offline';
                
                return `
                    <a href="${service.url}" class="service-card ${cardClass}" target="_blank">
                        <div class="service-icon">${service.icon}</div>
                        <div class="service-info">
                            <h3>${service.name}</h3>
                            <p>${service.description}</p>
                            <div class="service-status">
                                ${service.status === 'online' ? '🟢 Running' : 
                                  service.status === 'offline' ? '🔴 Offline' : '🟡 Error'}
                                ${service.error ? ` - ${service.error}` : ''}
                            </div>
                        </div>
                        <div class="status-indicator ${statusClass}"></div>
                    </a>
                `;
            }).join('');
        }

        function renderActivity() {
            const activityFeed = document.getElementById('activityFeed');
            const activities = [
                { icon: '🚀', text: 'Cost Optimizer completed analysis for production cluster', time: '2 min ago' },
                { icon: '⚠️', text: 'Security Scanner detected unusual network traffic', time: '5 min ago' },
                { icon: '📊', text: 'Cluster Monitor generated performance report', time: '12 min ago' },
                { icon: '✅', text: 'Deployment Manager successfully rolled out update', time: '18 min ago' },
                { icon: '❌', text: 'Backup Manager failed to connect to storage', time: '25 min ago' }
            ];

            activityFeed.innerHTML = activities.map(activity => `
                <div class="activity-item">
                    <div class="activity-icon">${activity.icon}</div>
                    <div class="activity-text">${activity.text}</div>
                    <div class="activity-time">${activity.time}</div>
                </div>
            `).join('');
        }

        async function refreshStatus() {
            try {
                const [services, metrics] = await Promise.all([
                    fetchServiceStatus(),
                    fetchMetrics()
                ]);

                renderServices(services);
                renderMetrics(metrics);
                renderActivity();
                
                document.getElementById('lastUpdated').textContent = 
                    `Last updated: ${new Date().toLocaleString()}`;
            } catch (error) {
                console.error('Error refreshing status:', error);
            }
        }

        // Initial load and refresh every 30 seconds
        refreshStatus();
        setInterval(refreshStatus, 30000);
    </script>
</body>
</html>
