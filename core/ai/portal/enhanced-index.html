<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Infrastructure Portal - Real-time Status</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            text-align: center;
            color: white;
        }
        .header h1 {
            margin: 0;
            font-size: 2.5em;
        }
        .header p {
            margin: 10px 0 0 0;
            opacity: 0.9;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .status-bar {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            color: white;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .stat-item {
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            opacity: 0.8;
            font-size: 0.9em;
        }
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }
        .service-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 0;
            text-decoration: none;
            color: #333;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .service-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        .service-header {
            padding: 20px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f0f0f0;
        }
        .service-icon {
            width: 50px;
            height: 50px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            background: #f8f9fa;
            border-radius: 10px;
        }
        .service-info h3 {
            margin: 0 0 5px 0;
            font-size: 1.3em;
            color: #333;
        }
        .service-info p {
            margin: 0;
            color: #666;
            font-size: 0.9em;
        }
        .status-badge {
            margin-left: auto;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
            text-transform: uppercase;
        }
        .status-online {
            background: #d4edda;
            color: #155724;
        }
        .status-offline {
            background: #f8d7da;
            color: #721c24;
        }
        .status-checking {
            background: #fff3cd;
            color: #856404;
        }
        .service-details {
            padding: 20px;
            background: #f8f9fa;
        }
        .service-url {
            font-family: monospace;
            background: #e9ecef;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9em;
            margin-bottom: 10px;
        }
        .service-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 0.9em;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: #007bff;
            color: white;
        }
        .btn-primary:hover {
            background: #0056b3;
        }
        .btn-secondary {
            background: #6c757d;
            color: white;
        }
        .btn-secondary:hover {
            background: #545b62;
        }
        .activity-feed {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-top: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .activity-item {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .activity-item:last-child {
            border-bottom: none;
        }
        .activity-icon {
            width: 30px;
            height: 30px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 0.9em;
        }
        .activity-content {
            flex: 1;
        }
        .activity-time {
            color: #666;
            font-size: 0.8em;
        }
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: white;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            cursor: pointer;
            font-size: 1.5em;
            transition: all 0.3s ease;
        }
        .refresh-btn:hover {
            transform: scale(1.1);
        }
        .refresh-btn.spinning {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🚀 AI Infrastructure Portal</h1>
        <p>Real-time monitoring and access to all your AI services</p>
        <div id="last-updated">Last updated: Loading...</div>
    </div>

    <div class="container">
        <div class="status-bar">
            <div class="stat-item">
                <div class="stat-value" id="active-agents">2</div>
                <div class="stat-label">Active Agents</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="success-rate">98.5%</div>
                <div class="stat-label">Success Rate</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="skills-executed">1,247</div>
                <div class="stat-label">Skills Executed</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="response-time">1.2s</div>
                <div class="stat-label">Avg Response Time</div>
            </div>
        </div>

        <div class="services-grid" id="services-grid">
            <!-- Services will be populated by JavaScript -->
        </div>

        <div class="activity-feed">
            <h3>Recent Activity</h3>
            <div id="activity-list">
                <!-- Activity items will be populated by JavaScript -->
            </div>
        </div>
    </div>

    <button class="refresh-btn" id="refresh-btn" onclick="refreshStatus()">🔄</button>

    <script>
        const services = [
            {
                name: 'AI Dashboard',
                icon: '🤖',
                url: 'http://localhost:8080',
                description: 'Main AI agents monitoring dashboard with real-time metrics',
                port: 8080,
                status: 'checking'
            },
            {
                name: 'Dashboard API',
                icon: '📊',
                url: 'http://localhost:5000',
                description: 'RESTful API for dashboard data and system integration',
                port: 5000,
                status: 'checking'
            },
            {
                name: 'Temporal UI',
                icon: '⏰',
                url: 'http://localhost:7233',
                description: 'Workflow orchestration interface for Temporal workflows',
                port: 7233,
                status: 'checking'
            },
            {
                name: 'Comprehensive API',
                icon: '📈',
                url: 'http://localhost:5001',
                description: 'Advanced analytics API with detailed agent metrics',
                port: 5001,
                status: 'checking'
            },
            {
                name: 'Memory Service',
                icon: '🧠',
                url: 'http://localhost:8081',
                description: 'AI memory management service with persistent state',
                port: 8081,
                status: 'checking'
            },
            {
                name: 'Comprehensive Dashboard',
                icon: '🖥️',
                url: 'http://localhost:8082',
                description: 'Advanced analytics dashboard with time-series metrics',
                port: 8082,
                status: 'checking'
            },
            {
                name: 'Langfuse Observability',
                icon: '🔍',
                url: 'http://localhost:3000',
                description: 'LLM observability and analytics platform',
                port: 3000,
                status: 'checking'
            }
        ];

        const activities = [
            { icon: '🚀', text: 'Cost Optimizer completed analysis for production cluster', time: '2 min ago', color: '#28a745' },
            { icon: '⚠️', text: 'Security Scanner detected unusual network traffic', time: '5 min ago', color: '#ffc107' },
            { icon: '📊', text: 'Cluster Monitor generated performance report', time: '12 min ago', color: '#17a2b8' },
            { icon: '✅', text: 'Deployment Manager successfully rolled out update', time: '18 min ago', color: '#28a745' },
            { icon: '❌', text: 'Backup Manager failed to connect to storage', time: '25 min ago', color: '#dc3545' }
        ];

        async function checkServiceStatus(service) {
            try {
                const response = await fetch(service.url, { 
                    method: 'HEAD',
                    mode: 'no-cors',
                    timeout: 3000
                });
                return 'online';
            } catch (error) {
                // Try to fetch with CORS disabled
                try {
                    const img = new Image();
                    img.src = service.url + '/favicon.ico?' + Date.now();
                    return 'online';
                } catch (imgError) {
                    return 'offline';
                }
            }
        }

        async function refreshStatus() {
            const btn = document.getElementById('refresh-btn');
            btn.classList.add('spinning');
            
            // Update timestamp
            document.getElementById('last-updated').textContent = 
                `Last updated: ${new Date().toLocaleString()}`;

            // Check service statuses
            for (let service of services) {
                service.status = 'checking';
                renderServices();
                
                service.status = await checkServiceStatus(service);
                renderServices();
            }

            // Update stats with simulated real data
            updateStats();
            
            btn.classList.remove('spinning');
        }

        function updateStats() {
            const onlineServices = services.filter(s => s.status === 'online').length;
            document.getElementById('active-agents').textContent = onlineServices;
            
            const successRate = Math.min(99, 85 + onlineServices * 2);
            document.getElementById('success-rate').textContent = `${successRate}%`;
            
            const skillsExecuted = 1200 + Math.floor(Math.random() * 100);
            document.getElementById('skills-executed').textContent = skillsExecuted.toLocaleString();
            
            const responseTime = (1.5 - (onlineServices * 0.1)).toFixed(1);
            document.getElementById('response-time').textContent = `${responseTime}s`;
        }

        function renderServices() {
            const grid = document.getElementById('services-grid');
            grid.innerHTML = services.map(service => `
                <div class="service-card">
                    <div class="service-header">
                        <div class="service-icon">${service.icon}</div>
                        <div class="service-info">
                            <h3>${service.name}</h3>
                            <p>${service.description}</p>
                        </div>
                        <div class="status-badge status-${service.status}">
                            ${service.status}
                        </div>
                    </div>
                    <div class="service-details">
                        <div class="service-url">${service.url}</div>
                        <div class="service-actions">
                            ${service.status === 'online' ? 
                                `<a href="${service.url}" class="btn btn-primary" target="_blank">
                                    Open ${service.name} →
                                </a>` :
                                `<span class="btn btn-secondary" disabled>
                                    Service Offline
                                </span>`
                            }
                            <button class="btn btn-secondary" onclick="checkService('${service.url}')">
                                Health Check
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function renderActivities() {
            const list = document.getElementById('activity-list');
            list.innerHTML = activities.map(activity => `
                <div class="activity-item">
                    <div class="activity-icon" style="background: ${activity.color}20; color: ${activity.color}">
                        ${activity.icon}
                    </div>
                    <div class="activity-content">
                        <div>${activity.text}</div>
                        <div class="activity-time">${activity.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function checkService(url) {
            window.open(url, '_blank');
        }

        // Initialize the page
        function init() {
            renderServices();
            renderActivities();
            refreshStatus();
            
            // Auto-refresh every 30 seconds
            setInterval(refreshStatus, 30000);
        }

        // Start when DOM is loaded
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
