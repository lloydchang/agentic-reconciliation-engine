apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: debug
  namespace: flux-system
  annotations:
    overlay.name: "debug"
    overlay.version: "1.0.0"
    overlay.category: "skills"
    overlay.description: "Base debugging skill for distributed AI agent systems"
resources:
  - debug-deployment.yaml
configMapGenerator:
  - name: debug-config
    literals:
      - DEBUG_ENABLED=true
      - DEBUG_LEVEL=info
      - LOG_LEVEL=debug
      - CORRELATION_IDS=true
      - STRUCTURED_LOGGING=true
commonLabels:
  overlay: "debug"
  overlay-type: "skill"
  base-skill: "debug"
  managed-by: "kustomize"
