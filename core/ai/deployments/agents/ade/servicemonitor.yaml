apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: autonomous-decision-engine-metrics
  namespace: ai-infrastructure
  labels:
    app: autonomous-decision-engine
    component: autonomous-agent
    monitoring: prometheus
spec:
  selector:
    matchLabels:
      app: autonomous-decision-engine
  namespaceSelector:
    matchNames:
    - ai-infrastructure
  endpoints:
  - port: http
    interval: 30s
    path: /metrics
    scrapeTimeout: 10s
    honorLabels: true
