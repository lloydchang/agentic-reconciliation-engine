apiVersion: v1
kind: Service
metadata:
  name: standalone-backend-service
  namespace: ai-infrastructure
  labels:
    app: standalone-backend
spec:
  selector:
    app: standalone-backend
  ports:
  - name: http
    port: 8081
    targetPort: 8081
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP
