  "cloud-compliance-auditor/SKILL.md": "---\nname: cloud-compliance-auditor\ndescription: >\n  Automated cloud compliance auditing across AWS, Azure, and GCP. Performs security\n  assessments, policy compliance checks, and generates remediation recommendations.\n  Supports multiple compliance frameworks including CIS, NIST, PCI-DSS, HIPAA, and SOC2.\nmetadata:\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\n  human_gate: PR approval required for changes affecting production resources\n---\n\n# Cloud Compliance Auditor Skill\n\n## Overview\n\nThe Cloud Compliance Auditor skill provides comprehensive automated compliance auditing across multi-cloud environments. It continuously monitors cloud resources for security posture, policy compliance, and generates actionable remediation recommendations.\n\n## Capabilities\n\n### Core Functions\n\n- **Multi-Cloud Security Analysis**: Analyzes AWS Security Hub, Azure Policy, and GCP Security Center findings\n- **Compliance Framework Validation**: Checks against CIS, NIST, PCI-DSS, HIPAA, and SOC2 standards\n- **Automated Remediation**: Generates and applies automated remediation for common compliance violations\n- **Comprehensive Reporting**: Produces detailed compliance reports with executive summaries\n\n### Supported Cloud Providers\n\n- **AWS**: Security Hub, Config, GuardDuty, IAM, CloudTrail\n- **Azure**: Security Center, Policy, Sentinel, Azure AD\n- **GCP**: Security Command Center, Cloud Asset Inventory, IAM audit logs\n\n### Compliance Frameworks\n\n- **CIS Controls**: Center for Internet Security benchmarks\n- **NIST**: National Institute of Standards and Technology frameworks\n- **PCI-DSS**: Payment Card Industry Data Security Standard\n- **HIPAA**: Health Insurance Portability and Accountability Act\n- **SOC2**: Service Organization Control 2\n\n## Usage\n\n### Basic Compliance Check\n\n```bash\n# Run compliance audit across all clouds\nskill invoke cloud-compliance-auditor audit --framework CIS --severity HIGH\n\n# Audit specific AWS account\nskill invoke cloud-compliance-auditor aws-audit --account-id 123456789012 --region us-east-1\n\n# Generate compliance report\nskill invoke cloud-compliance-auditor report --framework NIST --format PDF\n```\n\n### Automated Remediation\n\n```bash\n# Apply automated remediation (dry-run by default)\nskill invoke cloud-compliance-auditor remediate --finding-id aws-001 --dry-run\n\n# Apply remediation with confirmation\nskill invoke cloud-compliance-auditor remediate --finding-id azure-002 --confirm\n```\n\n### Continuous Monitoring\n\n```bash\n# Enable continuous compliance monitoring\nskill invoke cloud-compliance-auditor monitor --interval 1h --alert-threshold 5\n\n# Set up compliance alerts\nskill invoke cloud-compliance-auditor alerts --email admin@company.com --slack #compliance\n```\n\n## Configuration\n\n### Required Environment Variables\n\n```bash\n# AWS Credentials\nAWS_ACCESS_KEY_ID=your_access_key\nAWS_SECRET_ACCESS_KEY=your_secret_key\nAWS_DEFAULT_REGION=us-east-1\n\n# Azure Credentials\nAZURE_CLIENT_ID=your_client_id\nAZURE_CLIENT_SECRET=your_client_secret\nAZURE_TENANT_ID=your_tenant_id\nAZURE_SUBSCRIPTION_ID=your_subscription_id\n\n# GCP Credentials\nGOOGLE_APPLICATION_CREDENTIALS=/path/to/service-account.json\nGCP_PROJECT_ID=your_project_id\nGCP_ORGANIZATION_ID=your_organization_id\n```\n\n### Skill Configuration\n\n```yaml\n# .claude/skills/cloud-compliance-auditor/config.yaml\ncompliance_frameworks:\n  - CIS\n  - NIST\n  - PCI-DSS\n\nseverity_thresholds:\n  critical: immediate_action\n  high: within_24h\n  medium: within_72h\n  low: within_7d\n\nremediation:\n  auto_apply: false\n  dry_run: true\n  approval_required: true\n\nreporting:\n  schedule: \"0 9 * * 1\"  # Weekly on Monday at 9 AM\n  recipients:\n    - email: compliance@company.com\n    - slack: #compliance-alerts\n  formats:\n    - JSON\n    - PDF\n    - HTML\n```\n\n## MCP Server Integration\n\nThis skill integrates with the `cloud-compliance` MCP server for enhanced capabilities:\n\n### Available MCP Tools\n\n- `aws_security_hub_analysis`: Analyze AWS Security Hub findings\n- `azure_policy_compliance`: Check Azure Policy compliance\n- `gcp_security_assessment`: Assess GCP Security Center findings\n- `multi_cloud_compliance_report`: Generate comprehensive reports\n- `automated_remediation_suggestions`: Get remediation recommendations\n\n### MCP Usage Example\n\n```javascript\n// Using the MCP server directly\nconst result = await mcp.call('aws_security_hub_analysis', {\n  region: 'us-east-1',\n  severity: 'HIGH',\n  compliance_standard: 'CIS'\n});\n```\n\n## Implementation Details\n\n### Architecture\n\n```\n\u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502   Cloud APIs    \u2502    \u2502 Compliance Engine\u2502    \u2502  Reporting      \u2502\n\u2502                 \u2502    \u2502                  \u2502    \u2502                 \u2502\n\u2502 \u2022 AWS SDK       \u2502\u2500\u2500\u2500\u25B6\u2502 \u2022 Rule Engine    \u2502\u2500\u2500\u2500\u25B6\u2502 \u2022 PDF Generator \u2502\n\u2502 \u2022 Azure SDK     \u2502    \u2502 \u2022 Policy Checker \u2502    \u2502 \u2022 Email Sender  \u2502\n\u2502 \u2022 GCP SDK       \u2502    \u2502 \u2022 Risk Scoring   \u2502    \u2502 \u2022 Slack Bot     \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### Compliance Rules\n\nThe skill uses a comprehensive rule set covering:\n\n1. **Identity and Access Management**\n   - MFA enforcement\n   - Least privilege access\n   - Access key rotation\n   - Privileged account monitoring\n\n2. **Data Protection**\n   - Encryption at rest\n   - Encryption in transit\n   - Data classification\n   - Backup and recovery\n\n3. **Network Security**\n   - Security group rules\n   - Network segmentation\n   - DDoS protection\n   - DNS security\n\n4. **Monitoring and Logging**\n   - Audit trail completeness\n   - Log retention policies\n   - Real-time monitoring\n   - Alert configuration\n\n### Risk Scoring\n\nEach finding is scored based on:\n\n- **Impact**: Potential business impact\n- **Likelihood**: Probability of exploitation\n- **Detectability**: Ease of detection\n- **Compliance**: Regulatory requirements\n\nRisk scores range from 1-100, with corresponding severity levels.\n\n## Best Practices\n\n### 1. Regular Compliance Scans\n- Schedule compliance scans at least weekly\n- Run additional scans after major infrastructure changes\n- Use different severity thresholds for different environments\n\n### 2. Remediation Strategy\n- Start with critical and high-severity findings\n- Use dry-run mode before applying remediation\n- Document all remediation actions\n\n### 3. Reporting and Communication\n- Share compliance reports with stakeholders\n- Track compliance trends over time\n- Maintain an audit trail of all compliance activities\n\n### 4. Continuous Improvement\n- Review and update compliance rules regularly\n- Incorporate new regulatory requirements\n- Learn from compliance incidents\n\n## Troubleshooting\n\n### Common Issues\n\n**Cloud API Authentication Errors**\n```bash\n# Verify credentials\naws sts get-caller-identity\naz account show\ngcloud auth list\n```\n\n**Missing Compliance Findings**\n```bash\n# Check cloud service configuration\nskill invoke cloud-compliance-auditor check-config --provider aws\nskill invoke cloud-compliance-auditor check-config --provider azure\nskill invoke cloud-compliance-auditor check-config --provider gcp\n```\n\n**Report Generation Failures**\n```bash\n# Verify reporting configuration\nskill invoke cloud-compliance-auditor test-report --format PDF\nskill invoke cloud-compliance-auditor test-email --recipient test@company.com\n```\n\n### Debug Mode\n\n```bash\n# Enable debug logging\nexport CLOUD_COMPLIANCE_DEBUG=true\nskill invoke cloud-compliance-auditor audit --debug\n```\n\n## Integration Examples\n\n### CI/CD Pipeline Integration\n\n```yaml\n# .github/workflows/compliance-check.yml\nname: Compliance Check\non: [push, pull_request]\n\njobs:\n  compliance:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v2\n      - name: Run Compliance Audit\n        run: |\n          skill invoke cloud-compliance-auditor audit \\\n            --framework CIS \\\n            --severity HIGH \\\n            --output compliance-report.json\n      - name: Upload Results\n        uses: actions/upload-artifact@v2\n        with:\n          name: compliance-report\n          path: compliance-report.json\n```\n\n### Slack Integration\n\n```javascript\n// Slack bot integration\nconst complianceResults = await skill.invoke('cloud-compliance-auditor', {\n  action: 'audit',\n  framework: 'CIS',\n  severity: 'HIGH'\n});\n\nif (complianceResults.critical_issues > 0) {\n  await slack.postMessage({\n    channel: '#compliance-alerts',\n    text: `\U0001F6A8 ${complianceResults.critical_issues} critical compliance issues detected!`\n  });\n}\n```\n\n## Performance Considerations\n\n### Optimization Tips\n\n1. **Batch Processing**: Process multiple resources in parallel\n2. **Caching**: Cache compliance results for unchanged resources\n3. **Incremental Scans**: Only scan changed resources since last scan\n4. **Rate Limiting**: Respect cloud API rate limits\n\n### Resource Usage\n\n- **Memory**: ~500MB for large-scale compliance scans\n- **CPU**: Moderate usage during rule processing\n- **Network**: High usage during cloud API calls\n- **Storage**: ~100MB for compliance data and reports\n\n## Security Considerations\n\n### Data Protection\n\n- All cloud credentials are encrypted at rest\n- Compliance data is stored in secure, access-controlled storage\n- Sensitive findings are redacted in reports\n\n### Access Control\n\n- Principle of least privilege for cloud API access\n- Role-based access for compliance reports\n- Audit logging for all compliance activities\n\n## Version History\n\n### v1.0.0\n- Initial release with AWS, Azure, and GCP support\n- CIS and NIST compliance frameworks\n- Basic reporting capabilities\n\n### v1.1.0\n- Added PCI-DSS and HIPAA frameworks\n- Enhanced remediation capabilities\n- Improved reporting formats\n\n### v1.2.0\n- Multi-cloud compliance reports\n- Automated remediation suggestions\n- Slack and email integration\n\n## Support and Contributing\n\n### Getting Help\n\n- Documentation: `/docs/cloud-compliance-auditor.md`\n- Examples: `/examples/cloud-compliance/`\n- Community: `#cloud-compliance` Slack channel\n\n### Contributing\n\n1. Fork the repository\n2. Create a feature branch\n3. Add tests for new functionality\n4. Submit a pull request\n\n### License\n\nThis skill is licensed under the MIT License. See LICENSE file for details.\n"
  "code-review-automation/SKILL.md": |
    ---
    name: code-review-automation
    description: >
      Automates code review processes using AI to analyze pull requests, suggest improvements,
      check for security vulnerabilities, and enforce coding standards. Provides intelligent
      code analysis and automated feedback on code changes.
    metadata:
      risk_level: medium
      autonomy: conditional
      layer: temporal
      human_gate: PR approval required for automated merges
      cost_limit: 120
      execution_model: "local:llama.cpp"
      planning_model: "local:llama.cpp"
      cost_management:
        token_limit: 120
        cost_threshold: 0.12 # USD
        model_preference: "local:llama.cpp"
      execution:
        background_enabled: true
        parallel_capable: true
        notification_channels: ["github", "slack"]
      dependencies:
        required_skills: []
        conflicts_with: []
        order_constraints: []
    ---

    # Code Review Automation Skill

    This skill automates the code review process using AI to provide intelligent analysis, security checks, and quality feedback on pull requests.

    ## When to Use

    Use this skill when:
    - Pull requests need automated code review
    - Security vulnerability scanning is required
    - Code quality and style enforcement is needed
    - Performance analysis should be automated
    - Documentation and testing completeness checks are needed

    ## What This Skill Does

    ### 1. Code Analysis
    - Analyzes code changes in pull requests
    - Identifies potential bugs and issues
    - Checks for code style and formatting violations
    - Evaluates code complexity and maintainability
    - Reviews architectural decisions and patterns

    ### 2. Security Scanning
    - Scans for common security vulnerabilities
    - Checks for hardcoded secrets and credentials
    - Validates input sanitization and output encoding
    - Reviews authentication and authorization logic
    - Identifies dependency security issues

    ### 3. Performance Analysis
    - Identifies performance bottlenecks
    - Reviews algorithm efficiency
    - Checks resource usage patterns
    - Analyzes database query optimization
    - Evaluates caching strategies

    ### 4. Testing Validation
    - Checks test coverage for changed code
    - Validates test quality and effectiveness
    - Reviews test structure and organization
    - Identifies missing edge case tests
    - Suggests additional test scenarios

    ### 5. Documentation Review
    - Validates code documentation completeness
    - Checks API documentation accuracy
    - Reviews inline comments and explanations
    - Validates README and guide updates
    - Ensures changelog entries are present

    ### 6. Integration Checks
    - Validates integration with existing systems
    - Checks API compatibility and breaking changes
    - Reviews configuration and deployment changes
    - Validates monitoring and logging additions
    - Checks backward compatibility

    ## Implementation Details

    ### Required Tools and Access
    - GitHub API access for pull request analysis
    - Code analysis tools (SonarQube, ESLint, etc.)
    - Security scanning tools (Bandit, Snyk, etc.)
    - Test coverage tools (Coverage.py, Jest, etc.)
    - Documentation generation tools

    ### Configuration Requirements
    ```yaml
    code_review_automation:
      enabled_checks:
        - security_scan
        - code_quality
        - performance_analysis
        - test_coverage
        - documentation
      thresholds:
        security_score: 8.0
        quality_score: 7.5
        coverage_threshold: 80
        complexity_limit: 10
      notification_settings:
        github_comments: true
        slack_alerts: true
        email_reports: false
      exclusions:
        - "test/**"
        - "docs/**"
        - "*.md"
      custom_rules:
        - "no_hardcoded_secrets"
        - "proper_error_handling"
        - "api_versioning"
    ```

    ### Execution Steps

    1. **Pre-flight Checks**
       - Validate GitHub API access
       - Check pull request permissions
       - Verify analysis tools availability

    2. **Code Discovery**
       - Run: `scripts/discover-changes.sh`
       - Output: `code-changes.json`

    3. **Security Analysis**
       - Run: `scripts/security-scan.sh`
       - Output: `security-report.json`

    4. **Quality Analysis**
       - Run: `scripts/quality-check.sh`
       - Output: `quality-report.json`

    5. **Performance Analysis**
       - Run: `scripts/performance-analysis.sh`
       - Output: `performance-report.json`

    6. **Testing Analysis**
       - Run: `scripts/test-analysis.sh`
       - Output: `test-report.json`

    7. **Documentation Review**
       - Run: `scripts/documentation-check.sh`
       - Output: `documentation-report.json`

    8. **Report Generation**
       - Run: `scripts/generate-report.sh`
       - Output: `review-summary.md`

    9. **Comment Posting**
       - Run: `scripts/post-comments.sh`
       - Output: GitHub PR comments

    ## Success Criteria

    - All security vulnerabilities are identified and reported
    - Code quality meets defined thresholds
    - Test coverage meets minimum requirements
    - Performance issues are highlighted
    - Documentation is complete and accurate
    - Review comments are helpful and actionable

    ## Error Handling

    ### Common Issues
    - GitHub API rate limiting
    - Analysis tool failures
    - Large code base timeouts
    - Missing test files
    - Documentation parsing errors

    ### Recovery Procedures
    - API rate limiting: Implement exponential backoff
    - Tool failures: Fall back to alternative analysis methods
    - Timeouts: Split analysis into smaller chunks
    - Missing tests: Flag for manual review
    - Parsing errors: Log warnings and continue

    ## Monitoring and Observability

    ### Metrics to Track
    - Number of PRs reviewed
    - Security issues found
    - Quality scores distribution
    - Test coverage improvements
    - Review completion time
    - Developer satisfaction scores

    ### Logging Requirements
    - Detailed analysis logs
    - Security vulnerability reports
    - Quality assessment details
    - Performance bottleneck identification
    - Error and warning messages

    ## Security Considerations

    - Secure handling of sensitive code
    - Protection of API credentials
    - Secure storage of analysis results
    - Audit trail for all reviews
    - Compliance with security policies

    ## Integration Points

    - **Version Control**: GitHub, GitLab, Bitbucket
    - **CI/CD**: Jenkins, GitHub Actions, GitLab CI
    - **Code Analysis**: SonarQube, CodeClimate, Codacy
    - **Security Tools**: Snyk, OWASP ZAP, Bandit
    - **Testing**: Jest, PyTest, Coverage.py

    ## References

    Load these files when needed:
    - `scripts/discover-changes.sh` - Code discovery script
    - `scripts/security-scan.sh` - Security scanning script
    - `scripts/quality-check.sh` - Code quality analysis script
    - `scripts/performance-analysis.sh` - Performance analysis script
    - `references/coding-standards.md` - Coding standards documentation
    - `references/security-policies.md` - Security policy requirements
  "compliance-validation/SKILL.md": |
    ---
    name: compliance-validation
    description: >
      Validates pull requests against regulatory, security, and organizational compliance requirements. Ensures changes meet GDPR, HIPAA, PCI-DSS, and other compliance frameworks.
    metadata:
      risk_level: low
      autonomy: fully_auto
      layer: temporal
      human_gate: None - informational only
      cost_management:
        token_limit: 350
        cost_threshold: 0.10
        model_preference: "local:llama.cpp"
    ---

    # Compliance Validation Skill

    This skill performs automated compliance validation on pull requests, ensuring changes adhere to regulatory requirements, security standards, and organizational policies.

    ## Compliance Frameworks Supported

    ### 1. Data Protection & Privacy
    - **GDPR**: EU General Data Protection Regulation compliance
    - **CCPA**: California Consumer Privacy Act requirements
    - **LGPD**: Brazilian General Data Protection Law
    - **PIPEDA**: Canadian Personal Information Protection and Electronic Documents Act

    ### 2. Healthcare & Medical
    - **HIPAA**: Health Insurance Portability and Accountability Act
    - **HITECH**: Health Information Technology for Economic and Clinical Health Act
    - **HITRUST**: Healthcare security framework
    - **FDA 21 CFR Part 11**: Electronic records and signatures

    ### 3. Financial Services
    - **PCI-DSS**: Payment Card Industry Data Security Standard
    - **SOX**: Sarbanes-Oxley Act compliance
    - **GLBA**: Gramm-Leach-Bliley Act privacy requirements
    - **FFIEC**: Federal Financial Institutions Examination Council guidelines

    ### 4. Industry-Specific
    - **NIST Cybersecurity Framework**: National Institute of Standards and Technology
    - **ISO 27001**: Information security management systems
    - **CIS Controls**: Center for Internet Security critical security controls
    - **MITRE ATT&CK**: Adversarial tactics, techniques, and common knowledge

    ## Validation Categories

    ### 1. Data Handling Compliance
    - **Data Classification**: Proper labeling of sensitive data
    - **Retention Policies**: Data lifecycle management compliance
    - **Cross-Border Transfers**: International data transfer restrictions
    - **Consent Management**: User consent and preference handling

    ### 2. Security Controls
    - **Access Controls**: Role-based access and least privilege
    - **Encryption Requirements**: Data at rest and in transit encryption
    - **Audit Logging**: Comprehensive activity logging and monitoring
    - **Incident Response**: Breach notification and response procedures

    ### 3. Code Quality Standards
    - **Secure Coding**: OWASP Top 10 and CWE compliance
    - **Dependency Management**: Third-party library security and licensing
    - **Configuration Security**: Secure defaults and configuration validation
    - **API Security**: RESTful API security and authentication

    ### 4. Operational Compliance
    - **Change Management**: Proper change approval and documentation
    - **Risk Assessment**: Security and privacy impact assessments
    - **Vendor Management**: Third-party vendor compliance verification
    - **Training Requirements**: Security awareness and compliance training

    ## Automated Validation Rules

    ### GDPR Compliance Checks
    ```yaml
    gdpr_checks:
      - rule: "data_processing_inventory"
        description: "Verify data processing activities are documented"
        severity: "high"
      - rule: "lawful_basis"
        description: "Ensure lawful basis for data processing"
        severity: "critical"
      - rule: "data_subject_rights"
        description: "Implement data subject access and deletion rights"
        severity: "high"
      - rule: "breach_notification"
        description: "Verify 72-hour breach notification capability"
        severity: "critical"
    ```

    ### HIPAA Security Rule Validation
    ```yaml
    hipaa_checks:
      - rule: "access_controls"
        description: "Technical access controls for ePHI"
        severity: "critical"
      - rule: "audit_controls"
        description: "Audit logs for ePHI access and modifications"
        severity: "high"
      - rule: "integrity_protection"
        description: "Data integrity and authentication mechanisms"
        severity: "high"
      - rule: "transmission_security"
        description: "Secure transmission of ePHI"
        severity: "critical"
    ```

    ### PCI-DSS Requirements
    ```yaml
    pci_dss_checks:
      - rule: "cardholder_data_protection"
        description: "Never store sensitive authentication data"
        severity: "critical"
      - rule: "encryption_standards"
        description: "Use strong cryptography and security protocols"
        severity: "high"
      - rule: "access_control_measures"
        description: "Restrict access to cardholder data"
        severity: "critical"
      - rule: "network_security"
        description: "Implement network segmentation and firewalls"
        severity: "high"
    ```

    ## Integration Points

    ### Compliance Dashboards
    - **Real-time Status**: Compliance posture visualization
    - **Violation Tracking**: Historical compliance issues and resolutions
    - **Audit Reports**: Automated compliance reporting for auditors
    - **Risk Scoring**: Quantitative compliance risk assessment

    ### Notification Systems
    - **Compliance Alerts**: Immediate notification of violations
    - **Audit Notifications**: Upcoming audit and review reminders
    - **Remediation Tracking**: Compliance issue resolution monitoring
    - **Certification Renewals**: Compliance certification expiration tracking

    ## Usage Examples

    ### Healthcare PR Validation
    ```yaml
    workflows:
      hipaa-pr-validation:
        on: pull_request
        skills:
          - compliance-validation
        inputs:
          frameworks: ["hipaa", "gdpr"]
          scope: "healthcare_data"
          severity_threshold: "medium"
    ```

    ### Financial Services Compliance
    ```yaml
    workflows:
      financial-compliance:
        triggers:
          - files_changed: ["src/payment/**", "config/security/**"]
        skills:
          - compliance-validation
        inputs:
          frameworks: ["pci_dss", "sox"]
          environment: "production"
          require_approval: true
    ```

    ### Multi-Framework Validation
    ```yaml
    workflows:
      enterprise-compliance:
        on: pull_request
        steps:
          - skill: compliance-validation
            inputs:
              frameworks: ["gdpr", "ccpa", "iso27001", "nist"]
              custom_rules: "company-security-policy.yaml"
          - skill: risk-assessment
          - gate: compliance_approved
            condition: violations_critical == 0 && violations_high <= 2
    ```

    ## Output Format

    ```json
    {
      "summary": {
        "overall_compliance": "compliant",
        "frameworks_checked": ["gdpr", "hipaa", "pci_dss"],
        "total_violations": 3,
        "critical_violations": 0,
        "blocking_issues": false
      },
      "framework_results": {
        "gdpr": {
          "status": "compliant",
          "score": 95,
          "violations": [
            {
              "rule": "data_retention_policy",
              "severity": "medium",
              "description": "Data retention period exceeds recommended limits",
              "recommendation": "Implement automated data purging after retention period"
            }
          ]
        },
        "hipaa": {
          "status": "compliant",
          "score": 98,
          "violations": []
        },
        "pci_dss": {
          "status": "warning",
          "score": 87,
          "violations": [
            {
              "rule": "encryption_key_rotation",
              "severity": "high",
              "description": "Encryption keys not rotated within required timeframe",
              "recommendation": "Implement automated key rotation policy"
            }
          ]
        }
      },
      "recommendations": [
        {
          "framework": "gdpr",
          "priority": "medium",
          "action": "update_data_retention_policy",
          "description": "Review and update data retention schedules"
        },
        {
          "framework": "pci_dss",
          "priority": "high",
          "action": "implement_key_rotation",
          "description": "Deploy automated encryption key rotation"
        }
      ],
      "audit_trail": {
        "validation_timestamp": "2024-01-15T10:30:00Z",
        "validator_version": "2.1.0",
        "rules_version": "2024.Q1",
        "scan_duration_seconds": 45
      }
    }
    ```

    ## Configuration Options

    ### Framework-Specific Settings
    ```yaml
    compliance_config:
      gdpr:
        data_classification_required: true
        consent_management_check: true
        breach_notification_test: false
      hipaa:
        ephi_detection_enabled: true
        audit_log_verification: true
        encryption_validation: true
      pci_dss:
        scope_limitation: "cardholder_environment"
        quarterly_scanning: true
        penetration_testing: "annual"
    ```

    ### Custom Compliance Rules
    ```yaml
    custom_rules:
      - name: "company_data_handling"
        description: "Internal data handling and classification policy"
        rules:
          - pattern: "sensitive_data"
            action: "flag_for_review"
            severity: "medium"
          - pattern: "pii_fields"
            action: "require_encryption"
            severity: "high"
    ```

    ## Violation Remediation

    ### Automated Fixes
    - **Configuration Updates**: Automatic security configuration corrections
    - **Documentation Updates**: Compliance documentation generation
    - **Alert Configuration**: Monitoring and alerting setup
    - **Access Control**: Permission and role adjustments

    ### Manual Review Requirements
    - **Policy Exceptions**: Documented exceptions with approval
    - **Risk Acceptances**: Formal risk acceptance documentation
    - **Compensating Controls**: Alternative security measures
