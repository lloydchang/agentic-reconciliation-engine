  "prioritize-alerts/SKILL.md": "---\nname: prioritize-alerts\ndescription: Prioritizes and categorizes alerts from monitoring systems across multi-cloud environments, applies intelligent filtering and escalation rules, and provides actionable alert summaries. Use when managing alert floods, improving incident response times, or implementing alert management strategies.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\ncompatibility: Requires Python 3.8+, cloud provider CLI tools (AWS CLI, Azure CLI, gcloud), and access to multi-cloud monitoring systems\nallowed-tools: Bash Read Write Grep\n---\n\n# Alert Prioritizer \u2014 Multi-Cloud Enterprise Automation\n\n## Purpose\nEnterprise-grade automation solution for alert prioritizer operations across AWS, Azure, GCP, and on-premise environments to maximize operational efficiency while maintaining security and compliance standards.\n\n## When to Use\n- **Alert Floods**: When dealing with high volumes of alerts from monitoring systems\n- **Incident Response**: When quickly identifying the most critical alerts during incidents\n- **Noise Reduction**: When filtering out false positives and low-priority alerts\n- **Multi-Source Alerts**: When consolidating alerts from different monitoring systems\n- **On-Call Support**: When helping on-call engineers focus on important issues\n- **Alert Fatigue Prevention**: When reducing alert fatigue for engineering teams\n- **Escalation Management**: When automatically escalating critical alerts to appropriate teams\n\n## Gotchas\n\n### Common Pitfalls\n- **Over-Filtering**: Aggressive filtering may cause important alerts to be missed\n- **Context Loss**: Alert prioritization may lose important context about the issue\n- **Team Silos**: Different teams may have different priorities for the same alerts\n- **Alert Correlation**: Related alerts may not be properly correlated, causing duplication\n\n### Edge Cases\n- **Cascading Failures**: Single issues may trigger cascading alerts across systems\n- **Maintenance Windows**: Alerts during maintenance should be deprioritized or suppressed\n- **Third-Party Outages**: External service issues may generate many related alerts\n- **Multi-Region Issues**: Global issues may generate region-specific alerts\n\n### Performance Issues\n- **Alert Volume**: High alert volumes (1000+/minute) can overwhelm processing systems\n- **Real-time Requirements**: Alert prioritization must happen in near real-time\n- **Memory Usage**: Alert correlation requires keeping alerts in memory for analysis\n- **Network Latency**: Distributed alert sources may have network delays\n\n### Security Considerations\n- **Sensitive Information**: Alerts may contain sensitive system information or PII\n- **Access Control**: Alert configuration and prioritization rules should be restricted\n- **Audit Requirements**: All alert prioritization decisions must be logged\n- **Data Privacy**: Alert content may be subject to privacy regulations\n\n### Troubleshooting\n- **Missing Alerts**: Some alerts may not reach the prioritization system\n- **Incorrect Priorities**: Prioritization logic may misclassify alert severity\n- **Integration Failures**: Monitoring system integrations may fail or be unreliable\n- **Rule Conflicts**: Multiple prioritization rules may conflict with each other\n\n## Inputs\n- **operation**: Operation type (required)\n- **targetResource**: Target resource identifier (required)\n- **cloudProvider**: Cloud provider - `aws|azure|gcp|onprem|all` (optional, default: `all`)\n- **parameters**: Operation-specific parameters (optional)\n- **environment**: Target environment (optional, default: `production`)\n- **dryRun**: Dry run mode (optional, default: `true`)\n\n## Process\n1. **Cloud Provider Detection**: Identify target cloud providers and environments\n2. **Input Validation**: Comprehensive parameter validation and security checks\n3. **Multi-Cloud Context Analysis**: Analyze current state across all providers\n4. **Operation Planning**: Generate optimized execution plan\n5. **Safety Assessment**: Risk analysis and impact evaluation across providers\n6. **Execution**: Perform operations with monitoring and validation\n7. **Results Analysis**: Process results and generate reports\n\n## Outputs\n- **Operation Results**: Detailed execution results and status per provider\n- **Compliance Reports**: Validation and compliance status across environments\n- **Performance Metrics**: Operation performance and efficiency metrics by provider\n- **Recommendations**: Optimization suggestions and next steps\n- **Audit Trail**: Complete operation history for compliance across all providers\n\n## Environment\n- **AWS**: EKS, EC2, Lambda, CloudWatch, IAM, S3\n- **Azure**: AKS, VMs, Functions, Monitor, Azure AD\n- **GCP**: GKE, Compute Engine, Cloud Functions, Cloud Monitoring\n- **On-Premise**: Kubernetes clusters, VMware, OpenStack, Prometheus\n- **Multi-Cloud Tools**: Terraform, Ansible, Crossplane, Cluster API\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **Cloud SDKs**: boto3, azure-sdk, google-cloud\n- **Kubernetes**: kubernetes client for cluster operations\n- **Multi-Cloud Libraries**: terraform-python, ansible-python\n\n## Scripts\n- `core/scripts/automation/alert-prioritizer.py`: Main automation implementation\n- `core/scripts/automation/alert-prioritizer_handler.py`: Cloud-specific operations\n- `core/scripts/automation/multi_cloud_orchestrator.py`: Cross-provider coordination\n\n## Trigger Keywords\nalert, prioritizer, automation, enterprise, multi-cloud, aws, azure, gcp, onprem\n\n## Human Gate Requirements\n- **Production changes**: Production environment operations require approval\n- **High-impact operations**: Critical operations require review\n- **Security changes**: Security modifications need validation\n\n## Enterprise Features\n- **Multi-tenant Support**: Isolated operations per tenant\n- **Role-based Access Control**: Enterprise IAM integration\n- **Audit Logging**: Complete audit trail for compliance\n- **Performance Monitoring**: SLA tracking and metrics\n- **Security Hardening**: Encryption and compliance standards\n- **Dynamic Code Generation**: Agents can modify logic dynamically\n- **Cross-Cloud Orchestration**: Coordinated operations across providers\n\n## References\n\nLoad these files when needed:\n- `scripts/alert-processor.py` - Core alert ingestion and processing logic\n- `scripts/prioritization-engine.py` - Alert scoring and ranking algorithms\n- `references/alert-taxonomy.md` - Alert classification and severity guidelines\n- `assets/escalation-rules.yaml` - Escalation policies and team assignments\n- `examples/alert-dashboards/` - Sample alert management dashboards and reports\n"
  "progress-reporter/SKILL.md": "---\nname: progress-reporter\ndescription: >\n  Automated progress reporting and stakeholder communication system that generates\n  comprehensive project status reports, tracks milestones, and provides executive\n  summaries. Integrates with project management tools and communication platforms.\nmetadata:\n  risk_level: low\n  autonomy: high\n  layer: temporal\n  human_gate: Executive approval required for board-level reports\n---\n\n# Progress Reporter Skill\n\n## Overview\n\nThe Progress Reporter skill provides automated project progress reporting and stakeholder communication capabilities. It integrates with project management tools, development pipelines, and communication platforms to generate comprehensive status reports, track milestones, and provide executive summaries.\n\n## Capabilities\n\n### Core Functions\n\n- **Automated Report Generation**: Creates comprehensive project status reports\n- **Milestone Tracking**: Monitors project milestones and deliverables\n- **Executive Summaries**: Generates high-level summaries for leadership\n- **Stakeholder Communication**: Distributes reports through multiple channels\n- **Trend Analysis**: Analyzes project trends and performance metrics\n- **Risk Assessment**: Identifies and reports project risks and issues\n\n### Integration Sources\n\n- **Project Management**: Jira, Asana, Trello, Monday.com\n- **Development**: GitHub, GitLab, Bitbucket, CI/CD pipelines\n- **Communication**: Slack, Microsoft Teams, Email\n- **Documentation**: Confluence, Notion, SharePoint\n- **Metrics**: Custom dashboards, analytics platforms\n\n### Report Types\n\n1. **Daily Standup Reports**: Quick status updates for team alignment\n2. **Weekly Progress Reports**: Detailed weekly progress and planning\n3. **Monthly Executive Reports**: High-level summaries for leadership\n4. **Milestone Reports**: Specific milestone achievement reports\n5. **Risk Assessment Reports**: Risk analysis and mitigation strategies\n6. **Performance Metrics Reports**: KPI tracking and trend analysis\n\n## Usage\n\n### Basic Report Generation\n\n```bash\n# Generate daily standup report\nskill invoke progress-reporter generate --type daily --team backend\n\n# Generate weekly progress report\nskill invoke progress-reporter generate --type weekly --project web-platform --include-metrics\n\n# Generate executive summary\nskill invoke progress-reporter generate --type executive --time-period Q1-2024 --format PDF\n```\n\n### Milestone Tracking\n\n```bash\n# Track milestone progress\nskill invoke progress-reporter track-milestone --milestone \"Q1 Launch\" --project web-platform\n\n# Generate milestone report\nskill invoke progress-reporter milestone-report --milestone \"Q1 Launch\" --include-risks\n\n# Update milestone status\nskill invoke progress-reporter update-milestone --milestone \"Q1 Launch\" --status completed --completion-date 2024-03-31\n```\n\n### Stakeholder Communication\n\n```bash\n# Distribute report to stakeholders\nskill invoke progress-reporter distribute --report-id report-123 --channels slack,email\n\n# Send executive summary\nskill invoke progress-reporter executive-summary --period monthly --recipients exec-team@company.com\n\n# Schedule automated reports\nskill invoke progress-reporter schedule --type weekly --every monday --recipients project-team@company.com\n```\n\n### Trend Analysis\n\n```bash\n# Analyze project trends\nskill invoke progress-reporter analyze-trends --project web-platform --period 90d\n\n# Generate performance metrics\nskill invoke progress-reporter metrics --project web-platform --kpi velocity,quality,cost\n\n# Compare with previous periods\nskill invoke progress-reporter compare --project web-platform --period current --vs previous\n```\n\n### Risk Assessment\n\n```bash\n# Generate risk assessment\nskill invoke progress-reporter risk-assessment --project web-platform --include-mitigation\n\n# Update risk status\nskill invoke progress-reporter update-risk --risk-id risk-001 --severity high --mitigation \"Added monitoring\"\n\n# Generate risk dashboard\nskill invoke progress-reporter risk-dashboard --project web-platform --format HTML\n```\n\n## Configuration\n\n### Required Environment Variables\n\n```bash\n# Project Management Systems\nJIRA_URL=https://your-company.atlassian.net\nJIRA_USERNAME=your_email@company.com\nJIRA_API_TOKEN=your_jira_api_token\n\nASANA_API_KEY=your_asana_api_key\nASANA_WORKSPACE_ID=your_workspace_id\n\n# Development Platforms\nGITHUB_TOKEN=your_github_token\nGITLAB_TOKEN=your_gitlab_token\n\n# Communication Platforms\nSLACK_BOT_TOKEN=xoxb-your-slack-bot-token\nSLACK_SIGNING_SECRET=your-slack-signing-secret\nTEAMS_WEBHOOK_URL=https://your-teams-webhook-url\n\n# Email Configuration\nSMTP_HOST=smtp.company.com\nSMTP_PORT=587\nSMTP_USERNAME=reports@company.com\nSMTP_PASSWORD=your_email_password\n\n# Analytics Platforms\nANALYTICS_API_KEY=your_analytics_api_key\nDASHBOARD_URL=https://dashboards.company.com\n```\n\n### Skill Configuration\n\n```yaml\n# .claude/skills/progress-reporter/config.yaml\ndata_sources:\n  jira:\n    url: ${JIRA_URL}\n    username: ${JIRA_USERNAME}\n    api_token: ${JIRA_API_TOKEN}\n    projects:\n      - WEB\n      - MOBILE\n      - INFRA\n    fields:\n      - status\n      - assignee\n      - priority\n      - created\n      - resolved\n      - story_points\n\n  github:\n    token: ${GITHUB_TOKEN}\n    repositories:\n      - company/web-platform\n      - company/mobile-app\n      - company/infrastructure\n    metrics:\n      - pull_requests\n      - issues\n      - commits\n      - deployments\n\n  slack:\n    bot_token: ${SLACK_BOT_TOKEN}\n    signing_secret: ${SLACK_SIGNING_SECRET}\n    channels:\n      - #project-updates\n      - #executive-reports\n      - #team-standups\n\nreport_types:\n  daily:\n    sections:\n      - team_status\n      - blockers\n      - achievements\n      - next_steps\n    schedule: \"0 9 * * *\"  # Daily at 9 AM\n    recipients:\n      - slack: #team-standups\n\n  weekly:\n    sections:\n      - executive_summary\n      - progress_overview\n      - milestone_status\n      - risk_assessment\n      - resource_allocation\n      - next_week_priorities\n    schedule: \"0 16 * * 5\"  # Friday at 4 PM\n    recipients:\n      - email: project-team@company.com\n      - slack: #project-updates\n\n  monthly:\n    sections:\n      - executive_summary\n      - financial_overview\n      - kpi_dashboard\n      - milestone_achievements\n      - risk_analysis\n      - team_performance\n      - strategic_initiatives\n    schedule: \"0 9 1 * *\"  # 1st of month at 9 AM\n    recipients:\n      - email: executives@company.com\n      - slack: #executive-reports\n\nmetrics:\n  velocity:\n    calculation: \"completed_story_points / sprint_duration\"\n    target: 40\n    unit: \"points/sprint\"\n  \n  quality:\n    calculation: \"passed_tests / total_tests\"\n    target: 0.95\n    unit: \"percentage\"\n  \n  cost:\n    calculation: \"actual_cost / budgeted_cost\"\n    target: 1.0\n    unit: \"ratio\"\n  \n  delivery:\n    calculation: \"on_time_deliveries / total_deliveries\"\n    target: 0.90\n    unit: \"percentage\"\n\nmilestones:\n  tracking:\n    auto_update: true\n    notification_threshold: 0.8  # Alert at 80% completion\n    risk_threshold: 0.6  # Flag as risky if < 60% complete by due date\n  \n  categories:\n    - product_launch\n    - feature_release\n    - infrastructure_upgrade\n    - compliance_requirement\n    - customer_delivery\n\nrisk_assessment:\n  categories:\n    - technical\n    - resource\n    - schedule\n    - budget\n    - quality\n    - security\n  \n  severity_levels:\n    - critical: immediate_action_required\n    - high: mitigation_within_24h\n    - medium: mitigation_within_72h\n    - low: monitor_and_review\n  \n  auto_detection:\n    - schedule_slips\n    - budget_overruns\n    - quality_degradation\n    - resource_constraints\n    - stakeholder_concerns\n\nreport_templates:\n  executive_summary: |\n    # {{project_name}} - {{report_period}} Executive Summary\n    \n    ## Key Highlights\n    {{#highlights}}\n    - {{.}}\n    {{/highlights}}\n    \n    ## Progress Overview\n    - **Overall Progress**: {{overall_progress}}%\n    - **Milestones Completed**: {{completed_milestones}}/{{total_milestones}}\n    - **Budget Status**: {{budget_status}}\n    - **Team Velocity**: {{team_velocity}} points/sprint\n    \n    ## Critical Issues\n    {{#critical_issues}}\n    - **{{title}}**: {{description}} ({{severity}})\n    {{/critical_issues}}\n    \n    ## Next Period Focus\n    {{#next_focus}}\n    - {{.}}\n    {{/next_focus}}\n\n  weekly_progress: |\n    # {{project_name}} - Week of {{week_start}} Progress Report\n    \n    ## Executive Summary\n    {{executive_summary}}\n    \n    ## This Week's Achievements\n    {{#achievements}}\n    - \u2705 {{.}}\n    {{/achievements}}\n    \n    ## Current Sprint Status\n    - **Sprint**: {{sprint_name}}\n    - **Progress**: {{sprint_progress}}%\n    - **Story Points**: {{completed_points}}/{{total_points}}\n    - **Days Remaining**: {{days_remaining}}\n    \n    ## Blockers and Issues\n    {{#blockers}}\n    - \U0001F6A7 **{{title}}**: {{description}} ({{assignee}})\n    {{/blockers}}\n    \n    ## Next Week's Priorities\n    {{#next_priorities}}\n    - {{.}}\n    {{/next_priorities}}\n    \n    ## Team Performance\n    - **Velocity**: {{velocity}} points/sprint\n    - **Quality**: {{quality_score}}% pass rate\n    - **Cycle Time**: {{cycle_time}} days\n\nnotification_settings:\n  channels:\n    slack:\n      enabled: true\n      default_channel: #project-updates\n      executive_channel: #executive-reports\n      thread_replies: true\n    \n    email:\n      enabled: true\n      from_address: progress-reports@company.com\n      template_engine: handlebars\n      include_attachments: true\n    \n    teams:\n      enabled: true\n      webhook_url: ${TEAMS_WEBHOOK_URL}\n      adaptive_cards: true\n  \n  scheduling:\n    daily_reports: \"0 9 * * *\"\n    weekly_reports: \"0 16 * * 5\"\n    monthly_reports: \"0 9 1 * *\"\n    milestone_alerts: \"0 */6 * * *\"  # Every 6 hours\n  \n  escalation:\n    missed_deadlines:\n      - level: team_lead\n        delay: 4h\n        channels: [slack, email]\n      - level: manager\n        delay: 24h\n        channels: [slack, email]\n      - level: executive\n        delay: 48h\n        channels: [slack, email]\n```\n\n## MCP Server Integration\n\nThis skill integrates with the `engagement-sync` MCP server for enhanced stakeholder communication:\n\n### Available MCP Tools\n\n- `schedule_meeting`: Schedule stakeholder meetings for report discussions\n- `track_communication`: Track report distribution and engagement\n- `disseminate_decision`: Share report findings and decisions\n- `collect_feedback`: Gather feedback on reports and recommendations\n- `generate_engagement_report`: Analyze stakeholder engagement with reports\n\n### MCP Usage Example\n\n```javascript\n// Using the MCP server directly\nconst reportDistribution = await mcp.call('track_communication', {\n  communication_id: `report-${reportId}`,\n  type: 'email',\n  participants: stakeholders,\n  content: reportSummary,\n  sentiment: 'neutral',\n  engagement_level: 'high'\n});\n\nconst feedbackCollection = await mcp.call('collect_feedback', {\n  feedback_id: `feedback-${reportId}`,\n  topic: 'Q1 Progress Report',\n  stakeholders: executives,\n  feedback_type: 'survey',\n  questions: [\n    'How useful was this report?',\n    'What additional information would you like?',\n    'Rate the clarity of the executive summary'\n  ],\n  deadline: '2024-04-07T17:00:00Z'\n});\n```\n\n## Implementation Details\n\n### Architecture\n\n```\n\u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 Data Sources    \u2502    \u2502 Report Engine    \u2502    \u2502 Distribution    \u2502\n\u2502                 \u2502    \u2502                  \u2502    \u2502                 \u2502\n\u2502 \u2022 Jira API      \u2502\u2500\u2500\u2500\u25B6\u2502 \u2022 Data Aggregation\u2502\u2500\u2500\u2500\u25B6\u2502 \u2022 Email Sender  \u2502\n\u2502 \u2022 GitHub API    \u2502    \u2502 \u2022 Metric Calc    \u2502    \u2502 \u2022 Slack Bot     \u2502\n\u2502 \u2022 Analytics API \u2502    \u2502 \u2022 Template Engine\u2502    \u2502 \u2022 Teams Webhook \u2502\n\u2502 \u2022 Custom APIs   \u2502    \u2502 \u2022 Chart Generation\u2502    \u2502 \u2022 PDF Export   \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n         \u2502                       \u2502                       \u2502\n         \u25BC                       \u25BC                       \u25BC\n\u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 Analytics       \u2502    \u2502 Risk Assessment  \u2502    \u2502 Scheduling     \u2502\n\u2502                 \u2502    \u2502                  \u2502    \u2502                 \u2502\n\u2502 \u2022 Trend Analysis\u2502    \u2502 \u2022 Risk Detection \u2502    \u2502 \u2022 Cron Jobs     \u2502\n\u2502 \u2022 KPI Tracking  \u2502    \u2502 \u2022 Impact Scoring \u2502    \u2502 \u2022 Event Triggers\u2502\n\u2502 \u2022 Forecasting   \u2502    \u2502 \u2022 Mitigation     \u2502    \u2502 \u2022 Reminders     \u2502\n\u2502 \u2022 Dashboards    \u2502    \u2502 \u2022 Escalation     \u2502    \u2502 \u2022 Calendar Sync \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### Report Generation Pipeline\n\n1. **Data Collection**: Gather data from all configured sources\n2. **Data Processing**: Clean, normalize, and aggregate data\n3. **Metric Calculation**: Compute KPIs and performance metrics\n4. **Template Rendering**: Apply report templates with data\n5. **Format Generation**: Create reports in requested formats\n6. **Distribution**: Send reports through configured channels\n7. **Feedback Collection**: Gather stakeholder feedback\n8. **Analytics**: Track engagement and effectiveness\n\n### Metric Calculations\n\n#### Velocity Metrics\n```python\ndef calculate_velocity(team_data, time_period):\n    \"\"\"\n    Calculate team velocity based on completed story points\n    \"\"\"\n    completed_points = sum(\n        issue.story_points \n        for issue in team_data.issues \n        if issue.status == 'done' and \n           issue.completed_date >= time_period.start\n    )\n    \n    sprint_count = len(time_period.sprints)\n    return completed_points / sprint_count if sprint_count > 0 else 0\n```\n\n#### Quality Metrics\n```python\ndef calculate_quality_score(build_data, deployments):\n    \"\"\"\n    Calculate quality score based on test results and deployment success\n    \"\"\"\n    test_pass_rate = sum(\n        build.passed_tests / build.total_tests \n        for build in build_data\n    ) / len(build_data)\n    \n    deployment_success_rate = sum(\n        1 for deployment in deployments \n        if deployment.status == 'success'\n    ) / len(deployments)\n    \n    return (test_pass_rate * 0.7 + deployment_success_rate * 0.3)\n```\n\n#### Budget Metrics\n```python\ndef calculate_budget_variance(actual_costs, planned_costs):\n    \"\"\"\n    Calculate budget variance as percentage\n    \"\"\"\n    total_actual = sum(actual_costs.values())\n    total_planned = sum(planned_costs.values())\n    \n    if total_planned == 0:\n        return 0\n    \n    variance = (total_actual - total_planned) / total_planned\n    return variance * 100  # Return as percentage\n```\n\n### Risk Assessment Algorithm\n\nThe risk assessment uses a multi-factor scoring system:\n\n```python\ndef calculate_risk_score(risk_factors):\n    \"\"\"\n    Calculate overall risk score based on multiple factors\n    \"\"\"\n    weights = {\n        'schedule_variance': 0.3,\n        'budget_variance': 0.25,\n        'quality_score': 0.2,\n        'resource_availability': 0.15,\n        'stakeholder_satisfaction': 0.1\n    }\n    \n    weighted_score = sum(\n        weights[factor] * normalize_score(risk_factors[factor])\n        for factor in weights\n    )\n    \n    return weighted_score * 100  # Convert to 0-100 scale\n```\n\n## Best Practices\n\n### 1. Report Design\n- Keep executive summaries concise (1-2 pages max)\n- Use visualizations for complex data\n- Include actionable insights and recommendations\n- Maintain consistent formatting and branding\n\n### 2. Data Quality\n- Ensure data sources are reliable and up-to-date\n- Validate data integrity before report generation\n- Handle missing or incomplete data gracefully\n- Document data sources and calculations\n\n### 3. Stakeholder Engagement\n- Tailor reports to audience needs and preferences\n- Provide multiple distribution channels\n- Collect and act on feedback\n- Maintain communication schedules\n\n### 4. Continuous Improvement\n- Monitor report effectiveness and engagement\n- Regularly update templates and metrics\n- Incorporate new data sources and insights\n- Adapt to changing business requirements\n\n## Troubleshooting\n\n### Common Issues\n\n**Data Source Connection Failures**\n```bash\n# Test data source connectivity\nskill invoke progress-reporter test-connection --source jira\nskill invoke progress-reporter test-connection --source github\nskill invoke progress-reporter test-connection --source analytics\n\n# Verify API credentials\nskill invoke progress-reporter verify-credentials --source jira\nskill invoke progress-reporter verify-credentials --source github\n```\n\n**Report Generation Failures**\n```bash\n# Check template syntax\nskill invoke progress-reporter validate-template --template executive_summary\n\n# Test data processing\nskill invoke progress-reporter test-data-processing --project web-platform\n\n# Debug report generation\nexport PROGRESS_REPORTER_DEBUG=true\nskill invoke progress-reporter generate --type weekly --debug --verbose\n```\n\n**Distribution Issues**\n```bash\n# Test notification channels\nskill invoke progress-reporter test-notification --channel slack\nskill invoke progress-reporter test-notification --channel email\n\n# Verify recipient configuration\nskill invoke progress-reporter test-recipients --report-type weekly\n\n# Check scheduling configuration\nskill invoke progress-reporter test-schedule --report-type daily\n```\n\n### Debug Mode\n\n```bash\n# Enable comprehensive debugging\nexport PROGRESS_REPORTER_DEBUG=true\nexport PROGRESS_REPORTER_TRACE=true\nskill invoke progress-reporter generate --type weekly --debug --trace --verbose\n```\n\n## Integration Examples\n\n### CI/CD Pipeline Integration\n\n```yaml\n# .github/workflows/progress-report.yml\nname: Progress Report Generation\non:\n  schedule:\n    - cron: '0 16 * * 5'  # Friday at 4 PM\n  workflow_dispatch:\n\njobs:\n  generate-report:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v2\n      - name: Setup Node.js\n        uses: actions/setup-node@v2\n        with:\n          node-version: '18'\n      - name: Generate Weekly Report\n        run: |\n          skill invoke progress-reporter generate \\\n            --type weekly \\\n            --project web-platform \\\n            --format JSON,PDF,HTML\n      - name: Distribute Report\n        run: |\n          skill invoke progress-reporter distribute \\\n            --report-id latest \\\n            --channels slack,email\n      - name: Upload Artifacts\n        uses: actions/upload-artifact@v2\n        with:\n          name: weekly-progress-report\n          path: reports/\n```\n\n### Slack Integration\n\n```javascript\n// Slack bot for interactive reports\napp.command('/report', async ({ command, ack, say }) => {\n  await ack();\n  \n  const parts = command.text.split(' ');\n  const reportType = parts[0];\n  const project = parts[1] || 'web-platform';\n  \n  try {\n    const report = await skill.invoke('progress-reporter', {\n      action: 'generate',\n      type: reportType,\n      project: project,\n      format: 'slack'\n    });\n    \n    await say({\n      text: `\U0001F4CA ${reportType.charAt(0).toUpperCase() + reportType.slice(1)} Report for ${project}`,\n      blocks: report.blocks\n    });\n  } catch (error) {\n    await say(`\u274C Error generating report: ${error.message}`);\n  }\n});\n```\n\n### Dashboard Integration\n\n```javascript\n// Real-time dashboard data\napp.get('/api/progress/:project', async (req, res) => {\n  const { project } = req.params;\n  \n  try {\n    const progress = await skill.invoke('progress-reporter', {\n      action: 'get-real-time-data',\n      project: project,\n      metrics: ['velocity', 'quality', 'budget', 'milestones']\n    });\n    \n    res.json(progress);\n  } catch (error) {\n    res.status(500).json({ error: error.message });\n  }\n});\n```\n\n## Performance Considerations\n\n### Optimization Tips\n\n1. **Data Caching**: Cache frequently accessed data to reduce API calls\n2. **Parallel Processing**: Process multiple data sources concurrently\n3. **Incremental Updates**: Only update changed data since last report\n4. **Background Processing**: Generate reports asynchronously for large projects\n\n### Resource Usage\n\n- **Memory**: ~1GB for processing large project datasets\n- **CPU**: Moderate usage during data aggregation and metric calculation\n- **Network**: High usage during API calls to data sources\n- **Storage**: ~500MB for report cache and historical data\n\n## Security Considerations\n\n### Data Protection\n\n- All API credentials are encrypted at rest\n- Report data is stored in secure, access-controlled storage\n- Sensitive information is redacted in reports\n- Audit logging for all data access\n\n### Access Control\n\n- Role-based access for report generation and distribution\n- Secure API key management\n- Network segmentation for report processing\n- Compliance with data protection regulations\n\n## Version History\n\n### v1.0.0\n- Initial release with Jira and GitHub integration\n- Basic report templates and distribution\n- Daily and weekly report generation\n\n### v1.1.0\n- Added analytics platform integration\n- Enhanced template system with Handlebars\n- Risk assessment and milestone tracking\n\n### v1.2.0\n- Executive summary generation\n- Advanced metrics and trend analysis\n- Multi-channel distribution improvements\n\n### v1.3.0\n- Real-time dashboard integration\n- Automated scheduling and escalation\n- Comprehensive feedback collection\n\n## Support and Contributing\n\n### Getting Help\n\n- Documentation: `/docs/progress-reporter.md`\n- Examples: `/examples/progress-reporting/`\n- Community: `#progress-reporting` Slack channel\n\n### Contributing\n\n1. Fork the repository\n2. Create a feature branch\n3. Add tests for new functionality\n4. Submit a pull request\n\n### License\n\nThis skill is licensed under the MIT License. See LICENSE file for details.\n"
  "provision-infrastructure/SKILL.md": "---\nname: provision-infrastructure\ndescription: Use when you need to create new cloud resources or infrastructure. Handles VM provisioning, Kubernetes clusters, databases, networking, and storage across AWS, Azure, GCP with proper tagging, security, and compliance. Includes cost estimation and resource validation.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\n  human_gate: PR approval required for production infrastructure changes\n  openswe:\n    sandbox_required: true\n    sandbox_providers: [modal, daytona, runloop]\n    middleware_hooks:\n      - pre_execution: validate_infrastructure_permissions\n      - post_execution: audit_infrastructure_changes\n      - error_recovery: rollback_on_failure\n    integrations:\n      slack: \"@gitops-bot provision infrastructure\"\n      github: \"@openswe provision infrastructure\"\n      linear: \"@openswe provision infrastructure\"\n    context_engineering: \"AGENTS.md infrastructure patterns\"\n    subagent_capabilities: [terraform_validation, cost_estimation, security_scan]\ncompatibility: Requires Python 3.8+, cloud provider CLI tools (AWS CLI, Azure CLI, gcloud), and access to multi-cloud monitoring systems\nallowed-tools: Bash Read Write Grep\n---\n\n# Infrastructure Provisioning \u2014 Multi-Cloud Enterprise Automation\n\n## Purpose\nEnterprise-grade automation solution for infrastructure provisioning operations across AWS, Azure, GCP, and on-premise environments to maximize operational efficiency while maintaining security and compliance standards.\n\n## When to Use\n- **New Environment Setup**: When creating new development, staging, or production environments\n- **Application Deployment**: When provisioning infrastructure for new applications or services\n- **Scaling Events**: When adding capacity to handle increased load or new users\n- **Disaster Recovery**: When rebuilding infrastructure in different regions or accounts\n- **Multi-Cloud Expansion**: When replicating infrastructure across different cloud providers\n- **Resource Updates**: When replacing old infrastructure with new instance types or generations\n- **Testing Environments**: When creating temporary infrastructure for testing or CI/CD pipelines\n\n## Gotchas\n\n### Common Pitfalls\n- **Resource Naming Conflicts**: Cloud providers have strict naming rules and global uniqueness requirements (S3 buckets, some Azure resources)\n- **Quota Limits**: Every account has default quotas that may be insufficient for large deployments\n- **VPC/IP Address Planning**: IP address ranges cannot be easily changed after VPC creation\n- **Cross-Provider Dependencies**: Some resources (like databases) can't be created across cloud providers\n\n### Edge Cases\n- **Region Unavailability**: Not all instance types or services are available in every region\n- **Compliance Boundaries**: Some workloads must stay in specific geographic regions for data residency\n- **Legacy Integration**: New infrastructure may need to connect to older systems with specific requirements\n- **Multi-Account Setups**: Large organizations may have resources spread across multiple accounts\n\n### Performance Issues\n- **API Rate Limits**: Provisioning many resources simultaneously can hit API limits, especially during bulk operations\n- **Resource Creation Time**: Some resources (like databases or large VMs) can take 10-30 minutes to become available\n- **Concurrent Creation Limits**: Some cloud providers limit how many resources of the same type can be created simultaneously\n- **Network Propagation**: DNS and network changes can take time to propagate across regions\n\n### Security Considerations\n- **Default Security Groups**: Never use default security groups that allow all traffic\n- **Public IP Assignment**: Avoid assigning public IPs unless absolutely necessary\n- **IAM Role Timing**: IAM roles and policies may take several minutes to propagate\n- **Secret Management**: Never embed secrets or credentials in infrastructure code\n\n### Troubleshooting\n- **Creation Failures**: Check cloud provider console for detailed error messages, especially around quotas and permissions\n- **Networking Issues**: Verify security groups, NACLs, and route tables if resources can't communicate\n- **Dependency Order**: Some resources depend on others (subnets before instances, VPC before subnets)\n- **State Mismatch**: If Terraform/cloud provider state gets out of sync, resources may appear to not exist\n\n## Inputs\n- **operation**: Operation type (required)\n- **targetResource**: Target resource identifier (required)\n- **cloudProvider**: Cloud provider - `aws|azure|gcp|onprem|all` (optional, default: `all`)\n- **parameters**: Operation-specific parameters (optional)\n- **environment**: Target environment (optional, default: `production`)\n- **dryRun**: Dry run mode (optional, default: `true`)\n\n## Process\n1. **Cloud Provider Detection**: Identify target cloud providers and environments\n2. **Input Validation**: Comprehensive parameter validation and security checks\n3. **Multi-Cloud Context Analysis**: Analyze current state across all providers\n4. **Operation Planning**: Generate optimized execution plan\n5. **Safety Assessment**: Risk analysis and impact evaluation across providers\n6. **Execution**: Perform operations with monitoring and validation\n7. **Results Analysis**: Process results and generate reports\n\n## Outputs\n- **Operation Results**: Detailed execution results and status per provider\n- **Compliance Reports**: Validation and compliance status across environments\n- **Performance Metrics**: Operation performance and efficiency metrics by provider\n- **Recommendations**: Optimization suggestions and next steps\n- **Audit Trail**: Complete operation history for compliance across all providers\n\n## Environment\n- **AWS**: EKS, EC2, Lambda, CloudWatch, IAM, S3\n- **Azure**: AKS, VMs, Functions, Monitor, Azure AD\n- **GCP**: GKE, Compute Engine, Cloud Functions, Cloud Monitoring\n- **On-Premise**: Kubernetes clusters, VMware, OpenStack, Prometheus\n- **Multi-Cloud Tools**: Terraform, Ansible, Crossplane, Cluster API\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **Cloud SDKs**: boto3, azure-sdk, google-cloud\n- **Kubernetes**: kubernetes client for cluster operations\n- **Multi-Cloud Libraries**: terraform-python, ansible-python\n\n## Scripts\n- `core/scripts/automation/infrastructure-provisioning.py`: Main automation implementation\n- `core/scripts/automation/infrastructure-provisioning_handler.py`: Cloud-specific operations\n- `core/scripts/automation/multi_cloud_orchestrator.py`: Cross-provider coordination\n\n## Trigger Keywords\ninfrastructure, provisioning, automation, enterprise, multi-cloud, aws, azure, gcp, onprem\n\n## Human Gate Requirements\n- **Production changes**: Production environment operations require approval\n- **High-impact operations**: Critical operations require review\n- **Security changes**: Security modifications need validation\n\n## Enterprise Features\n- **Multi-tenant Support**: Isolated operations per tenant\n- **Role-based Access Control**: Enterprise IAM integration\n- **Audit Logging**: Complete audit trail for compliance\n- **Performance Monitoring**: SLA tracking and metrics\n- **Security Hardening**: Encryption and compliance standards\n- **Dynamic Code Generation**: Agents can modify logic dynamically\n- **Cross-Cloud Orchestration**: Coordinated operations across providers\n\n## References\n\nLoad these files when needed:\n- `scripts/infrastructure-builder.py` - Core provisioning logic and validation\n- `scripts/resource-templates/` - Cloud-specific resource templates\n- `references/networking-patterns.md` - VPC and subnet design patterns\n- `assets/security-hardening-checklist.yaml` - Security configuration checklist\n- `examples/multi-cloud-setups/` - Complete infrastructure examples\n"
