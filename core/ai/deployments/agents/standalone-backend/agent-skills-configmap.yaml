  "explain-policies/SKILL.md": "---\nname: explain-policies\ndescription: Explains and documents infrastructure policies and their impact across cloud environments in natural language. Use when understanding policies, documenting governance, or explaining compliance requirements.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\ncompatibility: Requires Python 3.8+, cloud provider CLI tools (AWS CLI, Azure CLI, gcloud), and access to multi-cloud monitoring systems\nallowed-tools: Bash Read Write Grep\n---\n\n# Policy Explainer \u2014 Multi-Cloud Enterprise Automation\n\n## Purpose\nEnterprise-grade automation solution for policy explainer operations across AWS, Azure, GCP, and on-premise environments to maximize operational efficiency while maintaining security and compliance standards.\n\n## When to Use\n- **policy explainer operations** across multi-cloud environments\n- **Automation and optimization** of policy explainer workflows\n- **Monitoring and management** of policy explainer resources\n- **Compliance and governance** for policy explainer activities\n\n## Inputs\n- **operation**: Operation type (required)\n- **targetResource**: Target resource identifier (required)\n- **cloudProvider**: Cloud provider - `aws|azure|gcp|onprem|all` (optional, default: `all`)\n- **parameters**: Operation-specific parameters (optional)\n- **environment**: Target environment (optional, default: `production`)\n- **dryRun**: Dry run mode (optional, default: `true`)\n\n## Process\n1. **Cloud Provider Detection**: Identify target cloud providers and environments\n2. **Input Validation**: Comprehensive parameter validation and security checks\n3. **Multi-Cloud Context Analysis**: Analyze current state across all providers\n4. **Operation Planning**: Generate optimized execution plan\n5. **Safety Assessment**: Risk analysis and impact evaluation across providers\n6. **Execution**: Perform operations with monitoring and validation\n7. **Results Analysis**: Process results and generate reports\n\n## Outputs\n- **Operation Results**: Detailed execution results and status per provider\n- **Compliance Reports**: Validation and compliance status across environments\n- **Performance Metrics**: Operation performance and efficiency metrics by provider\n- **Recommendations**: Optimization suggestions and next steps\n- **Audit Trail**: Complete operation history for compliance across all providers\n\n## Environment\n- **AWS**: EKS, EC2, Lambda, CloudWatch, IAM, S3\n- **Azure**: AKS, VMs, Functions, Monitor, Azure AD\n- **GCP**: GKE, Compute Engine, Cloud Functions, Cloud Monitoring\n- **On-Premise**: Kubernetes clusters, VMware, OpenStack, Prometheus\n- **Multi-Cloud Tools**: Terraform, Ansible, Crossplane, Cluster API\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **Cloud SDKs**: boto3, azure-sdk, google-cloud\n- **Kubernetes**: kubernetes client for cluster operations\n- **Multi-Cloud Libraries**: terraform-python, ansible-python\n\n## Scripts\n- `core/scripts/automation/policy-explainer.py`: Main automation implementation\n- `core/scripts/automation/policy-explainer_handler.py`: Cloud-specific operations\n- `core/scripts/automation/multi_cloud_orchestrator.py`: Cross-provider coordination\n\n## Trigger Keywords\npolicy, explainer, automation, enterprise, multi-cloud, aws, azure, gcp, onprem\n\n## Human Gate Requirements\n- **Production changes**: Production environment operations require approval\n- **High-impact operations**: Critical operations require review\n- **Security changes**: Security modifications need validation\n\n## Enterprise Features\n- **Multi-tenant Support**: Isolated operations per tenant\n- **Role-based Access Control**: Enterprise IAM integration\n- **Audit Logging**: Complete audit trail for compliance\n- **Performance Monitoring**: SLA tracking and metrics\n- **Security Hardening**: Encryption and compliance standards\n- **Dynamic Code Generation**: Agents can modify logic dynamically\n- **Cross-Cloud Orchestration**: Coordinated operations across providers\n\n## Best Practices\n- **Idempotent Operations**: Safe retry mechanisms\n- **Circuit Breaker Patterns**: Resilience against failures\n- **Rate Limiting**: Respect API limits and implement backpressure\n- **Graceful Degradation**: Fallback strategies when providers are unavailable\n- **Comprehensive Testing**: Integration tests and compliance validation\n- **Security First**: Zero-trust architecture and principle of least privilege\n"
  "flagger-automation/SKILL.md": "---\nname: flagger-automation\ndescription: Progressive delivery automation using Flagger for canary, A/B testing, and blue/green deployments. Use when implementing progressive delivery strategies, automating releases, managing traffic shifting, or setting up deployment analysis with Kubernetes service mesh or ingress controllers.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\n  human_gate: PR approval required for production traffic routing changes\ncompatibility: Requires Kubernetes 1.19+, Flagger operator, service mesh (Istio/Linkerd/Kuma) or ingress controller (NGINX/Contour/Traefik), and Prometheus for metrics\nallowed-tools: Bash Read Write Grep Kubectl Helm\n---\n\n# Flagger Automation \u2014 Progressive Delivery Intelligence\n\n## Purpose\nEnterprise-grade progressive delivery automation solution that leverages Flagger to implement canary releases, A/B testing, and blue/green deployments with intelligent traffic management, automated analysis, and seamless GitOps integration across multi-cloud Kubernetes environments.\n\n## When to Use\n- **Progressive delivery** implementation with canary, A/B, or blue/green strategies\n- **Automated releases** with traffic shifting and rollback capabilities\n- **Deployment analysis** with metrics-driven validation and testing\n- **Traffic management** across service mesh and ingress controllers\n- **GitOps integration** for automated progressive delivery workflows\n- **Multi-environment deployments** with consistent delivery strategies\n\n## Inputs\n- **operation**: Operation type - `install|configure|deploy|analyze|rollback|status|scale|test` (required)\n- **strategy**: Deployment strategy - `canary|abtest|bluegreen|mirror` (required)\n- **targetResource**: Target deployment/application name (required)\n- **namespace**: Target namespace (optional, default: `default`)\n- **provider**: Traffic provider - `istio|linkerd|kuma|nginx|contour|traefik|gloo|skipper|apisix` (optional, default: `istio`)\n- **analysis**: Enable analysis (optional, default: `true`)\n- **metrics**: Metrics backend - `prometheus|datadog|newrelic|cloudwatch|influxdb|graphite` (optional, default: `prometheus`)\n- **thresholds**: Success/failure thresholds (optional)\n- **traffic**: Traffic routing percentages (optional)\n- **environment**: Target environment (optional, default: `production`)\n\n## Process\n1. **Environment Validation**: Verify Kubernetes cluster and provider compatibility\n2. **Flagger Installation**: Deploy and configure Flagger operator with specified provider\n3. **Provider Setup**: Configure service mesh or ingress controller integration\n4. **Metrics Integration**: Setup Prometheus or alternative metrics backend\n5. **Canary Configuration**: Create canary custom resources with analysis templates\n6. **Traffic Routing**: Configure progressive traffic shifting rules\n7. **Analysis Setup**: Define success metrics, thresholds, and alerting\n8. **GitOps Integration**: Configure Flux/ArgoCD for automated progressive delivery\n9. **Validation**: Test deployment strategies and rollback capabilities\n10. **Monitoring**: Setup comprehensive monitoring and alerting\n\n## Outputs\n- **Flagger Configuration**: Complete operator and provider setup\n- **Canary Resources**: Custom resources for progressive delivery\n- **Analysis Templates**: Metrics analysis and validation rules\n- **Traffic Rules**: Progressive traffic shifting configurations\n- **Monitoring Setup**: Alerting and observability configurations\n- **GitOps Manifests**: Declarative configuration for automation\n- **Status Reports**: Deployment progress and analysis results\n- **Rollback Plans**: Automated rollback configurations\n\n## Environment\n- **Kubernetes**: Multi-cluster support across EKS, AKS, GKE, and on-premise\n- **Flagger**: Latest stable version with all provider integrations\n- **Service Mesh**: Istio, Linkerd, Kuma, Open Service Mesh, AWS App Mesh\n- **Ingress Controllers**: NGINX, Contour, Traefik, Gloo, Skipper, APISIX\n- **Monitoring**: Prometheus, Grafana, and alternative metrics backends\n- **GitOps**: Flux, ArgoCD, and compatible CI/CD systems\n\n## Dependencies\n- **Kubernetes 1.19+**: For CRD support and advanced networking\n- **Flagger Operator**: Latest stable version for progressive delivery\n- **Helm 3+**: For package management and installation\n- **kubectl**: For cluster management and configuration\n- **Provider Components**: Service mesh or ingress controller\n- **Prometheus**: For metrics collection and analysis\n- **PyYAML**: Configuration file processing\n- **Requests**: HTTP client for API interactions\n\n## Scripts\n- `scripts/flagger_installer.py`: Main automation engine and orchestration\n- `scripts/provider_setup.py`: Service mesh and ingress controller configuration\n- `scripts/canary_manager.py`: Canary resource creation and management\n- `scripts/analysis_engine.py`: Metrics analysis and validation logic\n- `scripts/traffic_router.py`: Progressive traffic shifting automation\n- `scripts/gitops_integrator.py`: Flux/ArgoCD integration and manifest generation\n- `scripts/monitoring_setup.py`: Alerting and observability configuration\n\n## Trigger Keywords\nflagger, progressive delivery, canary, ab testing, blue green, deployment, traffic routing, service mesh, ingress, automation, gitops, flux, argocd, kubernetes\n\n## Human Gate Requirements\n- **Production traffic changes**: Traffic routing modifications require approval\n- **Service mesh configuration**: Mesh-wide changes need validation\n- **Metrics thresholds**: Critical threshold changes require oversight\n- **Rollback operations**: Production rollbacks need confirmation\n- **Security policies**: Security-related configurations require review\n\n## API Patterns\n\n### Python Agent Implementation\n```python\n#!/usr/bin/env python3\n\"\"\"\nFlagger Automation - Progressive Delivery Intelligence\nAutomates canary, A/B testing, and blue/green deployments with Flagger\n\"\"\"\n\nimport json\nimport sys\nimport uuid\nimport logging\nimport subprocess\nimport yaml\nfrom datetime import datetime\nfrom typing import Dict, Any, Optional, List\nfrom pathlib import Path\n\nclass FlaggerAutomation:\n    def __init__(self):\n        self.operation_id = str(uuid.uuid4())\n        self.config = self._load_config()\n        self.kubectl_path = self._find_kubectl()\n        self.helm_path = self._find_helm()\n        \n    def _load_config(self) -> Dict[str, Any]:\n        \"\"\"Load configuration from file or defaults\"\"\"\n        config_path = Path.home() / '.flagger' / 'config.yaml'\n        default_config = {\n            'namespace': 'flagger-system',\n            'provider': 'istio',\n            'metrics_backend': 'prometheus',\n            'analysis_interval': '10s',\n            'success_threshold': 99,\n            'failure_threshold': 1,\n            'traffic_increment': 10,\n            'timeout': '10m'\n        }\n        \n        if config_path.exists():\n            with open(config_path, 'r') as f:\n                user_config = yaml.safe_load(f)\n                default_config.update(user_config)\n        \n        return default_config\n    \n    def _find_kubectl(self) -> str:\n        \"\"\"Find kubectl binary in PATH\"\"\"\n        try:\n            result = subprocess.run(['which', 'kubectl'], \n                                  capture_output=True, text=True, check=True)\n            return result.stdout.strip()\n        except subprocess.CalledProcessError:\n            raise RuntimeError(\"kubectl not found. Please install kubectl first.\")\n    \n    def _find_helm(self) -> str:\n        \"\"\"Find helm binary in PATH\"\"\"\n        try:\n            result = subprocess.run(['which', 'helm'], \n                                  capture_output=True, text=True, check=True)\n            return result.stdout.strip()\n        except subprocess.CalledProcessError:\n            raise RuntimeError(\"Helm not found. Please install Helm first.\")\n    \n    def execute_operation(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Main operation execution\"\"\"\n        try:\n            validated_params = self._validate_inputs(params)\n            self._setup_environment(validated_params)\n            results = self._perform_operation(validated_params)\n            return self._format_output(results, \"completed\")\n        except Exception as e:\n            return self._handle_error(e, params)\n    \n    def _validate_inputs(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Input validation\"\"\"\n        required_fields = ['operation', 'strategy', 'targetResource']\n        for field in required_fields:\n            if field not in params:\n                raise ValueError(f\"Missing required field: {field}\")\n        \n        valid_operations = ['install', 'configure', 'deploy', 'analyze', 'rollback', 'status', 'scale', 'test']\n        if params['operation'] not in valid_operations:\n            raise ValueError(f\"Invalid operation: {params['operation']}\")\n        \n        valid_strategies = ['canary', 'abtest', 'bluegreen', 'mirror']\n        if params['strategy'] not in valid_strategies:\n            raise ValueError(f\"Invalid strategy: {params['strategy']}\")\n        \n        return params\n    \n    def _setup_environment(self, params: Dict[str, Any]) -> None:\n        \"\"\"Setup environment and validate prerequisites\"\"\"\n        namespace = params.get('namespace', 'default')\n        \n        # Create namespace if it doesn't exist\n        try:\n            subprocess.run([self.kubectl_path, 'create', 'namespace', namespace], \n                         check=True, capture_output=True)\n        except subprocess.CalledProcessError:\n            # Namespace likely exists\n            pass\n        \n        # Add Flagger Helm repository\n        subprocess.run([self.helm_path, 'repo', 'add', 'flagger', \n                      'https://flagger.app'], check=True, capture_output=True)\n        subprocess.run([self.helm_path, 'repo', 'update'], check=True, capture_output=True)\n    \n    def _perform_operation(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Execute the specified operation\"\"\"\n        operation = params['operation']\n        strategy = params['strategy']\n        target = params['targetResource']\n        namespace = params.get('namespace', 'default')\n        provider = params.get('provider', self.config['provider'])\n        \n        if operation == 'install':\n            return self._install_flagger(params)\n        elif operation == 'configure':\n            return self._configure_canary(params)\n        elif operation == 'deploy':\n            return self._deploy_progressive(params)\n        elif operation == 'analyze':\n            return self._analyze_deployment(params)\n        elif operation == 'rollback':\n            return self._rollback_deployment(params)\n        elif operation == 'status':\n            return self._get_status(params)\n        elif operation == 'scale':\n            return self._scale_deployment(params)\n        elif operation == 'test':\n            return self._test_deployment(params)\n        else:\n            raise ValueError(f\"Unsupported operation: {operation}\")\n    \n    def _install_flagger(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Install Flagger operator\"\"\"\n        namespace = params.get('namespace', 'flagger-system')\n        provider = params.get('provider', self.config['provider'])\n        \n        # Install Flagger using Helm\n        cmd = [\n            self.helm_path, 'upgrade', '--install', 'flagger', 'flagger/flagger',\n            '--namespace', namespace,\n            '--set', f'meshProvider={provider}',\n            '--set', 'crds.install=true',\n            '--wait'\n        ]\n        \n        result = subprocess.run(cmd, capture_output=True, text=True, check=True)\n        \n        # Verify installation\n        verify_cmd = [self.kubectl_path, 'get', 'pods', '-n', namespace, '-l', 'app=flagger']\n        verify_result = subprocess.run(verify_cmd, capture_output=True, text=True, check=True)\n        \n        return {\n            'operation': 'install',\n            'provider': provider,\n            'namespace': namespace,\n            'status': 'installed',\n            'output': result.stdout,\n            'verification': verify_result.stdout\n        }\n    \n    def _configure_canary(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Configure canary custom resource\"\"\"\n        strategy = params['strategy']\n        target = params['targetResource']\n        namespace = params.get('namespace', 'default')\n        provider = params.get('provider', self.config['provider'])\n        \n        # Generate canary manifest based on strategy\n        canary_manifest = self._generate_canary_manifest(strategy, target, namespace, provider, params)\n        \n        # Apply canary configuration\n        manifest_path = f'/tmp/{target}-canary.yaml'\n        with open(manifest_path, 'w') as f:\n            yaml.dump(canary_manifest, f)\n        \n        cmd = [self.kubectl_path, 'apply', '-f', manifest_path]\n        result = subprocess.run(cmd, capture_output=True, text=True, check=True)\n        \n        return {\n            'operation': 'configure',\n            'strategy': strategy,\n            'target': target,\n            'namespace': namespace,\n            'manifest': canary_manifest,\n            'output': result.stdout\n        }\n    \n    def _generate_canary_manifest(self, strategy: str, target: str, namespace: str, \n                                provider: str, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Generate canary custom resource manifest\"\"\"\n        analysis = params.get('analysis', True)\n        metrics = params.get('metrics', self.config['metrics_backend'])\n        \n        base_manifest = {\n            'apiVersion': 'flagger.app/v1beta1',\n            'kind': 'Canary',\n            'metadata': {\n                'name': target,\n                'namespace': namespace\n            },\n            'spec': {\n                'targetRef': {\n                    'apiVersion': 'apps/v1',\n                    'kind': 'Deployment',\n                    'name': target\n                },\n                'service': {\n                    'port': 80,\n                    'targetPort': 8080\n                },\n                'analysis': {\n                    'interval': self.config['analysis_interval'],\n                    'threshold': self.config['success_threshold'],\n                    'iterations': 10,\n                    'metrics': [\n                        {\n                            'name': 'request-success-rate',\n                            'threshold': 99,\n                            'interval': '1m'\n                        },\n                        {\n                            'name': 'request-duration',\n                            'threshold': 500,\n                            'interval': '1m'\n                        }\n                    ]\n                }\n            }\n        }\n        \n        # Strategy-specific configuration\n        if strategy == 'canary':\n            base_manifest['spec']['canarySteps'] = [\n                {'setWeight': 10},\n                {'pause': {'duration': '1m'}},\n                {'setWeight': 20},\n                {'pause': {'duration': '1m'}},\n                {'setWeight': 30},\n                {'pause': {'duration': '1m'}},\n                {'setWeight': 50},\n                {'pause': {'duration': '1m'}},\n                {'setWeight': 100}\n            ]\n        elif strategy == 'abtest':\n            base_manifest['spec']['analysis']['threshold'] = 95\n            base_manifest['spec']['canarySteps'] = [\n                {'setWeight': 50},\n                {'pause': {'duration': '10m'}}\n            ]\n        elif strategy == 'bluegreen':\n            base_manifest['spec']['progressDeadlineSeconds'] = 60\n            base_manifest['spec']['analysis']['threshold'] = 99\n        \n        # Provider-specific configuration\n        if provider == 'istio':\n            base_manifest['spec']['service']['gateways'] = ['istio-system/public-gateway']\n        elif provider == 'nginx':\n            base_manifest['spec']['ingressRef'] = {\n                'apiVersion': 'networking.k8s.io/v1',\n                'kind': 'Ingress',\n                'name': f'{target}-ingress'\n            }\n        \n        return base_manifest\n    \n    def _deploy_progressive(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Trigger progressive deployment\"\"\"\n        target = params['targetResource']\n        namespace = params.get('namespace', 'default')\n        \n        # Trigger deployment by updating the deployment\n        cmd = [self.kubectl_path, 'patch', 'deployment', target, '-n', namespace,\n               '-p', '{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"' + \n               datetime.utcnow().isoformat() + '\"}}}}}']\n        \n        result = subprocess.run(cmd, capture_output=True, text=True, check=True)\n        \n        return {\n            'operation': 'deploy',\n            'target': target,\n            'namespace': namespace,\n            'status': 'triggered',\n            'output': result.stdout\n        }\n    \n    def _analyze_deployment(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Analyze deployment progress and metrics\"\"\"\n        target = params['targetResource']\n        namespace = params.get('namespace', 'default')\n        \n        # Get canary status\n        cmd = [self.kubectl_path, 'get', 'canary', target, '-n', namespace, '-o', 'yaml']\n        result = subprocess.run(cmd, capture_output=True, text=True, check=True)\n        \n        canary_status = yaml.safe_load(result.stdout)\n        \n        # Get deployment events\n        events_cmd = [self.kubectl_path, 'get', 'events', '-n', namespace, \n                     '--field-selector', f'involvedObject.name={target}', '-o', 'json']\n        events_result = subprocess.run(events_cmd, capture_output=True, text=True, check=True)\n        \n        events_data = json.loads(events_result.stdout)\n        \n        return {\n            'operation': 'analyze',\n            'target': target,\n            'namespace': namespace,\n            'canary_status': canary_status,\n            'events': events_data['items'],\n            'analysis_time': datetime.utcnow().isoformat()\n        }\n    \n    def _rollback_deployment(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Rollback deployment to previous version\"\"\"\n        target = params['targetResource']\n        namespace = params.get('namespace', 'default')\n        \n        # Get canary status\n        cmd = [self.kubectl_path, 'get', 'canary', target, '-n', namespace, '-o', 'json']\n        result = subprocess.run(cmd, capture_output=True, text=True, check=True)\n        \n        canary_data = json.loads(result.stdout)\n        \n        # Check if rollback is needed\n        if canary_data.get('status', {}).get('phase') == 'progressing':\n            # Trigger rollback\n            rollback_cmd = [self.kubectl_path, 'delete', 'canary', target, '-n', namespace]\n            rollback_result = subprocess.run(rollback_cmd, capture_output=True, text=True, check=True)\n            \n            return {\n                'operation': 'rollback',\n                'target': target,\n                'namespace': namespace,\n                'status': 'rolled_back',\n                'output': rollback_result.stdout\n            }\n        else:\n            return {\n                'operation': 'rollback',\n                'target': target,\n                'namespace': namespace,\n                'status': 'no_rollback_needed',\n                'message': 'Canary is not in progressing state'\n            }\n    \n    def _get_status(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Get current status of canary deployment\"\"\"\n        target = params['targetResource']\n        namespace = params.get('namespace', 'default')\n        \n        # Get canary status\n        cmd = [self.kubectl_path, 'get', 'canary', target, '-n', namespace, '-o', 'json']\n        result = subprocess.run(cmd, capture_output=True, text=True, check=True)\n        \n        canary_data = json.loads(result.stdout)\n        \n        return {\n            'operation': 'status',\n            'target': target,\n            'namespace': namespace,\n            'status': canary_data,\n            'timestamp': datetime.utcnow().isoformat()\n        }\n    \n    def _scale_deployment(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Scale deployment replicas\"\"\"\n        target = params['targetResource']\n        namespace = params.get('namespace', 'default')\n        replicas = params.get('replicas', 1)\n        \n        cmd = [self.kubectl_path, 'scale', 'deployment', target, '-n', namespace, '--replicas', str(replicas)]\n        result = subprocess.run(cmd, capture_output=True, text=True, check=True)\n        \n        return {\n            'operation': 'scale',\n            'target': target,\n            'namespace': namespace,\n            'replicas': replicas,\n            'output': result.stdout\n        }\n    \n    def _test_deployment(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Test deployment with load and validation\"\"\"\n        target = params['targetResource']\n        namespace = params.get('namespace', 'default')\n        \n        # Get service endpoint\n        service_cmd = [self.kubectl_path, 'get', 'svc', target, '-n', namespace, '-o', 'json']\n        service_result = subprocess.run(service_cmd, capture_output=True, text=True, check=True)\n        \n        service_data = json.loads(service_result.stdout)\n        \n        # Simulate load test (simplified)\n        test_results = {\n            'endpoint': service_data['spec']['clusterIP'],\n            'port': service_data['spec']['ports'][0]['port'],\n            'test_time': datetime.utcnow().isoformat(),\n            'status': 'tested',\n            'response_time': '50ms',\n            'success_rate': '100%'\n        }\n        \n        return {\n            'operation': 'test',\n            'target': target,\n            'namespace': namespace,\n            'test_results': test_results\n        }\n    \n    def _format_output(self, results: Dict[str, Any], status: str) -> Dict[str, Any]:\n        \"\"\"Format output according to enterprise schema\"\"\"\n        return {\n            \"operationId\": self.operation_id,\n            \"status\": status,\n            \"timestamp\": datetime.utcnow().isoformat(),\n            \"result\": results,\n            \"metadata\": {\n                \"execution_time\": 1.0,\n                \"risk_score\": 4,\n                \"agent_version\": \"1.0.0\",\n                \"flagger_version\": \"latest\",\n                \"provider\": self.config['provider']\n            }\n        }\n    \n    def _handle_error(self, error: Exception, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Comprehensive error handling\"\"\"\n        return {\n            \"operationId\": self.operation_id,\n            \"status\": \"failed\",\n            \"timestamp\": datetime.utcnow().isoformat(),\n            \"error\": {\n                \"code\": \"FLAGGER_ERROR\",\n                \"message\": str(error),\n                \"details\": {\n                    \"parameters\": params,\n                    \"error_type\": type(error).__name__\n                }\n            }\n        }\n\ndef main():\n    # Configure logging\n    logging.basicConfig(level=logging.INFO)\n    logger = logging.getLogger(__name__)\n    \n    if len(sys.argv) > 1:\n        params = json.loads(sys.argv[1])\n    else:\n        params = {\n            'operation': 'install',\n            'strategy': 'canary',\n            'targetResource': 'example-app',\n            'namespace': 'default',\n            'provider': 'istio'\n        }\n    \n    automation = FlaggerAutomation()\n    result = automation.execute_operation(params)\n    print(json.dumps(result, indent=2))\n\nif __name__ == \"__main__\":\n    main()\n```\n\n### Shell Commands Integration\n```bash\n#!/bin/bash\n# Flagger Automation Shell Integration\nOPERATION=${1:-install}\nSTRATEGY=${2:-canary}\nTARGET=${3:-example-app}\nNAMESPACE=${4:-default}\nPROVIDER=${5:-istio}\n\necho \"Executing Flagger ${OPERATION} with ${STRATEGY} strategy for ${TARGET}\"\n\n# Add Flagger Helm repository\nhelm repo add flagger https://flagger.app\nhelm repo update\n\ncase $OPERATION in\n    \"install\")\n        echo \"Installing Flagger with ${PROVIDER} provider...\"\n        helm upgrade --install flagger flagger/flagger \\\n            --namespace flagger-system \\\n            --create-namespace \\\n            --set meshProvider=${PROVIDER} \\\n            --set crds.install=true \\\n            --wait\n        ;;\n    \"configure\")\n        echo \"Configuring canary for ${TARGET}...\"\n        kubectl apply -f - <<EOF\napiVersion: flagger.app/v1beta1\nkind: Canary\nmetadata:\n  name: ${TARGET}\n  namespace: ${NAMESPACE}\nspec:\n  targetRef:\n    apiVersion: apps/v1\n    kind: Deployment\n    name: ${TARGET}\n  service:\n    port: 80\n    targetPort: 8080\n  analysis:\n    interval: 10s\n    threshold: 99\n    iterations: 10\n    metrics:\n    - name: request-success-rate\n      threshold: 99\n      interval: 1m\n    - name: request-duration\n      threshold: 500\n      interval: 1m\nEOF\n        ;;\n    \"deploy\")\n        echo \"Triggering progressive deployment for ${TARGET}...\"\n        kubectl patch deployment ${TARGET} -n ${NAMESPACE} -p '{\"spec\":{\"template\":{\"metadata\":{\"annotations\":{\"kubectl.kubernetes.io/restartedAt\":\"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'\"}}}}}'\n        ;;\n    \"status\")\n        echo \"Getting status for ${TARGET}...\"\n        kubectl get canary ${TARGET} -n ${NAMESPACE} -o yaml\n        ;;\n    \"rollback\")\n        echo \"Rolling back ${TARGET}...\"\n        kubectl delete canary ${TARGET} -n ${NAMESPACE}\n        ;;\n    *)\n        echo \"Unknown operation: $OPERATION\"\n        echo \"Available: install, configure, deploy, status, rollback\"\n        exit 1\n        ;;\nesac\n```\n\n## Parameter Schema\n```json\n{\n  \"type\": \"object\",\n  \"properties\": {\n    \"operation\": {\n      \"type\": \"string\",\n      \"enum\": [\"install\", \"configure\", \"deploy\", \"analyze\", \"rollback\", \"status\", \"scale\", \"test\"],\n      \"description\": \"Type of operation to perform\"\n    },\n    \"strategy\": {\n      \"type\": \"string\",\n      \"enum\": [\"canary\", \"abtest\", \"bluegreen\", \"mirror\"],\n      \"description\": \"Deployment strategy to use\"\n    },\n    \"targetResource\": {\n      \"type\": \"string\",\n      \"description\": \"Target deployment name\"\n    },\n    \"namespace\": {\n      \"type\": \"string\",\n      \"default\": \"default\",\n      \"description\": \"Target namespace\"\n    },\n    \"provider\": {\n      \"type\": \"string\",\n      \"enum\": [\"istio\", \"linkerd\", \"kuma\", \"nginx\", \"contour\", \"traefik\", \"gloo\", \"skipper\", \"apisix\"],\n      \"default\": \"istio\",\n      \"description\": \"Traffic routing provider\"\n    },\n    \"analysis\": {\n      \"type\": \"boolean\",\n      \"default\": true,\n      \"description\": \"Enable automated analysis\"\n    },\n    \"metrics\": {\n      \"type\": \"string\",\n      \"enum\": [\"prometheus\", \"datadog\", \"newrelic\", \"cloudwatch\", \"influxdb\", \"graphite\"],\n      \"default\": \"prometheus\",\n      \"description\": \"Metrics backend\"\n    },\n    \"thresholds\": {\n      \"type\": \"object\",\n      \"description\": \"Success/failure thresholds\"\n    },\n    \"traffic\": {\n      \"type\": \"object\",\n      \"description\": \"Traffic routing percentages\"\n    }\n  },\n  \"required\": [\"operation\", \"strategy\", \"targetResource\"]\n}\n```\n\n## Enterprise Features\n- **Multi-Provider Support**: Integration with all major service mesh and ingress controllers\n- **Progressive Strategies**: Canary, A/B testing, blue/green, and mirroring deployments\n- **Automated Analysis**: Metrics-driven validation and intelligent rollback\n- **GitOps Integration**: Seamless integration with Flux, ArgoCD, and CI/CD pipelines\n- **Multi-Cluster**: Support across EKS, AKS, GKE, and on-premise environments\n- **Security Hardening**: RBAC, network policies, and secure traffic routing\n- **Observability**: Comprehensive monitoring, alerting, and audit trails\n- **Performance Optimization**: Intelligent traffic shifting and load balancing\n\n## Best Practices\n- **Provider Selection**: Choose appropriate service mesh or ingress controller for your environment\n- **Threshold Configuration**: Set realistic success and failure thresholds based on SLAs\n- **Traffic Increment**: Use gradual traffic increments for stable deployments\n- **Monitoring Setup**: Ensure comprehensive metrics collection before enabling analysis\n- **Rollback Planning**: Always have rollback configurations ready for production\n- **Security**: Implement proper RBAC and network policies for Flagger components\n- **Testing**: Validate configurations in staging before production deployment\n\n## Integration Examples\n- **Flux GitOps**: Automated progressive delivery with Git-based configuration\n- **ArgoCD**: Declarative canary deployments with ArgoCD synchronization\n- **Prometheus**: Advanced metrics analysis and alerting integration\n- **Istio Service Mesh**: Advanced traffic management and security policies\n- **Linkerd**: Lightweight service mesh with automatic sidecar injection\n- **NGINX Ingress**: Simple and reliable ingress-based traffic routing\n- **Grafana**: Real-time visualization of deployment progress and metrics\n- **Slack**: Automated notifications for deployment events and rollbacks\n"
  "funnel-query/SKILL.md": "---\nname: funnel-query\ndescription: Use when analyzing user conversion funnels and customer journey analytics. Provides standardized queries for signup \u2192 activation \u2192 paid conversion analysis, cohort comparisons, and funnel optimization insights across product metrics.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: data-analysis\n  risk_level: low\n  autonomy: conditional\n  layer: temporal\ncompatibility: Requires Python 3.8+, access to analytics database, and SQL query permissions\nallowed-tools: Bash Read Write Grep\n---\n\n# Funnel Query - Customer Journey Analytics\n\n## Purpose\nStandardized analytics skill for customer funnel analysis, providing common queries and insights for user journey optimization, conversion tracking, and cohort analysis across product metrics.\n\n## When to Use\n- **Conversion Analysis**: When analyzing user signup \u2192 activation \u2192 paid conversion funnels\n- **Cohort Comparisons**: When comparing conversion rates between different user cohorts\n- **Funnel Optimization**: When identifying drop-off points and optimization opportunities\n- **Product Metrics**: When tracking key product metrics and user engagement\n- **Growth Analysis**: When analyzing user growth and retention patterns\n- **A/B Testing**: When measuring impact of product changes on conversion rates\n- **Business Intelligence**: When generating reports for stakeholders on user journey\n\n## Core Funnel Queries\n\n### Standard Conversion Funnel\n```sql\n-- User signup \u2192 activation \u2192 paid conversion funnel\nWITH funnel_stages AS (\n  -- Stage 1: Signups\n  SELECT \n    user_id,\n    'signup' as stage,\n    created_at as event_time\n  FROM users \n  WHERE created_at >= '2024-01-01'\n  \n  UNION ALL\n  \n  -- Stage 2: First activation (key action)\n  SELECT \n    user_id,\n    'activation' as stage,\n    event_time\n  FROM user_events \n  WHERE event_type = 'first_key_action'\n    AND created_at >= '2024-01-01'\n  \n  UNION ALL\n  \n  -- Stage 3: Paid conversion\n  SELECT \n    user_id,\n    'paid' as stage,\n    created_at as event_time\n  FROM subscriptions \n  WHERE created_at >= '2024-01-01'\n),\nfunnel_counts AS (\n  SELECT \n    stage,\n    COUNT(DISTINCT user_id) as users,\n    MIN(event_time) as earliest_time\n  FROM funnel_stages\n  GROUP BY stage\n)\nSELECT \n  stage,\n  users,\n  LAG(users) OVER (ORDER BY \n    CASE stage \n      WHEN 'signup' THEN 1 \n      WHEN 'activation' THEN 2 \n      WHEN 'paid' THEN 3 \n    END\n  ) as previous_stage_users,\n  ROUND(\n    users * 100.0 / LAG(users) OVER (ORDER BY \n      CASE stage \n        WHEN 'signup' THEN 1 \n        WHEN 'activation' THEN 2 \n        WHEN 'paid' THEN 3 \n      END\n    ), 2\n  ) as conversion_rate\nFROM funnel_counts\nORDER BY \n  CASE stage \n    WHEN 'signup' THEN 1 \n    WHEN 'activation' THEN 2 \n    WHEN 'paid' THEN 3 \n  END;\n```\n\n### Time-to-Convert Analysis\n```sql\n-- Average time between funnel stages\nWITH stage_times AS (\n  SELECT \n    u.user_id,\n    signup.created_at as signup_time,\n    activation.event_time as activation_time,\n    paid.created_at as paid_time\n  FROM users u\n  LEFT JOIN user_events activation ON u.user_id = activation.user_id \n    AND activation.event_type = 'first_key_action'\n  LEFT JOIN subscriptions paid ON u.user_id = paid.user_id\n  WHERE u.created_at >= '2024-01-01'\n)\nSELECT \n  COUNT(*) as total_users,\n  AVG(DATEDIFF(activation_time, signup_time)) as avg_days_to_activate,\n  AVG(DATEDIFF(paid_time, signup_time)) as avg_days_to_paid,\n  AVG(DATEDIFF(paid_time, activation_time)) as avg_days_activate_to_paid\nFROM stage_times\nWHERE activation_time IS NOT NULL;\n```\n\n## Cohort Analysis Queries\n\n### Monthly Cohort Retention\n```sql\n-- Monthly cohort retention analysis\nWITH user_cohorts AS (\n  SELECT \n    user_id,\n    DATE_TRUNC('month', created_at) as cohort_month\n  FROM users\n  WHERE created_at >= '2023-01-01'\n),\nmonthly_activity AS (\n  SELECT \n    uc.user_id,\n    uc.cohort_month,\n    DATE_TRUNC('month', event_time) as activity_month\n  FROM user_cohorts uc\n  JOIN user_events ue ON uc.user_id = ue.user_id\n  WHERE ue.event_time >= uc.cohort_month\n    AND ue.event_time < uc.cohort_month + INTERVAL '12 months'\n),\ncohort_sizes AS (\n  SELECT \n    cohort_month,\n    COUNT(DISTINCT user_id) as cohort_size\n  FROM user_cohorts\n  GROUP BY cohort_month\n),\nretention_rates AS (\n  SELECT \n    ma.cohort_month,\n    ma.activity_month,\n    DATEDIFF(ma.activity_month, ma.cohort_month) / 30 as period_number,\n    COUNT(DISTINCT ma.user_id) as active_users,\n    cs.cohort_size\n  FROM monthly_activity ma\n  JOIN cohort_sizes cs ON ma.cohort_month = cs.cohort_month\n  GROUP BY ma.cohort_month, ma.activity_month, cs.cohort_size\n)\nSELECT \n  cohort_month,\n  period_number,\n  cohort_size,\n  active_users,\n  ROUND(active_users * 100.0 / cohort_size, 2) as retention_rate\nFROM retention_rates\nORDER BY cohort_month, period_number;\n```\n\n### Conversion by Acquisition Channel\n```sql\n-- Conversion rates by marketing channel\nWITH channel_attribution AS (\n  SELECT \n    u.user_id,\n    u.acquisition_channel,\n    u.created_at as signup_date,\n    CASE WHEN activation.user_id IS NOT NULL THEN 1 ELSE 0 END as activated,\n    CASE WHEN paid.user_id IS NOT NULL THEN 1 ELSE 0 END as converted\n  FROM users u\n  LEFT JOIN (\n    SELECT DISTINCT user_id \n    FROM user_events \n    WHERE event_type = 'first_key_action'\n  ) activation ON u.user_id = activation.user_id\n  LEFT JOIN (\n    SELECT DISTINCT user_id \n    FROM subscriptions\n  ) paid ON u.user_id = paid.user_id\n  WHERE u.created_at >= '2024-01-01'\n)\nSELECT \n  acquisition_channel,\n  COUNT(*) as total_signups,\n  SUM(activated) as total_activated,\n  SUM(converted) as total_converted,\n  ROUND(SUM(activated) * 100.0 / COUNT(*), 2) as activation_rate,\n  ROUND(SUM(converted) * 100.0 / COUNT(*), 2) as conversion_rate,\n  ROUND(\n    SUM(converted) * 100.0 / NULLIF(SUM(activated), 0), 2\n  ) as activated_to_paid_rate\nFROM channel_attribution\nGROUP BY acquisition_channel\nORDER BY total_signups DESC;\n```\n\n## Performance Optimization Queries\n\n### High-Volume Funnel Analysis\n```sql\n-- Optimized funnel query for large datasets (millions of users)\nCREATE MATERIALIZED VIEW daily_funnel_metrics AS\nSELECT \n  DATE(created_at) as date,\n  COUNT(*) as signups,\n  COUNT(DISTINCT \n    CASE WHEN EXISTS (\n      SELECT 1 FROM user_events ue \n      WHERE ue.user_id = users.user_id \n        AND ue.event_type = 'first_key_action'\n        AND DATE(ue.event_time) = DATE(users.created_at)\n    ) THEN users.user_id END\n  ) as same_day_activations,\n  COUNT(DISTINCT \n    CASE WHEN EXISTS (\n      SELECT 1 FROM subscriptions s \n      WHERE s.user_id = users.user_id \n        AND DATE(s.created_at) = DATE(users.created_at)\n    ) THEN users.user_id END\n  ) as same_day_conversions\nFROM users\nWHERE created_at >= '2024-01-01'\nGROUP BY DATE(created_at);\n\n-- Query the materialized view for fast results\nSELECT \n  date,\n  signups,\n  same_day_activations,\n  same_day_conversions,\n  ROUND(same_day_activations * 100.0 / signups, 2) as activation_rate,\n  ROUND(same_day_conversions * 100.0 / signups, 2) as conversion_rate\nFROM daily_funnel_metrics\nORDER BY date DESC;\n```\n\n## Advanced Analytics\n\n### Funnel Drop-off Analysis\n```sql\n-- Detailed drop-off analysis with user segments\nWITH funnel_journey AS (\n  SELECT \n    u.user_id,\n    u.user_type, -- free, trial, enterprise\n    u.acquisition_channel,\n    u.created_at as signup_time,\n    activation.event_time as activation_time,\n    paid.event_time as paid_time,\n    CASE \n      WHEN activation.event_time IS NULL THEN 'no_activation'\n      WHEN paid.event_time IS NULL THEN 'no_conversion'\n      ELSE 'converted'\n    END as final_stage\n  FROM users u\n  LEFT JOIN (\n    SELECT user_id, MIN(event_time) as event_time\n    FROM user_events \n    WHERE event_type = 'first_key_action'\n    GROUP BY user_id\n  ) activation ON u.user_id = activation.user_id\n  LEFT JOIN (\n    SELECT user_id, MIN(created_at) as event_time\n    FROM subscriptions\n    GROUP BY user_id\n  ) paid ON u.user_id = paid.user_id\n  WHERE u.created_at >= '2024-01-01'\n)\nSELECT \n  final_stage,\n  user_type,\n  acquisition_channel,\n  COUNT(*) as user_count,\n  ROUND(COUNT(*) * 100.0 / SUM(COUNT(*)) OVER (PARTITION BY final_stage), 2) as stage_percentage\nFROM funnel_journey\nGROUP BY final_stage, user_type, acquisition_channel\nORDER BY final_stage, stage_percentage DESC;\n```\n\n### Predictive Conversion Indicators\n```sql\n-- Early indicators of likely conversion\nWITH user_behavior AS (\n  SELECT \n    u.user_id,\n    u.created_at as signup_time,\n    -- Early engagement metrics\n    COUNT(DISTINCT DATE(ue.event_time)) as active_days_first_week,\n    COUNT(DISTINCT ue.event_type) as unique_actions_first_week,\n    MAX(ue.event_time) as last_activity,\n    -- Product usage depth\n    COUNT(DISTINCT ue.feature_used) as features_used_first_week,\n    CASE WHEN s.user_id IS NOT NULL THEN 1 ELSE 0 END as converted\n  FROM users u\n  LEFT JOIN user_events ue ON u.user_id = ue.user_id \n    AND ue.event_time BETWEEN u.created_at AND u.created_at + INTERVAL '7 days'\n  LEFT JOIN subscriptions s ON u.user_id = s.user_id\n  WHERE u.created_at >= '2024-01-01'\n    AND u.created_at < '2024-02-01' -- Limit to complete month\n  GROUP BY u.user_id, u.created_at\n)\nSELECT \n  converted,\n  AVG(active_days_first_week) as avg_active_days,\n  AVG(unique_actions_first_week) as avg_unique_actions,\n  AVG(features_used_first_week) as avg_features_used,\n  COUNT(*) as user_count\nFROM user_behavior\nGROUP BY converted\nORDER BY converted;\n```\n\n## Gotchas\n\n### Common Pitfalls\n- **Time Zone Issues**: Always standardize timestamps to UTC for consistent analysis\n- **Data Freshness**: Real-time analytics may have delays in data ingestion\n- **User Identification**: Ensure consistent user ID handling across different data sources\n- **Sample Bias**: Be aware of selection bias when analyzing specific user segments\n\n### Edge Cases\n- **Multiple Conversions**: Users may convert multiple times (e.g., trial \u2192 paid \u2192 enterprise)\n- **Cross-Device Users**: Single users may have multiple device IDs or sessions\n- **Data Gaps**: Missing events due to tracking failures or system outages\n- **Seasonal Effects**: Account for seasonal patterns in conversion rates\n\n### Performance Issues\n- **Query Complexity**: Complex funnel queries can be slow on large datasets\n- **Join Optimization**: Use appropriate indexing and query optimization strategies\n- **Memory Usage**: Large result sets can consume significant memory\n- **Concurrent Queries**: Multiple analysts running complex queries can impact database performance\n\n### Security Considerations\n- **PII Protection**: User data may contain personally identifiable information\n- **Data Access**: Implement proper access controls for sensitive analytics data\n- **Audit Requirements**: Track who accesses what data and when\n- **Data Retention**: Follow data retention policies for user analytics data\n\n### Troubleshooting\n- **Missing Events**: Check event tracking implementation and data pipelines\n- **Inconsistent Counts**: Verify user ID consistency across data sources\n- **Time Zone Conflicts**: Ensure all timestamps use consistent time zones\n- **Query Timeouts**: Optimize queries or use materialized views for frequently accessed data\n\n## Integration Examples\n\n### Python Integration\n```python\nimport pandas as pd\nfrom sqlalchemy import create_engine\n\nclass FunnelAnalyzer:\n    def __init__(self, db_connection_string):\n        self.engine = create_engine(db_connection_string)\n    \n    def get_conversion_funnel(self, start_date, end_date):\n        query = \"\"\"\n        WITH funnel_stages AS (\n          SELECT user_id, 'signup' as stage, created_at as event_time\n          FROM users WHERE created_at >= %s AND created_at < %s\n          UNION ALL\n          SELECT user_id, 'activation' as stage, event_time\n          FROM user_events WHERE event_type = 'first_key_action'\n            AND event_time >= %s AND event_time < %s\n          UNION ALL\n          SELECT user_id, 'paid' as stage, created_at as event_time\n          FROM subscriptions WHERE created_at >= %s AND created_at < %s\n        )\n        SELECT stage, COUNT(DISTINCT user_id) as users\n        FROM funnel_stages\n        GROUP BY stage\n        ORDER BY \n          CASE stage WHEN 'signup' THEN 1 WHEN 'activation' THEN 2 WHEN 'paid' THEN 3 END\n        \"\"\"\n        \n        df = pd.read_sql(query, self.engine, params=[start_date, end_date] * 3)\n        return df\n    \n    def calculate_conversion_rates(self, funnel_df):\n        funnel_df['previous_users'] = funnel_df['users'].shift(1)\n        funnel_df['conversion_rate'] = (\n            funnel_df['users'] / funnel_df['previous_users'] * 100\n        ).round(2)\n        return funnel_df\n```\n\n### Dashboard Integration\n```python\n# Example: Daily funnel metrics for dashboard\ndef get_daily_funnel_metrics():\n    query = \"\"\"\n    SELECT \n      DATE(created_at) as date,\n      COUNT(*) as signups,\n      COUNT(DISTINCT CASE WHEN activated.user_id IS NOT NULL THEN users.user_id END) as activations,\n      COUNT(DISTINCT CASE WHEN paid.user_id IS NOT NULL THEN users.user_id END) as conversions\n    FROM users\n    LEFT JOIN (\n      SELECT DISTINCT user_id, MIN(event_time) as activation_time\n      FROM user_events WHERE event_type = 'first_key_action'\n      GROUP BY user_id\n    ) activated ON users.user_id = activated.user_id \n      AND DATE(activated.activation_time) = DATE(users.created_at)\n    LEFT JOIN (\n      SELECT DISTINCT user_id, MIN(created_at) as paid_time\n      FROM subscriptions GROUP BY user_id\n    ) paid ON users.user_id = paid.user_id \n      AND DATE(paid.paid_time) = DATE(users.created_at)\n    WHERE created_at >= CURRENT_DATE - INTERVAL '30 days'\n    GROUP BY DATE(created_at)\n    ORDER BY date DESC\n    \"\"\"\n    return pd.read_sql(query, engine)\n```\n\n## Configuration\n\n### Database Connection\n```python\n# config.py\nANALYTICS_DB_CONFIG = {\n    'host': 'analytics-db.internal.company.com',\n    'port': 5432,\n    'database': 'product_analytics',\n    'username': 'analytics_user',\n    'password': os.getenv('ANALYTICS_DB_PASSWORD'),\n    'sslmode': 'require'\n}\n\n# Query timeout settings\nQUERY_TIMEOUT = 300  # 5 minutes\nMAX_RESULT_ROWS = 100000  # Limit result size for performance\n```\n\n## References\n\nLoad these files when needed:\n- `scripts/funnel-analyzer.py` - Core funnel analysis and reporting tools\n- `scripts/cohort-calculator.py` - Cohort analysis and retention calculations\n- `references/analytics-schema.md` - Complete database schema documentation\n- `assets/query-templates.sql` - Reusable SQL query templates\n- `examples/dashboard-queries/` - Sample queries for common dashboard widgets\n"
