  "generate-security-report/SKILL.md": "---\nname: generate-security-report\ndescription: Scans infrastructure and applications for security vulnerabilities and compliance issues, generating comprehensive security reports. Use when identifying security risks, ensuring compliance, or implementing security best practices.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\ncompatibility: Requires Python 3.8+, cloud provider CLI tools (AWS CLI, Azure CLI, gcloud), and access to multi-cloud monitoring systems\nallowed-tools: Bash Read Write Grep\n---\n\n# Generate Security Report \u2014 Multi-Cloud Enterprise Automation\n\n## Purpose\nEnterprise-grade automation solution for compliance security scanner operations across AWS, Azure, GCP, and on-premise environments to maximize operational efficiency while maintaining security and compliance standards.\n\n## When to Use\n- **compliance security scanner operations** across multi-cloud environments\n- **Automation and optimization** of compliance security scanner workflows\n- **Monitoring and management** of compliance security scanner resources\n- **Compliance and governance** for compliance security scanner activities\n\n## Inputs\n- **operation**: Operation type (required)\n- **targetResource**: Target resource identifier (required)\n- **cloudProvider**: Cloud provider - `aws|azure|gcp|onprem|all` (optional, default: `all`)\n- **parameters**: Operation-specific parameters (optional)\n- **environment**: Target environment (optional, default: `production`)\n- **dryRun**: Dry run mode (optional, default: `true`)\n\n## Process\n1. **Cloud Provider Detection**: Identify target cloud providers and environments\n2. **Input Validation**: Comprehensive parameter validation and security checks\n3. **Multi-Cloud Context Analysis**: Analyze current state across all providers\n4. **Operation Planning**: Generate optimized execution plan\n5. **Safety Assessment**: Risk analysis and impact evaluation across providers\n6. **Execution**: Perform operations with monitoring and validation\n7. **Results Analysis**: Process results and generate reports\n\n## Outputs\n- **Operation Results**: Detailed execution results and status per provider\n- **Compliance Reports**: Validation and compliance status across environments\n- **Performance Metrics**: Operation performance and efficiency metrics by provider\n- **Recommendations**: Optimization suggestions and next steps\n- **Audit Trail**: Complete operation history for compliance across all providers\n\n## Environment\n- **AWS**: EKS, EC2, Lambda, CloudWatch, IAM, S3\n- **Azure**: AKS, VMs, Functions, Monitor, Azure AD\n- **GCP**: GKE, Compute Engine, Cloud Functions, Cloud Monitoring\n- **On-Premise**: Kubernetes clusters, VMware, OpenStack, Prometheus\n- **Multi-Cloud Tools**: Terraform, Ansible, Crossplane, Cluster API\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **Cloud SDKs**: boto3, azure-sdk, google-cloud\n- **Kubernetes**: kubernetes client for cluster operations\n- **Multi-Cloud Libraries**: terraform-python, ansible-python\n\n## Scripts\n- `core/scripts/automation/compliance-security-scanner.py`: Main automation implementation\n- `core/scripts/automation/compliance-security-scanner_handler.py`: Cloud-specific operations\n- `core/scripts/automation/multi_cloud_orchestrator.py`: Cross-provider coordination\n\n## Trigger Keywords\ncompliance, security, scanner, automation, enterprise, multi-cloud, aws, azure, gcp, onprem\n\n## Human Gate Requirements\n- **Production changes**: Production environment operations require approval\n- **High-impact operations**: Critical operations require review\n- **Security changes**: Security modifications need validation\n\n## Enterprise Features\n- **Multi-tenant Support**: Isolated operations per tenant\n- **Role-based Access Control**: Enterprise IAM integration\n- **Audit Logging**: Complete audit trail for compliance\n- **Performance Monitoring**: SLA tracking and metrics\n- **Security Hardening**: Encryption and compliance standards\n- **Dynamic Code Generation**: Agents can modify logic dynamically\n- **Cross-Cloud Orchestration**: Coordinated operations across providers\n\n## Best Practices\n- **Idempotent Operations**: Safe retry mechanisms\n- **Circuit Breaker Patterns**: Resilience against failures\n- **Rate Limiting**: Respect API limits and implement backpressure\n- **Graceful Degradation**: Fallback strategies when providers are unavailable\n- **Comprehensive Testing**: Integration tests and compliance validation\n- **Security First**: Zero-trust architecture and principle of least privilege\n"
  "health-check-monitor/SKILL.md": "---\nname: health-check-monitor\ndescription: Monitor Kubernetes cluster health and generate alerts for issues. Use when you need automated health monitoring, resource utilization tracking, or proactive issue detection in Kubernetes environments.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: infrastructure\n  risk_level: low\n  autonomy: full\n  layer: temporal\ncompatibility: Requires kubectl, Python 3.8+, and access to Kubernetes clusters\nallowed-tools: kubectl python\n---\n\n# Health Check Monitor \u2014 Kubernetes Cluster Monitoring\n\n## Purpose\nAutomated monitoring solution for Kubernetes cluster health, resource utilization, and proactive issue detection. Provides real-time alerts and recommendations for maintaining cluster stability.\n\n## When to Use\n- **Routine Health Checks**: Regular cluster status monitoring\n- **Resource Alerts**: When pods are nearing resource limits\n- **Node Issues**: Detecting unhealthy nodes or failed pods\n- **Capacity Planning**: Monitoring resource trends for scaling decisions\n- **Incident Prevention**: Early detection of potential problems\n\n## Gotchas\n\n### Common Pitfalls\n- **RBAC Permissions**: Health monitoring requires cluster-reader permissions\n- **Network Policies**: Some clusters block metrics collection from pods\n- **Resource Limits**: Monitoring pods themselves need resource limits\n- **False Positives**: Temporary spikes shouldn't trigger alerts\n\n### Edge Cases\n- **Multi-tenant Clusters**: Namespaces may have different monitoring requirements\n- **StatefulSets**: Different health criteria than stateless deployments\n- **Custom Resources**: CRDs may need special health checks\n\n## Inputs\n- **cluster**: Target cluster name (optional, default: current context)\n- **namespace**: Namespace to monitor (optional, default: all)\n- **check_types**: Types of checks to perform (optional, default: all)\n- **alert_thresholds**: Custom alert thresholds (optional)\n\n## Process\n1. **Cluster Discovery**: Identify target clusters and namespaces\n2. **Resource Collection**: Gather pod, node, and service status\n3. **Health Assessment**: Evaluate health metrics against thresholds\n4. **Alert Generation**: Create alerts for issues found\n5. **Report Generation**: Produce monitoring summary and recommendations\n\n## Outputs\n- **Health Status**: Overall cluster health score and status\n- **Resource Metrics**: CPU, memory, and storage utilization\n- **Alert Summary**: List of active alerts and recommendations\n- **Trend Analysis**: Resource usage patterns over time\n\n## Scripts\n- `scripts/health-checker.py`: Main monitoring implementation\n- `scripts/alert-handler.py`: Alert generation and notification\n- `scripts/metrics-collector.py`: Resource metrics gathering\n\n## Trigger Keywords\nhealth, monitor, kubernetes, cluster, alert, resources, nodes, pods\n\n## Human Gate Requirements\n- **Critical Alerts**: High-severity issues require immediate attention\n- **Resource Limits**: Actions requiring resource changes need approval\n\n## References\n- `references/kubernetes-health-patterns.md`: Health check methodologies\n- `assets/alert-templates/`: Alert message templates\n- `examples/cluster-configs/`: Sample cluster monitoring configurations\n"
  "iac-deployment-validator/SKILL.md": "---\nname: iac-deployment-validator\ndescription: >\n  Infrastructure as Code validation and security checking for Terraform, Kubernetes,\n  and Helm deployments. Performs comprehensive security analysis, cost estimation,\n  compliance validation, and best practices enforcement.\nmetadata:\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\n  human_gate: Manual approval required for production deployments\n---\n\n# IaC Deployment Validator Skill\n\n## Overview\n\nThe IaC Deployment Validator skill provides comprehensive validation and security analysis for Infrastructure as Code deployments. It supports Terraform, Kubernetes manifests, and Helm charts, ensuring deployments meet security standards, compliance requirements, and best practices.\n\n## Capabilities\n\n### Core Functions\n\n- **Terraform Plan Validation**: Analyzes Terraform plans for security, cost, and compliance\n- **Kubernetes Manifest Validation**: Validates K8s manifests for security and best practices\n- **Helm Chart Validation**: Checks Helm charts for security and configuration issues\n- **Cost Estimation**: Provides detailed cost analysis for infrastructure deployments\n- **Security Policy Checks**: Validates IaC against security policies and standards\n- **Comprehensive Reporting**: Generates detailed deployment validation reports\n\n### Supported IaC Types\n\n- **Terraform**: Plans, configurations, modules, and state analysis\n- **Kubernetes**: YAML manifests, resources, and cluster configurations\n- **Helm**: Charts, templates, values, and deployment analysis\n\n### Validation Categories\n\n1. **Security Analysis**\n   - Resource security configurations\n   - Network security rules\n   - Access control policies\n   - Encryption settings\n\n2. **Compliance Validation**\n   - CIS benchmarks\n   - NIST frameworks\n   - SOC2 requirements\n   - Industry-specific standards\n\n3. **Cost Analysis**\n   - Resource cost estimation\n   - Cost optimization recommendations\n   - Budget impact analysis\n   - ROI calculations\n\n4. **Best Practices**\n   - Resource naming conventions\n   - Configuration standards\n   - Performance optimization\n   - Maintainability checks\n\n## Usage\n\n### Terraform Validation\n\n```bash\n# Validate Terraform plan\nskill invoke iac-deployment-validator validate-terraform --plan-file terraform.plan --framework CIS\n\n# Validate with cost analysis\nskill invoke iac-deployment-validator validate-terraform --plan-file terraform.plan --check-cost --provider aws\n\n# Comprehensive validation\nskill invoke iac-deployment-validator validate-terraform --plan-file terraform.plan \\\n  --check-security --check-cost --check-compliance --framework NIST\n```\n\n### Kubernetes Validation\n\n```bash\n# Validate Kubernetes manifests\nskill invoke iac-deployment-validator validate-k8s --manifest-path k8s/ --namespace production\n\n# Security-focused validation\nskill invoke iac-deployment-validator validate-k8s --manifest-path deployment.yaml \\\n  --check-security --check-resources --check-best-practices\n\n# Validate specific manifest\nskill invoke iac-deployment-validator validate-k8s --manifest-path pod.yaml \\\n  --security-only\n```\n\n### Helm Chart Validation\n\n```bash\n# Validate Helm chart\nskill invoke iac-deployment-validator validate-helm --chart-path ./chart --release-name myapp\n\n# Dry-run validation\nskill invoke iac-deployment-validator validate-helm --chart-path ./chart \\\n  --values-file values-prod.yaml --dry-run --namespace production\n\n# Security validation\nskill invoke iac-deployment-validator validate-helm --chart-path ./chart \\\n  --check-security --values-file values.yaml\n```\n\n### Cost Estimation\n\n```bash\n# Estimate deployment costs\nskill invoke iac-deployment-validator estimate-cost --iac-type terraform \\\n  --config-path ./ --provider aws --region us-east-1\n\n# Multi-cloud cost comparison\nskill invoke iac-deployment-validator estimate-cost --iac-type terraform \\\n  --config-path ./ --compare-providers aws,azure,gcp\n\n# Cost optimization analysis\nskill invoke iac-deployment-validator estimate-cost --iac-type terraform \\\n  --config-path ./ --optimization-recommendations\n```\n\n### Security Policy Checks\n\n```bash\n# Check against security policies\nskill invoke iac-deployment-validator check-security --iac-path ./ \\\n  --policy-set CIS --severity-threshold medium\n\n# Custom policy validation\nskill invoke iac-deployment-validator check-security --iac-path ./ \\\n  --policy-set custom --custom-policy-path ./policies/\n\n# Compliance validation\nskill invoke iac-deployment-validator check-security --iac-path ./ \\\n  --policy-set NIST --generate-report\n```\n\n### Comprehensive Reporting\n\n```bash\n# Generate deployment report\nskill invoke iac-deployment-validator report --iac-path ./ \\\n  --format PDF --include-recommendations --include-cost-analysis\n\n# Executive summary report\nskill invoke iac-deployment-validator report --iac-path ./ \\\n  --format HTML --executive-summary --compliance-framework CIS\n\n# Technical analysis report\nskill invoke iac-deployment-validator report --iac-path ./ \\\n  --format JSON --technical-analysis --security-analysis\n```\n\n## Configuration\n\n### Required Environment Variables\n\n```bash\n# Cloud Provider Credentials\nAWS_ACCESS_KEY_ID=your_access_key\nAWS_SECRET_ACCESS_KEY=your_secret_key\nAWS_DEFAULT_REGION=us-east-1\n\nAZURE_CLIENT_ID=your_client_id\nAZURE_CLIENT_SECRET=your_client_secret\nAZURE_TENANT_ID=your_tenant_id\nAZURE_SUBSCRIPTION_ID=your_subscription_id\n\nGOOGLE_APPLICATION_CREDENTIALS=/path/to/service-account.json\nGCP_PROJECT_ID=your_project_id\n\n# Cost Estimation API\nINFRACOST_API_KEY=your_infracost_api_key\nPRICING_API_KEY=your_pricing_api_key\n```\n\n### Skill Configuration\n\n```yaml\n# .claude/skills/iac-deployment-validator/config.yaml\nvalidation_rules:\n  terraform:\n    security:\n      - check_unencrypted_storage\n      - check_open_security_groups\n      - check_iam_privileges\n      - check_logging_configuration\n    compliance:\n      - CIS_AWS_Controls\n      - NIST_800_53\n      - SOC2_Controls\n    cost:\n      - resource_sizing\n      - instance_types\n      - storage_optimization\n      - data_transfer_costs\n\n  kubernetes:\n    security:\n      - check_security_contexts\n      - check_privileged_containers\n      - check_secrets_management\n      - check_network_policies\n    best_practices:\n      - check_resource_limits\n      - check_health_checks\n      - check_image_tags\n      - check_namespace_usage\n\n  helm:\n    security:\n      - check_template_security\n      - check_values_security\n      - check_chart_integrity\n    structure:\n      - check_required_files\n      - check_chart_metadata\n      - check_template_syntax\n\ncost_estimation:\n  providers:\n    aws:\n      pricing_api: https://pricing.us-east-1.amazonaws.com\n      regions: [us-east-1, us-west-2, eu-west-1]\n    azure:\n      pricing_api: https://prices.azure.com\n      regions: [eastus, westus2, westeurope]\n    gcp:\n      pricing_api: https://cloudbilling.googleapis.com\n      regions: [us-central1, us-east1, europe-west1]\n\nreporting:\n  formats:\n    - JSON\n    - HTML\n    - PDF\n  sections:\n    - executive_summary\n    - technical_analysis\n    - security_analysis\n    - cost_analysis\n    - recommendations\n  templates:\n    executive: templates/executive-report.html\n    technical: templates/technical-report.html\n    security: templates/security-report.html\n\nnotification:\n  slack:\n    webhook_url: https://hooks.slack.com/services/...\n    channel: #iac-validation\n    username: IaC Validator\n  email:\n    smtp_server: smtp.company.com\n    smtp_port: 587\n    from_address: iac-validator@company.com\n    recipients:\n      - devops@company.com\n      - security@company.com\n```\n\n## MCP Server Integration\n\nThis skill integrates with the `iac-validator` MCP server for enhanced capabilities:\n\n### Available MCP Tools\n\n- `validate_terraform_plan`: Validate Terraform plans for security, cost, and compliance\n- `validate_kubernetes_manifests`: Validate K8s manifests for best practices and security\n- `validate_helm_chart`: Validate Helm charts for security and best practices\n- `estimate_deployment_costs`: Estimate costs for infrastructure deployment\n- `check_security_policies`: Check IaC against security policies and standards\n- `generate_deployment_report`: Generate comprehensive deployment validation report\n\n### MCP Usage Example\n\n```javascript\n// Using the MCP server directly\nconst terraformValidation = await mcp.call('validate_terraform_plan', {\n  plan_file: 'terraform.plan',\n  check_security: true,\n  check_cost: true,\n  check_compliance: true,\n  compliance_framework: 'CIS'\n});\n\nconst k8sValidation = await mcp.call('validate_kubernetes_manifests', {\n  manifest_path: 'k8s/',\n  namespace: 'production',\n  check_security: true,\n  check_resources: true,\n  check_best_practices: true\n});\n```\n\n## Implementation Details\n\n### Architecture\n\n```\n\u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 IaC Parsers     \u2502    \u2502 Validation Engine\u2502    \u2502 Reporting       \u2502\n\u2502                 \u2502    \u2502                  \u2502    \u2502                 \u2502\n\u2502 \u2022 Terraform     \u2502\u2500\u2500\u2500\u25B6\u2502 \u2022 Security Rules \u2502\u2500\u2500\u2500\u25B6\u2502 \u2022 PDF Generator \u2502\n\u2502 \u2022 Kubernetes    \u2502    \u2502 \u2022 Compliance     \u2502    \u2502 \u2022 HTML Generator \u2502\n\u2502 \u2022 Helm          \u2502    \u2502 \u2022 Cost Analysis  \u2502    \u2502 \u2022 JSON Export   \u2502\n\u2502 \u2022 YAML/JSON     \u2502    \u2502 \u2022 Best Practices \u2502    \u2502 \u2022 Email Sender  \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n         \u2502                       \u2502                       \u2502\n         \u25BC                       \u25BC                       \u25BC\n\u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 Cost Estimator  \u2502    \u2502 Policy Engine    \u2502    \u2502 Notification    \u2502\n\u2502                 \u2502    \u2502                  \u2502    \u2502                 \u2502\n\u2502 \u2022 Cloud APIs    \u2502    \u2502 \u2022 Rule Evaluation\u2502    \u2502 \u2022 Slack Webhook \u2502\n\u2502 \u2022 Pricing Data  \u2502    \u2502 \u2022 Policy Matching\u2502    \u2502 \u2022 Email SMTP    \u2502\n\u2502 \u2022 Optimization  \u2502    \u2502 \u2022 Scoring        \u2502    \u2502 \u2022 Teams Channel \u2502\n\u2502 \u2022 Budget Track  \u2502    \u2502 \u2022 Exceptions     \u2502    \u2502 \u2022 PagerDuty     \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### Validation Rules\n\n#### Terraform Security Rules\n\n1. **Storage Encryption**\n   ```hcl\n   # \u274C Bad - Unencrypted EBS volume\n   resource \"aws_ebs_volume\" \"example\" {\n     size = 100\n     # encrypted = false  # Missing encryption\n   }\n   \n   # \u2705 Good - Encrypted EBS volume\n   resource \"aws_ebs_volume\" \"example\" {\n     size = 100\n     encrypted = true\n   }\n   ```\n\n2. **Security Group Configuration**\n   ```hcl\n   # \u274C Bad - Open to world\n   resource \"aws_security_group\" \"example\" {\n     ingress {\n       from_port   = 22\n       to_port     = 22\n       protocol    = \"tcp\"\n       cidr_blocks = [\"0.0.0.0/0\"]  # Too open\n     }\n   }\n   \n   # \u2705 Good - Restricted access\n   resource \"aws_security_group\" \"example\" {\n     ingress {\n       from_port   = 22\n       to_port     = 22\n       protocol    = \"tcp\"\n       cidr_blocks = [\"10.0.0.0/8\"]  # Restricted\n     }\n   }\n   ```\n\n#### Kubernetes Security Rules\n\n1. **Security Context**\n   ```yaml\n   # \u274C Bad - No security context\n   apiVersion: v1\n   kind: Pod\n   spec:\n     containers:\n     - name: app\n       image: nginx\n   # Missing security context\n   \n   # \u2705 Good - With security context\n   apiVersion: v1\n   kind: Pod\n   spec:\n     securityContext:\n       runAsNonRoot: true\n       runAsUser: 1000\n       fsGroup: 2000\n     containers:\n     - name: app\n       image: nginx\n       securityContext:\n         allowPrivilegeEscalation: false\n         readOnlyRootFilesystem: true\n   ```\n\n2. **Resource Limits**\n   ```yaml\n   # \u274C Bad - No resource limits\n   apiVersion: v1\n   kind: Pod\n   spec:\n     containers:\n     - name: app\n       image: nginx\n       # Missing resources section\n   \n   # \u2705 Good - With resource limits\n   apiVersion: v1\n   kind: Pod\n   spec:\n     containers:\n     - name: app\n       image: nginx\n       resources:\n         requests:\n           memory: \"64Mi\"\n           cpu: \"250m\"\n         limits:\n           memory: \"128Mi\"\n           cpu: \"500m\"\n   ```\n\n### Cost Estimation Algorithm\n\nThe cost estimation uses a multi-factor approach:\n\n1. **Resource Pricing**: Real-time cloud provider pricing data\n2. **Usage Patterns**: Historical usage data and projections\n3. **Regional Variations**: Price differences across regions\n4. **Volume Discounts**: Enterprise pricing and volume discounts\n5. **Optimization Opportunities**: Rightsizing and alternative options\n\n### Compliance Validation\n\nThe skill validates against multiple compliance frameworks:\n\n#### CIS Controls\n- Access control\n- Audit logging\n- Data encryption\n- Network security\n- Vulnerability management\n\n#### NIST 800-53\n- Security and privacy controls\n- Risk management\n- System and communications protection\n- System and information integrity\n\n#### SOC2\n- Security\n- Availability\n- Processing integrity\n- Confidentiality\n- Privacy\n\n## Best Practices\n\n### 1. IaC Development\n- Use consistent naming conventions\n- Implement modular design\n- Include comprehensive documentation\n- Use version control effectively\n\n### 2. Security Integration\n- Implement security checks early in development\n- Use automated security scanning\n- Regularly update security rules\n- Monitor for new vulnerabilities\n\n### 3. Cost Management\n- Regularly review resource utilization\n- Implement cost monitoring\n- Use reserved instances where appropriate\n- Optimize storage and data transfer\n\n### 4. Compliance Management\n- Map compliance requirements to technical controls\n- Maintain compliance evidence\n- Regular compliance assessments\n- Continuous compliance monitoring\n\n## Troubleshooting\n\n### Common Issues\n\n**Terraform Plan Parsing Errors**\n```bash\n# Check Terraform version compatibility\nskill invoke iac-deployment-validator check-terraform-version\n\n# Validate plan file format\nskill invoke iac-deployment-validator validate-plan-format --plan-file terraform.plan\n\n# Debug parsing issues\nexport IAC_VALIDATOR_DEBUG=true\nskill invoke iac-deployment-validator validate-terraform --plan-file terraform.plan --debug\n```\n\n**Kubernetes Manifest Validation Failures**\n```bash\n# Check YAML syntax\nskill invoke iac-deployment-validator validate-yaml --manifest-path deployment.yaml\n\n# Verify K8s API version compatibility\nskill invoke iac-deployment-validator check-api-version --manifest-path deployment.yaml\n\n# Test resource validation\nskill invoke iac-deployment-validator test-resource --manifest-path deployment.yaml\n```\n\n**Cost Estimation Issues**\n```bash\n# Check pricing API connectivity\nskill invoke iac-deployment-validator test-pricing-api --provider aws\n\n# Verify cost calculation\nskill invoke iac-deployment-validator debug-cost --config-path ./ --verbose\n\n# Update pricing data\nskill invoke iac-deployment-validator update-pricing --provider aws\n```\n\n### Debug Mode\n\n```bash\n# Enable comprehensive debugging\nexport IAC_VALIDATOR_DEBUG=true\nexport IAC_VALIDATOR_TRACE=true\nskill invoke iac-deployment-validator validate-terraform --plan-file terraform.plan \\\n  --debug --trace --verbose\n```\n\n## Integration Examples\n\n### CI/CD Pipeline Integration\n\n```yaml\n# .github/workflows/iac-validation.yml\nname: IaC Validation\non: [push, pull_request]\n\njobs:\n  validate-terraform:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v2\n      - name: Setup Terraform\n        uses: hashicorp/setup-terraform@v1\n      - name: Terraform Plan\n        run: terraform plan -out=tf.plan\n      - name: Validate IaC\n        run: |\n          skill invoke iac-deployment-validator validate-terraform \\\n            --plan-file tf.plan \\\n            --check-security --check-cost --check-compliance \\\n            --framework CIS\n      - name: Upload Validation Report\n        uses: actions/upload-artifact@v2\n        with:\n          name: iac-validation-report\n          path: validation-report.pdf\n\n  validate-kubernetes:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v2\n      - name: Validate Kubernetes Manifests\n        run: |\n          skill invoke iac-deployment-validator validate-k8s \\\n            --manifest-path k8s/ \\\n            --check-security --check-resources --check-best-practices\n```\n\n### Git Hooks Integration\n\n```bash\n#!/bin/sh\n# .git/hooks/pre-commit\necho \"Running IaC validation...\"\n\n# Validate Terraform files\nif find . -name \"*.tf\" -print -quit | grep -q .; then\n  terraform plan -out=tf.plan\n  skill invoke iac-deployment-validator validate-terraform \\\n    --plan-file tf.plan \\\n    --severity-threshold high\n  rm tf.plan\nfi\n\n# Validate Kubernetes manifests\nif find . -name \"*.yaml\" -o -name \"*.yml\" -print -quit | grep -q .; then\n  skill invoke iac-deployment-validator validate-k8s \\\n    --manifest-path . \\\n    --severity-threshold medium\nfi\n\necho \"IaC validation passed!\"\n```\n\n### IDE Integration\n\n```json\n// .vscode/settings.json\n{\n  \"iac-validator.autoValidate\": true,\n  \"iac-validator.severityThreshold\": \"medium\",\n  \"iac-validator.frameworks\": [\"CIS\", \"NIST\"],\n  \"iac-validator.costEstimation\": true,\n  \"iac-validator.notificationChannels\": [\"slack\"]\n}\n```\n\n## Performance Considerations\n\n### Optimization Tips\n\n1. **Parallel Processing**: Validate multiple files in parallel\n2. **Caching**: Cache validation results and pricing data\n3. **Incremental Validation**: Only validate changed files\n4. **Batch Processing**: Process multiple resources together\n\n### Resource Usage\n\n- **Memory**: ~2GB for large-scale IaC validation\n- **CPU**: High usage during security analysis and cost estimation\n- **Network**: High usage during cloud API calls for pricing\n- **Storage**: ~1GB for validation cache and reports\n\n## Security Considerations\n\n### Data Protection\n\n- All cloud credentials are encrypted at rest\n- IaC configurations are processed in memory only\n- Validation reports are stored securely\n- Sensitive data is redacted in reports\n\n### Access Control\n\n- Role-based access for validation operations\n- Audit logging for all validation activities\n- Secure API key management\n- Network segmentation for validation workloads\n\n## Version History\n\n### v1.0.0\n- Initial Terraform validation support\n- Basic security checks and cost estimation\n- JSON and HTML reporting\n\n### v1.1.0\n- Added Kubernetes manifest validation\n- Enhanced security rules\n- PDF reporting support\n\n### v1.2.0\n- Helm chart validation\n- Multi-cloud cost estimation\n- Compliance framework support\n\n### v1.3.0\n- Advanced security analysis\n- Real-time pricing integration\n- Comprehensive reporting suite\n\n## Support and Contributing\n\n### Getting Help\n\n- Documentation: `/docs/iac-deployment-validator.md`\n- Examples: `/examples/iac-validation/`\n- Community: `#iac-validation` Slack channel\n\n### Contributing\n\n1. Fork the repository\n2. Create a feature branch\n3. Add tests for new validation rules\n4. Submit a pull request\n\n### License\n\nThis skill is licensed under the MIT License. See LICENSE file for details.\n"
  "implement-policy-as-code/SKILL.md": "---\nname: implement-policy-as-code\ndescription: Implements and manages policy-as-code solutions across multi-cloud environments with validation and enforcement. Use when defining infrastructure policies, ensuring compliance, or implementing governance automation.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\ncompatibility: Requires Python 3.8+, cloud provider CLI tools (AWS CLI, Azure CLI, gcloud), and access to multi-cloud monitoring systems\nallowed-tools: Bash Read Write Grep\n---\n\n# Policy As Code \u2014 Multi-Cloud Enterprise Automation\n\n## Purpose\nEnterprise-grade automation solution for policy as code operations across AWS, Azure, GCP, and on-premise environments to maximize operational efficiency while maintaining security and compliance standards.\n\n## When to Use\n- **policy as code operations** across multi-cloud environments\n- **Automation and optimization** of policy as code workflows\n- **Monitoring and management** of policy as code resources\n- **Compliance and governance** for policy as code activities\n\n## Inputs\n- **operation**: Operation type (required)\n- **targetResource**: Target resource identifier (required)\n- **cloudProvider**: Cloud provider - `aws|azure|gcp|onprem|all` (optional, default: `all`)\n- **parameters**: Operation-specific parameters (optional)\n- **environment**: Target environment (optional, default: `production`)\n- **dryRun**: Dry run mode (optional, default: `true`)\n\n## Process\n1. **Cloud Provider Detection**: Identify target cloud providers and environments\n2. **Input Validation**: Comprehensive parameter validation and security checks\n3. **Multi-Cloud Context Analysis**: Analyze current state across all providers\n4. **Operation Planning**: Generate optimized execution plan\n5. **Safety Assessment**: Risk analysis and impact evaluation across providers\n6. **Execution**: Perform operations with monitoring and validation\n7. **Results Analysis**: Process results and generate reports\n\n## Outputs\n- **Operation Results**: Detailed execution results and status per provider\n- **Compliance Reports**: Validation and compliance status across environments\n- **Performance Metrics**: Operation performance and efficiency metrics by provider\n- **Recommendations**: Optimization suggestions and next steps\n- **Audit Trail**: Complete operation history for compliance across all providers\n\n## Environment\n- **AWS**: EKS, EC2, Lambda, CloudWatch, IAM, S3\n- **Azure**: AKS, VMs, Functions, Monitor, Azure AD\n- **GCP**: GKE, Compute Engine, Cloud Functions, Cloud Monitoring\n- **On-Premise**: Kubernetes clusters, VMware, OpenStack, Prometheus\n- **Multi-Cloud Tools**: Terraform, Ansible, Crossplane, Cluster API\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **Cloud SDKs**: boto3, azure-sdk, google-cloud\n- **Kubernetes**: kubernetes client for cluster operations\n- **Multi-Cloud Libraries**: terraform-python, ansible-python\n\n## Scripts\n- `core/scripts/automation/policy-as-code.py`: Main automation implementation\n- `core/scripts/automation/policy-as-code_handler.py`: Cloud-specific operations\n- `core/scripts/automation/multi_cloud_orchestrator.py`: Cross-provider coordination\n\n## Trigger Keywords\npolicy, as, code, automation, enterprise, multi-cloud, aws, azure, gcp, onprem\n\n## Human Gate Requirements\n- **Production changes**: Production environment operations require approval\n- **High-impact operations**: Critical operations require review\n- **Security changes**: Security modifications need validation\n\n## Enterprise Features\n- **Multi-tenant Support**: Isolated operations per tenant\n- **Role-based Access Control**: Enterprise IAM integration\n- **Audit Logging**: Complete audit trail for compliance\n- **Performance Monitoring**: SLA tracking and metrics\n- **Security Hardening**: Encryption and compliance standards\n- **Dynamic Code Generation**: Agents can modify logic dynamically\n- **Cross-Cloud Orchestration**: Coordinated operations across providers\n\n## Best Practices\n- **Idempotent Operations**: Safe retry mechanisms\n- **Circuit Breaker Patterns**: Resilience against failures\n- **Rate Limiting**: Respect API limits and implement backpressure\n- **Graceful Degradation**: Fallback strategies when providers are unavailable\n- **Comprehensive Testing**: Integration tests and compliance validation\n- **Security First**: Zero-trust architecture and principle of least privilege\n"
  "incident-triage-automator/SKILL.md": "---\nname: incident-triage-automator\ndescription: >\n  Automated incident triage and management system that aggregates alerts, assesses severity,\n  creates incidents, notifies stakeholders, and tracks resolution progress. Integrates with\n  monitoring systems to provide comprehensive incident lifecycle management.\nmetadata:\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\n  human_gate: Escalation approval required for P0 incidents\n---\n\n# Incident Triage Automator Skill\n\n## Overview\n\nThe Incident Triage Automator skill provides intelligent incident management capabilities, automatically triaging alerts, assessing severity, and coordinating incident response across multiple monitoring systems. It reduces incident response time and ensures consistent handling of operational issues.\n\n## Capabilities\n\n### Core Functions\n\n- **Alert Aggregation**: Correlates alerts from Prometheus, Datadog, PagerDuty, and other monitoring systems\n- **Severity Assessment**: Uses ML-driven analysis to assess incident severity and impact\n- **Automated Incident Creation**: Creates structured incidents in incident management systems\n- **Stakeholder Notification**: Automatically notifies relevant stakeholders based on escalation policies\n- **Runbook Recommendation**: Suggests relevant runbooks based on incident patterns\n- **Status Tracking**: Tracks incident resolution progress and generates post-mortem reports\n\n### Supported Monitoring Systems\n\n- **Prometheus**: Alertmanager alerts and metrics\n- **Datadog**: Monitors, events, and alerts\n- **PagerDuty**: Incidents and on-call schedules\n- **Grafana**: Dashboard alerts and annotations\n- **Custom**: REST API integration for custom monitoring tools\n\n### Notification Channels\n\n- **Slack**: Channel notifications and DM alerts\n- **Email**: Rich HTML email notifications\n- **Microsoft Teams**: Channel and personal messages\n- **PagerDuty**: Escalation and on-call notifications\n\n## Usage\n\n### Basic Incident Triage\n\n```bash\n# Aggregate and triage alerts from all sources\nskill invoke incident-triage-automator triage --time-window 1h --severity-threshold HIGH\n\n# Triage specific monitoring source\nskill invoke incident-triage-automator triage --source prometheus --time-window 30m\n\n# Create incident from alerts\nskill invoke incident-triage-automator create-incident --title \"Database Degradation\" --severity P1\n```\n\n### Stakeholder Notification\n\n```bash\n# Notify stakeholders for P0 incident\nskill invoke incident-triage-automator notify --incident-id INC-001 --escalation-level executive\n\n# Send custom notification\nskill invoke incident-triage-automator notify --incident-id INC-002 --channels slack,email --message-template custom\n```\n\n### Runbook Recommendations\n\n```bash\n# Get runbook recommendations for incident\nskill invoke incident-triage-automator recommend-runbook --incident-id INC-001 --symptoms \"high_cpu,slow_queries\"\n\n# Search runbooks by service\nskill invoke incident-triage-automator recommend-runbook --service database --category performance\n```\n\n### Status Tracking\n\n```bash\n# Update incident status\nskill invoke incident-triage-automator update-status --incident-id INC-001 --status investigating\n\n# Add resolution notes\nskill invoke incident-triage-automator update-status --incident-id INC-001 --status resolved --resolution-notes \"Fixed database connection pool\"\n```\n\n## Configuration\n\n### Required Environment Variables\n\n```bash\n# Monitoring System Credentials\nPROMETHEUS_URL=https://prometheus.company.com\nDATADOG_API_KEY=your_datadog_api_key\nDATADOG_APP_KEY=your_datadog_app_key\nPAGERDUTY_API_KEY=your_pagerduty_api_key\n\n# Notification System Credentials\nSLACK_BOT_TOKEN=xoxb-your-slack-bot-token\nSLACK_SIGNING_SECRET=your-slack-signing-secret\nEMAIL_SMTP_HOST=smtp.company.com\nEMAIL_SMTP_PORT=587\nEMAIL_USERNAME=alerts@company.com\nEMAIL_PASSWORD=your_email_password\n\n# Incident Management System\nINCIDENT_SYSTEM_URL=https://incidents.company.com\nINCIDENT_API_KEY=your_incident_api_key\n```\n\n### Skill Configuration\n\n```yaml\n# .claude/skills/incident-triage-automator/config.yaml\nalert_sources:\n  prometheus:\n    url: https://prometheus.company.com\n    enabled: true\n    alertmanager_url: https://alertmanager.company.com\n  datadog:\n    api_key: ${DATADOG_API_KEY}\n    app_key: ${DATADOG_APP_KEY}\n    enabled: true\n  pagerduty:\n    api_key: ${PAGERDUTY_API_KEY}\n    enabled: true\n\nseverity_assessment:\n  weights:\n    user_impact: 0.4\n    business_impact: 0.3\n    affected_users: 0.2\n    affected_services: 0.1\n  thresholds:\n    P0: 80\n    P1: 60\n    P2: 40\n    P3: 20\n\nescalation_policy:\n  P0:\n    - level: executive\n      delay: 0m\n      channels: [slack, email, pagerduty]\n  P1:\n    - level: director\n      delay: 15m\n      channels: [slack, email]\n    - level: executive\n      delay: 1h\n      channels: [slack, email, pagerduty]\n  P2:\n    - level: manager\n      delay: 1h\n      channels: [slack, email]\n  P3:\n    - level: team\n      delay: 4h\n      channels: [slack]\n\nnotification_templates:\n  slack: |\n    \U0001F6A8 **{{severity}} Incident** \U0001F6A8\n    \n    *Title*: {{title}}\n    *Status*: {{status}}\n    *Services*: {{affected_services}}\n    \n    {{description}}\n    \n    \U0001F517 View Incident: {{incident_url}}\n  \n  email: |\n    <h2>\U0001F6A8 {{severity}} Incident Alert</h2>\n    <p><strong>Title:</strong> {{title}}</p>\n    <p><strong>Status:</strong> {{status}}</p>\n    <p><strong>Affected Services:</strong> {{affected_services}}</p>\n    <p><strong>Description:</strong> {{description}}</p>\n    <p><a href=\"{{incident_url}}\">View Incident Details</a></p>\n```\n\n## MCP Server Integration\n\nThis skill integrates with the `incident-triage` MCP server for enhanced capabilities:\n\n### Available MCP Tools\n\n- `aggregate_alerts`: Aggregate and correlate alerts from multiple sources\n- `assess_incident_severity`: Assess incident severity based on impact\n- `create_incident`: Create incidents in incident management systems\n- `notify_stakeholders`: Notify relevant stakeholders\n- `recommend_runbook`: Recommend relevant runbooks\n- `track_incident_status`: Track incident resolution progress\n\n### MCP Usage Example\n\n```javascript\n// Using the MCP server directly\nconst alerts = await mcp.call('aggregate_alerts', {\n  time_window: '1h',\n  alert_sources: ['prometheus', 'datadog'],\n  correlation_threshold: 0.7\n});\n\nconst severity = await mcp.call('assess_incident_severity', {\n  incident_data: {\n    title: 'Database Performance Degradation',\n    affected_services: ['database', 'api'],\n    user_impact: 'major',\n    business_impact: 'medium'\n  },\n  auto_create_incident: true\n});\n```\n\n## Implementation Details\n\n### Architecture\n\n```\n\u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 Alert Sources   \u2502    \u2502 Triage Engine    \u2502    \u2502 Incident Mgmt   \u2502\n\u2502                 \u2502    \u2502                  \u2502    \u2502                 \u2502\n\u2502 \u2022 Prometheus    \u2502\u2500\u2500\u2500\u25B6\u2502 \u2022 Correlation     \u2502\u2500\u2500\u2500\u25B6\u2502 \u2022 Incident CRUD \u2502\n\u2502 \u2022 Datadog       \u2502    \u2502 \u2022 Severity Calc  \u2502    \u2502 \u2022 Status Tracking\u2502\n\u2502 \u2022 PagerDuty     \u2502    \u2502 \u2022 Pattern Match  \u2502    \u2502 \u2022 Assignment    \u2502\n\u2502 \u2022 Custom APIs   \u2502    \u2502 \u2022 ML Assessment  \u2502    \u2502 \u2022 Escalation    \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n         \u2502                       \u2502                       \u2502\n         \u25BC                       \u25BC                       \u25BC\n\u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 Notification     \u2502    \u2502 Runbook Engine   \u2502    \u2502 Reporting       \u2502\n\u2502                 \u2502    \u2502                  \u2502    \u2502                 \u2502\n\u2502 \u2022 Slack Bot     \u2502    \u2502 \u2022 Search         \u2502    \u2502 \u2022 MTTR Metrics  \u2502\n\u2502 \u2022 Email Sender  \u2502    \u2502 \u2022 Ranking        \u2502    \u2502 \u2022 Incident Report\u2502\n\u2502 \u2022 Teams Webhook \u2502    \u2502 \u2022 Context Match  \u2502    \u2502 \u2022 Post-mortem    \u2502\n\u2502 \u2022 PagerDuty API \u2502    \u2502 \u2022 Success Rate   \u2502    \u2502 \u2022 Trend Analysis \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### Alert Correlation Algorithm\n\nThe skill uses a sophisticated correlation algorithm:\n\n1. **Time-based Correlation**: Groups alerts occurring within a specified time window\n2. **Service-based Correlation**: Groups alerts affecting the same services\n3. **Pattern-based Correlation**: Uses ML to identify similar alert patterns\n4. **Impact-based Correlation**: Groups alerts with similar business impact\n\n### Severity Assessment Model\n\nThe severity assessment considers multiple factors:\n\n```python\ndef calculate_severity_score(incident_data):\n    score = 0\n    \n    # User impact (40% weight)\n    user_impact_scores = {\n        'none': 0, 'minor': 25, 'major': 50, 'critical': 100\n    }\n    score += user_impact_scores[incident_data.user_impact] * 0.4\n    \n    # Business impact (30% weight)\n    business_impact_scores = {\n        'none': 0, 'minor': 25, 'major': 50, 'critical': 100\n    }\n    score += business_impact_scores[incident_data.business_impact] * 0.3\n    \n    # Affected users (20% weight)\n    if incident_data.affected_users > 10000:\n        score += 100 * 0.2\n    elif incident_data.affected_users > 1000:\n        score += 75 * 0.2\n    elif incident_data.affected_users > 100:\n        score += 50 * 0.2\n    elif incident_data.affected_users > 10:\n        score += 25 * 0.2\n    \n    # Affected services (10% weight)\n    score += min(incident_data.affected_services.length * 10, 100) * 0.1\n    \n    return min(score, 100)\n```\n\n### Runbook Recommendation System\n\nThe runbook recommendation uses multiple signals:\n\n1. **Incident Type Matching**: Matches incident type to runbook categories\n2. **Service Matching**: Prioritizes runbooks for affected services\n3. **Symptom Matching**: Uses NLP to match symptoms to runbook content\n4. **Success Rate**: Prioritizes runbooks with higher success rates\n5. **Recency**: Considers recently used and effective runbooks\n\n## Best Practices\n\n### 1. Alert Configuration\n- Configure alerts with meaningful titles and descriptions\n- Include relevant labels and annotations\n- Set appropriate severity levels in monitoring systems\n- Use consistent naming conventions\n\n### 2. Escalation Policies\n- Define clear escalation paths for each severity level\n- Include on-call schedules and backup contacts\n- Set appropriate escalation delays\n- Test escalation policies regularly\n\n### 3. Runbook Management\n- Keep runbooks up-to-date with latest procedures\n- Include clear step-by-step instructions\n- Add expected timeframes for each step\n- Document common pitfalls and solutions\n\n### 4. Incident Documentation\n- Capture all incident timeline events\n- Document root cause analysis\n- Include lessons learned\n- Track improvement actions\n\n## Troubleshooting\n\n### Common Issues\n\n**Alert Aggregation Failures**\n```bash\n# Check monitoring system connectivity\nskill invoke incident-triage-automator check-connection --source prometheus\nskill invoke incident-triage-automator check-connection --source datadog\n\n# Verify alert format\nskill invoke incident-triage-automator validate-alerts --source prometheus\n```\n\n**Severity Assessment Issues**\n```bash\n# Test severity calculation\nskill invoke incident-triage-automator test-severity --incident-data test-incident.json\n\n# Review assessment weights\nskill invoke incident-triage-automator show-config --section severity_assessment\n```\n\n**Notification Failures**\n```bash\n# Test notification channels\nskill invoke incident-triage-automator test-notification --channel slack\nskill invoke incident-triage-automator test-notification --channel email\n\n# Verify escalation policies\nskill invoke incident-triage-automator test-escalation --severity P0\n```\n\n### Debug Mode\n\n```bash\n# Enable debug logging\nexport INCIDENT_TRIAGE_DEBUG=true\nskill invoke incident-triage-automator triage --debug --verbose\n```\n\n## Integration Examples\n\n### CI/CD Pipeline Integration\n\n```yaml\n# .github/workflows/incident-response.yml\nname: Incident Response Test\non: [push]\n\njobs:\n  test-incident-response:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v2\n      - name: Test Alert Processing\n        run: |\n          skill invoke incident-triage-automator test-alerts \\\n            --test-data test-alerts.json \\\n            --expected-severity P1\n      - name: Test Notification Flow\n        run: |\n          skill invoke incident-triage-automator test-notification \\\n            --channel slack \\\n            --test-incident-id TEST-001\n```\n\n### Slack Bot Integration\n\n```javascript\n// Slack bot command handler\napp.command('/incident', async ({ command, ack, say }) => {\n  await ack();\n  \n  const parts = command.text.split(' ');\n  const action = parts[0];\n  const incidentId = parts[1];\n  \n  switch (action) {\n    case 'status':\n      const status = await skill.invoke('incident-triage-automator', {\n        action: 'get-status',\n        incident_id: incidentId\n      });\n      await say(`Incident ${incidentId} status: ${status.status}`);\n      break;\n      \n    case 'escalate':\n      await skill.invoke('incident-triage-automator', {\n        action: 'escalate',\n        incident_id: incidentId,\n        level: 'manager'\n      });\n      await say(`Incident ${incidentId} escalated to manager`);\n      break;\n  }\n});\n```\n\n## Performance Considerations\n\n### Optimization Tips\n\n1. **Alert Batching**: Process alerts in batches to reduce API calls\n2. **Caching**: Cache incident data and runbook recommendations\n3. **Parallel Processing**: Process multiple alert sources in parallel\n4. **Rate Limiting**: Respect API rate limits for monitoring systems\n\n### Resource Usage\n\n- **Memory**: ~1GB for processing large alert volumes\n- **CPU**: High usage during correlation and ML assessment\n- **Network**: High usage during alert aggregation\n- **Storage**: ~500MB for incident history and runbooks\n\n## Security Considerations\n\n### Data Protection\n\n- All monitoring credentials are encrypted at rest\n- Incident data is stored in secure, access-controlled storage\n- Sensitive information is redacted in notifications\n\n### Access Control\n\n- Role-based access for incident management\n- Audit logging for all incident activities\n- Secure webhook validation for monitoring systems\n\n## Version History\n\n### v1.0.0\n- Initial release with Prometheus and PagerDuty integration\n- Basic severity assessment and notification capabilities\n- Slack and email notification support\n\n### v1.1.0\n- Added Datadog integration\n- Enhanced correlation algorithms\n- Runbook recommendation system\n\n### v1.2.0\n- ML-based severity assessment\n- Multi-channel notification improvements\n- Comprehensive reporting and analytics\n\n### v1.3.0\n- Teams integration\n- Advanced escalation policies\n- Post-mortem automation\n\n## Support and Contributing\n\n### Getting Help\n\n- Documentation: `/docs/incident-triage-automator.md`\n- Examples: `/examples/incident-triage/`\n- Community: `#incident-response` Slack channel\n\n### Contributing\n\n1. Fork the repository\n2. Create a feature branch\n3. Add tests for new functionality\n4. Submit a pull request\n\n### License\n\nThis skill is licensed under the MIT License. See LICENSE file for details.\n"
  "incident-triage-runbook/SKILL.md": "---\nname: incident-triage-runbook\ndescription: Use when incidents occur and you need to triage, categorize, and execute response runbooks automatically. Correlates alerts, identifies root causes, escalates to appropriate teams, and executes remediation procedures for production incidents.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\ncompatibility: Requires Python 3.8+, cloud provider CLI tools (AWS CLI, Azure CLI, gcloud), and access to multi-cloud monitoring systems\nallowed-tools: Bash Read Write Grep\n---\n\n# Incident Triage Runbook \u2014 Multi-Cloud Enterprise Automation\n\n## Purpose\nEnterprise-grade automation solution for incident triage runbook operations across AWS, Azure, GCP, and on-premise environments to maximize operational efficiency while maintaining security and compliance standards.\n\n## When to Use\n- **Production Outages**: When services are down or severely degraded and immediate response is needed\n- **High Severity Alerts**: For P1/P2 incidents requiring urgent attention and coordination\n- **Recurring Issues**: When the same type of incident happens repeatedly and needs standardized response\n- **Multi-Service Impacts**: When incidents affect multiple services or require cross-team coordination\n- **After-Hours Incidents**: When on-call engineers need automated guidance and escalation procedures\n- **Compliance Incidents**: When security or compliance breaches require documented response procedures\n- **Performance Degradation**: When performance metrics breach thresholds and need investigation\n\n## Gotchas\n\n### Common Pitfalls\n- **Alert Fatigue**: Too many automated alerts can cause real incidents to be missed\n- **False Positives**: Automated triage may misclassify alerts and trigger unnecessary responses\n- **Runbook Conflicts**: Multiple runbooks may conflict when executed simultaneously\n- **Escalation Delays**: Automated escalation may not account for team availability or context\n\n### Edge Cases\n- **Cascading Failures**: Initial incident may trigger secondary failures requiring different runbooks\n- **Partial Service Degradation**: Some services working while others fail may confuse automated categorization\n- **Third-Party Outages**: Incidents caused by external providers may require different response procedures\n- **Multi-Region Issues**: Incidents affecting multiple regions need coordinated response across teams\n\n### Performance Issues\n- **Correlation Delays**: Alert correlation and analysis may take time during high-volume incidents\n- **Resource Contention**: Multiple incidents may compete for the same response resources\n- **Communication Overload**: Automated notifications may overwhelm communication channels\n- **Database Locks**: Concurrent incident updates may cause database contention\n\n### Security Considerations\n- **Sensitive Data**: Incident details may contain sensitive information that needs protection\n- **Access Control**: Runbook execution requires appropriate permissions but should follow principle of least privilege\n- **Audit Requirements**: All incident responses must be logged for compliance and post-incident review\n- **Privacy Regulations**: User data mentioned in incidents must comply with privacy laws\n\n### Troubleshooting\n- **Stuck Workflows**: Runbook execution may get stuck waiting for manual input or external systems\n- **Missing Context**: Automated triage may lack business context needed for proper prioritization\n- **Team Availability**: Escalation paths may fail due to team schedules or contact information issues\n- **Integration Failures**: Dependencies on external systems (monitoring, communication) may fail during incidents\n\n## Inputs\n- **operation**: Operation type (required)\n- **targetResource**: Target resource identifier (required)\n- **cloudProvider**: Cloud provider - `aws|azure|gcp|onprem|all` (optional, default: `all`)\n- **parameters**: Operation-specific parameters (optional)\n- **environment**: Target environment (optional, default: `production`)\n- **dryRun**: Dry run mode (optional, default: `true`)\n\n## Process\n1. **Cloud Provider Detection**: Identify target cloud providers and environments\n2. **Input Validation**: Comprehensive parameter validation and security checks\n3. **Multi-Cloud Context Analysis**: Analyze current state across all providers\n4. **Operation Planning**: Generate optimized execution plan\n5. **Safety Assessment**: Risk analysis and impact evaluation across providers\n6. **Execution**: Perform operations with monitoring and validation\n7. **Results Analysis**: Process results and generate reports\n\n## Outputs\n- **Operation Results**: Detailed execution results and status per provider\n- **Compliance Reports**: Validation and compliance status across environments\n- **Performance Metrics**: Operation performance and efficiency metrics by provider\n- **Recommendations**: Optimization suggestions and next steps\n- **Audit Trail**: Complete operation history for compliance across all providers\n\n## Environment\n- **AWS**: EKS, EC2, Lambda, CloudWatch, IAM, S3\n- **Azure**: AKS, VMs, Functions, Monitor, Azure AD\n- **GCP**: GKE, Compute Engine, Cloud Functions, Cloud Monitoring\n- **On-Premise**: Kubernetes clusters, VMware, OpenStack, Prometheus\n- **Multi-Cloud Tools**: Terraform, Ansible, Crossplane, Cluster API\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **Cloud SDKs**: boto3, azure-sdk, google-cloud\n- **Kubernetes**: kubernetes client for cluster operations\n- **Multi-Cloud Libraries**: terraform-python, ansible-python\n\n## Scripts\n- `core/scripts/automation/incident-triage-runbook.py`: Main automation implementation\n- `core/scripts/automation/incident-triage-runbook_handler.py`: Cloud-specific operations\n- `core/scripts/automation/multi_cloud_orchestrator.py`: Cross-provider coordination\n\n## Trigger Keywords\nincident, triage, runbook, automation, enterprise, multi-cloud, aws, azure, gcp, onprem\n\n## Human Gate Requirements\n- **Production changes**: Production environment operations require approval\n- **High-impact operations**: Critical operations require review\n- **Security changes**: Security modifications need validation\n\n## Enterprise Features\n- **Multi-tenant Support**: Isolated operations per tenant\n- **Role-based Access Control**: Enterprise IAM integration\n- **Audit Logging**: Complete audit trail for compliance\n- **Performance Monitoring**: SLA tracking and metrics\n- **Security Hardening**: Encryption and compliance standards\n- **Dynamic Code Generation**: Agents can modify logic dynamically\n- **Cross-Cloud Orchestration**: Coordinated operations across providers\n\n## References\n\nLoad these files when needed:\n- `scripts/incident-triager.py` - Alert correlation and categorization engine\n- `scripts/runbook-executor.py` - Automated runbook execution framework\n- `references/incident-taxonomy.md` - Standard incident classification system\n- `assets/escalation-policies.yaml` - Team escalation rules and contacts\n- `examples/incident-scenarios/` - Common incident types and response procedures\n"
