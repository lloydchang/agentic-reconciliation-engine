  "advanced-monitoring/SKILL.md": "---\nname: advanced-monitoring\ndescription: Enterprise-grade advanced monitoring with AI-powered analytics, real-time anomaly detection, predictive insights, and intelligent alerting. Use when implementing sophisticated monitoring with machine learning, time series analysis, and automated incident response.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"2.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\ncompatibility: Requires Python 3.8+, monitoring systems (Prometheus, Grafana), and access to infrastructure metrics\nallowed-tools: Bash Read Write Grep\n---\n\n# Advanced Monitoring \u2014 AI-Powered Infrastructure Intelligence\n\n## Purpose\nEnterprise-grade advanced monitoring solution with AI-powered analytics, real-time anomaly detection, predictive insights, and intelligent alerting across multi-cloud environments.\n\n## When to Use\n- **Real-time Anomaly Detection** with machine learning\n- **Predictive Analytics** for infrastructure forecasting\n- **Intelligent Alerting** with AI-driven prioritization\n- **Performance Optimization** with advanced analytics\n- **Capacity Planning** with predictive modeling\n- **Root Cause Analysis** with AI correlation\n\n## Inputs\n- **operation**: Monitoring operation type (required)\n- **targetResources**: Resources to monitor (required)\n- **timeRange**: Time range for analysis (optional)\n- **alertThresholds**: Custom alert thresholds (optional)\n- **aiMode**: Enable AI-powered analysis (optional)\n- **outputFormat**: Output format (optional)\n\n## Process\n1. **Data Collection**: Gather metrics from all monitoring sources\n2. **AI Analysis**: Apply machine learning for pattern detection\n3. **Anomaly Detection**: Identify unusual behavior and trends\n4. **Predictive Analytics**: Forecast future infrastructure needs\n5. **Intelligent Alerting**: Generate prioritized alerts with AI insights\n6. **Automated Response**: Trigger automated remediation when appropriate\n7. **Continuous Learning**: Update models with new data patterns\n\n## Outputs\n- **AI-Enhanced Metrics**: Advanced analytics and insights\n- **Anomaly Detection Results**: Unusual patterns and potential issues\n- **Predictive Forecasts**: Future infrastructure needs and trends\n- **Intelligent Alerts**: Prioritized notifications with AI context\n- **Performance Reports**: Comprehensive monitoring analytics\n- **Recommendations**: AI-driven optimization suggestions\n\n## Environment\n- **Monitoring Systems**: Prometheus, Grafana, ELK stack\n- **AI/ML Frameworks**: scikit-learn, TensorFlow, PyTorch\n- **Time Series Databases**: InfluxDB, TimescaleDB\n- **Alerting Systems**: Alertmanager, PagerDuty integration\n- **Visualization**: Grafana dashboards with AI insights\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **Monitoring Libraries**: prometheus-client, grafana-api\n- **AI/ML Libraries**: scikit-learn, pandas, numpy, statsmodels\n- **Time Series**: prophet, pmdarima for forecasting\n- **Visualization**: matplotlib, plotly, seaborn\n\n## Scripts\n- `core/scripts/automation/advanced-monitoring.py`: Main monitoring orchestrator\n- `core/scripts/automation/anomaly-detector.py`: AI-powered anomaly detection\n- `core/scripts/automation/predictive-analytics.py`: Forecasting and prediction\n\n## Trigger Keywords\nmonitoring, analytics, anomaly detection, predictive, alerting, performance, capacity, insights\n\n## Human Gate Requirements\n- **Critical Alerts**: High-priority alerts may require human verification\n- **Automated Response**: Automated remediation needs approval for critical systems\n- **Model Updates**: AI model retraining requires validation\n- **Security Alerts**: Security-related alerts need immediate human review\n\n## Enterprise Features\n- **Multi-Cloud Monitoring**: Unified monitoring across all providers\n- **Real-Time Analytics**: Sub-second metric collection and analysis\n- **Intelligent Alerting**: AI-driven alert prioritization and correlation\n- **Predictive Insights**: Advanced forecasting and capacity planning\n- **Automated Remediation**: Self-healing capabilities with AI guidance\n- **Compliance Reporting**: Automated compliance and audit reporting\n\n## Best Practices\n- **Metric Quality**: Ensure high-quality, consistent metric collection\n- **Alert Fatigue Prevention**: Use AI to minimize false positives\n- **Performance Impact**: Minimize monitoring overhead on systems\n- **Data Retention**: Balance storage costs with analytical needs\n- **Security**: Secure monitoring data and alert channels\n"
  "aggregate-observability/SKILL.md": "---\nname: aggregate-observability\ndescription: Aggregates observability data from multiple sources across cloud environments for unified monitoring. Use when consolidating metrics, centralizing logs, or implementing observability platforms.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\ncompatibility: Requires Python 3.8+, cloud provider CLI tools (AWS CLI, Azure CLI, gcloud), and access to multi-cloud monitoring systems\nallowed-tools: Bash Read Write Grep\n---\n\n# Observability Aggregator \u2014 Multi-Cloud Enterprise Automation\n\n## Purpose\nEnterprise-grade automation solution for observability aggregator operations across AWS, Azure, GCP, and on-premise environments to maximize operational efficiency while maintaining security and compliance standards.\n\n## When to Use\n- **observability aggregator operations** across multi-cloud environments\n- **Automation and optimization** of observability aggregator workflows\n- **Monitoring and management** of observability aggregator resources\n- **Compliance and governance** for observability aggregator activities\n\n## Inputs\n- **operation**: Operation type (required)\n- **targetResource**: Target resource identifier (required)\n- **cloudProvider**: Cloud provider - `aws|azure|gcp|onprem|all` (optional, default: `all`)\n- **parameters**: Operation-specific parameters (optional)\n- **environment**: Target environment (optional, default: `production`)\n- **dryRun**: Dry run mode (optional, default: `true`)\n\n## Process\n1. **Cloud Provider Detection**: Identify target cloud providers and environments\n2. **Input Validation**: Comprehensive parameter validation and security checks\n3. **Multi-Cloud Context Analysis**: Analyze current state across all providers\n4. **Operation Planning**: Generate optimized execution plan\n5. **Safety Assessment**: Risk analysis and impact evaluation across providers\n6. **Execution**: Perform operations with monitoring and validation\n7. **Results Analysis**: Process results and generate reports\n\n## Outputs\n- **Operation Results**: Detailed execution results and status per provider\n- **Compliance Reports**: Validation and compliance status across environments\n- **Performance Metrics**: Operation performance and efficiency metrics by provider\n- **Recommendations**: Optimization suggestions and next steps\n- **Audit Trail**: Complete operation history for compliance across all providers\n\n## Environment\n- **AWS**: EKS, EC2, Lambda, CloudWatch, IAM, S3\n- **Azure**: AKS, VMs, Functions, Monitor, Azure AD\n- **GCP**: GKE, Compute Engine, Cloud Functions, Cloud Monitoring\n- **On-Premise**: Kubernetes clusters, VMware, OpenStack, Prometheus\n- **Multi-Cloud Tools**: Terraform, Ansible, Crossplane, Cluster API\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **Cloud SDKs**: boto3, azure-sdk, google-cloud\n- **Kubernetes**: kubernetes client for cluster operations\n- **Multi-Cloud Libraries**: terraform-python, ansible-python\n\n## Scripts\n- `core/scripts/automation/observability-aggregator.py`: Main automation implementation\n- `core/scripts/automation/observability-aggregator_handler.py`: Cloud-specific operations\n- `core/scripts/automation/multi_cloud_orchestrator.py`: Cross-provider coordination\n\n## Trigger Keywords\nobservability, aggregator, automation, enterprise, multi-cloud, aws, azure, gcp, onprem\n\n## Human Gate Requirements\n- **Production changes**: Production environment operations require approval\n- **High-impact operations**: Critical operations require review\n- **Security changes**: Security modifications need validation\n\n## Enterprise Features\n- **Multi-tenant Support**: Isolated operations per tenant\n- **Role-based Access Control**: Enterprise IAM integration\n- **Audit Logging**: Complete audit trail for compliance\n- **Performance Monitoring**: SLA tracking and metrics\n- **Security Hardening**: Encryption and compliance standards\n- **Dynamic Code Generation**: Agents can modify logic dynamically\n- **Cross-Cloud Orchestration**: Coordinated operations across providers\n\n## Best Practices\n- **Idempotent Operations**: Safe retry mechanisms\n- **Circuit Breaker Patterns**: Resilience against failures\n- **Rate Limiting**: Respect API limits and implement backpressure\n- **Graceful Degradation**: Fallback strategies when providers are unavailable\n- **Comprehensive Testing**: Integration tests and compliance validation\n- **Security First**: Zero-trust architecture and principle of least privilege\n"
