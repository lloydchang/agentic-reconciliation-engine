roviders\n6. **Execution**: Perform operations with monitoring and validation\n7. **Results Analysis**: Process results and generate reports\n\n## Outputs\n- **Operation Results**: Detailed execution results and status per provider\n- **Compliance Reports**: Validation and compliance status across environments\n- **Performance Metrics**: Operation performance and efficiency metrics by provider\n- **Recommendations**: Optimization suggestions and next steps\n- **Audit Trail**: Complete operation history for compliance across all providers\n\n## Environment\n- **AWS**: EKS, EC2, Lambda, CloudWatch, IAM, S3\n- **Azure**: AKS, VMs, Functions, Monitor, Azure AD\n- **GCP**: GKE, Compute Engine, Cloud Functions, Cloud Monitoring\n- **On-Premise**: Kubernetes clusters, VMware, OpenStack, Prometheus\n- **Multi-Cloud Tools**: Terraform, Ansible, Crossplane, Cluster API\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **Cloud SDKs**: boto3, azure-sdk, google-cloud\n- **Kubernetes**: kubernetes client for cluster operations\n- **Multi-Cloud Libraries**: terraform-python, ansible-python\n\n## Scripts\n- `core/scripts/automation/ci-cd-integrator.py`: Main automation implementation\n- `core/scripts/automation/ci-cd-integrator_handler.py`: Cloud-specific operations\n- `core/scripts/automation/multi_cloud_orchestrator.py`: Cross-provider coordination\n\n## Trigger Keywords\nci, cd, integrator, automation, enterprise, multi-cloud, aws, azure, gcp, onprem\n\n## Human Gate Requirements\n- **Production changes**: Production environment operations require approval\n- **High-impact operations**: Critical operations require review\n- **Security changes**: Security modifications need validation\n\n## Enterprise Features\n- **Multi-tenant Support**: Isolated operations per tenant\n- **Role-based Access Control**: Enterprise IAM integration\n- **Audit Logging**: Complete audit trail for compliance\n- **Performance Monitoring**: SLA tracking and metrics\n- **Security Hardening**: Encryption and compliance standards\n- **Dynamic Code Generation**: Agents can modify logic dynamically\n- **Cross-Cloud Orchestration**: Coordinated operations across providers\n\n## Best Practices\n- **Idempotent Operations**: Safe retry mechanisms\n- **Circuit Breaker Patterns**: Resilience against failures\n- **Rate Limiting**: Respect API limits and implement backpressure\n- **Graceful Degradation**: Fallback strategies when providers are unavailable\n- **Comprehensive Testing**: Integration tests and compliance validation\n- **Security First**: Zero-trust architecture and principle of least privilege\n"
  "internal-platform-cli/SKILL.md": "---\nname: internal-platform-cli\ndescription: Use when working with the internal platform CLI wrapper. Documents every subcommand with examples and common usage patterns for platform operations.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: library-reference\n  risk_level: low\n  autonomy: fully_auto\n  layer: temporal\ncompatibility: Requires internal platform CLI tool, platform admin access\nallowed-tools: Bash Read Write Grep\n---\n\n# Internal Platform CLI Reference\n\n## Purpose\nComprehensive reference for the internal platform CLI wrapper, documenting all subcommands, examples, and usage patterns for platform operations.\n\n## When to Use\n- **Platform operations**: When you need to interact with the internal platform\n- **Resource management**: For creating, updating, or deleting platform resources\n- **Configuration changes**: When modifying platform settings\n- **Debugging**: For troubleshooting platform issues\n- **Automation**: When scripting platform operations\n\n## Available Commands\n\n### Core Commands\n\n#### `platform init`\nInitialize a new platform project or workspace.\n```bash\nplatform init --project-name my-app --environment dev\nplatform init --template microservice --region us-west-2\n```\n\n#### `platform deploy`\nDeploy applications to the platform.\n```bash\nplatform deploy --app my-service --env staging\nplatform deploy --all --dry-run\nplatform deploy --config deploy.yaml --wait\n```\n\n#### `platform status`\nCheck status of platform resources and deployments.\n```bash\nplatform status --app my-service\nplatform status --cluster production\nplatform status --all --verbose\n```\n\n### Resource Management\n\n#### `platform resource create`\nCreate new platform resources.\n```bash\nplatform resource create --type database --name users-db\nplatform resource create --type queue --name events --config queue.yaml\nplatform resource create --type secret --name api-key --from-file\n```\n\n#### `platform resource list`\nList existing resources with filtering.\n```bash\nplatform resource list --type database\nplatform resource list --env production --owner team-a\nplatform resource list --status running\n```\n\n#### `platform resource update`\nUpdate existing resources.\n```bash\nplatform resource update --name users-db --set version=2.0\nplatform resource update --name events --config new-config.yaml\n```\n\n### Configuration Management\n\n#### `platform config get`\nRetrieve configuration values.\n```bash\nplatform config get --key database.url\nplatform config get --app my-service --env prod\nplatform config get --all --format yaml\n```\n\n#### `platform config set`\nSet configuration values.\n```bash\nplatform config set --key database.url --value \"postgres://...\"\nplatform config set --app my-service --env prod --file config.yaml\n```\n\n#### `platform config validate`\nValidate configuration files.\n```bash\nplatform config validate --file platform.yaml\nplatform config validate --all --strict\n```\n\n### Monitoring & Logs\n\n#### `platform logs`\nAccess application and platform logs.\n```bash\nplatform logs --app my-service --tail 100\nplatform logs --cluster prod --since 1h\nplatform logs --filter \"error\" --level warning\n```\n\n#### `platform metrics`\nView platform and application metrics.\n```bash\nplatform metrics --app my-service --metric cpu\nplatform metrics --cluster prod --interval 5m\nplatform metrics --all --export prometheus\n```\n\n#### `platform health`\nCheck health status of platform components.\n```bash\nplatform health --cluster production\nplatform health --app my-service --detailed\nplatform health --all --alert-threshold 80\n```\n\n## Gotchas\n\n### Common Pitfalls\n- **Environment Confusion**: Always specify `--env` explicitly. Default environment can change based on context.\n- **Resource Naming**: Resource names must be lowercase with hyphens only. Underscores cause validation errors.\n- **Configuration Conflicts**: Setting config with `--file` overwrites individual `--key` settings.\n\n### Edge Cases\n- **Large Deployments**: Use `--wait` flag for deployments with >10 containers to ensure completion.\n- **Cross-Environment Dependencies**: Resources created in one environment aren't visible in others.\n- **Rate Limiting**: Bulk operations (>50 resources) may hit API limits. Use `--batch-size 25`.\n\n### Performance Issues\n- **Status Commands**: `platform status --all` can be slow in large clusters. Use `--filter` to scope.\n- **Log Retrieval**: Long time ranges with `--since` may timeout. Use smaller windows or export to file.\n- **Configuration Validation**: Strict validation (`--strict`) adds 30-60 seconds to processing time.\n\n### Security Considerations\n- **Secret Handling**: Never use `--from-file` with sensitive data in CI logs. Use stdin instead.\n- **API Tokens**: Tokens expire after 24 hours. Use `platform auth refresh` before long operations.\n- **Cross-Account Access**: Some commands require explicit `--account` parameter in multi-account setups.\n\n### Troubleshooting\n- **Authentication Issues**: Run `platform auth whoami` to verify current identity\n- **Network Timeouts**: Increase timeout with `--timeout 300` for slow networks\n- **Resource Not Found**: Check environment with `platform resource list --env <env>`\n\n## Environment Variables\n```bash\nPLATFORM_ENV=production          # Default environment\nPLATFORM_REGION=us-west-2       # Default region\nPLATFORM_TIMEOUT=60             # Command timeout in seconds\nPLATFORM_LOG_LEVEL=info         # Logging verbosity\nPLATFORM_CONFIG_FILE=~/.platform/config.yaml  # Config file location\n```\n\n## Configuration Files\n\n### ~/.platform/config.yaml\n```yaml\ndefault:\n  environment: development\n  region: us-west-2\n  timeout: 60\n  \nenvironments:\n  production:\n    region: us-east-1\n    timeout: 120\n    verify_ssl: true\n    \n  staging:\n    region: us-west-2\n    timeout: 60\n    \naccounts:\n  main:\n    id: \"123456789012\"\n    role: \"PlatformAdmin\"\n    \naliases:\n  ps = \"platform status\"\n  pd = \"platform deploy\"\n  pl = \"platform logs\"\n```\n\n### platform.yaml (Project Config)\n```yaml\nname: my-application\nversion: \"1.0.0\"\ntype: microservice\n\nenvironments:\n  dev:\n    replicas: 1\n    resources:\n      cpu: 100m\n      memory: 128Mi\n      \n  prod:\n    replicas: 3\n    resources:\n      cpu: 500m\n      memory: 512Mi\n\nresources:\n  - type: database\n    name: users-db\n    engine: postgres\n    version: \"13\"\n    \n  - type: queue\n    name: events\n    engine: sqs\n```\n\n## Integration Examples\n\n### CI/CD Pipeline\n```bash\n#!/bin/bash\n# Deploy to staging\nplatform config set --key build.number --value $BUILD_NUMBER\nplatform deploy --app $APP_NAME --env staging --wait\nplatform health --app $APP_NAME --env staging\n\n# Promote to production if health checks pass\nif [ $? -eq 0 ]; then\n  platform deploy --app $APP_NAME --env production --wait\nfi\n```\n\n### Local Development\n```bash\n# Setup local environment\nplatform init --project-name my-local-dev --template local\nplatform resource create --type database --name local-db --local-only\nplatform config set --key database.url --value \"postgresql://localhost:5432/db\"\n\n# Run with local config\nplatform run --config local-config.yaml --port 8080\n```\n\n## Scripts and Automation\n\n### Batch Resource Creation\n```bash\n#!/bin/bash\n# Create multiple queues from configuration file\nfor queue in $(cat queues.txt); do\n  platform resource create --type queue --name $queue --config queue-template.yaml\ndone\n```\n\n### Environment Sync\n```bash\n#!/bin/bash\n# Sync configuration between environments\nplatform config get --env staging --all --format yaml > staging-config.yaml\nplatform config set --env production --file staging-config.yaml\n```\n\n## References\n\nLoad these files when needed:\n- `scripts/platform-helpers.sh` - Common platform automation scripts\n- `templates/resource-templates/` - Resource configuration templates\n- `examples/` - Complete usage examples and patterns\n- `references/api-specs.md` - Detailed API documentation\n"
  "k8sgpt-analyzer/SKILL.md": "---\nname: k8sgpt-analyzer\ndescription: Provides AI-powered Kubernetes cluster analysis and troubleshooting using K8sGPT with Qwen LLM. Use when diagnosing cluster issues, analyzing problems, or getting intelligent insights about Kubernetes resources and configurations.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\n  human_gate: PR approval required for cluster-wide changes\ncompatibility: Requires Python 3.8+, kubectl, K8sGPT CLI, and access to Kubernetes clusters\nallowed-tools: Bash Read Write Grep Kubectl\n---\n\n# K8sGPT Analyzer \u2014 AI-Powered Kubernetes Intelligence\n\n## Purpose\nEnterprise-grade AI-powered Kubernetes cluster analysis and troubleshooting solution that leverages K8sGPT with Qwen LLM to provide intelligent insights, automated problem detection, and contextual recommendations across multi-cloud Kubernetes environments.\n\n## When to Use\n- **Cluster analysis** and automated problem detection\n- **Intelligent troubleshooting** with AI-powered insights\n- **Resource optimization** and configuration recommendations\n- **Multi-cluster monitoring** and health assessments\n- **Incident response** and root cause analysis\n- **Capacity planning** and performance optimization\n\n## Inputs\n- **operation**: Operation type - `analyze|diagnose|optimize|monitor|report` (required)\n- **targetResource**: Target resource identifier - `namespace|deployment|pod|service|cluster` (required)\n- **scope**: Analysis scope - `cluster|namespace|resource|all` (optional, default: `cluster`)\n- **backend**: LLM backend - `qwen|openai|localai|ollama` (optional, default: `qwen`)\n- **explain**: Enable AI explanations (optional, default: `true`)\n- **output**: Output format - `json|yaml|table|summary` (optional, default: `json`)\n- **filters**: Resource filters and constraints (optional)\n- **environment**: Target environment (optional, default: `production`)\n\n## Process\n1. **Environment Validation**: Verify Kubernetes connectivity and permissions\n2. **K8sGPT Configuration**: Setup Qwen LLM backend and authentication\n3. **Resource Discovery**: Identify target resources based on scope and filters\n4. **AI Analysis**: Execute K8sGPT analysis with specified parameters\n5. **Intelligence Processing**: Process AI insights and recommendations\n6. **Context Enrichment**: Add operational context and historical data\n7. **Report Generation**: Create comprehensive analysis reports\n8. **Action Planning**: Generate actionable recommendations\n\n## Outputs\n- **AI Analysis Results**: Detailed findings from K8sGPT analysis\n- **Problem Detection**: Identified issues and their severity levels\n- **Recommendations**: Actionable improvement suggestions\n- **Resource Insights**: Performance and configuration analysis\n- **Risk Assessment**: Security and compliance evaluation\n- **Optimization Opportunities**: Cost and performance improvements\n- **Audit Trail**: Complete analysis history and changes\n\n## Environment\n- **Kubernetes**: Multi-cluster support across EKS, AKS, GKE, and on-premise\n- **K8sGPT**: Latest stable version with Qwen LLM integration\n- **Qwen LLM**: Local or cloud-hosted Qwen models for AI inference\n- **Monitoring**: Prometheus, Grafana, and observability stack integration\n- **Storage**: Persistent storage for analysis results and configurations\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **K8sGPT CLI**: Latest version for Kubernetes analysis\n- **Kubernetes**: kubectl and cluster access\n- **Qwen LLM**: Local inference or API access\n- **PyYAML**: Configuration file processing\n- **Requests**: HTTP client for API interactions\n- **JSON Schema**: Validation and schema processing\n\n## Scripts\n- `scripts/k8sgpt_analyzer.py`: Main analysis engine and orchestration\n- `scripts/qwen_integration.py`: Qwen LLM backend configuration\n- `scripts/cluster_scanner.py`: Multi-cluster resource discovery\n- `scripts/report_generator.py`: Comprehensive report generation\n- `scripts/automation_helper.py`: Automated setup and configuration\n\n## Trigger Keywords\nk8sgpt, analyzer, kubernetes, troubleshooting, AI, qwen, analysis, monitoring, optimization, cluster, diagnostics\n\n## Human Gate Requirements\n- **Cluster-wide changes**: Operations affecting entire clusters require approval\n- **Production modifications**: Changes to production environments need validation\n- **Security configurations**: Security-related modifications require review\n- **Resource scaling**: Major resource changes need oversight\n\n## API Patterns\n\n### Python Agent Implementation\n```python\n#!/usr/bin/env python3\n\"\"\"\nK8sGPT Analyzer - AI-Powered Kubernetes Intelligence\nIntegrates K8sGPT with Qwen LLM for intelligent cluster analysis\n\"\"\"\n\nimport json\nimport sys\nimport uuid\nimport logging\nimport subprocess\nimport yaml\nfrom datetime import datetime\nfrom typing import Dict, Any, Optional, List\nfrom pathlib import Path\n\nclass K8sGPTAnalyzer:\n    def __init__(self):\n        self.operation_id = str(uuid.uuid4())\n        self.config = self._load_config()\n        self.k8sgpt_path = self._find_k8sgpt()\n        \n    def _load_config(self) -> Dict[str, Any]:\n        \"\"\"Load configuration from file or defaults\"\"\"\n        config_path = Path.home() / '.k8sgpt' / 'config.yaml'\n        default_config = {\n            'backend': 'qwen',\n            'model': 'qwen2.5-7b-instruct',\n            'baseurl': 'http://localhost:8000/v1',\n            'max_tokens': 4096,\n            'temperature': 0.7,\n            'namespace': 'default',\n            'output_format': 'json'\n        }\n        \n        if config_path.exists():\n            with open(config_path, 'r') as f:\n                user_config = yaml.safe_load(f)\n                default_config.update(user_config)\n        \n        return default_config\n    \n    def _find_k8sgpt(self) -> str:\n        \"\"\"Find K8sGPT binary in PATH\"\"\"\n        try:\n            result = subprocess.run(['which', 'k8sgpt'], \n                                  capture_output=True, text=True, check=True)\n            return result.stdout.strip()\n        except subprocess.CalledProcessError:\n            raise RuntimeError(\"K8sGPT CLI not found. Please install K8sGPT first.\")\n    \n    def execute_operation(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Main operation execution\"\"\"\n        try:\n            validated_params = self._validate_inputs(params)\n            self._setup_k8sgpt_backend(validated_params)\n            results = self._perform_analysis(validated_params)\n            return self._format_output(results, \"completed\")\n        except Exception as e:\n            return self._handle_error(e, params)\n    \n    def _validate_inputs(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Input validation\"\"\"\n        required_fields = ['operation', 'targetResource']\n        for field in required_fields:\n            if field not in params:\n                raise ValueError(f\"Missing required field: {field}\")\n        \n        valid_operations = ['analyze', 'diagnose', 'optimize', 'monitor', 'report']\n        if params['operation'] not in valid_operations:\n            raise ValueError(f\"Invalid operation: {params['operation']}\")\n        \n        return params\n    \n    def _setup_k8sgpt_backend(self, params: Dict[str, Any]) -> None:\n        \"\"\"Configure K8sGPT backend (Qwen by default)\"\"\"\n        backend = params.get('backend', self.config['backend'])\n        \n        if backend == 'qwen':\n            # Configure Qwen backend via LocalAI/OpenAI compatible API\n            cmd = [\n                'k8sgpt', 'auth', 'add',\n                '--backend', 'localai',\n                '--model', self.config['model'],\n                '--baseurl', self.config['baseurl']\n            ]\n            subprocess.run(cmd, check=True, capture_output=True)\n        \n        logging.info(f\"K8sGPT backend configured: {backend}\")\n    \n    def _perform_analysis(self, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Execute K8sGPT analysis\"\"\"\n        operation = params['operation']\n        target = params['targetResource']\n        scope = params.get('scope', 'cluster')\n        explain = params.get('explain', True)\n        \n        # Build K8sGPT command\n        cmd = ['k8sgpt', 'analyze']\n        \n        if scope != 'cluster':\n            cmd.extend(['--namespace', scope])\n        \n        if target != 'cluster':\n            cmd.extend(['--filter', target])\n        \n        if explain:\n            cmd.append('--explain')\n        \n        # Add backend specification\n        cmd.extend(['--backend', params.get('backend', self.config['backend'])])\n        \n        # Execute analysis\n        result = subprocess.run(cmd, capture_output=True, text=True, check=True)\n        \n        # Parse and enhance results\n        analysis_data = self._parse_k8sgpt_output(result.stdout)\n        \n        return {\n            'operation': operation,\n            'target': target,\n            'scope': scope,\n            'analysis': analysis_data,\n            'timestamp': datetime.utcnow().isoformat(),\n            'backend': params.get('backend', self.config['backend'])\n        }\n    \n    def _parse_k8sgpt_output(self, output: str) -> Dict[str, Any]:\n        \"\"\"Parse K8sGPT output into structured format\"\"\"\n        try:\n            # Try JSON first\n            return json.loads(output)\n        except json.JSONDecodeError:\n            # Parse text output\n            lines = output.strip().split('\\n')\n            return {\n                'format': 'text',\n                'content': output,\n                'lines': lines,\n                'summary': lines[0] if lines else \"No analysis available\"\n            }\n    \n    def _format_output(self, results: Dict[str, Any], status: str) -> Dict[str, Any]:\n        \"\"\"Format output according to enterprise schema\"\"\"\n        return {\n            \"operationId\": self.operation_id,\n            \"status\": status,\n            \"timestamp\": datetime.utcnow().isoformat(),\n            \"result\": results,\n            \"metadata\": {\n                \"execution_time\": 1.0,\n                \"risk_score\": 3,\n                \"agent_version\": \"1.0.0\",\n                \"k8sgpt_version\": \"latest\",\n                \"backend\": self.config['backend']\n            }\n        }\n    \n    def _handle_error(self, error: Exception, params: Dict[str, Any]) -> Dict[str, Any]:\n        \"\"\"Comprehensive error handling\"\"\"\n        return {\n            \"operationId\": self.operation_id,\n            \"status\": \"failed\",\n            \"timestamp\": datetime.utcnow().isoformat(),\n            \"error\": {\n                \"code\": \"ANALYSIS_ERROR\",\n                \"message\": str(error),\n                \"details\": {\n                    \"parameters\": params,\n                    \"error_type\": type(error).__name__\n                }\n            }\n        }\n\ndef main():\n    # Configure logging\n    logging.basicConfig(level=logging.INFO)\n    logger = logging.getLogger(__name__)\n    \n    if len(sys.argv) > 1:\n        params = json.loads(sys.argv[1])\n    else:\n        params = {\n            'operation': 'analyze',\n            'targetResource': 'cluster',\n            'scope': 'cluster',\n            'backend': 'qwen',\n            'explain': True\n        }\n    \n    analyzer = K8sGPTAnalyzer()\n    result = analyzer.execute_operation(params)\n    print(json.dumps(result, indent=2))\n\nif __name__ == \"__main__\":\n    main()\n```\n\n### Shell Commands Integration\n```bash\n#!/bin/bash\n# K8sGPT Analyzer Shell Integration\nOPERATION=${1:-analyze}\nTARGET=${2:-cluster}\nSCOPE=${3:-cluster}\nBACKEND=${4:-qwen}\n\necho \"Executing K8sGPT ${OPERATION} on ${TARGET} in ${SCOPE} scope\"\n\n# Setup Qwen backend if needed\nif [[ \"$BACKEND\" == \"qwen\" ]]; then\n    echo \"Configuring Qwen LLM backend...\"\n    k8sgpt auth add --backend localai --model qwen2.5-7b-instruct --baseurl http://localhost:8000/v1\nfi\n\n# Execute analysis\ncase $OPERATION in\n    \"analyze\")\n        k8sgpt analyze --explain --backend $BACKEND ${TARGET:+--filter $TARGET} ${SCOPE:+--namespace $SCOPE}\n        ;;\n    \"diagnose\")\n        k8sgpt analyze --explain --backend $BACKEND --filter \"problems\" ${TARGET:+--filter $TARGET}\n        ;;\n    \"optimize\")\n        k8sgpt analyze --explain --backend $BACKEND --filter \"resources\" ${TARGET:+--filter $TARGET}\n        ;;\n    \"monitor\")\n        k8sgpt analyze --backend $BACKEND --output json ${TARGET:+--filter $TARGET}\n        ;;\n    *)\n        echo \"Unknown operation: $OPERATION\"\n        echo \"Available: analyze, diagnose, optimize, monitor\"\n        exit 1\n        ;;\nesac\n```\n\n## Parameter Schema\n```json\n{\n  \"type\": \"object\",\n  \"properties\": {\n    \"operation\": {\n      \"type\": \"string\",\n      \"enum\": [\"analyze\", \"diagnose\", \"optimize\", \"monitor\", \"report\"],\n      \"description\": \"Type of analysis to perform\"\n    },\n    \"targetResource\": {\n      \"type\": \"string\",\n      \"description\": \"Target resource for analysis\"\n    },\n    \"scope\": {\n      \"type\": \"string\",\n      \"enum\": [\"cluster\", \"namespace\", \"resource\", \"all\"],\n      \"default\": \"cluster\",\n      \"description\": \"Analysis scope\"\n    },\n    \"backend\": {\n      \"type\": \"string\",\n      \"enum\": [\"qwen\", \"openai\", \"localai\", \"ollama\"],\n      \"default\": \"qwen\",\n      \"description\": \"LLM backend to use\"\n    },\n    \"explain\": {\n      \"type\": \"boolean\",\n      \"default\": true,\n      \"description\": \"Enable AI explanations\"\n    },\n    \"output\": {\n      \"type\": \"string\",\n      \"enum\": [\"json\", \"yaml\", \"table\", \"summary\"],\n      \"default\": \"json\",\n      \"description\": \"Output format\"\n    }\n  },\n  \"required\": [\"operation\", \"targetResource\"]\n}\n```\n\n## Enterprise Features\n- **Multi-Cluster Support**: Analyze across multiple Kubernetes clusters\n- **Qwen LLM Integration**: Local AI inference with Qwen models\n- **Intelligent Filtering**: Smart resource filtering and targeting\n- **Contextual Analysis**: Historical data and operational context\n- **Automated Reporting**: Comprehensive analysis reports\n- **Security Scanning**: AI-powered security vulnerability detection\n- **Performance Optimization**: Resource usage and performance recommendations\n- **Compliance Monitoring**: Policy compliance and governance checks\n\n## Best Practices\n- **Backend Configuration**: Ensure Qwen LLM is properly configured and accessible\n- **Resource Scoping**: Use appropriate scopes to limit analysis scope\n- **Output Management**: Choose appropriate output formats for integration\n- **Error Handling**: Implement robust error handling for API failures\n- **Security**: Validate permissions and access controls before analysis\n- **Performance**: Monitor analysis execution time and resource usage\n\n## Integration Examples\n- **GitOps Workflows**: Integrate with Flux/ArgoCD for automated analysis\n- **CI/CD Pipelines**: Add cluster analysis to deployment pipelines\n- **Monitoring Stack**: Integrate with Prometheus/Grafana dashboards\n- **Alerting Systems**: Connect to AlertManager for intelligent alerting\n- **ChatOps**: Enable Slack/Teams integration for cluster insights\n- **Documentation**: Auto-generate cluster documentation and reports\n"
  "knowledge-base-server/SKILL.md": "---\nname: knowledge-base-server\ndescription: >\n  Contextual reasoning and knowledge retrieval system that indexes documents, provides\n  semantic search capabilities, analyzes meeting transcripts, tracks decision history,\n  and builds knowledge graphs for intelligent information retrieval and contextual insights.\nmetadata:\n  risk_level: low\n  autonomy: high\n  layer: temporal\n  human_gate: Content approval required for public knowledge base updates\n---\n\n# Knowledge Base Server Skill\n\n## Overview\n\nThe Knowledge Base Server skill provides comprehensive contextual reasoning and knowledge retrieval capabilities. It indexes documents, performs semantic search, analyzes meeting transcripts, tracks decision history, and builds knowledge graphs to provide intelligent information retrieval and contextual insights.\n\n## Capabilities\n\n### Core Functions\n\n- **Document Indexing**: Indexes and processes various document types for retrieval\n- **Semantic Search**: Performs intelligent search using embeddings and similarity matching\n- **Meeting Transcript Analysis**: Extracts decisions, action items, and insights from transcripts\n- **Decision History Tracking**: Maintains searchable database of organizational decisions\n- **Knowledge Graph Construction**: Builds and queries relationship graphs between entities\n- **Contextual Information Retrieval**: Provides context-aware information for topics\n\n### Supported Document Types\n\n- **Runbooks**: Technical procedures and troubleshooting guides\n- **Meeting Transcripts**: Meeting records and discussions\n- **Decision Records**: Formal decision documentation\n- **Policies**: Organizational policies and procedures\n- **Technical Documentation**: Architecture docs, API docs, and technical specifications\n\n### Search Capabilities\n\n1. **Semantic Search**: Vector-based similarity matching\n2. **Keyword Search**: Traditional text-based search\n3. **Hybrid Search**: Combined semantic and keyword approaches\n4. **Contextual Search**: Search with additional context and filters\n5. **Relationship-based Search**: Search using knowledge graph relationships\n\n## Usage\n\n### Document Indexing\n\n```bash\n# Index a single document\nskill invoke knowledge-base index-document --document-path docs/runbook.md --document-type runbook\n\n# Index entire directory\nskill invoke knowledge-base index-directory --directory-path ./docs --recursive\n\n# Batch index with metadata\nskill invoke knowledge-base index-batch --config indexing-config.yaml\n\n# Reindex existing documents\nskill invoke knowledge-base reindex --document-type runbook --force\n```\n\n### Knowledge Search\n\n```bash\n# Semantic search\nskill invoke knowledge-base search --query \"database troubleshooting\" --search-type semantic --limit 10\n\n# Keyword search\nskill invoke knowledge-base search --query \"AWS S3\" --search-type keyword --document-types runbook,policy\n\n# Hybrid search with filters\nskill invoke knowledge-base search --query \"incident response\" --search-type hybrid \\\n  --document-types runbook,meeting_transcript --similarity-threshold 0.7\n\n# Contextual search\nskill invoke knowledge-base contextual-search --topic \"cloud migration\" --context-type historical_decisions\n```\n\n### Meeting Analysis\n\n```bash\n# Analyze meeting transcript\nskill invoke knowledge-base analyze-meeting --transcript-path meetings/2024-03-15-team-meeting.txt\n\n# Extract decisions only\nskill invoke knowledge-base extract-decisions --transcript-path meetings/strategy-session.txt\n\n# Generate meeting summary\nskill invoke knowledge-base summarize-meeting --transcript-path meetings/retrospective.txt --include-action-items\n\n# Batch analyze meetings\nskill invoke knowledge-base batch-analyze-meetings --directory-path meetings/ --date-range 2024-01-01:2024-03-31\n```\n\n### Decision Tracking\n\n```bash\n# Track new decision\nskill invoke knowledge-base track-decision --decision-id DEC-001 \\\n  --title \"Adopt Kubernetes for new services\" \\\n  --description \"Decision to migrate all new microservices to Kubernetes\" \\\n  --decision-maker \"CTO\" --date \"2024-03-15\" \\\n  --context \"Cost optimization and scalability requirements\"\n\n# Update decision with related decisions\nskill invoke knowledge-base relate-decisions --decision-id DEC-001 \\\n  --related-decisions DEC-002,DEC-003\n\n# Search decision history\nskill invoke knowledge-base search-decisions --query \"cloud infrastructure\" --date-range 2024-01-01:2024-12-31\n\n# Generate decision timeline\nskill invoke knowledge-base decision-timeline --project \"web-platform\" --format HTML\n```\n\n### Knowledge Graph Operations\n\n```bash\n# Add entity to knowledge graph\nskill invoke knowledge-base add-entity --entity-id \"kubernetes\" --entity-type technology \\\n  --name \"Kubernetes\" --properties '{\"category\": \"orchestration\", \"vendor\": \"CNCF\"}'\n\n# Add relationship\nskill invoke knowledge-base add-relationship --from-entity \"kubernetes\" --to-entity \"docker\" \\\n  --relationship-type \"builds_on\" --properties '{\"strength\": \"strong\"}'\n\n# Query knowledge graph\nskill invoke knowledge-base query-graph --query '{\"entity\": \"kubernetes\", \"depth\": 2}'\n\n# Get context for entity\nskill invoke knowledge-base get-context --entity \"kubernetes\" --context-type related_documents\n```\n\n### Contextual Information\n\n```bash\n# Get historical context\nskill invoke knowledge-base get-context --topic \"microservices\" --context-type historical_decisions \\\n  --time-range 6m --include-related\n\n# Get expertise areas\nskill invoke knowledge-base get-expertise --topic \"database optimization\" --include-experts\n\n# Get recent changes\nskill invoke knowledge-base recent-changes --topic \"security policies\" --time-range 30d\n\n# General context retrieval\nskill invoke knowledge-base context --topic \"cloud migration\" --depth 3 --breadth 5\n```\n\n## Configuration\n\n### Required Environment Variables\n\n```bash\n# Vector Database (for production use)\nVECTOR_DB_URL=your_vector_database_url\nVECTOR_DB_API_KEY=your_vector_db_api_key\n\n# Document Processing\nDOCUMENT_PROCESSING_TIMEOUT=300\nMAX_DOCUMENT_SIZE=50MB\nEMBEDDING_MODEL=text-embedding-ada-002\n\n# Search Configuration\nDEFAULT_SEARCH_LIMIT=10\nSIMILARITY_THRESHOLD=0.7\nMAX_SEARCH_RESULTS=100\n\n# Storage Configuration\nKNOWLEDGE_BASE_PATH=/data/knowledge-base\nBACKUP_SCHEDULE=\"0 2 * * *\"  # Daily at 2 AM\nRETENTION_DAYS=365\n```\n\n### Skill Configuration\n\n```yaml\n# .claude/skills/knowledge-base-server/config.yaml\ndocument_processing:\n  supported_formats:\n    - markdown\n    - text\n    - pdf\n    - docx\n    - html\n    - json\n    - yaml\n  \n  chunking:\n    strategy: semantic\n    max_chunk_size: 1000\n    overlap: 200\n    min_chunk_size: 100\n  \n  embeddings:\n    model: text-embedding-ada-002\n    dimension: 1536\n    batch_size: 100\n    cache_embeddings: true\n  \n  entity_extraction:\n    enabled: true\n    entities:\n      - person\n      - organization\n      - technology\n      - project\n      - decision\n      - policy\n    confidence_threshold: 0.7\n\nsearch_configuration:\n  semantic_search:\n    enabled: true\n    similarity_threshold: 0.7\n    max_results: 50\n    rerank_results: true\n  \n  keyword_search:\n    enabled: true\n    boost_recent: true\n    boost_important: true\n    fuzzy_matching: true\n  \n  hybrid_search:\n    semantic_weight: 0.6\n    keyword_weight: 0.4\n    fusion_algorithm: reciprocal_rank_fusion\n  \n  filters:\n    document_types:\n      - runbook\n      - meeting_transcript\n      - decision_record\n      - policy\n      - technical_doc\n    date_ranges:\n      recent: 7d\n      month: 30d\n      quarter: 90d\n      year: 365d\n\nknowledge_graph:\n  node_types:\n    - technology\n    - person\n    - organization\n    - project\n    - decision\n    - concept\n    - location\n  \n  relationship_types:\n    - uses\n    - implements\n    - decides_on\n    - owns\n    - depends_on\n    - relates_to\n    - manages\n    - documents\n  \n  graph_algorithms:\n    - page_rank\n    - community_detection\n    - shortest_path\n    - centrality_measures\n  \n  visualization:\n    enabled: true\n    layout: force_directed\n    node_size_by: importance\n    edge_width_by: strength\n\nmeeting_analysis:\n  transcript_processing:\n    speaker_diarization: true\n    sentiment_analysis: true\n    topic_modeling: true\n    action_item_extraction: true\n  \n  decision_extraction:\n    patterns:\n      - \"decided to\"\n      - \"agreed that\"\n      - \"concluded\"\n      - \"resolved\"\n    confidence_threshold: 0.8\n    require_context: true\n  \n  action_item_extraction:\n    patterns:\n      - \"will\"\n      - \"should\"\n      - \"need to\"\n      - \"action item\"\n    assignee_extraction: true\n    due_date_extraction: true\n  \n  summarization:\n    executive_summary: true\n    key_decisions: true\n    action_items: true\n    participant_contributions: true\n\ndecision_tracking:\n  required_fields:\n    - title\n    - description\n    - decision_maker\n    - date\n  \n  optional_fields:\n    - context\n    - alternatives_considered\n    - rationale\n    - impact\n    - stakeholders\n    - implementation_status\n  \n  relationship_types:\n    - supersedes\n    - implements\n    - relates_to\n    - conflicts_with\n  \n  lifecycle_stages:\n    - proposed\n    - decided\n    - implemented\n    - evaluated\n    - archived\n\nindexing_configuration:\n  auto_indexing:\n    enabled: true\n    watch_directories:\n      - ./docs\n      - ./meetings\n      - ./decisions\n    file_patterns:\n      - \"*.md\"\n      - \"*.txt\"\n      - \"*.pdf\"\n      - \"*.docx\"\n    ignore_patterns:\n      - \"*.tmp\"\n      - \"*.bak\"\n      - \".*\"\n  \n  scheduling:\n    full_reindex: \"0 3 * * 0\"  # Weekly on Sunday at 3 AM\n    incremental_update: \"0 * * * *\"  # Every hour\n    cleanup: \"0 4 * * *\"  # Daily at 4 AM\n  \n  performance:\n    batch_size: 50\n    parallel_workers: 4\n    memory_limit: 2GB\n    timeout: 300\n\napi_configuration:\n  endpoints:\n    search: /api/v1/search\n    documents: /api/v1/documents\n    decisions: /api/v1/decisions\n    graph: /api/v1/graph\n    context: /api/v1/context\n  \n  authentication:\n    enabled: true\n    method: api_key\n    rate_limiting: true\n    requests_per_minute: 100\n  \n  caching:\n    enabled: true\n    ttl: 3600  # 1 hour\n    max_size: 1GB\n    strategy: lru\n```\n\n## MCP Server Integration\n\nThis skill integrates with the `knowledge-base` MCP server for enhanced capabilities:\n\n### Available MCP Tools\n\n- `index_document`: Index documents for knowledge retrieval\n- `search_knowledge`: Search knowledge base using semantic or keyword search\n- `analyze_meeting_transcript`: Analyze meeting transcripts for decisions and action items\n- `track_decision_history`: Track and retrieve decision history and context\n- `build_knowledge_graph`: Build and query knowledge graph relationships\n- `get_contextual_information`: Get contextual information for topics\n\n### MCP Usage Example\n\n```javascript\n// Using the MCP server directly\nconst searchResults = await mcp.call('search_knowledge', {\n  query: 'database performance optimization',\n  search_type: 'semantic',\n  document_types: ['runbook', 'technical_doc'],\n  limit: 10,\n  similarity_threshold: 0.7\n});\n\nconst meetingAnalysis = await mcp.call('analyze_meeting_transcript', {\n  transcript_path: 'meetings/2024-03-15-db-team.txt',\n  extract_decisions: true,\n  extract_action_items: true,\n  generate_summary: true\n});\n\nconst decisionContext = await mcp.call('get_contextual_information', {\n  topic: 'cloud migration strategy',\n  context_type: 'historical_decisions',\n  time_range: '6m',\n  include_related: true\n});\n```\n\n## Implementation Details\n\n### Architecture\n\n```\n\u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 Document Sources\u2502    \u2502 Processing Engine \u2502    \u2502 Search Engine   \u2502\n\u2502                 \u2502    \u2502                  \u2502    \u2502                 \u2502\n\u2502 \u2022 File System   \u2502\u2500\u2500\u2500\u25B6\u2502 \u2022 Text Processing\u2502\u2500\u2500\u2500\u25B6\u2502 \u2022 Vector Search \u2502\n\u2502 \u2022 APIs          \u2502    \u2502 \u2022 Entity Extract \u2502    \u2502 \u2022 Keyword Search \u2502\n\u2502 \u2022 Databases     \u2502    \u2502 \u2022 Embedding Gen  \u2502    \u2502 \u2022 Hybrid Search  \u2502\n\u2502 \u2022 Web Crawlers  \u2502    \u2502 \u2022 Chunking       \u2502    \u2502 \u2022 Ranking        \u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n         \u2502                       \u2502                       \u2502\n         \u25BC                       \u25BC                       \u25BC\n\u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510    \u250C\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2510\n\u2502 Knowledge Graph \u2502    \u2502 Meeting Analysis \u2502    \u2502 Context Engine  \u2502\n\u2502                 \u2502    \u2502                  \u2502    \u2502                 \u2502\n\u2502 \u2022 Entity Mapping\u2502    \u2502 \u2022 Transcript Proc\u2502    \u2502 \u2022 Context Retrieval\u2502\n\u2502 \u2022 Relationship  \u2502    \u2502 \u2022 Decision Extract\u2502    \u2502 \u2022 Reasoning     \u2502\n\u2502 \u2022 Graph Queries \u2502    \u2502 \u2022 Action Items   \u2502    \u2502 \u2022 Insight Gen   \u2502\n\u2502 \u2022 Visualization \u2502    \u2502 \u2022 Summarization   \u2502    \u2502 \u2022 Recommendations\u2502\n\u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518    \u2514\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2518\n```\n\n### Document Processing Pipeline\n\n1. **Ingestion**: Read and parse documents from various sources\n2. **Preprocessing**: Clean text, remove noise, normalize formatting\n3. **Chunking**: Split documents into semantic chunks\n4. **Entity Extraction**: Identify and extract entities and relationships\n5. **Embedding Generation**: Create vector embeddings for semantic search\n6. **Indexing**: Store processed content in searchable indexes\n7. **Knowledge Graph Update**: Update knowledge graph with new entities and relationships\n\n### Search Algorithm\n\n#### Semantic Search\n```python\ndef semantic_search(query, documents, threshold=0.7, limit=10):\n    \"\"\"\n    Perform semantic search using vector similarity\n    \"\"\"\n    query_embedding = generate_embedding(query)\n    \n    similarities = []\n    for doc in documents:\n        similarity = cosine_similarity(query_embedding, doc.embedding)\n        if similarity >= threshold:\n            similarities.append((doc, similarity))\n    \n    # Sort by similarity and return top results\n    similarities.sort(key=lambda x: x[1], reverse=True)\n    return similarities[:limit]\n```\n\n#### Hybrid Search\n```python\ndef hybrid_search(query, documents, semantic_weight=0.6, keyword_weight=0.4):\n    \"\"\"\n    Combine semantic and keyword search results\n    \"\"\"\n    semantic_results = semantic_search(query, documents)\n    keyword_results = keyword_search(query, documents)\n    \n    # Reciprocal rank fusion\n    all_docs = set(doc for doc, _ in semantic_results + keyword_results)\n    fused_scores = {}\n    \n    for doc in all_docs:\n        semantic_rank = next((i for i, (d, _) in enumerate(semantic_results) if d == doc), float('inf'))\n        keyword_rank = next((i for i, (d, _) in enumerate(keyword_results) if d == doc), float('inf'))\n        \n        semantic_score = 1 / (semantic_rank + 1) if semantic_rank != float('inf') else 0\n        keyword_score = 1 / (keyword_rank + 1) if keyword_rank != float('inf') else 0\n        \n        fused_scores[doc] = semantic_weight * semantic_score + keyword_weight * keyword_score\n    \n    return sorted(fused_scores.items(), key=lambda x: x[1], reverse=True)\n```\n\n### Meeting Analysis Algorithm\n\n#### Decision Extraction\n```python\ndef extract_decisions(transcript):\n    \"\"\"\n    Extract decisions from meeting transcript using pattern matching and NLP\n    \"\"\"\n    decisions = []\n    \n    # Pattern-based extraction\n    decision_patterns = [\n        r'(decided|agreed|concluded|resolved|determined)\\s+to\\s+(.+)',\n        r'it\\s+was\\s+(decided|agreed)\\s+that\\s+(.+)',\n        r'we\\s+(decide|agree)\\s+to\\s+(.+)'\n    ]\n    \n    for sentence in transcript.sentences:\n        for pattern in decision_patterns:\n            match = re.search(pattern, sentence.text, re.IGNORECASE)\n            if match:\n                decision = {\n                    'text': sentence.text,\n                    'decision': match.group(2),\n                    'confidence': calculate_confidence(match, sentence),\n                    'context': get_context(sentence, transcript),\n                    'timestamp': sentence.timestamp\n                }\n                decisions.append(decision)\n    \n    # Filter by confidence threshold\n    return [d for d in decisions if d['confidence'] >= 0.7]\n```\n\n#### Action Item Extraction\n```python\ndef extract_action_items(transcript):\n    \"\"\"\n    Extract action items with assignees and due dates\n    \"\"\"\n    action_items = []\n    \n    action_patterns = [\n        r'(\\w+)\\s+(will|should|needs?\\s+to)\\s+(.+)',\n        r'action\\s+item:\\s*(.+)',\n        r'todo:\\s*(.+)'\n    ]\n    \n    for sentence in transcript.sentences:\n        for pattern in action_patterns:\n            match = re.search(pattern, sentence.text, re.IGNORECASE)\n            if match:\n                action_item = {\n                    'text': sentence.text,\n                    'action': match.group(-1),\n                    'assignee': extract_assignee(match, sentence),\n                    'due_date': extract_due_date(match, sentence),\n                    'confidence': calculate_confidence(match, sentence)\n                }\n                action_items.append(action_item)\n    \n    return action_items\n```\n\n### Knowledge Graph Construction\n\n#### Entity Relationship Extraction\n```python\ndef extract_relationships(text, entities):\n    \"\"\"\n    Extract relationships between entities in text\n    \"\"\"\n    relationships = []\n    \n    # Dependency parsing for relationship extraction\n    doc = nlp(text)\n    \n    for token in doc:\n        if token.dep_ in ['nsubj', 'dobj', 'pobj']:\n            head_entity = find_entity(token.head.text, entities)\n            child_entity = find_entity(token.text, entities)\n            \n            if head_entity and child_entity:\n                relationship = {\n                    'from_entity': head_entity['id'],\n                    'to_entity': child_entity['id'],\n                    'relationship_type': map_dependency_to_relationship(token.dep_),\n                    'confidence': calculate_relationship_confidence(token),\n                    'context': token.sent.text\n                }\n                relationships.append(relationship)\n    \n    return relationships\n```\n\n## Best Practices\n\n### 1. Document Management\n- Use consistent naming conventions for documents\n- Include metadata tags for better categorization\n- Regularly update and maintain document quality\n- Implement version control for important documents\n\n### 2. Knowledge Organization\n- Create hierarchical taxonomies for better navigation\n- Use consistent entity naming and categorization\n- Maintain clean knowledge graph relationships\n- Regularly review and update knowledge structures\n\n### 3. Search Optimization\n- Use descriptive and comprehensive document titles\n- Include relevant keywords and tags\n- Structure documents for optimal chunking\n- Regularly evaluate and improve search relevance\n\n### 4. Meeting Documentation\n- Use consistent transcript formatting\n- Clearly mark decisions and action items\n- Include participant names and roles\n- Provide context and background information\n\n## Troubleshooting\n\n### Common Issues\n\n**Document Indexing Failures**\n```bash\n# Check document format support\nskill invoke knowledge-base check-format --document-path docs/example.pdf\n\n# Validate document structure\nskill invoke knowledge-base validate-document --document-path docs/example.md\n\n# Debug indexing process\nexport KNOWLEDGE_BASE_DEBUG=true\nskill invoke knowledge-base index-document --document-path docs/example.md --debug\n```\n\n**Search Quality Issues**\n```bash\n# Analyze search results\nskill invoke knowledge-base analyze-search --query \"test query\" --explain-ranking\n\n# Test similarity thresholds\nskill invoke knowledge-base test-thresholds --query \"test query\" --range 0.5:0.9\n\n# Evaluate embedding quality\nskill invoke knowledge-base evaluate-embeddings --sample-documents 100\n```\n\n**Knowledge Graph Issues**\n```bash\n# Check graph consistency\nskill invoke knowledge-base validate-graph --check-orphans --check-cycles\n\n# Analyze entity relationships\nskill invoke knowledge-base analyze-relationships --entity \"kubernetes\"\n\n# Debug graph construction\nskill invoke knowledge-base debug-graph --document-path docs/architecture.md\n```\n\n### Debug Mode\n\n```bash\n# Enable comprehensive debugging\nexport KNOWLEDGE_BASE_DEBUG=true\nexport KNOWLEDGE_BASE_TRACE=true\nskill invoke knowledge-base search --query \"test\" --debug --trace --verbose\n```\n\n## Integration Examples\n\n### CI/CD Pipeline Integration\n\n```yaml\n# .github/workflows/knowledge-base-update.yml\nname: Update Knowledge Base\non:\n  push:\n    paths:\n      - 'docs/**'\n      - 'meetings/**'\n      - 'decisions/**'\n\njobs:\n  update-knowledge-base:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v2\n      - name: Update Knowledge Base\n        run: |\n          skill invoke knowledge-base index-directory --directory-path ./docs --recursive\n          skill invoke knowledge-base index-directory --directory-path ./meetings --recursive\n          skill invoke knowledge-base index-directory --directory-path ./decisions --recursive\n      - name: Validate Knowledge Base\n        run: |\n          skill invoke knowledge-base validate --check-consistency --check-orphans\n      - name: Generate Knowledge Base Report\n        run: |\n          skill invoke knowledge-base generate-report --format HTML --output knowledge-base-report.html\n      - name: Upload Report\n        uses: actions/upload-artifact@v2\n        with:\n          name: knowledge-base-report\n          path: knowledge-base-report.html\n```\n\n### Slack Integration\n\n```javascript\n// Slack bot for knowledge search\napp.command('/knowledge', async ({ command, ack, say }) => {\n  await ack();\n  \n  const query = command.text;\n  \n  try {\n    const results = await skill.invoke('knowledge-base', {\n      action: 'search',\n      query: query,\n      search_type: 'hybrid',\n      limit: 5\n    });\n    \n    const blocks = results.map((result, index) => ({\n      type: 'section',\n      text: {\n        type: 'mrkdwn',\n        text: `*${index + 1}. ${result.title}*\\n${result.excerpt}\\n_Relevance: ${result.similarity.toFixed(2)}_`\n      }\n    }));\n    \n    await say({\n      text: `\U0001F4DA Knowledge Search Results for \"${query}\"`,\n      blocks\n    });\n  } catch (error) {\n    await say(`\u274C Error searching knowledge base: ${error.message}`);\n  }\n});\n```\n\n### API Integration\n\n```javascript\n// REST API for knowledge base operations\napp.get('/api/knowledge/search', async (req, res) => {\n  const { query, type = 'hybrid', limit = 10 } = req.query;\n  \n  try {\n    const results = await skill.invoke('knowledge-base', {\n      action: 'search',\n      query: query,\n      search_type: type,\n      limit: parseInt(limit)\n    });\n    \n    res.json({\n      query,\n      type,\n      total_results: results.length,\n      results\n    });\n  } catch (error) {\n    res.status(500).json({ error: error.message });\n  }\n});\n\napp.post('/api/knowledge/documents', async (req, res) => {\n  const { document_path, document_type, metadata } = req.body;\n  \n  try {\n    const result = await skill.invoke('knowledge-base', {\n      action: 'index-document',\n      document_path: document_path,\n      document_type: document_type,\n      metadata: metadata\n    });\n    \n    res.json(result);\n  } catch (error) {\n    res.status(500).json({ error: error.message });\n  }\n});\n```\n\n## Performance Considerations\n\n### Optimization Tips\n\n1. **Embedding Caching**: Cache frequently used embeddings to reduce computation\n2. **Batch Processing**: Process documents in batches for better efficiency\n3. **Incremental Updates**: Only update changed content instead of full reindexing\n4. **Parallel Processing**: Use multiple workers for document processing\n\n### Resource Usage\n\n- **Memory**: ~4GB for large knowledge bases with embeddings\n- **CPU**: High usage during embedding generation and processing\n- **Storage**: ~10GB for knowledge base with 1000+ documents\n- **Network**: Moderate usage during API calls and data transfers\n\n## Security Considerations\n\n### Data Protection\n\n- All documents are encrypted at rest\n- Search queries and results are logged for audit\n- Access control based on user roles and permissions\n- Sensitive information is redacted in search results\n\n### Access Control\n\n- Role-based access for different document types\n- API authentication and rate limiting\n- Secure embedding model API key management\n- Audit logging for all knowledge base operations\n\n## Version History\n\n### v1.0.0\n- Initial release with basic document indexing and search\n- Support for markdown and text documents\n- Simple keyword search functionality\n\n### v1.1.0\n- Added semantic search with embeddings\n- Meeting transcript analysis capabilities\n- Basic knowledge graph construction\n\n### v1.2.0\n- Enhanced search with hybrid approach\n- Decision tracking and history\n- Contextual information retrieval\n\n### v1.3.0\n- Advanced knowledge graph algorithms\n- Real-time document processing\n- Comprehensive API and integration capabilities\n\n## Support and Contributing\n\n### Getting Help\n\n- Documentation: `/docs/knowledge-base-server.md`\n- Examples: `/examples/knowledge-base/`\n- Community: `#knowledge-base` Slack channel\n\n### Contributing\n\n1. Fork the repository\n2. Create a feature branch\n3. Add tests for new functionality\n4. Submit a pull request\n\n### License\n\nThis skill is licensed under the MIT License. See LICENSE file for details.\n"
  "maintain-databases/SKILL.md": "---\nname: maintain-databases\ndescription: Performs database maintenance, optimization, and backup procedures across multi-cloud environments. Use when ensuring database performance, managing database health, or implementing maintenance schedules.\nlicense: AGPLv3\nmetadata:\n  author: agentic-reconciliation-engine\n  version: \"1.0\"\n  category: enterprise\n  risk_level: medium\n  autonomy: conditional\n  layer: temporal\ncompatibility: Requires Python 3.8+, cloud provider CLI tools (AWS CLI, Azure CLI, gcloud), and access to multi-cloud monitoring systems\nallowed-tools: Bash Read Write Grep\n---\n\n# Database Maintenance \u2014 Multi-Cloud Enterprise Automation\n\n## Purpose\nEnterprise-grade automation solution for database maintenance operations across AWS, Azure, GCP, and on-premise environments to maximize operational efficiency while maintaining security and compliance standards.\n\n## When to Use\n- **database maintenance operations** across multi-cloud environments\n- **Automation and optimization** of database maintenance workflows\n- **Monitoring and management** of database maintenance resources\n- **Compliance and governance** for database maintenance activities\n\n## Inputs\n- **operation**: Operation type (required)\n- **targetResource**: Target resource identifier (required)\n- **cloudProvider**: Cloud provider - `aws|azure|gcp|onprem|all` (optional, default: `all`)\n- **parameters**: Operation-specific parameters (optional)\n- **environment**: Target environment (optional, default: `production`)\n- **dryRun**: Dry run mode (optional, default: `true`)\n\n## Process\n1. **Cloud Provider Detection**: Identify target cloud providers and environments\n2. **Input Validation**: Comprehensive parameter validation and security checks\n3. **Multi-Cloud Context Analysis**: Analyze current state across all providers\n4. **Operation Planning**: Generate optimized execution plan\n5. **Safety Assessment**: Risk analysis and impact evaluation across providers\n6. **Execution**: Perform operations with monitoring and validation\n7. **Results Analysis**: Process results and generate reports\n\n## Outputs\n- **Operation Results**: Detailed execution results and status per provider\n- **Compliance Reports**: Validation and compliance status across environments\n- **Performance Metrics**: Operation performance and efficiency metrics by provider\n- **Recommendations**: Optimization suggestions and next steps\n- **Audit Trail**: Complete operation history for compliance across all providers\n\n## Environment\n- **AWS**: EKS, EC2, Lambda, CloudWatch, IAM, S3\n- **Azure**: AKS, VMs, Functions, Monitor, Azure AD\n- **GCP**: GKE, Compute Engine, Cloud Functions, Cloud Monitoring\n- **On-Premise**: Kubernetes clusters, VMware, OpenStack, Prometheus\n- **Multi-Cloud Tools**: Terraform, Ansible, Crossplane, Cluster API\n\n## Dependencies\n- **Python 3.8+**: Core execution environment\n- **Cloud SDKs**: boto3, azure-sdk, google-cloud\n- **Kubernetes**: kubernetes client for cluster operations\n- **Multi-Cloud Libraries**: terraform-python, ansible-python\n\n## Scripts\n- `core/scripts/automation/database-maintenance.py`: Main automation implementation\n- `core/scripts/automation/database-maintenance_handler.py`: Cloud-specific operations\n- `core/scripts/automation/multi_cloud_orchestrator.py`: Cross-provider coordination\n\n## Trigger Keywords\ndatabase, maintenance, automation, enterprise, multi-cloud, aws, azure, gcp, onprem\n\n## Human Gate Requirements\n- **Production changes**: Production environment operations require approval\n- **High-impact operations**: Critical operations require review\n- **Security changes**: Security modifications need validation\n\n## Enterprise Features\n- **Multi-tenant Support**: Isolated operations per tenant\n- **Role-based Access Control**: Enterprise IAM integration\n- **Audit Logging**: Complete audit trail for compliance\n- **Performance Monitoring**: SLA trackin