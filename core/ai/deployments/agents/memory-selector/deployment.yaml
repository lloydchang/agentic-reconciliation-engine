apiVersion: apps/v1
kind: Deployment
metadata:
  name: memory-selector
  namespace: ai-infrastructure
  labels:
    component: memory-selector
spec:
  replicas: 1
  selector:
    matchLabels:
      component: memory-selector
  template:
    metadata:
      labels:
        component: memory-selector
    spec:
      containers:
      - name: memory-selector
        image: agentic-reconciliation-engine/memory-selector:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: LANGUAGE_PRIORITY
          value: "rust,go,python"
        - name: MEMORY_AGENT_RUST_URL
          value: "http://agent-memory-service.ai-infrastructure.svc.cluster.local:8080"
        - name: MEMORY_AGENT_GO_URL
          value: "http://agent-memory-go.ai-infrastructure.svc.cluster.local:8080"
        - name: MEMORY_AGENT_PYTHON_URL
          value: "http://agent-memory-python.ai-infrastructure.svc.cluster.local:8080"
        - name: MEMORY_SELECTOR_PORT
          value: "8080"
        resources:
          requests:
            memory: "32Mi"
            cpu: "20m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
