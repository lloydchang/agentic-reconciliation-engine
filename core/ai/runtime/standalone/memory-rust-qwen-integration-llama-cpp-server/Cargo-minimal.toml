[package]
name = "agent-memory-rust"
version = "1.0.0"
edition = "2021"
authors = ["Agentic Reconciliation Engine Team"]
description = "Memory agent with Qwen LLM integration using llama.cpp"

[dependencies]
tokio = { version = "1.28", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[[bin]]
name = "agent-memory"
path = "src/main.rs"
