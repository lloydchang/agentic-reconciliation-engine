[package]
name = "agent-memory-rust"
version = "1.0.0"
edition = "2021"
authors = ["GitOps Infrastructure Team"]
description = "Memory agent with Qwen LLM integration using llama.cpp"

[dependencies]
# Use only basic stdlib features
serde = { version = "1.0.150", features = ["derive"] }
serde_json = "1.0.89"

[[bin]]
name = "agent-memory"
path = "src/main.rs"
