apiVersion: v1
kind: Secret
metadata:
  name: slack-secrets
  namespace: ai-infrastructure
  labels:
    app: slack-integration
    component: open-swe-integration
    version: v1.0.0
  annotations:
    kubernetes.io/secret-name: "slack-integration-secrets"
type: Opaque
data:
  # Base64 encoded values - replace with actual values
  # bot-token: "xoxb-your-slack-bot-token"
  # signing-secret: "your-slack-signing-secret"
  bot-token: ""  # Replace with: echo -n "xoxb-your-token" | base64
  signing-secret: ""  # Replace with: echo -n "your-secret" | base64
  
---
apiVersion: v1
kind: Secret
metadata:
  name: slack-integration-tls
  namespace: ai-infrastructure
  labels:
    app: slack-integration
    component: open-swe-integration
    version: v1.0.0
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
type: kubernetes.io/tls
data:
  # TLS certificates will be managed by cert-manager
  tls.crt: ""
  tls.key: ""
