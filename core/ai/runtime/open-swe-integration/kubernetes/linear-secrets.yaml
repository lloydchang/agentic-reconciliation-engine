apiVersion: v1
kind: Secret
metadata:
  name: linear-secrets
  namespace: ai-infrastructure
  labels:
    app: linear-integration
    component: open-swe-integration
    version: v1.0.0
  annotations:
    kubernetes.io/secret-name: "linear-integration-secrets"
type: Opaque
data:
  # Base64 encoded values - replace with actual values
  # webhook-secret: "your-linear-webhook-secret"
  # api-token: "your-linear-api-token"
  webhook-secret: ""  # Replace with: echo -n "your-webhook-secret" | base64
  api-token: ""      # Replace with: echo -n "your-linear-api-token" | base64
