apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-infrastructure-portal
  namespace: ai-infrastructure
  labels:
    app: ai-infrastructure-portal
    component: portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-infrastructure-portal
  template:
    metadata:
      labels:
        app: ai-infrastructure-portal
        component: portal
    spec:
      containers:
      - name: portal
        image: nginx:alpine
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: portal-html
          mountPath: /usr/share/nginx/html
        resources:
          requests:
            memory: "32Mi"
            cpu: "25m"
          limits:
            memory: "64Mi"
            cpu: "50m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: portal-html
        configMap:
          name: portal-html
---
apiVersion: v1
kind: Service
metadata:
  name: ai-infrastructure-portal
  namespace: ai-infrastructure
  labels:
    app: ai-infrastructure-portal
    component: portal
spec:
  selector:
    app: ai-infrastructure-portal
  ports:
  - name: http
    port: 9000
    targetPort: 80
    protocol: TCP
  type: ClusterIP
