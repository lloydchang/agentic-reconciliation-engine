apiVersion: v1
kind: ConfigMap
metadata:
  name: portal-html
  namespace: ai-infrastructure
data:
  index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>AI Infrastructure Portal</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            
            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                min-height: 100vh;
                color: #333;
            }
            
            .container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 20px;
            }
            
            .header {
                text-align: center;
                margin-bottom: 40px;
                color: white;
            }
            
            .header h1 {
                font-size: 2.5rem;
                margin-bottom: 10px;
                text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            }
            
            .header p {
                font-size: 1.2rem;
                opacity: 0.9;
            }
            
            .services-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                gap: 20px;
                margin-bottom: 30px;
            }
            
            .service-card {
                background: white;
                border-radius: 12px;
                padding: 25px;
                box-shadow: 0 8px 32px rgba(0,0,0,0.1);
                transition: all 0.3s ease;
                border: 1px solid rgba(255,255,255,0.2);
                backdrop-filter: blur(10px);
            }
            
            .service-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            }
            
            .service-icon {
                font-size: 2.5rem;
                margin-bottom: 15px;
            }
            
            .service-name {
                font-size: 1.4rem;
                font-weight: 600;
                margin-bottom: 8px;
                color: #2d3748;
            }
            
            .service-description {
                color: #718096;
                margin-bottom: 15px;
                line-height: 1.5;
            }
            
            .service-url {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                background: linear-gradient(135deg, #667eea, #764ba2);
                color: white;
                text-decoration: none;
                padding: 10px 20px;
                border-radius: 8px;
                font-weight: 500;
                transition: all 0.3s ease;
            }
            
            .service-url:hover {
                transform: scale(1.05);
                box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            }
            
            .status {
                display: inline-block;
                padding: 4px 8px;
                border-radius: 12px;
                font-size: 0.75rem;
                font-weight: 600;
                margin-left: 10px;
            }
            
            .status.running {
                background: #48bb78;
                color: white;
            }
            
            .status.checking {
                background: #ed8936;
                color: white;
            }
            
            .status.error {
                background: #f56565;
                color: white;
            }
            
            .footer {
                text-align: center;
                color: white;
                margin-top: 40px;
                opacity: 0.8;
            }
            
            .refresh-btn {
                background: white;
                color: #667eea;
                border: none;
                padding: 12px 24px;
                border-radius: 8px;
                font-weight: 600;
                cursor: pointer;
                margin-bottom: 20px;
                transition: all 0.3s ease;
            }
            
            .refresh-btn:hover {
                transform: scale(1.05);
                box-shadow: 0 4px 15px rgba(255,255,255,0.3);
            }
            
            @media (max-width: 768px) {
                .services-grid {
                    grid-template-columns: 1fr;
                }
                
                .header h1 {
                    font-size: 2rem;
                }
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="header">
                <h1>🚀 AI Infrastructure Portal</h1>
                <p>Central access to all your AI services and monitoring tools</p>
                <button class="refresh-btn" onclick="checkAllServices()">🔄 Refresh Status</button>
            </div>
            
            <div class="services-grid">
                <!-- AI Dashboard -->
                <div class="service-card">
                    <div class="service-icon">🤖</div>
                    <div class="service-name">
                        AI Dashboard
                        <span class="status checking" id="status-8080">Checking...</span>
                    </div>
                    <div class="service-description">
                        Main AI agents monitoring dashboard with real-time metrics, activity feeds, and system controls
                    </div>
                    <a href="http://localhost:8080" target="_blank" class="service-url">
                        Open Dashboard →
                    </a>
                </div>
                
                <!-- Dashboard API -->
                <div class="service-card">
                    <div class="service-icon">📊</div>
                    <div class="service-name">
                        Dashboard API
                        <span class="status checking" id="status-5000">Checking...</span>
                    </div>
                    <div class="service-description">
                        RESTful API for dashboard data, agent metrics, and system integration endpoints
                    </div>
                    <a href="http://localhost:5000/docs" target="_blank" class="service-url">
                        API Docs →
                    </a>
                </div>
                
                <!-- Langfuse Observability -->
                <div class="service-card">
                    <div class="service-icon">🔍</div>
                    <div class="service-name">
                        Langfuse Observability
                        <span class="status checking" id="status-3000">Checking...</span>
                    </div>
                    <div class="service-description">
                        LLM observability and analytics platform for tracing, monitoring, and debugging AI models
                    </div>
                    <a href="http://localhost:3000" target="_blank" class="service-url">
                        Open Langfuse →
                    </a>
                </div>
                
                <!-- Comprehensive API -->
                <div class="service-card">
                    <div class="service-icon">📈</div>
                    <div class="service-name">
                        Comprehensive API
                        <span class="status checking" id="status-5001">Checking...</span>
                    </div>
                    <div class="service-description">
                        Advanced analytics API with detailed agent discovery, skill analysis, and performance metrics
                    </div>
                    <a href="http://localhost:5001/docs" target="_blank" class="service-url">
                        API Docs →
                    </a>
                </div>
                
                <!-- Comprehensive Frontend -->
                <div class="service-card">
                    <div class="service-icon">🖥️</div>
                    <div class="service-name">
                        Comprehensive Dashboard
                        <span class="status checking" id="status-8082">Checking...</span>
                    </div>
                    <div class="service-description">
                        Advanced analytics dashboard with time-series metrics, failure analysis, and agent discovery
                    </div>
                    <a href="http://localhost:8082" target="_blank" class="service-url">
                        Open Dashboard →
                    </a>
                </div>
                
                <!-- Memory Service -->
                <div class="service-card">
                    <div class="service-icon">🧠</div>
                    <div class="service-name">
                        Memory Service
                        <span class="status checking" id="status-8081">Checking...</span>
                    </div>
                    <div class="service-description">
                        AI memory management service with persistent state, semantic search, and context retrieval
                    </div>
                    <a href="http://localhost:8081/health" target="_blank" class="service-url">
                        Health Check →
                    </a>
                </div>
                
                <!-- Temporal UI -->
                <div class="service-card">
                    <div class="service-icon">⏰</div>
                    <div class="service-name">
                        Temporal UI
                        <span class="status checking" id="status-7233">Checking...</span>
                    </div>
                    <div class="service-description">
                        Workflow orchestration interface for monitoring and managing Temporal workflows and activities
                    </div>
                    <a href="http://localhost:7233" target="_blank" class="service-url">
                        Open Temporal →
                    </a>
                </div>
            </div>
            
            <div class="footer">
                <p>🔧 Managed by Agentic Reconciliation Engine</p>
                <p>Last updated: <span id="last-updated">--</span></p>
            </div>
        </div>
        
        <script>
            const services = [
                { port: 8080, name: 'AI Dashboard' },
                { port: 5000, name: 'Dashboard API' },
                { port: 3000, name: 'Langfuse' },
                { port: 5001, name: 'Comprehensive API' },
                { port: 8082, name: 'Comprehensive Dashboard' },
                { port: 8081, name: 'Memory Service' },
                { port: 7233, name: 'Temporal UI' }
            ];
            
            async function checkService(port) {
                try {
                    const response = await fetch(`http://localhost:${port}/health`, { 
                        method: 'HEAD',
                        mode: 'no-cors',
                        cache: 'no-cache'
                    });
                    return 'running';
                } catch (error) {
                    try {
                        // Try alternative endpoints
                        const altEndpoints = ['', '/docs', '/api/health', '/'];
                        for (const endpoint of altEndpoints) {
                            try {
                                await fetch(`http://localhost:${port}${endpoint}`, { 
                                    method: 'HEAD',
                                    mode: 'no-cors',
                                    cache: 'no-cache'
                                });
                                return 'running';
                            } catch (e) {
                                continue;
                            }
                        }
                        return 'error';
                    } catch (altError) {
                        return 'error';
                    }
                }
            }
            
            async function checkAllServices() {
                for (const service of services) {
                    const statusElement = document.getElementById(`status-${service.port}`);
                    statusElement.textContent = 'Checking...';
                    statusElement.className = 'status checking';
                    
                    const status = await checkService(service.port);
                    statusElement.textContent = status === 'running' ? 'Running' : 'Offline';
                    statusElement.className = `status ${status}`;
                }
                
                document.getElementById('last-updated').textContent = new Date().toLocaleString();
            }
            
            // Check services on page load
            document.addEventListener('DOMContentLoaded', checkAllServices);
            
            // Check services every 30 seconds
            setInterval(checkAllServices, 30000);
        </script>
    </body>
    </html>
