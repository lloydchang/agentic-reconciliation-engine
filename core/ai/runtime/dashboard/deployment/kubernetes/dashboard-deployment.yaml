apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-agents-dashboard
  namespace: ai-infrastructure
  labels:
    app: ai-agents-dashboard
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-agents-dashboard
  template:
    metadata:
      labels:
        app: ai-agents-dashboard
    spec:
      containers:
      - name: dashboard
        image: ai-agents/dashboard:latest
        ports:
        - containerPort: 8081
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
        - name: TEMPORAL_ADDRESS
          value: "temporal-frontend.ai-infrastructure.svc.cluster.local:7233"
        - name: MEMORY_AGENT_URL
          value: "http://agent-memory-service.ai-infrastructure.svc.cluster.local:8080"
        - name: BACKEND_PRIORITY
          value: "llama-cpp,ollama"
        - name: LANGUAGE_PRIORITY
          value: "rust,go,python"
        - name: ENVIRONMENT
          value: "production"
        - name: PORT
          value: "8081"
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-agents-dashboard
  namespace: ai-infrastructure
  labels:
    app: ai-agents-dashboard
spec:
  selector:
    app: ai-agents-dashboard
  ports:
  - name: http
    port: 8081
    targetPort: 8081
  type: ClusterIP
