apiVersion: v1
kind: Service
metadata:
  name: agent-memory-service
  namespace: ai-infrastructure
  labels:
    app: agent-memory-rust
    component: memory-agent
spec:
  selector:
    app: agent-memory-rust
    component: memory-agent
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  - name: metrics
    port: 9090
    targetPort: 9090
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-memory-rust
  namespace: ai-infrastructure
  labels:
    app: agent-memory-rust
    component: memory-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-memory-rust
      component: memory-agent
  template:
    metadata:
      labels:
        app: agent-memory-rust
        component: memory-agent
    spec:
      initContainers:
      - name: init-db
        image: alpine:latest
        command: ["sh", "-c"]
        args:
        - |
          if [ ! -f /data/memory.db ]; then
            echo "Initializing memory database"
            touch /data/memory.db
          else
            echo "Database already exists"
          fi
        volumeMounts:
        - name: memory-storage
          mountPath: /data
      containers:
      - name: agent-memory
        image: agent-memory-rust:latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9090
          name: metrics
        env:
        - name: DATABASE_PATH
          value: "sqlite:/data/memory.db"
        - name: BIND_ADDRESS
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        - name: SKILLS_DIRECTORY
          value: "/opt/skills"
        - name: QWEN_API_URL
          value: "http://qwen-service.ai-infrastructure.svc.cluster.local:8000"
        - name: QWEN_MODEL
          value: "qwen2.5:0.5b"
        - name: QWEN_API_KEY
          valueFrom:
            secretKeyRef:
              name: agent-memory-secrets
              key: qwen-api-key
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: agent-memory-secrets
              key: jwt-secret
        - name: AUTH_ENABLED
          value: "true"
        - name: METRICS_ENABLED
          value: "true"
        - name: METRICS_PORT
          value: "9090"
        - name: RUST_LOG
          value: "info"
        volumeMounts:
        - name: memory-storage
          mountPath: /data
        - name: skills-volume
          mountPath: /opt/skills
          readOnly: true
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: memory-storage
        persistentVolumeClaim:
          claimName: agent-memory-pvc
      - name: skills-volume
        configMap:
          name: skills-config
          optional: true
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: agent-memory-metrics
  namespace: ai-infrastructure
  labels:
    app: agent-memory-rust
spec:
  selector:
    matchLabels:
      app: agent-memory-rust
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
