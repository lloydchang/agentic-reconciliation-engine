apiVersion: v1
kind: Namespace
metadata:
  name: open-swe
  labels:
    purpose: ai-agent-platform
    security-level: high
    managed-by: flux
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: open-swe-config
  namespace: open-swe
  labels:
    app: open-swe-langgraph
data:
  LANGGRAPH_SERVER_URL: "http://open-swe-langgraph.open-swe.svc.cluster.local:2024"
  GITHUB_APP_WEBHOOK_URL: "/api/webhooks/github"
  LINEAR_WEBHOOK_URL: "/api/webhooks/linear"
  SLACK_WEBHOOK_URL: "/api/webhooks/slack"
  LANGSMITH_PROJECT: "gitops-infra-control-plane"
---
apiVersion: v1
kind: Secret
metadata:
  name: open-swe-secrets
  namespace: open-swe
  labels:
    app: open-swe-langgraph
type: Opaque
stringData:
  GITHUB_APP_PRIVATE_KEY: |
    -----BEGIN RSA PRIVATE KEY-----
    # TODO: Replace with actual GitHub App private key
    -----END RSA PRIVATE KEY-----
  GITHUB_APP_ID: "your-github-app-id"
  GITHUB_WEBHOOK_SECRET: "your-webhook-secret"
  LANGSMITH_API_KEY: "your-langsmith-api-key"
  SLACK_BOT_TOKEN: "xoxb-your-slack-bot-token"
  SLACK_SIGNING_SECRET: "your-slack-signing-secret"
  LINEAR_API_KEY: "your-linear-api-key"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: open-swe-langgraph
  namespace: open-swe
  labels:
    app: open-swe-langgraph
    version: v1.0.0
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: open-swe-langgraph
  template:
    metadata:
      labels:
        app: open-swe-langgraph
        security-context: restricted
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
      - name: langgraph
        image: langchain/open-swe:latest
        ports:
        - containerPort: 2024
          name: http
          protocol: TCP
        env:
        - name: LANGSMITH_API_KEY
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: langsmith-api-key
        - name: GITHUB_APP_ID
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: github-app-id
        - name: GITHUB_PRIVATE_KEY
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: github-app-private-key
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: slack-bot-token
        - name: SLACK_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: slack-signing-secret
        - name: LINEAR_API_KEY
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: linear-api-key
        - name: LANGGRAPH_PROJECT
          value: "gitops-infra-control-plane"
        - name: LOG_LEVEL
          value: "INFO"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1001
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /app/cache
      volumes:
      - name: tmp-volume
        emptyDir: {}
      - name: cache-volume
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: open-swe-langgraph
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: open-swe-langgraph
  namespace: open-swe
  labels:
    app: open-swe-langgraph
spec:
  type: ClusterIP
  ports:
  - port: 2024
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: open-swe-langgraph
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: open-swe-langgraph
  namespace: open-swe
  labels:
    app: open-swe-langgraph
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - open-swe.your-domain.com
    secretName: open-swe-tls
  rules:
  - host: open-swe.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: open-swe-langgraph
            port:
              number: 2024
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: open-swe-langgraph
  namespace: open-swe
  labels:
    app: open-swe-langgraph
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: open-swe-langgraph-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses", "networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: open-swe-langgraph-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: open-swe-langgraph-role
subjects:
- kind: ServiceAccount
  name: open-swe-langgraph
  namespace: open-swe
