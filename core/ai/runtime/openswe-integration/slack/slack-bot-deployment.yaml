apiVersion: v1
kind: ConfigMap
metadata:
  name: slack-bot-config
  namespace: open-swe
  labels:
    app: slack-bot
data:
  SLACK_SIGNING_SECRET: "your-slack-signing-secret"
  SLACK_BOT_TOKEN: "xoxb-your-slack-bot-token"
  SLACK_APP_TOKEN: "xapp-your-slack-app-token"
  SLACK_TEAM_ID: "your-slack-team-id"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: slack-bot
  namespace: open-swe
  labels:
    app: slack-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: slack-bot
  template:
    metadata:
      labels:
        app: slack-bot
    spec:
      containers:
      - name: slack-bot
        image: python:3.11-slim
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: slack-bot-token
        - name: SLACK_SIGNING_SECRET
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: slack-signing-secret
        - name: SLACK_APP_TOKEN
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: slack-app-token
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: github-token
        - name: LANGSMITH_API_KEY
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: langsmith-api-key
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: slack-scripts
          mountPath: /app
      volumes:
      - name: slack-scripts
        configMap:
          name: slack-bot-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: slack-bot
  namespace: open-swe
  labels:
    app: slack-bot
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: slack-bot
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slack-bot
  namespace: open-swe
  labels:
    app: slack-bot
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - slack-bot.your-domain.com
    secretName: slack-bot-tls
  rules:
  - host: slack-bot.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: slack-bot
            port:
              number: 8080
