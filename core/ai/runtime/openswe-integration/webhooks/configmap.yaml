apiVersion: v1
kind: ConfigMap
metadata:
  name: open-swe-webhook-scripts
  namespace: open-swe
  labels:
    app: open-swe-webhook
data:
  requirements.txt: |
    flask==2.3.3
    langsmith==0.0.25
    requests==2.31.0
    python-dotenv==1.0.0

  Dockerfile: |
    FROM python:3.11-slim

    WORKDIR /app

    COPY requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt

    COPY webhook-handler.py .

    USER 1001

    CMD ["python", "webhook-handler.py"]
