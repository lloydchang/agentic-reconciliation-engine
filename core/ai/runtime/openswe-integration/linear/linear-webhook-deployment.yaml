apiVersion: v1
kind: ConfigMap
metadata:
  name: linear-webhook-config
  namespace: open-swe
  labels:
    app: linear-webhook
data:
  LINEAR_WEBHOOK_SECRET: "your-linear-webhook-secret"
  LINEAR_API_ENDPOINT: "https://api.linear.app/graphql"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: linear-webhook-handler
  namespace: open-swe
  labels:
    app: linear-webhook
spec:
  replicas: 2
  selector:
    matchLabels:
      app: linear-webhook
  template:
    metadata:
      labels:
        app: linear-webhook
    spec:
      containers:
      - name: linear-webhook
        image: python:3.11-slim
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: LINEAR_WEBHOOK_SECRET
          valueFrom:
            configMapKeyRef:
              name: linear-webhook-config
              key: LINEAR_WEBHOOK_SECRET
        - name: LINEAR_API_KEY
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: linear-api-key
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: open-swe-secrets
              key: github-token
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: linear-scripts
          mountPath: /app
      volumes:
      - name: linear-scripts
        configMap:
          name: linear-webhook-scripts
---
apiVersion: v1
kind: Service
metadata:
  name: linear-webhook
  namespace: open-swe
  labels:
    app: linear-webhook
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: linear-webhook
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linear-webhook
  namespace: open-swe
  labels:
    app: linear-webhook
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - linear-webhooks.your-domain.com
    secretName: linear-webhook-tls
  rules:
  - host: linear-webhooks.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: linear-webhook
            port:
              number: 8080
