apiVersion: v1
kind: ServiceAccount
metadata:
  name: open-swe-gateway-sa
  namespace: ai-infrastructure
  labels:
    app: open-swe-gateway
    component: open-swe-integration

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: open-swe-gateway-role
  namespace: ai-infrastructure
  labels:
    app: open-swe-gateway
    component: open-swe-integration
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec", "pods/log"]
  verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["batch"]
  resources: ["jobs"]
  verbs: ["get", "list", "watch", "create", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: open-swe-gateway-rolebinding
  namespace: ai-infrastructure
  labels:
    app: open-swe-gateway
    component: open-swe-integration
subjects:
- kind: ServiceAccount
  name: open-swe-gateway-sa
  namespace: ai-infrastructure
roleRef:
  kind: Role
  name: open-swe-gateway-role
  apiGroup: rbac.authorization.k8s.io
