apiVersion: v1
kind: Service
metadata:
  name: open-swe-gateway
  namespace: ai-infrastructure
  labels:
    app: open-swe-gateway
    component: open-swe-integration
spec:
  selector:
    app: open-swe-gateway
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  type: ClusterIP

---
apiVersion: v1
kind: Service
metadata:
  name: open-swe-gateway-lb
  namespace: ai-infrastructure
  labels:
    app: open-swe-gateway
    component: open-swe-integration
spec:
  selector:
    app: open-swe-gateway
  ports:
  - name: http
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: LoadBalancer
  loadBalancerIP: ""  # Will be assigned by cloud provider
