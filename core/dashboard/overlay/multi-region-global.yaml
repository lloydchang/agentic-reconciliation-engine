apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-portal-global-ingress
  namespace: ai-infrastructure
  annotations:
    kubernetes.io/ingress.class: "global-load-balancer"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-global"
    external-dns.alpha.kubernetes.io/hostname: "portal.ai-infrastructure.global"
spec:
  ingressClassName: global-load-balancer
  tls:
  - hosts:
    - portal.ai-infrastructure.global
    secretName: ai-portal-global-tls
  rules:
  - host: portal.ai-infrastructure.global
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-portal-global-lb
            port:
              number: 80
---
apiVersion: v1
kind: Service
metadata:
  name: ai-portal-global-lb
  namespace: ai-infrastructure
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "10"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "5"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  - name: https
    port: 443
    targetPort: 8443
    protocol: TCP
  selector:
    app: ai-infrastructure-portal
    region: primary
---
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: ai-portal-global-gateway
  namespace: ai-infrastructure
spec:
  selector:
    istio: global-ingressgateway
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - portal.ai-infrastructure.global
    tls:
      httpsRedirect: true
  - port:
      number: 443
      name: https
      protocol: HTTPS
    tls:
      mode: SIMPLE
      credentialName: ai-portal-global-tls
    hosts:
    - portal.ai-infrastructure.global
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ai-portal-global-vs
  namespace: ai-infrastructure
spec:
  hosts:
  - portal.ai-infrastructure.global
  gateways:
  - ai-portal-global-gateway
  http:
  - match:
    - uri:
        prefix: /
    route:
    - destination:
        host: ai-portal-global-lb
        port:
          number: 80
    timeout: 30s
    retries:
      attempts: 3
      perTryTimeout: 10s
    fault:
      delay:
        percentage:
          value: 0.1
        fixedDelay: 5s
      abort:
        percentage:
          value: 0.1
        httpStatus: 503
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ai-portal-global-dr
  namespace: ai-infrastructure
spec:
  host: ai-portal-global-lb
  trafficPolicy:
    loadBalancer:
      simple: RANDOM
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    connectionPool:
      tcp:
        maxConnections: 1000
      http:
        http1MaxPendingRequests: 1024
        maxRequestsPerConnection: 10
        maxRetries: 3
