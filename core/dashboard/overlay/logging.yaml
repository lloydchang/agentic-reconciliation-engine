apiVersion: logging.banzaicloud.io/v1beta1
kind: Logging
metadata:
  name: ai-portal-logging
  namespace: ai-infrastructure
spec:
  fluentd: {}
  fluentbit: {}
  controlNamespace: ai-infrastructure
---
apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterFlow
metadata:
  name: ai-portal-cluster-flow
  namespace: ai-infrastructure
spec:
  match:
  - select:
      labels:
        app.kubernetes.io/name: ai-infrastructure-portal
  globalOutputRefs:
  - ai-portal-elasticsearch
---
apiVersion: logging.banzaicloud.io/v1beta1
kind: ClusterOutput
metadata:
  name: ai-portal-elasticsearch
  namespace: ai-infrastructure
spec:
  elasticsearch:
    host: elasticsearch.ai-infrastructure.svc.cluster.local
    port: 9200
    scheme: https
    ssl_verify: false
    user: elastic
    password:
      valueFrom:
        secretKeyRef:
          name: elasticsearch-secret
          key: password
    index_name: ai-portal-logs
    logstash_format: true
    logstash_prefix: ai-portal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: ai-infrastructure
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Log_Level     info
        Daemon        off

    [INPUT]
        Name              tail
        Path              /var/log/containers/*ai-infrastructure-portal*.log
        Parser            docker
        Tag               ai-portal.*
        Refresh_Interval  5

    [INPUT]
        Name              systemd
        Tag               ai-portal.systemd.*
        Systemd_Filter    _SYSTEMD_UNIT=ai-infrastructure-portal.service

    [FILTER]
        Name                kubernetes
        Match               ai-portal.*
        Kube_URL            https://kubernetes.default.svc.cluster.local:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     ai-portal.

    [FILTER]
        Name                grep
        Match               ai-portal.*
        Regex               log .*ERROR|log .*WARN|log .*INFO

    [OUTPUT]
        Name                elasticsearch
        Match               ai-portal.*
        Host                elasticsearch.ai-infrastructure.svc.cluster.local
        Port                9200
        Index               ai-portal-logs
        Type                _doc
        Logstash_Format    On
        Logstash_Prefix    ai-portal
        HTTP_User          elastic
        HTTP_Passwd        ${ELASTIC_PASSWORD}
        tls                On
        tls.verify         Off
