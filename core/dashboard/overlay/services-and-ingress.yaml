apiVersion: v1
kind: Service
metadata:
  name: ai-infrastructure-portal-api
  namespace: ai-infrastructure
  labels:
    app: ai-infrastructure-portal
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 5001
    targetPort: 5001
    protocol: TCP
    name: http
  selector:
    app: ai-infrastructure-portal
    component: api
---
apiVersion: v1
kind: Service
metadata:
  name: ai-infrastructure-portal-dashboard
  namespace: ai-infrastructure
  labels:
    app: ai-infrastructure-portal
    component: dashboard
spec:
  type: ClusterIP
  ports:
  - port: 8081
    targetPort: 8081
    protocol: TCP
    name: http
  selector:
    app: ai-infrastructure-portal
    component: dashboard
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ai-infrastructure-portal-ingress
  namespace: ai-infrastructure
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.ai-infrastructure-portal.com
    - dashboard.ai-infrastructure-portal.com
    secretName: ai-portal-tls
  rules:
  - host: api.ai-infrastructure-portal.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-infrastructure-portal-api
            port:
              number: 5001
  - host: dashboard.ai-infrastructure-portal.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ai-infrastructure-portal-dashboard
            port:
              number: 8081
