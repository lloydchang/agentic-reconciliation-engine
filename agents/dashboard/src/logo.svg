  <circle cx="28" cy="39" r="3" fill="#FFFFFF" />
  <circle cx="37" cy="32" r="3" fill="#FFFFFF" />

  <!-- Tier 2: Independent Spoke Clusters (Multi-Cloud) -->
  <!-- EKS / AWS (Amber) -->
  <circle cx="32" cy="10" r="7" fill="#F59E0B" />
  <!-- AKS / Azure (Blue) -->
  <circle cx="13" cy="43" r="7" fill="#0EA5E9" />
  <!-- GKE / GCP (Red) -->
