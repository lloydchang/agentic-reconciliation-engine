  <path d="M32 16 L46 24 L46 40 L32 48 L18 40 L18 24 Z" fill="#4F46E5" />

  <!-- Tier 0: GitOps (Declarative Source of Truth) -->
  <line x1="28" y1="25" x2="28" y2="39" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
  <line x1="28" y1="39" x2="37" y2="32" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" />
