# SOPS Configuration for GitOps Infra Control Plane
# This file defines how to encrypt/decrypt secrets in this repository

creation_rules:
  # Default rule for all YAML files - use age encryption
  - path_regex: .*.yaml$
    age: age1qgygnw42geuwdlsrpsk0r85h69lhgwcrksx3yek4rx54g4p869hsklgjx9
    encrypted_regex: '^(data|stringData)$'
  
  # Specific rules for secrets directories
  - path_regex: secrets/.*\.yaml$
    age: age1qgygnw42geuwdlsrpsk0r85h69lhgwcrksx3yek4rx54g4p869hsklgjx9
    encrypted_regex: '^(data|stringData)$'
  
  # Rules for infrastructure secrets
  - path_regex: infrastructure/.*\.secret\.yaml$
    age: age1qgygnw42geuwdlsrpsk0r85h69lhgwcrksx3yek4rx54g4p869hsklgjx9
    encrypted_regex: '^(data|stringData)$'
  
  # Rules for tenant-specific secrets
  - path_regex: infrastructure/tenants/.*/.*\.secret\.yaml$
    age: age1qgygnw42geuwdlsrpsk0r85h69lhgwcrksx3yek4rx54g4p869hsklgjx9
    encrypted_regex: '^(data|stringData)$'

# Key groups for different environments (for team collaboration)
key_groups:
  # Primary age key for the control plane
  - age:
      - age1qgygnw42geuwdlsrpsk0r85h69lhgwcrksx3yek4rx54g4p869hsklgjx9  # Primary key - store securely
  
  # Backup keys for disaster recovery (optional)
  # - age:
  #     - age1yyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyyy  # Backup key 1
  # - age:
  #     - age1zzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzzz  # Backup key 2
