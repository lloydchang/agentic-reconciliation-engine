apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-metrics-server
  namespace: ai-infrastructure
  labels:
    component: ai-metrics-server
spec:
  replicas: 1
  selector:
    matchLabels:
      component: ai-metrics-server
  template:
    metadata:
      labels:
        component: ai-metrics-server
    spec:
      containers:
      - name: metrics-server
        image: ai-metrics-server:latest
        ports:
        - containerPort: 8080
          name: metrics
        - containerPort: 9090
          name: prometheus
        env:
        - name: METRICS_PORT
          value: "8080"
        - name: PROMETHEUS_PORT
          value: "9090"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ai-metrics-service
  namespace: ai-infrastructure
  labels:
    component: ai-metrics-server
spec:
  type: ClusterIP
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: prometheus
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    component: ai-metrics-server
---
apiVersion: v1
kind: Service
metadata:
  name: ai-metrics-service-nodeport
  namespace: ai-infrastructure
  labels:
    component: ai-metrics-server
spec:
  type: NodePort
  ports:
  - name: metrics
    port: 8080
    targetPort: 8080
    nodePort: 30080
  selector:
    component: ai-metrics-server
