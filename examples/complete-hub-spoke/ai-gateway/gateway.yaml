# Complete AI Gateway Deployment
# Production-ready agentgateway proxy for Claude Code with security controls

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: claude-code-gateway
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: claude-api
    hostname: claude-api.control-plane.svc.cluster.local
    port: 8080
    protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claude-code-route
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
spec:
  parentRefs:
  - name: claude-code-gateway
    namespace: control-plane
  hostnames:
  - claude-api.control-plane.svc.cluster.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "/v1/messages"
    filters:
    - type: ExtensionRef
      extensionRef:
        group: agentgateway.dev
        kind: Filter
        name: prompt-guard
  backendRefs:
  - name: claude-upstream
    kind: Service
    port: 443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-gateway
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: claude-gateway
  template:
    metadata:
      labels:
        app: claude-gateway
    spec:
      containers:
      - name: agentgateway
        image: agentgateway/agentgateway:latest
        ports:
        - containerPort: 8080
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: claude-secrets
              key: api-key
        - name: GATEWAY_CONFIG
          value: |
            promptGuards:
              enabled: true
              rules:
              - pattern: "(?i)(password|secret|key|token)"
                action: block
                message: "Request blocked: sensitive data detected"
            auditLogging:
              enabled: true
              logLevel: info
              includeHeaders: false
              includeBody: false
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 101
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      serviceAccountName: claude-gateway-sa
      securityContext:
        fsGroup: 101
---
apiVersion: v1
kind: Service
metadata:
  name: claude-code-gateway
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
spec:
  selector:
    app: claude-gateway
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
---
# Claude Code Gateway: Secure AI Traffic Management

## 🎯 Scenario Applicability

### ✅ **BEST FOR: Hybrid Scenarios**
**When to Use**: Local development with cloud deployment requiring AI assistance
- **Use Case**: Development teams need AI help but require security and governance
- **Environment**: Local development + cloud production with AI API access
- **Team Scale**: Medium to large teams (5-50 engineers) with AI expertise
- **Security Needs**: High security, compliance, and audit requirements
- **AI Integration**: Using Claude Code or other AI tools in development workflow

**Why It Fits**:
- Gateway provides secure proxy for AI traffic from local to cloud
- Prompt guards prevent sensitive data exposure in hybrid environments
- Centralized control of AI API usage and costs
- Audit trails for compliance and governance
- Integration with existing cloud security model

### ⚠️ **CONSIDER FOR: Brownfield Scenarios**
**When to Use**: Existing infrastructure needing AI-enhanced operations
- **Use Case**: Legacy systems where AI can help with modernization
- **Integration**: Add AI gateway to existing infrastructure
- **Security**: Enhance security posture for AI-driven operations
- **Migration**: AI-assisted analysis and migration planning

**Why Consider**:
- Can add AI capabilities to existing infrastructure without disruption
- Provides secure AI integration for legacy environments
- Helps with knowledge transfer and documentation generation
- Enables gradual AI adoption in brownfield environments

### ❌ **NOT RECOMMENDED: Greenfield Scenarios**
**Why Not**: Over-engineering for new projects
- **Problem**: Adding gateway complexity to new, clean projects
- **Alternative**: Direct AI integration without gateway for simpler setups
- **Risk**: Additional complexity may slow down initial development
- **Recommendation**: Use gateway only when security/compliance requirements demand it

