# Complete AI Gateway Deployment
# Production-ready agentgateway proxy for Claude Code with security controls

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: claude-code-gateway
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
spec:
  gatewayClassName: agentgateway
  listeners:
  - name: claude-api
    hostname: claude-api.control-plane.svc.cluster.local
    port: 8080
    protocol: HTTP
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: claude-code-route
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
spec:
  parentRefs:
  - name: claude-code-gateway
    namespace: control-plane
  hostnames:
  - claude-api.control-plane.svc.cluster.local
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: "/v1/messages"
    filters:
    - type: ExtensionRef
      extensionRef:
        group: agentgateway.dev
        kind: Filter
        name: prompt-guard
  backendRefs:
  - name: claude-upstream
    kind: Service
    port: 443
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code-gateway
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
spec:
  replicas: 2
  selector:
    matchLabels:
      app: claude-gateway
  template:
    metadata:
      labels:
        app: claude-gateway
    spec:
      containers:
      - name: agentgateway
        image: agentgateway/agentgateway:latest
        ports:
        - containerPort: 8080
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: claude-secrets
              key: api-key
        - name: GATEWAY_CONFIG
          value: |
            promptGuards:
              enabled: true
              rules:
              - pattern: "(?i)(password|secret|key|token)"
                action: block
                message: "Request blocked: sensitive data detected"
            auditLogging:
              enabled: true
              logLevel: info
              includeHeaders: false
              includeBody: false
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 101
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
      serviceAccountName: claude-gateway-sa
      securityContext:
        fsGroup: 101
---
apiVersion: v1
kind: Service
metadata:
  name: claude-code-gateway
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
spec:
  selector:
    app: claude-gateway
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claude-gateway-netpol
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
spec:
  podSelector:
    matchLabels:
      app: claude-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: flux-system
    - podSelector:
        matchLabels:
          app: ai-cronjob
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443  # HTTPS to Anthropic API
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-gateway-sa
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-gateway-role
  labels:
    app: claude-gateway
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
  resourceNames: ["claude-secrets"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-gateway-binding
  labels:
    app: claude-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-gateway-role
subjects:
- kind: ServiceAccount
  name: claude-gateway-sa
  namespace: control-plane
