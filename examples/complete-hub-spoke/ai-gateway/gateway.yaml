apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: claude-gateway-netpol
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
spec:
  podSelector:
    matchLabels:
      app: claude-gateway
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: flux-system
    - podSelector:
        matchLabels:
          app: ai-cronjob
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: kube-system
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
  - to: []
    ports:
    - protocol: TCP
      port: 443  # HTTPS to Anthropic API
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: claude-gateway-sa
  namespace: control-plane
  labels:
    app: claude-gateway
    component: ai-integration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: claude-gateway-role
  labels:
    app: claude-gateway
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
  resourceNames: ["claude-secrets"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: claude-gateway-binding
  labels:
    app: claude-gateway
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: claude-gateway-role
subjects:
- kind: ServiceAccount
  name: claude-gateway-sa
  namespace: control-plane
