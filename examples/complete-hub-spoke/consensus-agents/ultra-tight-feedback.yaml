# Ultra-Tight Feedback Loop Implementation
# 15-second local optimization loops with distributed consensus

apiVersion: swarm.gitops.io/v1alpha1
kind: UltraTightFeedback
metadata:
  name: infrastructure-optimizers
  namespace: control-plane
  labels:
    app: agent-swarm
    component: ultra-tight-feedback
spec:
  # Ultra-tight feedback configuration
  feedbackInterval: "15s"  # 15-second loops
  localCacheEnabled: true  # No network calls for speed
  consensusTimeout: "30s"  # Fast consensus decisions
  
  # Agent configuration with ultra-tight loops
  agents:
  - name: cost-optimizer
    type: "local-hill-climbing"
    count: 3
    feedbackLoop: "15s"
    strategy: "cache-first"  # Use cached state for speed
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
    
  - name: security-validator
    type: "consensus-validation"
    count: 2
    feedbackLoop: "30s"
    strategy: "reputation-weighted"
    resources:
      requests:
        cpu: "300m"
        memory: "768Mi"
      limits:
        cpu: "750m"
        memory: "1.5Gi"
    
  - name: performance-tuner
    type: "feedback-driven"
    count: 2
    feedbackLoop: "20s"
    strategy: "predictive-caching"
    resources:
      requests:
        cpu: "250m"
        memory: "640Mi"
      limits:
        cpu: "600m"
        memory: "1.2Gi"
  
  # Consensus protocol configuration
  consensus:
    protocol: "raft"
    leaderElectionTimeout: "10s"
    heartbeatInterval: "5s"
    commitTimeout: "15s"
    quorumSize: 3
    decisionThresholds:
      operational: 0.5    # 50% for operational changes
      security: 0.8        # 80% for security changes
      critical: 1.0        # 100% for critical changes
      cost: 0.6          # 60% for cost changes
  
  # Performance optimization
  performance:
    maxDecisionsPerSecond: 1000  # Local decisions per agent
    maxConsensusDecisionsPerMinute: 100  # Consensus decisions across swarm
    targetLatency: "100ms"  # Target consensus latency
    adaptiveFrequency: true  # Adjust frequency based on efficiency
  
  # Fault tolerance
  faultTolerance:
    maxAgentFailures: 2
    byzantineProtection: true
    reputationSystem: true
    automaticRecovery: true
    gracefulDegradation: true
  
  # Monitoring and observability
  monitoring:
    metrics:
      - name: "feedback_loop_duration"
        type: "histogram"
        buckets: [10, 25, 50, 100, 250, 500, 1000, 2500]
      - name: "consensus_latency"
        type: "histogram"
        buckets: [50, 100, 250, 500, 1000, 2500, 5000, 10000]
      - name: "agent_throughput"
        type: "counter"
      - name: "error_rate"
        type: "gauge"
    
    logging:
      level: "info"
      format: "json"
      fields:
        - timestamp
        - agent_id
        - decision_type
        - consensus_result
        - feedback_loop_duration
        - error_details
  
  # Security configuration
  security:
    networkPolicy:
      enabled: true
      ingressRules:
        - from: ["app=agent-swarm"]
          ports: [8080]
      egressRules:
        - to: ["app=agent-swarm"]
          ports: [8080]
        - to: []  # Cloud API access
          ports: [443, 53]
    
    podSecurityPolicy:
      enabled: true
      runAsNonRoot: true
      readOnlyRootFilesystem: false
      capabilities:
        drop: ["ALL"]
  
  # Integration with GitOps
  gitops:
    fluxIntegration:
      enabled: true
      kustomizationName: "ultra-tight-feedback"
      dependsOn:
        - name: "infrastructure-network"
        - name: "infrastructure-clusters"
      interval: "15s"  # Match feedback loop interval
      healthChecks:
        - apiVersion: "v1"
          kind: "Service"
          name: "consensus-leader"
          namespace: "control-plane"
    
    repository:
      path: "./examples/complete-hub-spoke/consensus-agents"
      postBuild:
        substitute:
          ULTRA_TIGHT_FEEDBACK: "true"
          FEEDBACK_INTERVAL: "15s"
          CONSENSUS_PROTOCOL: "raft"
          BYZANTINE_PROTECTION: "enabled"
          ADAPTIVE_FREQUENCY: "true"
