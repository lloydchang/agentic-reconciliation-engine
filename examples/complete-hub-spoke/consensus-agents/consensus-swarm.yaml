# Consensus-Based Agent Swarm for GitOps Infra Control Plane
# This file demonstrates self-organizing agent swarms using distributed consensus

apiVersion: swarm.gitops.io/v1alpha1
kind: AgentSwarm
metadata:
  name: infrastructure-optimizers
  namespace: control-plane
  labels:
    app: agent-swarm
    type: consensus-based
spec:
  consensusProtocol: "raft"
  agents:
  - type: cost-optimizer
    count: 3
    strategy: "local-hill-climbing"
    feedbackLoop: "30s"
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"
  - type: security-validator
    count: 2
    strategy: "consensus-validation"
    feedbackLoop: "60s"
    resources:
      requests:
        cpu: "300m"
        memory: "768Mi"
      limits:
        cpu: "750m"
        memory: "1.5Gi"
  - type: performance-tuner
    count: 2
    strategy: "feedback-driven"
    feedbackLoop: "45s"
    resources:
      requests:
        cpu: "250m"
        memory: "640Mi"
      limits:
        cpu: "600m"
        memory: "1.2Gi"
  communication:
    protocol: "raft-based"
    heartbeat: "10s"
    consensusTimeout: "30s"
    leaderElectionTimeout: "15s"
  faultTolerance:
    maxAgentFailures: 2
    minQuorumSize: 3
    autoRecovery: true
    gracefulDegradation: true
---
# Agent Consensus Configuration
apiVersion: consensus.gitops.io/v1alpha1
kind: AgentConsensusConfig
metadata:
  name: infrastructure-consensus
  namespace: control-plane
spec:
  protocol: "raft"
  agents:
  - name: "cost-optimizer"
    voteWeight: 1
    expertise: ["cost", "efficiency", "scaling"]
    decisionScope: ["operational", "cost"]
  - name: "security-validator"
    voteWeight: 2  # Higher weight for security decisions
    expertise: ["security", "compliance", "policy"]
    decisionScope: ["security", "compliance", "critical"]
  - name: "performance-tuner"
    voteWeight: 1
    expertise: ["performance", "reliability", "optimization"]
    decisionScope: ["operational", "performance"]
  decisionThresholds:
    operational: 0.5    # 50% for operational changes
    security: 0.8        # 80% for security changes
    critical: 1.0        # 100% for critical changes
    cost: 0.6           # 60% for cost changes
  consensusTimeout: "30s"
  leaderLeaseDuration: "60s"
---
# Self-Organizing Agent Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-swarm-leader
  namespace: control-plane
  labels:
    app: agent-swarm
    role: leader
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-swarm
      role: leader
  template:
    metadata:
      labels:
        app: agent-swarm
        role: leader
    spec:
      serviceAccountName: agent-swarm-sa
      containers:
      - name: consensus-leader
        image: gitops-control-plane/consensus-agent:latest
        env:
        - name: AGENT_ROLE
          value: "leader"
        - name: CONSENSUS_PROTOCOL
          value: "raft"
        - name: HEARTBEAT_INTERVAL
          value: "10s"
        - name: FEEDBACK_LOOP_INTERVAL
          value: "30s"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: "300m"
            memory: "768Mi"
          limits:
            cpu: "750m"
            memory: "1.5Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
# Agent Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-swarm-workers
  namespace: control-plane
  labels:
    app: agent-swarm
    role: worker
spec:
  replicas: 6  # 3 cost-optimizers + 2 security-validators + 1 performance-tuner
  selector:
    matchLabels:
      app: agent-swarm
      role: worker
  template:
    metadata:
      labels:
        app: agent-swarm
        role: worker
    spec:
      serviceAccountName: agent-swarm-sa
      containers:
      - name: agent-worker
        image: gitops-control-plane/consensus-agent:latest
        env:
        - name: AGENT_ROLE
          value: "worker"
        - name: CONSENSUS_PROTOCOL
          value: "raft"
        - name: LEADER_ENDPOINT
          value: "agent-swarm-leader.control-plane.svc.cluster.local:8080"
        - name: AGENT_TYPE
          valueFrom:
            fieldRef:
              fieldPath: metadata.labels['agent-type']
        - name: FEEDBACK_LOOP_INTERVAL
          value: "30s"
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
---
# Agent Swarm Service
apiVersion: v1
kind: Service
metadata:
  name: agent-swarm-leader
  namespace: control-plane
  labels:
    app: agent-swarm
spec:
  selector:
    app: agent-swarm
    role: leader
  ports:
  - name: consensus
    port: 8080
    targetPort: 8080
    protocol: TCP
  type: ClusterIP
---
# Agent Swarm Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-swarm-sa
  namespace: control-plane
---
# Agent Swarm RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: agent-swarm-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: ["consensus.gitops.io"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: agent-swarm-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: agent-swarm-role
subjects:
- kind: ServiceAccount
  name: agent-swarm-sa
  namespace: control-plane
---
# Agent Swarm Network Policy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-swarm-netpol
  namespace: control-plane
spec:
  podSelector:
    matchLabels:
      app: agent-swarm
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: agent-swarm
    ports:
    - protocol: TCP
      port: 8080  # Consensus protocol
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: agent-swarm
    ports:
    - protocol: TCP
      port: 8080  # Consensus protocol
  - to: []  # Allow all egress for cloud API access
---
# Agent Swarm Monitoring
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: agent-swarm-metrics
  namespace: control-plane
  labels:
    app: agent-swarm
spec:
  selector:
    matchLabels:
      app: agent-swarm
  endpoints:
  - port: metrics
    interval: "30s"
    path: "/metrics"
---
# Agent Swarm ConfigMap for Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-swarm-config
  namespace: control-plane
data:
  config.yaml: |
    swarm:
      consensusProtocol: "raft"
      heartbeatInterval: "10s"
      consensusTimeout: "30s"
      leaderElectionTimeout: "15s"
      maxAgentFailures: 2
      minQuorumSize: 3
    
    agents:
      cost-optimizer:
        voteWeight: 1
        feedbackLoop: "30s"
        strategy: "local-hill-climbing"
        expertise: ["cost", "efficiency", "scaling"]
      
      security-validator:
        voteWeight: 2
        feedbackLoop: "60s"
        strategy: "consensus-validation"
        expertise: ["security", "compliance", "policy"]
      
      performance-tuner:
        voteWeight: 1
        feedbackLoop: "45s"
        strategy: "feedback-driven"
        expertise: ["performance", "reliability", "optimization"]
    
    decisionThresholds:
      operational: 0.5
      security: 0.8
      critical: 1.0
      cost: 0.6
    
    feedbackLoops:
      micro: "30s"    # Local optimization
      meso: "5m"      # Agent consensus
      macro: "1h"      # Global optimization
