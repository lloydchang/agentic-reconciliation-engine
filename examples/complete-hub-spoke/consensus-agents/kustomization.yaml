# Kustomization for Consensus-Based Agent Swarm
# Integrates with Flux dependsOn for proper deployment sequencing

apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: consensus-agents
  namespace: flux-system
  labels:
    app.kubernetes.io/name: consensus-agents
    app.kubernetes.io/component: agents
spec:
  dependsOn:
  - name: infrastructure-network
  - name: infrastructure-clusters
  interval: 1m  # Tight feedback loop for agent configuration
  retryInterval: 30s
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: infrastructure-repo
  path: ./examples/complete-hub-spoke/consensus-agents
  prune: true
  wait: true
  postBuild:
    substitute:
      CONSENSUS_REQUIRED: "true"
      AGENT_QUORUM: "3"
      FEEDBACK_LOOP_INTERVAL: "30s"
      CONSENSUS_PROTOCOL: "raft"
      FAULT_TOLERANCE: "2"
    substituteFrom:
      - kind: ConfigMap
        name: agent-swarm-config
        optional: true
  healthChecks:
    - apiVersion: v1
      kind: Service
      name: agent-swarm-leader
      namespace: control-plane
  patches:
  - patch: |
      - op: add
        path: /metadata/annotations/fluxcd.io~1automated
        value: "true"
    target:
      kind: Deployment
      name: agent-swarm-leader
  - patch: |
      - op: add
        path: /metadata/annotations/fluxcd.io~1automated
        value: "true"
    target:
      kind: Deployment
      name: agent-swarm-workers
---
# Monitoring Kustomization for Agent Swarm
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: agent-swarm-monitoring
  namespace: flux-system
  labels:
    app.kubernetes.io/name: agent-swarm-monitoring
    app.kubernetes.io/component: monitoring
spec:
  dependsOn:
  - name: consensus-agents
  interval: 5m
  retryInterval: 30s
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: infrastructure-repo
  path: ./infrastructure/monitoring
  prune: true
  wait: true
  postBuild:
    substitute:
      MONITORING_TARGET: "agent-swarm"
      METRICS_PATH: "/metrics"
      SCRAPE_INTERVAL: "30s"
