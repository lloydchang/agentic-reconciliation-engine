---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: burst-workload
  namespace: default
  labels:
    app: burst-workload
    demo: karpenter
spec:
  replicas: 1  # Start with 1 replica, scale up to trigger burst
  selector:
    matchLabels:
      app: burst-workload
  template:
    metadata:
      labels:
        app: burst-workload
        demo: karpenter
    spec:
      containers:
      - name: burst-container
        image: nginx:alpine
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
      nodeSelector:
        kubernetes.io/os: linux
      tolerations:
      - key: "karpenter"
        operator: "Exists"
        effect: "NoSchedule"
---
# HorizontalPodAutoscaler to simulate burst scaling
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: burst-workload-hpa
  namespace: default
  labels:
    app: burst-workload
    demo: karpenter
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: burst-workload
  minReplicas: 1
  maxReplicas: 50
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      selectPolicy: Min
---
# Load Generator to trigger burst behavior
apiVersion: batch/v1
kind: Job
metadata:
  name: load-generator
  namespace: default
  labels:
    app: load-generator
    demo: karpenter
spec:
  template:
    spec:
      containers:
      - name: load-generator
        image: httpd:alpine
        command: ["/bin/sh"]
        args:
        - -c
        - |
          # Install curl and generate load
          apk add --no-cache curl
          
          # Gradually increase load over 5 minutes
          for i in {1..10}; do
            echo "Load level $i/10"
            curl -s http://burst-workload-service.default.svc.cluster.local/ &
            sleep 30
          done
          
          # High load burst
          echo "Starting high load burst..."
          for i in {1..20}; do
            curl -s http://burst-workload-service.default.svc.cluster.local/ &
          done
          
          wait
          echo "Load test completed"
      resources:
        requests:
          cpu: "100m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"
      restartPolicy: OnFailure
      nodeSelector:
        kubernetes.io/os: linux
