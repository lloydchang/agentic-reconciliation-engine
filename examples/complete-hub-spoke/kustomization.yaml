# Complete Hub-Spoke Example: When and How to Use

# ⚠️  CRITICAL: Problem-Solution Fit Assessment Required

# Before deploying this example, ensure you have:
# 1. Clearly defined infrastructure problems
# 2. Confirmed this complexity level is necessary
# 3. Team skills to implement and maintain
# 4. Measurable success criteria

# See docs/PROBLEM-SOLUTION-FIT.md for complete assessment framework

# Strategic Architecture: Flux + Temporal + Consensus Hybrid Approach
# This configuration deploys the complete hub-spoke example with consensus-based agent orchestration
# ⚠️  WARNING: Advanced pattern for large-scale, complex environments only
# For simpler scenarios, see examples/template-multi-cloud/ or use basic Flux patterns

# Problem Context:
# - BEST: Multi-cloud enterprise with coordination challenges
# - MAYBE: Large single-cloud with high operational overhead  
# - AVOID: Small teams, simple applications, greenfield projects

# North Star: Definitive reference implementation for autonomous infrastructure management
# Current Status: Production-ready hub-spoke deployment with AI integration
# Strategic Plan: See docs/STRATEGIC-ARCHITECTURE.md

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: complete-hub-spoke-with-consensus-ai
  namespace: flux-system
resources:
  # Core Flux and controllers (same as base)
  - name: ../../control-plane/
    dependsOn:
      - flux-system
  # AI Integration components
  # - ai-gateway/  # Optional: comment out for local LLM setups
  - name: ai-cronjobs/
    dependsOn:
      - ../../control-plane/
  - name: ai-validation/
    dependsOn:
      - ../../control-plane/
  # Consensus-based agent swarms
  - name: agent-workflows/
    dependsOn:
      - ai-cronjobs
      - ai-validation
dependsOn:
  - gitops-infra-control-plane
labels:
  - pairs:
      managed-by: flux
      component: complete-hub-spoke-with-consensus-ai
      platform: multi-cluster-gitops
      ai-enhanced: "true"
      consensus-orchestration: "true"
      variant: enterprise
# Deployment mode configuration
configMapGenerator:
- name: ai-deployment-config
  literals:
  - GATEWAY_MODE=gateway  # Options: gateway, direct, local
  - CLAUDE_BASE_URL=http://claude-code-gateway.control-plane.svc.cluster.local:80
  - CONSENSUS_ENABLED=true
  - FEEDBACK_LOOP_INTERVAL=30s
  - AGENT_SWARM_MODE=distributed
- name: consensus-config
  literals:
  - CONSENSUS_PROTOCOL=raft
  - AGENT_QUORUM=3
  - DECISION_THRESHOLD_OPERATIONAL=0.5
  - DECISION_THRESHOLD_SECURITY=0.8
  - DECISION_THRESHOLD_CRITICAL=1.0
  - HEARTBEAT_INTERVAL=10s
  - CONSENSUS_TIMEOUT=30s
