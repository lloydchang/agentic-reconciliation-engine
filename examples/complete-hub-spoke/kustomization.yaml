apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: complete-hub-spoke-with-ai
  namespace: flux-system
resources:
  # Core Flux and controllers (same as base)
  - ../../control-plane/
  # AI Integration components
  - ai-gateway/
  - ai-cronjobs/
  - ai-validation/
labels:
  - pairs:
      managed-by: flux
      component: complete-hub-spoke-with-ai
      platform: multi-cluster-gitops
      ai-enhanced: "true"
