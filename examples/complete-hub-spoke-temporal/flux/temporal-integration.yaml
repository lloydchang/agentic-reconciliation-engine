apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: temporal-integration
  namespace: flux-system
spec:
  interval: 10m0s
  path: ./examples/complete-hub-spoke-temporal
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
---
apiVersion: source.toolkit.fluxcd.io/v1beta2
kind: GitRepository
metadata:
  name: temporal-workflows
  namespace: flux-system
spec:
  interval: 10m0s
  url: https://github.com/lloydchang/gitops-infra-control-plane
  ref:
    branch: main
  ignore: |
    # exclude all but temporal workflows
    /*
    !/examples/complete-hub-spoke-temporal/
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: temporal-infrastructure
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
  - name: control-plane-infrastructure
  - name: monitoring-infrastructure
  path: ./examples/complete-hub-spoke-temporal/infra
  prune: true
  sourceRef:
    kind: GitRepository
    name: temporal-workflows
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: temporal-workflows
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
  - name: temporal-infrastructure
  path: ./examples/complete-hub-spoke-temporal/workflows
  prune: true
  sourceRef:
    kind: GitRepository
    name: temporal-workflows
---
apiVersion: kustomize.toolkit.fluxcd.io/v1beta2
kind: Kustomization
metadata:
  name: temporal-activities
  namespace: flux-system
spec:
  interval: 10m0s
  dependsOn:
  - name: temporal-workflows
  path: ./examples/complete-hub-spoke-temporal/activities
  prune: true
  sourceRef:
    kind: GitRepository
    name: temporal-workflows
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: temporal
  namespace: temporal
spec:
  interval: 10m0s
  dependsOn:
  - name: temporal-infrastructure
  chart:
    spec:
      chart: temporal
      version: "0.29.0"
      sourceRef:
        kind: HelmRepository
        name: temporal
  values:
    server:
      enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 1000m
          memory: 2Gi
    frontend:
      enabled: true
      replicaCount: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 200m
          memory: 512Mi
    worker:
      replicaCount: 3
      resources:
        requests:
          cpu: 300m
          memory: 512Mi
        limits:
          cpu: 600m
          memory: 1Gi
    admintools:
      enabled: true
      replicaCount: 1
    prometheus:
      enabled: true
    elasticsearch:
      enabled: false
    grafana:
      enabled: false
---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRepository
metadata:
  name: temporal
  namespace: flux-system
spec:
  interval: 10m0s
  url: https://temporalio.github.io/helm-charts
