# Temporal Security and RBAC Configuration for GitOps Infra Control Plane
# This file defines security policies, network policies, and access controls
# for Temporal workflows and AI agents in the control plane

---
apiVersion: v1
kind: Namespace
metadata:
  name: temporal
  labels:
    name: temporal
    security-level: "high"
  annotations:
    description: "Temporal workflow engine namespace with enhanced security controls"
---
apiVersion: v1
kind: Secret
metadata:
  name: temporal-secrets
  namespace: temporal
  labels:
    app: temporal
    security-level: "critical"
type: Opaque
data:
  # Base64 encoded values (replace with actual encoded values)
  postgres-user: cG9zdGdydXNlcg==  # postgres
  postgres-password: cG9zdGdyXN3cmQ=  # postgres:base64
  postgres-db: dGVtcG9yYWw=  # temporal:base64
  jwt-signing-key: <BASE64_JWT_SIGNING_KEY>
  encryption-key: <BASE64_ENCRYPTION_KEY>
---
apiVersion: v1
kind: Secret
metadata:
  name: ai-secrets
  namespace: temporal
  labels:
    app: temporal
    security-level: "critical"
type: Opaque
data:
  # AI Provider API Keys (replace with actual encoded values)
  anthropic-api-key: <BASE64_ANTHROPIC_API_KEY>
  openai-api-key: <BASE64_OPENAI_API_KEY>
---
apiVersion: v1
kind: Secret
metadata:
  name: cloud-secrets
  namespace: temporal
  labels:
    app: temporal
    security-level: "critical"
type: Opaque
data:
  # Cloud Provider Credentials (replace with actual encoded values)
  aws-access-key-id: <BASE64_AWS_ACCESS_KEY_ID>
  aws-secret-access-key: <BASE64_AWS_SECRET_ACCESS_KEY>
  azure-client-id: <BASE64_AZURE_CLIENT_ID>
  azure-client-secret: <BASE64_AZURE_CLIENT_SECRET>
  gcp-service-account-key: <BASE64_GCP_SERVICE_ACCOUNT_KEY>
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: temporal-worker-sa
  namespace: temporal
  labels:
    app: temporal
    security-level: "high"
  annotations:
    description: "Service account for Temporal workers with principle of least privilege"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: temporal-worker-role
  labels:
    app: temporal
    security-level: "high"
rules:
# Infrastructure Management Permissions
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets", "persistentvolumes", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["pods", "services", "configmaps"]
  verbs: ["create", "update", "patch", "delete"]
  resourceNames: ["temporal-*"]  # Can only modify temporal resources
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["create", "update", "patch", "delete"]
  resourceNames: ["temporal-*"]  # Can only modify temporal deployments
# Workflow and Job Management
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  resourceNames: ["temporal-*"]
# Network Management
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies"]
  verbs: ["create", "update", "patch", "delete"]
  resourceNames: ["temporal-*"]
# Monitoring and Observability
- apiGroups: ["monitoring.coreos.com"]
  resources: ["servicemonitors", "prometheusrules"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  resourceNames: ["temporal-*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: temporal-worker-binding
  labels:
    app: temporal
    security-level: "high"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: temporal-worker-role
subjects:
- kind: ServiceAccount
  name: temporal-worker-sa
  namespace: temporal
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: temporal-ingress-policy
  namespace: temporal
  labels:
    app: temporal
    security-level: "high"
spec:
  podSelector:
    matchLabels:
      app: temporal-worker
  policyTypes:
  - Ingress
  ingress:
  # Allow communication with control plane components
  - from:
    - namespaceSelector:
        matchLabels:
          name: control-plane
    - namespaceSelector:
        matchLabels:
          name: flux-system
    ports:
    - protocol: TCP
      port: 7233  # Temporal server gRPC
    - protocol: TCP
      port: 7234  # Temporal server HTTP
    - protocol: TCP
      port: 5432  # PostgreSQL
  # Allow communication with monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: temporal-monitoring
    ports:
    - protocol: TCP
      port: 8081  # Worker health endpoints
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: temporal-egress-policy
  namespace: temporal
  labels:
    app: temporal
    security-level: "high"
spec:
  podSelector:
    matchLabels:
      app: temporal-worker
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow communication with cloud provider APIs
  - to: []
    ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 80   # HTTP
  # Allow communication with Temporal server
  - to:
    - namespaceSelector:
        matchLabels:
          name: temporal
    ports:
    - protocol: TCP
      port: 7233
      port: 7234
  # Allow communication with PostgreSQL
  - to:
    - namespaceSelector:
        matchLabels:
          name: temporal
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: policy/v1
kind: PodSecurityPolicy
metadata:
  name: temporal-worker-psp
  labels:
    app: temporal
    security-level: "high"
spec:
  privileged: false
  allowPrivilegeEscalation: false
  requiredDropCapabilities:
    - ALL
  volumes:
    - 'configMap'
    - 'emptyDir'
    - 'projected'
    - 'secret'
    - 'downwardAPI'
    - 'persistentVolumeClaim'
  runAsUser:
    rule: 'MustRunAsNonRoot'
  seLinux:
    rule: 'RunAsAny'
  fsGroup:
    rule: 'RunAsAny'
---
apiVersion: v1
kind: LimitRange
metadata:
  name: temporal-worker-limits
  namespace: temporal
  labels:
    app: temporal
    security-level: "high"
spec:
  limits:
  - default:
      cpu: '1000m'
      memory: '2Gi'
      ephemeral-storage: '4Gi'
    defaultRequest:
      cpu: '100m'
      memory: '128Mi'
      ephemeral-storage: '128Mi'
    type: Container
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: temporal-quota
  namespace: temporal
  labels:
    app: temporal
    security-level: "high"
spec:
  hard:
    cpu: '4'
    memory: '8Gi'
    pods: '10'
    services: '5'
    secrets: '10'
    configmaps: '10'
    persistentvolumeclaims: '5'
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: temporal-workflow-validator
  labels:
    app: temporal
    security-level: "high"
webhooks:
- name: temporal-workflow-validator.example.com
  clientConfig:
    service:
      namespace: temporal
      name: temporal-webhook-service
      path: /validate
  rules:
  - operations: ["CREATE", "UPDATE"]
    apiGroups: ["temporal.io"]
    apiVersions: ["v1alpha1"]
    resources: ["workflows"]
  admissionReviewVersions: ["v1", "v1beta1"]
  sideEffects: None
  failurePolicy: Fail
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-webhook
  namespace: temporal
  labels:
    app: temporal
    security-level: "high"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-webhook
  template:
    metadata:
      labels:
        app: temporal-webhook
    spec:
      serviceAccountName: temporal-webhook-sa
      containers:
      - name: webhook
        image: temporal-webhook-validator:latest
        ports:
        - containerPort: 8443
        volumeMounts:
        - name: webhook-certs
          mountPath: /etc/webhook/certs
          readOnly: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health
            port: 8443
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8443
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: webhook-certs
        secret:
          secretName: temporal-webhook-certs
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: temporal-webhook-sa
  namespace: temporal
  labels:
    app: temporal
    security-level: "high"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: temporal-webhook-role
  labels:
    app: temporal
    security-level: "high"
rules:
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["validatingwebhookconfigurations"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["temporal.io"]
  resources: ["workflows", "workflowexecutions"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: temporal-webhook-binding
  labels:
    app: temporal
    security-level: "high"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: temporal-webhook-role
subjects:
- kind: ServiceAccount
  name: temporal-webhook-sa
  namespace: temporal
---
# Security Context for Temporal Workloads
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-security-context
  namespace: temporal
  labels:
    app: temporal
    security-level: "high"
data:
  security-context.yaml: |
    # Security context configuration for Temporal pods
    securityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 3000
      fsGroup: 3000
      seccompProfile:
        type: RuntimeDefault
      capabilities:
        drop:
        - ALL
        add:
        - NET_BIND_SERVICE
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
      sysctls:
      - name: net.ipv4.ip_unprivileged_port_start
        value: "0"
---
# Audit and Compliance Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-audit-policy
  namespace: temporal
  labels:
    app: temporal
    security-level: "high"
data:
  audit-policy.yaml: |
    # Audit policy for Temporal workflows
    audit:
      enabled: true
      logLevel: "info"
      events:
        - "workflow_started"
        - "workflow_completed"
        - "workflow_failed"
        - "activity_started"
        - "activity_completed"
        - "activity_failed"
        - "decision_made"
        - "consensus_reached"
        - "human_approval_requested"
        - "human_approval_granted"
        - "human_approval_denied"
      retention:
        days: 90
        maxSize: "10GB"
    compliance:
      frameworks:
        - "SOC2"
        - "GDPR"
        - "PCI-DSS"
        - "HIPAA"
      dataClassification:
        - "public"
        - "internal"
        - "confidential"
        - "restricted"
      encryption:
        atRest: true
        inTransit: true
        algorithms: ["AES-256-GCM", "RSA-4096"]
---
# Encryption and Key Management
apiVersion: v1
kind: Secret
metadata:
  name: temporal-encryption-keys
  namespace: temporal
  labels:
    app: temporal
    security-level: "critical"
    type: Opaque
stringData:
  encryption-policy.yaml: |
    encryption:
      provider: "kms"
      keyRotation:
        interval: "90d"
        automatic: true
      keyUsage:
        - "workflow-data"
        - "ai-secrets"
        - "cloud-credentials"
        - "consensus-state"
      accessControl:
        - "principle-of-least-privilege"
        - "need-to-know"
        - "role-based-access"
---
# Monitoring and Alerting Security
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: temporal-security-alerts
  namespace: temporal-monitoring
  labels:
    app: temporal
    security-level: "high"
spec:
  groups:
  - name: temporal-security
    rules:
    - alert: TemporalWorkflowPrivilegeEscalation
      expr: increase(temporal_workflow_privilege_escalation_count[5m]) > 0
      for: 0m
      labels:
        severity: critical
        category: security
        service: temporal
      annotations:
        summary: "Temporal workflow privilege escalation detected"
        description: "Workflow {{ $labels.workflow_id }} attempted privilege escalation {{ $value }} times"
        runbook_url: "https://docs.temporal.io/security/runbooks/privilege-escalation"
    - alert: TemporalSecretAccess
      expr: rate(temporal_secret_access_count[5m]) > 10
      for: 2m
      labels:
        severity: warning
        category: security
        service: temporal
      annotations:
        summary: "High rate of secret access detected"
        description: "Secret access rate is {{ $value }} requests/minute, threshold exceeded"
        runbook_url: "https://docs.temporal.io/security/runbooks/secret-access"
    - alert: TemporalNetworkAnomaly
      expr: rate(temporal_network_anomaly_count[5m]) > 5
      for: 1m
      labels:
        severity: warning
        category: security
        service: temporal
      annotations:
        summary: "Network anomaly detected in Temporal cluster"
        description: "Unusual network activity detected: {{ $value }} anomalies/minute"
        runbook_url: "https://docs.temporal.io/security/runbooks/network-anomaly"
