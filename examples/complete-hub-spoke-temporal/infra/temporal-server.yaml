apiVersion: v1
kind: Namespace
metadata:
  name: temporal
  labels:
    name: temporal
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-config
  namespace: temporal
data:
  default-store: "postgresql"
  visibility: "on"
---
apiVersion: v1
kind: Secret
metadata:
  name: temporal-secrets
  namespace: temporal
type: Opaque
data:
  postgres-user: cG9zdGdydXNlcg== # postgres:base64
  postgres-password: cG9zdGdyXN3cmQ= # postgres:base64
  postgres-db: dGVtcG9yYWw= # temporal:base64
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: temporal-postgres
  namespace: temporal
  labels:
    app: temporal-postgres
spec:
  serviceName: temporal-postgres
  replicas: 1
  selector:
    matchLabels:
      app: temporal-postgres
  template:
    metadata:
      labels:
        app: temporal-postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: postgres-password
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: postgres-db
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 500m
            memory: 1Gi
  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "standard"
      resources:
        requests:
          storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-postgres
  namespace: temporal
  labels:
    app: temporal-postgres
spec:
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: temporal-postgres
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-server
  namespace: temporal
  labels:
    app: temporal-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-server
  template:
    metadata:
      labels:
        app: temporal-server
    spec:
      containers:
      - name: temporal-server
        image: temporalio/server:1.22.0
        ports:
        - containerPort: 7233
          name: grpc
        - containerPort: 7234
          name: http
        env:
        - name: DB
          value: "postgresql"
        - name: DB_PORT
          value: "5432"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: postgres-password
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: temporal-secrets
              key: postgres-db
        - name: POSTGRES_HOST
          value: temporal-postgres.temporal.svc.cluster.local
        - name: TEMPORAL_HISTORY_DEFAULT_NAMESPACE
          value: "default"
        - name: TEMPORAL_HISTORY_DEFAULT_NAMESPACE_ID
          value: "default"
        - name: DYNAMIC_CONFIG_FILE_PATH
          value: "/etc/temporal/config/dynamicconfig.yaml"
        - name: NUM_HISTORY_SHARDS
          value: "4"
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /
            port: 7234
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 7234
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
        volumeMounts:
        - name: config-volume
          mountPath: /etc/temporal/config
      volumes:
      - name: config-volume
        configMap:
          name: temporal-config
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-server
  namespace: temporal
  labels:
    app: temporal-server
spec:
  ports:
  - port: 7233
    targetPort: 7233
    name: grpc
  - port: 7234
    targetPort: 7234
    name: http
  selector:
    app: temporal-server
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-frontend
  namespace: temporal
  labels:
    app: temporal-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-frontend
  template:
    metadata:
      labels:
        app: temporal-frontend
    spec:
      containers:
      - name: temporal-frontend
        image: temporalio/web:1.22.0
        ports:
        - containerPort: 8080
        env:
        - name: TEMPORAL_HOST_PORT
          value: "temporal-server.temporal.svc.cluster.local:7233"
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-frontend
  namespace: temporal
  labels:
    app: temporal-frontend
spec:
  ports:
  - port: 8080
    targetPort: 8080
    name: http
  selector:
    app: temporal-frontend
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-worker
  namespace: temporal
  labels:
    app: temporal-worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: temporal-worker
  template:
    metadata:
      labels:
        app: temporal-worker
    spec:
      serviceAccountName: temporal-worker-sa
      containers:
      - name: temporal-worker
        image: lloydchang/gitops-temporal-worker:latest
        command: ["/app/temporal-worker"]
        env:
        - name: TEMPORAL_HOST_PORT
          value: "temporal-server.temporal.svc.cluster.local:7233"
        - name: TASK_QUEUE
          value: "infrastructure-analysis-tasks"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-secrets
              key: anthropic-api-key
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: cloud-secrets
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: cloud-secrets
              key: aws-secret-access-key
        - name: AZURE_CLIENT_ID
          valueFrom:
            secretKeyRef:
              name: cloud-secrets
              key: azure-client-id
        - name: AZURE_CLIENT_SECRET
          valueFrom:
            secretKeyRef:
              name: cloud-secrets
              key: azure-client-secret
        - name: GCP_SERVICE_ACCOUNT_KEY
          valueFrom:
            secretKeyRef:
              name: cloud-secrets
              key: gcp-service-account-key
        resources:
          requests:
            cpu: 300m
            memory: 512Mi
          limits:
            cpu: 600m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-worker
  namespace: temporal
  labels:
    app: temporal-worker
spec:
  ports:
  - port: 8081
    targetPort: 8081
    name: http
  selector:
    app: temporal-worker
  type: ClusterIP
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: temporal-worker-sa
  namespace: temporal
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: temporal-worker-role
rules:
- apiGroups: [""]
  resources: ["pods", "services", "configmaps", "secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources: ["networkpolicies", "ingresses"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: temporal-worker-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: temporal-worker-role
subjects:
- kind: ServiceAccount
  name: temporal-worker-sa
  namespace: temporal
