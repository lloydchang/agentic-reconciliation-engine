apiVersion: v1
kind: Namespace
metadata:
  name: temporal-monitoring
  labels:
    name: temporal-monitoring
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-grafana-dashboards
  namespace: temporal-monitoring
  labels:
    grafana_dashboard: "1"
data:
  temporal-overview.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Temporal Workflow Overview",
        "tags": ["temporal", "workflows", "gitops"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Workflow Success Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(temporal_workflow_success_count[5m])",
                "legendFormat": "{{__name__}}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "reqps"
              }
            }
          },
          {
            "id": 2,
            "title": "Workflow Execution Time",
            "type": "timeseries",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(temporal_workflow_execution_duration_seconds_bucket[5m]))",
                "legendFormat": "95th percentile"
              },
              {
                "expr": "histogram_quantile(0.50, rate(temporal_workflow_execution_duration_seconds_bucket[5m]))",
                "legendFormat": "50th percentile"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "s"
              }
            }
          },
          {
            "id": 3,
            "title": "Active Workers",
            "type": "stat",
            "targets": [
              {
                "expr": "temporal_worker_active_count",
                "legendFormat": "Active Workers"
              }
            ]
          },
          {
            "id": 4,
            "title": "Activity Success Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(temporal_activity_success_count[5m]) / rate(temporal_activity_attempted_count[5m]) * 100",
                "legendFormat": "Success Rate %"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "max": 100,
                "min": 0
              }
            }
          },
          {
            "id": 5,
            "title": "Pending Workflow Count",
            "type": "stat",
            "targets": [
              {
                "expr": "temporal_workflow_pending_count",
                "legendFormat": "Pending Workflows"
              }
            ]
          },
          {
            "id": 6,
            "title": "AI Agent Decision Accuracy",
            "type": "timeseries",
            "targets": [
              {
                "expr": "temporal_ai_agent_decision_accuracy",
                "legendFormat": "Decision Accuracy"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "percent",
                "max": 100,
                "min": 0
              }
            }
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "5s"
      }
    }
  consensus-metrics.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Consensus Protocol Metrics",
        "tags": ["consensus", "raft", "agents"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Consensus Success Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(consensus_success_count[5m])",
                "legendFormat": "Success Rate"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "reqps"
              }
            }
          },
          {
            "id": 2,
            "title": "Raft Leader Elections",
            "type": "timeseries",
            "targets": [
              {
                "expr": "increase(raft_leader_election_count[5m])",
                "legendFormat": "Leader Elections"
              }
            ]
          },
          {
            "id": 3,
            "title": "Agent Quorum Status",
            "type": "stat",
            "targets": [
              {
                "expr": "agent_quorum_achieved",
                "legendFormat": "Quorum Achieved"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "boolean"
              }
            }
          },
          {
            "id": 4,
            "title": "Consensus Decision Time",
            "type": "timeseries",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, consensus_decision_duration_seconds_bucket[5m]))",
                "legendFormat": "95th percentile"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "s"
              }
            }
          },
          {
            "id": 5,
            "title": "Agent Communication Latency",
            "type": "timeseries",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, agent_communication_latency_seconds_bucket[5m]))",
                "legendFormat": "95th percentile"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "unit": "s"
              }
            }
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "5s"
      }
    }
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: temporal-server-metrics
  namespace: temporal
  labels:
    app: temporal-server
spec:
  selector:
    matchLabels:
      app: temporal-server
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: temporal-worker-metrics
  namespace: temporal
  labels:
    app: temporal-worker
spec:
  selector:
    matchLabels:
      app: temporal-worker
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: consensus-agent-metrics
  namespace: temporal
  labels:
    app: consensus-agent-worker
spec:
  selector:
    matchLabels:
      app: consensus-agent-worker
  endpoints:
  - port: 8300
    path: /metrics
    interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: temporal-alerts
  namespace: temporal-monitoring
  labels:
    app: temporal-monitoring
spec:
  groups:
  - name: temporal-workflow-alerts
    rules:
    - alert: HighWorkflowFailureRate
      expr: rate(temporal_workflow_failed_count[5m]) / rate(temporal_workflow_completed_count[5m]) > 0.1
      for: 2m
      labels:
        severity: warning
        service: temporal
        type: workflow
      annotations:
        summary: "High workflow failure rate detected"
        description: "Workflow failure rate is {{ $value | humanizePercentage }} over the last 5 minutes"
    - alert: WorkflowExecutionTimeout
      expr: temporal_workflow_execution_time_seconds > 300
      for: 1m
      labels:
        severity: critical
        service: temporal
        type: workflow
      annotations:
        summary: "Workflow execution timeout"
        description: "Workflow {{ $labels.workflow_type }} has been running for more than 5 minutes"
    - alert: WorkerResourceExhaustion
      expr: temporal_worker_cpu_usage > 0.9 or temporal_worker_memory_usage > 0.9
      for: 3m
      labels:
        severity: warning
        service: temporal
        type: resource
      annotations:
        summary: "Worker resource exhaustion"
        description: "Worker {{ $labels.worker_id }} is experiencing resource exhaustion: CPU {{ $value.cpu }}%, Memory {{ $value.memory }}%"
    - alert: ConsensusFailure
      expr: increase(consensus_failed_count[5m]) > 0
      for: 1m
      labels:
        severity: critical
        service: consensus
        type: consensus
      annotations:
        summary: "Consensus protocol failure"
        description: "Consensus decision failed {{ $value }} times in the last 5 minutes"
    - alert: AgentQuorumLost
      expr: agent_quorum_achieved == 0
      for: 2m
      labels:
        severity: critical
        service: consensus
        type: quorum
      annotations:
        summary: "Agent quorum lost"
        description: "Agent swarm has lost quorum and cannot make decisions"
    - alert: AIAgentHighErrorRate
      expr: rate(ai_agent_error_count[5m]) > 0.05
      for: 3m
      labels:
        severity: warning
        service: ai-agents
        type: ai
      annotations:
        summary: "AI agent high error rate"
        description: "AI agents are experiencing high error rate: {{ $value | humanizePercentage }}"
    - alert: MultiCloudAIFailure
      expr: multi_cloud_operation_success_rate < 0.8
      for: 2m
      labels:
        severity: warning
        service: multi-cloud
        type: Cloud AI
      annotations:
        summary: "Multi-cloud Cloud AI failure rate"
        description: "Multi-cloud AI are failing at rate {{ $value | humanizePercentage }}"
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: temporal-frontend-metrics
  namespace: temporal
  labels:
    app: temporal-frontend
spec:
  selector:
    matchLabels:
      app: temporal-frontend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: temporal-server-pdb
  namespace: temporal
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: temporal-server
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: temporal-worker-pdb
  namespace: temporal
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: temporal-worker
---
apiVersion: v1
kind: Secret
metadata:
  name: temporal-grafana-secrets
  namespace: temporal-monitoring
type: Opaque
data:
  GF_SECURITY_ADMIN_USER: YWRtaW4= # admin:base64
  GF_SECURITY_ADMIN_PASSWORD: YWRtaW4xMjM= # admin:base64
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: temporal-monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
      - name: grafana
        image: grafana/grafana:10.2.0
        ports:
        - containerPort: 3000
        env:
        - name: GF_SECURITY_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: temporal-grafana-secrets
              key: GF_SECURITY_ADMIN_USER
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: temporal-grafana-secrets
              key: GF_SECURITY_ADMIN_PASSWORD
        - name: GF_INSTALL_PLUGINS
          value: "grafana-piechart-panel"
        - name: GF_PATHS_PROVISIONING
          value: /etc/grafana/provisioning
        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-config
          mountPath: /etc/grafana/provisioning
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 200m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-pvc
      - name: grafana-config
        configMap:
          name: temporal-grafana-dashboards
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: temporal-monitoring
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: "standard"
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: temporal-monitoring
  labels:
    app: grafana
spec:
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  selector:
    app: grafana
  type: ClusterIP
