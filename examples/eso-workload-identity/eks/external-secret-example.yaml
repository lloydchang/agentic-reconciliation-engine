# Spoke team writes this. References aws-secrets-manager ClusterSecretStore.
# Secret path in AWS SM: prod/my-service (with keys: username, password)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: my-service-credentials
  namespace: my-namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: my-service-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: prod/my-service
        property: username
    - secretKey: password
      remoteRef:
        key: prod/my-service
        property: password
