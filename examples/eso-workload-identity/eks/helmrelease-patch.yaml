# Patch applied by Flux to the ESO HelmRelease for EKS spokes.
# Replace ACCOUNT and ROLE_NAME with the actual IAM role ARN.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  values:
    serviceAccount:
      annotations:
        eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/ROLE_NAME
