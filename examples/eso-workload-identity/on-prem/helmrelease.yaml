# ESO HelmRelease for on-prem Kubeadm spokes.
# No workload identity annotation needed — Vault Kubernetes auth uses the
# service account JWT directly.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
  namespace: external-secrets
spec:
  interval: 1h
  chart:
    spec:
      chart: external-secrets
      version: ">=0.9.0 <1.0.0"
      sourceRef:
        kind: HelmRepository
        name: external-secrets
        namespace: flux-system
  values:
    webhook:
      create: true
    certController:
      create: true
