# Spoke team writes this. References azure-key-vault ClusterSecretStore.
# Secrets are stored individually in AKV: secret name = my-service-username, my-service-password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: my-service-credentials
  namespace: my-namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: azure-key-vault
    kind: ClusterSecretStore
  target:
    name: my-service-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: my-service-username
    - secretKey: password
      remoteRef:
        key: my-service-password
