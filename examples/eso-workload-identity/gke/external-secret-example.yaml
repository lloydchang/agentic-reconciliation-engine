# Spoke team writes this. References gcp-secret-manager ClusterSecretStore.
# Secrets stored in GCP SM as individual secrets: my-service-username, my-service-password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: my-service-credentials
  namespace: my-namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: my-service-credentials
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: my-service-username
        version: latest
    - secretKey: password
      remoteRef:
        key: my-service-password
        version: latest
