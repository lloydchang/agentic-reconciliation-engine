# Consensus Metrics Collection
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: consensus-metrics
  namespace: control-plane
  labels:
    app: consensus-controller
    component: monitoring
    release: prometheus
spec:
  selector:
    matchLabels:
      app: consensus-controller
  endpoints:
  - port: metrics
    interval: "30s"  # Match micro-loop timing
    path: "/metrics"
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [agent_type, feedback_loop, decision_scope]
    - targetLabel: agent
    - regex:
        sourceLabels: [__meta_kubernetes_pod_label_(.+)]
        targetLabel: $1
  - port: metrics
    interval: "5m"    # Match meso-loop timing
    path: "/consensus-metrics"
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [consensus_round, vote_weight, decision_threshold]
    - targetLabel: consensus
  - port: metrics
    interval: "1h"    # Match macro-loop timing
    path: "/swarm-metrics"
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [swarm_size, optimization_target, coordination_method]
    - targetLabel: swarm
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: swarm-metrics
  namespace: control-plane
  labels:
    app: swarm-controller
    component: monitoring
    release: prometheus
spec:
  selector:
    matchLabels:
      app: swarm-controller
  endpoints:
  - port: metrics
    interval: "30s"
    path: "/metrics"
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [agent_type, strategy, feedback_loop]
    - targetLabel: agent
    - regex:
        sourceLabels: [__meta_kubernetes_pod_label_(.+)]
        targetLabel: $1
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: consensus-alerts
  namespace: control-plane
  labels:
    app: consensus-monitoring
    component: alerting
spec:
  groups:
  - name: consensus-health
    rules:
    - alert: ConsensusHighLatency
      expr: histogram_quantile(0.95, rate(consensus_request_duration_seconds_bucket[5m])) > 30
      for: 2m
      labels:
        severity: warning
        component: consensus
      annotations:
        summary: "Consensus latency is high"
        description: "95th percentile of consensus request duration is {{ $value }}s"
    - alert: ConsensusTimeout
      expr: increase(consensus_timeouts_total[5m]) > 5
      for: 1m
      labels:
        severity: critical
        component: consensus
      annotations:
        summary: "Consensus timeouts increasing"
        description: "Consensus timeouts have increased {{ $value }} times in the last 5 minutes"
    - alert: ConsensusSplitBrain
      expr: consensus_leader_elections_total > 3
      for: 5m
      labels:
        severity: critical
        component: consensus
      annotations:
        summary: "Consensus leader elections detected"
        description: "Multiple consensus leader elections detected, possible split brain"
  - name: swarm-health
    rules:
    - alert: SwarmAgentDown
      expr: up{job="swarm-agents"} == 0
      for: 1m
      labels:
        severity: critical
        component: swarm
      annotations:
        summary: "Swarm agent is down"
        description: "Swarm agent {{ $labels.agent }} has been down for more than 1 minute"
    - alert: SwarmHighResourceUsage
      expr: container_memory_usage_bytes / container_spec_memory_limit_bytes > 0.9
      for: 5m
      labels:
        severity: warning
        component: swarm
      annotations:
        summary: "Swarm agent high memory usage"
        description: "Swarm agent {{ $labels.agent }} memory usage is {{ $value | humanizePercentage }}"
    - alert: SwarmLowOptimization
      expr: rate(swarm_optimizations_total[10m]) < 0.1
      for: 15m
      labels:
        severity: warning
        component: swarm
      annotations:
        summary: "Low swarm optimization rate"
        description: "Swarm optimization rate is {{ $value }} optimizations per second"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: consensus-grafana-dashboard
  namespace: control-plane
  labels:
    grafana_dashboard: "1"
data:
  consensus-dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Consensus Agent Orchestration",
        "tags": ["consensus", "swarm", "agents"],
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Consensus Latency",
            "type": "graph",
            "targets": [
              {
                "expr": "histogram_quantile(0.95, rate(consensus_request_duration_seconds_bucket[5m]))",
                "legendFormat": "95th percentile"
              },
              {
                "expr": "histogram_quantile(0.50, rate(consensus_request_duration_seconds_bucket[5m]))",
                "legendFormat": "50th percentile"
              }
            ],
            "yAxes": [
              {
                "label": "Seconds",
                "min": 0
              }
            ]
          },
          {
            "id": 2,
            "title": "Consensus Success Rate",
            "type": "stat",
            "targets": [
              {
                "expr": "rate(consensus_requests_total[5m])",
                "legendFormat": "Requests/sec"
              },
              {
                "expr": "rate(consensus_success_total[5m]) / rate(consensus_requests_total[5m])",
                "legendFormat": "Success Rate"
              }
            ]
          },
          {
            "id": 3,
            "title": "Swarm Agent Status",
            "type": "table",
            "targets": [
              {
                "expr": "up{job=\"swarm-agents\"}",
                "legendFormat": "{{agent}} - {{value}}"
              }
            ],
            "transformations": [
              {
                "id": "organize",
                "options": {
                  "excludeByName": {
                    "picture": true
                  }
                },
                "type": "organize"
              }
            ]
          },
          {
            "id": 4,
            "title": "Optimization Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(swarm_optimizations_total[10m])",
                "legendFormat": "Optimizations/sec"
              }
            ]
          },
          {
            "id": 5,
            "title": "Agent Resource Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "container_memory_usage_bytes / container_spec_memory_limit_bytes",
                "legendFormat": "Memory Usage"
              },
              {
                "expr": "rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_limit",
                "legendFormat": "CPU Usage"
              }
            ]
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }
