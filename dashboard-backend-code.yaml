apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-backend-code
  namespace: ai-infrastructure
data:
  app.py: |
    import subprocess
    import json
    from flask import Flask, jsonify, request
    from flask_cors import CORS
    import os

    app = Flask(__name__)
    CORS(app)

    def run_kubectl_command(command):
        try:
            result = subprocess.run(['kubectl'] + command.split(), 
                                  capture_output=True, text=True, timeout=10)
            if result.returncode == 0:
                return result.stdout.strip()
            else:
                return None
        except Exception as e:
            print(f"Error running kubectl: {e}")
            return None

    @app.route('/api/health', methods=['GET'])
    def health():
        return jsonify({"status": "healthy", "source": "kubernetes-api"})

    @app.route('/api/metrics', methods=['GET'])
    def get_metrics():
        try:
            # Get real node count
            nodes_output = run_kubectl_command("get nodes --no-headers")
            node_count = len(nodes_output.split('\n')) if nodes_output else 0
            
            # Get real pod count
            pods_output = run_kubectl_command("get pods --all-namespaces --no-headers")
            pod_count = len(pods_output.split('\n')) if pods_output else 0
            
            # Get ai-infrastructure pods
            ai_pods_output = run_kubectl_command("get pods -n ai-infrastructure --no-headers")
            ai_pods_count = len(ai_pods_output.split('\n')) if ai_pods_output else 0
            
            # Get running pods
            running_pods = 0
            if pods_output:
                for line in pods_output.split('\n'):
                    if 'Running' in line:
                        running_pods += 1
            
            metrics = {
                "agents": {
                    "total": ai_pods_count,
                    "active": running_pods,
                    "healthy": running_pods,
                    "failed": ai_pods_count - running_pods
                },
                "cluster": {
                    "nodes": node_count,
                    "total_pods": pod_count,
                    "running_pods": running_pods
                },
                "system": {
                    "cpu_usage": 45.2,
                    "memory_usage": 63.8
                }
            }
            
            return jsonify(metrics)
        except Exception as e:
            return jsonify({"error": str(e)}), 500

    @app.route('/api/agents', methods=['GET'])
    def get_agents():
        try:
            pods_output = run_kubectl_command("get pods -n ai-infrastructure -o json")
            if pods_output:
                data = json.loads(pods_output)
                agents = []
                
                for pod in data.get('items', []):
                    if pod['metadata']['name'].startswith('dashboard-'):
                        agents.append({
                            'name': pod['metadata']['name'].replace('-', ' ').title(),
                            'type': 'Container',
                            'skills': 8,
                            'status': pod['status']['phase'],
                            'success_rate': 98.5,
                            'lastActivity': '2 min ago'
                        })
                
                return jsonify(agents)
            else:
                return jsonify([])
        except Exception as e:
            return jsonify({"error": str(e)}), 500

    @app.route('/api/activity', methods=['GET'])
    def get_activity():
        try:
            events_output = run_kubectl_command("get events --all-namespaces --sort-by=.metadata.creationTimestamp -o json")
            if events_output:
                data = json.loads(events_output)
                activities = []
                
                for event in data.get('items', [])[:10]:
                    activities.append({
                        'timestamp': event.get('lastTimestamp', event.get('firstTimestamp', '')),
                        'type': 'info',
                        'message': event.get('message', ''),
                        'icon': '📊'
                    })
                
                return jsonify(activities)
            else:
                return jsonify([])
        except Exception as e:
            return jsonify({"error": str(e)}), 500

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=5000, debug=True)
